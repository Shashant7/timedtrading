name: Deploy feed worker

# Auto-deploys worker-feed/ (tt-feed) whenever feed source changes on main.
# Safe to deploy at ANY time: the */1 cron is live from first deploy but
# every tick no-ops until the operator flips FEED_ENABLED=true (cutover
# runbook in worker-feed/feed-index.js + the decomposition plan doc).
#
# Uses the same Cloudflare secrets as deploy-worker.yml / deploy-bridge.yml.
# NOTE: tt-feed's own secrets (TIMED_API_KEY, TWELVEDATA_API_KEY,
# ALPACA_API_KEY_ID, ALPACA_API_SECRET_KEY) are set once by the operator
# via `wrangler secret put --config worker-feed/wrangler.toml` — CI deploys
# never touch them.

on:
  push:
    branches: [main]
    paths:
      - "worker-feed/**"
      - "worker/feed/**"
      - ".github/workflows/deploy-feed.yml"
  workflow_dispatch:

concurrency:
  group: deploy-feed
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy (tt-feed)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve Cloudflare secrets
        id: cfsec
        env:
          CF_TOKEN_A: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_TOKEN_B: ${{ secrets.CF_API_TOKEN }}
          CF_TOKEN_C: ${{ secrets.CLOUDFLARE_TOKEN }}
          CF_ACCT_A:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCT_B:  ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          CF_TOKEN=""
          CF_ACCT=""
          if   [ -n "$CF_TOKEN_A" ]; then CF_TOKEN="$CF_TOKEN_A";
          elif [ -n "$CF_TOKEN_B" ]; then CF_TOKEN="$CF_TOKEN_B";
          elif [ -n "$CF_TOKEN_C" ]; then CF_TOKEN="$CF_TOKEN_C";
          fi
          if   [ -n "$CF_ACCT_A" ];  then CF_ACCT="$CF_ACCT_A";
          elif [ -n "$CF_ACCT_B" ];  then CF_ACCT="$CF_ACCT_B";
          fi
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCT" ]; then
            echo "::warning::Cloudflare secrets not configured — feed deploy SKIPPED."
            echo "secrets-ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "secrets-ok=true" >> "$GITHUB_OUTPUT"
          {
            echo "CLOUDFLARE_API_TOKEN=$CF_TOKEN"
            echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCT"
          } >> "$GITHUB_ENV"

      - name: Deploy feed worker
        if: steps.cfsec.outputs.secrets-ok == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:        ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId:       ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"
          workingDirectory: worker-feed
          command: deploy

      - name: Post-deploy smoke
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: |
          # Deploy can land between */1 cron ticks; retry freshness before failing.
          MAX_AGE_SEC=180
          RETRIES=4
          SLEEP_SEC=20
          OK="false"
          ENABLED="false"
          AGE="null"
          HEALTH="{}"
          for attempt in $(seq 1 "$RETRIES"); do
            sleep "$SLEEP_SEC"
            HEALTH=$(curl -s -m 15 "https://tt-feed.shashant.workers.dev/feed/health" || echo "{}")
            echo "feed health (attempt ${attempt}/${RETRIES}): $HEALTH"
            if ! echo "$HEALTH" | jq -e . >/dev/null 2>&1; then
              echo "::error::tt-feed /feed/health returned non-JSON after deploy"
              exit 1
            fi
            OK=$(echo "$HEALTH" | jq -r '.ok // false')
            ENABLED=$(echo "$HEALTH" | jq -r '.feed_enabled // false')
            AGE=$(echo "$HEALTH" | jq -r '.prices_age_sec // "null"')
            OP_HOURS=$(echo "$HEALTH" | jq -r '.operating_hours // false')
            CRON_ACTIVE=$(echo "$HEALTH" | jq -r '.price_feed_cron_active // false')
            FEED_MODE=$(echo "$HEALTH" | jq -r '.feed_mode // "?"')
            echo "ok=$OK feed_enabled=$ENABLED prices_age_sec=$AGE mode=$FEED_MODE cron_active=$CRON_ACTIVE operating_hours=$OP_HOURS"
            if [ "$OK" != "true" ]; then
              echo "::error::tt-feed /feed/health did not return ok:true after deploy"
              exit 1
            fi
            # Freshness only matters while the */1 cron is actively writing.
            # Saturday afternoon / quiet windows intentionally leave the last
            # RTH snapshot in KV — same gate as watchdog.yml.
            if [ "$ENABLED" != "true" ] || [ "$AGE" = "null" ] || [ "$AGE" -le "$MAX_AGE_SEC" ]; then
              break
            fi
            if [ "$OP_HOURS" != "true" ] || [ "$CRON_ACTIVE" != "true" ]; then
              echo "::notice::prices ${AGE}s stale outside active feed window (mode=$FEED_MODE) — expected, smoke passes."
              break
            fi
            if [ "$attempt" -lt "$RETRIES" ]; then
              echo "prices still stale (${AGE}s > ${MAX_AGE_SEC}s) during active feed window; waiting for next cron tick..."
            fi
          done
          # When the feed owns the */1 cron during an active window, assert
          # freshness (3 min tolerance). Quiet/off-hours staleness is expected.
          if [ "$ENABLED" = "true" ] && [ "$AGE" != "null" ] && [ "$AGE" -gt "$MAX_AGE_SEC" ] \
             && [ "$OP_HOURS" = "true" ] && [ "$CRON_ACTIVE" = "true" ]; then
            echo "::error::tt-feed owns the price feed but timed:prices is ${AGE}s stale after ${RETRIES} attempts (mode=$FEED_MODE)"
            exit 1
          fi
