    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      const API_BASE = "";

      const CLASSIFICATION_OPTIONS = [

        { value: "c_grade", label: "C", hint: "Ok trade — got by, but many mistakes to clean up or avoid", color: "#f59e0b", icon: "~" },
        { value: "d_grade", label: "D", hint: "Bad trade, many issues — add to our list of things to clean up", color: "#ef4444", icon: "✗" },

        { value: "data_error", label: "Bad Data", hint: "Stale price, glitch — excluded from analysis", color: "#6b7280", icon: "⚠" },
      ];

      var ENTRY_GRADE_OPTIONS = [

        { value: "perfect_timing", label: "Perfect Timing", hint: "Entered at the ideal moment with full confirmation" },

      var TRADE_MANAGEMENT_OPTIONS = [

        { value: "trimmed_too_early", label: "Trimmed Too Early", hint: "Took profit before the move completed" },
        { value: "perfect_trim", label: "Perfect Trim", hint: "Trimmed at the right level — textbook execution" },
        { value: "trimmed_too_late", label: "Trimmed Too Late", hint: "Gave back gains before trimming" },
        { value: "exited_too_early", label: "Exited Too Early", hint: "Closed the trade before the move played out" },

      const fetchOpts = { cache: "no-store", credentials: "include" };

      const TF_ORDER = ["10m", "15m", "30m", "1H", "4H", "D", "W"];
      const SIGNAL_LABELS = {
        ema_cross: "EMA cross",
        supertrend: "SuperTrend",
        ema_structure: "EMA structure",
        ema_depth: "EMA depth",
        rsi: "RSI",
        ema5_48: "EMA 5/48",
        s1_slope: "Slope",
      };
      const SETUP_NAME_MAP = {
        ema_regime_confirmed_long: "TT Confirmed Long", ema_regime_confirmed_short: "TT Confirmed Short",
        ema_regime_early_long: "TT Early Long", ema_regime_early_short: "TT Early Short",
        gold_long: "TT Breakout Long", gold_short: "TT Reversal Short", gold_short_pullback: "TT Reversal Short Pullback",
        momentum_score: "TT Momentum", squeeze_setup: "TT Squeeze", elite: "TT Elite",
        breakout: "TT Breakout", mean_revert_td9: "TT Mean Revert TD9",
        ripster_momentum: "TT Momentum", ripster_pullback: "TT Pullback",
        ripster_reclaim: "TT Reclaim", ripster_short_pivot_reclaimed: "TT Pivot Reclaimed",
        mean_reversion_pdz: "TT Mean Reversion",
      };
      function formatPath(path) {
        if (!path || typeof path !== "string") return null;
        if (SETUP_NAME_MAP[path]) return SETUP_NAME_MAP[path];
        return "TT " + path.replace(/^ripster_?/i, "").replace(/^saty_?/i, "").replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      }
      function parseSnapshot(snap) {
        if (!snap) return null;
        try {
          const parsed = typeof snap === "string" ? JSON.parse(snap) : snap;
          if (!parsed?.tf || typeof parsed.tf !== "object") return null;
          return TF_ORDER.filter(tf => parsed.tf[tf]).map(tf => ({
            tf,
            signals: parsed.tf[tf]?.signals || {},
          }));
        } catch { return null; }
      }
      function parseTfStack(tfStackJson) {
        if (!tfStackJson) return null;
        try {
          const parsed = typeof tfStackJson === "string" ? JSON.parse(tfStackJson) : tfStackJson;
          if (!Array.isArray(parsed)) return null;
          return parsed.filter(e => e?.tf);
        } catch { return null; }
      }
      function signalValueLabel(key, value) {
        if (value == null || !Number.isFinite(value)) return null;
        if (key === "ema_cross") return value === 1 ? "Bullish" : "Bearish";
        if (key === "supertrend") {
          if (value === 1) return "⬆️ Bullish";
          if (value === -1) return "⬇️ Bearish";
          return "⏸️ Flat";
        }
        if (key === "rsi") return String(value);
        return String(value);
      }
      function signalValueColor(key, value) {
        if (key === "ema_cross") return value === 1 ? "text-[#22c55e]" : "text-[#ef4444]";
        if (key === "supertrend") {
          if (value === 1) return "text-[#22c55e]";
          if (value === -1) return "text-[#ef4444]";
          return "text-[#9ca3af]";
        }
        if (key === "rsi") {
          if (value >= 70) return "text-[#ef4444]";
          if (value <= 30) return "text-[#22c55e]";
          return "text-[#d1d5db]";
        }
        return "text-[#d1d5db]";
      }

      function formatDate(ms) {
        if (!Number.isFinite(ms)) return "—";
        const d = new Date(ms);
        return d.toLocaleString("en-US", { timeZone: "America/New_York", month: "short", day: "numeric", hour: "numeric", minute: "2-digit", hour12: true });
      }

      function fmtUsd(n) {
        if (!Number.isFinite(n)) return "—";
        return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(n);
      }

      function fmtPct(n, digits = 1) {
        if (!Number.isFinite(Number(n))) return "—";
        return `${Number(n).toFixed(digits)}%`;
      }

      function fmtQty(n, digits = 2) {
        if (!Number.isFinite(Number(n))) return "—";
        return new Intl.NumberFormat("en-US", {
          minimumFractionDigits: 0,
          maximumFractionDigits: digits,
        }).format(Number(n));
      }

      function shortRunId(runId) {
        const r = String(runId || "").trim();
        if (!r) return "—";
        if (r.length <= 42) return r;
        return `${r.slice(0, 24)}...${r.slice(-15)}`;
      }

      // ── Indicator helpers (computed from OHLC) ───────────────────────────────
      function computeEMA(data, period, source = 'close') {
        const k = 2 / (period + 1);
        const out = [];
        let ema = null;
        const val = (bar) => source === 'hl2' ? (bar.high + bar.low) / 2 : bar.close;
        for (let i = 0; i < data.length; i++) {
          const v = val(data[i]);
          if (ema == null) {
            let sum = 0;
            for (let j = 0; j < Math.min(period, i + 1); j++) sum += val(data[j]);
            ema = sum / Math.min(period, i + 1);
          } else {
            ema = v * k + ema * (1 - k);
          }
          out.push({ time: data[i].time, value: ema });
        }
        return out;
      }
      function computeRSI(data, period = 14) {
        const out = [];
        for (let i = 0; i < data.length; i++) {
          if (i < period) {
            out.push({ time: data[i].time, value: 50 });
            continue;
          }
          let gains = 0, losses = 0;
          for (let j = i - period + 1; j <= i; j++) {
            const chg = data[j].close - (j > 0 ? data[j - 1].close : data[j].close);
            if (chg > 0) gains += chg; else losses -= chg;
          }
          const avgGain = gains / period, avgLoss = losses / period;
          const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
          const rsi = 100 - (100 / (1 + rs));
          out.push({ time: data[i].time, value: Math.max(0, Math.min(100, rsi)) });
        }
        return out;
      }

      function computeSuperTrend(data, period = 10, multiplier = 3) {
        const out = [];
        const k = 2 / (period + 1);
        let atr = null;
        let prevClose = data[0]?.close ?? 0;
        let prevUpper = null, prevLower = null, st = null;
        for (let i = 0; i < data.length; i++) {
          const h = data[i].high, l = data[i].low, c = data[i].close;
          const tr = Math.max(h - l, Math.abs(h - prevClose), Math.abs(l - prevClose));
          prevClose = c;
          if (i < period) {
            atr = atr == null ? tr : tr * k + atr * (1 - k);
            out.push({ time: data[i].time, value: (h + l) / 2 });
            continue;
          }
          atr = tr * k + atr * (1 - k);
          const hl2 = (h + l) / 2;
          const basicUpper = hl2 + multiplier * atr;
          const basicLower = hl2 - multiplier * atr;
          const finalUpper = (prevUpper == null || basicUpper < prevUpper || data[i - 1].close > prevUpper) ? basicUpper : prevUpper;
          const finalLower = (prevLower == null || basicLower > prevLower || data[i - 1].close < prevLower) ? basicLower : prevLower;
          const prevSt = st;
          st = (st == null) ? finalLower : (st === prevUpper ? (c > prevUpper ? finalLower : finalUpper) : (c < prevLower ? finalUpper : finalLower));
          prevUpper = finalUpper;
          prevLower = finalLower;
          out.push({ time: data[i].time, value: st });
        }
        return out;
      }

      // SuperTrend as separate line segments with breaks at flips (mirrors PineScript plot.style_linebr)
      function computeSuperTrendSegments(data, period = 10, multiplier = 3) {
        const segments = [];
        if (!data || data.length < period + 1) return segments;
        let atr = 0, trSum = 0;
        let upperBand = Infinity, lowerBand = 0;
        let dir = 1, prevDir = 1;
        let currentSeg = null;
        for (let i = 0; i < data.length; i++) {
          const t = data[i].time;
          const h = data[i].high, l = data[i].low, c = data[i].close;
          const prevC = i > 0 ? data[i - 1].close : c;
          const tr = Math.max(h - l, Math.abs(h - prevC), Math.abs(l - prevC));
          if (i < period) { trSum += tr; continue; }
          atr = i === period ? trSum / period : (atr * (period - 1) + tr) / period;
          const hl2 = (h + l) / 2;
          const bU = hl2 + multiplier * atr, bL = hl2 - multiplier * atr;
          upperBand = (bU < upperBand || prevC > upperBand) ? bU : upperBand;
          lowerBand = (bL > lowerBand || prevC < lowerBand) ? bL : lowerBand;
          prevDir = dir;
          if (dir === 1 && c > upperBand) dir = -1;
          else if (dir === -1 && c < lowerBand) dir = 1;
          const stVal = dir === -1 ? lowerBand : upperBand;
          const color = dir === -1 ? '#22c55e' : '#ef4444';
          if (dir !== prevDir || !currentSeg) {
            currentSeg = { color, data: [] };
            segments.push(currentSeg);
          }
          currentSeg.data.push({ time: t, value: stVal });
        }
        return segments;
      }

      // TD Sequential: Preparation (1-9) and Lead-up (1-13) counts
      function computeTDSequential(data, prepComp = 4, leadComp = 2) {
        const markers = [];
        let bullPrep = 0, bearPrep = 0;
        let bullLead = null, bearLead = null;
        for (let i = 0; i < data.length; i++) {
          if (i < prepComp) continue;
          const c = data[i].close;
          const cComp = data[i - prepComp].close;
          bullPrep = c < cComp ? bullPrep + 1 : 0;
          bearPrep = c > cComp ? bearPrep + 1 : 0;
          const bullPrepDone = bullPrep === 9;
          const bearPrepDone = bearPrep === 9;
          if (bullPrep >= 1 && bullPrep <= 9) {
            markers.push({
              time: data[i].time, position: 'belowBar',
              color: bullPrep === 9 ? '#089981' : 'rgba(8,153,129,0.65)',
              shape: 'circle', text: String(bullPrep), size: 0,
            });
          }
          if (bearPrep >= 1 && bearPrep <= 9) {
            markers.push({
              time: data[i].time, position: 'aboveBar',
              color: bearPrep === 9 ? '#f23645' : 'rgba(242,54,69,0.65)',
              shape: 'circle', text: String(bearPrep), size: 0,
            });
          }
          if (bullPrepDone) { bullLead = 0; bearLead = null; }
          if (bearPrepDone) { bearLead = 0; bullLead = null; }
          if (bullLead !== null && i >= leadComp && data[i].close < data[i - leadComp].low) {
            bullLead++;
            if (bullLead <= 13) {
              markers.push({
                time: data[i].time, position: 'belowBar',
                color: bullLead === 13 ? '#2962ff' : 'rgba(41,98,255,0.65)',
                shape: 'circle', text: String(bullLead), size: 0,
              });
            }
            if (bullLead >= 13) bullLead = null;
          }
          if (bearLead !== null && i >= leadComp && data[i].close > data[i - leadComp].high) {
            bearLead++;
            if (bearLead <= 13) {
              markers.push({
                time: data[i].time, position: 'aboveBar',
                color: bearLead === 13 ? '#ff5d00' : 'rgba(255,93,0,0.65)',
                shape: 'circle', text: String(bearLead), size: 0,
              });
            }
            if (bearLead >= 13) bearLead = null;
          }
        }
        return markers;
      }

      // Find bar that was current at timestamp (bar at or before this moment)
      // Candles: Unix seconds (intraday) or "YYYY-MM-DD" string (daily)
      function findBarTime(mapped, tsMs) {
        if (!mapped?.length || !Number.isFinite(tsMs)) return null;
        const tsSec = tsMs > 1e12 ? Math.floor(tsMs / 1000) : tsMs;
        const isDaily = typeof mapped[0].time === "string";
        if (isDaily) {
          const dayStr = new Date(tsSec * 1000).toLocaleDateString("en-CA", { timeZone: "America/New_York" });
          let best = null;
          for (const b of mapped) {
            if (String(b.time) <= dayStr && (best === null || String(b.time) > String(best.time))) best = b;
          }
          if (best) return best.time;
          if (String(mapped[0].time) > dayStr) return mapped[0].time;
          return null;
        }
        let best = null;
        for (const b of mapped) {
          if (b.time <= tsSec && (best === null || b.time > best.time)) best = b;
        }
        if (best) return best.time;
        if (mapped[0].time > tsSec) return mapped[0].time;
        return null;
      }

      // ── Interactive Chart (TradingView Lightweight Charts) ───────────────────
      // Cloud config matching TradingView EMA Clouds Pine Script
      const CLOUD_CONFIG = [
        { key: 'cloud180200', s: 180, l: 200, color: '#05bed5', bullFill: 'rgba(5,190,213,0.35)', bearFill: 'rgba(230,81,0,0.35)', label: '180-200' },
        { key: 'cloud7289', s: 72, l: 89, color: '#009688', bullFill: 'rgba(0,150,136,0.35)', bearFill: 'rgba(240,98,146,0.35)', label: '72-89' },
        { key: 'cloud3450', s: 34, l: 50, color: '#2196f3', bullFill: 'rgba(33,150,243,0.30)', bearFill: 'rgba(255,183,77,0.30)', label: '34-50' },
        { key: 'cloud512', s: 5, l: 12, color: '#4caf50', bullFill: 'rgba(3,97,3,0.55)', bearFill: 'rgba(136,14,79,0.55)', label: '5-12' },
      ];
      const INDICATOR_KEYS = ["cloud512", "cloud3450", "cloud7289", "cloud180200", "superTrend", "tdSeq"];
      function AutopsyChart({ ticker, entryPrice, trimPrice, exitPrice, entryTs, exitTs, trimTs, height = 360 }) {
        const containerRef = useRef(null);
        const chartRef = useRef(null);
        const seriesRef = useRef(null);
        const priceLinesRef = useRef([]);
        const executionOverlayRef = useRef([]);
        const cloudAreaRef = useRef([]);
        const cloudCanvasRef = useRef(null);
        const emaSeriesRef = useRef([]);
        const indicatorDataRef = useRef(null);
        const showIndicatorsRef = useRef(null);
        const tradeMarkersRef = useRef([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [tf, setTf] = useState("15");
        const [showIndicators, setShowIndicators] = useState({ cloud512: true, cloud3450: true, cloud7289: true, cloud180200: true, superTrend: true, tdSeq: false });
        showIndicatorsRef.current = showIndicators;

        const drawCloudFills = useCallback(() => {
          const canvas = cloudCanvasRef.current;
          const chart = chartRef.current;
          const container = containerRef.current;
          if (!canvas || !chart || !container) return;
          const dpr = window.devicePixelRatio || 1;
          const rect = container.getBoundingClientRect();
          canvas.width = Math.round(rect.width * dpr);
          canvas.height = Math.round(rect.height * dpr);
          canvas.style.width = rect.width + 'px';
          canvas.style.height = rect.height + 'px';
          const ctx = canvas.getContext('2d');
          ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
          ctx.clearRect(0, 0, rect.width, rect.height);
          const ts = chart.timeScale();
          const si = showIndicatorsRef.current || {};
          CLOUD_CONFIG.forEach((cloud, idx) => {
            if (!si[cloud.key]) return;
            const d = indicatorDataRef.current?.[cloud.key];
            if (!d?.shortEma || !d?.longEma) return;
            const shortD = d.shortEma;
            const longD = d.longEma;
            const ca = cloudAreaRef.current[idx];
            if (!ca?.upper) return;
            const n = Math.min(shortD.length, longD.length);
            if (n < 2) return;
            let segStart = 0;
            let prevBull = shortD[0].value >= longD[0].value;
            for (let i = 1; i <= n; i++) {
              const bull = i < n ? shortD[i].value >= longD[i].value : !prevBull;
              if (bull !== prevBull || i === n) {
                const from = segStart, to = Math.min(i, n - 1);
                ctx.beginPath();
                let started = false;
                for (let j = from; j <= to; j++) {
                  const x = ts.timeToCoordinate(shortD[j].time);
                  const y = ca.upper.priceToCoordinate(shortD[j].value);
                  if (x == null || y == null) continue;
                  if (!started) { ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
                }
                for (let j = to; j >= from; j--) {
                  const x = ts.timeToCoordinate(longD[j].time);
                  const y = ca.upper.priceToCoordinate(longD[j].value);
                  if (x == null || y == null) continue;
                  ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fillStyle = prevBull ? cloud.bullFill : cloud.bearFill;
                ctx.fill();
                segStart = i;
                prevBull = bull;
              }
            }
          });
          const candleSeries = seriesRef.current;
          const executionPoints = executionOverlayRef.current || [];
          if (candleSeries && executionPoints.length) {
            for (const pt of executionPoints) {
              const x = ts.timeToCoordinate(pt.time);
              const y = candleSeries.priceToCoordinate(pt.price);
              if (x == null || y == null) continue;
              const r = 10;
              ctx.save();
              ctx.shadowColor = pt.color;
              ctx.shadowBlur = 14;
              ctx.beginPath();
              ctx.arc(x, y, r, 0, Math.PI * 2);
              ctx.fillStyle = pt.color;
              ctx.fill();
              ctx.restore();
              ctx.beginPath();
              ctx.arc(x, y, r, 0, Math.PI * 2);
              ctx.lineWidth = 2.5;
              ctx.strokeStyle = "#0b0e11";
              ctx.stroke();
              ctx.fillStyle = "#ffffff";
              ctx.font = "bold 11px Inter, sans-serif";
              ctx.textAlign = "center";
              ctx.textBaseline = "middle";
              ctx.fillText(pt.code || "", x, y + 0.5);
              const label = pt.code === "E" ? "Entry" : pt.code === "T" ? "Trim" : pt.code === "X" ? "Exit" : "";
              if (label) {
                ctx.font = "600 10px Inter, sans-serif";
                ctx.fillStyle = pt.color;
                ctx.fillText(label, x, y - r - 6);
              }
            }
          }
        }, []);

        const intradaySessionMode = useMemo(() => {
          const sym = String(ticker || "").toUpperCase();
          if (!sym) return "rth";
          if (sym.endsWith("USD") || sym.endsWith("USDT") || sym.endsWith("1!")) return "extended";
          if (["SPX", "US500", "DXY", "GOLD", "SILVER", "USOIL"].includes(sym)) return "extended";
          return "rth";
        }, [ticker]);

        const isRegularSessionBar = useCallback((tsSec) => {
          if (!Number.isFinite(tsSec) || tsSec <= 0) return false;
          try {
            const parts = new Intl.DateTimeFormat("en-US", {
              timeZone: "America/New_York",
              weekday: "short",
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            }).formatToParts(new Date(tsSec * 1000));
            const map = {};
            for (const p of parts) map[p.type] = p.value;
            const weekday = String(map.weekday || "");
            if (weekday === "Sat" || weekday === "Sun") return false;
            const mins = Number(map.hour || 0) * 60 + Number(map.minute || 0);
            return mins >= 570 && mins < 960;
          } catch {
            return true;
          }
        }, []);

        const mapCandles = useCallback((candles, timeframe) => {
          const mapped = candles.map(c => {
            const rawTs = Number(c.ts);
            const ts = rawTs > 1e12 ? Math.floor(rawTs / 1000) : rawTs;
            return {
              time: ts,
              open: Number(c.o),
              high: Number(c.h),
              low: Number(c.l),
              close: Number(c.c),
            };
          }).filter(c => c.open > 0 && c.high > 0).sort((a, b) => a.time - b.time);
          const seen = new Set();
          const deduped = mapped.filter(x => {
            if (seen.has(x.time)) return false;
            seen.add(x.time);
            return true;
          });

          if (timeframe === "D") {
            const dayKey = (ts) => new Date(ts * 1000).toLocaleDateString("en-CA", { timeZone: "America/New_York" });
            const byDay = new Map();
            for (const b of deduped) {
              const key = dayKey(b.time);
              const existing = byDay.get(key);
              if (!existing || b.time >= existing.time) byDay.set(key, { ...b, time: key });
            }
            return Array.from(byDay.entries()).sort((a, b) => a[0].localeCompare(b[0])).map(([, b]) => b);
          }
          if (intradaySessionMode === "rth") {
            const rthOnly = deduped.filter(b => isRegularSessionBar(b.time));
            if (rthOnly.length >= 2) return rthOnly;
          }
          return deduped;
        }, [intradaySessionMode, isRegularSessionBar]);

        useEffect(() => {
          let cancelled = false;
          setError(null);
          setLoading(true);

          if (!containerRef.current || !ticker || typeof LightweightCharts === "undefined") {
            setLoading(false);
            setError("Charts unavailable");
            return;
          }

          // Full range: 3 days before entry through 3 days after exit
          const entryMs = Number.isFinite(Number(entryTs)) && entryTs
            ? (Number(entryTs) < 1e12 ? Number(entryTs) * 1000 : Number(entryTs))
            : null;
          const exitMs = Number.isFinite(Number(exitTs)) && exitTs
            ? (Number(exitTs) < 1e12 ? Number(exitTs) * 1000 : Number(exitTs))
            : null;
          const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
          const asOfMs = exitMs
            ? exitMs + threeDaysMs
            : (entryMs || Date.now());
          const limit = 3000; // Max supported by API; covers ~77 trading days of 15m bars
          const container = containerRef.current;
          const initialWidth = Math.max(container.clientWidth || 400, 200);
          const chartH = container.clientHeight > 50 ? container.clientHeight : height;

          const chart = LightweightCharts.createChart(container, {
            width: initialWidth,
            height: chartH,
            layout: {
              background: { type: "solid", color: "#0b0e11" },
              textColor: "#6b7280",
              fontSize: 10,
            },
            grid: {
              vertLines: { color: "rgba(38,50,95,0.5)" },
              horzLines: { color: "rgba(38,50,95,0.5)" },
            },
            crosshair: {
              mode: LightweightCharts.CrosshairMode.Normal,
              vertLine: { color: "rgba(255,255,255,0.15)", width: 1, style: 2, labelBackgroundColor: "#1e293b" },
              horzLine: { color: "rgba(255,255,255,0.15)", width: 1, style: 2, labelBackgroundColor: "#1e293b" },
            },
            rightPriceScale: {
              borderColor: "rgba(38,50,95,0.5)",
              scaleMargins: { top: 0.08, bottom: 0.08 },
              autoScale: true,
            },
            timeScale: {
              borderColor: "rgba(38,50,95,0.5)",
              timeVisible: true,
              secondsVisible: false,
              barSpacing: 4,
              rightOffset: 3,
              fixLeftEdge: true,
              fixRightEdge: true,
              tickMarkFormatter: (time) => {
                try {
                  if (typeof time === "string") {
                    const [y, m, d] = time.split("-").map(Number);
                    const date = new Date(y, (m || 1) - 1, d || 1);
                    return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
                  }
                  const d = new Date(time * 1000);
                  const dateStr = d.toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "America/New_York" });
                  const timeStr = d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
                  return dateStr + " " + timeStr;
                } catch { return ""; }
              },
            },
            localization: {
              timeFormatter: (time) => {
                try {
                  if (typeof time === "string") {
                    const [y, m, d] = time.split("-").map(Number);
                    const date = new Date(y, (m || 1) - 1, d || 1);
                    return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
                  }
                  const d = new Date(time * 1000);
                  const dateStr = d.toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "America/New_York" });
                  const timeStr = d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", second: "2-digit", timeZone: "America/New_York" });
                  return dateStr + " " + timeStr;
                } catch { return ""; }
              },
            },
            handleScroll: { vertTouchDrag: false },
          });
          chartRef.current = chart;

          // Cloud bands: two thin boundary lines per cloud + canvas overlay for fills
          const noLine = { lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false };
          const cloudAreas = CLOUD_CONFIG.map(cloud => ({
            key: cloud.key,
            upper: chart.addLineSeries({ color: cloud.color + '66', lineWidth: 1, ...noLine }),
            lower: chart.addLineSeries({ color: cloud.color + '66', lineWidth: 1, ...noLine }),
          }));
          cloudAreaRef.current = cloudAreas;

          // Create canvas overlay for cloud fills (positioned over chart area)
          const overlay = document.createElement('canvas');
          overlay.style.cssText = 'position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;z-index:1;';
          container.style.position = 'relative';
          container.appendChild(overlay);
          cloudCanvasRef.current = overlay;

          const candleSeries = chart.addCandlestickSeries({
            upColor: "#22c55e",
            downColor: "#ef4444",
            borderUpColor: "#22c55e",
            borderDownColor: "#ef4444",
            wickUpColor: "#22c55e",
            wickDownColor: "#ef4444",
          });
          seriesRef.current = candleSeries;

          const asOfTsParam = asOfMs;
          let url = `${API_BASE}/timed/candles?ticker=${encodeURIComponent(ticker)}&tf=${tf}&limit=${limit}`;
          if (asOfTsParam) url += `&asOfTs=${asOfTsParam}`;

          const doRender = (candles) => {
            if (cancelled) return;
            if (!candles || candles.length === 0) {
              setError("No chart data for this ticker");
              setLoading(false);
              return;
            }
            const mapped = mapCandles(candles, tf);
            if (mapped.length < 2) {
              setError("Insufficient candle data (need at least 2 bars)");
              setLoading(false);
              return;
            }
            candleSeries.setData(mapped);

            // EMA Clouds (filled area only) + SuperTrend (breaks) + TD Sequential
            for (const s of emaSeriesRef.current) {
              try { chart.removeSeries(s); } catch (_) {}
            }
            emaSeriesRef.current = [];
            const noPriceLine = { lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false };
            const allSeries = [];
            const allData = {};
            for (let ci = 0; ci < CLOUD_CONFIG.length; ci++) {
              const cloud = CLOUD_CONFIG[ci];
              const shortData = computeEMA(mapped, cloud.s, 'hl2');
              const longData = computeEMA(mapped, cloud.l, 'hl2');
              const upperData = [], lowerData = [];
              for (let j = 0; j < shortData.length; j++) {
                const sv = shortData[j].value, lv = longData[j].value, t = shortData[j].time;
                upperData.push({ time: t, value: Math.max(sv, lv) });
                lowerData.push({ time: t, value: Math.min(sv, lv) });
              }
              allData[cloud.key] = { upper: upperData, lower: lowerData, shortEma: shortData, longEma: longData };
              const vis = showIndicators[cloud.key];
              const ca = cloudAreaRef.current[ci];
              if (ca) {
                ca.upper.setData(vis ? upperData : []);
                ca.lower.setData(vis ? lowerData : []);
              }
            }
            const stSegments = computeSuperTrendSegments(mapped, 10, 3);
            allData.superTrend = stSegments;
            for (const seg of stSegments) {
              const s = chart.addLineSeries({ color: seg.color, lineWidth: 2, title: '', ...noPriceLine });
              s.setData(showIndicators.superTrend ? seg.data : []);
              allSeries.push(s);
            }
            const tdData = computeTDSequential(mapped);
            allData.tdSeq = tdData;
            indicatorDataRef.current = allData;
            emaSeriesRef.current = allSeries;

            // Add entry/exit price lines (thicker, solid, prominent labels)
            for (const pl of priceLinesRef.current) {
              try { candleSeries.removePriceLine(pl); } catch (_) {}
            }
            priceLinesRef.current = [];
            executionOverlayRef.current = [];
            const ep = Number(entryPrice);
            const tp = Number(trimPrice);
            const xp = Number(exitPrice);
            if (Number.isFinite(ep) && ep > 0) {
              const pl = candleSeries.createPriceLine({
                price: ep,
                color: "#60a5fa",
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Solid,
                axisLabelVisible: true,
                title: "Entry",
              });
              priceLinesRef.current.push(pl);
            }
            if (Number.isFinite(tp) && tp > 0 && tp !== ep && tp !== xp) {
              const pl = candleSeries.createPriceLine({
                price: tp,
                color: "#a78bfa",
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: "Trim",
              });
              priceLinesRef.current.push(pl);
            }
            if (Number.isFinite(xp) && xp > 0 && xp !== ep) {
              const pl = candleSeries.createPriceLine({
                price: xp,
                color: "#f59e0b",
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Solid,
                axisLabelVisible: true,
                title: "Exit",
              });
              priceLinesRef.current.push(pl);
            }
            const lastClose = mapped.length > 0 ? mapped[mapped.length - 1].close : null;
            if (Number.isFinite(lastClose) && lastClose > 0) {
              const pl = candleSeries.createPriceLine({
                price: lastClose,
                color: "#6b7280",
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: "Price",
              });
              priceLinesRef.current.push(pl);
            }

            // Plot exact execution-price points so marker placement stays aligned with
            // raw lifecycle prices even when the active bar's high/low is far away.
            const entryMs = Number(entryTs);
            const exitMs = Number(exitTs);
            const trimMs = Number(trimTs);
            const tradeMarkers = [];
            const entryBar = findBarTime(mapped, entryMs);
            const exitBar = findBarTime(mapped, exitMs);
            const trimBar = Number.isFinite(trimMs) && trimMs > 0 ? findBarTime(mapped, trimMs) : null;
            executionOverlayRef.current = [
              { time: entryBar, price: ep, color: "#60a5fa", code: "E" },
              { time: trimBar, price: tp, color: "#a78bfa", code: "T" },
              { time: exitBar, price: xp, color: "#f59e0b", code: "X" },
            ].filter((pt) => pt.time != null && Number.isFinite(pt.price) && pt.price > 0);
            tradeMarkersRef.current = tradeMarkers;
            const markers = [...tradeMarkers, ...(showIndicators.tdSeq ? tdData : [])];
            markers.sort((a, b) => (a.time < b.time ? -1 : a.time > b.time ? 1 : 0));
            try { candleSeries.setMarkers(markers); } catch (_) {}

            chart.timeScale().fitContent();
            const entryBarTime = findBarTime(mapped, entryTs);
            const exitBarTime = findBarTime(mapped, exitTs);
            const hasTradeRange = entryBarTime != null && exitBarTime != null;
            const isDailyTime = typeof mapped[0].time === "string";
            let visibleFrom = mapped[0].time, visibleTo = mapped[mapped.length - 1].time;
            if (hasTradeRange) {
              if (isDailyTime) {
                const idxEntry = mapped.findIndex(b => b.time === entryBarTime);
                const idxExit = mapped.findIndex(b => b.time === exitBarTime);
                if (idxEntry >= 0 && idxExit >= 0) {
                const padding = 10;
                const fromIdx = Math.max(0, idxEntry - padding);
                const toIdx = Math.min(mapped.length - 1, idxExit + padding);
                  visibleFrom = mapped[fromIdx].time;
                  visibleTo = mapped[toIdx].time;
                }
              } else {
                const twoWeekSec = 10 * 24 * 3600;
                visibleFrom = Math.max(mapped[0].time, entryBarTime - twoWeekSec);
                visibleTo = Math.min(mapped[mapped.length - 1].time, exitBarTime + twoWeekSec);
              }
              try {
                chart.timeScale().setVisibleRange({ from: visibleFrom, to: visibleTo });
              } catch (_) {}
            }
            // Let autoScale handle price range — just ensure margins are generous enough
            // to show execution lines without clipping
            try {
              chart.priceScale("right").applyOptions({ autoScale: true, scaleMargins: { top: 0.08, bottom: 0.08 } });
            } catch (_) {}
            requestAnimationFrame(() => {
              if (chartRef.current && containerRef.current) {
                if (!hasTradeRange) chartRef.current.timeScale().scrollToPosition(-3, false);
                const w = containerRef.current.clientWidth;
                const h = containerRef.current.clientHeight;
                if (w > 0 && h > 0) chartRef.current.resize(w, h);
              }
              drawCloudFills();
            });
            setTimeout(() => {
              if (chartRef.current && containerRef.current) {
                const w = containerRef.current.clientWidth;
                const h = containerRef.current.clientHeight;
                if (w > 0 && h > 0) chartRef.current.resize(w, h);
              }
            }, 200);
            setLoading(false);
          };

          const tryFetchCandles = (tfParam, asOf) => {
            let u = `${API_BASE}/timed/candles?ticker=${encodeURIComponent(ticker)}&tf=${tfParam}&limit=${limit}`;
            if (asOf) u += `&asOfTs=${asOf}`;
            return fetch(u, { cache: "no-store" }).then(r => r.json());
          };
          tryFetchCandles(tf, asOfTsParam)
            .then(async (data) => {
              if (cancelled) return;
              let candles = (data?.ok && data?.candles) ? data.candles : [];
              if (candles.length < 2 && asOfTsParam) {
                const d = await tryFetchCandles(tf, null).catch(() => ({}));
                if (d?.ok && d?.candles?.length >= 2) candles = d.candles;
              }
              if (candles.length < 2 && tf !== "D") {
                const d = await tryFetchCandles("D", asOfTsParam).catch(() => ({}));
                if (d?.ok && d?.candles?.length >= 2) candles = d.candles;
              }
              if (candles.length < 2 && tf !== "D") {
                const d = await tryFetchCandles("D", null).catch(() => ({}));
                if (d?.ok && d?.candles?.length >= 2) candles = d.candles;
              }
              if (cancelled) return;
              if (candles.length < 2) {
                setError("Insufficient chart data (try a different timeframe)");
                setLoading(false);
                return;
              }
              doRender(candles);
            })
            .catch(e => {
              if (cancelled) return;
              console.warn("[AutopsyChart] Failed to load chart:", e);
              setError("Failed to load chart");
              setLoading(false);
            });

          const handleResize = () => {
            if (containerRef.current && chartRef.current) {
              const w = containerRef.current.clientWidth;
              const h = containerRef.current.clientHeight;
              if (w > 0 && h > 0) chartRef.current.resize(w, h);
            }
            requestAnimationFrame(drawCloudFills);
          };
          const ro = typeof ResizeObserver !== "undefined" ? new ResizeObserver(handleResize) : null;
          if (ro) ro.observe(containerRef.current);
          window.addEventListener("resize", handleResize);

          const onRangeChange = () => requestAnimationFrame(drawCloudFills);
          chart.timeScale().subscribeVisibleLogicalRangeChange(onRangeChange);

          return () => {
            cancelled = true;
            try { chart.timeScale().unsubscribeVisibleLogicalRangeChange(onRangeChange); } catch (_) {}
            if (ro) ro.disconnect();
            window.removeEventListener("resize", handleResize);
            priceLinesRef.current = [];
            executionOverlayRef.current = [];
            emaSeriesRef.current = [];
            cloudAreaRef.current = [];
            if (cloudCanvasRef.current) {
              try { cloudCanvasRef.current.remove(); } catch (_) {}
              cloudCanvasRef.current = null;
            }
            chart.remove();
            chartRef.current = null;
            seriesRef.current = null;
          };
        }, [ticker, tf, entryPrice, trimPrice, exitPrice, entryTs, exitTs, trimTs, height, mapCandles]);

        useEffect(() => {
          const series = emaSeriesRef.current;
          const data = indicatorDataRef.current;
          if (!data) return;
          CLOUD_CONFIG.forEach((cloud, idx) => {
            const d = data[cloud.key];
            if (!d) return;
            const vis = showIndicators[cloud.key];
            const ca = cloudAreaRef.current[idx];
            if (ca) {
              ca.upper.setData(vis ? d.upper : []);
              ca.lower.setData(vis ? d.lower : []);
            }
          });
          if (series && data.superTrend) {
            const stVis = showIndicators.superTrend;
            for (let si = 0; si < series.length; si++) {
              if (si < data.superTrend.length) {
                series[si].setData(stVis ? data.superTrend[si].data : []);
              }
            }
          }
          if (seriesRef.current && data.tdSeq) {
            const tm = tradeMarkersRef.current || [];
            const td = showIndicators.tdSeq ? data.tdSeq : [];
            const all = [...tm, ...td].sort((a, b) => (a.time < b.time ? -1 : a.time > b.time ? 1 : 0));
            try { seriesRef.current.setMarkers(all); } catch (_) {}
          }
          requestAnimationFrame(drawCloudFills);
        }, [showIndicators, drawCloudFills]);

        const toggleIndicator = (key) => {
          setShowIndicators(prev => ({ ...prev, [key]: !prev[key] }));
        };

        return (
          <div className="tt-card flex flex-col flex-1 min-h-0">
            <div className="shrink-0 px-3 py-2 flex items-center justify-between border-b border-white/[0.04]">
              <span className="text-[13px] font-semibold text-[#14b8a6]">{ticker}</span>
              <div className="flex items-center gap-0.5 sm:gap-1">
                {["5", "15", "30", "60", "D"].map(t => (
                  <button
                    key={t}
                    onClick={() => setTf(t)}
                    className={`px-2.5 py-1.5 sm:px-2 sm:py-1 rounded text-[11px] font-medium ${tf === t ? "bg-white/10 text-white" : "text-[#6b7280] hover:text-white"}`}
                  >
                    {t === "D" ? "1D" : t + "m"}
                  </button>
                ))}
              </div>
            </div>
            <div ref={containerRef} style={{ minHeight: 180, minWidth: 200, width: "100%", height: "100%" }} className="w-full flex-1 min-h-0">
              {error && !loading && (
                <div className="flex items-center justify-center h-full text-[#6b7280] text-[13px]">{error}</div>
              )}
              {loading && (
                <div className="flex items-center justify-center h-full">
                  <div className="loading-spinner" style={{ width: 24, height: 24 }} />
                </div>
              )}
            </div>
            <div className="shrink-0 px-2 sm:px-3 py-2 flex flex-wrap items-center gap-x-2 sm:gap-x-4 gap-y-1 border-t border-white/[0.04] bg-white/[0.02] text-[10px] sm:text-[11px] text-[#9ca3af]">
              <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-0.5 rounded bg-[#60a5fa]" /> Entry</span>
              <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-0.5 rounded bg-[#f59e0b]" /> Exit</span>
              {INDICATOR_KEYS.map(key => {
                const labels = { cloud512: "5-12", cloud3450: "34-50", cloud7289: "72-89", cloud180200: "180-200", superTrend: "ST", tdSeq: "TD" };
                const colors = { cloud512: "#4caf50", cloud3450: "#2196f3", cloud7289: "#009688", cloud180200: "#05bed5", superTrend: "#f97316", tdSeq: "#2962ff" };
                const on = showIndicators[key];
                return (
                  <button key={key} type="button" onClick={() => toggleIndicator(key)} className={`flex items-center gap-1 sm:gap-1.5 rounded px-1.5 py-1 sm:py-0.5 -m-0.5 hover:bg-white/[0.06] transition-all ${on ? "opacity-100" : "opacity-45"}`} title={on ? "Hide" : "Show"}>
                    <span className="inline-block w-3 h-0.5 rounded shrink-0" style={{ background: colors[key] }} />
                    <span>{labels[key]}</span>
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      // ── Autopsy Modal ───────────────────────────────────────────────────────
      function AutopsyModal({ trade, annotations, onSave, onRefreshTrades, onClose, readonly = false }) {
        const [notes, setNotes] = useState(annotations?.notes ?? "");
        const [classification, setClassification] = useState(annotations?.classification ?? "");
        const [entryGrade, setEntryGrade] = useState(Array.isArray(annotations?.entry_grade) ? annotations.entry_grade : []);
        const [tradeManagement, setTradeManagement] = useState(Array.isArray(annotations?.trade_management) ? annotations.trade_management : []);
        const [saving, setSaving] = useState(false);
        const [tickerProfile, setTickerProfile] = useState(null);
        const [tickerProfileLoading, setTickerProfileLoading] = useState(false);
        useEffect(() => {
          setEntryGrade(Array.isArray(annotations?.entry_grade) ? annotations.entry_grade : []);
          setTradeManagement(Array.isArray(annotations?.trade_management) ? annotations.trade_management : []);
        }, [trade?.trade_id, trade?.id, annotations?.entry_grade, annotations?.trade_management]);
        const tradeId = trade?.trade_id || trade?.id || `${trade?.ticker}-${trade?.entry_ts}`;
        const rawEntry = Number(trade?.raw_entry_price ?? trade?.entry_price ?? trade?.entryPrice);
        const rawExit = Number(trade?.raw_exit_price ?? trade?.exit_price ?? trade?.exitPrice);
        const rawTrim = Number(trade?.raw_trim_price ?? trade?.trim_price ?? trade?.trimPrice);
        const effectiveEntry = Number(trade?.effective_entry_price);
        const effectiveExit = Number(trade?.effective_exit_price);
        const lifecycleRealizedPnl = Number(trade?.lifecycle_realized_pnl ?? trade?.realizedPnl ?? trade?.pnl);
        const displayEntry = Number.isFinite(rawEntry) ? rawEntry : effectiveEntry;
        const displayExit = Number.isFinite(rawExit) ? rawExit : effectiveExit;
        const displayPnl = Number.isFinite(lifecycleRealizedPnl) ? lifecycleRealizedPnl : Number(trade?.pnl);
        const rawStatus = String(trade?.status || "").trim().toUpperCase();
        const displayStatus = (() => {
          if ((rawStatus === "FLAT" || !rawStatus) && Number.isFinite(displayPnl) && Math.abs(displayPnl) > 1e-6) {
            return displayPnl > 0 ? "WIN" : "LOSS";
          }
          if (rawStatus === "FLAT") return "BREAKEVEN";
          return rawStatus || "";
        })();
        const hasEffectiveEntryOverride = Number.isFinite(effectiveEntry) && Number.isFinite(rawEntry) && Math.abs(effectiveEntry - rawEntry) > 1e-6;
        const hasEffectiveExitOverride = Number.isFinite(effectiveExit) && Number.isFinite(rawExit) && Math.abs(effectiveExit - rawExit) > 1e-6;
        const effectiveExitBasis = typeof trade?.effective_exit_basis === "string" ? trade.effective_exit_basis : null;
        const trimmedPctVal = Number(trade?.trimmed_pct ?? trade?.trimmedPct ?? 0);
        const lifecycleEntryShares = Number(trade?.lifecycle_entry_shares ?? trade?.shares);
        const lifecycleTrimShares = Number.isFinite(Number(trade?.lifecycle_trim_shares))
          ? Number(trade?.lifecycle_trim_shares)
          : (Number.isFinite(lifecycleEntryShares) ? lifecycleEntryShares * Math.min(Math.max(trimmedPctVal, 0), 1) : NaN);
        const lifecycleExitShares = Number.isFinite(Number(trade?.lifecycle_exit_shares))
          ? Number(trade?.lifecycle_exit_shares)
          : (Number.isFinite(lifecycleEntryShares) ? lifecycleEntryShares * Math.max(0, 1 - Math.min(Math.max(trimmedPctVal, 0), 1)) : NaN);
        const lifecycleRiskAmount = Number(trade?.lifecycle_risk_amount);
        const hasRealizedTrimCarry =
          Number.isFinite(trimmedPctVal) && trimmedPctVal > 0.001 &&
          Number.isFinite(rawEntry) && Number.isFinite(rawExit) && Math.abs(rawEntry - rawExit) < 1e-6 &&
          Number.isFinite(Number(trade?.pnl)) && Math.abs(Number(trade?.pnl)) > 1e-6;

        // Use exact execution timestamps for markers/range.
        // LightweightCharts will snap marker placement to the active bar at/before ts,
        // but we should not pre-shift timestamps to 15m bars.
        const chartEntryTs = trade?.entry_ts;
        const chartExitTs = trade?.exit_ts;
        const chartTrimTs = trade?.trim_ts;

        useEffect(() => {
          let cancelled = false;
          const ticker = String(trade?.ticker || "").trim().toUpperCase();
          if (!ticker) {
            setTickerProfile(null);
            return;
          }
          setTickerProfileLoading(true);
          fetch(`${API_BASE}/timed/profile/${encodeURIComponent(ticker)}`, fetchOpts)
            .then(r => r.ok ? r.json() : null)
            .then(data => {
              if (cancelled) return;
              setTickerProfile(data?.ok ? (data.profile || null) : null);
            })
            .catch(() => {
              if (!cancelled) setTickerProfile(null);
            })
            .finally(() => {
              if (!cancelled) setTickerProfileLoading(false);
            });
          return () => { cancelled = true; };
        }, [trade?.ticker]);

        // NOTE: Auto-correction of stored prices removed. The stored entry/exit prices
        // are the actual execution prices (10m candle close at trade open/close) and must
        // not be overwritten with 15m candle closes which are a different timeframe.

        const handleSave = async () => {
          setSaving(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/trade-autopsy/annotations`, {
              ...fetchOpts,
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                trade_id: tradeId,
                run_id: trade?.run_id || trade?.runId || null,
                classification,
                notes,
                entry_grade: entryGrade,
                trade_management: tradeManagement,
              }),
            });
            const data = await res.json();
            if (data.ok) {
              onSave?.();
              onClose?.();
            }
          } finally {
            setSaving(false);
          }
        };

        const entrySnap = trade?.signal_snapshot_json;
        const exitSnap = trade?.exit_snapshot_json;
        const tfStack = trade?.tf_stack_json;
        const mfe = trade?.max_favorable_excursion;
        const mae = trade?.max_adverse_excursion;
        const exitReason = trade?.exit_reason;
        const contextProfile = tickerProfile?.contract?.context || null;
        const executionProfile = tickerProfile?.contract?.execution || null;
        const learningProfile = tickerProfile?.contract?.learning || null;
        const favoredRegime = contextProfile?.favored_regime || null;
        const favoredVix = contextProfile?.favored_vix_bucket || null;
        const favoredPath = contextProfile?.favored_entry_path || null;
        const topRegimeRow = contextProfile?.by_regime?.[0] || null;
        const topVixRow = contextProfile?.by_vix_bucket?.[0] || null;
        const topPathRow = contextProfile?.by_entry_path?.[0] || null;

        const parsedSnap = useMemo(() => {
          if (!entrySnap) return null;
          try { return typeof entrySnap === "string" ? JSON.parse(entrySnap) : entrySnap; } catch { return null; }
        }, [entrySnap]);
        const parsedExitSnap = useMemo(() => {
          if (!exitSnap) return null;
          try { return typeof exitSnap === "string" ? JSON.parse(exitSnap) : exitSnap; } catch { return null; }
        }, [exitSnap]);
        const ln = parsedSnap?.lineage || null;
        const exitLn = parsedExitSnap?.lineage || null;
        const lc = parsedSnap?.precision?.learningContext || parsedSnap?.learningContext || null;

        const rcColor = ln?.regime_class === "TRENDING" ? "#22c55e" : ln?.regime_class === "TRANSITIONAL" ? "#f59e0b" : ln?.regime_class === "CHOPPY" ? "#ef4444" : "#9ca3af";
        const vtColor = ln?.volatility_tier === "LOW" ? "#60a5fa" : ln?.volatility_tier === "MEDIUM" ? "#14b8a6" : ln?.volatility_tier === "HIGH" ? "#f59e0b" : ln?.volatility_tier === "EXTREME" ? "#ef4444" : "#9ca3af";
        const vixVal = Number(ln?.vix_at_entry) || 0;
        const vixLabel = vixVal < 15 ? "Low" : vixVal < 22 ? "Medium" : vixVal < 30 ? "High" : "Extreme";
        const vixColor = vixVal < 15 ? "#22c55e" : vixVal < 22 ? "#14b8a6" : vixVal < 30 ? "#f59e0b" : "#ef4444";
        const stDirIcon = (d) => d > 0 ? "▲" : d < 0 ? "▼" : "—";
        const stDirColor = (d) => d > 0 ? "#22c55e" : d < 0 ? "#ef4444" : "#6b7280";
        const phaseZColor = (z) => z === "EXTREME_UP" || z === "DISTRIBUTION" ? "#22c55e" : z === "EXTREME_DOWN" || z === "ACCUMULATION" ? "#ef4444" : z === "TRANSITION" ? "#f59e0b" : "#9ca3af";
        const fuelColor = (s) => s === "full" ? "#22c55e" : s === "fading" ? "#f59e0b" : s === "critical" ? "#ef4444" : "#6b7280";
        const tdCountColor = (v) => v >= 7 ? "#ef4444" : v >= 4 ? "#f59e0b" : "#9ca3af";
        const tradeDir = (trade?.direction || "").toUpperCase();

        const Pill = ({ color, children }) => (
          <span className="px-1 py-px rounded text-[9px] font-bold inline-block" style={{ background: color + "1a", color, border: `1px solid ${color}33` }}>{children}</span>
        );
        const SectionLabel = ({ color, children }) => (
          <div className="text-[8px] font-bold uppercase tracking-wider mb-0.5 flex items-center gap-0.5" style={{ color }}>
            <span className="w-1 h-1 rounded-full inline-block" style={{ background: color }} />{children}
          </div>
        );
        const DashCell = ({ children }) => (
          <div className="px-1.5 py-1 rounded-md bg-white/[0.02] border border-white/[0.04] min-w-0">{children}</div>
        );

        return (
          <div className="fixed inset-0 z-[100] flex items-center justify-center md:p-4" style={{ background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)" }} onClick={onClose}>
            <div className="autopsy-modal-card w-full h-full md:h-auto md:max-w-[95vw] md:max-h-[95vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
              <div className="flex items-center justify-between px-3 py-1.5 border-b border-white/[0.06] shrink-0" style={{ background: "var(--tt-bg-surface)" }}>
                <h2 className="text-[14px] font-semibold text-white truncate mr-2">
                  {trade?.ticker} {trade?.direction || ""} — {readonly ? "Trade Review" : "Trade Autopsy"}
                </h2>
                <button onClick={onClose} className="p-1.5 -mr-1 rounded-md text-[#6b7280] hover:text-white hover:bg-white/[0.06] shrink-0">✕</button>
              </div>

              <div
                className="px-2.5 py-1.5 md:px-3 flex-1 min-h-0 overflow-y-auto flex flex-col gap-1"
                style={{ paddingBottom: "calc(env(safe-area-inset-bottom, 0px) + 0.25rem)" }}
              >
                {/* ── Header pills ── */}
                <div className="flex flex-wrap items-center gap-1 shrink-0">
                  <div className="flex items-center gap-1 px-2 py-0.5 rounded bg-[#60a5fa]/10 border border-[#60a5fa]/20">
                    <span className="text-[8px] font-bold text-[#60a5fa] uppercase">Entry</span>
                    <span className="text-[11px] font-semibold text-white">{formatDate(trade?.entry_ts)} @ {fmtUsd(displayEntry)}</span>
                    {hasEffectiveEntryOverride && (
                      <span className="text-[9px] text-[#93c5fd]/80">inferred {fmtUsd(effectiveEntry)}</span>
                    )}
                  </div>
                  {Number.isFinite(rawTrim) && Number(trade?.trim_ts) > 0 && (
                    <div className="flex items-center gap-1 px-2 py-0.5 rounded bg-[#14b8a6]/10 border border-[#14b8a6]/20">
                      <span className="text-[8px] font-bold text-[#14b8a6] uppercase">Trim</span>
                      <span className="text-[11px] font-semibold text-white">{formatDate(trade?.trim_ts)} @ {fmtUsd(rawTrim)}</span>
                      {Number.isFinite(lifecycleTrimShares) && lifecycleTrimShares > 0 && (
                        <span className="text-[9px] text-[#99f6e4]/80">{fmtQty(lifecycleTrimShares)} sh</span>
                      )}
                    </div>
                  )}
                  <div className="flex items-center gap-1 px-2 py-0.5 rounded bg-[#f59e0b]/10 border border-[#f59e0b]/20">
                    <span className="text-[8px] font-bold text-[#f59e0b] uppercase">Exit</span>
                    <span className="text-[11px] font-semibold text-white">{formatDate(trade?.exit_ts)} @ {fmtUsd(displayExit)}</span>
                    {hasEffectiveExitOverride && (
                      <span className="text-[9px] text-[#fcd34d]/80">inferred {fmtUsd(effectiveExit)}</span>
                    )}
                    {effectiveExitBasis && (
                      <span className="text-[8px] text-[#9ca3af] uppercase">({effectiveExitBasis.replace(/_/g, " ")})</span>
                    )}
                  </div>
                  <div className="flex items-center gap-1 px-2 py-0.5 rounded" style={{ background: Number(displayPnl) >= 0 ? "rgba(34,197,94,0.08)" : "rgba(239,68,72,0.08)", border: `1px solid ${Number(displayPnl) >= 0 ? "rgba(34,197,94,0.2)" : "rgba(239,68,72,0.2)"}` }}>
                    <span className="text-[8px] font-bold uppercase" style={{ color: Number(displayPnl) >= 0 ? "#22c55e" : "#ef4444" }}>P&L</span>
                    <span className="text-[11px] font-bold" style={{ color: Number(displayPnl) >= 0 ? "#22c55e" : "#ef4444" }}>{fmtUsd(displayPnl)}</span>
                    {hasRealizedTrimCarry && (
                      <span className="text-[8px] text-[#9ca3af] uppercase">includes realized trim</span>
                    )}
                  </div>
                  {(() => {
                    const _sh = lifecycleEntryShares;
                    if (!_sh || !Number.isFinite(_sh) || _sh <= 0) return null;
                    return (
                      <div className="flex items-center gap-1 px-2 py-0.5 rounded bg-[#a78bfa]/10 border border-[#a78bfa]/20">
                        <span className="text-[8px] font-bold text-[#a78bfa] uppercase">Shares</span>
                        <span className="text-[11px] font-semibold text-white">{fmtQty(_sh)}</span>
                        {Number.isFinite(lifecycleTrimShares) && lifecycleTrimShares > 0 && (
                          <span className="text-[9px] text-[#a78bfa]/70">({fmtQty(lifecycleTrimShares)} trimmed · {fmtQty(lifecycleExitShares)} exit)</span>
                        )}
                      </div>
                    );
                  })()}
                  {Number.isFinite(lifecycleRiskAmount) && lifecycleRiskAmount > 0 && (
                    <div className="flex items-center gap-1 px-2 py-0.5 rounded bg-white/[0.03] border border-white/[0.08]">
                      <span className="text-[8px] font-bold text-[#d1d5db] uppercase">Risk</span>
                      <span className="text-[11px] font-semibold text-white">{fmtUsd(lifecycleRiskAmount)}</span>
                    </div>
                  )}
                  {displayStatus && <span className="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase" style={{ background: displayStatus === "WIN" ? "#22c55e1a" : displayStatus === "LOSS" ? "#ef44441a" : "#9ca3af1a", color: displayStatus === "WIN" ? "#22c55e" : displayStatus === "LOSS" ? "#ef4444" : "#9ca3af" }}>{displayStatus}</span>}
                  <span className="ml-auto text-[9px] font-mono text-[#4b5563] hidden sm:inline" title={trade?.run_id || ""}>{shortRunId(trade?.run_id)}</span>
                </div>

                {/* ══════════ 2. SIGNAL SNAPSHOT DASHBOARD ══════════ */}
                <div className="tt-card px-2.5 py-1.5 shrink-0">
                  {/* ── Row 1: Setup Name + Grade + Risk (prominent) ── */}
                  <div className="flex flex-wrap items-center gap-2 mb-1.5 pb-1.5 border-b border-white/[0.06]">
                    {trade?.setup_name && (
                      <span className="text-[13px] font-bold text-white tracking-wide">{trade.setup_name}</span>
                    )}
                    {trade?.entry_path && (
                      <span className={`text-[12px] font-semibold ${trade?.setup_name ? "text-[#9ca3af]" : "text-white"}`}>{formatPath(trade.entry_path)}</span>
                    )}
                    {trade?.setup_grade && (() => {
                      const t = String(trade.setup_grade);
                      const cls = t === "Prime" ? "bg-amber-500/20 text-amber-300 border-amber-500/30" : t === "Confirmed" ? "bg-emerald-500/20 text-emerald-300 border-emerald-500/30" : "bg-blue-500/20 text-blue-300 border-blue-500/30";
                      return <span className={`px-2 py-0.5 rounded text-[10px] font-bold border ${cls}`}>TT {t}</span>;
                    })()}
                    {Number(trade?.risk_budget) > 0.001 && (
                      <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-white/[0.04] border border-white/[0.08] text-[#d1d5db]">
                        {Number(trade.risk_budget) < 1 ? `${(Number(trade.risk_budget) * 100).toFixed(1)}% Risk` : `$${trade.risk_budget} Risk`}
                      </span>
                    )}
                    {Number(trade?.notional) > 0 && (
                      <span className="px-2 py-0.5 rounded text-[10px] font-bold bg-[#a78bfa]/10 border border-[#a78bfa]/20 text-[#a78bfa]">
                        ${Number(trade.notional).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 })} Notional
                      </span>
                    )}
                    <span className="w-px h-3.5 bg-white/[0.08] mx-0.5 hidden sm:block" />
                    {parseTfStack(tfStack)?.map(({ tf, bias }) => {
                      const b = String(bias || "").toLowerCase();
                      const isBull = b === "bullish"; const isBear = b === "bearish";
                      const style = isBull ? "bg-[#22c55e]/15 text-[#22c55e]" : isBear ? "bg-[#ef4444]/15 text-[#ef4444]" : "bg-white/[0.06] text-[#9ca3af]";
                      return <span key={tf} className={`inline-flex items-center gap-0.5 px-1 py-0.5 rounded text-[9px] font-medium ${style}`}><span className="opacity-70">{tf}</span>{isBull ? "Bull" : isBear ? "Bear" : (bias || "—")}</span>;
                    })}
                    {ln?.danger_score != null && (<>
                      <span className="w-px h-3 bg-white/[0.08] mx-0.5 hidden sm:block" />
                      <span className="text-[9px] font-bold text-[#ef4444] uppercase">Danger</span>
                      <span className="font-bold text-[12px]" style={{color: ln.danger_score>=3?"#ef4444":ln.danger_score>=2?"#f59e0b":"#22c55e"}}>{ln.danger_score}</span>
                      {ln.danger_flags?.length > 0 && ln.danger_flags.map((f,i) => <span key={i} className="px-1 py-0.5 rounded text-[7px] bg-[#ef4444]/10 text-[#fca5a5]">{f.replace(/_/g," ")}</span>)}
                    </>)}
                  </div>

                  {/* ── Row 2: Side-by-side Entry Signals + Exit Signals tables ── */}
                  {(() => {
                    // License-safe display: keep 10m captured server-side, but do not render it in UI.
                    const tdTfMap = { "W":"W","D":"D","4H":"240","1H":"60","30m":"30","15m":"15" };
                    const allTFs = ["15m","30m","1H","4H","D","W"];
                    const renderSignalTable = (snapRaw, lineageData, label, accentColor) => {
                      let parsedTf = null;
                      try {
                        const parsed = typeof snapRaw === "string" ? JSON.parse(snapRaw) : snapRaw;
                        parsedTf = parsed?.tf && typeof parsed.tf === "object" ? parsed.tf : null;
                      } catch (_) {
                        parsedTf = null;
                      }
                      const snapMap = {};
                      if (parsedTf) {
                        allTFs.forEach(tf => {
                          if (Object.prototype.hasOwnProperty.call(parsedTf, tf)) {
                            const row = parsedTf[tf];
                            snapMap[tf] = row?.signals || {};
                          }
                        });
                      }
                      const hasSnap = Object.keys(snapMap).length > 0;
                      const hasTD = lineageData?.td_counts;
                      const hasRsiDiv = lineageData?.rsi_divergence;
                      const hasPhaseDiv = lineageData?.phase_divergence;
                      if (!hasSnap && !hasTD && !hasRsiDiv && !hasPhaseDiv) return (
                        <div className="flex-1 min-w-0">
                          <div className="text-[8px] font-bold uppercase tracking-widest mb-1" style={{color: accentColor + "b3"}}>{label}</div>
                          <div className="text-[9px] text-[#4b5563] italic py-4 text-center">No snapshot data captured</div>
                        </div>
                      );
                      return (
                        <div className="flex-1 min-w-0">
                          <div className="text-[8px] font-bold uppercase tracking-widest mb-1" style={{color: accentColor + "b3"}}>{label}</div>
                          <table className="text-[11px] w-full" style={{borderSpacing:0}}>
                            <thead>
                              <tr className="text-[8px] text-[#6b7280] uppercase border-b border-white/[0.06]">
                                <th className="text-left pr-2 pb-1 font-semibold">TF</th>
                                <th className="text-left pr-2 pb-1 font-semibold">EMA</th>
                                <th className="text-left pr-2 pb-1 font-semibold">ST</th>
                                <th className="text-left pr-2 pb-1 font-semibold">Depth</th>
                                <th className="text-left pr-1 pb-1 font-semibold">RSI</th>
                                <th className="text-center px-1 pb-1 font-semibold" title="Bullish Prep — seller exhaustion" style={{color:"#22c55e88"}}>BP</th>
                                <th className="text-center px-1 pb-1 font-semibold" title="Bullish Leadup — seller exhaustion countdown" style={{color:"#22c55e88"}}>BL</th>
                                <th className="text-center px-1 pb-1 font-semibold" title="Bearish Prep — buyer exhaustion" style={{color:"#ef444488"}}>XP</th>
                                <th className="text-center px-1 pb-1 font-semibold" title="Bearish Leadup — buyer exhaustion countdown" style={{color:"#ef444488"}}>XL</th>
                                <th className="text-center pb-1 font-semibold" title="RSI Divergence">RD</th>
                                <th className="text-center pb-1 font-semibold" title="Phase Divergence">PD</th>
                              </tr>
                            </thead>
                            <tbody>
                              {allTFs.map(tf => {
                                const tfPresent = Object.prototype.hasOwnProperty.call(snapMap, tf);
                                const sig = tfPresent ? (snapMap[tf] || {}) : {};
                                const tdKey = tdTfMap[tf];
                                const tc = hasTD ? (lineageData.td_counts[tdKey] || lineageData.td_counts[tf]) : null;
                                const dv = hasRsiDiv ? (lineageData.rsi_divergence[tf] || lineageData.rsi_divergence[tdKey]) : null;
                                const pdv = hasPhaseDiv ? (lineageData.phase_divergence[tf] || lineageData.phase_divergence[tdKey]) : null;
                                const emaCross = sig.ema_cross;
                                const st = sig.supertrend;
                                const stSlope = sig.st_slope;
                                const emaD = sig.ema_depth != null ? Number(sig.ema_depth) : null;
                                const rsi = sig.rsi;
                                const stColor = st === 1 ? "#22c55e" : st === -1 ? "#ef4444" : "#9ca3af";
                                const stIcon = st === 1 ? "▲" : st === -1 ? "▼" : "";
                                const stLabel = st === 1 ? "Bull" : st === -1 ? "Bear" : "";
                                const slopeTag = stSlope != null ? " ↗" : (st != null ? " —" : "");
                                const depthColor = emaD != null ? (emaD >= 12 ? "#22c55e" : emaD >= 8 ? "#14b8a6" : emaD >= 5 ? "#f59e0b" : "#ef4444") : null;
                                const hasAny = emaCross != null || st != null || emaD != null || rsi != null || tc || dv || pdv;
                                const emptyGlyph = tfPresent ? "·" : "—";
                                const hB = dv?.bear?.active !== false && dv?.bear;
                                const hU = dv?.bull?.active !== false && dv?.bull;
                                const pB = pdv?.bear?.active !== false && pdv?.bear;
                                const pU = pdv?.bull?.active !== false && pdv?.bull;
                                const isHTF = tf === "W" || tf === "D";
                                return (
                                  <tr key={tf} className={`border-t border-white/[0.05] ${isHTF ? "bg-white/[0.015]" : ""} ${!tfPresent ? "opacity-45" : !hasAny ? "opacity-60" : ""}`}>
                                    <td className="pr-2 py-1 text-[#9ca3af] font-semibold">{tf}{!tfPresent ? <span className="ml-1 text-[8px] text-[#4b5563] uppercase">missing</span> : null}</td>
                                    <td className="pr-2 py-1">{emaCross != null ? <span className={emaCross === 1 ? "text-[#22c55e] font-semibold" : "text-[#ef4444] font-semibold"}>{emaCross === 1 ? "▲ Bull" : "▼ Bear"}</span> : <span className="text-[#4b5563]">{emptyGlyph}</span>}</td>
                                    <td className="pr-2 py-1">{stLabel ? <span style={{color: stColor}} className="font-semibold">{stIcon} {stLabel}<span className="opacity-50 ml-0.5">{slopeTag}</span></span> : <span className="text-[#4b5563]">{emptyGlyph}</span>}</td>
                                    <td className="pr-2 py-1">{emaD != null ? <span className="font-semibold" style={{color: depthColor}}>{emaD}/15</span> : <span className="text-[#4b5563]">{emptyGlyph}</span>}</td>

                            SMART_RUNNER_SQUEEZE_RELEASE_AGAINST: "Volatility squeeze fired against our direction — exiting before the move accelerates.",
                          };
                          const raw = exitReason.trim();
                          const mapped = reasonMap[raw];
                          if (mapped) return <div className="text-[10px] text-[#d1d5db] leading-relaxed">{mapped}</div>;
                          const parts = raw.split(",").map(r => r.trim());
                          return (
                            <div className="flex flex-col gap-1">
                              {parts.map((r, i) => {
                                const hr = reasonMap[r] || r.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
