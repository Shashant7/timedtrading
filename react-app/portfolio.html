    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.025);
        --tt-bg-elev: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.06);
        --tt-border-hi: rgba(255,255,255,0.12);
        --tt-text: #e5e7eb;
        --tt-text-muted: #9ca3af;
        --tt-text-dim: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: #38F2A1;
        --tt-accent-dim: rgba(56,242,161,0.14);
        --tt-violet: #a78bfa;
        --tt-violet-dim: rgba(167,139,250,0.14);
        --tt-cyan: #22d3ee;
        --tt-cyan-dim: rgba(34,211,238,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-mono: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: 12px; }
      .tt-card-pad { padding: 16px 18px; }
      .tt-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-sec-h { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; color: var(--tt-text); margin-bottom: 10px; }

      /* Top nav */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
        transition: background 120ms ease, color 120ms ease;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
      }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Hero */
      .port-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 18px 22px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .port-hero h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
      .port-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .port-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; max-width: 720px; }
      @media (max-width: 720px) {
        .port-hero { grid-template-columns: 1fr; }
        .port-hero h1 { font-size: 18px; }
      }

      /* Equity curve cards */
      .eq-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 1100px) { .eq-grid { grid-template-columns: 1fr; } }
      .eq-card {
        padding: 16px 18px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 14px;
      }
      .eq-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
      .eq-title { font-size: 14px; font-weight: 800; color: var(--tt-text); }
      .eq-sub { font-size: 11px; color: var(--tt-text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
      .eq-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin: 14px 0;
      }
      @media (max-width: 640px) { .eq-stats { grid-template-columns: 1fr 1fr; } }
      .eq-stat {
        padding: 10px 12px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
      }
      .eq-stat-label { font-size: 10px; color: var(--tt-text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
      .eq-stat-value { font-size: 18px; font-weight: 700; font-family: var(--tt-font-mono); }
      .eq-stat-value.up { color: var(--tt-up-soft); }
      .eq-stat-value.dn { color: var(--tt-dn-soft); }
      .eq-chart {
        position: relative;
        height: 240px;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        overflow: hidden;
      }
      .eq-chart svg { display: block; width: 100%; height: 100%; }
      .eq-tooltip {
        position: absolute;
        pointer-events: none;
        padding: 6px 8px;
        background: rgba(10,12,16,0.96);
        border: 1px solid var(--tt-border-hi);
        border-radius: 6px;
        font-size: 10.5px;
        line-height: 1.4;
        font-family: var(--tt-font-mono);
        color: var(--tt-text);
        white-space: nowrap;
        z-index: 5;
      }

      /* Monthly P&L bars */
      .pl-row {
        display: grid;
        grid-template-columns: 80px 1fr 90px;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--tt-border);
      }
      .pl-row:last-child { border-bottom: 0; }
      .pl-month { font-size: 12px; font-weight: 600; color: var(--tt-text); font-family: var(--tt-font-mono); }
      .pl-bar-track {
        position: relative;
        height: 10px;
        background: var(--tt-bg-elev);
        border-radius: 6px;
        overflow: hidden;
      }
      .pl-bar {
        position: absolute;
        top: 0; bottom: 0;
        border-radius: 6px;
      }
      .pl-bar.up { background: var(--tt-up); }
      .pl-bar.dn { background: var(--tt-dn); }
      .pl-amt { text-align: right; font-size: 13px; font-weight: 700; font-family: var(--tt-font-mono); }
      .pl-amt.up { color: var(--tt-up-soft); }
      .pl-amt.dn { color: var(--tt-dn-soft); }

      /* Tables */
      .tbl { width: 100%; border-collapse: collapse; }
      .tbl th, .tbl td {
        padding: 10px 12px;
        text-align: left;
        font-size: 12.5px;
        border-bottom: 1px solid var(--tt-border);
      }
      .tbl th {
        font-size: 10.5px;
        color: var(--tt-text-dim);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        background: var(--tt-bg-elev);
      }
      .tbl td { font-family: var(--tt-font-mono); color: var(--tt-text); }
      .tbl td.sym { font-weight: 700; font-family: var(--tt-font); }
      .tbl td.up { color: var(--tt-up-soft); }
      .tbl td.dn { color: var(--tt-dn-soft); }
      .tbl tr:hover td { background: rgba(255,255,255,0.018); }
      .tbl .empty {
        text-align: center;
        color: var(--tt-text-faint);
        font-style: italic;
        font-family: var(--tt-font);
        padding: 28px 12px;
      }
      .tbl-scroll {
        max-height: 480px;
        overflow-y: auto;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
      }
      .tbl-scroll::-webkit-scrollbar { width: 6px; }
      .tbl-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }

      /* Mode badge in the Open Positions table */
      .mode-pill {
        display: inline-flex;
        align-items: center;
        font-family: var(--tt-font);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .mode-pill.mode-trader {
        background: rgba(52,211,153,0.10);
        color: var(--tt-up-soft);
        border: 1px solid rgba(52,211,153,0.25);
      }
      .mode-pill.mode-investor {
        background: rgba(167,139,250,0.10);
        color: var(--tt-violet);
        border: 1px solid rgba(167,139,250,0.25);
      }

      /* Aggregate Open P&L header row (Trader / Investor / Total) */
      .open-pl-row {
        display: inline-flex;
        gap: 18px;
        flex-wrap: wrap;
        font-size: 11.5px;
        color: var(--tt-text-muted);
        font-family: var(--tt-font-mono);
      }
      .open-pl-row strong { font-weight: 700; margin-left: 4px; }
      .open-pl-row strong.up { color: var(--tt-up-soft); }
      .open-pl-row strong.dn { color: var(--tt-dn-soft); }

      /* Split Open Positions header — section title + per-mode total */
      .op-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .op-total {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        font-family: var(--tt-font-mono);
      }
      .op-total-l {
        font-size: 10.5px;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        letter-spacing: 0.10em;
        margin-bottom: 2px;
      }
      .op-total strong.up { color: var(--tt-up-soft); }
      .op-total strong.dn { color: var(--tt-dn-soft); }

      /* Subtle accent on the left edge of each section's table */
      .tbl-scroll[data-accent="trader"] { border-left: 2px solid rgba(52,211,153,0.45); }
      .tbl-scroll[data-accent="investor"] { border-left: 2px solid rgba(167,139,250,0.45); }

      /* V15 P0.7.182 — Side-by-side Open Positions grid */
      .op-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 28px;
      }
      @media (max-width: 1100px) {
        .op-grid { grid-template-columns: 1fr; gap: 24px; }
      }
      .op-pane { min-width: 0; }
      .op-pane .tbl-scroll { max-height: 460px; }

      /* Condensed table — tighter columns + smaller padding so two
         tables fit in the side-by-side grid without horizontal scroll. */
      .tbl--condensed th, .tbl--condensed td {
        padding: 8px 10px;
        font-size: 12px;
      }
      .tbl--condensed th { font-size: 10px; }
      .tbl--condensed .num { text-align: right; font-variant-numeric: tabular-nums; }
      .tbl--condensed td.sym { font-weight: 700; font-family: var(--tt-font); }

      .mode-toggle {
        display: inline-flex;
        gap: 4px;
        padding: 3px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 999px;
      }
      .mode-toggle button {
        font-family: var(--tt-font);
        font-size: 11.5px;
        font-weight: 600;
        padding: 5px 12px;
        background: transparent;
        color: var(--tt-text-muted);
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease;
      }
      .mode-toggle button.active {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        box-shadow: 0 0 0 1px var(--tt-border-hi);
      }

      /* Loading bar + skeletons */
      .tt-loadbar {
        position: fixed; top: 0; left: 0; right: 0;
        height: 2px;
        background: rgba(56,242,161,0.12);
        z-index: 9000;
        overflow: hidden;
      }
      .tt-loadbar::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--tt-accent), transparent);
        animation: tt-loadbar 1.4s ease-in-out infinite;
      }
      @keyframes tt-loadbar { 0% { left: -30%; } 100% { left: 100%; } }
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;
        border-radius: 6px;
      }
      @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback } = React;
      const h = React.createElement;
      const API_BASE = "";

      // ── Format helpers ──────────────────────────────────────────
      const fmtUsd  = (n) => Number.isFinite(n)
        ? `$${Math.round(n).toLocaleString("en-US")}`
        : "—";
      const fmtUsdDec = (n) => Number.isFinite(n)
        ? `$${n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",")}`
        : "—";
      const fmtPct  = (n, decimals = 2) => Number.isFinite(n)
        ? `${n >= 0 ? "+" : ""}${n.toFixed(decimals)}%`
        : "—";
      const fmtDate = (d) => {
        if (!d) return "—";
        if (typeof d === "number") d = new Date(d).toISOString().slice(0, 10);
        return String(d).slice(0, 10);
      };
      const fmtMonth = (yyyymm) => {
        const [y, m] = String(yyyymm).split("-");
        const names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return `${names[Number(m) - 1] || "?"} ${y}`;
      };

      // ── Fetch helpers ──────────────────────────────────────────
      async function fetchEquityCurve() {
        const ts = Date.now();
        try {
          const r = await fetch(`${API_BASE}/timed/portfolio/equity-curve?mode=both&_t=${ts}`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      async function fetchPositions() {
        try {
          const r = await fetch(`${API_BASE}/timed/trades?source=positions`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      // Investor-mode positions live in their own table (investor_lots
      // / investor_positions). /timed/investor/positions enriches them
      // with marketValue / unrealizedPnl / currentPrice already.
      async function fetchInvestorPositions() {
        try {
          const r = await fetch(`${API_BASE}/timed/investor/positions`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      // /timed/all snapshot — used to overlay current price into trader
      // positions so we can compute Open P&L without a per-row fetch.
      async function fetchPriceMap() {
        try {
          const r = await fetch(`${API_BASE}/timed/all?slim=1`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          const j = await r.json();
          return j?.data || null;
        } catch (_) { return null; }
      }
      // Trade history is split by mode in the ledger. /timed/ledger/trades
      // defaults to trader; ?mode=investor returns the investor mode's
      // history. Phase 6 fetches both so the calendar + monthly perf
      // tables can render per mode.
      async function fetchHistoryByMode(mode) {
        const pageSize = 1000;
        const maxPages = 20;
        const maxRows = 10000;
        const baseQs = new URLSearchParams();
        baseQs.set("limit", String(pageSize));
        if (mode === "investor") baseQs.set("mode", "investor");

        const fetchPage = async (cursor) => {
          const qs = new URLSearchParams(baseQs);
          if (cursor) qs.set("cursor", String(cursor));
          const r = await fetch(`${API_BASE}/timed/ledger/trades?${qs}`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return r.json();
        };

        try {
          let collected = [];
          let cursor = null;
          for (let i = 0; i < maxPages; i++) {
            const json = await fetchPage(cursor);
            if (!json?.ok) return json?.ok === false ? json : null;
            const page = Array.isArray(json.trades) ? json.trades : [];
            collected = collected.concat(page);
            if (!json.hasMore || !json.nextCursor) {
              return { ok: true, trades: collected, count: collected.length };
            }
            if (collected.length >= maxRows) break;
            cursor = json.nextCursor;
          }
          return { ok: true, trades: collected, count: collected.length };
        } catch (_) { return null; }
      }

      // ── EquityChart — SVG line chart with hover crosshair.
      // Points: [{date, equity, dayPnl, drawdownPct, ...}].
      function EquityChart({ points, color = "#34d399" }) {
        const [hover, setHover] = useState(null);
        const stageRef = React.useRef(null);

        const dims = { w: 600, h: 220, padL: 50, padR: 12, padT: 12, padB: 28 };
        const plotW = dims.w - dims.padL - dims.padR;
        const plotH = dims.h - dims.padT - dims.padB;

        const { minEq, maxEq, line, area, xs, ys, lastIdx } = useMemo(() => {
          if (!points || points.length === 0) return { minEq: 0, maxEq: 0, line: "", area: "", xs: [], ys: [], lastIdx: -1 };
          const eqs = points.map((p) => Number(p.equity) || 0);
          let lo = Math.min(...eqs);
          let hi = Math.max(...eqs);
          if (lo === hi) { lo -= 1; hi += 1; }
          const pad = (hi - lo) * 0.06;
          lo -= pad; hi += pad;
          const x = (i) => dims.padL + (i / Math.max(1, points.length - 1)) * plotW;
          const y = (v) => dims.padT + ((hi - v) / (hi - lo)) * plotH;
          const xs = points.map((_, i) => x(i));
          const ys = points.map((p) => y(Number(p.equity) || 0));
          const line = points.map((_, i) => `${i === 0 ? "M" : "L"} ${xs[i].toFixed(2)} ${ys[i].toFixed(2)}`).join(" ");
          const area = `${line} L ${xs[xs.length - 1].toFixed(2)} ${(dims.padT + plotH).toFixed(2)} L ${xs[0].toFixed(2)} ${(dims.padT + plotH).toFixed(2)} Z`;
          return { minEq: lo, maxEq: hi, line, area, xs, ys, lastIdx: points.length - 1 };
        }, [points]);

        const onMove = (e) => {
          const svg = stageRef.current;
          if (!svg || !xs.length) return;
          const rect = svg.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * dims.w;
          // Find nearest point
          let idx = 0, best = Infinity;
          for (let i = 0; i < xs.length; i++) {
            const d = Math.abs(xs[i] - x);
            if (d < best) { best = d; idx = i; }
          }
          setHover({ idx, x: xs[idx], y: ys[idx] });
        };

        if (!points || points.length < 2) {
          return h("div", { className: "eq-chart", style: { display: "flex", alignItems: "center", justifyContent: "center", color: "var(--tt-text-faint)", fontSize: 12 } },
            "Not enough data points yet.",
          );
        }

        const tooltipPx = hover ? (hover.x / dims.w) * 100 : 0;
        const hoverPoint = hover ? points[hover.idx] : null;

        return h("div", { className: "eq-chart" },
          h("svg", {
            ref: stageRef,
            viewBox: `0 0 ${dims.w} ${dims.h}`,
            preserveAspectRatio: "none",
            onMouseMove: onMove,
            onMouseLeave: () => setHover(null),
          },
            h("defs", null,
              h("linearGradient", { id: "eq-fill", x1: "0", y1: "0", x2: "0", y2: "1" },
                h("stop", { offset: "0%",   stopColor: color, stopOpacity: "0.25" }),
                h("stop", { offset: "100%", stopColor: color, stopOpacity: "0" }),
              ),
            ),
            // Y-axis gridlines (4 ticks)
            [0, 0.25, 0.5, 0.75, 1].map((f, i) => {
              const v = minEq + (1 - f) * (maxEq - minEq);
              const y = dims.padT + f * plotH;
              return h(React.Fragment, { key: i },
                h("line", {
                  x1: dims.padL, x2: dims.padL + plotW,
                  y1: y, y2: y,
                  stroke: "rgba(255,255,255,0.04)", strokeWidth: 1,
                }),
                h("text", {
                  x: dims.padL - 6, y: y + 3,
                  textAnchor: "end",
                  fontSize: 10, fontFamily: "var(--tt-font-mono)",
                  fill: "#6b7280",
                }, fmtUsd(v)),
              );
            }),
            // Area + line
            h("path", { d: area, fill: "url(#eq-fill)" }),
            h("path", { d: line, fill: "none", stroke: color, strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round" }),
            // Hover crosshair + dot
            hover && h("line", {
              x1: hover.x, x2: hover.x,
              y1: dims.padT, y2: dims.padT + plotH,
              stroke: "rgba(255,255,255,0.15)", strokeWidth: 1, strokeDasharray: "3 3",
            }),
            hover && h("circle", {
              cx: hover.x, cy: hover.y, r: 3.5,
              fill: color, stroke: "var(--tt-bg-base)", strokeWidth: 1.5,
            }),
          ),
          hover && hoverPoint && h("div", {
            className: "eq-tooltip",
            style: { left: `${tooltipPx}%`, top: 6, transform: tooltipPx > 60 ? "translateX(-100%)" : "translateX(8px)" },
          },
            h("div", { style: { fontWeight: 700, marginBottom: 2 } }, fmtDate(hoverPoint.date)),
            h("div", null, "Equity: ", h("strong", null, fmtUsd(hoverPoint.equity))),
            Number.isFinite(Number(hoverPoint.dayPnl)) && h("div", {
              style: { color: hoverPoint.dayPnl >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)" },
            }, "Day PnL: ", `${hoverPoint.dayPnl >= 0 ? "+" : "-"}${fmtUsd(Math.abs(hoverPoint.dayPnl))}`),
            Number.isFinite(Number(hoverPoint.drawdownPct)) && h("div", {
              style: { color: "var(--tt-text-muted)" },
            }, "DD: ", fmtPct(hoverPoint.drawdownPct)),
          ),
        );
      }

      // ── EquityCurveCard — header + 4 stats + chart.
      // Compact format used by the headline KPI strip
      // ($139,514.11 → $139.6K, $4,567.99 → $4.6K).
      const fmtUsdK = (n) => {
        if (!Number.isFinite(n)) return "—";
        const sign = n < 0 ? "-" : "";
        const abs = Math.abs(n);
        if (abs >= 1000) return `${sign}$${(abs / 1000).toFixed(abs >= 10000 ? 1 : 2)}K`;
        return `${sign}$${abs.toFixed(0)}`;
      };
      const fmtUsdSigned = (n) => {
        if (!Number.isFinite(n)) return "—";
        const sign = n >= 0 ? "+" : "-";
        return `${sign}${fmtUsdK(Math.abs(n))}`;
      };

      function EquityCurveCard({ title, sub, color, payload, history, openPnlOverride }) {
        const points = payload?.points || [];
        const sm = payload?.summary || {};
        const totalRet = Number(sm.totalReturnPct);
        const maxDd   = Number(sm.maxDrawdownPct);
        const sharpe  = Number(sm.sharpe);
        const account = Number(sm.endEquity);
        const startCash = Number(sm.startCash) || 100000;
        const realized = Number(sm.cumRealized);
        // V15 P0.7.182 (2026-05-17) — Open P&L source of truth.
        //
        // Previously this card computed openPnl = endEquity - startCash
        // - cumRealized, which is the equity-curve summary's view. The
        // Open Positions table below computes Open P&L from /timed/all
        // CURRENT price × entry × shares, which is live mark-to-market.
        // Those two values almost never matched because the equity
        // curve snapshot is taken once daily and the table uses
        // intraday prices. User feedback: "Numbers on the Headline
        // Metrics, Open PnL do not Match the Numbers on Open
        // Positions for both Active Trader and Investor."
        //
        // Fix: PortfolioApp computes the row totals first (same source
        // as the table) and passes them down as openPnlOverride. The
        // headline number now always matches the table sum.
        const openPnlFromCurve = (Number.isFinite(account) && Number.isFinite(realized) && Number.isFinite(startCash))
          ? (account - startCash) - realized
          : null;
        const openPnl = Number.isFinite(openPnlOverride) ? openPnlOverride : openPnlFromCurve;
        // Total P&L = realized + open (when openPnlOverride is provided
        // we honor it; otherwise fall back to the summary's view).
        const totalPnl = (Number.isFinite(realized) && Number.isFinite(openPnl))
          ? realized + openPnl
          : (Number.isFinite(account) ? account - startCash : null);

        // Headline metrics — match the legacy /simulation-dashboard layout
        // (Account / Total P&L / Open P&L / Closed / Realized). Derived
        // from the equity-curve summary + the loaded trade history.
        const winLoss = (() => {
          const fromApi = sm?.closedStats;
          if (fromApi && Number.isFinite(Number(fromApi.closed))) {
            return {
              wins: Number(fromApi.wins) || 0,
              losses: Number(fromApi.losses) || 0,
              closed: Number(fromApi.closed) || 0,
            };
          }
          if (!Array.isArray(history)) return { wins: 0, losses: 0, closed: 0 };
          let rows = history;
          const factory = (typeof window !== "undefined") && window.TradesPerformanceFactory;
          if (factory && title === "Investor") {
            try {
              const Comp = factory({ React, API_BASE });
              if (Comp?.normalizeInvestorTrades) rows = Comp.normalizeInvestorTrades(history);
            } catch (_) { /* fall through */ }
          }
          let wins = 0, losses = 0, closed = 0;
          for (const t of rows) {
            const s = String(t?.status || "").toUpperCase();
            if (s !== "WIN" && s !== "LOSS" && s !== "FLAT") continue;
            closed++;
            if (s === "WIN") wins++;
            else if (s === "LOSS") losses++;
          }
          return { wins, losses, closed };
        })();
        const closedCount = winLoss.closed;

        return h("section", { className: "eq-card" },
          h("div", { className: "eq-header" },
            h("div", null,
              h("div", { className: "eq-sub" }, sub),
              h("div", { className: "eq-title" }, title),
            ),
            h("div", { style: { fontFamily: "var(--tt-font-mono)", color: "var(--tt-text-muted)", fontSize: 11 } },
              points.length > 0 ? `${fmtDate(points[0].date)} → ${fmtDate(points[points.length - 1].date)}` : "—",
            ),
          ),
          // ── Headline KPI strip (5 cards) — matches /simulation-dashboard
          //    PortfolioColumn exactly: Account · Total P&L · Open P&L ·
          //    Closed · Realized.
          h("div", {
            style: {
              display: "grid",
              gridTemplateColumns: "repeat(5, 1fr)",
              gap: 8,
              margin: "10px 0 14px",
            },
          },
            h("div", { className: "eq-stat", style: { padding: "8px 10px" } },
              h("div", { className: "eq-stat-label" }, "Account"),
              h("div", { className: "eq-stat-value", style: { fontSize: 16 } }, fmtUsdK(account)),
            ),
            h("div", { className: "eq-stat", style: { padding: "8px 10px" } },
              h("div", { className: "eq-stat-label" }, "Total P&L"),
              h("div", { className: `eq-stat-value ${totalPnl >= 0 ? "up" : "dn"}`, style: { fontSize: 16 } },
                fmtUsdSigned(totalPnl),
              ),
            ),
            h("div", { className: "eq-stat", style: { padding: "8px 10px" } },
              h("div", { className: "eq-stat-label" }, "Open P&L"),
              h("div", { className: `eq-stat-value ${openPnl == null ? "" : openPnl >= 0 ? "up" : "dn"}`, style: { fontSize: 16 } },
                openPnl == null ? "—" : fmtUsdSigned(openPnl),
              ),
            ),
            h("div", { className: "eq-stat", style: { padding: "8px 10px" } },
              h("div", { className: "eq-stat-label" }, "Closed"),
              h("div", { className: "eq-stat-value", style: { fontSize: 16 } },
                String(closedCount),
                h("span", { style: { color: "var(--tt-text-faint)", fontSize: 11, marginLeft: 6 } },
                  `${winLoss.wins}W / ${winLoss.losses}L`,
                ),
              ),
            ),
            h("div", { className: "eq-stat", style: { padding: "8px 10px" } },
              h("div", { className: "eq-stat-label" }, "Realized"),
              h("div", { className: `eq-stat-value ${realized >= 0 ? "up" : "dn"}`, style: { fontSize: 16 } },
                fmtUsdSigned(realized),
              ),
            ),
          ),
          // Existing performance summary row (Total Return %, Max DD %, Sharpe, Days).
          h("div", { className: "eq-stats" },
            h("div", { className: "eq-stat" },
              h("div", { className: "eq-stat-label" }, "Total Return"),
              h("div", { className: `eq-stat-value ${totalRet >= 0 ? "up" : "dn"}` }, fmtPct(totalRet)),
            ),
            h("div", { className: "eq-stat" },
              h("div", { className: "eq-stat-label" }, "Max Drawdown"),
              h("div", { className: "eq-stat-value dn" }, fmtPct(maxDd)),
            ),
            h("div", { className: "eq-stat" },
              h("div", { className: "eq-stat-label" }, "Sharpe"),
              h("div", { className: "eq-stat-value" }, Number.isFinite(sharpe) ? sharpe.toFixed(2) : "—"),
            ),
            h("div", { className: "eq-stat" },
              h("div", { className: "eq-stat-label" }, "Days"),
              h("div", { className: "eq-stat-value" }, Number(sm.totalDays) || points.length || "—"),
            ),
          ),
          h(EquityChart, { points, color }),
        );
      }

      // ── PerformanceSection — wraps the production TradesPerformance
      //    component from /trades-performance.js (the same factory the
      //    legacy /simulation-dashboard.html uses). Renders the full
      //    P&L Calendar + Monthly Performance table + Setup Breakdown
      //    panel for the selected mode. Toggle between Active Trader
      //    and Investor.
      function PerformanceSection({ traderTrades, investorTrades, mode, traderOpenPl, investorOpenPl }) {
        const TradesPerformance = useMemo(() => {
          const factory = (typeof window !== "undefined") && window.TradesPerformanceFactory;
          if (!factory) return null;
          try { return factory({ React, API_BASE }); }
          catch (e) { console.warn("[Portfolio] TradesPerformanceFactory failed:", e); return null; }
        }, []);

        if (!TradesPerformance) {
          return h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-text-dim)" } },
            "Performance overview is loading…",
          );
        }

        const trades = mode === "trader" ? (traderTrades || []) : (investorTrades || []);
        const startCash = 100000;
        const openPl = mode === "trader" ? traderOpenPl : investorOpenPl;
        const loading = mode === "trader" ? traderTrades == null : investorTrades == null;

        const summary = useMemo(() => {
          if (!TradesPerformance.computeSummary) return null;
          return TradesPerformance.computeSummary(trades || [], { mode, accountStartCash: startCash });
        }, [trades, mode, startCash, TradesPerformance]);

        const realizedUsd = summary?.totalPnlUsd;
        const totalUsd = Number.isFinite(realizedUsd) && Number.isFinite(openPl)
          ? realizedUsd + openPl
          : realizedUsd;
        const totalPct = Number.isFinite(totalUsd) && startCash > 0
          ? (totalUsd / startCash) * 100
          : summary?.totalPnlPct;

        const kpiStrip = summary && h("div", {
          className: "ds-card",
          style: {
            display: "grid",
            gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))",
            gap: 8,
            marginBottom: 14,
            padding: "10px 12px",
          },
        },
          h("div", { className: "eq-stat", style: { padding: "4px 6px" } },
            h("div", { className: "eq-stat-label" }, "Closed"),
            h("div", { className: "eq-stat-value", style: { fontSize: 15 } },
              String(summary.closedCount),
              h("span", { style: { color: "var(--tt-text-faint)", fontSize: 11, marginLeft: 6 } },
                `${summary.wins}W / ${summary.losses}L`,
              ),
            ),
          ),
          h("div", { className: "eq-stat", style: { padding: "4px 6px" } },
            h("div", { className: "eq-stat-label" }, "Win Rate"),
            h("div", { className: "eq-stat-value", style: { fontSize: 15 } }, `${summary.winRatePct.toFixed(1)}%`),
          ),
          h("div", { className: "eq-stat", style: { padding: "4px 6px" } },
            h("div", { className: "eq-stat-label" }, "Realized P&L"),
            h("div", { className: `eq-stat-value ${realizedUsd >= 0 ? "up" : "dn"}`, style: { fontSize: 15 } },
              fmtUsdSigned(realizedUsd),
            ),
          ),
          h("div", { className: "eq-stat", style: { padding: "4px 6px" } },
            h("div", { className: "eq-stat-label" }, "Open P&L"),
            h("div", { className: `eq-stat-value ${openPl == null ? "" : openPl >= 0 ? "up" : "dn"}`, style: { fontSize: 15 } },
              openPl == null ? "—" : fmtUsdSigned(openPl),
            ),
          ),
          h("div", { className: "eq-stat", style: { padding: "4px 6px" } },
            h("div", { className: "eq-stat-label" }, "Total P&L"),
            h("div", { className: `eq-stat-value ${totalUsd >= 0 ? "up" : "dn"}`, style: { fontSize: 15 } },
              Number.isFinite(totalUsd) ? fmtUsdSigned(totalUsd) : "—",
              Number.isFinite(totalPct) && h("span", {
                style: { color: "var(--tt-text-faint)", fontSize: 11, marginLeft: 6 },
              }, fmtPct(totalPct, 1)),
            ),
          ),
        );

        return h(React.Fragment, null,
          kpiStrip,
          h(TradesPerformance, {
            trades,
            loading,
            accountStartCash: startCash,
            mode,
            hideHeadline: true,
          }),
        );
      }

      // Single-mode open-positions table. The wrapping PortfolioApp
      // renders one of these directly under each equity-curve card
      // (Active Trader card → trader table, Investor card → investor
      // table) per user feedback "Portfolio Open Positions should
      // separate each Active Trader and Investor into two sections,
      // underneath the Equity Curves".
      // V15 P0.7.182 — Condensed table, side-by-side layout.
      // Columns kept: Ticker / Bias / Entry / Open P&L % / Open P&L $
      // / Entry Date. Current price + Status dropped — Current is
      // implicit in the live Open P&L; Status was redundant with the
      // section header ("ACTIVE TRADER · OPEN POSITIONS").
      function OpenPositionsTable({ rows, mode, accent }) {
        if (!Array.isArray(rows)) return null;
        const fmtPnl = (n) => Number.isFinite(n)
          ? `${n >= 0 ? "+" : "-"}${fmtUsdDec(Math.abs(n))}`
          : "—";
        const totalPl = rows.reduce((s, r) => s + (Number.isFinite(r.plDollar) ? r.plDollar : 0), 0);

        return h("div", { className: "op-pane" },
          h("div", { className: "op-head" },
            h("div", { style: { minWidth: 0 } },
              h("div", { className: "tt-sec-title" }, mode === "investor" ? "INVESTOR · OPEN POSITIONS" : "ACTIVE TRADER · OPEN POSITIONS"),
              h("h2", { className: "tt-sec-h2" }, `Currently held — ${mode === "investor" ? "Investor mode" : "Active Trader mode"}`),
              h("p", { className: "tt-sec-sub" }, `${rows.length} position${rows.length === 1 ? "" : "s"}`),
            ),
            rows.length > 0 && h("div", { className: "op-total" },
              h("span", { className: "op-total-l" }, "Open P&L"),
              h("strong", { className: totalPl >= 0 ? "up" : "dn", style: { fontSize: 16 } }, fmtPnl(totalPl)),
            ),
          ),
          h("div", { className: "tbl-scroll", "data-accent": accent || "trader" },
            h("table", { className: "tbl tbl--condensed" },
              h("thead", null,
                h("tr", null,
                  h("th", null, "Ticker"),
                  h("th", null, "Bias"),
                  h("th", { className: "num" }, "Entry"),
                  h("th", { className: "num" }, "Open P&L %"),
                  h("th", { className: "num" }, "Open P&L $"),
                  h("th", null, "Entry Date"),
                ),
              ),
              h("tbody", null,
                rows.length === 0
                  ? h("tr", null, h("td", { className: "empty", colSpan: 6 }, "No open positions."))
                  : rows.map((r) => {
                      const openTicker = () => {
                        if (typeof r._onSelect === "function") r._onSelect(r.sym);
                        else window.location.href = `/index-react.html?ticker=${encodeURIComponent(r.sym)}`;
                      };
                      const plPctCls = r.plPct == null ? "" : (r.plPct >= 0 ? "up" : "dn");
                      const plDollarCls = r.plDollar == null ? "" : (r.plDollar >= 0 ? "up" : "dn");
                      return h("tr", { key: r._key },
                        h("td", { className: "sym", onClick: openTicker, style: { cursor: "pointer" } }, r.sym),
                        h("td", { className: r.dir === "LONG" ? "up" : "dn" }, r.dir),
                        h("td", { className: "num" }, fmtUsdDec(r.ep)),
                        h("td", { className: `num ${plPctCls}` },
                          Number.isFinite(r.plPct) ? `${r.plPct >= 0 ? "+" : ""}${r.plPct.toFixed(2)}%` : "—",
                        ),
                        h("td", { className: `num ${plDollarCls}` }, fmtPnl(r.plDollar)),
                        h("td", null, fmtDate(r.entryTs)),
                      );
                    }),
              ),
            ),
          ),
        );
      }

      // ── OpenPositions split — builds the two row sets (trader +
      //    investor) from the same source data and renders them as
      //    separate sections. Per user feedback: "separate each
      //    Active Trader and Investor into two sections, underneath
      //    the Equity Curves."
      function buildTraderRows(trades, priceMap, onSelect) {
        if (!Array.isArray(trades)) return [];
        const out = [];
        for (const t of trades) {
          const s = String(t?.status || "").toUpperCase();
          const isOpen = s === "OPEN" || s === "TP_HIT_TRIM" || (!s && !(t?.exit_ts ?? t?.exitTs));
          if (!isOpen) continue;
          const sym = String(t?.ticker || "").toUpperCase();
          const dir = String(t?.direction || "").toUpperCase() || "LONG";
          const ep = Number(t?.entry_price ?? t?.entryPrice ?? t?.avgEntry) || null;
          const shares = Number(t?.shares) || null;
          const cur = Number(priceMap?.[sym]?.price ?? priceMap?.[sym]?.close) || null;
          const dirMul = dir === "SHORT" ? -1 : 1;
          const plPct = (cur && ep && ep > 0) ? ((cur - ep) / ep) * 100 * dirMul : null;
          const plDollar = (cur && ep && shares) ? (cur - ep) * shares * dirMul : null;
          out.push({
            _key: `t-${sym}-${t.entry_ts || t.entryTs || ""}`,
            _onSelect: onSelect,
            sym, dir, ep,
            entryTs: Number(t?.entry_ts ?? t?.entryTs ?? 0),
            cur, plPct, plDollar,
            status: s || "OPEN",
          });
        }
        out.sort((a, b) => {
          const aHas = Number.isFinite(a.plDollar);
          const bHas = Number.isFinite(b.plDollar);
          if (aHas && bHas) return Math.abs(b.plDollar) - Math.abs(a.plDollar);
          if (aHas) return -1;
          if (bHas) return 1;
          return b.entryTs - a.entryTs;
        });
        return out;
      }

      function buildInvestorRows(investorPositions, priceMap, onSelect) {
        if (!Array.isArray(investorPositions)) return [];
        const out = [];
        for (const p of investorPositions) {
          if (String(p?.status || "").toUpperCase() !== "OPEN") continue;
          const sym = String(p?.ticker || "").toUpperCase();
          const ep = Number(p?.avg_entry) || null;
          const cur = Number(p?.currentPrice ?? priceMap?.[sym]?.price ?? priceMap?.[sym]?.close) || null;
          const plPct = Number(p?.unrealizedPnlPct);
          const plDollar = Number(p?.unrealizedPnl);
          out.push({
            _key: `i-${sym}-${p.first_entry_ts || ""}`,
            _onSelect: onSelect,
            sym, dir: "LONG", ep,
            entryTs: Number(p?.first_entry_ts ?? 0),
            cur,
            plPct: Number.isFinite(plPct) ? plPct : null,
            plDollar: Number.isFinite(plDollar) ? plDollar : null,
            status: String(p?.investor_stage || p?.status || "OPEN").toUpperCase(),
          });
        }
        out.sort((a, b) => {
          const aHas = Number.isFinite(a.plDollar);
          const bHas = Number.isFinite(b.plDollar);
          if (aHas && bHas) return Math.abs(b.plDollar) - Math.abs(a.plDollar);
          if (aHas) return -1;
          if (bHas) return 1;
          return b.entryTs - a.entryTs;
        });
        return out;
      }

      // ── TradeHistory — closed trades (most recent first).
      function TradeHistory({ trades, onSelectTicker }) {
        const rows = useMemo(() => {
          if (!Array.isArray(trades)) return [];
          return trades
            .filter((t) => {
              const s = String(t?.status || "").toUpperCase();
              return s === "WIN" || s === "LOSS" || s === "FLAT" || s === "CLOSED" || !!(t?.exit_ts ?? t?.exitTs);
            })
            .sort((a, b) => Number(b?.exit_ts || b?.exitTs || 0) - Number(a?.exit_ts || a?.exitTs || 0));
        }, [trades]);

        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "TRADE HISTORY"),
          h("div", { className: "tt-sec-h" }, "Recent closed trades"),
          h("div", { className: "tbl-scroll" },
            h("table", { className: "tbl" },
              h("thead", null,
                h("tr", null,
                  h("th", null, "Ticker"),
                  h("th", null, "Dir"),
                  h("th", null, "Entry"),
                  h("th", null, "Exit"),
                  h("th", null, "Open"),
                  h("th", null, "Close"),
                  h("th", null, "Realized $"),
                  h("th", null, "Realized %"),
                  h("th", null, "Result"),
                ),
              ),
              h("tbody", null,
                rows.length === 0
                  ? h("tr", null, h("td", { className: "empty", colSpan: 9 }, "No closed trades yet."))
                  : rows.slice(0, 100).map((t) => {
                      const sym = String(t?.ticker || "").toUpperCase();
                      const dir = String(t?.direction || "").toUpperCase();
                      const isLong = dir === "LONG";
                      const realized = Number(t?.realized_pnl ?? t?.realizedPnl ?? t?.pnl);
                      const realizedPct = Number(t?.realized_pct ?? t?.realizedPct ?? t?.pct_return);
                      const result = String(t?.status || "").toUpperCase() || (realized > 0 ? "WIN" : realized < 0 ? "LOSS" : "FLAT");
                      const openTicker = () => {
                        if (typeof onSelectTicker === "function") onSelectTicker(sym);
                        else window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`;
                      };
                      return h("tr", { key: `${sym}-${t.exit_ts || t.exitTs || sym}-${t.entry_ts || ""}` },
                        h("td", { className: "sym", onClick: openTicker, style: { cursor: "pointer" } }, sym),
                        h("td", { className: isLong ? "up" : "dn" }, dir || "—"),
                        h("td", null, fmtUsdDec(Number(t?.entry_price ?? t?.entryPrice))),
                        h("td", null, fmtUsdDec(Number(t?.exit_price ?? t?.exitPrice))),
                        h("td", null, fmtDate(Number(t?.entry_ts ?? t?.entryTs))),
                        h("td", null, fmtDate(Number(t?.exit_ts ?? t?.exitTs))),
                        h("td", { className: realized >= 0 ? "up" : "dn" },
                          Number.isFinite(realized) ? `${realized >= 0 ? "+" : "-"}${fmtUsdDec(Math.abs(realized))}` : "—",
                        ),
                        h("td", { className: realizedPct >= 0 ? "up" : "dn" }, fmtPct(realizedPct)),
                        h("td", { className: result === "WIN" ? "up" : result === "LOSS" ? "dn" : "" }, result),
                      );
                    }),
              ),
            ),
          ),
        );
      }

      // ── PortfolioApp ────────────────────────────────────────────
      function PortfolioApp() {
        const [eq, setEq] = useState(null);
        const [positions, setPositions] = useState(null);
        const [investorPositions, setInvestorPositions] = useState(null);
        const [priceMap, setPriceMap] = useState(null);
        const [traderHistory, setTraderHistory] = useState(null);
        const [investorHistory, setInvestorHistory] = useState(null);
        const [monthlyMode, setMonthlyMode] = useState("trader");
        const [error, setError] = useState(null);
        const [allData, setAllData] = useState(null);

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const [e, p, invPos, ht, hi, all] = await Promise.all([
                fetchEquityCurve(),
                fetchPositions(),
                fetchInvestorPositions(),
                fetchHistoryByMode("trader"),
                fetchHistoryByMode("investor"),
                // /timed/all gives the rail full universe context for
                // ranking / sector rollups / market state when opened
                // from a Portfolio row.
                fetch(`${API_BASE}/timed/all`, { cache: "no-store", credentials: "include" })
                  .then((r) => r.ok ? r.json() : null).catch(() => null),
              ]);
              if (!alive) return;
              if (e?.ok) setEq(e); else setError("Failed to load equity curve");
              if (p?.ok) setPositions(p.trades || []);
              if (invPos?.ok) setInvestorPositions(invPos.positions || []);
              if (ht?.ok) setTraderHistory(ht.trades || []);
              if (hi?.ok) setInvestorHistory(hi.trades || []);
              if (all?.ok) {
                setAllData(all.data || {});
                // Live price overlay for the OpenPositions P&L column.
                setPriceMap(all.data || {});
              }
            } catch (err) { if (alive) setError(String(err?.message || err)); }
          })();
          return () => { alive = false; };
        }, []);

        // Right rail overlay state — Portfolio table rows pop the same
        // ticker-detail panel /index-react.html uses.
        const [railTicker, setRailTicker] = useState(null);
        const railTickerObj = useMemo(() => {
          if (!railTicker) return null;
          const key = String(railTicker).toUpperCase();
          if (allData && allData[key]) {
            const raw = allData[key];
            return raw.ticker ? raw : { ticker: key, ...raw };
          }
          // Fall back to a minimal stub so the rail still renders the
          // header / live price fetch (its internal hooks ask /timed/all).
          return { ticker: key };
        }, [railTicker, allData]);
        // V15 P0.7.181 — Reactive RailOverlay state so card clicks
        // work the instant the rail scripts load.
        const [RailOverlay, setRailOverlay] = useState(() => window.TimedRightRail?.Overlay || null);
        useEffect(() => {
          if (RailOverlay) return;
          const id = setInterval(() => {
            if (window.TimedRightRail?.Overlay) {
              setRailOverlay(() => window.TimedRightRail.Overlay);
              clearInterval(id);
            }
          }, 80);
          return () => clearInterval(id);
        }, [RailOverlay]);

        const onSelectTicker = useCallback((sym) => {
          if (!sym) return;
          setRailTicker(String(sym).toUpperCase());
        }, []);
        const onCloseRail = useCallback(() => setRailTicker(null), []);

        // 2026-05-21 — Global ticker search integration. See companion
        // block in today.html for the full explanation.
        useEffect(() => {
          if (!RailOverlay) return;
          const handler = (ev) => {
            const t = String(ev?.detail?.ticker || "").toUpperCase();
            if (!t) return;
            setRailTicker(t);
            try { if (typeof window.ttGlobalSearchMarkHandled === "function") window.ttGlobalSearchMarkHandled(t); } catch (_) {}
          };
          window.addEventListener("tt-open-ticker", handler);
          try {
            const u = new URL(window.location.href);
            const t = String(u.searchParams.get("ticker") || "").trim().toUpperCase();
            if (t) {
              setRailTicker(t);
              try { if (typeof window.ttGlobalSearchMarkHandled === "function") window.ttGlobalSearchMarkHandled(t); } catch (_) {}
            }
          } catch (_) {}
          return () => window.removeEventListener("tt-open-ticker", handler);
        }, [RailOverlay]);

        if (error && !eq) {
          return h("main", null,
            h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-dn-soft)" } },
              "Couldn't load Portfolio: " + error,
            ),
          );
        }

        const loading = !eq && !error;

        const traderPayload   = eq?.trader   || null;
        const investorPayload = eq?.investor || null;

        // V15 P0.7.182 — Compute row sets once at the parent so the
        // equity-curve headline Open P&L AND the table totals share a
        // single source of truth (live /timed/all mark-to-market).
        // Previously the headline came from the daily equity-curve
        // snapshot and the table from live prices, so they almost
        // never matched.
        const traderRows = useMemo(
          () => buildTraderRows(positions || [], priceMap, onSelectTicker),
          [positions, priceMap, onSelectTicker],
        );
        const investorRows = useMemo(
          () => buildInvestorRows(investorPositions || [], priceMap, onSelectTicker),
          [investorPositions, priceMap, onSelectTicker],
        );
        const traderOpenPl = useMemo(
          () => traderRows.reduce((s, r) => s + (Number.isFinite(r.plDollar) ? r.plDollar : 0), 0),
          [traderRows],
        );
        const investorOpenPl = useMemo(
          () => investorRows.reduce((s, r) => s + (Number.isFinite(r.plDollar) ? r.plDollar : 0), 0),
          [investorRows],
        );

        return h(React.Fragment, null,
          loading && h("div", { className: "tt-loadbar", role: "progressbar", "aria-label": "Loading Portfolio" }),
          h("main", null,
            h("section", { className: "port-hero" },
              h("div", null,
                h("div", { className: "label" }, "PORTFOLIO"),
                h("h1", null, "How the model is performing"),
                h("div", { className: "sub" },
                  "Both modes track a $100,000 paper-capital starting balance. Equity curves, max drawdown, and Sharpe ratio are computed from the daily portfolio snapshots stored after each scoring run.",
                ),
              ),
            ),
            // Equity curves — side by side
            h("section", { className: "tt-row" },
              h("div", { className: "tt-sec-title" }, "EQUITY CURVES"),
              h("div", { className: "tt-sec-h" }, "Active Trader vs Investor mode"),
              loading
                ? h("div", { className: "eq-grid" },
                    [0, 1].map((i) => h("div", { key: i, className: "sk", style: { height: 360, borderRadius: 14 } })),
                  )
                : h("div", { className: "eq-grid" },
                    h(EquityCurveCard, {
                      title: "Active Trader",
                      sub: "Swing — 1 to 10 day holds",
                      color: "#34d399",
                      payload: traderPayload,
                      history: traderHistory,
                      openPnlOverride: traderOpenPl,
                    }),
                    h(EquityCurveCard, {
                      title: "Investor",
                      sub: "Long-horizon — weeks to months",
                      color: "#a78bfa",
                      payload: investorPayload,
                      history: investorHistory,
                      openPnlOverride: investorOpenPl,
                    }),
                  ),
            ),
            // Open positions — two condensed tables sitting side-by-
            // side underneath the equity curves (one column per
            // mode), so each table aligns under its own curve. On
            // narrow screens they stack vertically. Columns kept:
            // Ticker / Bias / Entry / Open P&L % / Open P&L $ /
            // Entry Date. Strips Current price + Status to keep the
            // tables narrow enough for the side-by-side grid.
            (positions || investorPositions)
              ? h("section", { className: "op-grid" },
                  h(OpenPositionsTable, {
                    rows: traderRows,
                    mode: "trader",
                    accent: "trader",
                  }),
                  h(OpenPositionsTable, {
                    rows: investorRows,
                    mode: "investor",
                    accent: "investor",
                  }),
                )
              : h("section", { className: "tt-row" },
                  h("div", { className: "tt-sec-title" }, "OPEN POSITIONS"),
                  h("div", { className: "tt-sec-h" }, "Currently held by the model"),
                  h("div", { className: "sk", style: { height: 200, borderRadius: 12 } }),
                ),
            // P&L Calendar + Monthly Performance + Setup Breakdown.
            // Uses the production TradesPerformance component from
            // /trades-performance.js — the same one /simulation-dashboard
            // uses — so the calendar / monthly table / setup breakdown
            // render identically to the legacy page.
            !loading && h("section", { className: "tt-row" },
              h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 10 } },
                h("div", null,
                  h("div", { className: "tt-sec-title" }, "PERFORMANCE OVERVIEW"),
                  h("div", { className: "tt-sec-h", style: { margin: 0 } },
                    monthlyMode === "trader" ? "Active Trader" : "Investor",
                    " — calendar, monthly P&L, setup breakdown",
                  ),
                ),
                h("div", { className: "mode-toggle" },
                  h("button", { className: monthlyMode === "trader" ? "active" : "", onClick: () => setMonthlyMode("trader") }, "Active Trader"),
                  h("button", { className: monthlyMode === "investor" ? "active" : "", onClick: () => setMonthlyMode("investor") }, "Investor"),
                ),
              ),
              h(PerformanceSection, {
                traderTrades: traderHistory,
                investorTrades: investorHistory,
                mode: monthlyMode,
                traderOpenPl,
                investorOpenPl,
              }),
            ),
            // Trade history table (recent closed trades — supplements the
            // calendar above with a row-by-row view).
            (traderHistory || investorHistory)
              ? h(TradeHistory, { trades: monthlyMode === "trader" ? (traderHistory || []) : (investorHistory || []), onSelectTicker })
              : h("section", { className: "tt-row" },
                  h("div", { className: "tt-sec-title" }, "TRADE HISTORY"),
                  h("div", { className: "tt-sec-h" }, "Recent closed trades"),
                  h("div", { className: "sk", style: { height: 200, borderRadius: 12 } }),
                ),
          ),
          // Right rail slide-in (TickerDetailRightRail).
          RailOverlay && railTickerObj && h(RailOverlay, {
            ticker: railTickerObj,
            allLoadedData: allData,
            onClose: onCloseRail,
          }),
        );
      }

      // ── Mount with auth gate ───────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const app = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="pro">{(user) => <PortfolioApp user={user} />}</AuthGate>
        : <PortfolioApp />;
      ReactDOM.createRoot(document.getElementById("root")).render(app);
    </script>

    </footer>
  </body>
