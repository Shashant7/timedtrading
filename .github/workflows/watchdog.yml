name: Health watchdog

# External watchdog that lives OUTSIDE the worker (full-system-review
# R5). Until now all monitoring ran inside the worker being monitored ã
# when the worker was fully wedged, nothing paged until the operator
# opened Mission Control.
#
# Every 30 minutes: hit /timed/health, check (a) it answers ok:true,
# (b) the 5-min cron heartbeat is fresh during operating hours, (c) the
# tombstone count is sane. On failure the run goes red (GitHub emails
# the repo owner) and, if DISCORD_SYSTEM_WEBHOOK_URL is configured as a
# repo secret, posts to the system Discord lane.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-watchdog
  cancel-in-progress: true

jobs:
  check:
    name: probe /timed/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe health
        id: probe
        run: |
          FAILED=""
          DETAIL=""

          for BASE in "https://timed-trading-ingest.shashant.workers.dev" "https://timed-trading.com"; do
            HEALTH=$(curl -s -m 20 "$BASE/timed/health" || echo "{}")

            # 2026-06-10 ã Non-JSON guard. The custom domain can serve a
            # Cloudflare bot-challenge HTML page ("Just a moment...") to
            # curl from CI runners. The previous version piped that HTML
            # into jq, which exited 5 (parse error) under bash -e ã the
            # step DIED mid-loop, the Discord page step never ran, and the
            # red run showed a jq stack trace instead of the real signal.
            if ! echo "$HEALTH" | jq -e . >/dev/null 2>&1; then
              if echo "$HEALTH" | grep -qi "challenges.cloudflare.com\|Just a moment"; then
                # Bot challenge ã the zone is challenging non-browser
                # clients, which says nothing about origin health (the
                # workers.dev probe covers that). Warn, don't page.
                # Permanent fix: a WAF skip rule for /timed/health.
                echo "::warning::$BASE served a Cloudflare bot challenge to the watchdog (curl). Add a WAF skip rule for /timed/health to restore custom-domain probing."
                echo "$BASE ã SKIPPED (cf bot challenge)"
              else
                FAILED="yes"; DETAIL="$DETAIL $BASE: non-JSON health response."
                echo "$BASE ã FAILED (non-JSON response: $(echo "$HEALTH" | head -c 120 | tr -d '\n'))"
              fi
              continue
            fi

            OK=$(echo "$HEALTH" | jq -r '.ok // false')
            TICK=$(echo "$HEALTH" | jq -r '.cronTickAgeMin // "null"')
            FAILS=$(echo "$HEALTH" | jq -r '.cronFailures.count // 0')
            OPS=$(echo "$HEALTH" | jq -r '(.cronFailures.ops // []) | join(",")')
            TRACKED=$(echo "$HEALTH" | jq -r '.cronFailures.tracked // "?"')
            SCORING=$(echo "$HEALTH" | jq -r '.minutesSinceScoring // "null"')
            FEEDAGE=$(echo "$HEALTH" | jq -r '.pricesAgeSec // "null"')
            NY_RTH=$(echo "$HEALTH" | jq -r '.nyRthOpen // false')
            OP_HOURS=$(echo "$HEALTH" | jq -r '.operatingHours // false')
            echo "$BASE ã ok=$OK cronTickAgeMin=$TICK scoringAgeMin=$SCORING feedAgeSec=$FEEDAGE nyRthOpen=$NY_RTH operatingHours=$OP_HOURS activeFailures=$FAILS (tracked=$TRACKED) [$OPS]"

            if [ "$OK" != "true" ]; then
              FAILED="yes"; DETAIL="$DETAIL $BASE: health endpoint not ok."
              continue
            fi

            # Heartbeat / feed / scoring freshness only matter when the
            # worker is expected to be doing work. Use the calendar-aware
            # flags from /timed/health (Alpaca holidays + early closes),
            # NOT a crude UTC weekday window ã Juneteenth is a weekday but
            # markets are closed, and scoring intentionally skips outside
            # operating hours (4 AMã8 PM ET, excl holidays).
            if [ "$OP_HOURS" = "true" ]; then
              if [ "$TICK" != "null" ]; then
                TICK_INT=$(printf "%.0f" "$TICK")
                if [ "$TICK_INT" -gt 20 ]; then
                  FAILED="yes"; DETAIL="$DETAIL $BASE: 5-min cron heartbeat is ${TICK_INT}min stale during operating hours."
                fi
              fi
              # Price-feed freshness ã covers the feed whichever worker owns
              # the */1 cron (monolith today, tt-feed after cutover).
              if [ "$FEEDAGE" != "null" ] && [ "$FEEDAGE" -gt 600 ]; then
                FAILED="yes"; DETAIL="$DETAIL $BASE: timed:prices is ${FEEDAGE}s stale during operating hours."
              fi
              # Scoring staleness ã REQUIRED once the */5 trade path moves
              # to the dedicated tt-engine worker (Step 3 role split): the
              # monolith's */1 keeps the generic heartbeat fresh, so a dead
              # engine would otherwise be invisible here. timed:scoring:
              # last_run is written only by whichever worker actually runs
              # the scoring tick (skipped outside operating hours by design).
              if [ "$SCORING" != "null" ]; then
                SCORING_INT=$(printf "%.0f" "$SCORING")
                if [ "$SCORING_INT" -gt 30 ]; then
                  FAILED="yes"; DETAIL="$DETAIL $BASE: scoring loop is ${SCORING_INT}min stale during operating hours (engine worker down?)."
                fi
              fi
            fi

            # Per-symbol price staleness + Data Age Contract quarantine are
            # RTH-only signals ã after the close (and on full-day holidays)
            # last-trade timestamps age normally and must not page.
            if [ "$NY_RTH" = "true" ]; then
              STALESYMS=$(echo "$HEALTH" | jq -r '.staleSymbolCount // "null"')
              if [ "$STALESYMS" != "null" ] && [ "$STALESYMS" -gt 5 ]; then
                STALELIST=$(echo "$HEALTH" | jq -r '(.staleSymbols // []) | join(",")')
                FAILED="yes"; DETAIL="$DETAIL $BASE: ${STALESYMS} symbols stale despite sweep (${STALELIST})."
              fi
              FRESH_STALE=$(echo "$HEALTH" | jq -r '.freshness.stale // "null"')
              if [ "$FRESH_STALE" != "null" ] && [ "$FRESH_STALE" -gt 10 ]; then
                FRESH_LIST=$(echo "$HEALTH" | jq -r '(.freshness.stale_tickers // []) | map(.ticker) | join(",")')
                FAILED="yes"; DETAIL="$DETAIL $BASE: ${FRESH_STALE} tickers quarantined by the Data Age Contract (${FRESH_LIST})."
              fi
            fi

            # FAILS now counts only ACTIVE tombstones (count > 0) ã healed
            # ops keep their KV key for 7 days but no longer inflate this.
            if [ "$FAILS" -gt 5 ]; then
              FAILED="yes"; DETAIL="$DETAIL $BASE: $FAILS cron tombstones active ($OPS)."
            fi
          done

          if [ -n "$FAILED" ]; then
            echo "detail=$DETAIL" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::Watchdog failed:$DETAIL"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Page Discord
        if: steps.probe.outputs.failed == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_SYSTEM_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No DISCORD_SYSTEM_WEBHOOK_URL secret ã relying on red-run email."
          else
            DETAIL="${{ steps.probe.outputs.detail }}"
            curl -s -m 15 -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg d "$DETAIL" '{embeds:[{title:"Þ´ External watchdog: Timed Trading health check failed",description:$d,color:15548997}]}')" || true
          fi

      - name: Fail run on probe failure
        if: steps.probe.outputs.failed == 'true'
        run: exit 1
