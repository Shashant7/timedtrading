<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signing Out — Timed Trading</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, #111820 0%, #0b0e11 60%);
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e5e7eb;
    }
    .card {
      text-align: center;
      max-width: 360px;
      padding: 32px 24px;
      animation: fadeIn 0.4s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 32px; height: 32px;
      border: 2px solid rgba(255,255,255,0.06);
      border-top-color: #00c853;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    h1 { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    p { font-size: 13px; color: #6b7280; line-height: 1.5; }
    .success { display: none; }
    .success .check {
      width: 32px; height: 32px; margin: 0 auto 16px;
      border-radius: 50%;
      background: rgba(0,200,83,0.1);
      display: flex; align-items: center; justify-content: center;
    }
    .success .check svg { width: 18px; height: 18px; color: #00c853; }
    .links { margin-top: 20px; display: flex; flex-direction: column; gap: 8px; }
    .links a {
      display: block; padding: 12px 20px; border-radius: 10px;
      text-decoration: none; font-size: 14px; font-weight: 500;
      transition: all 0.2s;
    }
    .links .primary {
      background: rgba(0,200,83,0.1); color: #00c853;
      border: 1px solid rgba(0,200,83,0.2);
    }
    .links .primary:hover { background: rgba(0,200,83,0.15); }
    .links .secondary {
      background: transparent; color: #9ca3af;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .links .secondary:hover { background: rgba(255,255,255,0.03); color: #e5e7eb; }
  </style>
</head>
<body>
  <!-- Phase 1: Signing out spinner -->
  <div class="card" id="signing-out">
    <div class="spinner"></div>
    <h1>Signing you out...</h1>
    <p>Clearing your session securely.</p>
  </div>

  <!-- Phase 2: Signed out confirmation -->
  <div class="card success" id="signed-out">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h1 id="signed-out-h1">You've been signed out</h1>
    <p id="signed-out-p">Your session has been cleared.</p>
    <!-- 2026-05-28 — "Sign In Again" previously routed to /index-react
         (legacy Analysis page) which then ran the welcome coach-marks
         every time. New product canonical entry is /today.html. -->
    <div class="links">
      <a href="/today.html" id="signin-cta" class="primary">Sign In Again</a>
      <a href="/splash.html" class="secondary">Back to Home</a>
    </div>
    <!-- 2026-05-31 — Switch-account hint. CF Access only clears its OWN
         session cookie; the user's Google session in the browser
         persists, so on the next sign-in Google auto-selects the same
         account with no picker. When ?switch=1 is in the URL we trigger
         a Google logout right after the CF logout so the next sign-in
         shows the account picker. -->
    <p id="switch-hint" style="display:none; margin-top:16px; font-size:11.5px; color:#6b7280; line-height:1.5; padding:0 16px;">
      We've also cleared your Google session for this browser.
      Click <strong>Sign In Again</strong> to choose a different Google account.
    </p>
  </div>

  <!-- Hidden iframe for CF Access logout -->
  <iframe id="cf-logout" src="about:blank" style="display:none"></iframe>
  <!-- Hidden iframe for Google logout (only used when ?switch=1) -->
  <iframe id="google-logout" src="about:blank" style="display:none"></iframe>

  <script>
    (function() {
      var urlParams = new URLSearchParams(window.location.search);
      // 2026-05-31 — ?switch=1 means "I want to sign in as a different
      // account." We additionally ping accounts.google.com/Logout so the
      // user's Google session is also cleared. Without this, our CF
      // logout works but the next sign-in is silently auto-completed
      // with the same Google account (Google's SSO behaviour) and the
      // user loops back to where they started.
      var isSwitchAccount = urlParams.has("switch");

      // 1. Clear app session from localStorage
      try { localStorage.removeItem("timed_auth_session"); } catch(_) {}

      // 2. Attempt client-side cookie deletion
      try {
        var d = window.location.hostname;
        document.cookie = "CF_Authorization=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
        document.cookie = "CF_Authorization=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=" + d;
        document.cookie = "CF_Authorization=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=." + d;
      } catch(_) {}

      // 3. Hit CF Access logout endpoint via hidden iframe
      var cfIframe = document.getElementById("cf-logout");
      var googleIframe = document.getElementById("google-logout");
      var done = false;
      var cfDone = false;
      var googleDone = !isSwitchAccount;  // skip Google if not switching

      function maybeShowSuccess() {
        if (done) return;
        if (!cfDone || !googleDone) return;
        done = true;
        document.getElementById("signing-out").style.display = "none";
        document.getElementById("signed-out").style.display = "block";
        if (isSwitchAccount) {
          document.getElementById("signed-out-h1").textContent = "Pick a different account";
          document.getElementById("signed-out-p").textContent = "Both sessions are cleared. The next sign-in will let you choose any Google account.";
          document.getElementById("signin-cta").textContent = "Choose Account";
          document.getElementById("switch-hint").style.display = "block";
        }
      }

      cfIframe.onload = function() { cfDone = true; setTimeout(maybeShowSuccess, 250); };
      cfIframe.onerror = function() { cfDone = true; setTimeout(maybeShowSuccess, 200); };
      cfIframe.src = window.location.origin + "/cdn-cgi/access/logout";

      if (isSwitchAccount) {
        googleIframe.onload = function() { googleDone = true; setTimeout(maybeShowSuccess, 250); };
        googleIframe.onerror = function() { googleDone = true; setTimeout(maybeShowSuccess, 200); };
        // accounts.google.com/Logout clears the browser's Google session.
        // This is the supported, public Google URL — no OAuth scopes
        // required. After this completes, the next CF Access SSO will
        // surface Google's account picker instead of silently
        // auto-selecting the previous account.
        googleIframe.src = "https://accounts.google.com/Logout";
      }

      // Safety timeout: if either iframe doesn't respond in 4 seconds, proceed anyway
      setTimeout(function() { cfDone = true; googleDone = true; maybeShowSuccess(); }, 4000);

      // Set sessionStorage flag for LoginScreen
      try { sessionStorage.setItem("tt_logout", "1"); } catch(_) {}
    })();
  </script>
</body>
</html>
