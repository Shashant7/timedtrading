  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      const API_BASE = "";

      const CLASSIFICATION_OPTIONS = [
        { value: "", label: "— Classify —" },
        { value: "good_trade", label: "Good Trade", hint: "Entry + exit both solid — reinforces path", color: "#22c55e", icon: "✓" },
        { value: "ok_trade", label: "Ok Trade", hint: "Acceptable, small win/loss — neutral weight", color: "#8b5cf6", icon: "~" },
        { value: "early_entry", label: "Early Entry", hint: "Right thesis, bad timing — tunes confirmation", color: "#06b6d4", icon: "⏱" },
        { value: "bad_exit", label: "Bad Exit", hint: "Good entry, cut early or held too long — tunes TP", color: "#f59e0b", icon: "↗" },
        { value: "bad_trade", label: "Bad Trade", hint: "Should not have entered — penalizes path", color: "#ef4444", icon: "✗" },
        { value: "data_error", label: "Bad Data", hint: "Stale price, glitch — excluded from analysis", color: "#6b7280", icon: "⚠" },
      ];

      var ENTRY_GRADE_OPTIONS = [
        { value: "chasing", label: "Chasing", hint: "Entered after move stretched — tunes 15m weight" },
        { value: "move_stretched", label: "Move Stretched", hint: "Entry too late in the move" },
        { value: "not_enough_confirmation", label: "Not Enough Confirmation", hint: "Entered before signals aligned" },
        { value: "fake_out", label: "Fake Out", hint: "Signal reversed quickly — ticker personality" },
        { value: "good_entry", label: "Good Entry", hint: "Timing and confirmation solid" },
      ];

      var TRADE_MANAGEMENT_OPTIONS = [
        { value: "should_have_trimmed", label: "Should Have Trimmed", hint: "Left gains on table" },
        { value: "should_have_held", label: "Should Have Held", hint: "Exited too early" },
        { value: "should_have_cut_early", label: "Should Have Cut Early", hint: "Held loser too long" },
        { value: "should_protect_gains", label: "Should Protect Gains Better", hint: "Gave back profit" },
        { value: "sl_too_tight", label: "SL Too Tight", hint: "Stopped out by noise" },
        { value: "sl_too_loose", label: "SL Too Loose", hint: "Risked more than needed" },
      ];

      const fetchOpts = { cache: "no-store", credentials: "include" };

      const TF_ORDER = ["15m", "30m", "1H", "4H", "D"];
      const SIGNAL_LABELS = {
        ema_cross: "EMA cross",
        supertrend: "SuperTrend",
        ema_structure: "EMA structure",
        ema_depth: "EMA depth",
        rsi: "RSI",
        ema5_48: "EMA 5/48",
        s1_slope: "Slope",
      };
      const SETUP_NAME_MAP = {
        ema_regime_confirmed_long: "TT Confirmed Long",
        ema_regime_confirmed_short: "TT Confirmed Short",
        ema_regime_early_long: "TT Early Long",
        ema_regime_early_short: "TT Early Short",
        gold_long: "TT Breakout Long",
        gold_short: "TT Reversal Short",
      };
      function formatPath(path) {
        if (!path || typeof path !== "string") return null;
        if (SETUP_NAME_MAP[path]) return SETUP_NAME_MAP[path];
        return "TT " + path.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      }
      function parseSnapshot(snap) {
        if (!snap) return null;
        try {
          const parsed = typeof snap === "string" ? JSON.parse(snap) : snap;
          if (!parsed?.tf || typeof parsed.tf !== "object") return null;
          return TF_ORDER.filter(tf => parsed.tf[tf]).map(tf => ({
            tf,
            signals: parsed.tf[tf]?.signals || {},
          }));
        } catch { return null; }
      }
      function parseTfStack(tfStackJson) {
        if (!tfStackJson) return null;
        try {
          const parsed = typeof tfStackJson === "string" ? JSON.parse(tfStackJson) : tfStackJson;
          if (!Array.isArray(parsed)) return null;
          return parsed.filter(e => e?.tf);
        } catch { return null; }
      }
      function signalValueLabel(key, value) {
        if (value == null || !Number.isFinite(value)) return null;
        if (key === "ema_cross") return value === 1 ? "Bullish" : "Bearish";
        if (key === "supertrend") {
          if (value === 1) return "⬆️ Bullish";
          if (value === -1) return "⬇️ Bearish";
          return "⏸️ Flat";
        }
        if (key === "rsi") return String(value);
        return String(value);
      }
      function signalValueColor(key, value) {
        if (key === "ema_cross") return value === 1 ? "text-[#22c55e]" : "text-[#ef4444]";
        if (key === "supertrend") {
          if (value === 1) return "text-[#22c55e]";
          if (value === -1) return "text-[#ef4444]";
          return "text-[#9ca3af]";
        }
        if (key === "rsi") {
          if (value >= 70) return "text-[#ef4444]";
          if (value <= 30) return "text-[#22c55e]";
          return "text-[#d1d5db]";
        }
        return "text-[#d1d5db]";
      }

      function formatDate(ms) {
        if (!Number.isFinite(ms)) return "—";
        const d = new Date(ms);
        return d.toLocaleString("en-US", { timeZone: "America/New_York", month: "short", day: "numeric", hour: "numeric", minute: "2-digit", hour12: true });
      }

      function fmtUsd(n) {
        if (!Number.isFinite(n)) return "—";
        return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(n);
      }

      function fmtPct(n, digits = 1) {
        if (!Number.isFinite(Number(n))) return "—";
        return `${Number(n).toFixed(digits)}%`;
      }

      function shortRunId(runId) {
        const r = String(runId || "").trim();
        if (!r) return "—";
        if (r.length <= 42) return r;
        return `${r.slice(0, 24)}...${r.slice(-15)}`;
      }

      // ── Indicator helpers (computed from OHLC) ───────────────────────────────
      function computeEMA(data, period, source = 'close') {
        const k = 2 / (period + 1);
        const out = [];
        let ema = null;
        const val = (bar) => source === 'hl2' ? (bar.high + bar.low) / 2 : bar.close;
        for (let i = 0; i < data.length; i++) {
          const v = val(data[i]);
          if (ema == null) {
            let sum = 0;
            for (let j = 0; j < Math.min(period, i + 1); j++) sum += val(data[j]);
            ema = sum / Math.min(period, i + 1);
          } else {
            ema = v * k + ema * (1 - k);
          }
          out.push({ time: data[i].time, value: ema });
        }
        return out;
      }
      function computeRSI(data, period = 14) {
        const out = [];
        for (let i = 0; i < data.length; i++) {
          if (i < period) {
            out.push({ time: data[i].time, value: 50 });
            continue;
          }
          let gains = 0, losses = 0;
          for (let j = i - period + 1; j <= i; j++) {
            const chg = data[j].close - (j > 0 ? data[j - 1].close : data[j].close);
            if (chg > 0) gains += chg; else losses -= chg;
          }
          const avgGain = gains / period, avgLoss = losses / period;
          const rs = avgLoss === 0 ? 100 : avgGain / avgLoss;
          const rsi = 100 - (100 / (1 + rs));
          out.push({ time: data[i].time, value: Math.max(0, Math.min(100, rsi)) });
        }
        return out;
      }

      function computeSuperTrend(data, period = 10, multiplier = 3) {
        const out = [];
        const k = 2 / (period + 1);
        let atr = null;
        let prevClose = data[0]?.close ?? 0;
        let prevUpper = null, prevLower = null, st = null;
        for (let i = 0; i < data.length; i++) {
          const h = data[i].high, l = data[i].low, c = data[i].close;
          const tr = Math.max(h - l, Math.abs(h - prevClose), Math.abs(l - prevClose));
          prevClose = c;
          if (i < period) {
            atr = atr == null ? tr : tr * k + atr * (1 - k);
            out.push({ time: data[i].time, value: (h + l) / 2 });
            continue;
          }
          atr = tr * k + atr * (1 - k);
          const hl2 = (h + l) / 2;
          const basicUpper = hl2 + multiplier * atr;
          const basicLower = hl2 - multiplier * atr;
          const finalUpper = (prevUpper == null || basicUpper < prevUpper || data[i - 1].close > prevUpper) ? basicUpper : prevUpper;
          const finalLower = (prevLower == null || basicLower > prevLower || data[i - 1].close < prevLower) ? basicLower : prevLower;
          const prevSt = st;
          st = (st == null) ? finalLower : (st === prevUpper ? (c > prevUpper ? finalLower : finalUpper) : (c < prevLower ? finalUpper : finalLower));
          prevUpper = finalUpper;
          prevLower = finalLower;
          out.push({ time: data[i].time, value: st });
        }
        return out;
      }

      // SuperTrend as separate line segments with breaks at flips (mirrors PineScript plot.style_linebr)
      function computeSuperTrendSegments(data, period = 10, multiplier = 3) {
        const segments = [];
        if (!data || data.length < period + 1) return segments;
        let atr = 0, trSum = 0;
        let upperBand = Infinity, lowerBand = 0;
        let dir = 1, prevDir = 1;
        let currentSeg = null;
        for (let i = 0; i < data.length; i++) {
          const t = data[i].time;
          const h = data[i].high, l = data[i].low, c = data[i].close;
          const prevC = i > 0 ? data[i - 1].close : c;
          const tr = Math.max(h - l, Math.abs(h - prevC), Math.abs(l - prevC));
          if (i < period) { trSum += tr; continue; }
          atr = i === period ? trSum / period : (atr * (period - 1) + tr) / period;
          const hl2 = (h + l) / 2;
          const bU = hl2 + multiplier * atr, bL = hl2 - multiplier * atr;
          upperBand = (bU < upperBand || prevC > upperBand) ? bU : upperBand;
          lowerBand = (bL > lowerBand || prevC < lowerBand) ? bL : lowerBand;
          prevDir = dir;
          if (dir === 1 && c > upperBand) dir = -1;
          else if (dir === -1 && c < lowerBand) dir = 1;
          const stVal = dir === -1 ? lowerBand : upperBand;
          const color = dir === -1 ? '#22c55e' : '#ef4444';
          if (dir !== prevDir || !currentSeg) {
            currentSeg = { color, data: [] };
            segments.push(currentSeg);
          }
          currentSeg.data.push({ time: t, value: stVal });
        }
        return segments;
      }

      // TD Sequential: Preparation (1-9) and Lead-up (1-13) counts
      function computeTDSequential(data, prepComp = 4, leadComp = 2) {
        const markers = [];
        let bullPrep = 0, bearPrep = 0;
        let bullLead = null, bearLead = null;
        for (let i = 0; i < data.length; i++) {
          if (i < prepComp) continue;
          const c = data[i].close;
          const cComp = data[i - prepComp].close;
          bullPrep = c < cComp ? bullPrep + 1 : 0;
          bearPrep = c > cComp ? bearPrep + 1 : 0;
          const bullPrepDone = bullPrep === 9;
          const bearPrepDone = bearPrep === 9;
          if (bullPrep >= 1 && bullPrep <= 9) {
            markers.push({
              time: data[i].time, position: 'belowBar',
              color: bullPrep === 9 ? '#089981' : 'rgba(8,153,129,0.65)',
              shape: 'circle', text: String(bullPrep), size: 0,
            });
          }
          if (bearPrep >= 1 && bearPrep <= 9) {
            markers.push({
              time: data[i].time, position: 'aboveBar',
              color: bearPrep === 9 ? '#f23645' : 'rgba(242,54,69,0.65)',
              shape: 'circle', text: String(bearPrep), size: 0,
            });
          }
          if (bullPrepDone) { bullLead = 0; bearLead = null; }
          if (bearPrepDone) { bearLead = 0; bullLead = null; }
          if (bullLead !== null && i >= leadComp && data[i].close < data[i - leadComp].low) {
            bullLead++;
            if (bullLead <= 13) {
              markers.push({
                time: data[i].time, position: 'belowBar',
                color: bullLead === 13 ? '#2962ff' : 'rgba(41,98,255,0.65)',
                shape: 'circle', text: String(bullLead), size: 0,
              });
            }
            if (bullLead >= 13) bullLead = null;
          }
          if (bearLead !== null && i >= leadComp && data[i].close > data[i - leadComp].high) {
            bearLead++;
            if (bearLead <= 13) {
              markers.push({
                time: data[i].time, position: 'aboveBar',
                color: bearLead === 13 ? '#ff5d00' : 'rgba(255,93,0,0.65)',
                shape: 'circle', text: String(bearLead), size: 0,
              });
            }
            if (bearLead >= 13) bearLead = null;
          }
        }
        return markers;
      }

      // Find bar that was current at timestamp (bar at or before this moment)
      // Candles: Unix seconds (intraday) or "YYYY-MM-DD" string (daily)
      function findBarTime(mapped, tsMs) {
        if (!mapped?.length || !Number.isFinite(tsMs)) return null;
        const tsSec = tsMs > 1e12 ? Math.floor(tsMs / 1000) : tsMs;
        const isDaily = typeof mapped[0].time === "string";
        if (isDaily) {
          const dayStr = new Date(tsSec * 1000).toLocaleDateString("en-CA", { timeZone: "America/New_York" });
          let best = null;
          for (const b of mapped) {
            if (String(b.time) <= dayStr && (best === null || String(b.time) > String(best.time))) best = b;
          }
          if (best) return best.time;
          if (String(mapped[0].time) > dayStr) return mapped[0].time;
          return null;
        }
        let best = null;
        for (const b of mapped) {
          if (b.time <= tsSec && (best === null || b.time > best.time)) best = b;
        }
        if (best) return best.time;
        if (mapped[0].time > tsSec) return mapped[0].time;
        return null;
      }

      // ── Interactive Chart (TradingView Lightweight Charts) ───────────────────
      // Ordered widest→narrowest so narrower clouds render on top
      const CLOUD_CONFIG = [
        { key: 'cloud180200', s: 180, l: 200, color: '#26c6da', fill: 'rgba(38,198,218,0.18)', label: '180-200' },
        { key: 'cloud7289', s: 72, l: 89, color: '#26a69a', fill: 'rgba(38,166,154,0.22)', label: '72-89' },
        { key: 'cloud3450', s: 34, l: 50, color: '#42a5f5', fill: 'rgba(66,165,245,0.28)', label: '34-50' },
        { key: 'cloud512', s: 5, l: 12, color: '#4caf50', fill: 'rgba(76,175,80,0.32)', label: '5-12' },
      ];
      const INDICATOR_KEYS = ["cloud512", "cloud3450", "cloud7289", "cloud180200", "superTrend", "tdSeq"];
      function AutopsyChart({ ticker, entryPrice, exitPrice, entryTs, exitTs, trimTs, height = 360 }) {
        const containerRef = useRef(null);
        const chartRef = useRef(null);
        const seriesRef = useRef(null);
        const priceLinesRef = useRef([]);
        const cloudAreaRef = useRef([]);
        const emaSeriesRef = useRef([]);
        const indicatorDataRef = useRef(null);
        const tradeMarkersRef = useRef([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [tf, setTf] = useState("15");
        const [showIndicators, setShowIndicators] = useState({ cloud512: true, cloud3450: true, cloud7289: false, cloud180200: false, superTrend: false, tdSeq: false });
        const intradaySessionMode = useMemo(() => {
          const sym = String(ticker || "").toUpperCase();
          if (!sym) return "rth";
          if (sym.endsWith("USD") || sym.endsWith("USDT") || sym.endsWith("1!")) return "extended";
          if (["SPX", "US500", "DXY", "GOLD", "SILVER", "USOIL"].includes(sym)) return "extended";
          return "rth";
        }, [ticker]);

        const isRegularSessionBar = useCallback((tsSec) => {
          if (!Number.isFinite(tsSec) || tsSec <= 0) return false;
          try {
            const parts = new Intl.DateTimeFormat("en-US", {
              timeZone: "America/New_York",
              weekday: "short",
              hour: "2-digit",
              minute: "2-digit",
              hour12: false,
            }).formatToParts(new Date(tsSec * 1000));
            const map = {};
            for (const p of parts) map[p.type] = p.value;
            const weekday = String(map.weekday || "");
            if (weekday === "Sat" || weekday === "Sun") return false;
            const mins = Number(map.hour || 0) * 60 + Number(map.minute || 0);
            return mins >= 570 && mins < 960;
          } catch {
            return true;
          }
        }, []);

        const mapCandles = useCallback((candles, timeframe) => {
          const mapped = candles.map(c => {
            const rawTs = Number(c.ts);
            const ts = rawTs > 1e12 ? Math.floor(rawTs / 1000) : rawTs;
            return {
              time: ts,
              open: Number(c.o),
              high: Number(c.h),
              low: Number(c.l),
              close: Number(c.c),
            };
          }).filter(c => c.open > 0 && c.high > 0).sort((a, b) => a.time - b.time);
          const seen = new Set();
          const deduped = mapped.filter(x => {
            if (seen.has(x.time)) return false;
            seen.add(x.time);
            return true;
          });

          if (timeframe === "D") {
            const dayKey = (ts) => new Date(ts * 1000).toLocaleDateString("en-CA", { timeZone: "America/New_York" });
            const byDay = new Map();
            for (const b of deduped) {
              const key = dayKey(b.time);
              const existing = byDay.get(key);
              if (!existing || b.time >= existing.time) byDay.set(key, { ...b, time: key });
            }
            return Array.from(byDay.entries()).sort((a, b) => a[0].localeCompare(b[0])).map(([, b]) => b);
          }
          if (intradaySessionMode === "rth") {
            const rthOnly = deduped.filter(b => isRegularSessionBar(b.time));
            if (rthOnly.length >= 2) return rthOnly;
          }
          return deduped;
        }, [intradaySessionMode, isRegularSessionBar]);

        useEffect(() => {
          let cancelled = false;
          setError(null);
          setLoading(true);

          if (!containerRef.current || !ticker || typeof LightweightCharts === "undefined") {
            setLoading(false);
            setError("Charts unavailable");
            return;
          }

          // Full range: 3 days before entry through 3 days after exit
          const entryMs = Number.isFinite(Number(entryTs)) && entryTs
            ? (Number(entryTs) < 1e12 ? Number(entryTs) * 1000 : Number(entryTs))
            : null;
          const exitMs = Number.isFinite(Number(exitTs)) && exitTs
            ? (Number(exitTs) < 1e12 ? Number(exitTs) * 1000 : Number(exitTs))
            : null;
          const threeDaysMs = 3 * 24 * 60 * 60 * 1000;
          const asOfMs = exitMs
            ? exitMs + threeDaysMs
            : (entryMs || Date.now());
          const limit = 3000; // Max supported by API; covers ~77 trading days of 15m bars
          const container = containerRef.current;
          const initialWidth = Math.max(container.clientWidth || 400, 200);
          const chartH = container.clientHeight > 50 ? container.clientHeight : height;

          const chart = LightweightCharts.createChart(container, {
            width: initialWidth,
            height: chartH,
            layout: {
              background: { type: "solid", color: "#0b0e11" },
              textColor: "#6b7280",
              fontSize: 10,
            },
            grid: {
              vertLines: { color: "rgba(38,50,95,0.35)" },
              horzLines: { color: "rgba(38,50,95,0.35)" },
            },
            crosshair: {
              mode: LightweightCharts.CrosshairMode.Normal,
              vertLine: { color: "rgba(255,255,255,0.15)", width: 1, style: 2, labelBackgroundColor: "#1e293b" },
              horzLine: { color: "rgba(255,255,255,0.15)", width: 1, style: 2, labelBackgroundColor: "#1e293b" },
            },
            rightPriceScale: {
              borderColor: "rgba(38,50,95,0.5)",
              scaleMargins: { top: 0.08, bottom: 0.08 },
              autoScale: true,
            },
            timeScale: {
              borderColor: "rgba(38,50,95,0.5)",
              timeVisible: true,
              secondsVisible: false,
              barSpacing: 4,
              rightOffset: 3,
              fixLeftEdge: true,
              fixRightEdge: true,
              tickMarkFormatter: (time) => {
                try {
                  if (typeof time === "string") {
                    const [y, m, d] = time.split("-").map(Number);
                    const date = new Date(y, (m || 1) - 1, d || 1);
                    return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
                  }
                  const d = new Date(time * 1000);
                  const dateStr = d.toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "America/New_York" });
                  const timeStr = d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
                  return dateStr + " " + timeStr;
                } catch { return ""; }
              },
            },
            localization: {
              timeFormatter: (time) => {
                try {
                  if (typeof time === "string") {
                    const [y, m, d] = time.split("-").map(Number);
                    const date = new Date(y, (m || 1) - 1, d || 1);
                    return date.toLocaleDateString("en-US", { month: "short", day: "numeric" });
                  }
                  const d = new Date(time * 1000);
                  const dateStr = d.toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "America/New_York" });
                  const timeStr = d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", second: "2-digit", timeZone: "America/New_York" });
                  return dateStr + " " + timeStr;
                } catch { return ""; }
              },
            },
            handleScroll: { vertTouchDrag: false },
          });
          chartRef.current = chart;

          // Cloud area fills created FIRST so they render behind candles (widest→narrowest)
          const noLine = { lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false };
          const BG = '#0b0e11';
          const cloudAreas = CLOUD_CONFIG.map(cloud => ({
            key: cloud.key,
            upper: chart.addAreaSeries({ topColor: cloud.fill, bottomColor: cloud.fill, lineColor: 'transparent', lineWidth: 0, ...noLine }),
            lower: chart.addAreaSeries({ topColor: BG, bottomColor: BG, lineColor: 'transparent', lineWidth: 0, ...noLine }),
          }));
          cloudAreaRef.current = cloudAreas;

          const candleSeries = chart.addCandlestickSeries({
            upColor: "#22c55e",
            downColor: "#ef4444",
            borderUpColor: "#22c55e",
            borderDownColor: "#ef4444",
            wickUpColor: "#22c55e",
            wickDownColor: "#ef4444",
          });
          seriesRef.current = candleSeries;

          const asOfTsParam = asOfMs;
          let url = `${API_BASE}/timed/candles?ticker=${encodeURIComponent(ticker)}&tf=${tf}&limit=${limit}`;
          if (asOfTsParam) url += `&asOfTs=${asOfTsParam}`;

          const doRender = (candles) => {
            if (cancelled) return;
            if (!candles || candles.length === 0) {
              setError("No chart data for this ticker");
              setLoading(false);
              return;
            }
            const mapped = mapCandles(candles, tf);
            if (mapped.length < 2) {
              setError("Insufficient candle data (need at least 2 bars)");
              setLoading(false);
              return;
            }
            candleSeries.setData(mapped);

            // EMA Clouds (filled area only) + SuperTrend (breaks) + TD Sequential
            for (const s of emaSeriesRef.current) {
              try { chart.removeSeries(s); } catch (_) {}
            }
            emaSeriesRef.current = [];
            const noPriceLine = { lastValueVisible: false, priceLineVisible: false, crosshairMarkerVisible: false };
            const allSeries = [];
            const allData = {};
            for (let ci = 0; ci < CLOUD_CONFIG.length; ci++) {
              const cloud = CLOUD_CONFIG[ci];
              const shortData = computeEMA(mapped, cloud.s, 'hl2');
              const longData = computeEMA(mapped, cloud.l, 'hl2');
              const upperData = [], lowerData = [];
              for (let j = 0; j < shortData.length; j++) {
                const sv = shortData[j].value, lv = longData[j].value, t = shortData[j].time;
                upperData.push({ time: t, value: Math.max(sv, lv) });
                lowerData.push({ time: t, value: Math.min(sv, lv) });
              }
              allData[cloud.key] = { upper: upperData, lower: lowerData };
              const vis = showIndicators[cloud.key];
              const ca = cloudAreaRef.current[ci];
              if (ca) {
                ca.upper.setData(vis ? upperData : []);
                ca.lower.setData(vis ? lowerData : []);
              }
            }
            const stSegments = computeSuperTrendSegments(mapped, 10, 3);
            allData.superTrend = stSegments;
            for (const seg of stSegments) {
              const s = chart.addLineSeries({ color: seg.color, lineWidth: 2, title: '', ...noPriceLine });
              s.setData(showIndicators.superTrend ? seg.data : []);
              allSeries.push(s);
            }
            const tdData = computeTDSequential(mapped);
            allData.tdSeq = tdData;
            indicatorDataRef.current = allData;
            emaSeriesRef.current = allSeries;

            // Add entry/exit price lines (thicker, solid, prominent labels)
            for (const pl of priceLinesRef.current) {
              try { candleSeries.removePriceLine(pl); } catch (_) {}
            }
            priceLinesRef.current = [];
            const ep = Number(entryPrice);
            const xp = Number(exitPrice);
            if (Number.isFinite(ep) && ep > 0) {
              const pl = candleSeries.createPriceLine({
                price: ep,
                color: "#60a5fa",
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Solid,
                axisLabelVisible: true,
                title: "Entry",
              });
              priceLinesRef.current.push(pl);
            }
            if (Number.isFinite(xp) && xp > 0 && xp !== ep) {
              const pl = candleSeries.createPriceLine({
                price: xp,
                color: "#f59e0b",
                lineWidth: 2,
                lineStyle: LightweightCharts.LineStyle.Solid,
                axisLabelVisible: true,
                title: "Exit",
              });
              priceLinesRef.current.push(pl);
            }
            const lastClose = mapped.length > 0 ? mapped[mapped.length - 1].close : null;
            if (Number.isFinite(lastClose) && lastClose > 0) {
              const pl = candleSeries.createPriceLine({
                price: lastClose,
                color: "#6b7280",
                lineWidth: 1,
                lineStyle: LightweightCharts.LineStyle.Dashed,
                axisLabelVisible: true,
                title: "Price",
              });
              priceLinesRef.current.push(pl);
            }

            // Bar markers: Entry, Exit, Trim(s) + TD Sequential
            const entryMs = Number(entryTs);
            const exitMs = Number(exitTs);
            const trimMs = Number(trimTs);
            const tradeMarkers = [];
            const entryBar = findBarTime(mapped, entryMs);
            if (entryBar != null) {
              tradeMarkers.push({ time: entryBar, position: "inBar", color: "#60a5fa", shape: "arrowUp", text: "Entry", size: 2 });
            }
            const exitBar = findBarTime(mapped, exitMs);
            if (exitBar != null && exitBar !== entryBar) {
              tradeMarkers.push({ time: exitBar, position: "aboveBar", color: "#f59e0b", shape: "arrowDown", text: "Exit", size: 2 });
            }
            if (Number.isFinite(trimMs) && trimMs > 0) {
              const trimBar = findBarTime(mapped, trimMs);
              if (trimBar != null && trimBar !== entryBar && trimBar !== exitBar) {
                tradeMarkers.push({ time: trimBar, position: "aboveBar", color: "#a78bfa", shape: "circle", text: "Trim", size: 1.5 });
              }
            }
            tradeMarkersRef.current = tradeMarkers;
            const markers = [...tradeMarkers, ...(showIndicators.tdSeq ? tdData : [])];
            markers.sort((a, b) => (a.time < b.time ? -1 : a.time > b.time ? 1 : 0));
            try { candleSeries.setMarkers(markers); } catch (_) {}

            chart.timeScale().fitContent();
            const entryBarTime = findBarTime(mapped, entryTs);
            const exitBarTime = findBarTime(mapped, exitTs);
            const hasTradeRange = entryBarTime != null && exitBarTime != null;
            const isDailyTime = typeof mapped[0].time === "string";
            let visibleFrom = mapped[0].time, visibleTo = mapped[mapped.length - 1].time;
            if (hasTradeRange) {
              if (isDailyTime) {
                const idxEntry = mapped.findIndex(b => b.time === entryBarTime);
                const idxExit = mapped.findIndex(b => b.time === exitBarTime);
                if (idxEntry >= 0 && idxExit >= 0) {
                const padding = 10;
                const fromIdx = Math.max(0, idxEntry - padding);
                const toIdx = Math.min(mapped.length - 1, idxExit + padding);
                  visibleFrom = mapped[fromIdx].time;
                  visibleTo = mapped[toIdx].time;
                }
              } else {
                const twoWeekSec = 10 * 24 * 3600;
                visibleFrom = Math.max(mapped[0].time, entryBarTime - twoWeekSec);
                visibleTo = Math.min(mapped[mapped.length - 1].time, exitBarTime + twoWeekSec);
              }
              try {
                chart.timeScale().setVisibleRange({ from: visibleFrom, to: visibleTo });
              } catch (_) {}
            }
            // Constrain price scale to visible range so indicators (e.g. SuperTrend) don't stretch the axis
            const visibleCandles = mapped.filter(b => (isDailyTime ? String(b.time) >= String(visibleFrom) && String(b.time) <= String(visibleTo) : b.time >= visibleFrom && b.time <= visibleTo));
            const priceValues = [...visibleCandles.flatMap(b => [b.low, b.high])];
            if (Number.isFinite(ep)) priceValues.push(ep);
            if (Number.isFinite(xp)) priceValues.push(xp);
            if (priceValues.length > 0) {
              let priceMin = Math.min(...priceValues);
              let priceMax = Math.max(...priceValues);
              const paddingPct = 0.08;
              const range = Math.max(priceMax - priceMin, 1) * (1 + 2 * paddingPct);
              const center = (priceMin + priceMax) / 2;
              priceMin = center - range / 2;
              priceMax = center + range / 2;
              try {
                candleSeries.priceScale().setVisibleRange({ from: priceMin, to: priceMax });
              } catch (_) {}
            }
            requestAnimationFrame(() => {
              if (chartRef.current && containerRef.current) {
                if (!hasTradeRange) chartRef.current.timeScale().scrollToPosition(-3, false);
                const w = containerRef.current.clientWidth;
                const h = containerRef.current.clientHeight;
                if (w > 0 && h > 0) chartRef.current.resize(w, h);
              }
            });
            setTimeout(() => {
              if (chartRef.current && containerRef.current) {
                const w = containerRef.current.clientWidth;
                const h = containerRef.current.clientHeight;
                if (w > 0 && h > 0) chartRef.current.resize(w, h);
              }
            }, 200);
            setLoading(false);
          };

          fetch(url, { cache: "no-store" })
            .then(r => r.json())
            .then(data => {
              if (cancelled) return;
              if (!data.ok || !data.candles) {
                setError("No chart data for this ticker");
                setLoading(false);
                return;
              }
              let candles = data.candles;
              if (candles.length < 2 && asOfTsParam) {
                const fallbackUrl = `${API_BASE}/timed/candles?ticker=${encodeURIComponent(ticker)}&tf=${tf}&limit=${limit}`;
                return fetch(fallbackUrl, { cache: "no-store" })
                  .then(r => r.json())
                  .then(d => {
                    if (cancelled) return;
                    if (d.ok && d.candles && d.candles.length >= 2) candles = d.candles;
                    if (candles.length < 2) {
                      setError("Insufficient chart data (try a different timeframe)");
                      setLoading(false);
                      return;
                    }
                    doRender(candles);
                  })
                  .catch(() => {
                    if (cancelled) return;
                    if (candles.length < 2) {
                      setError("Insufficient chart data (try a different timeframe)");
                      setLoading(false);
                    } else {
                      doRender(candles);
                    }
                  });
              }
              doRender(candles);
            })
            .catch(e => {
              if (cancelled) return;
              console.warn("[AutopsyChart] Failed to load chart:", e);
              setError("Failed to load chart");
              setLoading(false);
            });

          const handleResize = () => {
            if (containerRef.current && chartRef.current) {
              const w = containerRef.current.clientWidth;
              const h = containerRef.current.clientHeight;
              if (w > 0 && h > 0) chartRef.current.resize(w, h);
            }
          };
          const ro = typeof ResizeObserver !== "undefined" ? new ResizeObserver(handleResize) : null;
          if (ro) ro.observe(containerRef.current);
          window.addEventListener("resize", handleResize);

          return () => {
            cancelled = true;
            if (ro) ro.disconnect();
            window.removeEventListener("resize", handleResize);
            priceLinesRef.current = [];
            emaSeriesRef.current = [];
            cloudAreaRef.current = [];
            chart.remove();
            chartRef.current = null;
            seriesRef.current = null;
          };
        }, [ticker, tf, entryPrice, exitPrice, entryTs, exitTs, trimTs, height, mapCandles]);

        useEffect(() => {
          const series = emaSeriesRef.current;
          const data = indicatorDataRef.current;
          if (!data) return;
          CLOUD_CONFIG.forEach((cloud, idx) => {
            const d = data[cloud.key];
            if (!d) return;
            const vis = showIndicators[cloud.key];
            const ca = cloudAreaRef.current[idx];
            if (ca) {
              ca.upper.setData(vis ? d.upper : []);
              ca.lower.setData(vis ? d.lower : []);
            }
          });
          if (series && data.superTrend) {
            const stVis = showIndicators.superTrend;
            for (let si = 0; si < series.length; si++) {
              if (si < data.superTrend.length) {
                series[si].setData(stVis ? data.superTrend[si].data : []);
              }
            }
          }
          if (seriesRef.current && data.tdSeq) {
            const tm = tradeMarkersRef.current || [];
            const td = showIndicators.tdSeq ? data.tdSeq : [];
            const all = [...tm, ...td].sort((a, b) => (a.time < b.time ? -1 : a.time > b.time ? 1 : 0));
            try { seriesRef.current.setMarkers(all); } catch (_) {}
          }
        }, [showIndicators]);

        const toggleIndicator = (key) => {
          setShowIndicators(prev => ({ ...prev, [key]: !prev[key] }));
        };

        return (
          <div className="tt-card flex flex-col flex-1 min-h-0">
            <div className="shrink-0 px-3 py-2 flex items-center justify-between border-b border-white/[0.04]">
              <span className="text-[13px] font-semibold text-[#14b8a6]">{ticker}</span>
              <div className="flex items-center gap-0.5 sm:gap-1">
                {["5", "15", "30", "60", "D"].map(t => (
                  <button
                    key={t}
                    onClick={() => setTf(t)}
                    className={`px-2.5 py-1.5 sm:px-2 sm:py-1 rounded text-[11px] font-medium ${tf === t ? "bg-white/10 text-white" : "text-[#6b7280] hover:text-white"}`}
                  >
                    {t === "D" ? "1D" : t + "m"}
                  </button>
                ))}
              </div>
            </div>
            <div ref={containerRef} style={{ minHeight: Math.max(height * 0.4, 180), minWidth: 200, width: "100%" }} className="w-full flex-1 min-h-0">
              {error && !loading && (
                <div className="flex items-center justify-center h-full text-[#6b7280] text-[13px]">{error}</div>
              )}
              {loading && (
                <div className="flex items-center justify-center h-full">
                  <div className="loading-spinner" style={{ width: 24, height: 24 }} />
                </div>
              )}
            </div>
            <div className="shrink-0 px-2 sm:px-3 py-2 flex flex-wrap items-center gap-x-2 sm:gap-x-4 gap-y-1 border-t border-white/[0.04] bg-white/[0.02] text-[10px] sm:text-[11px] text-[#9ca3af]">
              <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-0.5 rounded bg-[#60a5fa]" /> Entry</span>
              <span className="flex items-center gap-1.5"><span className="inline-block w-3 h-0.5 rounded bg-[#f59e0b]" /> Exit</span>
              {INDICATOR_KEYS.map(key => {
                const labels = { cloud512: "5-12", cloud3450: "34-50", cloud7289: "72-89", cloud180200: "180-200", superTrend: "ST", tdSeq: "TD" };
                const colors = { cloud512: "#4caf50", cloud3450: "#42a5f5", cloud7289: "#26a69a", cloud180200: "#26c6da", superTrend: "#f97316", tdSeq: "#2962ff" };
                const on = showIndicators[key];
                return (
                  <button key={key} type="button" onClick={() => toggleIndicator(key)} className={`flex items-center gap-1 sm:gap-1.5 rounded px-1.5 py-1 sm:py-0.5 -m-0.5 hover:bg-white/[0.06] transition-all ${on ? "opacity-100" : "opacity-45"}`} title={on ? "Hide" : "Show"}>
                    <span className="inline-block w-3 h-0.5 rounded shrink-0" style={{ background: colors[key] }} />
                    <span>{labels[key]}</span>
                  </button>
                );
              })}
            </div>
          </div>
        );
      }

      // ── Autopsy Modal ───────────────────────────────────────────────────────
      function AutopsyModal({ trade, annotations, onSave, onRefreshTrades, onClose, readonly = false }) {
        const [notes, setNotes] = useState(annotations?.notes ?? "");
        const [classification, setClassification] = useState(annotations?.classification ?? "");
        const [entryGrade, setEntryGrade] = useState(Array.isArray(annotations?.entry_grade) ? annotations.entry_grade : []);
        const [tradeManagement, setTradeManagement] = useState(Array.isArray(annotations?.trade_management) ? annotations.trade_management : []);
        const [saving, setSaving] = useState(false);
        const [tickerProfile, setTickerProfile] = useState(null);
        const [tickerProfileLoading, setTickerProfileLoading] = useState(false);
        useEffect(() => {
          setEntryGrade(Array.isArray(annotations?.entry_grade) ? annotations.entry_grade : []);
          setTradeManagement(Array.isArray(annotations?.trade_management) ? annotations.trade_management : []);
        }, [trade?.trade_id, trade?.id, annotations?.entry_grade, annotations?.trade_management]);
        const [candleAtEntry, setCandleAtEntry] = useState(null);
        const [candleAtExit, setCandleAtExit] = useState(null);
        const [candleAtTrim, setCandleAtTrim] = useState(null);

        const tradeId = trade?.trade_id || trade?.id || `${trade?.ticker}-${trade?.entry_ts}`;
        const storedEntry = Number(trade?.entry_price || trade?.entryPrice);
        const storedExit = Number(trade?.exit_price || trade?.exitPrice);

        // Fetch 15m candles at entry/trim/exit so markers and price lines use the same aligned bar.
        useEffect(() => {
          if (!trade?.ticker || !trade?.entry_ts) return;
          const asOfMs = (ts) => {
            const raw = Number(ts);
            if (!Number.isFinite(raw) || raw <= 0) return null;
            return raw < 1e12 ? raw * 1000 : raw;
          };
          const loadAlignedCandle = async (ts, setter) => {
            const alignedMs = asOfMs(ts);
            if (!alignedMs) {
              setter(null);
              return;
            }
            try {
              const r = await fetch(`${API_BASE}/timed/candles?ticker=${encodeURIComponent(trade.ticker)}&tf=15&limit=5&asOfTs=${alignedMs}`, fetchOpts);
              const data = await r.json();
              const candles = data?.candles;
              if (Array.isArray(candles) && candles.length > 0) {
                const last = candles[candles.length - 1];
                const close = Number(last?.c);
                const tsRaw = Number(last?.ts);
                const tsMs = Number.isFinite(tsRaw) && tsRaw > 0 ? (tsRaw < 1e12 ? tsRaw * 1000 : tsRaw) : null;
                if (Number.isFinite(close) && close > 0 && Number.isFinite(tsMs) && tsMs > 0) {
                  setter({ close, ts: tsMs });
                  return;
                }
              }
            } catch (_) {}
            setter(null);
          };
          loadAlignedCandle(trade.entry_ts, setCandleAtEntry);
          loadAlignedCandle(trade.exit_ts, setCandleAtExit);
          loadAlignedCandle(trade.trim_ts, setCandleAtTrim);
        }, [trade?.ticker, trade?.entry_ts, trade?.exit_ts, trade?.trim_ts]);

        // Price lines always use the stored execution price (truth).
        // Timestamps are aligned to the nearest 15m bar so markers sit on a real candle.
        const chartEntryTs = Number.isFinite(Number(candleAtEntry?.ts)) ? Number(candleAtEntry.ts) : trade?.entry_ts;
        const chartExitTs = Number.isFinite(Number(candleAtExit?.ts)) ? Number(candleAtExit.ts) : trade?.exit_ts;
        const chartTrimTs = Number.isFinite(Number(candleAtTrim?.ts)) ? Number(candleAtTrim.ts) : trade?.trim_ts;

        useEffect(() => {
          let cancelled = false;
          const ticker = String(trade?.ticker || "").trim().toUpperCase();
          if (!ticker) {
            setTickerProfile(null);
            return;
          }
          setTickerProfileLoading(true);
          fetch(`${API_BASE}/timed/profile/${encodeURIComponent(ticker)}`, fetchOpts)
            .then(r => r.json())
            .then(data => {
              if (cancelled) return;
              setTickerProfile(data?.ok ? (data.profile || null) : null);
            })
            .catch(() => {
              if (!cancelled) setTickerProfile(null);
            })
            .finally(() => {
              if (!cancelled) setTickerProfileLoading(false);
            });
          return () => { cancelled = true; };
        }, [trade?.ticker]);

        // NOTE: Auto-correction of stored prices removed. The stored entry/exit prices
        // are the actual execution prices (10m candle close at trade open/close) and must
        // not be overwritten with 15m candle closes which are a different timeframe.

        const handleSave = async () => {
          setSaving(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/trade-autopsy/annotations`, {
              ...fetchOpts,
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                trade_id: tradeId,
                run_id: trade?.run_id || trade?.runId || null,
                classification,
                notes,
                entry_grade: entryGrade,
                trade_management: tradeManagement,
              }),
            });
            const data = await res.json();
            if (data.ok) {
              onSave?.();
              onClose?.();
            }
          } finally {
            setSaving(false);
          }
        };

        const entrySnap = trade?.signal_snapshot_json;
        const tfStack = trade?.tf_stack_json;
        const mfe = trade?.max_favorable_excursion;
        const mae = trade?.max_adverse_excursion;
        const exitReason = trade?.exit_reason;
        const contextProfile = tickerProfile?.contract?.context || null;
        const executionProfile = tickerProfile?.contract?.execution || null;
        const learningProfile = tickerProfile?.contract?.learning || null;
        const favoredRegime = contextProfile?.favored_regime || null;
        const favoredVix = contextProfile?.favored_vix_bucket || null;
        const favoredPath = contextProfile?.favored_entry_path || null;
        const topRegimeRow = contextProfile?.by_regime?.[0] || null;
        const topVixRow = contextProfile?.by_vix_bucket?.[0] || null;
        const topPathRow = contextProfile?.by_entry_path?.[0] || null;

        return (
          <div className="fixed inset-0 z-[100] flex items-center justify-center md:p-4" style={{ background: "rgba(0,0,0,0.7)", backdropFilter: "blur(4px)" }} onClick={onClose}>
            <div className="autopsy-modal-card w-full h-full md:h-auto md:max-w-[95vw] md:max-h-[95vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
              <div className="flex items-center justify-between px-4 py-2.5 border-b border-white/[0.06] shrink-0" style={{ background: "var(--tt-bg-surface)" }}>
                <h2 className="text-[15px] font-semibold text-white truncate mr-2">
                  {trade?.ticker} {trade?.direction || ""} — {readonly ? "Trade Review" : "Trade Autopsy"}
                </h2>

      // ── Main App ───────────────────────────────────────────────────────────
      function App({ user }) {
        const RUN_FILTER_LATEST = "__LATEST__";
        const RUN_FILTER_LIVE = "__LIVE__";
        const [trades, setTrades] = useState([]);
        const [annotations, setAnnotations] = useState({});
        const [availableRuns, setAvailableRuns] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [selectedTrade, setSelectedTrade] = useState(null);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [filterTicker, setFilterTicker] = useState("");
        const [filterClassification, setFilterClassification] = useState("");
        const [filterDateFrom, setFilterDateFrom] = useState("");
        const [filterDateTo, setFilterDateTo] = useState("");
        const [filterRunId, setFilterRunId] = useState(RUN_FILTER_LATEST);

        const tradeIdFromUrl = (() => {
          const params = new URLSearchParams(window.location.search);
          return params.get("trade_id") || params.get("tradeId") || null;
        })();
        const runIdFromUrl = (() => {
          const params = new URLSearchParams(window.location.search);
          return params.get("run_id") || params.get("runId") || null;
        })();
        const isReadonly = new URLSearchParams(window.location.search).get("readonly") === "1";
        const reviewableRuns = useMemo(
          () => (availableRuns || []).filter(r => String(r?.status || "").trim().toLowerCase() === "completed" && Number(r?.total_trades || 0) > 0),
          [availableRuns]
        );
        const liveRun = useMemo(
          () => (availableRuns || []).find(r => {
            const status = String(r?.status || "").trim().toLowerCase();
            return status === "running" || status === "queued";
          }) || null,
          [availableRuns]
        );
        const runMeta = useMemo(() => ({
          runs: reviewableRuns.map(r => ({ runId: String(r.run_id || "").trim(), label: r.label || null, startDate: r.start_date || null, endDate: r.end_date || null })),
          latestRunId: reviewableRuns.length ? String(reviewableRuns[0].run_id || "").trim() : "",
          liveRunId: liveRun ? String(liveRun.run_id || "").trim() : "",
          liveRunLabel: liveRun?.label || null,
        }), [reviewableRuns, liveRun]);
        const resolveSelectedRunId = useCallback((selectedValue, latestRunId) => {
          if (selectedValue === RUN_FILTER_LATEST) return String(latestRunId || "").trim();
          if (selectedValue === RUN_FILTER_LIVE) return "";
          return String(selectedValue || "").trim();
        }, []);
        const effectiveRunId = useMemo(() => {
          const fromUrl = String(runIdFromUrl || "").trim();
          if (fromUrl) return fromUrl;
          return resolveSelectedRunId(filterRunId, runMeta.latestRunId);
        }, [runIdFromUrl, filterRunId, runMeta.latestRunId, resolveSelectedRunId]);
        const annotationsUrl = (() => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/annotations?all=1`;
          if (effectiveRunId) return `${base}&run_id=${encodeURIComponent(effectiveRunId)}`;
          return base;
        })();
        const tradesUrl = (() => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/trades`;
          if (effectiveRunId) return `${base}?run_id=${encodeURIComponent(effectiveRunId)}`;
          if (filterRunId === RUN_FILTER_LIVE) return `${base}?live=1`;
          return base;
        })();

        useEffect(() => {
          if (!runMeta.latestRunId) return;
          if (runIdFromUrl) return;
          if (filterRunId === RUN_FILTER_LATEST) return;
          if (filterRunId === RUN_FILTER_LIVE || filterRunId === "") return;
          const exists = runMeta.runs.some(r => r.runId === filterRunId);
          if (!exists) setFilterRunId(RUN_FILTER_LATEST);
        }, [runMeta, filterRunId, runIdFromUrl]);

        const buildTradesUrl = useCallback((runId, liveOnly = false) => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/trades`;
          if (runId) return `${base}?run_id=${encodeURIComponent(runId)}`;
          if (liveOnly) return `${base}?live=1`;
          return base;
        }, []);
        const buildAnnotationsUrl = useCallback((runId) => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/annotations?all=1`;
          return runId ? `${base}&run_id=${encodeURIComponent(runId)}` : base;
        }, []);
        const resolveLatestCompletedRunId = useCallback((runs) => {
          const list = Array.isArray(runs) ? runs : [];
          const match = list.find(r => String(r?.status || "").trim().toLowerCase() === "completed" && Number(r?.total_trades || 0) > 0);
          return match ? String(match.run_id || "").trim() : "";
        }, []);
        const refreshRuns = useCallback(async () => {
          try {
            const r = await fetch(`${API_BASE}/timed/admin/runs?limit=100&include_archived=1`, fetchOpts);
            const d = await r.json();
            if (d.ok && Array.isArray(d.runs)) {
              setAvailableRuns(d.runs);
              return d.runs;
            } else if (d?.error === "unauthorized") {
              setError("Admin access required");
            }
          } catch (_) {
            setError("Failed to load runs");
          }
          return [];
        }, []);

        const refreshAnnotations = useCallback(async () => {
          try {
            const r = await fetch(annotationsUrl, fetchOpts);
            const d = await r.json();
            if (d.ok && d.annotations) setAnnotations(d.annotations);
          } catch (_) {}
        }, [annotationsUrl]);

        const refreshTrades = useCallback(async () => {
          try {
            const r = await fetch(tradesUrl, fetchOpts);
            const d = await r.json();
            if (d.ok && Array.isArray(d.trades)) {
              setTrades(d.trades);
              setSelectedTrade(prev => {
                if (!prev) return prev;
                const id = prev.trade_id || prev.id || `${prev.ticker}-${prev.entry_ts}`;
                const updated = d.trades.find(t => (t.trade_id || t.id || `${t.ticker}-${t.entry_ts}`) === id);
                return updated || prev;
              });
            } else if (d?.error === "unauthorized") {
              setError("Admin access required");
            }
          } catch (_) {
            setError("Failed to load trades");
          }
        }, [tradesUrl]);

        const refreshAll = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const runs = await refreshRuns();
            const resolvedRunId = String(runIdFromUrl || "").trim() || resolveSelectedRunId(filterRunId, resolveLatestCompletedRunId(runs));
            const liveOnly = !String(runIdFromUrl || "").trim() && filterRunId === RUN_FILTER_LIVE;
            const [tradesRes, annRes] = await Promise.all([
              fetch(buildTradesUrl(resolvedRunId, liveOnly), fetchOpts).then(r => r.json()),
              fetch(buildAnnotationsUrl(resolvedRunId), fetchOpts).then(r => r.json()),
            ]);
            if (tradesRes.ok && Array.isArray(tradesRes.trades)) setTrades(tradesRes.trades);
            else setError(tradesRes?.error === "unauthorized" ? "Admin access required" : "Failed to load trades");
            if (annRes.ok && annRes.annotations) setAnnotations(annRes.annotations);
          } catch (_) {
            setError("Failed to load trades");
          } finally {
            setLoading(false);
          }
        }, [buildAnnotationsUrl, buildTradesUrl, filterRunId, refreshRuns, resolveLatestCompletedRunId, resolveSelectedRunId, runIdFromUrl]);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          (async () => {
            try {
              const runsRes = await fetch(`${API_BASE}/timed/admin/runs?limit=100&include_archived=1`, fetchOpts).then(r => r.json());
              if (cancelled) return;
              const runs = runsRes.ok && Array.isArray(runsRes.runs) ? runsRes.runs : [];
              if (runsRes.ok && Array.isArray(runsRes.runs)) setAvailableRuns(runsRes.runs);
              else if (runsRes?.error === "unauthorized") {
                setError("Admin access required");
                return;
              }
              const resolvedRunId = String(runIdFromUrl || "").trim() || resolveSelectedRunId(filterRunId, resolveLatestCompletedRunId(runs));
              const liveOnly = !String(runIdFromUrl || "").trim() && filterRunId === RUN_FILTER_LIVE;
              const [tradesData, annData] = await Promise.all([
                fetch(buildTradesUrl(resolvedRunId, liveOnly), fetchOpts).then(r => r.json()),
                fetch(buildAnnotationsUrl(resolvedRunId), fetchOpts).then(r => r.json()),
              ]);
              if (cancelled) return;
              if (tradesData.ok && Array.isArray(tradesData.trades)) setTrades(tradesData.trades);
              else setError(tradesData?.error === "unauthorized" ? "Admin access required" : "Failed to load trades");
              if (annData.ok && annData.annotations) setAnnotations(annData.annotations);
            } catch (_) {
              if (!cancelled) setError("Failed to load trades");
            } finally {
              if (!cancelled) setLoading(false);
            }
          })();
          return () => { cancelled = true; };
        }, [buildAnnotationsUrl, buildTradesUrl, filterRunId, resolveLatestCompletedRunId, resolveSelectedRunId, runIdFromUrl]);

        // Deep link: ?trade_id=XXX — open that trade's autopsy modal when trades are loaded
        useEffect(() => {
          if (!tradeIdFromUrl || !trades.length) return;
          const match = trades.find(t => (t.trade_id || t.id || "") === tradeIdFromUrl);

            try { window.history.replaceState(null, "", `${window.location.pathname}?${qs}`); } catch (_) {}
          }

        useEffect(() => {

          const exists = trades.some(t => String(t?.run_id || "").trim() === String(runIdFromUrl).trim());
          if (exists) setFilterRunId(String(runIdFromUrl).trim());
        }, [runIdFromUrl, trades]);

        useEffect(() => {
          if (!liveRun || (filterRunId !== RUN_FILTER_LIVE && filterRunId !== RUN_FILTER_LATEST)) return;
          const iv = setInterval(() => { refreshAll(); }, 60_000);
          return () => clearInterval(iv);
        }, [liveRun, filterRunId, refreshAll]);

        const filteredTrades = useMemo(() => {
          let out = trades;
          const effectiveRunId = resolveSelectedRunId(filterRunId, runMeta.latestRunId);
          if (effectiveRunId) {
            out = out.filter(t => String(t?.run_id || "").trim() === effectiveRunId);
          }
          if (filterTicker.trim()) {
            const q = filterTicker.trim().toUpperCase();
            out = out.filter(t => String(t.ticker || "").toUpperCase().includes(q));
          }
          if (filterClassification) {
            out = out.filter(t => {
              const id = t?.trade_id || t?.id || `${t?.ticker}-${t?.entry_ts}`;
              return (annotations[id]?.classification || "") === filterClassification;
            });
          }
          if (filterDateFrom) {
            const fromMs = new Date(filterDateFrom + "T00:00:00").getTime();
            out = out.filter(t => (t.entry_ts || 0) >= fromMs);
          }
          if (filterDateTo) {
            const toMs = new Date(filterDateTo + "T23:59:59").getTime();
            out = out.filter(t => (t.entry_ts || 0) <= toMs);
          }
          return out;
        }, [trades, annotations, filterTicker, filterClassification, filterDateFrom, filterDateTo, filterRunId, runMeta, resolveSelectedRunId]);

                      <button

                  {filterRunId === RUN_FILTER_LIVE && trades.length === 0 && (

                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Run ID</th>
                            <th className="px-4 py-3 text-right font-semibold text-[#6b7280]">P&L</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Status</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Classification</th>
                          </tr>
                        </thead>
                        <tbody>
                          {filteredTrades.map((t, i) => {
                            const ann = getAnnotation(t);
                            const clsOpt = CLASSIFICATION_OPTIONS.find(o => o.value === ann.classification);
                            return (
                              <tr
                                key={t.trade_id || t.id || i}
                                className="trade-row border-b border-white/[0.04]"
                                onClick={() => setSelectedTrade(t)}
                              >
                                <td className="px-4 py-2.5 font-medium text-white">{t.ticker}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{t.direction || "—"}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{formatDate(t.entry_ts)}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{formatDate(t.exit_ts)}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af] font-mono text-[11px]" title={t.run_id || ""}>{shortRunId(t.run_id)}</td>
                                <td className={`px-4 py-2.5 text-right font-medium ${Number(t.pnl) >= 0 ? "text-[#22c55e]" : "text-[#ef4444]"}`}>{fmtUsd(t.pnl)}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{t.status || "—"}</td>
                                <td className="px-4 py-2.5">
                                  <div className="flex flex-wrap items-center gap-1">
                                    {clsOpt?.value && (
                                      <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium" style={{ background: clsOpt.color + "18", color: clsOpt.color }}>
                                        {clsOpt.icon} {clsOpt.label}
                                      </span>
                                    )}
                                    {(ann.entry_grade?.length > 0 || ann.trade_management?.length > 0) && (
                                      <span className="text-[10px] text-[#6b7280]" title={`Entry: ${(ann.entry_grade || []).join(", ") || "—"}\nMgmt: ${(ann.trade_management || []).join(", ") || "—"}`}>
                                        +{(ann.entry_grade?.length || 0) + (ann.trade_management?.length || 0)} tags
                                      </span>
                                    )}
                                    {!clsOpt?.value && !ann.entry_grade?.length && !ann.trade_management?.length && <span className="text-[#4b5563]">—</span>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  {/* Mobile card list */}
                  <div className="md:hidden space-y-2">
                    {filteredTrades.map((t, i) => {
                      const ann = getAnnotation(t);
                      const clsOpt = CLASSIFICATION_OPTIONS.find(o => o.value === ann.classification);
                      return (
                        <div
                          key={t.trade_id || t.id || i}
                          className="tt-card p-3 active:bg-white/[0.04]"
                          onClick={() => setSelectedTrade(t)}
                        >
                          <div className="flex items-center justify-between mb-1.5">
                            <div className="flex items-center gap-2">
                              <span className="text-[14px] font-semibold text-white">{t.ticker}</span>
                              <span className="text-[11px] text-[#6b7280] px-1.5 py-0.5 rounded bg-white/[0.04]">{t.direction || "—"}</span>
                            </div>
                            <span className={`text-[14px] font-semibold ${Number(t.pnl) >= 0 ? "text-[#22c55e]" : "text-[#ef4444]"}`}>{fmtUsd(t.pnl)}</span>
                          </div>
                          <div className="flex items-center gap-3 text-[11px] text-[#6b7280]">
                            <span>{formatDate(t.entry_ts)}</span>
                            <span className="text-[#4b5563]">→</span>
                            <span>{formatDate(t.exit_ts)}</span>
                          </div>
                          <div className="mt-1 text-[10px] text-[#4b5563] font-mono break-all" title={t.run_id || ""}>Run: {shortRunId(t.run_id)}</div>
                          <div className="flex items-center justify-between mt-1.5 flex-wrap gap-1">
                            <span className="text-[11px] text-[#6b7280]">{t.status || ""}</span>
                            <div className="flex items-center gap-1">
                              {clsOpt?.value && (
                                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium" style={{ background: clsOpt.color + "18", color: clsOpt.color }}>
                                  {clsOpt.icon} {clsOpt.label}
                                </span>
                              )}
                              {(ann.entry_grade?.length > 0 || ann.trade_management?.length > 0) && (
                                <span className="text-[10px] text-[#6b7280]">+{(ann.entry_grade?.length || 0) + (ann.trade_management?.length || 0)} tags</span>
                              )}
                              {!clsOpt?.value && !ann.entry_grade?.length && !ann.trade_management?.length && <span className="text-[11px] text-[#4b5563]">Unclassified</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </main>

            <footer className="max-w-[1200px] mx-auto px-4 md:px-6 py-4 text-center text-[11px] text-[#4b5563]">
              For informational and educational purposes only. Not investment advice. Past performance does not guarantee future results. All trading involves risk of loss. <a href="/terms.html" className="text-[#6b7280] underline hover:text-[#9ca3af]">Full Terms</a> · Market data powered by <a href="https://twelvedata.com" target="_blank" rel="noopener" className="text-[#6b7280] underline hover:text-[#9ca3af]">Twelve Data</a>
            </footer>

            {selectedTrade && (
              <AutopsyModal
                trade={selectedTrade}
                annotations={getAnnotation(selectedTrade)}
                onSave={refreshAnnotations}
                onRefreshTrades={refreshTrades}
                onClose={() => {
                  setSelectedTrade(null);
                  if (isReadonly) {
                    if (window.history.length > 1) window.history.back();
                    else window.close();
                  }
                }}
                readonly={isReadonly}
              />
            )}
          </div>
        );
      }

      // Bootstrap through the shared auth gate so admin-only nav links and
      // page access use the same source of truth as the rest of the app.
      (function () {
        const AuthGate = window.TimedAuthGate;
        const root = document.getElementById("root");
        if (typeof AuthGate !== "function") {
          const session = window.TimedAuthHelpers?.getStoredSession?.();
          if (!session) {
            root.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-[#0b0e11] text-[#6b7280] font-[Inter]"><p>Please <a href="index-react.html" class="text-[#00c853]">sign in</a> to view Trade Autopsy.</p></div>';
            return;
          }
          const isAdmin = session.role === "admin" || session.tier === "admin";
          document.body.dataset.userRole = isAdmin ? "admin" : (session.role || "member");
          document.body.dataset.userTier = session.tier || "free";
          ReactDOM.createRoot(root).render(<App user={session} />);
          return;
        }
        ReactDOM.createRoot(root).render(
          <AuthGate apiBase={API_BASE} requiredTier="admin">
            {(user) => <App user={user} />}
          </AuthGate>
        );
      })();
    </script>
  </body>
</html>
