      // ── Groups (GRNY/GRNI/GRNJ loaded dynamically from ETF sync) ──
      const GROUPS = {
        UPTICKS: new Set([
          "RDDT","AMZN","BABA","TSLA","KO","WMT","ETHA","BRK-B","MTB",
          "AMGN","GILD","CSX","GEV","HII","JCI","PH","PWR","TT",

        ]),

          "XLK","XLF","XLY","XLP","XLC","XLI","XLB","XLE","XLRE","XLU","XLV",
        ]),
        Futures: new Set(["ES1!","NQ1!","RTY1!","YM1!","GC1!","SI1!","CL1!","BTCUSD","ETHUSD"]),
      };
      // ETF weight map: { "AAPL": { GRNY: 2.50, GRNI: 2.55 }, ... }
      let _etfWeightMap = {};
      const GROUP_ORDER = ["SP_Sectors","Futures","UPTICKS","GRNI","GRNJ","GRNY"];

      // Load ETF groups and UPTICKS dynamically from backend
      async function loadETFGroups() {
        try {
          const [etfRes, upticksRes] = await Promise.all([
            fetch("/timed/etf/groups"),
            fetch(`${API_BASE}/timed/admin/upticks`, { credentials: "include" }),
          ]);
          const data = await etfRes.json();
          if (data.ok && data.groups) {
            for (const [etf, tickers] of Object.entries(data.groups)) {
              if (GROUPS[etf]) {
                GROUPS[etf] = new Set(tickers.map(t => String(t).toUpperCase()));
              }
            }
          }
          const upticksData = await upticksRes.json();
          if (upticksData.ok && Array.isArray(upticksData.tickers)) {
            GROUPS.UPTICKS = new Set(upticksData.tickers.map(t => String(t).toUpperCase()));
          }
          // Also load weight map for badges
          const holdingResults = await Promise.allSettled(
            ["GRNY", "GRNJ", "GRNI"].map(async (etf) => {
              const r = await fetch(`/timed/etf/holdings/${etf}`);
              const d = await r.json();
              return { etf, data: d };
            })
          );
          for (const result of holdingResults) {
            if (result.status !== "fulfilled") continue;
            const { etf, data: d } = result.value;
            if (!d?.ok || !Array.isArray(d.holdings)) continue;
            for (const h of d.holdings) {
              if (!_etfWeightMap[h.ticker]) _etfWeightMap[h.ticker] = {};
              _etfWeightMap[h.ticker][etf] = h.weight;
            }
          }
        } catch (e) {
          console.warn("[ETF GROUPS] Failed to load dynamic groups:", e);
        }
      }

      function groupsForTicker(t) {
        const T = String(t || "").toUpperCase();
        const out = [];
        for (const [g, set] of Object.entries(GROUPS)) {
          if (set.has(T)) out.push(g);
        }
        return out;
      }

      // Get ETF weight badge text for a ticker (e.g. "2.5%")
      function etfWeightBadge(ticker, group) {
        const w = _etfWeightMap[String(ticker).toUpperCase()]?.[group];
        return w ? `${w.toFixed(1)}%` : "";
      }

      // ── Helpers ──
      function pctColor(pct) {
        if (pct >= 80) return "#22c55e";
        if (pct >= 40) return "#f59e0b";
        return "#ef4444";
      }

      function pctBg(pct) {
        if (pct >= 80) return "rgba(34,197,94,0.12)";
        if (pct >= 40) return "rgba(245,158,11,0.12)";
        return "rgba(239,68,68,0.12)";
      }

      function formatAge(ts) {
        if (!ts) return "—";
        const now = Date.now();
        const ageMs = now - ts;
        if (ageMs < 0) return "now";
        const mins = Math.floor(ageMs / 60000);
        if (mins < 60) return `${mins}m ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}h ago`;
        const days = Math.floor(hrs / 24);
        if (days < 7) return `${days}d ago`;
        return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric" });
      }

      function formatDate(ts) {
        if (!ts) return "—";
        return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "2-digit" });

      // ── Core Universe Manager ──
      // Adds tickers to the canonical universe (SECTOR_MAP overlay in KV).
      // Once added, the ticker is scored + visible for ALL users (not just
      // the admin who added it). Uses POST /timed/admin/universe which
      // validates the ticker against the live market data feed before

      const GICS_SECTORS = [
        "Information Technology", "Health Care", "Financials", "Industrials",
        "Consumer Discretionary", "Consumer Staples", "Communication Services",
        "Energy", "Basic Materials", "Real Estate", "Utilities",
        "Index ETF", "Sector ETF", "Thematic ETF", "Commodity ETF",
        "Crypto", "Precious Metals", "Unknown",
      ];
      function CoreUniverseManager() {
        const [state, setState] = useState({ loading: true, data: null, error: null });
        const [tickerInput, setTickerInput] = useState("");
        const [sectorInput, setSectorInput] = useState("Information Technology");
        const [submitting, setSubmitting] = useState(false);
        const [msg, setMsg] = useState(null);
        const [open, setOpen] = useState(true);

        const load = async () => {
          setState((s) => ({ ...s, loading: true, error: null }));
          try {
            const r = await fetch(`${API_BASE}/timed/admin/universe`, { credentials: "include", cache: "no-store" });
            const d = await r.json();
            if (d.ok) {
              setState({ loading: false, data: d, error: null });
            } else {
              setState({ loading: false, data: null, error: d.error || "load_failed" });
            }
          } catch (e) {
            setState({ loading: false, data: null, error: e.message });
          }
        };
        useEffect(() => { load(); }, []);

        const add = async () => {
          const t = tickerInput.toUpperCase().trim();
          if (!t) return;
          if (!/^[A-Z]{1,5}(-[A-Z]{1,2})?$/.test(t)) {
            setMsg({ type: "error", text: `Invalid ticker format: ${t}` });
            return;
          }
          setSubmitting(true); setMsg(null);
          try {
            const r = await fetch(`${API_BASE}/timed/admin/universe`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ ticker: t, sector: sectorInput }),
            });
            const d = await r.json();
            if (d.ok) {
              setMsg({
                type: "success",
                text: d.already_in_core
                  ? `${t} is already in the core universe.`
                  : `${t} added to the universe — backfill + scoring starting (~2-5 min).`,
              });
              setTickerInput("");
              load();
            } else {
              setMsg({ type: "error", text: `${d.error || "add_failed"}${d.detail ? ` — ${d.detail}` : ""}` });
            }
          } catch (e) {
            setMsg({ type: "error", text: e.message });
          } finally { setSubmitting(false); }
        };

        const remove = async (ticker) => {
          if (!ticker) return;
          if (!confirm(`Remove ${ticker} from the universe? It will be hidden from all users.`)) return;
          setSubmitting(true); setMsg(null);
          try {
            const r = await fetch(`${API_BASE}/timed/admin/universe/${encodeURIComponent(ticker)}`, {
              method: "DELETE", credentials: "include",
            });
            const d = await r.json();
            if (d.ok) {
              setMsg({
                type: "success",
                text: d.was_canonical
                  ? `${ticker} added to removal blocklist (hardcoded — will be hidden on next isolate restart).`
                  : `${ticker} removed from the universe.`,
              });
              load();
            } else {
              setMsg({ type: "error", text: `${d.error || "remove_failed"}${d.detail ? ` — ${d.detail}` : ""}` });
            }
          } catch (e) {
            setMsg({ type: "error", text: e.message });
          } finally { setSubmitting(false); }
        };

        const overlay = state.data?.overlay || [];
        const removed = state.data?.removed || [];
        const totalActive = state.data?.total_active ?? "—";
        const coreCount = state.data?.core?.count ?? "—";

        return (
          <div className="tt-admin-section">
            <button onClick={() => setOpen((v) => !v)} className="tt-admin-head group">
              <span className="tt-admin-title" style={{ color: "var(--tt-accent)" }}>Core Universe</span>
              <span className="text-[10px] px-2 py-0.5 rounded-full" style={{ background: "var(--tt-accent-dim)", color: "var(--tt-accent)", fontFamily: "var(--tt-font-mono)" }}>{totalActive}</span>
              <span className="text-[10px]" style={{ color: "var(--tt-text-faint)" }}>
                core {coreCount} · overlay {overlay.length} · removed {removed.length}
              </span>
              <span className="text-xs ml-auto" style={{ color: "var(--tt-text-dim)" }}>{open ? "▲" : "▼"}</span>
            </button>
            {open && (
              <div className="mt-3 space-y-3">
                <div className="tt-page-lede" style={{ fontSize: 12 }}>
                  Add tickers here to update the live universe for all users. Validates against the market data feed, then runs backfill + scoring (~2–5 min). Use Fill / Score on empty rows below if coverage is stale.
                </div>

                <div className="flex items-center gap-2 flex-wrap">
                  <input
                    value={tickerInput}
                    onChange={(e) => setTickerInput(e.target.value)}
                    onKeyDown={(e) => e.key === "Enter" && add()}
                    placeholder="Ticker (e.g. IBM)"
                    className="tt-input w-40 uppercase"
                    style={{ fontFamily: "var(--tt-font-mono)" }}
                  />
                  <select
                    value={sectorInput}
                    onChange={(e) => setSectorInput(e.target.value)}
                    className="tt-input"
                  >
                    {GICS_SECTORS.map((s) => <option key={s} value={s}>{s}</option>)}
                  </select>
                  <button
                    onClick={add}
                    disabled={submitting || !tickerInput.trim()}
                    className="tt-btn tt-btn--primary"
                  >
                    {submitting ? <><span className="tt-spin" />Adding…</> : "Add to Universe"}
                  </button>
                </div>

                {msg && (
                  <div className={`text-xs px-2 py-1 rounded ${msg.type === "success" ? "text-green-400 bg-green-900/20" : "text-red-400 bg-red-900/20"}`}>
                    {msg.text}
                  </div>
                )}

                {/* Overlay list */}
                {overlay.length > 0 && (
                  <div>
                    <div className="text-[10px] text-gray-500 uppercase tracking-wide mb-1.5">Overlay (KV-added, not in core)</div>
                    <div className="flex flex-wrap gap-1.5">
                      {overlay.map((o) => (
                        <span key={o.ticker} className="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-cyan-500/10 border border-cyan-500/20 text-[11px] text-cyan-300 font-medium">
                          {o.ticker}
                          <span className="text-cyan-500/60 text-[9px]">· {o.sector || "Unknown"}</span>
                          <button onClick={() => remove(o.ticker)} className="text-cyan-500/60 hover:text-red-400 ml-0.5 text-[10px]" title="Remove from universe">✕</button>
                        </span>
                      ))}
                    </div>
                  </div>
                )}

                {/* Removed blocklist */}
                {removed.length > 0 && (
                  <div>
                    <div className="text-[10px] text-gray-500 uppercase tracking-wide mb-1.5">Removed (blocklist — won't be re-added)</div>
                    <div className="flex flex-wrap gap-1.5">
                      {removed.map((t) => (
                        <span key={t} className="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-red-500/5 border border-red-500/15 text-[11px] text-red-400/70 font-medium">
                          {t}
                        </span>
                      ))}
                    </div>
                  </div>
                )}

                {state.loading && <div className="text-[10px] text-gray-600">Loading…</div>}
                {state.error && <div className="text-[10px] text-red-400">Error: {state.error}</div>}
              </div>
            )}
          </div>
        );
      }

      }

      function formatBfLabel(status) {
        if (!status) return "Fill";
        if (status === "running" || status === "started") return "Filling…";
        if (status === "scoring...") return "Scoring…";
        if (status === "done") return "Done";
        if (typeof status === "string" && status.startsWith("error")) return "Retry";
        if (typeof status === "string" && (status.includes("bars") || status.includes("TF"))) {
          return status.length > 18 ? status.slice(0, 18) + "…" : status;
        }
        return String(status).slice(0, 14);
      }

      function formatScoreLabel(status) {
        if (!status) return "Score";
        if (status === "running") return "Scoring…";
        if (status === "ok") return "Scored";
        if (typeof status === "string" && status.startsWith("error")) return "Retry";
        return "Score";
      }

      // ── Main App ──
      function App() {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [search, setSearch] = useState("");
        const [sectorFilter, setSectorFilter] = useState("all");
        const [sortCol, setSortCol] = useState("ticker");
        const [sortDir, setSortDir] = useState("asc");
        const [selected, setSelected] = useState(new Set());
        const [actionStatus, setActionStatus] = useState(null);
        const [backfillStatus, setBackfillStatus] = useState({});
        const [priceData, setPriceData] = useState({});
        const [contextData, setContextData] = useState({}); // ticker -> {name, sector, industry, market_cap}
        const [pendingTickers, setPendingTickers] = useState(new Set()); // Optimistic: tickers just added, show until they appear from API
        const [watchlistLoaded, setWatchlistLoaded] = useState(false);
        const pollUntilRef = useRef(null);

        // Watchlist ticker list (GET /timed/tickers) — merged with ingestion-status so tickers
        // that are in the watchlist but missing from ingestion-status (e.g. eventual consistency)
        // still show until the next refresh.
        const [watchlistTickers, setWatchlistTickers] = useState([]);
        const normalizeTicker = useCallback((ticker) => String(ticker || "").toUpperCase().trim(), []);

        // Helper: get ticker context from enrichment data, fallback to hardcoded
        const getTickerName = useCallback((ticker) => {
          const ctx = contextData[ticker];
          if (ctx?.name) return ctx.name;
          if (CONTEXT_FALLBACKS[ticker]?.name) return CONTEXT_FALLBACKS[ticker].name;
          return COMPANY_NAMES[ticker] || "—";
        }, [contextData]);
        const getTickerIndustry = useCallback((ticker) => {
          const ctx = contextData[ticker];
          return ctx?.industry || CONTEXT_FALLBACKS[ticker]?.industry || "";
        }, [contextData]);
        const getTickerMCap = useCallback((ticker) => {
          const ctx = contextData[ticker];
          const v = ctx?.market_cap ? Number(ctx.market_cap) : null;
          if (!v || !Number.isFinite(v) || v <= 0) return null;
          return v;
        }, [contextData]);
        const fmtMCap = (v) => {
          if (!v) return "—";
          if (v >= 1e12) return `$${(v / 1e12).toFixed(1)}T`;
          if (v >= 1e9) return `$${(v / 1e9).toFixed(1)}B`;
          if (v >= 1e6) return `$${(v / 1e6).toFixed(0)}M`;
          return `$${v.toLocaleString()}`;
        };

        // ── Fetch data ──
        const fetchData = useCallback(async (clearPendingFromResponse = true, skipLoading = false) => {
          if (!skipLoading) setLoading(true);
          setError(null);
          let loadingCleared = false;
          try {
            const pricePromise = fetch(`${API_BASE}/timed/prices?_t=${Date.now()}`)
              .then(r => r.json())
              .then(pJson => {
                if (pJson?.ok && pJson.prices) {
                  setPriceData({ prices: pJson.prices, updated_at: pJson.updated_at });
                }
              })
              .catch(() => {});
            const requestTs = Date.now();
            const watchlistPromise = fetch(`${API_BASE}/timed/tickers?_t=${requestTs}`)
              .then(r => r.json())
              .then(tJson => {
                if (tJson.ok && Array.isArray(tJson.tickers)) {
                  setWatchlistTickers(tJson.tickers.map(normalizeTicker).filter(Boolean));
                  setWatchlistLoaded(true);
                }
              })
              .catch(() => {});
            const statusRes = await fetch(`${API_BASE}/timed/admin/ingestion-status?_t=${requestTs}`, { credentials: "include" });
            const json = await statusRes.json();
            if (!json.ok) throw new Error(json.error || "Failed to fetch");
            setData(json);
            if (Array.isArray(json.tickers)) {
              const ctx = {};
              json.tickers.forEach((row) => {
                if (row?.ticker && row?.context && typeof row.context === "object") {
                  ctx[normalizeTicker(row.ticker)] = row.context;
                }
              });
              // 2026-05-29 — B2: layer the hydrated ticker_metadata
              // (TwelveData /profile + /statistics, Finnhub fallback)
              // ON TOP of the inline context so the Tickers admin page
              // shows Name/Sector/Industry/MCap that was previously
              // blank for many tickers. The hydrate cron persists to
              // D1 ticker_metadata; we read it via the dedicated
              // admin endpoint here.
              try {
                const metaRes = await fetch(`${API_BASE}/timed/admin/ticker-metadata/all?_t=${requestTs}`, {
                  credentials: "include", cache: "no-store",
                });
                if (metaRes.ok) {
                  const metaJson = await metaRes.json();
                  if (metaJson?.ok && metaJson?.by_ticker) {
                    for (const [sym, meta] of Object.entries(metaJson.by_ticker)) {
                      const t = normalizeTicker(sym);
                      const merged = { ...(ctx[t] || {}) };
                      if (!merged.name && meta.name) merged.name = meta.name;
                      if (!merged.sector && meta.sector) merged.sector = meta.sector;
                      if (!merged.industry && meta.industry) merged.industry = meta.industry;
                      if (!merged.market_cap && meta.market_cap) merged.market_cap = meta.market_cap;
                      ctx[t] = merged;
                    }
                  }
                }
              } catch (_) { /* best-effort — fall back to context-only */ }
              setContextData(ctx);
            }
            if (clearPendingFromResponse && json.tickers && json.tickers.length) {
              setPendingTickers(prev => {
                const next = new Set(prev);
                json.tickers.forEach(t => next.delete(normalizeTicker(t.ticker)));
                return next;
              });
            }
            if (!skipLoading) {
              setLoading(false);
              loadingCleared = true;
            }
            void Promise.allSettled([pricePromise, watchlistPromise]);
          } catch (e) {
            setError(e.message);
          } finally {
            if (!skipLoading && !loadingCleared) setLoading(false);
          }
        }, [normalizeTicker]);

        useEffect(() => {
          loadETFGroups();
          fetchData();
        }, [fetchData]);

        // Periodic price refresh (every 45s) so Chg%/As of stays current
        useEffect(() => {
          const interval = setInterval(() => {
            fetch(`${API_BASE}/timed/prices?_t=${Date.now()}`)
              .then(r => r.json())
              .then(pJson => {
                if (pJson?.ok && pJson.prices) {
                  setPriceData({ prices: pJson.prices, updated_at: pJson.updated_at });
                }
              })
              .catch(() => {});
          }, 45_000);
          return () => clearInterval(interval);
        }, []);

        // After adding tickers: poll ingestion-status every 4s for ~2 min so coverage updates in real time
        useEffect(() => {
          if (pendingTickers.size === 0 || !pollUntilRef.current) return;
          const interval = setInterval(() => {
            if (Date.now() > pollUntilRef.current) {
              pollUntilRef.current = null;
              return;
            }
            fetchData(true, true);
          }, 4000);
          return () => clearInterval(interval);
        }, [pendingTickers.size, fetchData]);

        // ── Derived data: merge ingestion-status with watchlist + optimistic placeholders ──
        // So tickers in GET /timed/tickers but missing from ingestion-status (e.g. W, eventual consistency)
        // still show and persist when navigating away and back.
        const tickers = useMemo(() => {
          const fromApi = data?.tickers || [];
          const activeUniverse = new Set([
            ...(watchlistTickers || []).map(normalizeTicker).filter(Boolean),
            ...Array.from(pendingTickers).map(normalizeTicker).filter(Boolean),
          ]);
          const filteredFromApi = watchlistLoaded
            ? fromApi.filter(t => activeUniverse.has(normalizeTicker(t.ticker)))
            : fromApi;
          const enrichedFromApi = filteredFromApi.map((t) => {
            const hasData = Object.values(t.tfs || {}).some((tf) => tf && tf.count > 0);
            if (t.needs_onboard || (!hasData && (t.pct === 0 || t.quality === 0))) {
              return { ...t, needs_onboard: true };
            }
            return t;
          });
          const fromApiSet = new Set(enrichedFromApi.map(t => normalizeTicker(t.ticker)));
          const missingFromApi = watchlistLoaded
            ? [...activeUniverse].filter(t => !fromApiSet.has(t))
            : [...new Set([
                ...Array.from(pendingTickers).map(normalizeTicker).filter(Boolean),
                ...(watchlistTickers || []).map(normalizeTicker).filter(t => t && !fromApiSet.has(t)),
              ])];
          const placeholders = [...missingFromApi]
            .filter(t => t && !fromApiSet.has(t))
            .map(t => ({
              ticker: String(t).toUpperCase(),
              sector: "Unknown",
              pct: 0,
              quality: 0,
              missing: [...TFS],
              tfs: {},
              coverage_pending: true,
            }));
          const combined = [...enrichedFromApi, ...placeholders];
          const seen = new Set();
          const deduped = combined.filter(r => {
            const k = normalizeTicker(r.ticker);
            if (seen.has(k)) return false;
            seen.add(k);
            return true;
          });
          return deduped.sort((a, b) => (a.ticker || "").localeCompare(b.ticker || ""));
        }, [data, pendingTickers, watchlistLoaded, watchlistTickers, normalizeTicker]);

        const summaryStats = useMemo(() => {
          const total = watchlistLoaded
            ? new Set([
                ...(watchlistTickers || []).map(normalizeTicker).filter(Boolean),
                ...Array.from(pendingTickers).map(normalizeTicker).filter(Boolean),
              ]).size
            : (data?.summary?.total_tickers_in_system || tickers.length);
          const withData = tickers.filter(t => Object.values(t.tfs || {}).some(tf => tf && tf.count > 0)).length;
          return {
            total,
            withData,
            noData: Math.max(0, total - withData),
          };
        }, [data, pendingTickers, tickers, watchlistLoaded, watchlistTickers, normalizeTicker]);

        const sectors = useMemo(() => {
          const s = new Set(tickers.map(t => t.sector).filter(Boolean));
          return ["all", ...Array.from(s).sort()];
        }, [tickers]);

        const filtered = useMemo(() => {
          let items = tickers;
          if (search) {
            const q = search.toUpperCase();
            items = items.filter(t => {
              if (t.ticker.includes(q)) return true;
              const name = getTickerName(t.ticker);
              if (name && name.toUpperCase().includes(q)) return true;
              const ind = getTickerIndustry(t.ticker);
              if (ind && ind.toUpperCase().includes(q)) return true;
              return false;
            });
          }
          if (sectorFilter !== "all") {
            items = items.filter(t => t.sector === sectorFilter);
          }
          // Sort
          items = [...items].sort((a, b) => {
            let va, vb;
            if (sortCol === "ticker") { va = a.ticker; vb = b.ticker; }
            else if (sortCol === "sector") { va = a.sector || ""; vb = b.sector || ""; }
            else if (sortCol === "industry") { va = getTickerIndustry(a.ticker) || ""; vb = getTickerIndustry(b.ticker) || ""; }
            else if (sortCol === "mcap") { va = getTickerMCap(a.ticker) || 0; vb = getTickerMCap(b.ticker) || 0; }
            else if (sortCol === "pct") { va = a.pct; vb = b.pct; }
            else if (sortCol === "price") {
              va = priceData?.prices?.[a.ticker]?.p ?? -1;
              vb = priceData?.prices?.[b.ticker]?.p ?? -1;
            }
            else if (sortCol === "change") {
              va = priceData?.prices?.[a.ticker]?.dp ?? -999;
              vb = priceData?.prices?.[b.ticker]?.dp ?? -999;
            }
            else if (TFS.includes(sortCol)) {
              va = a.tfs?.[sortCol]?.pct ?? -1;
              vb = b.tfs?.[sortCol]?.pct ?? -1;
            } else { va = a.ticker; vb = b.ticker; }
            if (typeof va === "string") {
              return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
            }
            return sortDir === "asc" ? va - vb : vb - va;
          });
          return items;
        }, [tickers, search, sectorFilter, sortCol, sortDir, contextData, getTickerName, getTickerIndustry, getTickerMCap]);

        // ── Sort handler ──
        function handleSort(col) {
          if (sortCol === col) {
            setSortDir(d => d === "asc" ? "desc" : "asc");
          } else {
            setSortCol(col);
            setSortDir(col === "ticker" || col === "sector" ? "asc" : "desc");
          }
        }

        function sortArrow(col) {
          if (sortCol !== col) return "";
          return sortDir === "asc" ? " \u25B2" : " \u25BC";
        }

        // ── Selection ──
        function toggleSelect(ticker) {
          setSelected(prev => {
            const next = new Set(prev);
            if (next.has(ticker)) next.delete(ticker);
            else next.add(ticker);
            return next;
          });
        }

        function toggleSelectAll() {
          if (selected.size === filtered.length) {
            setSelected(new Set());
          } else {
            setSelected(new Set(filtered.map(t => t.ticker)));
          }
        }

        // ── Remove tickers ──
        async function handleRemove(tickerList) {
          if (!tickerList || tickerList.length === 0) return;
          const confirmed = window.confirm(`Remove ${tickerList.length} ticker(s)?\n${tickerList.join(", ")}\n\nThis removes from the index (candle data in D1 is preserved).`);
          if (!confirmed) return;

          setActionStatus({ type: "info", msg: `Removing ${tickerList.join(", ")}...` });
          try {
            const res = await fetch(`${API_BASE}/timed/watchlist/remove`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ tickers: tickerList }),
            });
            const json = await res.json();
            if (json.ok) {
              const removedList = (Array.isArray(json.removedTickers) ? json.removedTickers : tickerList)
                .map(normalizeTicker)
                .filter(Boolean);
              const removedSet = new Set(removedList);
              setWatchlistTickers(prev => (prev || []).filter(t => !removedSet.has(normalizeTicker(t))));
              setPendingTickers(prev => {
                const next = new Set(prev);
                removedList.forEach(t => next.delete(t));
                return next;
              });
              setWatchlistLoaded(true);
              setActionStatus({ type: "success", msg: `Removed ${json.removed} ticker(s).` });
              setSelected(new Set());
              fetchData();
            } else {
              setActionStatus({ type: "error", msg: json.error });
            }
          } catch (e) {
            setActionStatus({ type: "error", msg: e.message });
          }
        }

        // ── Sequential backfill state ──
        const [seqBackfill, setSeqBackfill] = useState(null); // { running, current, index, total, log, cancelled }
        const seqCancelRef = useRef(false);
        const [scoreStatus, setScoreStatus] = useState({}); // { ticker: "running"|"ok"|"error" }

        // ── Run onboard (score) — single ticker, skipBackfill when candles already filled ──
        async function handleRunOnboard(ticker) {
          const isTV = TV_TICKERS.has(ticker);
          if (isTV) return;
          setScoreStatus(prev => ({ ...prev, [ticker]: "running" }));
          try {
            const res = await fetch(`${API_BASE}/timed/admin/onboard?ticker=${encodeURIComponent(ticker)}&skipBackfill=1`, {
              method: "POST",
              credentials: "include",
            });
            const json = await res.json();
            if (json.ok && (json.results?.[0]?.ok ?? json.ok)) {
              setScoreStatus(prev => ({ ...prev, [ticker]: "ok" }));
              fetchData();
              setTimeout(() => setScoreStatus(prev => { const n = { ...prev }; delete n[ticker]; return n; }), 3000);
            } else {
              const err = json.results?.[0]?.error ?? json.error ?? "unknown";
              setScoreStatus(prev => ({ ...prev, [ticker]: `error: ${err}` }));
            }
          } catch (e) {
            setScoreStatus(prev => ({ ...prev, [ticker]: `error: ${e.message}` }));
          }
        }

        // ── Fill gaps (backfill) — single ticker; after completion runs onboard to compute scores ──
        async function handleFillGaps(ticker) {
          const isTV = TV_TICKERS.has(ticker);
          if (isTV) return;

          if (ticker === "__SEQ_ALL__") {
            return handleFillAllSequential();
          }

          setBackfillStatus(prev => ({ ...prev, [ticker]: "running" }));
          try {
            const endpoint = `${API_BASE}/timed/admin/alpaca-backfill?tf=all&ticker=${ticker}`;
            const res = await fetch(endpoint, { method: "POST", credentials: "include" });
            const json = await res.json();
            if (json.ok) {
              setBackfillStatus(prev => ({ ...prev, [ticker]: "started" }));
              // Poll for completion, then run onboard (score) and refresh
              const pollDone = async () => {
                for (let attempt = 0; attempt < 60; attempt++) {
                  await new Promise(r => setTimeout(r, 3000));
                  try {
                    const s = await fetch(`${API_BASE}/timed/admin/backfill-status`, { credentials: "include" }).then(r => r.json());
                    const phase = s?.status?.phase;
                    if (phase === "done" || !phase) break;
                    setBackfillStatus(prev => ({
                      ...prev,
                      [ticker]: `${s.status.tf || ""} ${s.status.upserted || 0} bars`,
                    }));
                  } catch { break; }
                }
                setBackfillStatus(prev => { const n = { ...prev }; delete n[ticker]; return n; });
                // Run onboard to compute scores from newly filled candles
                setBackfillStatus(prev => ({ ...prev, [ticker]: "scoring..." }));
                try {
                  const onRes = await fetch(`${API_BASE}/timed/admin/onboard?ticker=${encodeURIComponent(ticker)}&skipBackfill=1`, {
                    method: "POST",
                    credentials: "include",
                  });
                  const onJson = await onRes.json();
                  if (onJson.ok && (onJson.results?.[0]?.ok ?? onJson.ok)) {
                    setBackfillStatus(prev => ({ ...prev, [ticker]: "done" }));
                  }
                } catch (_) { /* scoring may fail if insufficient data */ }
                setBackfillStatus(prev => { const n = { ...prev }; delete n[ticker]; return n; });
                fetchData();
              };
              pollDone();
            } else {
              setBackfillStatus(prev => ({ ...prev, [ticker]: `error: ${json.error || "unknown"}` }));
            }
          } catch (e) {
            setBackfillStatus(prev => ({ ...prev, [ticker]: `error: ${e.message}` }));
          }
        }

        // ── Fill ALL tickers sequentially, one at a time ──
        async function handleFillAllSequential() {
          if (seqBackfill?.running) return;
          seqCancelRef.current = false;

          // Get non-TV tickers that need filling (quality < 100)
          const tickersToFill = (data?.tickers || [])
            .filter(t => !TV_TICKERS.has(t.ticker) && (t.quality ?? t.pct) < 100)
            .map(t => t.ticker);

          if (tickersToFill.length === 0) {
            setActionStatus({ type: "success", msg: "All tickers already at 100% quality." });
            return;
          }

          const log = [];
          setSeqBackfill({ running: true, current: tickersToFill[0], index: 0, total: tickersToFill.length, log, cancelled: false });

          for (let i = 0; i < tickersToFill.length; i++) {
            if (seqCancelRef.current) {
              log.push(`Cancelled at ${i}/${tickersToFill.length}`);
              setSeqBackfill(prev => ({ ...prev, running: false, cancelled: true, log: [...log] }));
              fetchData();
              return;
            }

            const ticker = tickersToFill[i];
            setSeqBackfill(prev => ({ ...prev, current: ticker, index: i, log: [...log] }));
            setBackfillStatus(prev => ({ ...prev, [ticker]: "running" }));

            try {
              // Trigger backfill for this ticker
              const res = await fetch(`${API_BASE}/timed/admin/alpaca-backfill?tf=all&ticker=${ticker}`, { method: "POST", credentials: "include" });
              const json = await res.json();
              if (!json.ok) {
                log.push(`${ticker}: error — ${json.error || "unknown"}`);
                setBackfillStatus(prev => ({ ...prev, [ticker]: "error" }));
                continue;
              }

              // Poll for this ticker's backfill to complete
              let finalBars = 0;
              for (let attempt = 0; attempt < 120; attempt++) {
                await new Promise(r => setTimeout(r, 2000));
                if (seqCancelRef.current) break;
                try {
                  const s = await fetch(`${API_BASE}/timed/admin/backfill-status`, { credentials: "include" }).then(r => r.json());
                  const phase = s?.status?.phase;
                  const upserted = s?.status?.upserted || 0;
                  const tf = s?.status?.tf || "";
                  const tfIdx = s?.status?.tfIndex || 0;
                  const tfTotal = s?.status?.tfTotal || 9;
                  finalBars = upserted;

                  setBackfillStatus(prev => ({
                    ...prev,
                    [ticker]: `TF ${tf} (${tfIdx}/${tfTotal}) — ${upserted} bars`,
                  }));
                  setSeqBackfill(prev => ({
                    ...prev,
                    progress: `TF ${tf} (${tfIdx}/${tfTotal}) — ${upserted} bars`,
                    log: [...log],
                  }));

                  if (phase === "done" || !phase) break;
                } catch { break; }
              }

              log.push(`${ticker}: ${finalBars} bars`);
              setBackfillStatus(prev => { const n = { ...prev }; delete n[ticker]; return n; });
            } catch (e) {
              log.push(`${ticker}: error — ${e.message}`);
              setBackfillStatus(prev => ({ ...prev, [ticker]: "error" }));
            }
          }

          setSeqBackfill(prev => ({ ...prev, running: false, current: null, log: [...log] }));
          fetchData();
        }

        // ── TF cell (shows quality, not just count-based pct) ──
        function TFCell({ tfData }) {
          if (!tfData || tfData.count === 0) {
            return (
              <td className="px-1 py-1 text-center" style={{ minWidth: 52 }}>
                <div className="text-[9px] text-gray-600">—</div>
              </td>
            );
          }
          // Use quality score if available, fall back to pct
          const q = tfData.quality != null ? tfData.quality : tfData.pct;
          const gapDays = tfData.gap_days;
          const hasGaps = gapDays != null && gapDays > 3;
          const freshHrs = tfData.freshness_hours;
          const isStale = freshHrs != null && freshHrs > 72;

          // Tooltip with detailed info
          const tip = [
            `Count: ${tfData.count}/${tfData.expected}`,
            freshHrs != null ? `Freshness: ${freshHrs < 1 ? '<1h' : freshHrs < 24 ? Math.round(freshHrs) + 'h' : Math.round(freshHrs/24) + 'd'} ago` : null,
            gapDays != null ? `Gap days (30d): ${gapDays}` : null,
            tfData.recent_dates != null ? `Trading dates (30d): ${tfData.recent_dates}` : null,
            `Quality: ${q}%`,
          ].filter(Boolean).join('\n');

          return (
            <td className="px-1 py-1 text-center" style={{ background: pctBg(q), minWidth: 52 }} title={tip}>
              <div className="text-[11px] font-semibold leading-tight" style={{ color: pctColor(q) }}>
                {q}%
                {hasGaps && <span className="text-[8px] text-amber-400 ml-0.5" title={`${gapDays} gap days`}>⚠</span>}
              </div>
              <div className="text-[8px] leading-tight" style={{ color: isStale ? '#ef4444' : '#6b7280' }} title={formatDate(tfData.max_ts)}>
                {formatAge(tfData.max_ts)}
              </div>
            </td>
          );
        }

        // ── Render ──
        return (
          <div className="min-h-screen pb-16" style={{ background: "var(--tt-bg-base)" }}>
            <div className="tt-page space-y-4">
              {/* Page header */}
              <div className="tt-card tt-card-pad">
                <h1 className="tt-page-title">Ticker Universe</h1>
                <p className="tt-page-lede">
                  Source of truth for the active universe. Add via Core Universe below; use Fill then Score on rows missing coverage.
                </p>
                {(summaryStats.total > 0 || data?.summary) && (
                  <div className="flex flex-wrap gap-3 mt-4">
                    <div className="tt-stat"><div className="tt-stat-label">In System</div><div className="tt-stat-value">{summaryStats.total}</div></div>
                    <div className="tt-stat"><div className="tt-stat-label">With Data</div><div className="tt-stat-value" style={{ color: "var(--tt-up)" }}>{summaryStats.withData}</div></div>
                    <div className="tt-stat"><div className="tt-stat-label">No Data</div><div className="tt-stat-value" style={{ color: summaryStats.noData > 0 ? "var(--tt-dn)" : "var(--tt-up)" }}>{summaryStats.noData}</div></div>
                    <div className="tt-stat"><div className="tt-stat-label">Showing</div><div className="tt-stat-value">{filtered.length}</div></div>
                  </div>
                )}
              </div>

              {/* Admin controls — top */}
              <div className="tt-card tt-card-pad">
                <CoreUniverseManager />
                <UptickManager />
                <MemberTickerListManager />
                <SectorRatingsManager />
                <div className="tt-admin-section" style={{ paddingTop: 12 }}>
                  <div className="flex items-center gap-3 flex-wrap">
                    <span className="tt-admin-title" style={{ color: "var(--tt-text-faint)" }}>Admin Tools</span>
                    <a href="brand-kit.html" className="tt-btn tt-btn--ghost" style={{ textDecoration: "none" }}>Brand Kit</a>
                    <a href="debug-dashboard.html" className="tt-btn tt-btn--ghost" style={{ textDecoration: "none" }}>Debug Dashboard</a>
                  </div>
                </div>
              </div>

              {/* Coverage toolbar */}
              <div className="tt-card tt-card-pad">
              <div className="flex flex-wrap items-center gap-3">
                <button onClick={fetchData} disabled={loading} className="tt-btn tt-btn--ghost">
                  {loading ? <><span className="tt-spin" />Loading…</> : "Refresh"}
                </button>
                <input
                  type="text"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  placeholder="Search tickers…"
                  className="tt-input w-48"
                />
                <select value={sectorFilter} onChange={e => setSectorFilter(e.target.value)} className="tt-input">
                  {sectors.map(s => (
                    <option key={s} value={s}>{s === "all" ? "All Sectors" : s}</option>
                  ))}
                </select>
                {selected.size > 0 && (
                  <div className="flex items-center gap-2">
                    <span className="text-xs" style={{ color: "var(--tt-text-muted)" }}>{selected.size} selected</span>
                    <button onClick={() => handleRemove([...selected])} className="tt-btn tt-btn--danger">Remove Selected</button>
                    <button onClick={() => setSelected(new Set())} className="tt-btn tt-btn--ghost">Clear</button>
                  </div>
                )}
                <div className="ml-auto flex items-center gap-2">
                  <button
                    onClick={() => handleFillGaps("__SEQ_ALL__")}
                    disabled={seqBackfill?.running}
                    className="tt-btn tt-btn--fill"
                  >
                    {seqBackfill?.running ? `Filling ${seqBackfill.index + 1}/${seqBackfill.total}…` : "Fill All Gaps"}
                  </button>
                </div>
              </div>

              {(seqBackfill?.running || actionStatus) && (
                <div className="tt-progress mt-3">
                  {seqBackfill?.running && (
                    <div>
                      <span className="tt-spin" />
                      <strong>{seqBackfill.current}</strong> — {seqBackfill.index + 1} of {seqBackfill.total}
                      {seqBackfill.progress ? ` · ${seqBackfill.progress}` : ""}
                      <button onClick={() => { seqCancelRef.current = true; }} className="tt-btn tt-btn--danger ml-3" style={{ padding: "4px 10px", fontSize: 11 }}>Stop</button>
                    </div>
                  )}
                  {actionStatus && (
                    <div style={{ color: actionStatus.type === "error" ? "var(--tt-dn)" : actionStatus.type === "success" ? "var(--tt-up)" : "var(--tt-text-muted)" }}>
                      {actionStatus.msg}
                      <button onClick={() => setActionStatus(null)} className="ml-3 text-xs opacity-70 hover:opacity-100" style={{ background: "none", border: "none", color: "inherit", cursor: "pointer" }}>Dismiss</button>
                    </div>
                  )}
                </div>
              )}
              {!seqBackfill?.running && seqBackfill?.log?.length > 0 && (
                <div className="text-xs mt-2" style={{ color: "var(--tt-text-faint)" }}>
                  Last fill run: {seqBackfill.log.length} tickers {seqBackfill.cancelled ? "(stopped early)" : "completed"}
                </div>
              )}
              </div>

              {/* Error */}
              {error && (
                <div className="bg-red-900/20 border border-red-800/40 rounded px-4 py-3 text-red-400 text-sm">
                  Error: {error}
                  <button onClick={fetchData} className="ml-3 underline text-xs">Retry</button>
                </div>
              )}

              {/* Table */}
              {!loading && filtered.length > 0 && (
                <div className="tt-card overflow-x-auto" style={{ padding: 0 }}>
                  <table className="text-sm" style={{ minWidth: 1700 }}>
                    <thead>
                      <tr className="bg-white/[0.03] border-b border-white/5">
                        <th className="px-2 py-2 text-left w-8">
                          <input
                            type="checkbox"
                            checked={selected.size === filtered.length && filtered.length > 0}
                            onChange={toggleSelectAll}
                            className="accent-blue-500"
                          />
                        </th>
                        <th
                          className="px-3 py-2 text-left text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("ticker")}
                        >
                          Ticker{sortArrow("ticker")}
                        </th>
                        <th className="px-2 py-2 text-left text-xs font-medium text-gray-400">Name</th>
                        <th
                          className="px-2 py-2 text-left text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("sector")}
                        >
                          Sector{sortArrow("sector")}
                        </th>
                        <th
                          className="px-2 py-2 text-left text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("industry")}
                        >
                          Industry{sortArrow("industry")}
                        </th>
                        <th
                          className="px-2 py-2 text-right text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("mcap")}
                        >
                          MCap{sortArrow("mcap")}
                        </th>
                        <th className="px-2 py-2 text-left text-xs font-medium text-gray-400">Groups</th>
                        <th
                          className="px-2 py-2 text-center text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("pct")}
                        >
                          Avg{sortArrow("pct")}
                        </th>
                        <th
                          className="px-2 py-2 text-right text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("price")}
                        >
                          Price{sortArrow("price")}
                        </th>
                        <th
                          className="px-2 py-2 text-right text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                          onClick={() => handleSort("change")}
                        >
                          Chg% / As Of{sortArrow("change")}
                        </th>
                        {TFS.map(tf => (
                          <th
                            key={tf}
                            className="px-2 py-2 text-center text-xs font-medium text-gray-400 cursor-pointer hover:text-white select-none"
                            onClick={() => handleSort(tf)}
                          >
                            {TF_LABELS[tf]}{sortArrow(tf)}
                          </th>
                        ))}
                        <th className="px-3 py-2 text-center text-xs font-medium text-gray-400">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((t, idx) => {
                        const isTV = TV_TICKERS.has(t.ticker);
                        const bfStatus = backfillStatus[t.ticker];
                        return (
                          <tr
                            key={t.ticker}
                            className={`border-b border-white/[0.03] hover:bg-white/[0.02] ${
                              selected.has(t.ticker) ? "bg-blue-900/10" : ""
                            } ${(t.coverage_pending || t.backfilling) ? "bg-blue-900/5" : ""} ${t.needs_onboard && !t.coverage_pending ? "bg-amber-900/5" : ""} ${idx % 2 === 0 ? "" : "bg-white/[0.01]"}`}
                          >
                            <td className="px-2 py-1.5">
                              <input
                                type="checkbox"
                                checked={selected.has(t.ticker)}
                                onChange={() => toggleSelect(t.ticker)}
                                className="accent-blue-500"
                              />
                            </td>
                            <td className="px-3 py-1.5">
                              <a
                                href={`index-react.html#ticker=${encodeURIComponent(t.ticker)}`}
                                className="font-semibold text-blue-400 hover:text-blue-300 text-xs cursor-pointer hover:underline"
                                title={`View ${t.ticker} details on Dashboard`}
                              >{t.ticker}</a>
                              {(t.coverage_pending || t.backfilling) && (
                                <span className="ml-1.5 text-[9px] px-1 py-0.5 rounded bg-amber-900/40 text-amber-400" title="Registry entry exists but candle coverage has not synced yet — use Fill then Score">
                                  Sync pending
                                </span>
                              )}
                              {t.needs_onboard && !t.coverage_pending && !t.backfilling && (
                                <span className="ml-1.5 text-[9px] px-1 py-0.5 rounded bg-orange-900/40 text-orange-300" title="No candle data in D1 — run Fill (backfill) then Score to onboard">
                                  Needs onboard
                                </span>
                              )}
                              {isTV && !t.coverage_pending && !t.backfilling && !t.needs_onboard && <span className="ml-1.5 text-[9px] px-1 py-0.5 rounded bg-purple-900/40 text-purple-400">TV</span>}
                            </td>
                            <td className="px-2 py-1 text-[11px] text-gray-400 max-w-[140px] truncate" title={getTickerName(t.ticker)}>{getTickerName(t.ticker)}</td>
                            <td className="px-2 py-1 text-[11px] text-gray-400 max-w-[100px] truncate" title={t.sector}>{t.sector || "—"}</td>
                            <td className="px-2 py-1 text-[11px] text-gray-500 max-w-[130px] truncate" title={getTickerIndustry(t.ticker)}>{getTickerIndustry(t.ticker) || "—"}</td>
                            <td className="px-2 py-1 text-[11px] text-right text-gray-500 tabular-nums whitespace-nowrap">
                              {(() => {
                                const mcap = getTickerMCap(t.ticker);
                                if (!mcap) return <span className="text-gray-600">—</span>;
                                const color = mcap >= 200e9 ? "text-blue-400" : mcap >= 10e9 ? "text-teal-400" : mcap >= 2e9 ? "text-gray-400" : "text-gray-500";
                                return <span className={color}>{fmtMCap(mcap)}</span>;
                              })()}
                            </td>
                            <td className="px-2 py-1">
                              {(() => {
                                const grps = groupsForTicker(t.ticker);
                                if (grps.length === 0) return <span className="text-[10px] text-gray-600">—</span>;
                                return (
                                  <div className="flex flex-wrap gap-0.5">
                                    {grps.map(g => {
                                      const wb = etfWeightBadge(t.ticker, g);
                                      return (
                                        <span key={g} className="text-[9px] px-1 py-0 rounded bg-gray-800 text-gray-400" title={wb ? `${g} weight: ${wb}` : g}>
                                          {g}{wb ? <span className="ml-0.5 text-[#00e676]">{wb}</span> : null}
                                        </span>
                                      );
                                    })}
                                  </div>
                                );
                              })()}
                            </td>
                            <td className="px-2 py-1.5 text-center" title={(t.coverage_pending || t.backfilling) ? "Waiting for coverage sync" : t.needs_onboard ? "No candles yet — Fill then Score" : `Count-based: ${t.pct}% | Quality: ${t.quality ?? t.pct}%`}>
                              {(t.coverage_pending || t.backfilling) ? (
                                <span className="text-[10px] text-amber-400">…</span>
                              ) : t.needs_onboard ? (
                                <span className="text-[10px] text-orange-300 font-semibold">0%</span>
                              ) : (
                                <span
                                  className="text-xs font-bold px-2 py-0.5 rounded"
                                  style={{ color: pctColor(t.quality ?? t.pct), background: pctBg(t.quality ?? t.pct) }}
                                >
                                  {t.quality ?? t.pct}%
                                </span>
                              )}
                            </td>
                            {(() => {
                              const pd = priceData?.prices?.[t.ticker];
                              const price = pd?.p;
                              const chgPct = pd?.dp;
                              const chg = pd?.dc;
                              const pc = pd?.pc;
                              // When current price is missing but daily change is present, derive price from prev_close + dc
                              const displayPrice = (Number(price) > 0)
                                ? price
                                : (Number.isFinite(pc) && Number.isFinite(chg))
                                  ? pc + chg
                                  : null;
                              const isUp = chgPct > 0;
                              const isDown = chgPct < 0;
                              return (
                                <>
                                  <td className="px-2 py-1 text-right text-[11px] text-white font-medium tabular-nums">
                                    {displayPrice != null && displayPrice > 0 ? `$${Number(displayPrice).toFixed(2)}` : <span className="text-gray-600">—</span>}
                                  </td>
                                  <td className="px-2 py-1 text-right text-[11px] tabular-nums">
                                    {Number.isFinite(chgPct) && chgPct !== 0 ? (
                                      <div>
                                        <span style={{ color: isUp ? "#22c55e" : isDown ? "#ef4444" : "#9ca3af" }}>
                                          {isUp ? "+" : ""}{chgPct.toFixed(2)}%
                                          <span className="text-[9px] text-gray-500 ml-0.5">
                                            ({isUp ? "+" : ""}{chg?.toFixed(2)})
                                          </span>
                                        </span>
                                        {(pd?.t > 0 || priceData?.updated_at > 0) && (
                                          <div className="text-[9px] text-gray-600">{formatAge(pd?.t || priceData?.updated_at)}</div>
                                        )}
                                      </div>
                                    ) : <span className="text-gray-600">—</span>}
                                  </td>
                                </>
                              );
                            })()}
                            {TFS.map(tf => (
                              <TFCell key={tf} tfData={t.tfs?.[tf]} />
                            ))}
                            <td className="px-2 py-1.5 text-center">
                              <div className="flex items-center justify-center gap-1 flex-wrap">
                                {(t.quality ?? t.pct) < 100 && (
                                  isTV ? (
                                    <span className="text-[9px] text-gray-600" title="TV-sourced: re-export from TradingView">TV</span>
                                  ) : (
                                    <button
                                      onClick={() => handleFillGaps(t.ticker)}
                                      disabled={bfStatus === "running" || bfStatus === "started" || bfStatus === "scoring..."}
                                      className="tt-btn tt-btn--fill"
                                      style={{ padding: "4px 10px", fontSize: 10 }}
                                      title={typeof bfStatus === "string" && bfStatus.includes("bars") ? bfStatus : "Fill candle gaps via backfill, then auto-score"}
                                    >
                                      {(bfStatus === "running" || bfStatus === "started" || bfStatus === "scoring...") && <span className="tt-spin" />}
                                      {formatBfLabel(bfStatus)}
                                    </button>
                                  )
                                )}
                                {!isTV && (
                                  <button
                                    onClick={() => handleRunOnboard(t.ticker)}
                                    disabled={scoreStatus[t.ticker] === "running"}
                                    className="tt-btn tt-btn--score"
                                    style={{ padding: "4px 10px", fontSize: 10 }}
                                    title="Run scoring from existing candles (use after Fill)"
                                  >
                                    {scoreStatus[t.ticker] === "running" && <span className="tt-spin" />}
                                    {formatScoreLabel(scoreStatus[t.ticker])}
                                  </button>
                                )}
                                <button
                                  onClick={() => handleRemove([t.ticker])}
                                  className="px-2 py-0.5 text-[10px] bg-red-900/30 hover:bg-red-800/50 text-red-400 rounded"
                                  title="Remove from index"
                                >
                                  Remove
                                </button>
                              </div>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Loading state */}
              {loading && (
                <div className="flex items-center justify-center py-20">
                  <div className="text-gray-500 text-sm">Loading coverage data...</div>
                </div>
              )}

              {/* Empty state */}
              {!loading && filtered.length === 0 && !error && (
                <div className="flex items-center justify-center py-20">
                  <div className="text-gray-500 text-sm">
                    {search || sectorFilter !== "all" ? "No tickers match your filters." : "No ticker data found."}
                  </div>
                </div>
              )}

            </div>
          </div>
        );
      }

      const _AuthGate = window.TimedAuthGate;
      const _tickerApp = _AuthGate
        ? <_AuthGate apiBase={API_BASE} requiredTier="admin">{(user) => <App user={user} />}</_AuthGate>
        : <App />;
      ReactDOM.createRoot(document.getElementById("root")).render(_tickerApp);
    </script>
    <script>
      (function() {
        fetch("/timed/daily-brief/badge", { cache: "no-store" })
          .then(r => r.json())
          .then(d => {
            if (d?.badge?.ts) {
              const seen = Number(localStorage.getItem("tt_brief_seen") || 0);
              if (d.badge.ts > seen) {
                const el = document.getElementById("brief-badge");
                if (el) el.classList.remove("hidden");
              }
            }
          })
          .catch(() => {});
      })();
    </script>
  </body>
</html>
