    <script type="text/babel">

            {(storedUser?.role === 'admin' || storedUser?.tier === 'admin') && (

            <a href="daily-brief.html" id="nav-daily-brief" className="relative px-3 py-1 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium">

            {mobileMenuOpen ? (

            ) : (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            )}
          </button>
        </div>
      </div>
      {mobileMenuOpen && (
        <div className="md:hidden border-t border-white/[0.06] px-4 py-2 flex flex-col gap-0.5" style={{background:"rgba(10,10,15,0.98)"}}>
          <a href="index-react.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Analysis</a>
          <a href="simulation-dashboard.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Trades</a>

          <a href="screener.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Screener</a>

          <div className="border-t border-white/[0.06] mt-1 pt-1 flex items-center gap-2">
            <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
            <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
            <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
            <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#60a5fa] hover:text-white hover:bg-white/[0.04] transition-all">Ask AI</a>
            <a href="mailto:support@timed-trading.com" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Contact</a>
          </div>
        </div>
      )}

}

// ── Shared helpers ──
function SQNBadge({ sqn }) {
  if (sqn == null) return null;
  const cls = sqn >= 3 ? "badge-good" : sqn >= 2 ? "badge-info" : sqn >= 1 ? "badge-warn" : "badge-bad";
  const label = sqn >= 3 ? "Excellent" : sqn >= 2 ? "Good" : sqn >= 1 ? "Needs Work" : "Broken";
  return <span className={`inline-block px-2 py-0.5 rounded-full text-[11px] font-semibold ${cls}`}>{sqn.toFixed(2)} — {label}</span>;
}
function DeltaBadge({ value, suffix = "", invert = false }) {
  if (value == null || value === 0) return null;
  const positive = invert ? value < 0 : value > 0;
  return <span className={`text-[10px] font-semibold ml-1.5 ${positive ? "text-emerald-400" : "text-rose-400"}`}>{value > 0 ? "+" : ""}{value}{suffix}</span>;
}
function MetricBox({ label, value, delta, suffix = "", color }) {
  return (
    <div className="card p-3">
      <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-1">{label}</div>
      <div className="flex items-baseline gap-1">
        <span className={`text-lg font-bold ${color || "text-white"}`}>{value ?? "—"}{suffix && <span className="text-xs text-slate-400 ml-0.5">{suffix}</span>}</span>
        <DeltaBadge value={delta} />
      </div>
    </div>
  );
}
function BarChart({ data, maxVal, colorFn }) {
  if (!data || !data.length) return null;
  const max = maxVal || Math.max(...data.map(d => Math.abs(d.value)), 1);
  return (
    <div className="space-y-1">
      {data.map((d, i) => (
        <div key={i} className="flex items-center gap-2">
          <span className="text-[10px] text-slate-400 w-16 shrink-0 text-right">{d.label}</span>
          <div className="flex-1 meter-bar">
            <div className="meter-fill" style={{width:`${Math.min(100, Math.abs(d.value)/max*100)}%`, background: colorFn ? colorFn(d.value) : (d.value >= 0 ? "#10b981" : "#f43f5e")}} />
          </div>
          <span className="text-[10px] text-slate-300 w-10 text-right">{d.value}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TAB: Dashboard
// ═══════════════════════════════════════════════════════════════
function DashboardTab({ dashboard }) {
  if (!dashboard) return <div className="text-slate-500 text-sm py-8 text-center">Loading dashboard...</div>;
  const s = dashboard.summary || {};
  const d = dashboard.delta || {};
  const mh = dashboard.model_health || {};
  const da = dashboard.direction_accuracy || {};
  return (
    <div className="space-y-5">
      {s.generation && (
        <div className="flex items-center gap-3 mb-2">
          <span className="text-xs text-slate-400">Generation <span className="text-white font-bold">#{s.generation}</span></span>
          {s.run_ts && <span className="text-[10px] text-slate-500">{new Date(s.run_ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span>}
          {s.applied && <span className="px-1.5 py-0.5 rounded text-[10px] font-semibold badge-good">Applied</span>}
          <SQNBadge sqn={s.sqn} />
        </div>
      )}

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
        <MetricBox label="SQN" value={s.sqn} delta={d.sqn} color={s.sqn >= 2 ? "text-emerald-400" : s.sqn >= 1 ? "text-amber-400" : "text-rose-400"} />
        <MetricBox label="Win Rate" value={s.win_rate} delta={d.win_rate} suffix="%" />
        <MetricBox label="Expectancy" value={s.expectancy} delta={d.expectancy} color={s.expectancy >= 0 ? "text-emerald-400" : "text-rose-400"} />
        <MetricBox label="Avg R" value={s.avg_r} delta={d.avg_r} color={s.avg_r >= 0 ? "text-emerald-400" : "text-rose-400"} />
        <MetricBox label="Trades" value={s.n || s.trade_count} delta={d.trade_count} />
        <MetricBox label="Profit Factor" value={s.profit_factor} />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Model Health */}
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-white mb-3">Model Health</h3>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">Predictions (total)</span><span className="text-white font-medium">{mh.predictions?.total ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Open predictions</span><span className="text-white font-medium">{mh.predictions?.open ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Hit rate</span><span className="text-white font-medium">{mh.outcomes?.hitRate ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Active patterns</span><span className="text-white font-medium">{mh.patterns?.active ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Degraded patterns</span><span className={`font-medium ${(mh.patterns?.degraded || 0) > 0 ? "text-rose-400" : "text-white"}`}>{mh.patterns?.degraded ?? "—"}</span></div>
          </div>
        </div>

        {/* Direction Accuracy */}
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-white mb-3">Direction Accuracy</h3>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">Total resolved</span><span className="text-white font-medium">{da.total ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Correct</span><span className="text-emerald-400 font-medium">{da.correct ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Accuracy</span><span className="text-white font-bold">{da.accuracy != null ? da.accuracy + "%" : "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Wins / Losses</span><span className="text-white font-medium">{da.wins ?? "—"} / {da.losses ?? "—"}</span></div>
          </div>
        </div>
      </div>

      {/* What's working / Proceed with caution */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-emerald-400 mb-3">What's Working</h3>
          {(dashboard.whats_working || []).length === 0 ? (
            <p className="text-xs text-slate-500">No data yet — run a calibration first.</p>
          ) : (
            <div className="space-y-2">
              {dashboard.whats_working[0]?.source === "moves" && (
                <p className="text-[10px] text-slate-500 mb-1">Based on {dashboard.whats_working.reduce((s,p) => s + (p.n||0), 0).toLocaleString()} historical winning moves</p>
              )}
              {dashboard.whats_working.map((p, i) => (
                <div key={i} className="flex items-center justify-between text-xs">
                  <span className="font-mono text-slate-300">{p.path}</span>
                  <div className="flex items-center gap-3">
                    <span className="text-slate-400">{(p.n || 0).toLocaleString()} {p.source === "moves" ? "moves" : "trades"}</span>
                    {p.source === "moves" ? (
                      <span className="text-emerald-400 font-medium">{p.avg_atr ? `${p.avg_atr.toFixed(1)}x ATR` : ""}</span>
                    ) : (
                      <span className="text-emerald-400 font-medium">{p.win_rate}% WR</span>
                    )}
                    <span className="text-white font-medium">{typeof p.expectancy === "number" ? p.expectancy.toFixed(2) : p.expectancy} exp</span>
                  </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">

                ))}
              </ul>
            </div>
          )}
        </div>
      )}

      {/* VIX Regime Performance */}
      {dashboard.vix_buckets && Object.keys(dashboard.vix_buckets).length > 0 && (
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-slate-300 mb-3">Performance by VIX Regime</h3>

              </div>

          </div>
        </div>
      )}
    </div>

      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead><tr className="text-slate-500 border-b border-white/[0.05]">
            <th className="text-left py-1.5 font-medium">Ticker</th>
            <th className="text-left py-1.5 font-medium">Dir</th>
            <th className="text-right px-2 font-medium">N</th>
            <th className="text-right px-2 font-medium">Total P&amp;L%</th>
            <th className="text-right px-2 font-medium">Win%</th>
            <th className="text-right px-2 font-medium">Pattern</th>
            <th className="text-right px-2 font-medium">Avg gap (d)</th>
            <th className="text-right px-2 font-medium">MFE vs realized</th>
            <th className="text-right pl-2 font-medium">SL before MFE</th>
          </tr></thead>
          <tbody>
            {clusters.map((c, i) => (
              <tr key={i} className="border-b border-white/[0.03]">
                <td className="py-1.5 font-mono text-slate-300">{c.ticker}</td>
                <td className="py-1.5 text-slate-400">{c.direction}</td>
                <td className="text-right px-2">{c.n_trades}</td>
                <td className={`text-right px-2 font-medium ${(c.total_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{c.total_pnl_pct != null ? (c.total_pnl_pct >= 0 ? "+" : "") + c.total_pnl_pct + "%" : "—"}</td>
                <td className="text-right px-2">{c.win_rate_pct != null ? c.win_rate_pct + "%" : "—"}</td>
                <td className="text-right px-2 font-mono text-[10px] text-slate-500">{c.pattern || "—"}</td>
                <td className="text-right px-2">{c.avg_gap_days != null ? c.avg_gap_days : "—"}</td>
                <td className="text-right px-2">{c.mfe_vs_realized != null ? (c.mfe_vs_realized * 100).toFixed(0) + "%" : "—"}</td>
                <td className="text-right pl-2">{c.sl_hit_before_mfe_count ?? "—"}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}
function PositionSizingCard({ sizing }) {

  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-3">Position Sizing (Kelly)</h3>
      <div className="grid grid-cols-3 gap-4 text-center">
        <div><div className="text-[10px] text-slate-500 uppercase">Full Kelly</div><div className="text-lg font-bold">{sizing.kelly_full_pct?.toFixed(1)}%</div></div>
        <div><div className="text-[10px] text-slate-500 uppercase">Half Kelly</div><div className="text-lg font-bold text-emerald-400">{sizing.half_kelly_pct?.toFixed(1)}%</div></div>
        <div><div className="text-[10px] text-slate-500 uppercase">Current</div><div className="text-lg font-bold">{sizing.current_sizing_pct || "5-7%"}</div></div>
      </div>
    </div>
  );
}

function ProfilesCard({ profiles }) {
  if (!profiles) return <div className="card p-5 text-center text-slate-500 text-xs">No profile data. Run calibration to generate winner/loser profiles.</div>;
  const types = ["winner_move", "winner_trade", "loser_trade"];
  const typeLabels = { winner_move: "Winner Moves (Historical)", winner_trade: "Winner Trades", loser_trade: "Loser Trades" };
  const typeColors = { winner_move: "text-blue-400", winner_trade: "text-emerald-400", loser_trade: "text-rose-400" };
  return (
    <div className="space-y-5">
      {types.map(type => {
        const items = (profiles.winner_move && Array.isArray(profiles[type === "winner_move" ? "winner_move" : type === "winner_trade" ? "winner_trade" : "loser_trade"])) 
          ? profiles[type === "winner_move" ? "winner_move" : type === "winner_trade" ? "winner_trade" : "loser_trade"]
          : (Array.isArray(profiles) ? profiles : []).filter(p => p.profile_type === type);
        const filtered = items.filter(p => p.entry_state !== "ALL");
        if (!filtered.length) return null;
        return (
          <div key={type} className="card p-5">
            <h3 className={`text-sm font-semibold mb-3 ${typeColors[type]}`}>{typeLabels[type]}</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">State</th><th className="text-right px-2 font-medium">N</th>
                <th className="text-right px-2 font-medium">Win%</th><th className="text-right px-2 font-medium">Exp</th>
                <th className="text-right px-2 font-medium">Avg R</th><th className="text-right px-2 font-medium">Rank(p50)</th>
                <th className="text-right px-2 font-medium">HTF(p50)</th><th className="text-right px-2 font-medium">Comp(p75)</th>
                <th className="text-right px-2 font-medium">VIX(p50)</th><th className="text-right px-2 font-medium">ATR</th>
                <th className="text-right pl-2 font-medium">Days</th>
              </tr></thead><tbody>
                {filtered.map((p, i) => (
                  <tr key={i} className="border-b border-white/[0.03]">
                    <td className="py-1.5 font-mono text-slate-300 text-[10px]">{(p.entry_state || "").replace(/HTF_/g, "").replace(/LTF_/g, "")}</td>
                    <td className="text-right px-2">{p.sample_count}</td>
                    <td className={`text-right px-2 ${p.win_rate >= 50 ? "text-emerald-400" : "text-rose-400"}`}>{p.win_rate}%</td>
                    <td className={`text-right px-2 ${(p.expectancy || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{p.expectancy}</td>
                    <td className="text-right px-2">{p.avg_r}</td>
                    <td className="text-right px-2">{p.rank_p50 > 0 ? Math.round(p.rank_p50) : "—"}</td>
                    <td className="text-right px-2">{p.htf_score_p50 ? Math.round(p.htf_score_p50) : "—"}</td>
                    <td className="text-right px-2">{p.completion_p75 > 0 ? Math.round(p.completion_p75 * 100) + "%" : "—"}</td>
                    <td className="text-right px-2">{p.vix_p50 > 0 ? p.vix_p50.toFixed(0) : "—"}</td>
                    <td className="text-right px-2">{p.avg_move_atr || "—"}</td>
                    <td className="text-right pl-2">{p.avg_duration_days || "—"}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          </div>
        );
      })}
    </div>
  );
}
function VIXRegimeCard({ vixBuckets }) {
  if (!vixBuckets || !Object.keys(vixBuckets).length) return <div className="card p-5 text-center text-slate-500 text-xs">No VIX regime data. Run calibration with VIX candle data available.</div>;
  const order = ["low", "medium", "high", "extreme"];
  const labels = { low: "Low (<15)", medium: "Medium (15–22)", high: "High (22–30)", extreme: "Extreme (30+)" };
  const colors = { low: "border-emerald-500/30", medium: "border-blue-500/30", high: "border-amber-500/30", extreme: "border-rose-500/30" };
  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-3">Performance by VIX Regime</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        {order.filter(b => vixBuckets[b]).map(bucket => {
          const m = vixBuckets[bucket];
          return (
            <div key={bucket} className={`p-4 rounded-lg bg-white/[0.02] border ${colors[bucket]}`}>
              <div className="text-xs font-semibold text-white mb-2">{labels[bucket]}</div>
              <div className="space-y-1 text-xs">
                <div className="flex justify-between"><span className="text-slate-400">Trades</span><span className="text-white font-medium">{m.n || 0}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">Win Rate</span><span className={`font-medium ${(m.win_rate || 0) >= 50 ? "text-emerald-400" : "text-rose-400"}`}>{m.win_rate || 0}%</span></div>
                <div className="flex justify-between"><span className="text-slate-400">Expectancy</span><span className={`font-medium ${(m.expectancy || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{m.expectancy || 0}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">SQN</span><span className="text-white font-medium">{m.sqn?.toFixed(2) || "—"}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">Avg R</span><span className={`font-medium ${(m.avg_r || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{m.avg_r || "—"}</span></div>
              </div>
            </div>
          );
        })}
      </div>
    </div>

}

function AnalysisSummary({ report, recs }) {
  if (!report) return null;
  const o = report.system_health?.overall || {};
  const paths = report.entry_paths || {};
  const sltp = report.sl_tp_calibration || {};
  const wfo = report.wfo_summary || {};

  const sqnGrade = o.sqn >= 7 ? "Holy Grail" : o.sqn >= 5 ? "Excellent" : o.sqn >= 3 ? "Good" : o.sqn >= 1.5 ? "Average" : o.sqn >= 0 ? "Poor" : "Broken";
  const sqnColor = o.sqn >= 3 ? "text-emerald-400" : o.sqn >= 1.5 ? "text-amber-400" : "text-rose-400";

  const sortedPaths = Object.entries(paths).filter(([, v]) => v.n >= 3).sort((a, b) => (b[1].sqn || 0) - (a[1].sqn || 0));
  const bestPaths = sortedPaths.filter(([, v]) => v.profit_factor > 1.2 && v.sqn > 0);
  const worstPaths = sortedPaths.filter(([, v]) => v.profit_factor < 0.8 || v.sqn < -0.5).reverse();

  const classifications = {};
  if (report.trade_classifications) for (const [k, v] of Object.entries(report.trade_classifications)) classifications[k] = v;
  const manualNotes = report.trade_classifications?.manual_notes_for_learning || [];
  const manualNotesCount = manualNotes.length;

  const moveMfe = sltp.move_mfe?.p50;
  const tpTrim = sltp.recommended_tp_trim_atr;
  const slAtr = sltp.recommended_sl_atr;
  const captureRatio = moveMfe && tpTrim ? Math.round((tpTrim / moveMfe) * 100) : null;

  return (
    <div className="card p-5 mb-4 border-l-4 border-blue-500/40">
      <h3 className="text-sm font-semibold text-blue-300 mb-3">Analysis Summary</h3>
      <div className="space-y-3 text-xs text-slate-300 leading-relaxed">
        {/* Overall Grade */}
        <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
          <div className="flex items-center gap-2 mb-1">
            <span className="text-slate-400 font-medium">System Grade:</span>
            <span className={`font-bold ${sqnColor}`}>{sqnGrade} (SQN {o.sqn})</span>
          </div>
          <p className="text-slate-400">
            {o.n} trades analyzed. Win rate {o.win_rate}%, profit factor {o.profit_factor}, expectancy {o.expectancy >= 0 ? "+" : ""}{o.expectancy} per trade.
            {o.sqn < 0 && " The system is currently losing money overall."}
            {o.sqn >= 0 && o.sqn < 1.5 && " The system is near break-even but has no reliable edge yet."}
            {o.sqn >= 1.5 && o.sqn < 3 && " The system has a modest edge but needs improvement for consistency."}
            {o.sqn >= 3 && " The system has a solid, consistent edge."}
            {o.n < 100 && ` Sample size is small (${o.n} trades) — run a full backtest for statistical confidence.`}
          </p>
        </div>

        {/* Walk-Forward */}
        {wfo?.verdict && (
          <div className={`p-3 rounded-lg border ${wfo.verdict === "WARNING" ? "bg-amber-500/5 border-amber-500/20" : wfo.verdict === "FAIL" ? "bg-rose-500/5 border-rose-500/20" : "bg-emerald-500/5 border-emerald-500/20"}`}>
            <span className="font-medium text-slate-400">Walk-Forward Test: </span>
            <span className={wfo.verdict === "PASS" ? "text-emerald-400" : wfo.verdict === "WARNING" ? "text-amber-400" : "text-rose-400"}>{wfo.verdict}</span>
            {wfo.in_sample_sqn != null && wfo.out_sample_sqn != null && (
              <span className="text-slate-400"> — In-sample SQN {wfo.in_sample_sqn}, out-of-sample SQN {wfo.out_sample_sqn}.</span>
            )}
            {wfo.verdict === "WARNING" && <p className="text-slate-400 mt-1">The system performed worse on recent trades than older ones. This suggests the model may not be adapting to current market conditions.</p>}
          </div>
        )}

        {/* Best / Worst Entry States */}
        {(bestPaths.length > 0 || worstPaths.length > 0) && (
          <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
            <div className="font-medium text-slate-400 mb-2">Entry State Performance</div>
            {bestPaths.length > 0 && (
              <div className="mb-2">
                <span className="text-emerald-400 font-medium">Working: </span>
                {bestPaths.map(([state, v]) => (
                  <span key={state} className="inline-block mr-2">
                    <span className="text-slate-300">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span>
                    <span className="text-emerald-400/70 ml-1">({v.n}t, {v.win_rate}% WR, PF {v.profit_factor})</span>
                  </span>
                ))}
              </div>
            )}
            {worstPaths.length > 0 && (
              <div>
                <span className="text-rose-400 font-medium">Losing money: </span>
                {worstPaths.map(([state, v]) => (
                  <span key={state} className="inline-block mr-2">
                    <span className="text-slate-300">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span>
                    <span className="text-rose-400/70 ml-1">({v.n}t, {v.win_rate}% WR, PF {v.profit_factor})</span>
                  </span>
                ))}
                <p className="text-slate-400 mt-1">Consider disabling or heavily filtering entries in these states.</p>
              </div>
            )}
          </div>
        )}

        {/* Manual feedback (Trade Autopsy) */}
        {(classifications.manual_bad_trade_count > 0 || manualNotesCount > 0) && (
          <div className="p-3 rounded-lg bg-teal-500/5 border border-teal-500/20">
            <div className="font-medium text-teal-300 mb-1">Manual feedback (Trade Autopsy)</div>
            <p className="text-slate-400">
              {classifications.manual_bad_trade_count > 0 && <span>{classifications.manual_bad_trade_count} trades tagged as Bad Trade (excluded from metrics). </span>}
              {manualNotesCount > 0 && <span>{manualNotesCount} trades include notes — used alongside classifications for learning and calibration.</span>}
            </p>
            {manualNotesCount > 0 && manualNotes.slice(0, 5).map((row, i) => (
              <div key={row.trade_id || i} className="mt-1.5 pl-2 border-l-2 border-teal-500/30 text-slate-400 text-[11px]">
                <span className="text-slate-300 font-medium">{row.ticker}</span>
                {row.classification && <span className="ml-1 text-teal-400/80">{row.classification}</span>}
                <span className="block text-slate-500 truncate max-w-md" title={row.notes}>{row.notes}</span>
              </div>
            ))}
          </div>
        )}

        {/* Same-ticker repeat trades (re-entries within short window) */}
        {report.same_ticker_repeat_analysis && report.same_ticker_repeat_analysis.cluster_count > 0 && (
          <div className="p-3 rounded-lg bg-amber-500/5 border border-amber-500/20">
            <div className="font-medium text-amber-300 mb-1">Same-ticker repeat trades (within {report.same_ticker_repeat_analysis.window_days} days)</div>
            <p className="text-slate-400 mb-1">
              {report.same_ticker_repeat_analysis.cluster_count} clusters ({report.same_ticker_repeat_analysis.total_trades_in_clusters} trades) — same ticker, same direction, re-entered within a short window. Total P&amp;L from repeats:{" "}
              <span className={report.same_ticker_repeat_analysis.total_pnl_pct_from_repeats >= 0 ? "text-emerald-400" : "text-rose-400"}>
                {report.same_ticker_repeat_analysis.total_pnl_pct_from_repeats >= 0 ? "+" : ""}{report.same_ticker_repeat_analysis.total_pnl_pct_from_repeats}%
              </span>
              {report.same_ticker_repeat_analysis.avg_capture_ratio != null && (
                <span className="text-slate-500"> · Avg capture vs MFE: {(report.same_ticker_repeat_analysis.avg_capture_ratio * 100).toFixed(0)}%</span>
              )}
              {report.same_ticker_repeat_analysis.sl_before_mfe_count > 0 && (
                <span className="text-slate-500"> · SL hit before MFE: {report.same_ticker_repeat_analysis.sl_before_mfe_count} times</span>
              )}
            </p>
            {report.same_ticker_repeat_analysis.interpretation && report.same_ticker_repeat_analysis.interpretation.length > 0 && (
              <ul className="list-disc list-inside text-slate-400 text-[11px] space-y-0.5 mt-1">
                {report.same_ticker_repeat_analysis.interpretation.map((line, i) => (
                  <li key={i}>{line}</li>
                ))}
              </ul>
            )}
            {report.same_ticker_repeat_analysis.clusters && report.same_ticker_repeat_analysis.clusters.length > 0 && (
              <div className="mt-2 text-[10px] text-slate-500">
                Sample: {report.same_ticker_repeat_analysis.clusters.slice(0, 5).map(c => (
                  <span key={`${c.ticker}-${c.direction}-${c.trade_ids?.[0]}`} className="inline-block mr-2">
                    <span className="text-slate-300">{c.ticker}</span> {c.direction} {c.n_trades}t <span className={c.total_pnl_pct >= 0 ? "text-emerald-500" : "text-rose-500"}>{c.total_pnl_pct}%</span> [{c.pattern}]
                  </span>
                ))}
              </div>
            )}
          </div>
        )}

        {/* SL/TP Diagnosis */}
        {slAtr != null && moveMfe != null && (
          <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
            <div className="font-medium text-slate-400 mb-1">Stop Loss &amp; Take Profit</div>
            <p className="text-slate-400">
              Current SL recommendation: <span className="text-white font-medium">{slAtr} ATR</span>.
              Median market move: <span className="text-white font-medium">{moveMfe} ATR</span>.
              {captureRatio && <> TP trim at {tpTrim} ATR captures only <span className={captureRatio < 30 ? "text-rose-400 font-medium" : "text-white"}>{captureRatio}%</span> of the average move.</>}
              {slAtr < 0.5 && " Stops may be too tight — normal price noise is likely triggering exits before the trade has time to work."}
            </p>
          </div>
        )}

        {/* Key Actions */}
        {recs && (
          <div className="p-3 rounded-lg bg-purple-500/5 border border-purple-500/20">
            <div className="font-medium text-purple-300 mb-2">Recommended Actions</div>
            <ul className="space-y-1 text-slate-400">
              {recs.path_adjustments && Object.entries(recs.path_adjustments).filter(([, v]) => v.action === "DISABLE").map(([state]) => (
                <li key={state}>Disable entries in <span className="text-white">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span> — negative expectancy</li>
              ))}
              {Object.entries(paths).filter(([, v]) => v.action === "BOOST" && v.n >= 3).map(([state]) => (
                <li key={state}>Increase allocation to <span className="text-emerald-400">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span> — positive edge</li>
              ))}
              {recs.sl_atr != null && <li>Set stop loss to <span className="text-white">{recs.sl_atr} ATR</span></li>}
              {recs.tp_tiers && <li>TP tiers: trim at <span className="text-white">{recs.tp_tiers.trim}</span>, exit at <span className="text-white">{recs.tp_tiers.exit}</span>, runner at <span className="text-white">{recs.tp_tiers.runner} ATR</span></li>}
              {recs.same_ticker_repeat_recommendation && <li className="text-amber-200/90">Same-ticker repeats: {recs.same_ticker_repeat_recommendation}</li>}
              {report.hindsight_oracle?.recommendations?.map((rec, i) => <li key={`oracle-${i}`}>{rec.message}</li>)}
            </ul>
          </div>
        )}
      </div>
    </div>
  );
}

function CalibrationTab({ report, recs, reportId, onApply, applying, appliedMsg }) {
  const [sub, setSub] = useState("health");
  if (!report) return <div className="card p-12 text-center text-slate-400 text-sm">No calibration report. Run a calibration first.</div>;
  const subs = [
    { id: "health", label: "Health & Apply" },
    { id: "entries", label: "Entry Paths & Profiles" },
    { id: "models", label: "Models & Signals" },
    { id: "risk", label: "Risk Management" },
    { id: "context", label: "Market Context" },
    { id: "quality", label: "Trade Quality" },
  ];
  return (
    <div>
      <div className="flex gap-1 border-b border-white/[0.06] mb-4 overflow-x-auto">
        {subs.map(t => (
          <button key={t.id} onClick={() => setSub(t.id)} className={`px-3 py-1.5 text-[11px] font-medium whitespace-nowrap ${sub === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
        ))}
      </div>
      {sub === "health" && (
        <div>
          <AnalysisSummary report={report} recs={recs} />
          <SystemHealthCard health={report.system_health} />
          {recs && (
            <div className="card p-5 mt-4">
              <div className="flex items-center justify-between mb-3">
                <h3 className="text-sm font-semibold text-white">Apply Recommendations</h3>
                <button className="btn btn-apply text-xs" onClick={() => onApply(reportId)} disabled={applying}>{applying ? "Applying..." : "Apply All"}</button>
              </div>
              {appliedMsg && <div className="mb-3 p-2 rounded bg-emerald-500/10 border border-emerald-500/20 text-xs text-emerald-300">{appliedMsg}</div>}
              {report.wfo_summary?.verdict === "WARNING" && <div className="mb-3 p-2 rounded bg-amber-500/10 border border-amber-500/20 text-xs text-amber-300">WFO verdict is WARNING — apply with caution.</div>}
              <div className="space-y-2 text-xs">
                {recs.sl_atr != null && <div className="flex justify-between"><span className="text-slate-400">SL (ATR)</span><span className="text-white font-medium">{recs.sl_atr}</span></div>}

                    {recs.adaptive_sl_tp && <div className="flex justify-between"><span className="text-slate-400">SL/TP per State</span><span className="text-white">{Object.keys(recs.adaptive_sl_tp).filter(k => k !== "_default").length} state profiles</span></div>}
                  </div>
                  <p className="text-[9px] text-slate-500 mt-2">Click "Apply All" to write these adaptive parameters into the live scoring engine.</p>
                </div>
              )}
            </div>
          )}

      )}
      {sub === "entries" && (
        <div className="space-y-6">
          <div>
            <h3 className="text-sm font-semibold text-white mb-3 flex items-center gap-2">Entry Paths <span className="text-[10px] text-slate-500 font-normal">How we enter trades</span></h3>
            <EntryPathsCard paths={report.entry_paths} />
          </div>
          <div className="border-t border-white/[0.06] pt-5">
            <h3 className="text-sm font-semibold text-white mb-3 flex items-center gap-2">Profiles <span className="text-[10px] text-slate-500 font-normal">State-specific performance profiles</span></h3>
            <ProfilesCard profiles={report.profiles || []} />
          </div>
        </div>
      )}
      {sub === "models" && (
        <div className="space-y-6">
          {report.hindsight_oracle && (
            <div className="card p-5">
              <h3 className="text-sm font-semibold text-amber-200/90 mb-2">Hindsight Oracle (5m perfect entry/exit)</h3>
              <p className="text-xs text-slate-500 mb-3">Qualifying moves: {report.hindsight_oracle.qualifying_moves} | Fingerprints: {report.hindsight_oracle.fingerprints_count}</p>
              {report.hindsight_oracle.golden_profiles && Object.keys(report.hindsight_oracle.golden_profiles).length > 0 && (
                <div className="mb-4">
                  <h4 className="text-xs font-semibold text-slate-400 mb-2">Golden profiles by state</h4>
                  <div className="overflow-x-auto"><table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                    <th className="text-left py-1.5 font-medium">State</th><th className="text-right px-2 font-medium">N</th><th className="text-right px-2 font-medium">Squeeze%</th><th className="text-right px-2 font-medium">EMA%</th><th className="text-right px-2 font-medium">ST%</th><th className="text-right px-2 font-medium">HTF med</th><th className="text-right pl-2 font-medium">Avg ATR</th>
                  </tr></thead><tbody>
                    {Object.entries(report.hindsight_oracle.golden_profiles).map(([state, g]) => (
                      <tr key={state} className="border-b border-white/[0.03]">
                        <td className="py-1.5 font-mono text-slate-300">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</td>
                        <td className="text-right px-2">{g.sample_count}</td><td className="text-right px-2">{g.squeeze_release_pct}%</td><td className="text-right px-2">{g.ema_cross_pct}%</td><td className="text-right px-2">{g.st_flip_pct}%</td><td className="text-right px-2">{g.htf_score_median}</td><td className="text-right pl-2">{g.avg_move_atr}</td>
                      </tr>
                    ))}
                  </tbody></table></div>
                </div>
              )}
              {report.hindsight_oracle.recommendations?.length > 0 && (
                <div><h4 className="text-xs font-semibold text-slate-400 mb-2">Recommendations</h4>
                  <ul className="space-y-1.5">{report.hindsight_oracle.recommendations.map((rec, i) => (
                    <li key={i} className="text-xs text-slate-300 pl-2 border-l-2 border-amber-500/30">{rec.message}</li>
                  ))}</ul>
                </div>
              )}
            </div>
          )}
          <div className="border-t border-white/[0.06] pt-5">
            <h3 className="text-sm font-semibold text-white mb-3">Signal Importance (IC)</h3>
            <SignalICCard ic={report.signal_ic} />
          </div>
        </div>
      )}
      {sub === "risk" && (
        <div className="space-y-6">
          <div>
            <h3 className="text-sm font-semibold text-white mb-3">Stop Loss & Take Profit Calibration</h3>
            <SLTPCard sltp={report.sl_tp_calibration} />
          </div>
          <div className="border-t border-white/[0.06] pt-5">
            <h3 className="text-sm font-semibold text-white mb-3">Rank Optimization</h3>
            <RankCard rank={report.rank_optimization} />
          </div>
          <div className="border-t border-white/[0.06] pt-5">
            <h3 className="text-sm font-semibold text-white mb-3">Position Sizing</h3>
            <PositionSizingCard sizing={report.position_sizing} />
          </div>
        </div>
      )}
      {sub === "context" && (
        <div className="space-y-6">
          <div>
            <h3 className="text-sm font-semibold text-white mb-3">VIX Regime Performance</h3>
            <VIXRegimeCard vixBuckets={report.vix_buckets} />
          </div>
          <div className="border-t border-white/[0.06] pt-5">
            <h3 className="text-sm font-semibold text-white mb-3">Walk-Forward Optimization</h3>
            <WFOCard wfo={report.wfo_summary} />
          </div>
        </div>
      )}
      {sub === "quality" && (
        <div className="space-y-6">
          <div>
            <h3 className="text-sm font-semibold text-white mb-3">Same-Ticker Repeat Trades</h3>
            <SameTickerRepeatsCard data={report.same_ticker_repeat_analysis} />

          <div className="border-t border-white/[0.06] pt-5">
            <h3 className="text-sm font-semibold text-white mb-3">Missed Opportunities</h3>

}

// TAB: Patterns (from Model dashboard)
// ═══════════════════════════════════════════════════════════════
function PatternsTab() {
  const [patterns, setPatterns] = useState(null);
  const [predictions, setPredictions] = useState(null);
  const [retro, setRetro] = useState(null);
  const [tickerProfiles, setTickerProfiles] = useState(null);
  const [regimeProfiles, setRegimeProfiles] = useState(null);
  const [contextHistory, setContextHistory] = useState(null);
  const [profileFilter, setProfileFilter] = useState("");
  const [profileSort, setProfileSort] = useState("ticker");
  const [sub, setSub] = useState("patterns");

  useEffect(() => {
    const load = async () => {
      try {
        const [patRes, predRes, retroRes] = await Promise.all([
          fetch(`${API_BASE}/timed/model/patterns`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/model/predictions?limit=30`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/model/retrospective`, { credentials: "include" }).then(r => r.json()),
        ]);
        if (patRes.ok) setPatterns(patRes.patterns || []);
        if (predRes.ok) setPredictions(predRes.predictions || []);
        if (retroRes.ok) setRetro(retroRes);
      } catch (_) {}
    };
    load();
  }, []);

  useEffect(() => {
    if (sub !== "profiles" || tickerProfiles) return;
    const load = async () => {
      try {
        const [profileRes, regimeRes, contextRes] = await Promise.all([
          fetch(`${API_BASE}/timed/system/ticker-profiles`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/system/regime-profiles?limit=24`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/system/context-history?limit=20`, { credentials: "include" }).then(r => r.json()),
        ]);
        if (profileRes.ok) setTickerProfiles(profileRes.profiles || []);
        if (regimeRes.ok) setRegimeProfiles(regimeRes);
        if (contextRes.ok) setContextHistory(contextRes);
      } catch (_) {}
    };
    load();
  }, [sub]);

  const subs = [
    { id: "patterns", label: "Pattern Library" },
    { id: "predictions", label: "Predictions" },
    { id: "learning", label: "Learning Loop" },
    { id: "profiles", label: "Ticker Profiles" },
  ];
  const fmtPctValue = (value) => value == null || Number.isNaN(Number(value)) ? "—" : `${Number(value).toFixed(1)}%`;
  const fmtNum = (value, digits = 2) => value == null || Number.isNaN(Number(value)) ? "—" : Number(value).toFixed(digits);
  const marketRows = Array.isArray(contextHistory?.market) ? contextHistory.market : [];
  const sectorRows = Array.isArray(contextHistory?.sectors) ? contextHistory.sectors : [];
  const latestSectorRows = sectorRows.slice(0, 12);
  const filteredProfiles = !tickerProfiles ? [] : tickerProfiles
    .filter(p => !profileFilter || p.ticker?.includes(profileFilter) || (p.personality || "").includes(profileFilter) || (p.behavior_type || "").includes(profileFilter))
    .sort((a, b) => {
      if (profileSort === "wr") return Number(b.contract?.context?.win_rate || -999) - Number(a.contract?.context?.win_rate || -999);
      if (profileSort === "avg_pnl") return Number(b.contract?.context?.avg_pnl_pct || -999) - Number(a.contract?.context?.avg_pnl_pct || -999);
      if (profileSort === "samples") return Number(b.contract?.context?.sample_count || -999) - Number(a.contract?.context?.sample_count || -999);
      return String(a.ticker || "").localeCompare(String(b.ticker || ""));
    });

  return (
    <div>
      <div className="flex gap-1 border-b border-white/[0.06] mb-4 overflow-x-auto">
        {subs.map(t => (
          <button key={t.id} onClick={() => setSub(t.id)} className={`px-3 py-1.5 text-[11px] font-medium whitespace-nowrap ${sub === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
        ))}
      </div>

      {sub === "patterns" && (
        <div className="card p-5">
          <h3 className="text-sm font-semibold text-white mb-3">Active Patterns</h3>
          {!patterns ? <p className="text-slate-500 text-xs">Loading...</p> : patterns.length === 0 ? <p className="text-slate-500 text-xs">No active patterns.</p> : (
            <div className="overflow-x-auto">
              <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">Pattern</th><th className="text-right px-2 font-medium">Hit Rate</th>
                <th className="text-right px-2 font-medium">Samples</th><th className="text-right px-2 font-medium">EV</th><th className="text-right pl-2 font-medium">Confidence</th>
              </tr></thead><tbody>
                {patterns.map((p, i) => (
                  <tr key={i} className="border-b border-white/[0.03]">
                    <td className="py-1.5 text-slate-300">{p.name || p.pattern_id}</td>
                    <td className="text-right px-2">{(Number(p.hit_rate) * 100).toFixed(0)}%</td>
                    <td className="text-right px-2">{p.sample_count}</td>
                    <td className={`text-right px-2 ${Number(p.expected_value) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{Number(p.expected_value).toFixed(2)}</td>
                    <td className="text-right pl-2">{(Number(p.confidence) * 100).toFixed(0)}%</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          )}
        </div>
      )}

      {sub === "predictions" && (
        <div className="card p-5">
          <h3 className="text-sm font-semibold text-white mb-3">Recent Predictions</h3>
          {!predictions ? <p className="text-slate-500 text-xs">Loading...</p> : predictions.length === 0 ? <p className="text-slate-500 text-xs">No predictions yet.</p> : (
            <div className="overflow-x-auto">
              <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">Ticker</th><th className="text-left px-2 font-medium">Direction</th>
                <th className="text-left px-2 font-medium">Trigger</th><th className="text-right px-2 font-medium">Confidence</th><th className="text-right pl-2 font-medium">Resolved</th>
              </tr></thead><tbody>
                {predictions.slice(0, 20).map((p, i) => (
                  <tr key={i} className="border-b border-white/[0.03]">
                    <td className="py-1.5 text-white font-medium">{p.ticker}</td>
                    <td className="px-2"><span className={p.direction === "LONG" ? "text-emerald-400" : "text-rose-400"}>{p.direction}</span></td>
                    <td className="px-2 text-slate-400">{p.trigger_type}</td>
                    <td className="text-right px-2">{p.confidence ? (Number(p.confidence) * 100).toFixed(0) + "%" : "—"}</td>
                    <td className="text-right pl-2">{p.resolved ? (p.outcome === "HIT" ? <span className="badge-good px-1.5 py-0.5 rounded text-[10px]">HIT</span> : <span className="badge-bad px-1.5 py-0.5 rounded text-[10px]">MISS</span>) : <span className="text-slate-500">Open</span>}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          )}
        </div>
      )}

      {sub === "learning" && retro && (
        <div className="space-y-4">
          <div className="card p-5">
            <h3 className="text-sm font-semibold text-white mb-3">Overall Direction Accuracy</h3>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 text-center">
              <div><div className="text-[10px] text-slate-500 uppercase">Total</div><div className="text-lg font-bold">{retro.overall?.total || 0}</div></div>
              <div><div className="text-[10px] text-slate-500 uppercase">Correct</div><div className="text-lg font-bold text-emerald-400">{retro.overall?.correct || 0}</div></div>
              <div><div className="text-[10px] text-slate-500 uppercase">Wins</div><div className="text-lg font-bold">{retro.overall?.wins || 0}</div></div>
              <div><div className="text-[10px] text-slate-500 uppercase">Avg P&L</div><div className={`text-lg font-bold ${(retro.overall?.avg_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{retro.overall?.avg_pnl_pct || 0}%</div></div>
            </div>
          </div>
          {retro.by_path && retro.by_path.length > 0 && (
            <div className="card p-5">
              <h3 className="text-sm font-semibold text-white mb-3">Accuracy by Entry Path</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                  <th className="text-left py-1.5 font-medium">Path</th><th className="text-right px-2 font-medium">Total</th><th className="text-right px-2 font-medium">Correct</th>
                  <th className="text-right px-2 font-medium">Accuracy</th><th className="text-right pl-2 font-medium">Avg P&L</th>
                </tr></thead><tbody>
                  {retro.by_path.map((p, i) => (
                    <tr key={i} className="border-b border-white/[0.03]">
                      <td className="py-1.5 font-mono text-slate-300">{p.entry_path}</td>
                      <td className="text-right px-2">{p.total}</td><td className="text-right px-2 text-emerald-400">{p.correct}</td>
                      <td className="text-right px-2">{p.total > 0 ? ((p.correct / p.total) * 100).toFixed(0) + "%" : "—"}</td>
                      <td className={`text-right pl-2 ${(p.avg_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{p.avg_pnl_pct || 0}%</td>
                    </tr>
                  ))}
                </tbody></table>
              </div>
            </div>
          )}
        </div>
      )}

      {sub === "profiles" && (
        <div className="space-y-4">
          {contextHistory && (
            <div className="card p-4 space-y-4">
              <div className="flex flex-col sm:flex-row sm:items-center gap-2">
                <div>
                  <h3 className="text-sm font-semibold text-white">Market / Sector Context History</h3>
                  <p className="text-[11px] text-slate-500 mt-1">Stored daily snapshots used to anchor future ticker-profile and regime joins to actual market context, not only reconstructed candles.</p>
                </div>
                <div className="text-[10px] text-slate-500 sm:ml-auto">{marketRows.length || 0} market snapshots</div>
              </div>
              {marketRows.length > 0 && (
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="text-slate-500 border-b border-white/[0.05]">
                        <th className="text-left py-1.5 font-medium">Date</th>
                        <th className="text-left px-2 font-medium">Market Regime</th>
                        <th className="text-left px-2 font-medium">Health</th>
                        <th className="text-right px-2 font-medium">Breadth W200</th>
                        <th className="text-right px-2 font-medium">Breadth D50</th>
                        <th className="text-right pl-2 font-medium">VIX</th>
                      </tr>
                    </thead>
                    <tbody>
                      {marketRows.slice(0, 10).map((row, idx) => (
                        <tr key={idx} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                          <td className="py-1.5 font-mono text-slate-300">{row.context_date || "—"}</td>
                          <td className="px-2">
                            <div className="text-white">{row.market_regime_class || "—"}</div>
                            <div className="text-[10px] text-slate-500">{row.spy_regime_combined || "—"} / {row.qqq_regime_combined || "—"}</div>
                          </td>
                          <td className="px-2">
                            <div className="text-slate-200">{row.market_health_regime || "—"}</div>
                            <div className="text-[10px] text-slate-500">{fmtNum(row.market_health_score, 0)} score</div>
                          </td>
                          <td className="text-right px-2 text-slate-300">{fmtPctValue(row.breadth_pct_above_w200)}</td>
                          <td className="text-right px-2 text-slate-300">{fmtPctValue(row.breadth_pct_above_d50)}</td>
                          <td className="text-right pl-2">
                            <div className="text-slate-200">{fmtNum(row.vix_close, 2)}</div>
                            <div className="text-[10px] text-slate-500">{row.vix_bucket || "—"}</div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
              {latestSectorRows.length > 0 && (
                <div>
                  <div className="text-[11px] font-semibold text-slate-300 mb-2">Latest sector context rows</div>
                  <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3">
                    {latestSectorRows.map((row, idx) => (
                      <div key={idx} className="rounded-xl border border-white/[0.06] bg-white/[0.02] p-4">
                        <div className="flex items-center justify-between gap-2">
                          <div className="text-sm font-semibold text-white">{row.sector || "—"}</div>
                          <div className="text-[10px] text-slate-500 font-mono">{row.context_date || "—"}</div>
                        </div>
                        <div className="mt-2 text-[11px] text-slate-400 flex flex-wrap gap-2">
                          <span className="px-2 py-1 rounded-md bg-[#22c55e]/10 border border-[#22c55e]/20 text-[#86efac]">{row.regime_class || "—"}</span>
                          <span className="px-2 py-1 rounded-md bg-white/[0.04] border border-white/[0.06] text-slate-300">{fmtNum(row.regime_score, 2)} score</span>
                        </div>
                        <div className="mt-3 grid grid-cols-2 gap-2 text-[11px]">
                          <div className="rounded-md bg-black/20 border border-white/[0.05] px-2.5 py-2">
                            <div className="text-slate-500 uppercase tracking-wide text-[10px]">Bullish breadth</div>
                            <div className="text-white mt-1">{fmtPctValue(row.bullish_member_pct)}</div>
                          </div>
                          <div className="rounded-md bg-black/20 border border-white/[0.05] px-2.5 py-2">
                            <div className="text-slate-500 uppercase tracking-wide text-[10px]">Members</div>
                            <div className="text-white mt-1">{row.member_count || 0}</div>
                          </div>
                          <div className="rounded-md bg-black/20 border border-white/[0.05] px-2.5 py-2">
                            <div className="text-slate-500 uppercase tracking-wide text-[10px]">Avg weekly struct</div>
                            <div className="text-white mt-1">{fmtNum(row.avg_weekly_structure, 3)}</div>
                          </div>
                          <div className="rounded-md bg-black/20 border border-white/[0.05] px-2.5 py-2">
                            <div className="text-slate-500 uppercase tracking-wide text-[10px]">Avg daily struct</div>
                            <div className="text-white mt-1">{fmtNum(row.avg_daily_structure, 3)}</div>
                          </div>

                      </div>
                    ))}
                  </div>
                </div>

              <div className="flex flex-col sm:flex-row sm:items-center gap-2">

                  <p className="text-[11px] text-slate-500 mt-1">Completed runs grouped into reviewable profile buckets from historical SPY regime and VIX context at trade entry.</p>
                </div>
                <div className="text-[10px] text-slate-500 sm:ml-auto">{regimeProfiles.count || 0} mapped runs</div>
              </div>
              {Array.isArray(regimeProfiles.profiles) && regimeProfiles.profiles.length > 0 && (
                <div className="grid grid-cols-1 lg:grid-cols-3 gap-3">
                  {regimeProfiles.profiles.map((profile, idx) => (
                    <div key={idx} className="rounded-xl border border-white/[0.06] bg-white/[0.02] p-4">
                      <div className="flex items-center justify-between gap-2">
                        <div className="text-sm font-semibold text-white">{profile.title}</div>
                        <div className="text-[10px] uppercase tracking-wide text-slate-500">{profile.profile_key.replace(/_/g, " ")}</div>
                      </div>
                      <p className="text-[11px] text-slate-400 mt-2 leading-relaxed">{profile.why}</p>
                      <div className="mt-3 space-y-2">
                        {(profile.candidate_runs || []).map((run) => (
                          <div key={run.run_id} className="rounded-lg bg-black/20 border border-white/[0.04] px-3 py-2">
                            <div className="flex items-center justify-between gap-3 text-[11px]">
                              <span className="font-mono text-slate-300 truncate">{run.label || run.run_id}</span>
                              <span className={`${Number(run.realized_pnl || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>${fmtNum(run.realized_pnl, 0)}</span>
                            </div>
                            <div className="mt-1 text-[10px] text-slate-500 flex flex-wrap gap-3">
                              <span>{run.top_regime || "—"}</span>
                              <span>{run.top_vix_bucket || "—"}</span>
                              <span>{fmtPctValue(run.win_rate)} WR</span>
                              <span>{run.trades || 0} trades</span>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              )}
              {Array.isArray(regimeProfiles.runs) && regimeProfiles.runs.length > 0 && (
                <div className="overflow-x-auto">
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="text-slate-500 border-b border-white/[0.05]">
                        <th className="text-left py-1.5 font-medium">Run</th>
                        <th className="text-left px-2 font-medium">Recommended Profile</th>
                        <th className="text-left px-2 font-medium">Best Regime</th>
                        <th className="text-left px-2 font-medium">Best VIX</th>
                        <th className="text-right px-2 font-medium">WR</th>
                        <th className="text-right pl-2 font-medium">P&amp;L</th>
                      </tr>
                    </thead>
                    <tbody>
                      {regimeProfiles.runs.slice(0, 12).map((run) => (
                        <tr key={run.run_id} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                          <td className="py-1.5">
                            <div className="font-mono text-white">{run.label || run.run_id}</div>
                            <div className="text-[10px] text-slate-500">{run.start_date || "—"} to {run.end_date || "—"}</div>
                          </td>
                          <td className="px-2">
                            <div className="text-slate-200">{run.recommendation?.title || "—"}</div>
                            <div className="text-[10px] text-slate-500">{run.recommendation?.why || ""}</div>
                          </td>
                          <td className="px-2 text-slate-300">{run.context?.by_regime?.[0]?.regime || "—"}</td>
                          <td className="px-2 text-slate-300">{run.context?.by_vix_bucket?.[0]?.bucket || "—"}</td>
                          <td className="text-right px-2 text-slate-300">{fmtPctValue(run.win_rate)}</td>
                          <td className={`text-right pl-2 ${Number(run.realized_pnl || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>${fmtNum(run.realized_pnl, 0)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </div>
          )}
          <div className="card p-4">
            <div className="flex flex-col sm:flex-row sm:items-center gap-3 mb-4">
              <h3 className="text-sm font-semibold text-white">Ticker Context Profiles</h3>
              <input
                type="text"
                placeholder="Filter by ticker / profile..."
                value={profileFilter}
                onChange={e => setProfileFilter(e.target.value.toUpperCase())}
                className="px-3 py-1.5 text-xs bg-white/[0.04] border border-white/[0.08] rounded-lg text-white placeholder-slate-500 focus:outline-none focus:border-blue-500/50 w-full sm:w-48"
              />
              <select
                value={profileSort}
                onChange={e => setProfileSort(e.target.value)}
                className="px-3 py-1.5 text-xs bg-white/[0.04] border border-white/[0.08] rounded-lg text-white focus:outline-none focus:border-blue-500/50"
              >
                <option value="ticker">Sort: Ticker</option>
                <option value="samples">Sort: Samples</option>
                <option value="wr">Sort: Win Rate</option>
                <option value="avg_pnl">Sort: Avg P&amp;L</option>
              </select>
              {tickerProfiles && (
                <div className="flex gap-3 text-[10px] text-slate-500 ml-auto">
                  {(() => {
                    const counts = {};
                    tickerProfiles.forEach(p => { const k = p.personality || "UNKNOWN"; counts[k] = (counts[k] || 0) + 1; });
                    return Object.entries(counts).sort((a, b) => b[1] - a[1]).map(([k, v]) => (
                      <span key={k} className="cursor-pointer hover:text-slate-300" onClick={() => setProfileFilter(profileFilter === k ? "" : k)}>
                        <span className={`inline-block w-2 h-2 rounded-full mr-1 ${k === "VOLATILE_RUNNER" ? "bg-rose-500" : k === "PULLBACK_PLAYER" ? "bg-amber-500" : k === "SLOW_GRINDER" ? "bg-emerald-500" : k === "TREND_FOLLOWER" ? "bg-violet-500" : "bg-blue-500"}`}></span>
                        {k.replace(/_/g, " ")} ({v})
                      </span>
                    ));
                  })()}
                </div>
              )}
            </div>

            {!tickerProfiles ? (
              <p className="text-slate-500 text-xs py-8 text-center">Loading profiles...</p>
            ) : tickerProfiles.length === 0 ? (
              <p className="text-slate-500 text-xs py-8 text-center">No ticker profiles yet. Run build-ticker-learning.js and build-ticker-profiles.js first.</p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-slate-500 border-b border-white/[0.05]">
                      <th className="text-left py-1.5 font-medium">Ticker</th>
                      <th className="text-left px-2 font-medium">Personality / Type</th>
                      <th className="text-right px-2 font-medium">Moves</th>
                      <th className="text-right px-2 font-medium">Context Samples</th>
                      <th className="text-right px-2 font-medium">WR / Avg P&amp;L</th>
                      <th className="text-left px-2 font-medium">Favored Regime</th>
                      <th className="text-left px-2 font-medium">Favored VIX</th>
                      <th className="text-left px-2 font-medium">Best Path</th>
                      <th className="text-right px-2 font-medium">Counter-Consensus</th>
                      <th className="text-right pl-2 font-medium">Merged SL / TP</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredProfiles.map((p, i) => {
                        const ep = p.entry_params || {};
                        const ctx = p.contract?.context || {};
                        const pColors = { VOLATILE_RUNNER: "text-rose-400", PULLBACK_PLAYER: "text-amber-400", SLOW_GRINDER: "text-emerald-400", MODERATE: "text-blue-400", TREND_FOLLOWER: "text-violet-400" };
                        const pClass = pColors[p.personality] || "text-slate-400";
                        return (
                          <tr key={i} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                            <td className="py-1.5 font-mono font-bold text-white">
                              <div>{p.ticker}</div>
                              <div className="text-[10px] font-normal text-slate-500">{p.sector || "—"}</div>
                            </td>
                            <td className="px-2">
                              <div className={`font-semibold ${pClass}`}>{(p.personality || "—").replace(/_/g, " ")}</div>
                              <div className="text-[10px] text-slate-500">{(p.behavior_type || "—").replace(/_/g, " ")}</div>
                            </td>
                            <td className="text-right px-2 text-slate-300">{p.move_count ?? "—"}</td>
                            <td className="text-right px-2 text-slate-300">{ctx.sample_count ?? "—"}</td>
                            <td className="text-right px-2">
                              <div className="text-slate-200">{fmtPctValue(ctx.win_rate)}</div>
                              <div className={`${Number(ctx.avg_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"} text-[10px]`}>{fmtPctValue(ctx.avg_pnl_pct)}</div>
                            </td>
                            <td className="px-2 text-slate-300">{ctx.favored_regime || "—"}</td>
                            <td className="px-2 text-slate-300">{ctx.favored_vix_bucket || "—"}</td>
                            <td className="px-2">
                              <div className="text-slate-300">{ctx.favored_entry_path || "—"}</div>
                              <div className="text-[10px] text-slate-500">{ep.trail_style || "—"} trail</div>
                            </td>
                            <td className="text-right px-2 text-slate-300">{fmtPctValue(ctx.counter_consensus_rate)}</td>
                            <td className="text-right pl-2">
                              <div className="text-slate-200">{p.merged?.slMult ? `${fmtNum(p.merged.slMult)}x` : "—"}</div>
                              <div className="text-[10px] text-slate-500">{p.merged?.tpMult ? `${fmtNum(p.merged.tpMult)}x` : "—"}</div>
                            </td>
                          </tr>
                        );
                      })}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// TAB: History
// ═══════════════════════════════════════════════════════════════
function HistoryTab({ onViewReport }) {
  const [history, setHistory] = useState(null);
  useEffect(() => {
    const load = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/system/history`, { credentials: "include" });
        const data = await res.json();
        if (data.ok) setHistory(data.history || []);
      } catch (_) {}
    };
    load();
  }, []);

  if (!history) return <div className="text-slate-500 text-sm py-8 text-center">Loading history...</div>;
  if (history.length === 0) return <div className="card p-12 text-center text-slate-400 text-sm">No calibration history yet.</div>;

  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-4">Calibration History</h3>
      <div className="overflow-x-auto">
        <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
          <th className="text-left py-1.5 font-medium">Gen</th>
          <th className="text-left px-2 font-medium">Date</th>
          <th className="text-right px-2 font-medium">Trades</th>
          <th className="text-right px-2 font-medium">SQN</th>
          <th className="text-right px-2 font-medium">Win%</th>
          <th className="text-right px-2 font-medium">Exp</th>
          <th className="text-right px-2 font-medium">Avg R</th>
          <th className="text-center px-2 font-medium">Applied</th>
          <th className="text-right pl-2 font-medium"></th>
        </tr></thead><tbody>
          {history.map((row, i) => (
            <tr key={i} className="border-b border-white/[0.03] hover:bg-white/[0.02] cursor-pointer" onClick={() => onViewReport(row.report_id)}>
              <td className="py-2 text-white font-bold">#{row.generation || "?"}</td>
              <td className="px-2 text-slate-400">{row.run_ts ? new Date(row.run_ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—"}</td>
              <td className="text-right px-2">{row.n || row.trade_count}</td>
              <td className="text-right px-2">
                <span className="text-white font-medium">{row.sqn?.toFixed(2) ?? "—"}</span>
                <DeltaBadge value={row.delta_sqn} />
              </td>
              <td className="text-right px-2">
                <span>{row.win_rate ?? "—"}%</span>
                <DeltaBadge value={row.delta_win_rate} suffix="%" />
              </td>
              <td className="text-right px-2">
                <span className={`${(row.expectancy || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{row.expectancy ?? "—"}</span>
                <DeltaBadge value={row.delta_expectancy} />
              </td>
              <td className="text-right px-2">{row.avg_r ?? "—"}</td>
              <td className="text-center px-2">{row.applied ? <span className="text-emerald-400">✓</span> : <span className="text-slate-600">—</span>}</td>
              <td className="text-right pl-2 text-[10px] text-blue-400 hover:text-blue-300">View</td>
            </tr>
          ))}
        </tbody></table>
      </div>
    </div>
  );
}
