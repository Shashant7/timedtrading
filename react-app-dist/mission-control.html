    <style>
      body { margin: 0; background: #0a0a0f; color: #e5e7eb; font-family: 'Inter', sans-serif; min-height: 100vh; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }

      /* 2026-05-30 (P8) — Inline nav CSS. mission-control.html's static
         <nav class="topnav"> scaffold (added 2026-05-28) had no matching
         CSS because the base nav rules live inline in today.html, not in
         tt-tokens.css. Without these styles the nav rendered as an
         unstyled stack of links. Mirrors the today.html block 1:1 so any
         changes there should be carried forward here until the nav is
         extracted to a shared stylesheet. */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: #e5e7eb; font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: #94a3b8;
        text-decoration: none;
        padding: 6px 11px;
        border-radius: 7px;
        font-weight: 500;
        transition: all 0.15s;
      }
      .nav-link:hover { background: rgba(255,255,255,0.04); color: #f1f5f9; }
      .mc-card {
        background: linear-gradient(180deg, rgba(20, 22, 30, 0.95), rgba(15, 17, 24, 0.95));
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 14px;
        padding: 18px 20px;
      }
      .mc-section-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #94a3b8;
        margin-bottom: 14px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .mc-section-title .mc-dot {
        width: 6px; height: 6px; border-radius: 50%;
        background: #34d399; box-shadow: 0 0 6px rgba(52, 211, 153, 0.6);
      }
      .mc-kpi {
        background: rgba(255, 255, 255, 0.02);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 10px;
        padding: 12px 14px;
      }
      .mc-kpi-label {
        font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
        text-transform: uppercase; color: #6b7280; margin-bottom: 4px;
      }
      .mc-kpi-value {
        font-size: 22px; font-weight: 800; color: #f0f6fc; letter-spacing: -0.02em;
        font-variant-numeric: tabular-nums;
      }
      .mc-kpi-sub { font-size: 10px; color: #6b7280; margin-top: 2px; }
      .mc-pos { color: #22c55e; }
      .mc-neg { color: #ef4444; }
      .mc-warn { color: #f59e0b; }
      .mc-mute { color: #6b7280; }
      .mc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .mc-table th { text-align: left; font-size: 10px; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase; color: #6b7280;
        padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.06);
        white-space: nowrap; }
      .mc-table td { padding: 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.03);
        color: #d1d5db; font-variant-numeric: tabular-nums; vertical-align: top; }
      .mc-table tr:hover td { background: rgba(255,255,255,0.02); }
      /* 2026-06-01 — Mobile fix: tables with long-text columns (CIO
         rejection reasoning, audit log reasons, etc.) were wrapping
         the reason column into a 60-px-wide vertical strip on iPhone.
         Wrap every mc-table in a horizontally-scrollable container
         via this scoped overflow rule. The header row stays put,
         the table scrolls under it on narrow screens. */
      .mc-table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
      .mc-table-scroll .mc-table { min-width: max-content; }
      .mc-table-scroll .mc-table td[data-prose] {
        white-space: normal; min-width: 280px; max-width: 460px;
      }
      /* 2026-06-01 — Global fallback: ANY mc-table that isn't already
         inside an .mc-table-scroll wrapper still needs horizontal
         scroll on narrow viewports. The .mc-card parent (which holds
         every table in this page) becomes the scroll container by
         giving the table display:block + overflow + min-width:
         max-content inside the media query. Preserves table cell
         alignment because we keep thead/tbody/tr/td as their default
         displays and just make the outer .mc-table block-level. */
      @media (max-width: 720px) {
        .mc-table-scroll .mc-table td[data-prose] { min-width: 220px; max-width: 320px; }
        .mc-table th, .mc-table td { padding: 6px 8px; font-size: 11px; }
        /* Wrap any unwrapped mc-table in its own scroll context. */
        :not(.mc-table-scroll) > .mc-table {
          display: block;
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          max-width: 100%;
        }
        /* Re-establish table layout for the inner content (display:block
           on .mc-table would otherwise break cell column alignment). */
        :not(.mc-table-scroll) > .mc-table > thead,
        :not(.mc-table-scroll) > .mc-table > tbody {
          display: table;
          min-width: max-content;
          width: 100%;
        }
      }
      /* Scroll-edge gradient hint so users know there's more content
         off-screen. Applied to .mc-card so it doesn't clip. */
      .mc-card { position: relative; }
      .mc-card::after {
        content: ""; position: absolute; top: 0; right: 0; bottom: 0;
        width: 20px; pointer-events: none;
        background: linear-gradient(to right, transparent, rgba(15,17,24,0.4));
        opacity: 0; transition: opacity 0.2s;
      }
      @media (max-width: 720px) {
        .mc-card:has(.mc-table)::after,
        .mc-card:has(.mc-table-scroll)::after { opacity: 1; }
      }
      .mc-pill { display: inline-block; padding: 2px 7px; border-radius: 4px;
        font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
      .mc-pill-ok { color: #34d399; background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.25); }
      .mc-pill-fail { color: #ef4444; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.25); }
      .mc-pill-warn { color: #f59e0b; background: rgba(245, 158, 11, 0.1); border: 1px solid rgba(245, 158, 11, 0.25); }
      .mc-pill-mute { color: #6b7280; background: rgba(107, 114, 128, 0.08); border: 1px solid rgba(107, 114, 128, 0.2); }
      .mc-btn { padding: 6px 12px; border-radius: 6px; font-size: 11px; font-weight: 600;
        background: rgba(52, 211, 153, 0.12); border: 1px solid rgba(52, 211, 153, 0.3);
        color: #34d399; cursor: pointer; transition: all 0.15s; }
      .mc-btn:hover { background: rgba(52, 211, 153, 0.2); }
      .mc-btn:disabled { opacity: 0.4; cursor: not-allowed; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
      .mc-loading { animation: pulse 1.4s ease-in-out infinite; }
