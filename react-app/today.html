    <style>
      /* 2026-06-05 — Compact horizontal category strips (Top Movers / Earnings).
         One scrolling row of chips so a category stays short vertically. */
      .tt-strip-scroll {
        display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px 8px;
        scrollbar-width: thin; -webkit-overflow-scrolling: touch;
      }
      .tt-strip-scroll::-webkit-scrollbar { height: 6px; }
      .tt-strip-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
      .tt-strip-chip {
        flex: 0 0 auto; display: inline-flex; align-items: center; gap: 7px;
        padding: 6px 11px; border-radius: 999px; cursor: pointer;
        background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.10);
        color: var(--tt-text); white-space: nowrap; transition: background .12s, border-color .12s;
      }
      .tt-strip-chip:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.2); }
      /* Growth Ideas — horizontal idea cards on Today */
      .tt-opp-scroll {
        display: flex; gap: 10px; overflow-x: auto; padding: 4px 2px 10px;
        scroll-snap-type: x proximity; scrollbar-width: thin;
        -webkit-overflow-scrolling: touch;
      }
      .tt-opp-scroll::-webkit-scrollbar { height: 6px; }
      .tt-opp-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 999px; }
      .tt-opp-card {
        flex: 0 0 260px; scroll-snap-align: start;
        display: flex; flex-direction: column; gap: 8px;
        padding: 12px 14px; border-radius: var(--vf-radius-md, 18px); cursor: pointer; text-align: left;
        background: var(--tt-bg-surface); border: 1px solid var(--tt-border);
        transition: border-color 0.15s, background 0.15s;
        color: var(--tt-text);
      }
      .tt-opp-card:hover { border-color: rgba(56,242,161,0.35); background: var(--tt-bg-elev); }
      .tt-opp-card-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
      .tt-opp-ticker { font-family: var(--tt-font-mono); font-weight: 700; font-size: 14px; }
      .tt-opp-chip {
        font-family: var(--tt-font-mono); font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
        padding: 2px 7px; border-radius: 999px; border: 1px solid rgba(56,242,161,0.35);
        color: var(--tt-accent); white-space: nowrap;
      }
      .tt-opp-meta { display: flex; flex-wrap: wrap; gap: 8px; font-family: var(--tt-font-mono); font-size: 10px; color: var(--tt-text-muted); }
      .tt-opp-why { margin: 0; font-size: 11.5px; line-height: 1.4; color: var(--tt-text-muted); display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
      .tt-opp-dip { font-size: 9px; font-weight: 700; letter-spacing: 0.06em; color: var(--tt-up-soft); text-transform: uppercase; }
      .tt-opp-zone { margin-top: 8px; }
      .tt-opp-zone-labels {
        display: flex;
        justify-content: space-between;
        gap: 4px;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--tt-text-faint);
        margin-bottom: 4px;
      }
      .tt-opp-zone-labels span:nth-child(1) { color: #fca5a5; }
      .tt-opp-zone-labels span:nth-child(2) { color: #6ee7b7; }
      .tt-opp-zone-labels span:nth-child(3) { color: #fcd34d; }
      .tt-opp-zone-track {
        position: relative;
        height: 8px;
        border-radius: 999px;
        overflow: hidden;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
      }
      .tt-opp-zone-seg {
        position: absolute;
        top: 0;
        bottom: 0;
      }
      .tt-opp-zone-seg--inv { background: rgba(248,113,113,0.72); }
      .tt-opp-zone-seg--pb { background: rgba(56,242,161,0.62); }
      .tt-opp-zone-seg--tgt { background: rgba(245,194,92,0.68); }
      .tt-opp-zone-marker {
        position: absolute;
        top: -3px;
        width: 3px;
        height: 14px;
        border-radius: 2px;
        background: var(--tt-text);
        box-shadow: 0 0 0 1px rgba(0,0,0,0.35);
        transform: translateX(-50%);
        z-index: 2;
      }
      .tt-opp-zone-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 6px 10px;
        margin-top: 6px;
        font-family: var(--tt-font-mono);
        font-size: 9px;
        color: var(--tt-text-dim);
      }
      .tt-opp-zone-prob { color: var(--tt-accent); font-weight: 700; }
      .tt-pattern-chip {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 1px 6px;
        border-radius: 999px;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
        color: var(--tt-text-muted);
        white-space: nowrap;
      }
      .tt-pattern-chip--bull { border-color: rgba(56,242,161,0.35); color: var(--tt-up-soft); }
      .tt-pattern-chip--bear { border-color: rgba(248,113,113,0.35); color: var(--tt-dn-soft); }
      .tt-primed-badge {
        font-size: 8.5px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--tt-accent);
        border: 1px solid rgba(245,194,92,0.45);
        border-radius: 999px;
        padding: 1px 6px;
        background: rgba(245,194,92,0.1);
      }
      :root {
        /* 2026-06-10 — VERDA MIGRATION (first page). The page-local token
           values are re-pointed at the Verda Finance palette (Ink / Bark /
           Moss / Cream / Sage + single mint accent) per
           skills/verda-ui-migration.md. Data semantics (--tt-up / --tt-dn)
           keep their green/red meaning — mint is the CTA/brand accent,
           NEVER a "price up" color. Surfaces are SOLID fills (Verda builds
           depth from Ink → Bark tone steps, not alpha overlays). */
        --tt-bg-base: var(--vf-ink, #0B1410);
        --tt-bg-surface: var(--vf-bark, #13201A);
        --tt-bg-elev: var(--vf-bark-hi, #1A2B22);
        --tt-border: var(--vf-moss, #1F3128);
        --tt-border-hi: var(--vf-moss-hi, #2A4136);
        --tt-text: var(--vf-cream, #E8F2EC);
        --tt-text-muted: var(--vf-sage, #8AA39A);
        --tt-text-dim: #6E867D;
        --tt-text-faint: #51635A;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: var(--vf-mint, #38F2A1);
        --tt-accent-dim: var(--vf-mint-dim, rgba(56,242,161,0.14));
        /* Verda is single-accent: violet/cyan secondary hues collapse to
           Spring (the soft mint companion) on this page. */
        --tt-violet: var(--vf-spring, #A6F7CF);
        --tt-violet-dim: rgba(166,247,207,0.12);
        --tt-cyan: var(--vf-spring, #A6F7CF);
        --tt-cyan-dim: rgba(166,247,207,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-display: "Manrope", "Inter", -apple-system, sans-serif;
        --tt-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

        /* Shared ds-* components (ticker cards, chips, rail panels) read
           these tokens from tt-tokens.css — re-point them here so every
           shared component on THIS page picks up the Verda palette without
           touching its component classes (those migrate last, per skill). */
        --ds-bg-canvas: var(--vf-ink, #0B1410);
        --ds-bg-surface: var(--vf-bark, #13201A);
        --ds-bg-surface-hi: var(--vf-bark-hi, #1A2B22);
        --ds-bg-glass: rgba(56, 242, 161, 0.035);
        --ds-bg-glass-hi: rgba(56, 242, 161, 0.07);
        --ds-text-display: var(--vf-cream, #E8F2EC);
        --ds-text-body: #CFDED6;
        --ds-text-muted: var(--vf-sage, #8AA39A);
        --ds-text-faint: #51635A;
        --ds-accent: var(--vf-mint, #38F2A1);
        --ds-accent-hi: var(--vf-spring, #A6F7CF);
        --ds-accent-soft: #5BE8AB;
        --ds-accent-dim: rgba(56, 242, 161, 0.14);
        --ds-accent-glow: rgba(56, 242, 161, 0.40);
        --ds-stroke-soft: rgba(166, 247, 207, 0.06);
        --ds-stroke: var(--vf-moss, #1F3128);
        --ds-stroke-hi: var(--vf-moss-hi, #2A4136);
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      .tt-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        /* Verda md radius (18px) — generous, consistent. */
        border-radius: var(--vf-radius-md, 18px);
      }
      .tt-card-pad { padding: 22px 24px 20px; }
      @media (max-width: 720px) { .tt-card-pad { padding: 16px 16px 14px; } }
      /* Today hero — Daily Brief (full width) + Open Positions | Research Desk. */
      .today-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        grid-template-rows: auto;
        gap: 16px;
        margin-bottom: 16px;
        align-items: stretch;
      }
      .today-hero-brief-col {
        grid-column: 1;
        grid-row: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .today-hero-pos-col {
        grid-column: 1;
        grid-row: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .today-hero-desk-col {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }
      /* Research Desk + PML — paired hero panels, fixed height + inner scroll */
      .tt-desk-panel,
      .tt-cto-panel {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .tt-desk-feed-body,
      .tt-cto-feed-body {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        min-width: 0;
        overflow: hidden;
      }
      .tt-desk-scroll,
      .tt-cto-map-scroll {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
        padding-right: 4px;
        box-sizing: border-box;
      }
      .tt-desk-scroll {
        padding-bottom: 16px;
        scroll-padding-bottom: 12px;
      }
      .tt-cto-map-scroll {
        padding-bottom: 12px;
        scroll-padding-bottom: 8px;
      }
      .tt-desk-item:last-child {
        padding-bottom: 4px;
      }
      @media (max-width: 980px) {
        .today-hero {
          grid-template-columns: 1fr !important;
          grid-template-rows: auto;
        }
        .today-hero-pos-col,
        .today-hero-brief-col,
        .today-hero-desk-col {
          grid-column: 1;
          grid-row: auto;
        }
        /* Mobile stack: Research Desk first, Open Positions second */
        .today-hero-desk-col { order: 1; }
        .today-hero-pos-col { order: 2; }
      }
      .tt-sec-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .tt-sec-h {
        font-family: var(--tt-font-display);
        font-size: 18px;
        font-weight: 800;
        color: var(--tt-text);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }
      .tt-sec-sub {
        font-size: 13px;
        color: var(--tt-text-muted);
        margin-bottom: 14px;
        line-height: 1.55;
      }
      /* Probabilistic Level Map — ticker | read | stacked level chips */
      .tt-cto-map-row {
        display: grid;
        grid-template-columns: minmax(52px, 84px) minmax(88px, 132px) minmax(0, 1fr);
        gap: 8px 12px;
        align-items: start;
        padding: 10px 0;
        border-bottom: 1px solid var(--tt-border);
        cursor: pointer;
      }
      .tt-cto-map-row:hover { background: rgba(255,255,255,0.02); }
      .tt-cto-map-sym {
        font-family: var(--tt-font-mono);
        font-weight: 700;
        font-size: 12.5px;
        padding-top: 2px;
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .tt-cto-map-spot {
        font-size: 9px;
        font-weight: 500;
        color: var(--tt-text-faint);
        line-height: 1.25;
        white-space: normal;
      }
      .tt-cto-map-read {
        min-width: 0;
        padding-top: 1px;
      }
      .tt-cto-map-levels {
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .tt-cto-map-prob {
        display: block;
        width: 100%;
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: normal;
        line-height: 1.45;
        font-family: var(--tt-font-mono);
        font-size: 11px;
      }
      .tt-cto-map-meta {
        margin-bottom: 12px;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
        font-size: 11px;
        line-height: 1.55;
        color: var(--tt-text-dim);
      }
      .tt-cto-map-meta strong {
        color: var(--tt-text-muted);
        font-weight: 600;
      }
      .tt-cto-setup-tag {
        display: inline-block;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border-radius: 999;
        padding: 1px 6px;
        white-space: nowrap;
        flex-shrink: 0;
      }
      @media (max-width: 640px) {
        .tt-cto-map-row {
          grid-template-columns: 40px 1fr;
          grid-template-areas:
            "sym read"
            "levels levels";
        }
        .tt-cto-map-sym { grid-area: sym; }
        .tt-cto-map-read { grid-area: read; }
        .tt-cto-map-levels { grid-area: levels; }
      }
      .tt-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border-radius: 999px;
        font-family: var(--tt-font-mono);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
        color: var(--tt-text-muted);
      }
      .tt-pill.up    { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.25); }
      .tt-pill.dn    { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.25); }
      .tt-pill.accent { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(56,242,161,0.30); }
      .tt-pill.violet { color: var(--tt-violet); background: var(--tt-violet-dim); border-color: rgba(166,247,207,0.30); }
      .tt-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
      .tt-market-banner {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 11px 14px;
        margin-bottom: 14px;
        border-radius: 10px;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
        font-size: 13px;
        line-height: 1.45;
        color: var(--tt-text-muted);
      }
      .tt-market-banner--closed {
        border-color: rgba(148,163,184,0.35);
        background: rgba(15,23,42,0.55);
      }
      .tt-market-banner--premarket,
      .tt-market-banner--afterhours {
        border-color: rgba(56,242,161,0.28);
        background: rgba(56,242,161,0.06);
        color: var(--tt-text);
      }
      .tt-market-banner-icon {
        flex-shrink: 0;
        font-size: 11px;
        line-height: 1.6;
        opacity: 0.85;
      }
      .tt-bmap-guide {
        margin-bottom: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid rgba(56,242,161,0.22);
        background: rgba(56,242,161,0.05);
      }
      .tt-bmap-guide-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }
      .tt-bmap-guide-title {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--tt-accent);
      }
      .tt-bmap-guide ul {
        margin: 0;
        padding-left: 18px;
        font-size: 12.5px;
        line-height: 1.5;
        color: var(--tt-text-muted);
      }
      .tt-bmap-guide li + li { margin-top: 4px; }
      .tt-bmap-guide-dismiss {
        flex-shrink: 0;
        border: 1px solid var(--tt-border);
        background: transparent;
        color: var(--tt-text-muted);
        font-size: 11px;
        font-weight: 600;
        padding: 4px 10px;
        border-radius: 999px;
        cursor: pointer;
      }
      .tt-bmap-guide-dismiss:hover { color: var(--tt-text); border-color: var(--tt-border-hi); }
      .tt-grid { display: grid; gap: 14px; }
      @media (min-width: 920px) {
        .tt-grid-2 { grid-template-columns: 1fr 1fr; }
        .tt-grid-3 { grid-template-columns: repeat(3, 1fr); }
        .tt-grid-4 { grid-template-columns: repeat(4, 1fr); }
      }
      @media (max-width: 919px) {
        .tt-grid-2, .tt-grid-3, .tt-grid-4 { grid-template-columns: 1fr; }
      }
      /* Sections row spacing — wider container so the Bubble Map + Heat Map
         get the full horizontal real estate they need. Content can breathe. */
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      /* Nav */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(11,20,16,0.88);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        /* Match `main` max-width so the nav lines up with the page
           content below (was 1200px while main is 1600px, which made
           the top of the page feel mis-aligned — nav too narrow,
           content too wide). */
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 11px;
        border-radius: 7px;
        font-weight: 500;
        transition: all 0.15s;
      }
      .nav-link:hover { background: var(--tt-bg-surface); color: var(--tt-text); }
      .nav-link.active { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.today { color: var(--tt-accent); background: var(--tt-accent-dim); border: 1px solid rgba(56,242,161,0.22); }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }
      /* Status header */
      .tt-status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding: 16px 18px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
      }
      .tt-status .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-status .greeting { font-family: var(--tt-font-display); font-size: 22px; font-weight: 800; letter-spacing: -0.025em; }
      .tt-status .date { font-size: 13px; color: var(--tt-text-muted); margin-top: 2px; }
      .tt-status .session { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      /* Tier-1 regime one-liner — single read under the greeting that
         frames the session: regime · HMM latent · breadth · SPY · VIX. */
      .tt-regime-line {
        display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
        margin-top: 10px; padding-top: 10px;
        border-top: 1px solid var(--tt-border);
        width: 100%;
      }
      .tt-regime-line .seg {
        display: inline-flex; align-items: center; gap: 6px;
        font-size: 12px; color: var(--tt-text-muted);
        white-space: nowrap;
      }
      .tt-regime-line .seg b {
        font-family: var(--tt-font-mono);
        font-size: 12px; font-weight: 700; color: var(--tt-text);
        letter-spacing: 0.01em;
      }
      .tt-regime-line .sep { color: var(--tt-text-faint); }
      /* Progressive-disclosure section (Day-Trade plan, Options plays,
         Heat map). Collapsed by default; state persists per section. */
      .tt-disclose { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-disclose { margin-bottom: 20px; } }
      .tt-disclose > summary {
        list-style: none;
        display: flex; align-items: center; gap: 10px;
        cursor: pointer; user-select: none;
        padding: 12px 16px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        transition: border-color .12s, background .12s;
      }
      .tt-disclose > summary::-webkit-details-marker { display: none; }
      .tt-disclose > summary:hover { border-color: var(--tt-border-hi); background: var(--tt-bg-elev); }
      .tt-disclose > summary .tt-disclose-title {
        font-family: var(--tt-font-display);
        font-size: 13.5px; font-weight: 800; letter-spacing: -0.01em;
        color: var(--tt-text);
      }
      .tt-disclose > summary .tt-disclose-sub {
        font-size: 11.5px; color: var(--tt-text-dim);
      }
      .tt-disclose > summary .tt-disclose-caret {
        margin-left: auto; color: var(--tt-text-dim);
        font-size: 11px; transition: transform .15s ease;
      }
      .tt-disclose[open] > summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
      .tt-disclose[open] > summary .tt-disclose-caret { transform: rotate(180deg); }
      .tt-disclose > .tt-disclose-body {
        border: 1px solid var(--tt-border); border-top: 0;
        border-bottom-left-radius: var(--vf-radius-md, 18px);
        border-bottom-right-radius: var(--vf-radius-md, 18px);
        padding: 14px 14px 6px;
        background: rgba(19,32,26,0.45);
      }
      /* Index card */
      .idx-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .idx-card .name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--tt-text-dim); text-transform: uppercase; }
      .idx-card .px { font-size: 20px; font-weight: 800; color: var(--tt-text); letter-spacing: -0.02em; font-family: var(--tt-font-mono); }
      .idx-card .chg { font-family: var(--tt-font-mono); font-size: 12px; font-weight: 600; }
      .idx-card .chg.up { color: var(--tt-up); }
      .idx-card .chg.dn { color: var(--tt-dn); }
      /* Mover card */
      .mvr {
        display: grid;
        grid-template-columns: 22px 1fr auto auto;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--tt-border);
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
      }
      .mvr:hover { background: var(--tt-bg-elev); border-color: var(--tt-border-hi); }
      .mvr .rk {
        font-family: var(--tt-font-mono);
        font-size: 10px;
        color: var(--tt-text-faint);
        font-weight: 700;
        text-align: center;
      }
      .mvr .sym { font-size: 13px; font-weight: 700; color: var(--tt-text); }
      .mvr .name { font-size: 10.5px; color: var(--tt-text-dim); margin-top: 1px; }
      .mvr .px { font-family: var(--tt-font-mono); font-size: 12px; color: var(--tt-text); font-weight: 600; }
      .mvr .chg { font-family: var(--tt-font-mono); font-size: 12px; font-weight: 700; min-width: 60px; text-align: right; }
      .mvr .chg.up { color: var(--tt-up-soft); }
      .mvr .chg.dn { color: var(--tt-dn-soft); }
      /* Heatmap chip */
      /* 2026-05-29 — Heatmap visual lift. Per user "looks dull, how do we
         make this more engaging?" Changes:
         - Tighter grid (96px min) so more tickers fit per row
         - Gradient background per cell driven by --heat-pct (set inline)
           so positive moves get a green wash that scales with magnitude,
           negative gets red, neutral stays subtle. Pre-existing lvl-*
           classes (which color by HTF score) compose on top via mix-blend.
         - Hover lifts the cell + brightens the gradient
         - Subtle inner ring on hover for tactile feedback
         - Larger pct text + tabular nums for column alignment */
      .heat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
        gap: 7px;
      }
      @media (max-width: 720px) {
        .heat-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 5px; }
      }
      .heat-cell {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: space-between;
        gap: 4px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(255,255,255,0.025);
        border: 1px solid var(--tt-border);
        text-decoration: none;
        color: inherit;
        min-height: 58px;
        transition: transform 0.14s ease, border-color 0.14s ease, box-shadow 0.14s ease;
        overflow: hidden;
        isolation: isolate;
      }
      /* Magnitude-driven background wash. The percentage cell sets
         --heat-pct (clamped -8..8) and --heat-side (up|dn|flat) inline;
         this rule draws a radial-gradient tint that scales with |pct|. */
      .heat-cell::before {
        content: "";
        position: absolute;
        inset: 0;
        z-index: -1;
        background: radial-gradient(
          circle at 50% 100%,
          var(--heat-tint, transparent) 0%,
          transparent 80%
        );
        opacity: calc(min(abs(var(--heat-pct, 0)), 8) / 12);
        pointer-events: none;
        transition: opacity 0.18s ease;
      }
      .heat-cell[data-side="up"] { --heat-tint: rgba(34, 197, 94, 0.55); }
      .heat-cell[data-side="dn"] { --heat-tint: rgba(244, 63, 94, 0.55); }
      .heat-cell[data-side="flat"] { --heat-tint: transparent; }
      .heat-cell:hover {
        border-color: var(--tt-border-hi);
        transform: translateY(-2px);
        box-shadow: 0 6px 18px -10px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.06);
      }
      .heat-cell:hover::before { opacity: calc(min(abs(var(--heat-pct, 0)), 8) / 8); }
      .heat-cell__head {
        display: flex; align-items: center; gap: 5px; min-width: 0;
      }
      .heat-cell__logo {
        width: 16px; height: 16px; flex-shrink: 0;
        border-radius: 4px; overflow: hidden;
      }
      .heat-cell .sym { font-size: 12.5px; font-weight: 700; color: var(--tt-text); letter-spacing: 0.01em; overflow: hidden; text-overflow: ellipsis; }
      .heat-cell .pct { font-family: var(--tt-font-mono); font-size: 12px; font-weight: 700; font-variant-numeric: tabular-nums; }
      .heat-cell .pct.up { color: #34d399; }
      .heat-cell .pct.dn { color: #f87171; }
      .heat-cell .pct.flat { color: var(--tt-text-muted); }
      /* HTF-score outline tint still composes for the strong/mid/weak
         signal — but subtler now that the % gradient does the heavy
         lifting. */
      .heat-cell.lvl-strong  { border-color: rgba(34,197,94,0.40); }
      .heat-cell.lvl-mid     { border-color: rgba(245,194,92,0.30); }
      .heat-cell.lvl-weak    { border-color: rgba(244,63,94,0.40); }
      .heat-cell__foot {
        display: flex; align-items: center; justify-content: space-between; gap: 4px;
        min-width: 0; margin-top: 2px;
      }
      .heat-cell__meta {
        display: flex; align-items: center; gap: 3px; min-width: 0; flex: 1;
      }
      .heat-cell__chip {
        font-size: 9px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase;
        padding: 1px 4px; border-radius: 4px; line-height: 1.3;
        background: rgba(255,255,255,0.06); color: var(--tt-text-dim);
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 52px;
      }
      .heat-cell__chip--stage { color: var(--tt-accent); background: rgba(245,194,92,0.12); }
      .heat-cell__chip--rank { font-family: var(--tt-font-mono); color: var(--tt-up-soft); background: rgba(34,197,94,0.10); }
      .heat-cell__score {
        font-family: var(--tt-font-mono); font-size: 10px; font-weight: 700;
        color: var(--tt-text-muted); flex-shrink: 0;
      }
      .heat-sort-btn {
        padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
        background: transparent; border: 1px solid var(--tt-border);
        color: var(--tt-text-dim); cursor: pointer;
      }
      .heat-sort-btn.is-active {
        background: rgba(245,194,92,0.12); border-color: rgba(245,194,92,0.35);
        color: var(--tt-accent);
      }
      /* ── Analysis header (unified controls for Bubble Map + Heat Map) ── */
      .analysis-controls {
        margin-bottom: 22px;
        padding: 24px 26px 18px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-top: 2px solid rgba(245,194,92,0.35);
        border-radius: var(--vf-radius-md, 18px);
      }
      @media (max-width: 720px) { .analysis-controls { padding: 18px 16px 14px; } }
      .ac-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .ac-head .ac-meta {
        font-size: 12px;
        color: var(--tt-text-dim);
        font-family: var(--tt-font-mono);
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }
      .ac-head .ac-meta strong { color: var(--tt-text); }
      .ac-clear {
        font-family: var(--tt-font);
        font-size: 11.5px;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
        border: 1px solid rgba(245,194,92,0.30);
        border-radius: 999px;
        padding: 4px 10px;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease;
      }
      .ac-clear:hover { background: rgba(245,194,92,0.22); border-color: rgba(245,194,92,0.55); }
      .ac-search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 9px;
        margin-bottom: 12px;
      }
      .ac-search:focus-within { border-color: var(--tt-border-hi); background: var(--tt-bg-base); }
      .ac-search input {
        flex: 1;
        background: transparent;
        border: 0;
        outline: 0;
        color: var(--tt-text);
        font-family: var(--tt-font-mono);
        font-size: 13px;
        letter-spacing: 0.02em;
      }
      .ac-search input::placeholder { color: var(--tt-text-faint); }
      .ac-search-icon { color: var(--tt-text-dim); font-size: 14px; }
      .ac-search-clear {
        cursor: pointer;
        font-size: 11px;
        color: var(--tt-text-dim);
        background: transparent;
        border: 0;
        padding: 0 4px;
      }
      .ac-search-clear:hover { color: var(--tt-text); }
      /* Filter row: label + chips. Each row is a single-select group. */
      .ac-row {
        display: grid;
        grid-template-columns: 92px 1fr;
        align-items: start;
        gap: 14px;
        padding: 7px 0;
      }
      @media (max-width: 720px) {
        .ac-row { grid-template-columns: 1fr; gap: 4px; }
      }
      .ac-row-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        padding-top: 5px;
      }
      .ac-chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .ac-chip {
        font-family: var(--tt-font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 3px 9px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.12s;
      }
      .ac-chip:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .ac-chip .ac-count { color: var(--tt-text-faint); margin-left: 4px; font-weight: 500; }
      .ac-chip.active {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
        border-color: var(--tt-border-hi);
      }
      .ac-chip.active.bull  { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.40); }
      .ac-chip.active.bear  { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.40); }
      .ac-chip.active.pull  { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(245,194,92,0.40); }
      .ac-chip.active.bull  .ac-count,
      .ac-chip.active.bear  .ac-count,
      .ac-chip.active.pull  .ac-count,
      .ac-chip.active       .ac-count { color: inherit; opacity: 0.7; }

      /* Additive add-on chips (Saved + TT Selected) — render with a
         "+" prefix when inactive and "✓" when applied. Use a violet
         accent so they read as distinct from the mutually-exclusive
         primary chips. */
      .ac-chip--addon {
        border-style: dashed;
      }
      .ac-chip--addon.active {
        color: var(--tt-violet);
        background: var(--tt-violet-dim);
        border-color: rgba(167,139,250,0.40);
        border-style: solid;
      }
      .ac-chip--addon.active .ac-count { color: inherit; opacity: 0.7; }


      /* Bubble Map */
      .bm-stage {
        position: relative;
        background: radial-gradient(ellipse at center, rgba(255,255,255,0.025) 0%, transparent 65%), #06080b;
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        overflow: hidden;
      }
      .bm-stage svg { display: block; width: 100%; height: auto; }
      .bm-tooltip {
        position: absolute;
        pointer-events: none;
        padding: 8px 10px;
        background: rgba(10,12,16,0.96);
        border: 1px solid var(--tt-border-hi);
        border-radius: 8px;
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--tt-text);
        box-shadow: 0 6px 16px rgba(0,0,0,0.50);
        z-index: 10;
        font-family: var(--tt-font-mono);
        white-space: nowrap;
        max-width: 260px;
      }
      .bm-tooltip .sym { font-weight: 800; font-family: var(--tt-font); margin-bottom: 4px; font-size: 13px; }
      .bm-tooltip .row { color: var(--tt-text-muted); }
      .bm-tooltip .row strong { color: var(--tt-text); }
      .bm-legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        font-size: 10.5px;
        color: var(--tt-text-dim);
        margin-top: 8px;
      }
      .bm-leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
      .bm-meta {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 11px;
        color: var(--tt-text-dim);
      }
      .bm-meta strong { color: var(--tt-text); }

      /* Bubble Map + Viewport split layout (mirrors Active Trader).
         300px column gives the ds-tickercard the same visual width
         as AT's fixed-width 280px cards (column - 12px padding ≈ 288). */
      .bmv-split {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 12px;
        align-items: stretch;
      }
      @media (max-width: 1100px) {
        .bmv-split { grid-template-columns: 1fr; }
      }
      .bmv-bubble { min-width: 0; }
      .bmv-bubble .tt-card { padding: 0; overflow: hidden; }
      .bm-quick-search-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 10, 8, 0.45);
        backdrop-filter: blur(2px);
      }
      .bm-quick-search-panel {
        width: min(340px, calc(100% - 32px));
        background: rgba(15, 17, 23, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: var(--vf-radius-md, 18px);
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        padding: 16px;
      }
      .bm-quick-search-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .bm-quick-search-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
      }
      .bm-quick-search-close {
        border: 0;
        background: transparent;
        color: var(--tt-text-faint);
        font-size: 18px;
        line-height: 1;

      .bm-quick-search-input {
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;

        background: rgba(255, 255, 255, 0.04);
        color: var(--tt-text);

      .bm-quick-search-input:focus {
        outline: none;

      }
      .bm-quick-search-hint {
        margin-top: 8px;
        font-size: 10px;
        color: var(--tt-text-faint);
      }

      /* Viewport — list of ds-tickercards (production DS).
         Intentionally NO outer background/border: AT's viewport is just
         a title row + flat list of cards, with each card being the only
         bordered surface. Wrapping the list in another card created
         visual nesting that looked off compared to AT. */
      .vp-card {
        background: transparent;
        border: 0;
        border-radius: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 720px;
        min-height: 0;
      }
      .vp-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
      }
      .vp-head .vp-title { font-size: 12px; font-weight: 700; letter-spacing: 0.06em; color: var(--tt-text-muted); }
      .vp-head .vp-count { font-size: 11px; color: var(--tt-text-dim); font-family: var(--tt-font-mono); }
      .vp-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow-y: auto;
        padding-right: 4px;
        flex: 1 1 auto;
        min-height: 0;
        align-content: flex-start;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.12) transparent;
      }
      .vp-list::-webkit-scrollbar { width: 6px; }
      .vp-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
      .vp-empty {
        font-size: 12px;
        color: var(--tt-text-dim);
        text-align: center;
        padding: 24px 8px;
      }
      /* Make the production ds-tickercard fill the Viewport column width
         (the AT version uses fixed width: 280 inline). */
      /* Make the production ds-tickercard fill the Viewport column width
         (the AT version uses fixed width: 280 inline) AND prevent the
         flex-column .vp-list from shrinking cards down to a one-line
         strip. With flex-shrink: 1 (default) every card collapsed to
         ~28px and clipped its content via .ds-tickercard {overflow:hidden}.
         Pin flex-shrink: 0 + a sane min-height so cards stay readable. */
      .vp-list .ds-tickercard.tt-lane-card {
        width: 100% !important;
        box-sizing: border-box;
        margin: 0;
        flex: 0 0 auto;
        min-height: 118px;
        height: auto;
      }
      /* Horizontal ticker lane — scroll strip above bubble map */
      .vp-lane-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
        min-width: 0;
      }
      .vp-lane {
        display: flex;
        flex-direction: row;
        gap: 10px;
        overflow-x: auto;
        padding: 0 0 6px;
        scroll-snap-type: x proximity;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.12) transparent;
      }
      .vp-lane::-webkit-scrollbar { height: 6px; }
      .vp-lane::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
      .vp-lane .ds-tickercard.tt-lane-card {
        width: 280px !important;
        flex: 0 0 280px;
        scroll-snap-align: start;
        min-height: 118px;
        height: auto;
      }
      .tt-mp-panel { padding: 16px 18px; }
      .tt-mp-divider {
        height: 1px;
        background: var(--tt-border, rgba(255,255,255,0.08));
        margin: 12px 0;
      }
      /* Market Pulse — 8 tiles on one row at desktop */
      .tt-mp-tiles-row {
        display: grid;
        grid-template-columns: repeat(8, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      @media (max-width: 1100px) {
        .tt-mp-tiles-row { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      }
      /* Mobile — horizontal scroll row (avoid squished 4-up grid) */
      @media (max-width: 900px) {
        .tt-mp-tiles-row {
          display: flex;
          flex-direction: row;
          flex-wrap: nowrap;
          overflow-x: auto;
          gap: 10px;
          padding-bottom: 6px;
          scroll-snap-type: x proximity;
          scrollbar-width: thin;
          scrollbar-color: rgba(255,255,255,0.12) transparent;
          -webkit-overflow-scrolling: touch;
        }
        .tt-mp-tiles-row::-webkit-scrollbar { height: 6px; }
        .tt-mp-tiles-row::-webkit-scrollbar-thumb {
          background: rgba(255,255,255,0.10);
          border-radius: 6px;
        }
        .tt-mp-tiles-row .ds-tickercard {
          flex: 0 0 152px;
          min-width: 152px;
          width: 152px !important;
          scroll-snap-align: start;
          padding: 12px !important;
        }
      }
      @media (min-width: 901px) {
        .tt-mp-tiles-row .ds-tickercard {
          min-width: 0;
          padding: 10px !important;
        }
      }
      /* Compact Top Movers under Market Pulse */
      .tt-mp-movers-compact-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .tt-mp-movers-compact-grid.has-ext {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
      @media (max-width: 900px) {
        .tt-mp-movers-compact-grid.has-ext { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .tt-mover-compact-col__title {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--tt-text-dim);
        margin-bottom: 6px;
      }
      .tt-mover-compact-list { display: flex; flex-direction: column; gap: 3px; }
      .tt-mover-compact {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        gap: 6px;
        width: 100%;
        padding: 4px 6px;
        border-radius: 6px;
        border: 1px solid transparent;
        background: transparent;
        cursor: pointer;
        font-family: var(--tt-font-mono);
        text-align: left;
      }
      .tt-mover-compact:hover {
        background: rgba(255,255,255,0.04);
        border-color: var(--tt-border, rgba(255,255,255,0.06));
      }
      .tt-mover-compact__sym { font-size: 11px; font-weight: 700; color: var(--tt-text); flex: 1; min-width: 0; }
      .tt-mover-compact__pct { font-size: 11px; font-weight: 700; margin-left: auto; flex-shrink: 0; }
      .tt-mover-compact__pct.up { color: var(--tt-up-soft); }
      .tt-mover-compact__pct.dn { color: var(--tt-dn-soft); }
      .tt-mover-compact__pct.mut { color: var(--tt-text-dim); }
      .tt-mover-compact__ext { font-size: 8px; opacity: 0.75; margin-left: 2px; }
      .tt-mover-compact-empty { font-size: 11px; color: var(--tt-text-faint); font-style: italic; }
      /* Open Positions hero — match Research Desk height on desktop; natural height on mobile */
      @media (min-width: 981px) {
        .today-hero-pos-col .tt-open-pos-hero {
          flex: 1;
          min-height: 0;
          height: min(520px, 62vh);
          max-height: min(520px, 62vh);
          padding: 14px 14px 8px;
          overflow: hidden;
          display: flex;
          flex-direction: column;
          box-sizing: border-box;
        }
        .today-hero-pos-col .tt-open-pos-grid,
        .today-hero-pos-col .tt-open-pos-split {
          flex: 1;
          min-height: 0;
          max-height: none;
          overflow-y: auto;
          padding-bottom: 4px;
          align-content: start;
        }
      }
      @media (max-width: 980px) {
        .today-hero-pos-col .tt-open-pos-hero {
          height: auto;
          max-height: none;
          min-height: 0;
          padding: 16px 14px 14px;
          overflow: visible;
          display: flex;
          flex-direction: column;
        }
        .today-hero-pos-col .tt-open-pos-grid,
        .today-hero-pos-col .tt-open-pos-split {
          flex: none;
          min-height: 0;
          max-height: none;
          overflow-y: visible;
          padding-bottom: 0;
        }
      }
      @media (max-width: 720px) {
        .tt-open-pos-split {
          display: grid;
          grid-template-columns: 1fr 1fr;
          gap: 10px;
          align-items: start;
        }
        .tt-open-pos-col {
          display: flex;
          flex-direction: column;
          gap: 8px;
          min-width: 0;
        }
        .tt-open-pos-col__label {
          font-size: 9px;
          font-weight: 800;
          letter-spacing: 0.08em;
          text-transform: uppercase;
          color: var(--tt-text-dim);
          margin-bottom: 2px;
        }
        .tt-open-pos-col--trader .tt-open-pos-col__label { color: #67e8f9; }
        .tt-open-pos-col--investor .tt-open-pos-col__label { color: #c4b5fd; }
        .tt-open-pos-col__empty {
          font-size: 10px;
          color: var(--tt-text-faint);
          font-style: italic;
          padding: 6px 0;
        }
        .tt-open-pos-split .tt-open-pos-chip__mode { display: none; }
        .tt-open-pos-chip {
          padding: 10px 11px !important;
          min-height: 72px;
        }
        .tt-open-pos-chip__sym {
          font-size: 14px;
        }
      }
      @media (min-width: 721px) {
        .tt-open-pos-split {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
          gap: 8px;
        }
        .tt-open-pos-col {
          display: contents;
        }
        .tt-open-pos-col__label,
        .tt-open-pos-col__empty {
          display: none;
        }
      }
      .tt-open-pos-chip {
        gap: 4px !important;
        padding: 7px 9px !important;
      }
      .tt-open-pos-chip__head {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .tt-open-pos-chip__sym {
        font-weight: 800;
        font-size: 13px;
        color: var(--tt-text);
        letter-spacing: 0.02em;
      }
      /* Growth Ideas + lane/bubble map — one unified panel */
      .tt-universe-panel {
        display: flex;
        flex-direction: column;
        gap: 0;
        padding: 18px 20px 16px;
      }
      .tt-universe-panel__growth { margin: 0; }
      .tt-universe-panel__divider {
        height: 1px;
        background: var(--tt-border, rgba(255,255,255,0.08));
        margin: 16px 0 14px;
      }
      .tt-universe-panel .tt-lane-section { margin: 0; }
      .tt-universe-panel .tt-lane-controls { margin-bottom: 8px; }
      .tt-universe-panel .tt-opp-scroll { padding-bottom: 4px; }
      .tt-viewport-map-head {
        margin-bottom: 12px;
      }
      .tt-viewport-map-head .tt-sec-h {
        margin-bottom: 0;
        font-size: 15px;
      }
      .tt-lane-controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 6px;
      }
      .tt-lane-section .vp-lane-wrap { margin-bottom: 0; gap: 0; }
      .tt-lane-section .tt-bmap-block { margin-top: 0; }
      .tt-lane-section .tt-bmap-guide { margin: 0 0 4px; }
      .tt-lane-section .tt-bmap-head { margin: 2px 0 4px; }
      .tt-lane-controls .ac-search { margin: 0; }
      .tt-lane-chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }
      .tt-status .brief-archive-link {
        font-size: 12px;
        font-weight: 600;
        color: var(--tt-text-muted);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .tt-status .brief-archive-link:hover { color: var(--tt-accent); }

      /* Skeleton */
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;
        border-radius: 6px;
      }
      @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      /* 2026-05-30 — Skeleton shimmer for OptionsPlaysOfTheDay loading state */
      @keyframes tt-skeleton-shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%);  }
      }

      /* Loading bar — slim gold strip across the top of the page while
         /timed/all + /timed/tickers + brief + earnings + cal are in flight.
         Stays visible until `data` lands so users don't sit on a blank page. */
      .tt-loadbar {
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: rgba(245,194,92,0.12);
        z-index: 9000;
        overflow: hidden;
      }
      .tt-loadbar::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--tt-accent), transparent);
        animation: tt-loadbar 1.4s ease-in-out infinite;
      }
      @keyframes tt-loadbar {
        0%   { left: -30%; }
        100% { left: 100%; }
      }

      /* Skeleton building blocks — match the final layout closely so the
         page doesn't visually jump when real content arrives. */
      .sk-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        padding: 16px 18px;
      }
      .sk-line { height: 12px; }
      .sk-row { display: flex; gap: 12px; align-items: center; }
      .sk-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
      @media (max-width: 919px) { .sk-grid-4 { grid-template-columns: 1fr 1fr; } }
      .sk-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .sk-lane-controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 8px;
      }
      .sk-vp-lane {
        display: flex;
        flex-direction: row;
        gap: 10px;
        overflow: hidden;
        padding-bottom: 6px;
      }
      .sk-lane-card {
        flex: 0 0 280px;
        width: 280px;
        height: 118px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
      }
      .sk-bubble-shell {
        display: grid;
        grid-template-columns: 300px 1fr;
        gap: 12px;
      }
      @media (max-width: 1100px) { .sk-bubble-shell { grid-template-columns: 1fr; } }
      .sk-card-md {
        height: 150px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
      }
      .sk-bubble-pane {
        height: 520px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
      }
      .sk-heat {
        height: 260px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
      }
      /* BriefPlaceholder (data-driven loading card) */
      .bp-card { padding: 16px 18px; }
      .bp-head {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .bp-countdown {

        font-size: 12px;
        font-weight: 700;
        color: var(--tt-text);
      }
      .bp-countdown-lbl {
        font-family: var(--tt-font);
        font-weight: 500;
        color: var(--tt-text-dim);
        margin-left: 2px;
      }
      .bp-loading {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-left: auto;

        color: var(--tt-text-dim);
        letter-spacing: 0.04em;
      }
      .bp-dots { display: inline-flex; gap: 3px; }
      .bp-dots i {
        width: 4px; height: 4px; border-radius: 50%;

      }
      .bp-dots i:nth-child(2) { animation-delay: 0.15s; }
      .bp-dots i:nth-child(3) { animation-delay: 0.30s; }
      @keyframes bp-dot {

      .bp-section-title {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        margin-bottom: 8px;
      }
      .bp-signal-list {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 12px;
      }
      .bp-signal-row {
        display: grid;
        grid-template-columns: 1fr auto auto;
        align-items: center;
        gap: 10px;
        padding: 6px 8px;

        background: transparent;
        border: 1px solid transparent;

        cursor: pointer;

      .bp-signal-row:hover {

      .bp-signal-sym {
        font-weight: 700;
        font-size: 13px;
      }
      .bp-signal-px {
        font-family: var(--tt-font-mono);
        font-size: 12px;
        color: var(--tt-text-muted);
      }
      .bp-signal-pct {
        font-family: var(--tt-font-mono);

      .bp-signal-pct.up { color: var(--tt-up); }
      .bp-signal-pct.dn { color: var(--tt-dn); }

      /* Brief preview specifics */

        margin-bottom: 12px;

        font-weight: 600;

      /* Daily Brief hero — fill the left column on desktop so the card
         doesn't leave dead space beside the Research Desk panel. */
      .brief-preview-card {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

        font-size: 14px;
        line-height: 1.6;
        color: var(--tt-text);

      }
      .brief-preview-card .brief-actions {
        margin-top: auto;
        padding-top: 4px;

      @media (min-width: 981px) {
        .today-hero-brief-col {
          display: flex;
          flex-direction: column;

        }
        .today-hero-brief-col > .brief-preview-card {

        }

          height: min(520px, 62vh);
          max-height: min(520px, 62vh);
          min-height: 0;
          flex: none;
          overflow: hidden;
        }
        .today-hero-desk-col .tt-desk-feed-body {
          flex: 1;
          min-height: 0;
          overflow: hidden;
        }
        .today-hero-desk-col .tt-desk-scroll {
          flex: 1;
          min-height: 0;
        }
      }
      @media (max-width: 980px) {
        /* Stacked mobile: same fixed-height + scroll pattern, slightly shorter cap */
        .today-hero-desk-col .tt-desk-panel {

      /* ── Unified ticker row (.tt-trow) ─────────────────────────────

      .tt-trow {

      /* Hour chip (BMO/DMH/AMC) used by Earnings rows */
