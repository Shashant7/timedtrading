        padding: 6px 12px; border-radius: 999px;
        font-family: var(--tt-font-ui); font-weight: 600;
        font-size: var(--ds-fs-meta);
        line-height: 1; white-space: nowrap;

      .si-action {
        display: inline-flex; align-items: center; gap: 6px;

        cursor: pointer; transition: background var(--ds-dur-fast), border-color var(--ds-dur-fast);

      .si-action:hover { background: var(--ds-bg-glass-hi); border-color: var(--ds-stroke-hi); }

      .si-action:disabled { opacity: 0.45; cursor: not-allowed; }

      .si-menu {
        position: relative; display: inline-block;

      .si-menu__trigger {
        background: transparent; border: 1px solid var(--ds-stroke);

      .si-menu__item {
        display: block; width: 100%; padding: 7px 10px; border-radius: 6px;

      }
      .si-menu__item:hover { background: var(--ds-bg-glass); }
      .si-menu__item--danger { color: var(--ds-dn); }

      .si-proposal {
        padding: var(--ds-space-3); border-radius: 10px;

// ── Shared helpers ──
function SQNBadge({ sqn }) {
  if (sqn == null) return null;
  const cls = sqn >= 3 ? "badge-good" : sqn >= 2 ? "badge-info" : sqn >= 1 ? "badge-warn" : "badge-bad";
  const label = sqn >= 3 ? "Excellent" : sqn >= 2 ? "Good" : sqn >= 1 ? "Needs Work" : "Broken";
  return <span className={`inline-block px-2 py-0.5 rounded-full text-[11px] font-semibold ${cls}`}>{sqn.toFixed(2)} — {label}</span>;
}
function DeltaBadge({ value, suffix = "", invert = false }) {
  if (value == null || value === 0) return null;
  const positive = invert ? value < 0 : value > 0;
  return <span className={`text-[10px] font-semibold ml-1.5 ${positive ? "text-emerald-400" : "text-rose-400"}`}>{value > 0 ? "+" : ""}{value}{suffix}</span>;
}
function MetricBox({ label, value, delta, suffix = "", color }) {
  return (
    <div className="card p-3">
      <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-1">{label}</div>
      <div className="flex items-baseline gap-1">
        <span className={`text-lg font-bold ${color || "text-white"}`}>{value ?? "—"}{suffix && <span className="text-xs text-slate-400 ml-0.5">{suffix}</span>}</span>
        <DeltaBadge value={delta} />
      </div>
    </div>
  );
}
function BarChart({ data, maxVal, colorFn }) {
  if (!data || !data.length) return null;
  const max = maxVal || Math.max(...data.map(d => Math.abs(d.value)), 1);
  return (
    <div className="space-y-1">
      {data.map((d, i) => (
        <div key={i} className="flex items-center gap-2">
          <span className="text-[10px] text-slate-400 w-16 shrink-0 text-right">{d.label}</span>
          <div className="flex-1 meter-bar">
            <div className="meter-fill" style={{width:`${Math.min(100, Math.abs(d.value)/max*100)}%`, background: colorFn ? colorFn(d.value) : (d.value >= 0 ? "#10b981" : "#f43f5e")}} />
          </div>
          <span className="text-[10px] text-slate-300 w-10 text-right">{d.value}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TAB: Engine (v2 dashboard — System Intelligence revamp 2026-05-03)
// Pulls live KPIs from the active backtest run via the new
// `/timed/admin/system-intelligence/engine-snapshot` endpoint. This
// replaces the stale Generation #22 numbers that the old Dashboard
// surfaced — operators land here and immediately see (1) the engine
// health pill, (2) live run KPIs, (3) top winners + bottom losers, and
// (4) sim-day progress for the in-flight leg.
// ═══════════════════════════════════════════════════════════════
function fmtMoneyDelta(v) {
  const n = Number(v);
  if (!Number.isFinite(n)) return "—";
  const sign = n >= 0 ? "+" : "-";
  return `${sign}$${Math.abs(n).toLocaleString("en-US", { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
}
function fmtPctVal(v, digits = 1) {
  const n = Number(v);
  if (!Number.isFinite(n)) return "—";
  return `${n.toFixed(digits)}%`;
}
function fmtNum2(v, digits = 2) {
  const n = Number(v);
  if (!Number.isFinite(n)) return "—";
  return n.toFixed(digits);
}
function timeAgo(ms) {
  const v = Number(ms);
  if (!Number.isFinite(v) || v <= 0) return "—";
  const diff = Date.now() - v;
  if (diff < 60000) return "just now";
  if (diff < 3600000) return `${Math.round(diff / 60000)}m ago`;
  if (diff < 86400000) return `${Math.round(diff / 3600000)}h ago`;
  return `${Math.round(diff / 86400000)}d ago`;
}

function HealthPill({ health }) {
  if (!health) return null;
  const cls = health.level === "danger" ? "si-pill--danger" : health.level === "warn" ? "si-pill--warn" : "si-pill--ok";
  return (
    <span className={`si-pill ${cls} si-pill--pulse`} title={(health.details || []).join(" · ")}>
      <span className="si-pill__dot" />
      <span>Engine: {health.label}</span>
    </span>
  );
}

function KpiTile({ label, value, suffix, sub, valueClass, hint }) {
  return (
    <div className="si-kpi" title={hint || ""}>
      <div className="si-kpi__label">{label}</div>
      <div>
        <span className={`si-kpi__value ${valueClass || ""}`}>{value}</span>
        {suffix && <span className="si-kpi__suffix">{suffix}</span>}
      </div>
      {sub && <div className="si-kpi__sub">{sub}</div>}
    </div>
  );
}

function EngineTab({ snapshot, onRefresh, refreshing, lastFetched, error }) {
  if (!snapshot && !error) {
    return (
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
        {Array.from({ length: 6 }).map((_, i) => <div key={i} className="ds-skeleton ds-skeleton--tile" />)}
      </div>
    );
  }
  if (error) {
    return (
      <div className="si-card" style={{borderLeft:"3px solid var(--ds-dn)"}}>
        <div className="si-card__title">Engine snapshot unavailable</div>
        <div className="si-card__subtitle" style={{color:"var(--ds-dn)"}}>{error}</div>
        <button className="si-action mt-3" onClick={onRefresh}>Retry</button>
      </div>
    );
  }
  const k = snapshot.kpis || {};
  const sim = snapshot.sim_progress;
  const winners = snapshot.top_winners || [];
  const losers = snapshot.top_losers || [];
  const recent = snapshot.recent_trades || [];
  const fmtSimDate = (d) => {
    if (!d) return "—";
    try { return new Date(d).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }); }
    catch { return d; }
  };

  return (
    <div className="space-y-5">
      {/* Active-run banner */}
      <div className={`si-banner ${snapshot.health?.level === "danger" ? "si-banner--danger" : snapshot.health?.level === "warn" ? "si-banner--warn" : "si-banner--ok"}`}>
        <HealthPill health={snapshot.health} />
        <div style={{flex:1, minWidth:200}}>
          <div style={{fontSize:"var(--ds-fs-meta)", color:"var(--ds-text-muted)", textTransform:"uppercase", letterSpacing:"0.14em", fontWeight:700}}>
            Active Run · {snapshot.run_status || "—"}
          </div>
          <div style={{fontFamily:"var(--tt-font-mono)", color:"var(--ds-text-display)", fontSize:"var(--ds-fs-body)", fontWeight:600, marginTop:2}}>
            {snapshot.run_label || snapshot.run_id || "—"}
          </div>
          {snapshot.run_description && (
            <div style={{fontSize:"var(--ds-fs-meta)", color:"var(--ds-text-muted)", marginTop:2}}>{snapshot.run_description}</div>
          )}
        </div>
        <div style={{textAlign:"right"}}>
          <div style={{fontSize:"var(--ds-fs-caption)", color:"var(--ds-text-muted)", letterSpacing:"0.12em", textTransform:"uppercase", fontWeight:700}}>
            Refreshed
          </div>
          <div style={{fontFamily:"var(--tt-font-mono)", color:"var(--ds-text-body)", fontSize:"var(--ds-fs-meta)"}}>
            {timeAgo(lastFetched)}
          </div>
        </div>
        <button className="si-action" onClick={onRefresh} disabled={refreshing}>
          {refreshing ? "Refreshing…" : "Refresh"}
        </button>
      </div>

      {/* Sim progress */}
      {sim && (
        <div className="si-card">
          <div className="flex items-center justify-between mb-2">
            <div>
              <div className="si-card__eyebrow">Sim Progress</div>
              <div className="si-card__title">
                {fmtSimDate(sim.current_sim_date)} <span style={{color:"var(--ds-text-muted)", fontWeight:400, fontSize:"var(--ds-fs-body)"}}>of {fmtSimDate(sim.end_date)}</span>
              </div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontFamily:"var(--tt-font-mono)", color:"var(--ds-text-display)", fontSize:"var(--ds-fs-emph)", fontWeight:600}}>{sim.pct}%</div>
              <div style={{fontSize:"var(--ds-fs-meta)", color:"var(--ds-text-muted)"}}>day {sim.elapsed_days}/{sim.total_days}</div>
            </div>
          </div>
          <div className="si-progress">
            <div className="si-progress__fill si-progress__fill--up" style={{width:`${sim.pct}%`}} />
          </div>
        </div>
      )}

      {/* KPIs */}
      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
        <KpiTile
          label="Net P&L"
          value={fmtMoneyDelta(k.realized_pnl)}
          valueClass={k.realized_pnl >= 0 ? "si-kpi__value--up" : "si-kpi__value--dn"}
          sub={`${k.trades_closed || 0} closed`}
          hint="Sum of realized P&L for all closed trades on the active run."
        />
        <KpiTile
          label="Win Rate"
          value={fmtPctVal(k.win_rate, 1).replace("%", "")}
          suffix="%"
          valueClass={k.win_rate >= 50 ? "si-kpi__value--up" : "si-kpi__value--dn"}
          sub={`${k.wins || 0}W · ${k.losses || 0}L`}
          hint="% of closed trades with pnl > 0."
        />
        <KpiTile
          label="Profit Factor"
          value={k.profit_factor != null ? fmtNum2(k.profit_factor, 2) : "∞"}
          valueClass={(k.profit_factor || 0) >= 1.4 ? "si-kpi__value--up" : (k.profit_factor || 0) >= 1.0 ? "si-kpi__value--accent" : "si-kpi__value--dn"}
          sub="gross W / gross L"
          hint="Gross profits divided by gross losses."
        />
        <KpiTile
          label="SQN"
          value={fmtNum2(k.sqn, 2)}
          valueClass={k.sqn >= 2 ? "si-kpi__value--up" : k.sqn >= 1 ? "si-kpi__value--accent" : "si-kpi__value--dn"}
          sub="van Tharp"
          hint="System Quality Number — (mean R / std R) × √N. ≥2 is good."
        />
        <KpiTile
          label="Avg R"
          value={fmtNum2(k.avg_r, 2)}
          suffix="%"
          valueClass={k.avg_r >= 0 ? "si-kpi__value--up" : "si-kpi__value--dn"}
          sub={`σ ${fmtNum2(k.std_r, 2)}%`}
          hint="Average per-trade return percent."
        />
        <KpiTile
          label="Max DD"
          value={fmtMoneyDelta(-Math.abs(k.max_drawdown))}
          valueClass="si-kpi__value--dn"
          sub={`${fmtPctVal(k.max_drawdown_pct, 1)} from peak`}
          hint="Largest peak-to-trough drawdown of the realized P&L curve."
        />
      </div>

      {/* Winners / Losers */}
      <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
        <div className="si-card">
          <div className="si-card__head">
            <div>
              <div className="si-card__eyebrow">Top winners (run)</div>
              <div className="si-card__title">Top 5 by $</div>
            </div>
            <a className="si-action" href={`trade-autopsy.html?run_id=${encodeURIComponent(snapshot.run_id)}&filter=winners`}>
              All
            </a>
          </div>
          {winners.length === 0 ? (
            <div style={{color:"var(--ds-text-muted)", fontSize:"var(--ds-fs-body)"}}>No closed trades yet.</div>
          ) : winners.map((t) => (
            <div className="si-trade-row" key={t.trade_id}>
              <div>
                <div className="si-trade-row__ticker">{t.ticker} <span style={{color:t.direction === "LONG" ? "var(--ds-up)" : "var(--ds-dn)", fontSize:"var(--ds-fs-caption)", marginLeft:6}}>{t.direction}</span></div>
                <div className="si-trade-row__meta">{t.exit_reason || "—"} · {t.setup_grade || "—"}</div>
              </div>
              <div className="si-trade-row__pct">{fmtPctVal(t.pnl_pct, 2)}</div>
              <div className="si-trade-row__pnl si-trade-row__pnl--up">{fmtMoneyDelta(t.pnl)}</div>
            </div>
          ))}
        </div>
        <div className="si-card">
          <div className="si-card__head">
            <div>
              <div className="si-card__eyebrow">Bottom losers (run)</div>
              <div className="si-card__title">Bottom 5 by $</div>
            </div>
            <a className="si-action" href={`trade-autopsy.html?run_id=${encodeURIComponent(snapshot.run_id)}&filter=losers`}>
              All
            </a>
          </div>
          {losers.length === 0 ? (
            <div style={{color:"var(--ds-text-muted)", fontSize:"var(--ds-fs-body)"}}>No closed trades yet.</div>
          ) : losers.map((t) => (
            <div className="si-trade-row" key={t.trade_id}>
              <div>
                <div className="si-trade-row__ticker">{t.ticker} <span style={{color:t.direction === "LONG" ? "var(--ds-up)" : "var(--ds-dn)", fontSize:"var(--ds-fs-caption)", marginLeft:6}}>{t.direction}</span></div>
                <div className="si-trade-row__meta">{t.exit_reason || "—"} · {t.setup_grade || "—"}</div>
              </div>
              <div className="si-trade-row__pct">{fmtPctVal(t.pnl_pct, 2)}</div>
              <div className="si-trade-row__pnl si-trade-row__pnl--dn">{fmtMoneyDelta(t.pnl)}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Recent trades */}
      {recent.length > 0 && (
        <div className="si-card">
          <div className="si-card__head">
            <div>
              <div className="si-card__eyebrow">Latest activity</div>
              <div className="si-card__title">Last 10 trades</div>
            </div>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
            {recent.map((t) => (
              <div className="si-trade-row" key={t.trade_id}>
                <div>
                  <div className="si-trade-row__ticker">{t.ticker} <span style={{color:t.direction === "LONG" ? "var(--ds-up)" : "var(--ds-dn)", fontSize:"var(--ds-fs-caption)", marginLeft:6}}>{t.direction}</span></div>
                  <div className="si-trade-row__meta">{t.exit_reason || "—"}</div>
                </div>
                <div className="si-trade-row__pct">{fmtPctVal(t.pnl_pct, 2)}</div>
                <div className={`si-trade-row__pnl ${t.pnl >= 0 ? "si-trade-row__pnl--up" : "si-trade-row__pnl--dn"}`}>{fmtMoneyDelta(t.pnl)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );

          <SQNBadge sqn={s.sqn} />
        </div>
      )}

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
        <MetricBox label="SQN" value={s.sqn} delta={d.sqn} color={s.sqn >= 2 ? "text-emerald-400" : s.sqn >= 1 ? "text-amber-400" : "text-rose-400"} />

      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Model Health */}
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-white mb-3">Model Health</h3>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">Predictions (total)</span><span className="text-white font-medium">{mh.predictions?.total ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Open predictions</span><span className="text-white font-medium">{mh.predictions?.open ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Hit rate</span><span className="text-white font-medium">{mh.outcomes?.hitRate ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Active patterns</span><span className="text-white font-medium">{mh.patterns?.active ?? "—"}</span></div>

          </div>
        </div>

        {/* Direction Accuracy */}
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-white mb-3">Direction Accuracy</h3>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">Total resolved</span><span className="text-white font-medium">{da.total ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Correct</span><span className="text-emerald-400 font-medium">{da.correct ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Accuracy</span><span className="text-white font-bold">{da.accuracy != null ? da.accuracy + "%" : "—"}</span></div>

        </div>
      </div>

      {/* What's working / Proceed with caution */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-emerald-400 mb-3">What's Working</h3>
          {(dashboard.whats_working || []).length === 0 ? (
            <p className="text-xs text-slate-500">No data yet — run a calibration first.</p>

            <div className="space-y-2">
              {dashboard.whats_working[0]?.source === "moves" && (
                <p className="text-[10px] text-slate-500 mb-1">Based on {dashboard.whats_working.reduce((s,p) => s + (p.n||0), 0).toLocaleString()} historical winning moves</p>

                      <span className="text-emerald-400 font-medium">{p.avg_atr ? `${p.avg_atr.toFixed(1)}x ATR` : ""}</span>
                    ) : (
                      <span className="text-emerald-400 font-medium">{p.win_rate}% WR</span>

                </div>
              ))}

        <div className="card p-4">
          <h3 className="text-sm font-semibold text-amber-400 mb-3">Proceed with Caution</h3>
          {(dashboard.proceed_with_caution || []).length === 0 ? (

                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* What the Data Shows — winner profiles */}
      {dashboard.profiles && dashboard.profiles.length > 0 && (() => {
        const winners = dashboard.profiles.filter(p => p.profile_type === "winner_move" && p.entry_state !== "ALL").sort((a, b) => (b.sample_count || 0) - (a.sample_count || 0)).slice(0, 5);

                      {w.vix_p50 > 0 && <div><span className="text-slate-500">VIX </span><span className="text-white font-medium">{w.vix_p25?.toFixed(0)}–{w.vix_p75?.toFixed(0)}</span></div>}
                    </div>
                    {w.top_signals_json && (() => {
                      try {
                        const sigs = typeof w.top_signals_json === "string" ? JSON.parse(w.top_signals_json) : w.top_signals_json;
                        const sigEntries = Object.entries(sigs).filter(([_, v]) => v > 0).sort((a, b) => b[1] - a[1]);
                        if (!sigEntries.length) return null;
                        return <div className="mt-1.5 flex gap-1.5 flex-wrap">{sigEntries.map(([sig, count]) => <span key={sig} className="px-1.5 py-0.5 rounded text-[9px] bg-blue-500/10 text-blue-300">{sig.replace(/_/g, " ")} ({count})</span>)}</div>;
                      } catch { return null; }
                    })()}
                  </div>
                );
              })}
            </div>
          </div>
        );
      })()}

      {/* Applied Adaptations */}
      {dashboard.applied_adaptations && (
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-purple-400 mb-1">Applied Adaptations</h3>
          <p className="text-[10px] text-slate-500 mb-3">Active learned parameters influencing the scoring and entry engine</p>
          <div className="space-y-3">
            {dashboard.applied_adaptations.adaptive_entry_gates && (() => {
              const gates = dashboard.applied_adaptations.adaptive_entry_gates.value;
              const entries = Object.entries(gates).filter(([k]) => k !== "_default").slice(0, 6);
              if (!entries.length) return null;
              return (
                <div>
                  <div className="text-[11px] font-medium text-slate-300 mb-1.5">Per-State Entry Gates</div>
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                    {entries.map(([state, g]) => (
                      <div key={state} className="text-[10px] p-2 rounded bg-white/[0.02] border border-white/[0.04]">
                        <span className="text-slate-400">{state.replace(/HTF_/g, "").replace(/LTF_/g, "").replace(/_/g, " ")}</span>
                        <div className="flex gap-3 mt-1 text-white">
                          <span>Rank ≥{Math.round(g.min_rank)}</span>
                          <span>Comp ≤{Math.round(g.max_completion * 100)}%</span>
                          {g.min_htf_score > 0 && <span>HTF ≥{g.min_htf_score}</span>}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {dashboard.applied_adaptations.adaptive_regime_gates && (() => {
              const rg = dashboard.applied_adaptations.adaptive_regime_gates.value;
              const entries = Object.entries(rg);
              if (!entries.length) return null;
              return (
                <div>
                  <div className="text-[11px] font-medium text-slate-300 mb-1.5">VIX Regime Gates</div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    {entries.map(([bucket, g]) => (
                      <div key={bucket} className="text-[10px] p-2 rounded bg-white/[0.02] border border-white/[0.04]">
                        <div className="text-slate-400 capitalize mb-1">VIX {bucket} ({g.vix_range?.[0]}–{g.vix_range?.[1]})</div>
                        <div className="text-white">{g.sample_count}t · {g.win_rate}% WR</div>
                        {g.block_long && <div className="text-rose-400 font-medium mt-0.5">LONG blocked</div>}
                        {g.restrict_to_short_only && <div className="text-rose-400 font-medium mt-0.5">SHORT only</div>}
                        {g.require_rank_boost > 0 && <div className="text-amber-400 mt-0.5">Rank +{g.require_rank_boost}</div>}
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {dashboard.applied_adaptations.adaptive_sl_tp && (() => {
              const sltp = dashboard.applied_adaptations.adaptive_sl_tp.value;
              const entries = Object.entries(sltp).filter(([k]) => k !== "_default").slice(0, 4);
              if (!entries.length) return null;
              return (
                <div>
                  <div className="text-[11px] font-medium text-slate-300 mb-1.5">SL/TP per State (ATR)</div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                    {entries.map(([state, v]) => (
                      <div key={state} className="text-[10px] p-2 rounded bg-white/[0.02] border border-white/[0.04]">
                        <div className="text-slate-400 mb-1">{state.replace(/HTF_/g, "").replace(/LTF_/g, "").replace(/_/g, " ")}</div>
                        <div className="text-white">SL {v.sl_atr} · TP {v.tp_trim_atr}/{v.tp_exit_atr}/{v.tp_runner_atr}</div>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })()}
            {!dashboard.applied_adaptations.adaptive_entry_gates && !dashboard.applied_adaptations.adaptive_regime_gates && (
              <p className="text-xs text-slate-500">No adaptive parameters applied yet. Run calibration and click Apply.</p>
            )}
          </div>
        </div>
      )}

      {/* Hindsight Oracle: What great entries look like + recommendations */}
      {dashboard.hindsight_oracle && (dashboard.hindsight_oracle.golden_profiles || dashboard.hindsight_oracle.recommendations?.length) && (
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-amber-200/90 mb-2">What Great Entries Look Like (5m)</h3>
          <p className="text-[10px] text-slate-500 mb-3">Ideal signal profiles from qualifying moves (≥2 ATR, ≥3 days). Compare to your trades to calibrate.</p>
          {dashboard.hindsight_oracle.golden_profiles && Object.keys(dashboard.hindsight_oracle.golden_profiles).length > 0 && (
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
              {Object.entries(dashboard.hindsight_oracle.golden_profiles).slice(0, 6).map(([state, g]) => (
                <div key={state} className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04] text-xs">
                  <div className="font-mono text-slate-300 mb-1">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</div>
                  <div className="text-slate-500 text-[10px]">n={g.sample_count} · squeeze {g.squeeze_release_pct}% · ema {g.ema_cross_pct}% · st_flip {g.st_flip_pct}%</div>
                  <div className="text-slate-400 mt-1">HTF med {g.htf_score_median} · LTF med {g.ltf_score_median} · avg move {g.avg_move_atr} ATR</div>
                </div>
              ))}
            </div>
          )}
          {dashboard.hindsight_oracle.recommendations && dashboard.hindsight_oracle.recommendations.length > 0 && (
            <div>
              <h4 className="text-xs font-semibold text-slate-400 mb-2">Top Recommendations</h4>
              <ul className="space-y-1.5">
                {dashboard.hindsight_oracle.recommendations.slice(0, 5).map((rec, i) => (
                  <li key={i} className="text-xs text-slate-300 pl-2 border-l-2 border-amber-500/30">{rec.message}</li>
                ))}
              </ul>
            </div>
          )}
        </div>
      )}

      {/* VIX Regime Performance */}
      {dashboard.vix_buckets && Object.keys(dashboard.vix_buckets).length > 0 && (
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-slate-300 mb-3">Performance by VIX Regime</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            {Object.entries(dashboard.vix_buckets).map(([bucket, m]) => (
              <div key={bucket} className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04] text-center">
                <div className="text-[10px] text-slate-500 uppercase mb-1">{bucket}</div>
                <div className="text-lg font-bold">{m.n || 0}</div>
                <div className="text-[10px] text-slate-400">trades</div>
                <div className={`text-xs font-semibold mt-1 ${(m.win_rate || 0) >= 50 ? "text-emerald-400" : "text-rose-400"}`}>{m.win_rate || 0}% WR</div>
                <div className={`text-[10px] ${(m.expectancy || 0) >= 0 ? "text-emerald-400/70" : "text-rose-400/70"}`}>{m.expectancy || 0} exp</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function SystemHealthCard({ health }) {

  const o = health.overall;
  return (
    <div className="card p-5">
      <div className="flex items-center justify-between mb-3">
        <h3 className="text-sm font-semibold text-white">System Health (SQN)</h3>
        <SQNBadge sqn={o.sqn} />

        <div><div className="text-[10px] text-slate-500 uppercase">Trades</div><div className="text-lg font-bold">{o.n}</div></div>
        <div><div className="text-[10px] text-slate-500 uppercase">Win Rate</div><div className="text-lg font-bold">{o.win_rate}%</div></div>
        <div><div className="text-[10px] text-slate-500 uppercase">Expectancy</div><div className={`text-lg font-bold ${o.expectancy >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{o.expectancy}</div></div>
        <div><div className="text-[10px] text-slate-500 uppercase">Avg R</div><div className={`text-lg font-bold ${o.avg_r >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{o.avg_r}</div></div>

      </div>
      {health.by_regime && Object.keys(health.by_regime).length > 0 && (
        <div>
          <div className="text-xs text-slate-400 mb-2 font-medium">By Regime</div>
          <div className="overflow-x-auto">
            <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
              <th className="text-left py-1.5 pr-3 font-medium">Regime</th><th className="text-right px-2 font-medium">N</th><th className="text-right px-2 font-medium">Win%</th><th className="text-right px-2 font-medium">Exp</th><th className="text-right pl-2 font-medium">SQN</th>
            </tr></thead><tbody>
              {Object.entries(health.by_regime).map(([r, d]) => (
                <tr key={r} className="border-b border-white/[0.03]">
                  <td className="py-1.5 pr-3 text-slate-300">{r}</td><td className="text-right px-2">{d.n}</td><td className="text-right px-2">{d.win_rate}%</td>
                  <td className={`text-right px-2 ${d.expectancy >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{d.expectancy}</td>
                  <td className="text-right pl-2"><SQNBadge sqn={d.sqn} /></td>
                </tr>
              ))}
            </tbody></table>
          </div>
        </div>
      )}
    </div>
  );
}
function EntryPathsCard({ paths }) {
  if (!paths) return null;
  const sorted = Object.entries(paths).sort((a, b) => (b[1].n || 0) - (a[1].n || 0));
  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-3">Entry Path Performance</h3>
      <div className="overflow-x-auto">
        <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
          <th className="text-left py-1.5 font-medium">Path</th><th className="text-right px-2 font-medium">N</th><th className="text-right px-2 font-medium">Win%</th>
          <th className="text-right px-2 font-medium">Exp</th><th className="text-right px-2 font-medium">SQN</th><th className="text-right px-2 font-medium">MFE(ATR)</th>
          <th className="text-right px-2 font-medium">Kelly%</th><th className="text-right pl-2 font-medium">Action</th>
        </tr></thead><tbody>
          {sorted.map(([path, d]) => (
            <tr key={path} className="border-b border-white/[0.03]">
              <td className="py-1.5 font-mono text-slate-300">{path}</td><td className="text-right px-2">{d.n}</td><td className="text-right px-2">{d.win_rate}%</td>
              <td className={`text-right px-2 ${d.expectancy >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{d.expectancy}</td>
              <td className="text-right px-2">{d.sqn?.toFixed(2)}</td><td className="text-right px-2">{d.avg_mfe_atr?.toFixed(2)}</td>
              <td className="text-right px-2">{d.half_kelly_pct?.toFixed(1)}%</td>
              <td className="text-right pl-2"><span className={`px-1.5 py-0.5 rounded text-[10px] font-semibold ${d.action === "BOOST" ? "badge-good" : d.action === "DISABLE" ? "badge-bad" : d.action === "RESTRICT" ? "badge-warn" : "badge-info"}`}>{d.action}</span></td>
            </tr>
          ))}
        </tbody></table>
      </div>
    </div>
  );
}
function SignalICCard({ ic }) {
  if (!ic) return null;
  const data = Object.entries(ic).map(([k, v]) => ({ label: k, value: v.ic != null ? Number(v.ic.toFixed(3)) : 0 })).sort((a, b) => Math.abs(b.value) - Math.abs(a.value));
  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-3">Signal Information Coefficient</h3>
      <BarChart data={data} colorFn={v => Math.abs(v) > 0.10 ? "#10b981" : Math.abs(v) > 0.05 ? "#fbbf24" : "#6b7280"} />
      <div className="mt-3 text-[10px] text-slate-500">|IC| &gt; 0.10 = strong, &gt; 0.05 = useful, near 0 = noise</div>
    </div>
  );
}
function SLTPCard({ sltp }) {

        <div>
          <div className="text-xs text-slate-400 font-medium mb-2">Stop Loss (Winner MAE in ATR)</div>
          <div className="space-y-1 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">P50</span><span>{sltp.winner_mae?.p50?.toFixed(2)}</span></div>
            <div className="flex justify-between font-medium"><span className="text-amber-400">P75 (recommended)</span><span>{sltp.winner_mae?.p75?.toFixed(2)}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">P90</span><span>{sltp.winner_mae?.p90?.toFixed(2)}</span></div>
          </div>
        </div>
        <div>
          <div className="text-xs text-slate-400 font-medium mb-2">Take Profit (Trade MFE in ATR)</div>
          <div className="space-y-1 text-xs">

function AnalysisSummary({ report, recs }) {
  if (!report) return null;
  const o = report.system_health?.overall || {};

  const sltp = report.sl_tp_calibration || {};
  const wfo = report.wfo_summary || {};

  const sqnGrade = o.sqn >= 7 ? "Holy Grail" : o.sqn >= 5 ? "Excellent" : o.sqn >= 3 ? "Good" : o.sqn >= 1.5 ? "Average" : o.sqn >= 0 ? "Poor" : "Broken";
  const sqnColor = o.sqn >= 3 ? "text-emerald-400" : o.sqn >= 1.5 ? "text-amber-400" : "text-rose-400";

  const sortedPaths = Object.entries(paths).filter(([, v]) => v.n >= 3).sort((a, b) => (b[1].sqn || 0) - (a[1].sqn || 0));
  const bestPaths = sortedPaths.filter(([, v]) => v.profit_factor > 1.2 && v.sqn > 0);
  const worstPaths = sortedPaths.filter(([, v]) => v.profit_factor < 0.8 || v.sqn < -0.5).reverse();

  const classifications = {};
  if (report.trade_classifications) for (const [k, v] of Object.entries(report.trade_classifications)) classifications[k] = v;
  const manualNotes = report.trade_classifications?.manual_notes_for_learning || [];
  const manualNotesCount = manualNotes.length;

  const moveMfe = sltp.move_mfe?.p50;
  const tpTrim = sltp.recommended_tp_trim_atr;
  const slAtr = sltp.recommended_sl_atr;
  const captureRatio = moveMfe && tpTrim ? Math.round((tpTrim / moveMfe) * 100) : null;

  return (
    <div className="card p-5 mb-4 border-l-4 border-blue-500/40">
      <h3 className="text-sm font-semibold text-blue-300 mb-3">Analysis Summary</h3>

          <p className="text-slate-400">
            {o.n} trades analyzed. Win rate {o.win_rate}%, profit factor {o.profit_factor}, expectancy {o.expectancy >= 0 ? "+" : ""}{o.expectancy} per trade.
            {o.sqn < 0 && " The system is currently losing money overall."}
            {o.sqn >= 0 && o.sqn < 1.5 && " The system is near break-even but has no reliable edge yet."}
            {o.sqn >= 1.5 && o.sqn < 3 && " The system has a modest edge but needs improvement for consistency."}
            {o.sqn >= 3 && " The system has a solid, consistent edge."}
            {o.n < 100 && ` Sample size is small (${o.n} trades) — run a full backtest for statistical confidence.`}

        </div>

        {/* Walk-Forward */}
        {wfo?.verdict && (
          <div className={`p-3 rounded-lg border ${wfo.verdict === "WARNING" ? "bg-amber-500/5 border-amber-500/20" : wfo.verdict === "FAIL" ? "bg-rose-500/5 border-rose-500/20" : "bg-emerald-500/5 border-emerald-500/20"}`}>

                    <span className="text-slate-300">{c.ticker}</span> {c.direction} {c.n_trades}t <span className={c.total_pnl_pct >= 0 ? "text-emerald-500" : "text-rose-500"}>{c.total_pnl_pct}%</span> [{c.pattern}]

        {/* SL/TP Diagnosis */}
        {slAtr != null && moveMfe != null && (
          <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">

        {/* Key Actions */}
        {recs && (

            <ul className="space-y-1 text-slate-400">
              {recs.path_adjustments && Object.entries(recs.path_adjustments).filter(([, v]) => v.action === "DISABLE").map(([state]) => (
                <li key={state}>Disable entries in <span className="text-white">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span> — negative expectancy</li>
              ))}
              {Object.entries(paths).filter(([, v]) => v.action === "BOOST" && v.n >= 3).map(([state]) => (
                <li key={state}>Increase allocation to <span className="text-emerald-400">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span> — positive edge</li>
              ))}
              {recs.sl_atr != null && <li>Set stop loss to <span className="text-white">{recs.sl_atr} ATR</span></li>}
              {recs.tp_tiers && <li>TP tiers: trim at <span className="text-white">{recs.tp_tiers.trim}</span>, exit at <span className="text-white">{recs.tp_tiers.exit}</span>, runner at <span className="text-white">{recs.tp_tiers.runner} ATR</span></li>}
              {recs.same_ticker_repeat_recommendation && <li className="text-amber-200/90">Same-ticker repeats: {recs.same_ticker_repeat_recommendation}</li>}
              {report.hindsight_oracle?.recommendations?.map((rec, i) => <li key={`oracle-${i}`}>{rec.message}</li>)}

      </div>
    </div>
  );
}

function PatternsTab() {
  const [patterns, setPatterns] = useState(null);
  const [predictions, setPredictions] = useState(null);
  const [retro, setRetro] = useState(null);
  const [tickerProfiles, setTickerProfiles] = useState(null);
  const [regimeProfiles, setRegimeProfiles] = useState(null);
  const [contextHistory, setContextHistory] = useState(null);
  const [profileFilter, setProfileFilter] = useState("");
  const [profileSort, setProfileSort] = useState("ticker");
  const [sub, setSub] = useState("patterns");

  useEffect(() => {
    const load = async () => {
      try {
        const [patRes, predRes, retroRes] = await Promise.all([
          fetch(`${API_BASE}/timed/model/patterns`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/model/predictions?limit=30`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/model/retrospective`, { credentials: "include" }).then(r => r.json()),
        ]);
        if (patRes.ok) setPatterns(patRes.patterns || []);
        if (predRes.ok) setPredictions(predRes.predictions || []);
        if (retroRes.ok) setRetro(retroRes);
      } catch (_) {}
    };
    load();
  }, []);

  useEffect(() => {
    if (sub !== "profiles" || tickerProfiles) return;
    const load = async () => {
      try {
        const [profileRes, regimeRes, contextRes] = await Promise.all([
          fetch(`${API_BASE}/timed/system/ticker-profiles`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/system/regime-profiles?limit=24`, { credentials: "include" }).then(r => r.json()),
          fetch(`${API_BASE}/timed/system/context-history?limit=20`, { credentials: "include" }).then(r => r.json()),
        ]);
        if (profileRes.ok) setTickerProfiles(profileRes.profiles || []);
        if (regimeRes.ok) setRegimeProfiles(regimeRes);
        if (contextRes.ok) setContextHistory(contextRes);
      } catch (_) {}
    };
    load();
  }, [sub]);

  const subs = [
    { id: "patterns", label: "Pattern Library" },
    { id: "predictions", label: "Predictions" },
    { id: "learning", label: "Learning Loop" },
    { id: "profiles", label: "Ticker Profiles" },
  ];
  const fmtPctValue = (value) => value == null || Number.isNaN(Number(value)) ? "—" : `${Number(value).toFixed(1)}%`;
  const fmtNum = (value, digits = 2) => value == null || Number.isNaN(Number(value)) ? "—" : Number(value).toFixed(digits);
  const marketRows = Array.isArray(contextHistory?.market) ? contextHistory.market : [];
  const sectorRows = Array.isArray(contextHistory?.sectors) ? contextHistory.sectors : [];
  const latestSectorRows = sectorRows.slice(0, 12);
  const filteredProfiles = !tickerProfiles ? [] : tickerProfiles
    .filter(p => !profileFilter || p.ticker?.includes(profileFilter) || (p.personality || "").includes(profileFilter) || (p.behavior_type || "").includes(profileFilter))
    .sort((a, b) => {
      if (profileSort === "wr") return Number(b.contract?.context?.win_rate || -999) - Number(a.contract?.context?.win_rate || -999);
      if (profileSort === "avg_pnl") return Number(b.contract?.context?.avg_pnl_pct || -999) - Number(a.contract?.context?.avg_pnl_pct || -999);
      if (profileSort === "samples") return Number(b.contract?.context?.sample_count || -999) - Number(a.contract?.context?.sample_count || -999);
      return String(a.ticker || "").localeCompare(String(b.ticker || ""));
    });

  return (
    <div>
      <div className="flex gap-1 border-b border-white/[0.06] mb-4 overflow-x-auto">
        {subs.map(t => (
          <button key={t.id} onClick={() => setSub(t.id)} className={`px-3 py-1.5 text-[11px] font-medium whitespace-nowrap ${sub === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
        ))}
      </div>

      {sub === "patterns" && (
        <div className="card p-5">
          <h3 className="text-sm font-semibold text-white mb-3">Active Patterns</h3>
          {!patterns ? <p className="text-slate-500 text-xs">Loading...</p> : patterns.length === 0 ? <p className="text-slate-500 text-xs">No active patterns.</p> : (
            <div className="overflow-x-auto">
              <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">Pattern</th><th className="text-right px-2 font-medium">Hit Rate</th>
                <th className="text-right px-2 font-medium">Samples</th><th className="text-right px-2 font-medium">EV</th><th className="text-right pl-2 font-medium">Confidence</th>
              </tr></thead><tbody>
                {patterns.map((p, i) => (
                  <tr key={i} className="border-b border-white/[0.03]">
                    <td className="py-1.5 text-slate-300">{p.name || p.pattern_id}</td>
                    <td className="text-right px-2">{(Number(p.hit_rate) * 100).toFixed(0)}%</td>
                    <td className="text-right px-2">{p.sample_count}</td>
                    <td className={`text-right px-2 ${Number(p.expected_value) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{Number(p.expected_value).toFixed(2)}</td>
                    <td className="text-right pl-2">{(Number(p.confidence) * 100).toFixed(0)}%</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          )}
        </div>
      )}

      {sub === "predictions" && (
        <div className="card p-5">
          <h3 className="text-sm font-semibold text-white mb-3">Recent Predictions</h3>
          {!predictions ? <p className="text-slate-500 text-xs">Loading...</p> : predictions.length === 0 ? <p className="text-slate-500 text-xs">No predictions yet.</p> : (
            <div className="overflow-x-auto">

              <h3 className="text-sm font-semibold text-white">Ticker Context Profiles</h3>

              >
                <option value="ticker">Sort: Ticker</option>

              {tickerProfiles && (

                      <span key={k} className="cursor-pointer hover:text-slate-300" onClick={() => setProfileFilter(profileFilter === k ? "" : k)}>

                        {k.replace(/_/g, " ")} ({v})

                  })()}
                </div>
              )}
            </div>

            {!tickerProfiles ? (
              <p className="text-slate-500 text-xs py-8 text-center">Loading profiles...</p>
            ) : tickerProfiles.length === 0 ? (
              <p className="text-slate-500 text-xs py-8 text-center">No ticker profiles yet. Run build-ticker-learning.js and build-ticker-profiles.js first.</p>
            ) : (
              <div className="overflow-x-auto">
                <table className="w-full text-xs">
                  <thead>
                    <tr className="text-slate-500 border-b border-white/[0.05]">
                      <th className="text-left py-1.5 font-medium">Ticker</th>
                      <th className="text-left px-2 font-medium">Personality / Type</th>
                      <th className="text-right px-2 font-medium">Moves</th>
                      <th className="text-right px-2 font-medium">Context Samples</th>
                      <th className="text-right px-2 font-medium">WR / Avg P&amp;L</th>
                      <th className="text-left px-2 font-medium">Favored Regime</th>
                      <th className="text-left px-2 font-medium">Favored VIX</th>
                      <th className="text-left px-2 font-medium">Best Path</th>
                      <th className="text-right px-2 font-medium">Counter-Consensus</th>
                      <th className="text-right pl-2 font-medium">Merged SL / TP</th>
                    </tr>
                  </thead>
                  <tbody>
                    {filteredProfiles.map((p, i) => {
                        const ep = p.entry_params || {};
                        const ctx = p.contract?.context || {};
                        const pColors = { VOLATILE_RUNNER: "text-rose-400", PULLBACK_PLAYER: "text-amber-400", SLOW_GRINDER: "text-emerald-400", MODERATE: "text-blue-400", TREND_FOLLOWER: "text-violet-400" };

                        return (

                              <div className="text-[10px] font-normal text-slate-500">{p.sector || "—"}</div>
                            </td>
                            <td className="px-2">
                              <div className={`font-semibold ${pClass}`}>{(p.personality || "—").replace(/_/g, " ")}</div>
                              <div className="text-[10px] text-slate-500">{(p.behavior_type || "—").replace(/_/g, " ")}</div>
                            </td>
                            <td className="text-right px-2 text-slate-300">{p.move_count ?? "—"}</td>
                            <td className="text-right px-2 text-slate-300">{ctx.sample_count ?? "—"}</td>
                            <td className="text-right px-2">
                              <div className="text-slate-200">{fmtPctValue(ctx.win_rate)}</div>
                              <div className={`${Number(ctx.avg_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"} text-[10px]`}>{fmtPctValue(ctx.avg_pnl_pct)}</div>
                            </td>
                            <td className="px-2 text-slate-300">{ctx.favored_regime || "—"}</td>
                            <td className="px-2 text-slate-300">{ctx.favored_vix_bucket || "—"}</td>
                            <td className="px-2">
                              <div className="text-slate-300">{ctx.favored_entry_path ? formatPath(ctx.favored_entry_path) : "—"}</div>
                              <div className="text-[10px] text-slate-500">{ep.trail_style || "—"} trail</div>
                            </td>
                            <td className="text-right px-2 text-slate-300">{fmtPctValue(ctx.counter_consensus_rate)}</td>
                            <td className="text-right pl-2">
                              <div className="text-slate-200">{p.merged?.slMult ? `${fmtNum(p.merged.slMult)}x` : "—"}</div>
                              <div className="text-[10px] text-slate-500">{p.merged?.tpMult ? `${fmtNum(p.merged.tpMult)}x` : "—"}</div>

// TAB: History
// ═══════════════════════════════════════════════════════════════
function HistoryTab({ onViewReport }) {
  const [history, setHistory] = useState(null);
  useEffect(() => {
    const load = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/system/history`, { credentials: "include" });
        const data = await res.json();
        if (data.ok) setHistory(data.history || []);
      } catch (_) {}
    };
    load();
  }, []);

  if (!history) return <div className="text-slate-500 text-sm py-8 text-center">Loading history...</div>;
  if (history.length === 0) return <div className="card p-12 text-center text-slate-400 text-sm">No calibration history yet.</div>;

  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-4">Calibration History</h3>
      <div className="overflow-x-auto">
        <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
          <th className="text-left py-1.5 font-medium">Gen</th>
          <th className="text-left px-2 font-medium">Date</th>
          <th className="text-right px-2 font-medium">Trades</th>
          <th className="text-right px-2 font-medium">SQN</th>
          <th className="text-right px-2 font-medium">Win%</th>
          <th className="text-right px-2 font-medium">Exp</th>
          <th className="text-right px-2 font-medium">Avg R</th>
          <th className="text-center px-2 font-medium">Applied</th>
          <th className="text-right pl-2 font-medium"></th>
        </tr></thead><tbody>
          {history.map((row, i) => (
            <tr key={i} className="border-b border-white/[0.03] hover:bg-white/[0.02] cursor-pointer" onClick={() => onViewReport(row.report_id)}>
              <td className="py-2 text-white font-bold">#{row.generation || "?"}</td>
              <td className="px-2 text-slate-400">{row.run_ts ? new Date(row.run_ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }) : "—"}</td>
              <td className="text-right px-2">{row.n || row.trade_count}</td>
              <td className="text-right px-2">
                <span className="text-white font-medium">{row.sqn?.toFixed(2) ?? "—"}</span>
                <DeltaBadge value={row.delta_sqn} />
              </td>
              <td className="text-right px-2">
                <span>{row.win_rate ?? "—"}%</span>
                <DeltaBadge value={row.delta_win_rate} suffix="%" />
              </td>
              <td className="text-right px-2">
                <span className={`${(row.expectancy || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{row.expectancy ?? "—"}</span>
                <DeltaBadge value={row.delta_expectancy} />
              </td>
              <td className="text-right px-2">{row.avg_r ?? "—"}</td>
              <td className="text-center px-2">{row.applied ? <span className="text-emerald-400">✓</span> : <span className="text-slate-600">—</span>}</td>
              <td className="text-right pl-2 text-[10px] text-blue-400 hover:text-blue-300">View</td>
            </tr>
          ))}
        </tbody></table>
      </div>
    </div>
  );
}

// DEEP AUDIT TAB
// ═══════════════════════════════════════════════════════════════
function DeepAuditTab() {
  const [audit, setAudit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [applying, setApplying] = useState(false);
  const [appliedMsg, setAppliedMsg] = useState(null);
  const [subTab, setSubTab] = useState("summary");

  const runAudit = async () => {
    setLoading(true); setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/deep-audit?_t=${Date.now()}`, { cache: "no-store" });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "Audit failed");
      setAudit(json);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { runAudit(); }, []);

  const applyTopRecs = async () => {
    if (!audit?.recommendations?.length) return;
    setApplying(true); setAppliedMsg(null);
    try {
      const top3 = audit.recommendations.slice(0, 3);
      const config = {};
      for (const r of top3) { if (r.config) config[r.config.key] = r.config.value; }
      const res = await fetch(`${API_BASE}/timed/admin/model-config`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ updates: Object.entries(config).map(([k, v]) => ({ key: k, value: JSON.stringify(v) })) }),
      });
      const json = await res.json();
      setAppliedMsg(json.ok ? `Applied ${top3.length} recommendations to model_config` : (json.error || "Apply failed"));
    } catch (e) { setAppliedMsg("Error: " + e.message); }
    finally { setApplying(false); }
  };

  const pct = (v) => v != null ? `${v}%` : "—";
  const signPct = (v) => v != null ? (v >= 0 ? `+${v}%` : `${v}%`) : "—";
  const cardCls = "rounded-lg border p-3";
  const cardStyle = (positive) => ({ background: "rgba(255,255,255,0.02)", borderColor: positive ? "rgba(16,185,129,0.2)" : "rgba(239,68,68,0.2)" });

  if (loading) return (
    <div className="flex items-center justify-center py-20">
      <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />
      <span className="ml-3 text-sm text-slate-400">Running deep audit...</span>
    </div>
  );

  if (error) return (
    <div className="p-4 rounded-lg bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm">
      <p className="font-medium">Deep Audit Error</p><p className="mt-1">{error}</p>
      <button className="mt-2 px-3 py-1 rounded bg-rose-500/20 text-xs" onClick={runAudit}>Retry</button>
    </div>
  );

  if (!audit) return <div className="text-center py-10 text-slate-400 text-sm">Click "Run Audit" to start</div>;

  const subTabs = [
    { id: "summary", label: "Executive Summary" },
    { id: "direction", label: "Direction" },
    { id: "exits", label: "Exit Reasons" },
    { id: "tickers", label: "Tickers" },
    { id: "paths", label: "Entry Paths" },
    { id: "time", label: "Time & Hold" },
    { id: "recs", label: `Recommendations (${audit.recommendations?.length || 0})` },
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-base font-semibold text-white">Deep System Audit</h2>
          <p className="text-[11px] text-slate-400">{audit.trade_count} closed trades analyzed at {new Date(audit.generated_at).toLocaleString()}</p>
        </div>
        <div className="flex gap-2">
          <button className="px-3 py-1.5 rounded text-xs font-medium bg-white/5 border border-white/10 text-slate-300 hover:bg-white/10" onClick={runAudit}>Refresh</button>
          {audit.recommendations?.length > 0 && (
            <button className="px-3 py-1.5 rounded text-xs font-medium bg-emerald-500/15 border border-emerald-500/30 text-emerald-300 hover:bg-emerald-500/25"
              onClick={applyTopRecs} disabled={applying}>
              {applying ? "Applying..." : `Apply Top ${Math.min(3, audit.recommendations.length)} Recs`}
            </button>
          )}
        </div>
      </div>
      {appliedMsg && <div className="mb-3 p-2 rounded text-xs bg-emerald-500/10 border border-emerald-500/20 text-emerald-300">{appliedMsg}</div>}

      <div className="flex gap-1 border-b border-white/[0.06] mb-4 overflow-x-auto">
        {subTabs.map(t => (
          <button key={t.id} onClick={() => setSubTab(t.id)} className={`px-3 py-1.5 text-[11px] font-medium whitespace-nowrap ${subTab === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
        ))}
      </div>

      {/* ── Executive Summary ── */}
      {subTab === "summary" && (
        <div className="space-y-4">
          {/* Overall Metrics */}
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2">
            {[
              ["Trades", audit.overall.n],
              ["Win Rate", pct(audit.overall.win_rate)],
              ["Expectancy", signPct(audit.overall.expectancy)],
              ["SQN", audit.overall.sqn],
              ["Profit Factor", audit.overall.profit_factor],
              ["Max DD", `-${audit.drawdown_analysis.max_drawdown_pct}%`],
              ["Max Consec L", audit.drawdown_analysis.max_consecutive_losses],
            ].map(([label, val]) => (
              <div key={label} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
                <div className="text-[10px] text-slate-500 uppercase">{label}</div>
                <div className="text-sm font-bold text-white mt-0.5">{val}</div>
              </div>
            ))}
          </div>

          {/* Classification */}
          <div className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
            <h3 className="text-xs font-medium text-slate-400 mb-2">Trade Classification</h3>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
              {Object.entries(audit.classification_breakdown || {}).map(([cls, count]) => {
                const colors = { optimal: "text-emerald-400", left_money: "text-amber-400", bad_entry: "text-rose-400", gave_back: "text-orange-400", noise_trade: "text-slate-400" };

              <h3 className="text-xs font-medium text-emerald-400 mb-2">Strengths</h3>

                </div>
                <div className="grid grid-cols-3 md:grid-cols-6 gap-3 text-center">

      {/* ── Exit Reasons ── */}
      {subTab === "exits" && (
        <div className="overflow-x-auto">

      {/* ── Entry Paths ── */}
      {subTab === "paths" && (
        <div className="space-y-3">
          {Object.entries(audit.entry_paths || {}).sort((a, b) => b[1].n - a[1].n).map(([path, d]) => {
            const actionColors = { KEEP: "text-slate-300 bg-white/5", BOOST: "text-emerald-400 bg-emerald-500/10", RESTRICT: "text-amber-400 bg-amber-500/10", DISABLE: "text-rose-400 bg-rose-500/10" };

                <div className="grid grid-cols-3 md:grid-cols-6 gap-2 text-center text-[11px]">
                  {[["N", d.n], ["WR", pct(d.win_rate)], ["Exp", signPct(d.expectancy)], ["SQN", d.sqn], ["PF", d.profit_factor], ["Total", signPct(d.total_pnl_pct)]].map(([l,v]) => (
                    <div key={l}><div className="text-[10px] text-slate-500">{l}</div><div className="text-xs text-white">{v}</div></div>

              {Object.entries(audit.time_of_day || {}).sort((a, b) => Number(a[0]) - Number(b[0])).map(([h, d]) => (
                <div key={h} className={cardCls} style={{background: d.avg_pnl_pct >= 0 ? "rgba(16,185,129,0.05)" : "rgba(239,68,68,0.05)", borderColor: d.avg_pnl_pct >= 0 ? "rgba(16,185,129,0.15)" : "rgba(239,68,68,0.15)"}}>
                  <div className="text-[10px] text-slate-500">{h}:00</div>
                  <div className={`text-xs font-bold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</div>
                  <div className="text-[10px] text-slate-500">{d.n}t / {pct(d.win_rate)}</div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <h3 className="text-xs font-medium text-slate-400 mb-2">Hold Time Buckets</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
              {Object.entries(audit.hold_time_analysis || {}).map(([bucket, d]) => (
                <div key={bucket} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
                  <div className="text-[10px] text-slate-500 font-medium">{bucket}</div>
                  <div className={`text-sm font-bold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</div>
                  <div className="text-[10px] text-slate-400">{d.n} trades / {pct(d.win_rate)} WR</div>
                </div>
              ))}
            </div>
          </div>
          {audit.sector_analysis && (
            <div>
              <h3 className="text-xs font-medium text-slate-400 mb-2">Sector Performance</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-[11px]">
                  <thead><tr className="text-slate-500 border-b border-white/[0.06]">
                    <th className="py-1.5 text-left font-medium">Sector</th>
                    <th className="py-1.5 text-right font-medium">N</th>
                    <th className="py-1.5 text-right font-medium">WR</th>
                    <th className="py-1.5 text-right font-medium">Avg P&L</th>
                    <th className="py-1.5 text-right font-medium">SQN</th>
                  </tr></thead>
                  <tbody>
                    {Object.entries(audit.sector_analysis).sort((a, b) => b[1].n - a[1].n).map(([sec, d]) => (
                      <tr key={sec} className="border-b border-white/[0.03]">
                        <td className="py-1.5 text-white">{sec}</td>
                        <td className="py-1.5 text-right text-slate-300">{d.n}</td>
                        <td className="py-1.5 text-right">{pct(d.win_rate)}</td>
                        <td className={`py-1.5 text-right font-semibold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</td>
                        <td className="py-1.5 text-right text-slate-300">{d.sqn}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── Recommendations ── */}
      {subTab === "recs" && (
        <div className="space-y-3">
          {(audit.recommendations || []).length === 0 && <div className="text-sm text-slate-400 text-center py-10">No recommendations generated</div>}
          {(audit.recommendations || []).map((r, i) => (
            <div key={r.id} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor: i < 3 ? "rgba(16,185,129,0.2)" : "rgba(255,255,255,0.06)"}}>
              <div className="flex items-center justify-between mb-1">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-bold text-slate-500">#{i + 1}</span>
                  <span className="text-xs font-semibold text-white">{r.title}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${r.confidence === "HIGH" ? "text-emerald-400 bg-emerald-500/10" : r.confidence === "MEDIUM" ? "text-amber-400 bg-amber-500/10" : "text-slate-300 bg-white/5"}`}>{r.confidence}</span>
                  <span className="text-xs font-bold text-emerald-400">+{r.impact_pct}% pts</span>
                </div>
              </div>
              <p className="text-[11px] text-slate-400 leading-relaxed">{r.detail}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// TAB: Backtest Runs
// ═══════════════════════════════════════════════════════════════
function RunsTab({ isAdmin }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [runs, setRuns] = useState([]);
  const [liveSummary, setLiveSummary] = useState(null);
  const [promotingRunId, setPromotingRunId] = useState("");
  const [validatingSentinelRunId, setValidatingSentinelRunId] = useState("");
  const [finalizingRunId, setFinalizingRunId] = useState("");
  const [archivingRunId, setArchivingRunId] = useState("");
  const [deletingRunId, setDeletingRunId] = useState("");
  const [detailRunId, setDetailRunId] = useState(null);
  const [detailData, setDetailData] = useState(null);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [message, setMessage] = useState(null);
  const [showOnlyCompleted, setShowOnlyCompleted] = useState(true);
  const [showArchived, setShowArchived] = useState(false);
  const [hideNoisyPlaceholders, setHideNoisyPlaceholders] = useState(true);
  const [editingDescRunId, setEditingDescRunId] = useState(null);
  const [editingDescValue, setEditingDescValue] = useState("");
  const [savingDescRunId, setSavingDescRunId] = useState(null);
  const [compareRuns, setCompareRuns] = useState(null);
  const [variantRunId, setVariantRunId] = useState(null);
  const [variantData, setVariantData] = useState(null);
  const [liveConfigData, setLiveConfigData] = useState(null);
  const [variantOverrides, setVariantOverrides] = useState({});
  const [lockInfo, setLockInfo] = useState(null);
  const [validationBusy, setValidationBusy] = useState(false);
  const [validationRunId, setValidationRunId] = useState("");
  const [validationProgress, setValidationProgress] = useState(null);
  const [validationLogs, setValidationLogs] = useState([]);
  const [runnerStatus, setRunnerStatus] = useState(null);
  const [validationForm, setValidationForm] = useState({
    label: "ui-validation",
    description: "Validation run launched from the Runs operations console",
    startDate: "2025-07-01",
    endDate: "2025-07-31",
    intervalMinutes: 5,
    replayMode: "candle",
    tickerBatch: 15,
    configSource: "run",
    configRunId: "",
    takeOverLock: true,
    seedMarketEvents: true,
    disableReferenceExecution: true,
    skipInvestor: true,
    lowWrite: true,
    keepOpenAtEnd: false,
    tickers: "",
    progressWriteEvery: 4,
  });
  const [showLaunchDrawer, setShowLaunchDrawer] = useState(false);

  const fmtNum = (n) => {
    const v = Number(n);
    return Number.isFinite(v) ? v.toLocaleString() : "—";
  };
  const fmtPct = (n) => {
    const v = Number(n);
    return Number.isFinite(v) ? `${v.toFixed(2)}%` : "—";
  };
  const fmtMoney = (n) => {
    const v = Number(n);
    if (!Number.isFinite(v)) return "—";
    return `${v >= 0 ? "+" : "-"}$${Math.abs(v).toFixed(2)}`;
  };
  const fmtRunDate = (ms) => {
    const v = Number(ms);
    if (!Number.isFinite(v) || v <= 0) return "—";
    const d = new Date(v);
    return d.toLocaleString(undefined, { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  };
  const shortRunId = (rid) => {
    const s = String(rid || "");
    if (!s) return "—";
    if (s.length <= 42) return s;
    return `${s.slice(0, 26)}...${s.slice(-12)}`;
  };
  const parseMetricObj = (v) => {
    if (!v) return {};
    if (typeof v === "object") return v || {};
    try { return JSON.parse(v) || {}; } catch (_) { return {}; }
  };
  const topCounts = (obj, max = 3) => {
    const entries = Object.entries(obj || {}).filter(([, val]) => Number(val) > 0);
    entries.sort((a, b) => Number(b[1]) - Number(a[1]));
    return entries.slice(0, max);
  };
  const cleanText = (value) => {
    const text = value == null ? "" : String(value).trim();
    return text || "";
  };
  const getRunDescriptionMeta = (run) => {
    const description = cleanText(run?.description);
    const statusNote = cleanText(run?.status_note);
    const label = cleanText(run?.label);
    const hasManualDescription = !!description;
    const displayDescription = hasManualDescription
      ? description
      : (label || "No description");
    return {
      description,
      statusNote,
      label,
      hasManualDescription,
      displayDescription,
      title: [description, statusNote].filter(Boolean).join("\n"),
    };
  };
  const getRunStateBadges = (run) => {
    const items = [];
    if (run?.live_config_slot) items.push({ label: "Live", cls: "run-pill-live" });
    if (run?.is_protected_baseline) items.push({ label: "Protected", cls: "run-pill-protected" });
    if (run?.active_experiment_slot) items.push({ label: "Active", cls: "run-pill-active" });
    if (Number(run?.archived_at || 0) > 0) items.push({ label: "Archived", cls: "run-pill-archived" });
    const status = cleanText(run?.status);
    if (status && status !== "completed") {
      items.push({ label: status.replace(/_/g, " "), cls: "run-pill-status" });
    }
    return items;
  };
  const getRunParams = (run) => parseMetricObj(run?.params || run?.params_json || run?.paramsJson);
  const getRunProgressSnapshot = (run) => {
    const params = getRunParams(run);
    if (params?.validation_progress && typeof params.validation_progress === "object") return params.validation_progress;
    return null;
  };
  const humanizeStatus = (value) => {
    const text = cleanText(value);
    return text ? text.replace(/_/g, " ") : "";
  };
  const isRunnerActiveStatus = (value) => {
    const status = cleanText(value).toLowerCase();
    return ["queued", "running", "retrying", "preparing", "seeding", "finalizing", "archiving"].includes(status);
  };
  const formatRunnerLogLine = (entry) => {
    if (!entry || typeof entry !== "object") return null;
    const stamp = Number(entry.ts);
    const tsLabel = Number.isFinite(stamp) && stamp > 0
      ? new Date(stamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" })
      : "--:--:--";
    const level = cleanText(entry.level).toUpperCase() || "INFO";
    const event = cleanText(entry.event);
    const message = cleanText(entry.message);
    return `[${tsLabel}] ${level}${event ? ` ${event}` : ""}${message ? ` · ${message}` : ""}`;
  };
  const deriveRunnerProgress = (jobLike) => {

                                      setLiveConfigData(snap?.env_flags ? { env_flags: snap.env_flags, run_id: liveRun.run_id } : null);
                                    }
                                  });
                                }}
                              >
                                Create Variant
                              </button>
                            ) : null}
                            <button
                              className={`run-action-btn ${isLive ? "run-action-btn-success" : "run-action-btn-primary"}`}
                              disabled={isLive || promotingRunId === runId}
                              onClick={() => promoteRun(runId)}
                            >
                              {isLive ? "Live" : (promotingRunId === runId ? "Promoting..." : "Promote Live")}
                            </button>
                            {/* Phase C — Stage 0a — Promote to Trades page */}
                            <button
                              className="run-action-btn run-action-btn-primary"
                              disabled={promotingTradesRunId === runId}
                              onClick={() => promoteRunToTrades(runId)}
                              title="Copy this run's trades into the active promoted_trades dataset so the Trades page reflects it."
                            >
                              {promotingTradesRunId === runId ? "Promoting..." : "Promote → Trades"}
                            </button>
                            <button
                              className="run-action-btn run-action-btn-muted"
                              disabled={archivingRunId === runId || isLive}
                              onClick={() => archiveRun(r)}

                              {archivingRunId === runId ? "Archiving..." : "Archive"}
                            </button>
                            <button
                              className="run-action-btn run-action-btn-danger"
                              disabled={deletingRunId === runId || isLive || isProtected}
                              onClick={() => deleteRun(r)}
                            >
                              {deletingRunId === runId ? "Deleting..." : "Delete Run"}
                            </button>
                          </div>
                        ) : (
                          <span className="text-slate-500">Admin only</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {compareRuns?.length === 2 && (

                    <div className="text-slate-500">{run?.label || "—"}</div>
                    <div className="grid grid-cols-2 gap-2 text-slate-300">
                      <div>Range</div><div>{run?.start_date || "—"} → {run?.end_date || "—"}</div>
                      <div>Trades</div><div>{fmtNum(t?.total ?? run?.total_trades)}</div>
                      <div>W / L / BE</div><div>{fmtNum(t?.wins ?? run?.wins)} / {fmtNum(t?.losses ?? run?.losses)} / {fmtNum(t?.breakevens ?? run?.breakevens)}</div>
                      <div>Win Rate</div><div>{fmtPct(t?.win_rate ?? run?.win_rate)}</div>
                      <div>P&L</div><div className={Number(p?.realized ?? run?.realized_pnl ?? 0) >= 0 ? "text-emerald-400" : "text-rose-400"}>{fmtMoney(p?.realized ?? run?.realized_pnl)}</div>
                      <div>Avg W/L %</div><div><span className="text-emerald-400">{fmtPct(p?.avg_win_pct ?? run?.avg_win_pct)}</span> / <span className="text-rose-400">{fmtPct(p?.avg_loss_pct ?? run?.avg_loss_pct)}</span></div>
                    </div>
                  </div>

            </div>
          </div>
        </div>

      {variantRunId && (

              <h3 className="text-sm font-semibold text-white">Create Variant Snapshot: {shortRunId(variantRunId)}</h3>
              <button className="text-slate-400 hover:text-white text-lg leading-none" onClick={() => { setVariantRunId(null); setVariantData(null); setLiveConfigData(null); setVariantOverrides({}); }}>&times;</button>

                <p className="text-slate-500">Loading run details…</p>
