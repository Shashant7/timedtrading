                                  : r.includes("TP")||r.includes("tp")||r.includes("TRAIL")||r.includes("TRIM") ? "#22c55e"
                                  : r.includes("FUSE")||r.includes("PHASE") ? "#f59e0b" : "#9ca3af";
                                return <div key={i} className="text-[10px] leading-relaxed" style={{color: ec}}>{hr}</div>;
                              })}
                            </div>
                          );
                        })() : <div className="text-[10px] text-[#6b7280]">Exit reason not recorded</div>}
                      </div>
                      {/* Duration */}
                      {trade?.entry_ts && trade?.exit_ts && (() => {
                        const dur = Number(trade.exit_ts) - Number(trade.entry_ts);
                        if (dur <= 0) return null;
                        const mins = Math.round(dur / 60000);
                        const hrs = Math.floor(mins / 60);
                        const days = Math.floor(hrs / 24);
                        const label = days > 0 ? `${days}d ${hrs % 24}h` : hrs > 0 ? `${hrs}h ${mins % 60}m` : `${mins}m`;
                        return (
                          <div className="rounded-md bg-white/[0.02] border border-white/[0.04] px-2.5 py-1.5">
                            <div className="text-[8px] text-[#a78bfa] uppercase font-bold mb-0.5">Duration</div>
                            <div className="text-[12px] font-semibold text-white">{label}</div>
                          </div>
                        );
                      })()}
                    </div>
                  )}
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Main App ───────────────────────────────────────────────────────────
      function App({ user }) {
        const RUN_FILTER_LATEST = "__LATEST__";
        const RUN_FILTER_LIVE = "__LIVE__";
        const [trades, setTrades] = useState([]);
        const [annotations, setAnnotations] = useState({});
        const [availableRuns, setAvailableRuns] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [selectedTrade, setSelectedTrade] = useState(null);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [filterTicker, setFilterTicker] = useState("");
        const [filterClassification, setFilterClassification] = useState("");
        const [filterDateFrom, setFilterDateFrom] = useState("");
        const [filterDateTo, setFilterDateTo] = useState("");
        const [filterRunId, setFilterRunId] = useState(RUN_FILTER_LATEST);
        const [sortOrder, setSortOrder] = useState("newest");
        const [autoRefreshEnabled, setAutoRefreshEnabled] = useState(() => {
          try { return window.localStorage.getItem("tt-trade-autopsy-auto-refresh") === "1"; } catch (_) { return false; }
        });
        const [tradeSourceMeta, setTradeSourceMeta] = useState({ source: "", archiveRunId: "", liveRunId: "", activeSource: "", cleanLane: false });
        const [activeRunTruth, setActiveRunTruth] = useState(null);
        const [autoSelectedLive, setAutoSelectedLive] = useState(false);

        const tradeIdFromUrl = (() => {
          const params = new URLSearchParams(window.location.search);
          return params.get("trade_id") || params.get("tradeId") || null;
        })();
        const runIdFromUrl = (() => {
          const params = new URLSearchParams(window.location.search);
          return params.get("run_id") || params.get("runId") || null;
        })();
        const isReadonly = new URLSearchParams(window.location.search).get("readonly") === "1";
        const reviewableRuns = useMemo(
          () => (availableRuns || []).filter(r => {
            const status = String(r?.status || "").trim().toLowerCase();
            if (status !== "completed") return false;
            const totalTrades = Number(r?.total_trades || 0);
            const closedTrades = Number(r?.closed_trades || 0);
            const openTrades = Number(r?.open_trades || 0);
            return totalTrades > 0 || closedTrades > 0 || openTrades > 0;
          }),
          [availableRuns]
        );
        const liveRun = useMemo(() => {
          const canonical = activeRunTruth?.read_model?.active || activeRunTruth?.run || activeRunTruth?.active || activeRunTruth?.live || activeRunTruth || null;
          if (canonical && (canonical.run_id || canonical.active_run_id)) return canonical;
          return (availableRuns || []).find(r => {
            const status = String(r?.status || "").trim().toLowerCase();
            return status === "running" || status === "queued";
          }) || null;
        }, [activeRunTruth, availableRuns]);
        const runLabelMap = useMemo(() => {
          const map = new Map();
          for (const run of (availableRuns || [])) {
            const runId = String(run?.run_id || "").trim();
            if (!runId) continue;
            map.set(runId, String(run?.label || "").trim() || null);
          }
          return map;
        }, [availableRuns]);
        const resolveRunLabel = useCallback((runId) => {
          const key = String(runId || "").trim();
          if (!key) return "";
          return runLabelMap.get(key) || "";
        }, [runLabelMap]);
        const runMeta = useMemo(() => ({
          runs: reviewableRuns.map(r => ({ runId: String(r.run_id || "").trim(), label: r.label || null, startDate: r.start_date || null, endDate: r.end_date || null })),
          latestRunId: reviewableRuns.length ? String(reviewableRuns[0].run_id || "").trim() : "",
          liveRunId: liveRun ? String(liveRun.run_id || "").trim() : "",
          liveRunLabel: liveRun?.label || null,
        }), [reviewableRuns, liveRun]);
        const resolveSelectedRunId = useCallback((selectedValue, latestRunId) => {
          if (selectedValue === RUN_FILTER_LATEST) return String(latestRunId || "").trim();
          if (selectedValue === RUN_FILTER_LIVE) return "";
          return String(selectedValue || "").trim();
        }, []);
        const effectiveRunId = useMemo(() => {
          const fromUrl = String(runIdFromUrl || "").trim();
          if (fromUrl) return fromUrl;
          return resolveSelectedRunId(filterRunId, runMeta.latestRunId);
        }, [runIdFromUrl, filterRunId, runMeta.latestRunId, resolveSelectedRunId]);
        const annotationsUrl = (() => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/annotations?all=1`;
          if (effectiveRunId) return `${base}&run_id=${encodeURIComponent(effectiveRunId)}`;
          return base;
        })();
        const tradesUrl = (() => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/trades`;
          if (effectiveRunId) return `${base}?run_id=${encodeURIComponent(effectiveRunId)}`;
          if (filterRunId === RUN_FILTER_LIVE) return `${base}?live=1`;
          return base;
        })();

        useEffect(() => {
          if (!runMeta.latestRunId) return;
          if (runIdFromUrl) return;
          if (filterRunId === RUN_FILTER_LATEST) return;
          if (filterRunId === RUN_FILTER_LIVE || filterRunId === "") return;
          const exists = runMeta.runs.some(r => r.runId === filterRunId);
          if (!exists) setFilterRunId(RUN_FILTER_LATEST);
        }, [runMeta, filterRunId, runIdFromUrl]);

        useEffect(() => {
          if (autoSelectedLive) return;
          if (runIdFromUrl) return;
          if (!liveRun) return;
          if (filterRunId !== RUN_FILTER_LATEST) return;
          setFilterRunId(RUN_FILTER_LIVE);
          setAutoSelectedLive(true);
        }, [autoSelectedLive, filterRunId, liveRun, runIdFromUrl]);

        const buildTradesUrl = useCallback((runId, liveOnly = false) => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/trades`;
          if (runId) return `${base}?run_id=${encodeURIComponent(runId)}`;
          if (liveOnly) return `${base}?live=1`;
          return base;
        }, []);
        const buildAnnotationsUrl = useCallback((runId) => {
          const base = `${API_BASE}/timed/admin/trade-autopsy/annotations?all=1`;
          return runId ? `${base}&run_id=${encodeURIComponent(runId)}` : base;
        }, []);
        const resolveLatestCompletedRunId = useCallback((runs) => {
          const list = Array.isArray(runs) ? runs : [];
          const match = list.find(r => String(r?.status || "").trim().toLowerCase() === "completed" && Number(r?.total_trades || 0) > 0);
          return match ? String(match.run_id || "").trim() : "";
        }, []);
        const refreshRuns = useCallback(async () => {
          try {
            const r = await fetch(`${API_BASE}/timed/admin/runs?limit=100&include_archived=1`, fetchOpts);
            const d = await r.json();
            if (d.ok && Array.isArray(d.runs)) {
              setAvailableRuns(d.runs);
              return d.runs;
            } else if (d?.error === "unauthorized") {
              setError("Admin access required");
            }
          } catch (_) {
            setError("Failed to load runs");
          }
          return [];
        }, []);
        const refreshActiveRunTruth = useCallback(async () => {
          try {
            const r = await fetch(`${API_BASE}/timed/admin/runs/live`, fetchOpts);
            const d = await r.json();
            if (d?.ok) {
              setActiveRunTruth(d);
              return d;
            }
          } catch (_) {}
          setActiveRunTruth(null);
          return null;
        }, []);

        const refreshAnnotations = useCallback(async () => {
          try {
            const r = await fetch(annotationsUrl, fetchOpts);
            const d = await r.json();
            if (d.ok && d.annotations) setAnnotations(d.annotations);
          } catch (_) {}
        }, [annotationsUrl]);

        const refreshTrades = useCallback(async () => {
          try {
            const r = await fetch(tradesUrl, fetchOpts);
            const d = await r.json();
            if (d.ok && Array.isArray(d.trades)) {
              const liveTruth = activeRunTruth?.read_model?.active || activeRunTruth?.run || activeRunTruth?.active || activeRunTruth?.live || activeRunTruth || null;
              const sourceMeta = d?.read_model?.source_meta || {};
              setTrades(d.trades);
              setTradeSourceMeta({
                source: sourceMeta.source || d.source || "",
                archiveRunId: sourceMeta.archive_run_id || d.archive_run_id || "",
                liveRunId: sourceMeta.live_run_id || d.live_run_id || liveTruth?.active_run_id || liveTruth?.run_id || "",
                activeSource: sourceMeta.active_source || liveTruth?.active_source || "",
                cleanLane: !!(sourceMeta.is_clean_lane ?? liveTruth?.is_clean_lane),
              });
              setSelectedTrade(prev => {
                if (!prev) return prev;
                const id = prev.trade_id || prev.id || `${prev.ticker}-${prev.entry_ts}`;
                const updated = d.trades.find(t => (t.trade_id || t.id || `${t.ticker}-${t.entry_ts}`) === id);
                return updated || prev;
              });
            } else if (d?.error === "unauthorized") {
              setError("Admin access required");
            }
          } catch (_) {
            setError("Failed to load trades");
          }
        }, [tradesUrl, activeRunTruth]);

        const refreshAll = useCallback(async () => {
          setLoading(true);
          setError(null);
          try {
            const [runs, liveTruthRes] = await Promise.all([refreshRuns(), refreshActiveRunTruth()]);
            const liveTruth = liveTruthRes?.read_model?.active || liveTruthRes?.run || liveTruthRes?.active || liveTruthRes?.live || liveTruthRes || null;
            const resolvedRunId = String(runIdFromUrl || "").trim() || resolveSelectedRunId(filterRunId, resolveLatestCompletedRunId(runs));
            const liveOnly = !String(runIdFromUrl || "").trim() && filterRunId === RUN_FILTER_LIVE;
            const [tradesRes, annRes] = await Promise.all([
              fetch(buildTradesUrl(resolvedRunId, liveOnly), fetchOpts).then(r => r.json()),
              fetch(buildAnnotationsUrl(resolvedRunId), fetchOpts).then(r => r.json()),
            ]);
            if (tradesRes.ok && Array.isArray(tradesRes.trades)) {
              const sourceMeta = tradesRes?.read_model?.source_meta || {};
              setTrades(tradesRes.trades);
              setTradeSourceMeta({
                source: sourceMeta.source || tradesRes.source || "",
                archiveRunId: sourceMeta.archive_run_id || tradesRes.archive_run_id || "",
                liveRunId: sourceMeta.live_run_id || tradesRes.live_run_id || liveTruth?.active_run_id || liveTruth?.run_id || "",
                activeSource: sourceMeta.active_source || liveTruth?.active_source || "",
                cleanLane: !!(sourceMeta.is_clean_lane ?? liveTruth?.is_clean_lane),
              });
            }
            else setError(tradesRes?.error === "unauthorized" ? "Admin access required" : "Failed to load trades");
            if (annRes.ok && annRes.annotations) setAnnotations(annRes.annotations);
          } catch (_) {
            setError("Failed to load trades");
          } finally {
            setLoading(false);
          }
        }, [buildAnnotationsUrl, buildTradesUrl, filterRunId, refreshRuns, refreshActiveRunTruth, resolveLatestCompletedRunId, resolveSelectedRunId, runIdFromUrl]);

        useEffect(() => {
          let cancelled = false;
          setLoading(true);
          setError(null);
          (async () => {
            try {
              const [runsRes, liveTruthRes] = await Promise.all([
                fetch(`${API_BASE}/timed/admin/runs?limit=100&include_archived=1`, fetchOpts).then(r => r.json()),
                fetch(`${API_BASE}/timed/admin/runs/live`, fetchOpts).then(r => r.json()).catch(() => null),
              ]);
              if (cancelled) return;
              if (liveTruthRes?.ok) setActiveRunTruth(liveTruthRes);
              const runs = runsRes.ok && Array.isArray(runsRes.runs) ? runsRes.runs : [];
              if (runsRes.ok && Array.isArray(runsRes.runs)) setAvailableRuns(runsRes.runs);
              else if (runsRes?.error === "unauthorized") {
                setError("Admin access required");
                return;
              }
              const liveTruth = liveTruthRes?.read_model?.active || liveTruthRes?.run || liveTruthRes?.active || liveTruthRes?.live || liveTruthRes || null;
              const resolvedRunId = String(runIdFromUrl || "").trim() || resolveSelectedRunId(filterRunId, resolveLatestCompletedRunId(runs));
              const liveOnly = !String(runIdFromUrl || "").trim() && filterRunId === RUN_FILTER_LIVE;
              const [tradesData, annData] = await Promise.all([
                fetch(buildTradesUrl(resolvedRunId, liveOnly), fetchOpts).then(r => r.json()),
                fetch(buildAnnotationsUrl(resolvedRunId), fetchOpts).then(r => r.json()),
              ]);
              if (cancelled) return;
              if (tradesData.ok && Array.isArray(tradesData.trades)) {
                const sourceMeta = tradesData?.read_model?.source_meta || {};
                setTrades(tradesData.trades);
                setTradeSourceMeta({
                  source: sourceMeta.source || tradesData.source || "",
                  archiveRunId: sourceMeta.archive_run_id || tradesData.archive_run_id || "",
                  liveRunId: sourceMeta.live_run_id || tradesData.live_run_id || liveTruth?.active_run_id || liveTruth?.run_id || "",
                  activeSource: sourceMeta.active_source || liveTruth?.active_source || "",
                  cleanLane: !!(sourceMeta.is_clean_lane ?? liveTruth?.is_clean_lane),
                });
              }
              else setError(tradesData?.error === "unauthorized" ? "Admin access required" : "Failed to load trades");
              if (annData.ok && annData.annotations) setAnnotations(annData.annotations);
            } catch (_) {
              if (!cancelled) setError("Failed to load trades");
            } finally {
              if (!cancelled) setLoading(false);
            }
          })();
          return () => { cancelled = true; };
        }, [buildAnnotationsUrl, buildTradesUrl, filterRunId, resolveLatestCompletedRunId, resolveSelectedRunId, runIdFromUrl]);

        // Deep link: ?trade_id=XXX — open that trade's autopsy modal when trades are loaded
        useEffect(() => {
          if (!tradeIdFromUrl || !trades.length) return;
          const match = trades.find(t => (t.trade_id || t.id || "") === tradeIdFromUrl);
          if (match) {
            setSelectedTrade(match);
            const qs = `trade_id=${encodeURIComponent(tradeIdFromUrl)}${isReadonly ? "&readonly=1" : ""}`;
            try { window.history.replaceState(null, "", `${window.location.pathname}?${qs}`); } catch (_) {}
          }
        }, [tradeIdFromUrl, trades]);
        useEffect(() => {
          if (!runIdFromUrl || !trades.length) return;
          const exists = trades.some(t => String(t?.run_id || "").trim() === String(runIdFromUrl).trim());
          if (exists) setFilterRunId(String(runIdFromUrl).trim());
        }, [runIdFromUrl, trades]);

        useEffect(() => {
          if (filterRunId !== RUN_FILTER_LIVE || !autoRefreshEnabled) return;
          const iv = setInterval(() => { refreshAll(); }, 15_000);
          return () => clearInterval(iv);
        }, [autoRefreshEnabled, filterRunId, refreshAll]);

        useEffect(() => {
          try {
            window.localStorage.setItem("tt-trade-autopsy-auto-refresh", autoRefreshEnabled ? "1" : "0");
          } catch (_) {}
        }, [autoRefreshEnabled]);

        const filteredTrades = useMemo(() => {
          let out = trades;
          const effectiveRunId = resolveSelectedRunId(filterRunId, runMeta.latestRunId);
          if (effectiveRunId) {
            out = out.filter(t => String(t?.run_id || "").trim() === effectiveRunId);
          }
          if (filterTicker.trim()) {
            const q = filterTicker.trim().toUpperCase();
            out = out.filter(t => String(t.ticker || "").toUpperCase().includes(q));
          }
          if (filterClassification) {
            out = out.filter(t => {
              const id = t?.trade_id || t?.id || `${t?.ticker}-${t?.entry_ts}`;
              return (annotations[id]?.classification || "") === filterClassification;
            });
          }
          if (filterDateFrom) {
            const fromMs = new Date(filterDateFrom + "T00:00:00").getTime();
            out = out.filter(t => (t.entry_ts || 0) >= fromMs);
          }
          if (filterDateTo) {
            const toMs = new Date(filterDateTo + "T23:59:59").getTime();
            out = out.filter(t => (t.entry_ts || 0) <= toMs);
          }
          return out;
        }, [trades, annotations, filterTicker, filterClassification, filterDateFrom, filterDateTo, filterRunId, runMeta, resolveSelectedRunId]);

        const sortedTrades = useMemo(() => {
          const out = [...filteredTrades];
          out.sort((a, b) => {
            const left = Number(a?.entry_ts || 0);
            const right = Number(b?.entry_ts || 0);
            return sortOrder === "oldest" ? left - right : right - left;
          });
          return out;
        }, [filteredTrades, sortOrder]);

        const activeSourceLabel = useMemo(() => {
          const archiveLabel = resolveRunLabel(tradeSourceMeta.archiveRunId);
          const liveLabel = resolveRunLabel(tradeSourceMeta.liveRunId);
          const selectedLabel = resolveRunLabel(filterRunId);
          const cleanLaneSuffix = tradeSourceMeta.cleanLane ? " · clean lane" : "";
          if (tradeSourceMeta.source === "replay_kv") {
            return `Source: live replay KV${tradeSourceMeta.liveRunId ? ` · ${liveLabel || shortRunId(tradeSourceMeta.liveRunId)}` : ""}${cleanLaneSuffix}`;
          }
          if (tradeSourceMeta.source === "live_run_archive") {
            return `Source: live backtest archive${tradeSourceMeta.liveRunId ? ` · ${liveLabel || shortRunId(tradeSourceMeta.liveRunId)}` : ""}${cleanLaneSuffix}`;
          }
          if (tradeSourceMeta.source === "live_empty") {
            return `Source: live backtest${cleanLaneSuffix}`;
          }
          if (tradeSourceMeta.source === "archive") {
            return `Source: archived run${tradeSourceMeta.archiveRunId ? ` · ${archiveLabel || shortRunId(tradeSourceMeta.archiveRunId)}` : ""}`;
          }
          if (tradeSourceMeta.source === "trades_d1_live_fallback") {
            return "Source: trades D1 live fallback";
          }
          if (tradeSourceMeta.source === "trades_d1") {
            return "Source: trades D1";
          }
          if (filterRunId === RUN_FILTER_LIVE) return `Source: live replay${cleanLaneSuffix}`;
          if (filterRunId === RUN_FILTER_LATEST) return "Source: latest completed run";
          if (filterRunId) return `Source: selected run · ${selectedLabel || shortRunId(filterRunId)}`;
          return "Source: all available trades";
        }, [filterRunId, resolveRunLabel, tradeSourceMeta]);

        const getAnnotation = (t) => {
          const id = t?.trade_id || t?.id || `${t?.ticker}-${t?.entry_ts}`;
          return annotations[id] || {};
        };

        return (
          <div className="min-h-screen pb-16" style={{ background: "var(--tt-bg-base)" }}>
            <nav className="sticky top-0 z-50 border-b border-white/[0.06]" style={{ background: "rgba(10,10,15,0.95)", backdropFilter: "blur(12px)" }}>
              <div className="flex items-center justify-between px-4 py-2.5">
                <div className="flex items-center gap-3 md:gap-5 min-w-0">
                  <a href="index-react.html" className="flex items-center gap-2 no-underline shrink-0">
                    <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><defs><linearGradient id="tt-ring" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stopColor="#34d399"/><stop offset="100%" stopColor="#67e8f9"/></linearGradient></defs><rect width="48" height="48" rx="11" fill="#000"/><circle cx="24" cy="24" r="17" stroke="url(#tt-ring)" strokeWidth="2.5" fill="none"/><line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/><line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/><line x1="19" y1="18.5" x2="16" y2="15.5" stroke="#636366" strokeWidth="1.2" strokeLinecap="round"/><line x1="24" y1="24" x2="19" y2="18.5" stroke="#636366" strokeWidth="3.5" strokeLinecap="round"/><line x1="29.5" y1="16.5" x2="32" y2="12.9" stroke="#30d158" strokeWidth="1.2" strokeLinecap="round"/><line x1="24" y1="24" x2="29.5" y2="16.5" stroke="#30d158" strokeWidth="4" strokeLinecap="round"/><circle cx="24" cy="24" r="3.2" fill="#30d158"/><circle cx="24" cy="24" r="1.3" fill="#000"/></svg>
                    <span className="text-[14px] md:text-[15px] font-bold text-white hidden sm:inline" style={{ letterSpacing: "-0.03em" }}>Timed Trading</span>
                  </a>
                  <div className="hidden md:flex items-center gap-0.5">
                    <a href="index-react.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Analysis</a>
                    <a href="simulation-dashboard.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Trades</a>
                    <a href="system-intelligence.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">System Intelligence</a>
                    <a href="screener.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Screener</a>
                    <a href="ticker-management.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Tickers</a>
                    <a href="trade-autopsy.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-white bg-white/[0.07] font-medium">Trade Autopsy</a>
                    <a href="admin-clients.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#a78bfa]/80 hover:text-[#a78bfa] hover:bg-[#a78bfa]/[0.06] transition-all font-medium">Admin</a>
                    <a href="daily-brief.html" id="nav-daily-brief" className="relative px-3 py-1 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium">
                      Daily Brief
                      <span id="brief-badge" className="hidden absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-[#f59e0b]" style={{ animation: "pulse-badge 2s ease-in-out infinite" }} />
                    </a>
                  </div>
                </div>
                <div className="flex items-center gap-1.5 md:gap-2 shrink-0">
                  <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
                  <a href="index-react.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
                  <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
                  {window.TimedNotificationCenter && <window.TimedNotificationCenter apiBase={API_BASE} />}
                  {window.TimedUserBadge && <window.TimedUserBadge user={window.TimedAuthHelpers?.getStoredSession()} compact />}
                  <button onClick={() => setMobileMenuOpen(v => !v)} className="md:hidden p-1.5 rounded-md text-[#6b7280] hover:text-white hover:bg-white/[0.06] transition-all" aria-label="Toggle menu">
                    {mobileMenuOpen ? (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    ) : (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    )}
                  </button>
                </div>
              </div>
              {mobileMenuOpen && (
                <div className="md:hidden border-t border-white/[0.06] px-4 py-2 flex flex-col gap-0.5" style={{ background: "rgba(10,10,15,0.98)" }}>
                  <a href="index-react.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Analysis</a>
                  <a href="simulation-dashboard.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Trades</a>
                  <a href="system-intelligence.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>System Intelligence</a>
                  <a href="screener.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Screener</a>
                  <a href="ticker-management.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Tickers</a>
                  <a href="trade-autopsy.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-white bg-white/[0.07] font-medium" onClick={() => setMobileMenuOpen(false)}>Trade Autopsy</a>
                  <a href="admin-clients.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#a78bfa]/80 hover:text-[#a78bfa] font-medium" onClick={() => setMobileMenuOpen(false)}>Admin</a>
                  <a href="daily-brief.html" className="px-3 py-2 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium" onClick={() => setMobileMenuOpen(false)}>Daily Brief</a>
                  <div className="border-t border-white/[0.06] mt-1 pt-1 flex items-center gap-2">
                    <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
                    <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
                    <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
                    <a href="mailto:support@timed-trading.com" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Contact</a>
                  </div>
                </div>
              )}
            </nav>

            <main className="max-w-[1200px] mx-auto px-4 md:px-6 py-6">
              <div className="flex flex-wrap items-start justify-between gap-3 mb-4">
                <div>
                  <div className="tt-label-editorial mb-1">Trade Autopsy</div>
                  <h1 className="tt-editorial m-0 mb-2" style={{ fontSize: 30, lineHeight: 1.1, color: "var(--tt-text-0)", letterSpacing: "-0.015em" }}>Every trade, dissected.</h1>
                  <p className="text-[13px]" style={{ color: "var(--tt-text-3)" }}>
                    <span className="sm:hidden">Tap a trade to review and classify.</span>
                    <span className="hidden sm:inline">Review and annotate trades. Click a row to open the chart and add classification. This list is a snapshot &mdash; use <strong style={{ color: "var(--tt-text-2)" }}>Refresh</strong> to load new trades.</span>
                  </p>
                </div>
                <div className="flex items-center gap-2 shrink-0">
                  <button
                    onClick={() => setAutoRefreshEnabled(v => !v)}
                    className={`px-3 py-1.5 rounded-lg border text-[12px] font-medium transition-all ${autoRefreshEnabled ? "bg-[#f59e0b]/10 border-[#f59e0b]/20 text-[#f59e0b] hover:bg-[#f59e0b]/20" : "bg-white/[0.03] border-white/[0.08] text-[#6b7280] hover:text-white hover:bg-white/[0.08]"}`}
                    title="Only applies to the Live replay filter"
                  >
                    Auto-refresh {autoRefreshEnabled ? "On" : "Off"}
                  </button>
                  <button onClick={refreshAll} className="shrink-0 px-3 py-1.5 rounded-lg bg-white/[0.06] border border-white/[0.08] text-[12px] font-medium text-[#9ca3af] hover:text-white hover:bg-white/[0.1] transition-all">Refresh</button>
                </div>
              </div>

              {!loading && !error && (availableRuns.length > 0 || trades.length > 0) && (
                <div className="grid grid-cols-2 sm:flex sm:flex-wrap gap-2 sm:gap-3 mb-4">
                  <select
                    value={filterRunId}
                    onChange={e => setFilterRunId(e.target.value)}
                    className="px-3 py-2 sm:py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.06] text-[13px] text-white col-span-2 sm:col-span-1 sm:max-w-[260px]"
                    title="Filter trades by replay run ID"
                  >
                    <option value={RUN_FILTER_LATEST}>Latest run</option>
                    <option value={RUN_FILTER_LIVE}>Live replay{runMeta.liveRunId ? ` · ${runMeta.liveRunLabel || runMeta.liveRunId}` : ""}</option>
                    <option value="">All runs</option>
                    {runMeta.runs.map(r => (
                      <option key={r.runId} value={r.runId}>{r.label ? `${r.label} (${r.startDate || ""}→${r.endDate || ""})` : r.runId}</option>
                    ))}
                  </select>
                  {trades.length > 0 && (
                    <>
                      <input
                        type="text"
                        placeholder="Filter ticker"
                        value={filterTicker}
                        onChange={e => setFilterTicker(e.target.value)}
                        className="px-3 py-2 sm:py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.06] text-[13px] text-white placeholder-[#4b5563] col-span-1 sm:w-32"
                      />
                      <select
                        value={filterClassification}
                        onChange={e => setFilterClassification(e.target.value)}
                        className="px-3 py-2 sm:py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.06] text-[13px] text-white col-span-1"
                      >
                        <option value="">All grades</option>
                        {CLASSIFICATION_OPTIONS.filter(o => o.value).map(o => (
                          <option key={o.value} value={o.value}>{o.label}</option>
                        ))}
                      </select>
                      <input
                        type="date"
                        value={filterDateFrom}
                        onChange={e => setFilterDateFrom(e.target.value)}
                        className="px-3 py-2 sm:py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.06] text-[13px] text-white col-span-1"
                      />
                      <input
                        type="date"
                        value={filterDateTo}
                        onChange={e => setFilterDateTo(e.target.value)}
                        className="px-3 py-2 sm:py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.06] text-[13px] text-white col-span-1"
                      />
                      <select
                        value={sortOrder}
                        onChange={e => setSortOrder(e.target.value)}
                        className="px-3 py-2 sm:py-1.5 rounded-lg bg-white/[0.04] border border-white/[0.06] text-[13px] text-white col-span-1"
                        title="Sort trades by entry time"
                      >
                        <option value="newest">Newest first</option>
                        <option value="oldest">Oldest first</option>
                      </select>
                    </>
                  )}
                  {(filterTicker || filterClassification || filterDateFrom || filterDateTo || filterRunId !== RUN_FILTER_LATEST || sortOrder !== "newest") && (
                    <button onClick={() => { setFilterTicker(""); setFilterClassification(""); setFilterDateFrom(""); setFilterDateTo(""); setFilterRunId(liveRun ? RUN_FILTER_LIVE : RUN_FILTER_LATEST); setSortOrder("newest"); }} className="px-3 py-2 sm:py-1.5 text-[12px] text-[#6b7280] hover:text-white col-span-2 sm:col-span-1">Clear filters</button>
                  )}
                  <span className="text-[12px] text-[#6b7280] self-center col-span-2 sm:col-span-1">
                    {activeSourceLabel}
                  </span>
                  {(sortedTrades.length !== trades.length || sortOrder !== "newest" || filterRunId === RUN_FILTER_LIVE || filterRunId === RUN_FILTER_LATEST) && (
                    <span className="text-[12px] text-[#6b7280] self-center col-span-2 sm:col-span-1">
                      Showing {sortedTrades.length} of {trades.length}
                      {filterRunId === RUN_FILTER_LATEST && runMeta.latestRunId ? ` · latest completed: ${runMeta.latestRunId}` : ""}
                      {filterRunId === RUN_FILTER_LIVE ? ` · live replay${runMeta.liveRunId ? `: ${runMeta.liveRunId}` : ""}` : ""}
                      {sortOrder === "oldest" ? " · oldest first" : ""}
                    </span>
                  )}
                </div>
              )}

              {loading && (
                <div className="flex items-center justify-center py-16">
                  <div className="loading-spinner" />
                </div>
              )}

              {error && (
                <div className="tt-card p-6 text-center text-[#ef4444]">{error}</div>
              )}

              {!loading && !error && (liveRun || filterRunId === RUN_FILTER_LIVE) && (
                <div className={`tt-card p-4 mb-4 ${filterRunId === RUN_FILTER_LIVE ? "border-[#f59e0b]/30 bg-[#f59e0b]/[0.03]" : ""}`}>
                  <div className="flex items-center gap-3">
                    <div className="relative flex-shrink-0">
                      <div className="w-2.5 h-2.5 rounded-full bg-[#f59e0b]" style={{ animation: "pulse-badge 2s ease-in-out infinite" }} />
                    </div>
                    <div className="flex-1 min-w-0">
                      <p className="text-[13px] text-white font-medium">
                        Backtest in progress{liveRun?.label ? `: ${liveRun.label}` : ""}
                      </p>
                      <p className="text-[12px] text-[#6b7280] mt-0.5">
                        {liveRun?.start_date || ""} {liveRun ? "→" : ""} {liveRun?.end_date || ""}{liveRun ? ` · ${liveRun.status_note || liveRun.status || "running"}` : "Polling live replay feed"}
                      </p>
                    </div>
                    <div className="flex items-center gap-2 shrink-0">
                      {filterRunId === RUN_FILTER_LIVE ? (
                        <span className="px-3 py-1.5 rounded-lg bg-[#f59e0b]/15 text-[12px] font-medium text-[#f59e0b]">Viewing live</span>
                      ) : (
                        <button
                          onClick={() => setFilterRunId(RUN_FILTER_LIVE)}
                          className="px-3 py-1.5 rounded-lg bg-[#f59e0b]/10 border border-[#f59e0b]/20 text-[12px] font-medium text-[#f59e0b] hover:bg-[#f59e0b]/20 transition-all"
                        >View live trades</button>
                      )}
                      <button
                        onClick={() => setAutoRefreshEnabled(v => !v)}
                        className={`px-3 py-1.5 rounded-lg border text-[12px] font-medium transition-all ${autoRefreshEnabled ? "bg-[#f59e0b]/10 border-[#f59e0b]/20 text-[#f59e0b] hover:bg-[#f59e0b]/20" : "bg-white/[0.03] border-white/[0.08] text-[#6b7280] hover:text-white hover:bg-white/[0.08]"}`}
                      >
                        Auto-refresh {autoRefreshEnabled ? "On" : "Off"}
                      </button>
                      <button
                        onClick={refreshAll}
                        className="px-3 py-1.5 rounded-lg bg-white/[0.06] border border-white/[0.08] text-[12px] font-medium text-[#9ca3af] hover:text-white hover:bg-white/[0.1] transition-all"
                      >Refresh</button>
                    </div>
                  </div>
                  {filterRunId === RUN_FILTER_LIVE && trades.length === 0 && (
                    <div className="mt-3 pt-3 border-t border-white/[0.06]">
                      <div className="flex items-center gap-2 text-[12px] text-[#9ca3af]">
                        <div className="loading-spinner" style={{ width: 16, height: 16 }} />
                        <span>Waiting for live trades. Use Refresh to load new positions, or turn on auto-refresh if you want the page to poll every 15 seconds.</span>
                      </div>
                    </div>
                  )}
                  {filterRunId === RUN_FILTER_LIVE && trades.length > 0 && (
                    <div className="mt-3 pt-3 border-t border-white/[0.06]">
                      <p className="text-[12px] text-[#9ca3af]">
                        {trades.length} trade{trades.length !== 1 ? "s" : ""} so far, including open positions
                        {autoRefreshEnabled ? " · auto-refreshing every 15s" : " · snapshot view, use Refresh to load new trades"}
                      </p>
                    </div>
                  )}
                </div>
              )}

              {!loading && !error && trades.length === 0 && !liveRun && filterRunId !== RUN_FILTER_LIVE && (
                <div className="tt-card p-12 text-center text-[#6b7280]">No closed trades to review.</div>
              )}

              {!loading && !error && trades.length === 0 && !!liveRun && filterRunId !== RUN_FILTER_LIVE && (
                <div className="tt-card p-8 text-center">
                  <p className="text-[#9ca3af] mb-2">No trades for this selection.</p>
                  <p className="text-[12px] text-[#6b7280]">A backtest is running — click <strong className="text-[#f59e0b] cursor-pointer" onClick={() => setFilterRunId(RUN_FILTER_LIVE)}>View live trades</strong> above to watch its progress.</p>
                </div>
              )}

              {!loading && !error && trades.length > 0 && sortedTrades.length === 0 && (
                <div className="tt-card p-12 text-center text-[#6b7280]">No trades match the current filters.</div>
              )}

              {!loading && !error && sortedTrades.length > 0 && (
                <>
                  {/* Desktop table */}
                  <div className="tt-card overflow-hidden hidden md:block">
                    <div className="overflow-x-auto">
                      <table className="w-full text-[13px]">
                        <thead>
                          <tr className="border-b border-white/[0.06]">
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Ticker</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Dir</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Entry</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Exit</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Run ID</th>
                            <th className="px-4 py-3 text-right font-semibold text-[#6b7280]">Shares</th>
                            <th className="px-4 py-3 text-right font-semibold text-[#6b7280]">P&L</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Status</th>
                            <th className="px-4 py-3 text-left font-semibold text-[#6b7280]">Classification</th>
                          </tr>
                        </thead>
                        <tbody>
                          {sortedTrades.map((t, i) => {
                            const ann = getAnnotation(t);
                            const clsOpt = CLASSIFICATION_OPTIONS.find(o => o.value === ann.classification);
                            return (
                              <tr
                                key={t.trade_id || t.id || i}
                                className="trade-row border-b border-white/[0.04]"
                                onClick={() => setSelectedTrade(t)}
                              >
                                <td className="px-4 py-2.5 font-medium text-white">{t.ticker}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{t.direction || "—"}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{formatDate(t.entry_ts)}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{formatDate(t.exit_ts)}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af] text-[11px]" title={t.run_id || ""}>
                                  <div className="font-medium text-[#cbd5e1]">{resolveRunLabel(t.run_id) || shortRunId(t.run_id)}</div>
                                  {resolveRunLabel(t.run_id) && (
                                    <div className="font-mono text-[10px] text-[#4b5563]">{shortRunId(t.run_id)}</div>
                                  )}
                                </td>
                                <td className="px-4 py-2.5 text-right font-medium text-[#a78bfa]">{Number(t.shares) > 0 ? Math.round(Number(t.shares)) : "—"}</td>
                                <td className={`px-4 py-2.5 text-right font-medium ${Number(t.pnl) >= 0 ? "text-[#22c55e]" : "text-[#ef4444]"}`}>{fmtUsd(t.pnl)}</td>
                                <td className="px-4 py-2.5 text-[#9ca3af]">{t.status || "—"}</td>
                                <td className="px-4 py-2.5">
                                  <div className="flex flex-wrap items-center gap-1">
                                    {clsOpt?.value && (
                                      <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium" style={{ background: clsOpt.color + "18", color: clsOpt.color }}>
                                        {clsOpt.icon} {clsOpt.label}
                                      </span>
                                    )}
                                    {(ann.entry_grade?.length > 0 || ann.trade_management?.length > 0) && (
                                      <span className="text-[10px] text-[#6b7280]" title={`Entry: ${(ann.entry_grade || []).join(", ") || "—"}\nExit: ${(ann.trade_management || []).join(", ") || "—"}`}>
                                        +{(ann.entry_grade?.length || 0) + (ann.trade_management?.length || 0)} evals
                                      </span>
                                    )}
                                    {!clsOpt?.value && !ann.entry_grade?.length && !ann.trade_management?.length && <span className="text-[#4b5563]">—</span>}
                                  </div>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                  {/* Mobile card list */}
                  <div className="md:hidden space-y-2">
                    {sortedTrades.map((t, i) => {
                      const ann = getAnnotation(t);
                      const clsOpt = CLASSIFICATION_OPTIONS.find(o => o.value === ann.classification);
                      return (
                        <div
                          key={t.trade_id || t.id || i}
                          className="tt-card p-3 active:bg-white/[0.04]"
                          onClick={() => setSelectedTrade(t)}
                        >
                          <div className="flex items-center justify-between mb-1.5">
                            <div className="flex items-center gap-2">
                              <span className="text-[14px] font-semibold text-white">{t.ticker}</span>
                              <span className="text-[11px] text-[#6b7280] px-1.5 py-0.5 rounded bg-white/[0.04]">{t.direction || "—"}</span>
                            </div>
                            <span className={`text-[14px] font-semibold ${Number(t.pnl) >= 0 ? "text-[#22c55e]" : "text-[#ef4444]"}`}>{fmtUsd(t.pnl)}</span>
                          </div>
                          <div className="flex items-center gap-3 text-[11px] text-[#6b7280]">
                            <span>{formatDate(t.entry_ts)}</span>
                            <span className="text-[#4b5563]">→</span>
                            <span>{formatDate(t.exit_ts)}</span>
                            {Number(t.shares) > 0 && <span className="text-[#a78bfa] font-medium">{Math.round(Number(t.shares))} shares</span>}
                          </div>
                          <div className="mt-1 text-[10px] text-[#4b5563] break-all" title={t.run_id || ""}>
                            Run: {resolveRunLabel(t.run_id) || shortRunId(t.run_id)}
                            {resolveRunLabel(t.run_id) && (
                              <span className="font-mono"> · {shortRunId(t.run_id)}</span>
                            )}
                          </div>
                          <div className="flex items-center justify-between mt-1.5 flex-wrap gap-1">
                            <span className="text-[11px] text-[#6b7280]">{t.status || ""}</span>
                            <div className="flex items-center gap-1">
                              {clsOpt?.value && (
                                <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded text-[11px] font-medium" style={{ background: clsOpt.color + "18", color: clsOpt.color }}>
                                  {clsOpt.icon} {clsOpt.label}
                                </span>
                              )}
                              {(ann.entry_grade?.length > 0 || ann.trade_management?.length > 0) && (
                                <span className="text-[10px] text-[#6b7280]">+{(ann.entry_grade?.length || 0) + (ann.trade_management?.length || 0)} evals</span>
                              )}
                              {!clsOpt?.value && !ann.entry_grade?.length && !ann.trade_management?.length && <span className="text-[11px] text-[#4b5563]">Ungraded</span>}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}
            </main>

            <footer className="max-w-[1200px] mx-auto px-4 md:px-6 py-4 text-center text-[11px] text-[#4b5563]">
              For informational and educational purposes only. Not investment advice. Past performance does not guarantee future results. All trading involves risk of loss. <a href="/terms.html" className="text-[#6b7280] underline hover:text-[#9ca3af]">Full Terms</a> · Market data powered by <a href="https://twelvedata.com" target="_blank" rel="noopener" className="text-[#6b7280] underline hover:text-[#9ca3af]">Twelve Data</a>
            </footer>

            {selectedTrade && (
              <AutopsyModal
                trade={selectedTrade}
                annotations={getAnnotation(selectedTrade)}
                onSave={refreshAnnotations}
                onRefreshTrades={refreshTrades}
                onClose={() => {
                  setSelectedTrade(null);
                  if (isReadonly) {
                    if (window.history.length > 1) window.history.back();
                    else window.close();
                  }
                }}
                readonly={isReadonly}
              />
            )}
          </div>
        );
      }

      // Bootstrap through the shared auth gate so admin-only nav links and
      // page access use the same source of truth as the rest of the app.
      (function () {
        const AuthGate = window.TimedAuthGate;
        const root = document.getElementById("root");
        if (typeof AuthGate !== "function") {
          const session = window.TimedAuthHelpers?.getStoredSession?.();
          if (!session) {
            root.innerHTML = '<div class="flex items-center justify-center min-h-screen bg-[#0b0e11] text-[#6b7280] font-[Inter]"><p>Please <a href="index-react.html" class="text-[#00c853]">sign in</a> to view Trade Autopsy.</p></div>';
            return;
          }
          const isAdmin = session.role === "admin" || session.tier === "admin";
          document.body.dataset.userRole = isAdmin ? "admin" : (session.role || "member");
          document.body.dataset.userTier = session.tier || "free";
          ReactDOM.createRoot(root).render(<App user={session} />);
          return;
        }
        ReactDOM.createRoot(root).render(
          <AuthGate apiBase={API_BASE} requiredTier="admin">
            {(user) => <App user={user} />}
          </AuthGate>
        );
      })();
    </script>
  </body>
</html>
