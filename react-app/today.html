                onClick: () => onSelectTicker && onSelectTicker(p.ticker, "OPTIONS"),
                style: {
                  padding: isSidebar ? 10 : 12,
                  background: cardBg,
                  border: cardBorder,
                  borderRadius: 10,
                  cursor: "pointer",
                  transition: "transform 100ms ease, background 100ms ease",
                  boxShadow: isMoonshot ? "0 4px 16px rgba(167,139,250,0.20)" : "none",
                  position: "relative",
                },
                onMouseEnter: (e) => { e.currentTarget.style.transform = "translateY(-1px)"; if (!isMoonshot) e.currentTarget.style.background = meta.color + "20"; },
                onMouseLeave: (e) => { e.currentTarget.style.transform = ""; if (!isMoonshot) e.currentTarget.style.background = cardBg; },
              },
                isMoonshot && h("div", {
                  style: { position: "absolute", top: -8, right: 8, fontSize: 9, fontWeight: 800, letterSpacing: "0.10em", color: "#0b0e11", padding: "2px 8px", borderRadius: 999, background: "linear-gradient(90deg, #f5c25c, #a78bfa)" },
                }, "🌙 MOONSHOT"),
                h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: isSidebar ? 4 : 6, gap: 4, flexWrap: "wrap" } },
                  h("div", { style: { display: "flex", alignItems: "baseline", gap: 6, flexWrap: "wrap" } },
                    h("strong", { style: { fontSize: isSidebar ? 14 : 16, color: "var(--tt-text)" } }, p.ticker),
                    effDir && h("span", { style: { fontSize: 10, fontWeight: 700, color: dirColor, letterSpacing: "0.05em" } }, "PLAY ", effDir),
                    dirFlipped && contractDir && contractDir !== effDir && h("span", {
                      style: { fontSize: 9, fontWeight: 600, color: "var(--tt-text-faint)", letterSpacing: "0.04em" },
                      title: "Trader contract direction — play faded intentionally",
                    }, "(contract ", contractDir, ")"),
                  ),
                  h("div", { style: { display: "flex", gap: 4, flexWrap: "wrap" } },
                    disp && h("span", {
                      style: {
                        fontSize: 9, fontWeight: 700, letterSpacing: "0.05em",
                        color: disp.stance_color || "#9ca3af",
                        padding: "2px 7px", borderRadius: 999,
                        background: (disp.stance_color || "#9ca3af") + "22",
                        border: `1px solid ${(disp.stance_color || "#9ca3af")}44`,
                      },
                    }, disp.stance_label),
                    h("span", {
                      style: { fontSize: 10, fontWeight: 700, color: meta.color, padding: "2px 8px", borderRadius: 999, background: meta.color + "20", letterSpacing: "0.05em" },
                    }, meta.icon, " ", p.confluence_mode),
                  ),
                ),
                h("div", { style: { fontSize: isSidebar ? 12 : 13, fontWeight: 700, color: "var(--tt-text)", marginBottom: isSidebar ? 3 : 4, lineHeight: 1.3 } },
                  p.primary?.label || "—"),
                h("div", { style: { display: "flex", gap: isSidebar ? 8 : 12, fontSize: isSidebar ? 10 : 11, color: "var(--tt-text-muted)", fontFamily: "var(--tt-font-mono)", flexWrap: "wrap" } },
                  p.primary?.expiration?.label && h("span", null, p.primary.expiration.label),
                  p.primary?.max_loss_usd != null && h("span", null, "Risk ", h("strong", { style: { color: "#f87171" } }, "$", p.primary.max_loss_usd >= 1000 ? Math.round(p.primary.max_loss_usd).toLocaleString() : p.primary.max_loss_usd)),
                  p.primary?.max_gain_usd != null && h("span", null, "Gain ", h("strong", { style: { color: "#34d399" } }, "$", p.primary.max_gain_usd >= 1000 ? Math.round(p.primary.max_gain_usd).toLocaleString() : p.primary.max_gain_usd)),
                ),
                disp?.summary && h("div", {
                  style: { marginTop: 6, fontSize: isSidebar ? 10 : 11, color: "var(--tt-text-muted)", lineHeight: 1.4 },
                }, disp.summary),
                !isSidebar && h("div", { style: { marginTop: 6, fontSize: 10, color: "var(--tt-text-faint)" } },
                  "Fusion ", h("strong", { style: { color: "var(--tt-text)", fontFamily: "var(--tt-font-mono)" } }, p.confluence_score || 0, "/100"),
                  disp?.fusion_label ? (" · " + disp.fusion_label) : "",
                  " · ", p.setup_grade || "—",
                  disp?.valid_play === false ? " · educational only" : "",
                ),
              );
            }),
          ),
          ),  // close section
        );  // close React.Fragment
      }

      function computeOpenPositionPnlPct(tr, livePx) {
        const entry = Number(tr?.entry_price ?? tr?.entryPrice ?? tr?.avg_entry ?? tr?.avgEntry);
        const dir = String(tr?.direction || "LONG").toUpperCase();
        let px = Number(livePx);
        if (!(px > 0)) px = Number(tr?.current_price ?? tr?.price ?? tr?._live_price);
        if (entry > 0 && px > 0) {
          const pct = dir === "SHORT" ? ((entry - px) / entry) * 100 : ((px - entry) / entry) * 100;
          return Math.round(pct * 100) / 100;
        }
        const stored = Number(tr?.pnl_pct ?? tr?.pnlPct);
        return Number.isFinite(stored) ? stored : NaN;
      }

      function OpenPositionsPreview({ onSelectTicker, allTickers, variant }) {
        const hero = variant === "hero";
        const [trades, setTrades] = useState([]);
        const [loading, setLoading] = useState(true);
        useEffect(() => {
          let cancelled = false;
          const defer = setTimeout(() => { (async () => {
            try {
              // Canonical open book: positions table (GS/MU live marks) plus
              // investor holdings. Ledger trades can lag or omit positions-only rows.
              const [traderPosJ, investorJ] = await Promise.all([
                fetchJsonRetry(`${API_BASE}/timed/trades?source=positions`),
                fetchJsonRetry(`${API_BASE}/timed/investor/positions`),
              ]);
              if (cancelled) return;
              const all = [];
              const seen = new Set();
              let _liveTraderCount = 0;
              if (traderPosJ?.ok && Array.isArray(traderPosJ.trades)) {
                for (const t of traderPosJ.trades) {
                  const sym = String(t?.ticker || "").toUpperCase();
                  if (!sym) continue;
                  const st = String(t?.status || "").toUpperCase();
                  if (st === "WIN" || st === "LOSS" || st === "FLAT") continue;
                  const tid = String(t?.trade_id || t?.tradeId || t?.id || sym).trim();
                  const key = `T:${tid}`;
                  if (seen.has(key)) continue;
                  seen.add(key);
                  all.push({
                    ...t,
                    ticker: sym,
                    direction: String(t?.direction || "LONG").toUpperCase(),
                    entry_price: Number(t?.entry_price ?? t?.entryPrice ?? t?.avgEntry),
                    _mode: "trader",
                  });
                  _liveTraderCount++;
                }
              }
              // 2026-05-29 — stash live trader count so the Daily Brief
              // preview headline uses it instead of the stale snapshot
              // baked into the brief at 4 PM ET publish time. Triggers
              // a re-render via the brief preview's useEffect window
              // listener below.
              try {
                window.__liveTraderOpenCount = _liveTraderCount;
                window.dispatchEvent(new CustomEvent("tt:live-counts-updated"));
              } catch (_) { /* not in browser context */ }
              if (investorJ?.ok) {
                const j = investorJ;
                const positions = Array.isArray(j?.positions) ? j.positions : [];
                for (const p of positions) {
                  // Position must be open
                  if (String(p?.status || "").toUpperCase() !== "OPEN") continue;
                  if (!(Number(p?.total_shares) > 0)) continue;
                  const key = `I:${String(p?.ticker || "").toUpperCase()}`;
                  if (seen.has(key)) continue;
                  seen.add(key);
                  // Normalize to trade-like shape; pnl_pct will come
                  // from the worker scoring path or be derived below.
                  const avgEntry = Number(p?.avg_entry) || (Number(p?.cost_basis) / Number(p?.total_shares));
                  // 2026-06-16 — carry the unrealized P&L % so investor tiles
                  // show gain/loss like the trader tiles do. /timed/investor/
                  // positions already computes unrealizedPnlPct (currentPrice vs
                  // avg_entry); fall back to deriving it if absent.
                  let invPnlPct = Number(p?.unrealizedPnlPct);
                  if (!Number.isFinite(invPnlPct)) {
                    const cp = Number(p?.currentPrice);
                    invPnlPct = (Number.isFinite(cp) && cp > 0 && avgEntry > 0) ? ((cp - avgEntry) / avgEntry) * 100 : NaN;
                  }
                  all.push({
                    ticker: p.ticker,
                    direction: "LONG",
                    status: p.status,
                    kanban_stage: p.kanban_stage || p.investor_stage,
                    entry_price: avgEntry,
                    shares: p.total_shares,
                    trade_id: p.id,
                    pnl_pct: Number.isFinite(invPnlPct) ? invPnlPct : undefined,
                    current_price: Number(p?.currentPrice) || undefined,
                    day_change_pct: Number(p?.dailyChangePct),
                    _mode: "investor",
                  });
                }
              }
              if (!cancelled) setTrades(all);
            } catch (_) { /* silent */ }
            finally { if (!cancelled) setLoading(false); }
          })(); }, 2500);
          return () => { cancelled = true; clearTimeout(defer); };
        }, []);

        if (loading) {
          if (!hero) return null;
          return h("div", { className: "tt-card tt-card-pad", style: { minHeight: 180 } },
            h("div", { className: "tt-sec-title" }, "OPEN POSITIONS · MODEL GUIDANCE"),
            h("div", { className: "sk", style: { width: "70%", height: 14, marginTop: 12 } }),
            h("div", { className: "sk-grid-4", style: { marginTop: 14 } },
              [0, 1, 2, 3].map((i) => h("div", { key: i, className: "sk", style: { height: 72, borderRadius: 10 } })),
            ),
          );
        }
        if (trades.length === 0) {
          if (!hero) return null;
          return h("div", { className: "tt-card tt-card-pad" },
            h("div", { className: "tt-sec-title" }, "OPEN POSITIONS · MODEL GUIDANCE"),
            h("div", { className: "tt-sec-h", style: { fontSize: 14, marginTop: 6 } }, "No open positions — model is flat."),
          );
        }

        const tickerMeta = (() => {
          const px = new Map();
          const stages = new Map();
          for (const row of allTickers || []) {
            const sym = String(row?.ticker || "").toUpperCase();
            if (!sym) continue;
            const live = window.TimedPriceUtils?.getHeadlinePrice?.(row) ?? Number(row?.price);
            if (live > 0) px.set(sym, live);
            if (row?.kanban_stage) stages.set(sym, row.kanban_stage);
          }
          return { px, stages };
        })();

        const enriched = trades.map((t) => {
          const sym = String(t?.ticker || "").toUpperCase();
          const livePx = tickerMeta.px.get(sym);
          return {
            ...t,
            kanban_stage: t.kanban_stage || tickerMeta.stages.get(sym),
            pnl_pct: computeOpenPositionPnlPct(t, livePx),
          };
        });

        // Sort trader positions first (by |pnl|), then investor — keeps GS
        // with MU instead of trailing at the end when investor PnL is larger.
        const byPnlMag = (a, b) => Math.abs(Number(b?.pnl_pct) || 0) - Math.abs(Number(a?.pnl_pct) || 0);
        const traderSorted = enriched.filter((t) => t._mode === "trader").sort(byPnlMag);
        const investorSorted = enriched.filter((t) => t._mode === "investor").sort(byPnlMag);
        const sorted = [...traderSorted, ...investorSorted];

        const renderOpenPosChip = (t) => {
          const sym = String(t?.ticker || "").toUpperCase();
          const dir = String(t?.direction || "").toUpperCase();
          const pnlPct = Number(t?.pnl_pct);
          const pnlColor = !Number.isFinite(pnlPct) ? "var(--tt-text-muted)"
                        : pnlPct >= 0 ? "var(--tt-up)" : "var(--tt-dn)";
          const stage = String(t?.kanban_stage || t?.status || "OPEN").toUpperCase();
          const stageDisplay = stage === "CORE_HOLD" ? "HOLD"
                              : stage === "ACCUMULATE" ? "ACCUMULATE"
                              : stage === "REDUCE" ? "REDUCE"
                              : stage === "WATCH" ? "WATCH"
                              : stage.replace(/_/g, " ");
          const stageMeta = stage === "DEFEND" || stage === "REDUCE" ? { color: "var(--tt-accent, #f5c25c)", bg: "rgba(245,194,92,0.10)" }
                          : stage === "TRIM"   ? { color: "var(--tt-accent, #f5c25c)", bg: "rgba(245,194,92,0.10)" }
                          : stage === "EXIT"   ? { color: "var(--tt-dn)", bg: "rgba(248,113,113,0.10)" }
                          : stage === "WATCH"  ? { color: "var(--tt-text-muted)", bg: "rgba(156,163,175,0.10)" }
                          : stage === "ACCUMULATE" ? { color: "var(--tt-up)", bg: "rgba(52,211,153,0.15)" }
                          : { color: "var(--tt-up)", bg: "rgba(52,211,153,0.10)" };
          const dirColor = dir === "LONG" ? "var(--tt-up)" : dir === "SHORT" ? "var(--tt-dn)" : "var(--tt-text-muted)";
          const onClick = (e) => {
            e.preventDefault();
            if (typeof onSelectTicker === "function") onSelectTicker(sym);
            else window.location.href = `/active-trader.html?ticker=${encodeURIComponent(sym)}`;
          };
          return h("button", {
            key: `${t?._mode || "t"}:${t?.trade_id || sym}`,
            onClick,
            className: "tt-open-pos-chip",
            style: {
              display: "flex",
              flexDirection: "column",
              alignItems: "stretch",
              borderRadius: 10,
              cursor: "pointer",
              textAlign: "left",
              background: "var(--tt-bg-elev, rgba(255,255,255,0.03))",
              border: "1px solid var(--tt-border, rgba(255,255,255,0.06))",
              fontFamily: "var(--tt-font-mono)",
              transition: "border-color 0.15s, background 0.15s",
            },
            onMouseEnter: (e) => {
              e.currentTarget.style.borderColor = "var(--tt-border-hi, rgba(255,255,255,0.14))";
              e.currentTarget.style.background = "rgba(255,255,255,0.045)";
            },
            onMouseLeave: (e) => {
              e.currentTarget.style.borderColor = "var(--tt-border, rgba(255,255,255,0.06))";
              e.currentTarget.style.background = "var(--tt-bg-elev, rgba(255,255,255,0.03))";
            },
            title: `${sym} ${dir} · ${stageDisplay} · open in detail`,
          },
            h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6 } },
              h("span", { className: "tt-open-pos-chip__head" },
                h(TickerLogo, { sym, size: 18 }),
                h("span", { className: "tt-open-pos-chip__sym" }, sym),
              ),
              h("span", { style: { display: "inline-flex", alignItems: "center", gap: 5 } },
                t?._mode === "trader" && h("span", {
                  className: "tt-open-pos-chip__mode",
                  style: { fontSize: 8, color: "var(--tt-text-faint)", letterSpacing: "0.1em" },
                }, "TRADER"),
                t?._mode === "investor" && h("span", {
                  className: "tt-open-pos-chip__mode",
                  style: { fontSize: 8, color: "var(--tt-text-faint)", letterSpacing: "0.1em" },
                }, "INVESTOR"),
                h("span", { style: { fontSize: 9, fontWeight: 700, color: dirColor, letterSpacing: "0.08em" } }, dir),
              ),
            ),
            h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 6, flexWrap: "wrap" } },
              Number.isFinite(pnlPct) && h("span", {
                style: { color: pnlColor, fontWeight: 700, fontSize: 12 },
              }, `${pnlPct >= 0 ? "+" : ""}${pnlPct.toFixed(2)}%`),
              h("span", {
                style: {
                  padding: "1px 6px", borderRadius: 999, fontSize: 9, fontWeight: 700,
                  letterSpacing: "0.06em", color: stageMeta.color, background: stageMeta.bg,
                  border: `1px solid ${stageMeta.color}40`,
                  marginLeft: "auto",
                },
              }, stageDisplay),
            ),
          );
        };

        const positionsBody = hero
          ? h("div", { className: "tt-open-pos-split" },
              h("div", { className: "tt-open-pos-col tt-open-pos-col--trader" },
                h("div", { className: "tt-open-pos-col__label" }, "Trader"),
                traderSorted.length
                  ? traderSorted.map(renderOpenPosChip)
                  : h("div", { className: "tt-open-pos-col__empty" }, "None"),
              ),
              h("div", { className: "tt-open-pos-col tt-open-pos-col--investor" },
                h("div", { className: "tt-open-pos-col__label" }, "Investor"),
                investorSorted.length
                  ? investorSorted.map(renderOpenPosChip)
                  : h("div", { className: "tt-open-pos-col__empty" }, "None"),
              ),
            )
          : h("div", {
              className: "tt-open-pos-grid",
              style: {
                display: "grid",
                gridTemplateColumns: "repeat(auto-fill, minmax(158px, 1fr))",
                gap: 8,
              },
            },
              sorted.map(renderOpenPosChip),
            );

        return h("section", {
          className: hero ? "tt-card tt-card-pad tt-open-pos-hero" : "tt-card tt-card-pad tt-row",
          style: hero ? { display: "flex", flexDirection: "column" } : { marginBottom: 14 },
        },
          h("div", { className: "tt-sec-title" }, "OPEN POSITIONS · MODEL GUIDANCE"),
          h("div", { className: "tt-sec-h", style: { fontSize: hero ? 14 : 16, marginBottom: 6 } },
            `${trades.length} open position${trades.length === 1 ? "" : "s"} — what the model is managing today`,
          ),
          positionsBody,
        );
      }

      // ─────────────────────────────────────────────────────────────
      // TodayHero — 2-column hero (Daily Brief + Index Predictions)
      //
      // Replaces the single-card hero with a 2-up layout. On desktop
      // (>980px) the Brief takes ~60% width and the predictions strip
      // takes ~40%. Below 980px both stack vertically.
      // ─────────────────────────────────────────────────────────────
      // 2026-06-05 — Research Desk panel for the Today hero. Surfaces the
      // freshest research notes (TT-voice headline, category, time,
      // affected tickers) so the page stays fresh with the research feed.
      function ResearchDeskPanel({ onSelectTicker }) {
        const [feed, setFeed] = useState(null);
        const [croNote, setCroNote] = useState(null);
        const [openId, setOpenId] = useState(null);
        const [croOpen, setCroOpen] = useState(false);
        useEffect(() => {
          let alive = true;
          let pollTimer = null;
          const load = () => {
            Promise.all([
              fetchJsonRetry(`${API_BASE || ""}/timed/cro/feed?limit=50&lookback_days=7`),
              fetchJsonRetry(`${API_BASE || ""}/timed/cro/latest`),
            ]).then(([feedJson, noteJson]) => {
              if (!alive) return;
              setFeed(feedJson);
              if (noteJson && noteJson.ok !== false && noteJson.verdict) setCroNote(noteJson);
              const pending = Array.isArray(feedJson?.items)
                && feedJson.items.some((it) => it.pending_tt_voice);
              if (pending) pollTimer = setTimeout(load, 15000);
            }).catch(() => {});
          };
          const defer = setTimeout(load, 3000);
          return () => { alive = false; clearTimeout(defer); if (pollTimer) clearTimeout(pollTimer); };
        }, []);
        const items = (feed && feed.ok && Array.isArray(feed.items)) ? feed.items : [];
        const ago = (ts) => {
          if (!ts) return "";
          const d = Date.parse(ts) || Number(ts);
          if (!Number.isFinite(d)) return "";
          const m = Math.floor((Date.now() - d) / 60000);
          if (m < 1) return "just now";
          if (m < 60) return `${m}m ago`;
          const hr = Math.floor(m / 60);
          if (hr < 24) return `${hr}h ago`;
          return `${Math.floor(hr / 24)}d ago`;
        };
        return h("div", { className: "tt-card tt-card-pad tt-desk-panel" },
          h("div", { className: "tt-sec-title", style: { marginBottom: 2, flexShrink: 0 } }, "RESEARCH DESK"),
          h("div", { className: "tt-sec-h", style: { marginBottom: 10, flexShrink: 0 } }, "Fresh from the research feed"),
          h("div", { className: "tt-desk-feed-body" },
            items.length === 0 && !croNote
              ? h("div", { className: "tt-desk-scroll", style: { fontSize: 12, color: "var(--tt-text-muted)" } },
                  feed ? "No research notes in the last 7 days." : "Loading research…")
              : h("div", { className: "tt-desk-scroll" },
                  croNote && h("div", {
                    className: "tt-desk-cro-note",
                    style: {
                      marginBottom: 10, padding: "10px 12px", borderRadius: 8,
                      border: "1px solid rgba(139,92,246,0.35)", background: "rgba(139,92,246,0.06)",
                    },
                  },
                    h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 4 } },
                      h("span", { style: { fontSize: 9.5, fontWeight: 700, letterSpacing: "0.06em", color: "#a78bfa", textTransform: "uppercase" } }, "CRO Daily Note"),
                      h("span", { style: { fontSize: 10, color: "var(--tt-text-dim)", marginLeft: "auto" } }, ago(croNote.produced_at)),
                    ),
                    h("button", {
                      onClick: () => setCroOpen(!croOpen),
                      style: { display: "block", width: "100%", textAlign: "left", background: "transparent", border: "none", padding: 0, cursor: "pointer", fontSize: 12.5, color: "var(--tt-text)", lineHeight: 1.45, fontWeight: 600 },
                    },
                      (croNote.verdict || "Daily research synthesis").slice(0, croOpen ? 2000 : 180),
                      (croNote.verdict || "").length > 180 && h("span", { style: { color: "var(--tt-text-dim)", fontWeight: 400, marginLeft: 6, fontSize: 11 } }, croOpen ? "▴" : "▾"),
                    ),
                    croOpen && Array.isArray(croNote.observations) && croNote.observations.length > 0 && h("div", { style: { marginTop: 8, display: "flex", flexDirection: "column", gap: 4 } },
                      croNote.observations.slice(0, 3).map((obs, idx) => h("div", { key: idx, style: { fontSize: 11.5, color: "var(--tt-text-muted)", lineHeight: 1.4 } },
                        h("span", { style: { fontWeight: 700, color: "var(--tt-text-dim)" } }, `${obs.category || "Observation"}: `),
                        (obs.claim || obs.text || "").slice(0, 160),
                      )),
                    ),
                  ),
                  items.length > 0 && h("div", { style: { fontSize: 10, color: "var(--tt-text-dim)", marginBottom: 8, letterSpacing: "0.04em" } },
                    `Last 7 days · ${items.length} note${items.length === 1 ? "" : "s"}`),
                  items.map((it, i) => {
                    const id = it.pub_id || String(i);
                    const isOpen = openId === id;
                    const hasMore = !!it.tt_summary;
                    return h("div", { key: id, className: "tt-desk-item", style: { padding: "8px 0", borderBottom: i < items.length - 1 ? "1px solid var(--tt-border)" : "none" } },
                      h("div", { style: { display: "flex", alignItems: "center", gap: 8, marginBottom: 3 } },
                        h("span", { style: { fontSize: 9.5, fontWeight: 600, letterSpacing: "0.06em", color: "var(--tt-text-dim)", textTransform: "uppercase" } }, it.category_label || "Editorial"),
                        h("span", { style: { fontSize: 10, color: "var(--tt-text-dim)", marginLeft: "auto" } }, ago(it.published_at || it.fetched_at)),
                      ),
                      h("button", {
                        onClick: () => hasMore && setOpenId(isOpen ? null : id),
                        style: { display: "block", width: "100%", textAlign: "left", background: "transparent", border: "none", padding: 0, cursor: hasMore ? "pointer" : "default", fontSize: 12.5, color: "var(--tt-text)", lineHeight: 1.4, fontWeight: 600 },
                      },
                        it.title,
                        hasMore && h("span", { style: { color: "var(--tt-text-dim)", fontWeight: 400, marginLeft: 6, fontSize: 11 } }, isOpen ? "▴" : "▾"),
                      ),
                      isOpen && it.tt_summary && h("div", { style: { fontSize: 12, color: "var(--tt-text-muted)", lineHeight: 1.5, marginTop: 6, paddingLeft: 10, borderLeft: "2px solid var(--tt-border-hi)" } }, it.tt_summary),
                      (it.tickers && it.tickers.length > 0) && h("div", { style: { display: "flex", gap: 5, flexWrap: "wrap", marginTop: 5, marginBottom: 2 } },
                        it.tickers.map((tk) => h("button", {
                          key: tk,
                          onClick: () => onSelectTicker && onSelectTicker(tk),
                          style: { fontSize: 10.5, fontWeight: 700, fontFamily: "var(--tt-font-mono)", color: "var(--tt-text-muted)", background: "var(--tt-bg-elev, rgba(255,255,255,0.04))", border: "1px solid var(--tt-border-hi)", borderRadius: 5, padding: "1px 6px", cursor: "pointer" },
                        }, tk)),
                      ),
                    );
                  }),
                ),
          ),
        );
      }

      // 2026-06-05 — Day-Trade Predictions section. Plain-language plan +
      // levels + a post-close letter grade (from /timed/day-trade-predictions,
      // graded by the 4:30pm ET evaluator) + the attached 0/1DTE option play
      // (merged from /timed/options/all by ticker).
      function DayTradePredictions({ onSelectTicker }) {
        const [pred, setPred] = useState(null);
        useEffect(() => {
          let alive = true;
          fetch(`${API_BASE || ""}/timed/day-trade-predictions`, { credentials: "include", cache: "no-store" })
            .then((r) => (r.ok ? r.json() : null)).then((j) => { if (alive) setPred(j); }).catch(() => {});
          return () => { alive = false; };
        }, []);
        const items = (pred && pred.ok && Array.isArray(pred.items)) ? pred.items : [];
        if (!pred) return null;
        const gradeColor = (g) => g === "A" ? "var(--tt-up-soft)" : g === "B" ? "#fbbf24" : g === "C" ? "var(--tt-dn-soft)" : "var(--tt-text-dim)";
        const fmt = (n) => Number.isFinite(Number(n)) ? Number(n).toLocaleString(undefined, { maximumFractionDigits: 2 }) : "—";
        if (items.length === 0) return null;
        return h("section", { className: "tt-card tt-card-pad" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8, flexWrap: "wrap", marginBottom: 4 } },
            h("div", { className: "tt-sec-title", style: { margin: 0 } }, "DAY-TRADE PREDICTIONS"),
            h("span", { style: { fontSize: 10.5, color: "var(--tt-text-dim)" } }, pred.grades_note || ""),
          ),
          h("div", { className: "tt-sec-h", style: { fontSize: 15, marginBottom: 4 } }, "How the day may unfold — with a grade after the close"),
          pred.levels_live && h("div", { style: { fontSize: 10.5, color: "var(--tt-text-muted)", marginBottom: 10 } },
            h("span", { style: { fontWeight: 700, color: pred.market_open ? "#34d399" : "#fbbf24" } }, pred.market_open ? "LIVE LEVELS" : "LIVE LEVELS (pre/post-market)"),
            " — regenerated off the current price, not the 9am close."),
          h("div", { style: { display: "flex", flexDirection: "column", gap: 2 } },
            items.map((it) => {
              const lv = it.levels;
              return h("div", { key: it.sym, style: { padding: "11px 0", borderBottom: "1px solid var(--tt-border)" } },
                // Header row: symbol + grade (left) · spot + levels (right).
                h("div", { style: { display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" } },
                  h("button", {
                    onClick: () => onSelectTicker && onSelectTicker(it.sym),
                    style: { background: "transparent", border: "none", color: "var(--tt-text)", fontWeight: 800, fontSize: 16, fontFamily: "var(--tt-font-mono)", cursor: "pointer", padding: 0, minWidth: 44, textAlign: "left" },
                  }, it.sym),
                  h("span", {
                    title: it.grade_label,
                    style: { fontSize: 10, fontWeight: 700, color: gradeColor(it.grade), border: `1px solid ${gradeColor(it.grade)}`, borderRadius: 5, padding: "1px 6px", whiteSpace: "nowrap" },
                  }, it.grade ? `${it.grade} · ${it.grade_label}` : (it.gradeable ? "Grades ~4pm" : "—")),
                  // Levels — right-aligned so the row reads like a table.
                  lv && h("div", { style: { marginLeft: "auto", display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "flex-end", fontSize: 11.5, fontFamily: "var(--tt-font-mono)" } },
                    Number.isFinite(it.spot) && h("span", { style: { color: "var(--tt-text)", fontWeight: 700 } }, `spot ${fmt(it.spot)}`),
                    Number.isFinite(lv.bull_trigger) && h("span", { style: { color: "var(--tt-up-soft)" } }, `▲ ${fmt(lv.bull_trigger)}${Number.isFinite(lv.bull_target) ? ` → ${fmt(lv.bull_target)}` : ""}`),
                    Number.isFinite(lv.bear_trigger) && h("span", { style: { color: "var(--tt-dn-soft)" } }, `▼ ${fmt(lv.bear_trigger)}${Number.isFinite(lv.bear_target) ? ` → ${fmt(lv.bear_target)}` : ""}`),
                    Number.isFinite(it.close) && h("span", { style: { color: "var(--tt-text-dim)" } }, `close ${fmt(it.close)}`),
                  ),
                ),
                // Narrative — full width below the header row.
                it.narrative && h("div", { style: { fontSize: 12.5, color: "var(--tt-text-muted)", lineHeight: 1.5, marginTop: 6 } }, it.narrative),
              );
            }),
          ),
          h("div", { style: { fontSize: 10, color: "var(--tt-text-faint)", marginTop: 8, lineHeight: 1.5 } },
            "Levels are the brief's intraday game plan; the grade scores the session high/low vs the predicted triggers/targets after the close. The matching 0/1DTE option play for each index is in “Options Plays · Day Trade Index ETFs” below. Educational, not advice."),
        );
      }

      function TodayHero({ brief, briefSlot, data, earnings, onSelectTicker, cal, allTickers }) {
        return h(React.Fragment, null,
          brief
            ? h(BriefPreview, { brief, briefSlot })
            : data && h(BriefPlaceholder, { data, earnings, onSelectTicker, cal }),
          h("div", {
            className: "today-hero",
            style: {
              display: "grid",
              gridTemplateColumns: "minmax(0, 1fr) minmax(0, 1fr)",
              gridTemplateRows: "auto",
              gap: 16,
              marginBottom: 16,
              alignItems: "stretch",
            },
          },
            h("div", { className: "today-hero-pos-col" },
              h(OpenPositionsPreview, { onSelectTicker, allTickers, variant: "hero" }),
            ),
            h("div", { className: "today-hero-desk-col" },
              h(ResearchDeskPanel, { onSelectTicker }),
            ),
          ),
        );
      }

      // ── CTOLevelsPanel (2026-06-12 — P1 of the CTO surfacing work) ────
      // Consumes GET /timed/cto/feed (slim KV-cached rollup). These are the
      // CTO's DATA-SCIENCE levels (Fib/ATR/pivots with empirical hit rates,
      // Markov-regime adjusted) — context, not engine trade signals; copy
      // says so explicitly. Hidden entirely when the feed isn't available
      // (anon users get 401 → panel renders nothing).
      function CTOLevelsPanel({ onSelectTicker }) {
        const [feed, setFeed] = useState(null);
        useEffect(() => {
          let alive = true;
          const load = async () => {
            try {
              const j = window.TTFetchCache
                ? await window.TTFetchCache.get(`${API_BASE || ""}/timed/cto/feed?limit=30`, { ttlMs: 5 * 60 * 1000, maxAgeMs: 30 * 60 * 1000, fetchOpts: { credentials: "include" } })
                : await fetchJsonRetry(`${API_BASE || ""}/timed/cto/feed?limit=30`);
              if (alive && j?.ok && Array.isArray(j.items)) setFeed(j);
            } catch (_) {}
          };
          const t = setTimeout(load, 2500); // defer — hero brief paints first
          return () => { alive = false; clearTimeout(t); };
        }, []);
        if (!feed) {
          return h("section", { className: "tt-card tt-card-pad", style: { color: "var(--tt-text-muted)", fontSize: 12 } },
            h("div", { className: "tt-sec-title" }, "PROBABILISTIC LEVEL MAP"),
            h("div", { style: { marginTop: 8 } }, "Loading level map…"),
          );
        }
        if (!feed.items?.length) return null;
        const resolveFeedAsOfLabel = window.TimedCTORead?.resolveFeedAsOfLabel
          || ((f) => {
            const ms = Number(f?.prediction_as_of_ms);
            if (Number.isFinite(ms) && ms > 0 && window.TimedCTORead?.formatBarAsOf) {
              return window.TimedCTORead.formatBarAsOf(ms);
            }
            return null;
          });
        const asOfLabel = resolveFeedAsOfLabel(feed);
        const indexRows = feed.items.filter((it) => it.is_index);
        const movers = feed.items.filter((it) => !it.is_index);
        const formatDist = window.TimedCTORead?.formatDistance || ((lvl) => null);
        const levelStatus = window.TimedCTORead?.levelStatus || (() => null);
        const readStatusMeta = window.TimedCTORead?.readStatus || (() => null);
        const setupMoveMeta = window.TimedCTORead?.setupMove || (() => null);
        const spotLabelFor = (it) => {
          const live = Number(it?.live_price);
          const anchor = Number(it?.anchor_price);
          const px = Number.isFinite(live) && live > 0
            ? live
            : (Number.isFinite(anchor) && anchor > 0 ? anchor : null);
          if (!Number.isFinite(px)) return null;
          const asOfMs = Number(feed?.live_as_of_ms) || Number(it?.bar_as_of_ms);
          const fmtBar = window.TimedCTORead?.formatBarAsOf;
          const fmtDate = window.TimedCTORead?.formatAsOfDate;
          const timeStr = fmtBar && asOfMs ? fmtBar(asOfMs) : null;
          const compactTime = timeStr ? timeStr.replace(/, \d{4}/, "") : null;
          const usingLive = Number.isFinite(live) && live > 0;
          const anchorDate = it?.as_of_date ? fmtDate?.(it.as_of_date) : null;
          return {
            text: `$${px.toFixed(2)}${compactTime ? ` · ${compactTime}` : ""}`,
            title: usingLive
              ? `Distances use live spot $${live.toFixed(2)}${compactTime ? ` (${compactTime})` : ""}. Hit % is from daily history; levels anchor on the prior session close.`
              : `Distances use daily close $${px.toFixed(2)}${anchorDate ? ` (${anchorDate})` : ""}.`,
          };
        };
        const probChip = (lvl, dir) => {
          if (!lvl) return h("span", { className: `tt-cto-map-prob tt-cto-map-prob--${dir}` }, "—");
          const dist = formatDist(lvl);
          const st = levelStatus(lvl.level_status);
          const parts = [
            `${dir === "up" ? "▲" : "▼"} $${Number(lvl.price).toFixed(2)}`,
            `${(Number(lvl.adj_prob) * 100).toFixed(0)}%`,
            dist ? `${dist} away` : null,
            st && st.label !== "Open" ? st.label : null,
          ].filter(Boolean);
          return h("span", {
            className: `ds-chip ds-chip--sm tt-cto-map-prob tt-cto-map-prob--${dir} ${dir === "up" ? "ds-chip--up" : "ds-chip--dn"}`,
            style: st && st.label !== "Open" ? { borderColor: `${st.tone}88`, color: st.tone } : undefined,
            title: `${dir === "up" ? "Top upside" : "Top downside"} magnet ${lvl.label} at $${Number(lvl.price).toFixed(2)} — ${(Number(lvl.adj_prob) * 100).toFixed(0)}% historical hit rate (regime-adjusted)${dist ? ` · ${dist} from live price` : ""}${st ? ` · ${st.label}` : ""}${lvl.golden_gate ? " · Golden Gate" : ""}. Distance updates with live quotes; hit/faded since the daily close anchor.`,
          }, parts.join(" · "));
        };
        const readMeta = (it) => {
          if (it?.read_label) {
            return { kind: it.read_kind || "mixed", label: it.read_label, blurb: it.read_blurb || null };
          }
          return window.TimedCTORead?.interpret(it?.top_upside, it?.top_downside) || null;
        };
        const readChip = (it) => {
          const read = readMeta(it);
          if (!read?.label) return null;
          const tone = window.TimedCTORead?.tone(read.kind) || "var(--tt-text-muted)";
          const rs = readStatusMeta(it?.read_status?.status);
          const rsLabel = it?.read_status?.label || rs?.label;
          const rsTone = rs?.tone || tone;
          const move = setupMoveMeta(it);
          return h("span", { style: { display: "flex", flexDirection: "column", alignItems: "flex-start", gap: 4, minWidth: 0, maxWidth: "100%" } },
            h("span", { style: { display: "inline-flex", alignItems: "center", gap: 4, minWidth: 0, maxWidth: "100%", flexWrap: "wrap" } },
              h("span", {
                className: "tt-cto-read-tag tt-cto-map-read",
                style: {
                  fontSize: 10, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase",
                  color: tone, border: `1px solid ${tone}66`, borderRadius: 999, padding: "2px 8px",
                  background: `${tone}14`, display: "inline-block", maxWidth: "100%",
                  overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap",
                },
                title: read.blurb || undefined,
              }, read.label),
              rsLabel && it?.read_status?.status !== "open" && h("span", {
                className: "tt-cto-map-read",
                style: {
                  fontSize: 9, fontWeight: 700, letterSpacing: "0.04em", textTransform: "uppercase",
                  color: rsTone, border: `1px solid ${rsTone}66`, borderRadius: 999, padding: "1px 6px",
                  background: `${rsTone}14`, whiteSpace: "nowrap", flexShrink: 0,
                },
                title: rsLabel,
              }, rsLabel),
            ),
            move?.label && h("span", {
              className: "tt-cto-setup-tag tt-cto-map-read",
              style: {
                color: move.tone,
                border: `1px solid ${move.tone}66`,
                background: `${move.tone}14`,
              },
              title: move.blurb || undefined,
            }, move.label),
          );
        };
        const row = (it) => {
          const spot = spotLabelFor(it);
          return h("div", {
            key: it.ticker,
            className: "tt-cto-map-row",
            onClick: onSelectTicker ? () => onSelectTicker(it.ticker) : undefined,
            title: [readMeta(it)?.blurb, it.narrative].filter(Boolean).join(" · ") || undefined,
          },
            h("span", { className: "tt-cto-map-sym" },
              h("span", null, it.ticker),
              spot && h("span", { className: "tt-cto-map-spot", title: spot.title }, spot.text),
            ),
            readChip(it) || h("span", { className: "tt-cto-map-read", style: { color: "var(--tt-text-faint)", fontSize: 10 } }, "—"),
            h("div", { className: "tt-cto-map-levels" },
              probChip(it.top_upside, "up"),
              probChip(it.top_downside, "dn"),
            ),
          );
        };
        const horizonBars = Number(feed.horizon_bars) > 0 ? Number(feed.horizon_bars) : 10;
        const horizonLabel = horizonBars >= 18 ? "~1 month" : horizonBars >= 8 ? "~2 weeks" : "~1 week";
        return h("section", { className: "tt-card tt-card-pad tt-cto-panel" },
          h("div", { className: "tt-sec-title", style: { flexShrink: 0, marginBottom: 2 } }, "PROBABILISTIC LEVEL MAP"),
          h("div", { className: "tt-sec-h", style: { fontSize: 15, marginBottom: 8, flexShrink: 0 } }, "Where the math says price gravitates"),
          h("div", { className: "tt-cto-feed-body" },
            h("div", { className: "tt-cto-map-scroll" },
              h("div", { style: { fontSize: 11.5, color: "var(--tt-text-dim)", marginBottom: 10, lineHeight: 1.5 } },
                "Upside and downside magnets ranked by hit rate, distance to level, and whether the move is still early or already confirming. ",
                h("strong", { style: { color: "var(--tt-text-muted)", fontWeight: 600 } }, "Range map"),
                " when both hit often; ",
                h("strong", { style: { color: "var(--tt-text-muted)", fontWeight: 600 } }, "Lean"),
                " when one side leads by 12+ pts. Context only, not trade signals.",
              ),
              h("div", { className: "tt-cto-map-meta" },
                asOfLabel
                  ? h("div", { style: { marginBottom: 6, fontFamily: "var(--tt-font-mono)", color: "var(--tt-text-muted)" } },
                      "Levels computed from daily closes through ",
                      h("strong", null, asOfLabel),
                      feed.live_as_of_ms && h("span", { style: { color: "var(--tt-text-faint)" } },
                        " · live distance / hit tags refreshed on load",
                      ),
                    )
                  : h("div", { style: { marginBottom: 6, color: "var(--tt-accent)" } },
                      "Prediction anchor time unavailable — refresh the page or wait for the next CTO rollup.",
                    ),
                h("div", null,
                  h("strong", null, "Timeframe: "),
                  `each hit % asks whether price reaches the magnet within ~${horizonBars} trading sessions (${horizonLabel}), based on this ticker's own daily history.`,
                ),
                feed.items.length > 0 && h("div", { style: { marginTop: 6, fontSize: 10.5, color: "var(--tt-text-faint)" } },
                  `${feed.items.length} shown · top ${Math.min(30, feed.items.length)} by probability + distance`,
                  Number.isFinite(feed.tickers_ok) && Number.isFinite(feed.tickers_candidates)
                    ? ` · ${feed.tickers_ok} candidates in pool`
                    : Number.isFinite(feed.tickers_ok) && Number.isFinite(feed.tickers_processed)
                      ? ` · ${feed.tickers_ok} of ${feed.tickers_processed} with enough history`
                      : "",
                ),
              ),
              feed.learning && h("div", {
                style: { fontSize: 10.5, color: "var(--tt-text-faint)", marginBottom: 10, lineHeight: 1.5 },
              },
                feed.learning.empirical_note,
                feed.learning.forward_note && h("span", null, " ", feed.learning.forward_note),
                Number.isFinite(feed.learning.forward_win_rate_pct) && h("span", null,
                  ` Forward win rate on graded magnets: ${feed.learning.forward_win_rate_pct}%.`,
                ),
              ),
              indexRows.length > 0 && h("div", { style: { marginBottom: 6 } },
                h("div", { style: { fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", color: "var(--tt-text-faint)", textTransform: "uppercase", margin: "4px 0" } }, "Index & sector focus"),
                indexRows.map(row),
              ),
              movers.length > 0 && h("div", null,
                h("div", { style: { fontSize: 10, fontWeight: 700, letterSpacing: "0.08em", color: "var(--tt-text-faint)", textTransform: "uppercase", margin: "8px 0 4px" } },
                  `Top setups (${movers.length}${movers.length >= 22 ? "+" : ""})`),
                movers.map(row),
              ),
            ),
          ),
        );
      }

      function MarketState({ data, onSelectTicker, embedded }) {
        // Order mirrors the AT Market Pulse row: equity indices first,
        // VIX, crypto pair (BTC + ETH), then commodity ETFs (gold, oil).
        // User requested ETH and an oil-equivalent tile alongside the
        // existing ones so the strip reads as a single-glance regime
        // snapshot. Up to 8 tiles fit comfortably at desktop width.
        const candidates = ["SPY", "QQQ", "IWM", "VIXY", "BTCUSD", "ETHUSD", "GLD", "USO"];
        const order = candidates.filter(sym => data?.[sym]).slice(0, 8);
        if (order.length === 0) return null;

        // 2026-05-22 Phase C — HMM latent regime badge. Universe-wide
        // signal attached to every ticker payload by the scoring path.
        // We read the first available ticker (any ticker has the same
        // latent_regime — it's the same blob per tick) and show a small
        // pill. Hides when no model has been trained yet.
        const _latent = (() => {
          for (const sym of order) {
            const lr = data?.[sym]?.latent_regime;
            if (lr && lr.state) return lr;
          }
          return null;
        })();
        const _LATENT_META = {
          BULL_TREND: { color: "var(--tt-up, #34d399)",   label: "BULL TREND" },
          CHOP:       { color: "var(--tt-accent, #f5c25c)", label: "CHOP" },
          BEAR_TREND: { color: "var(--tt-dn, #f87171)",  label: "BEAR TREND" },
        };
        const _latentMeta = _latent ? (_LATENT_META[_latent.state] || { color: "var(--tt-text-muted)", label: _latent.state }) : null;
        const _postSummary = _latent?.posterior
          ? Object.entries(_latent.posterior).map(([k, v]) => `${k} ${(v * 100).toFixed(0)}%`).join(" · ")
          : "";

        const body = h(React.Fragment, null,
          h("div", {
            style: { display: "flex", alignItems: "baseline", gap: 12, flexWrap: "wrap" },
          },
            h("h2", { className: "tt-sec-h", style: { margin: 0 } }, "Where the indices stand"),
            _latentMeta && h("span", {
              title: _postSummary ? `HMM latent regime — posterior: ${_postSummary}` : "HMM latent regime",
              style: {
                display: "inline-flex", alignItems: "center", gap: 6,
                padding: "3px 9px", borderRadius: 999,
                background: `${_latentMeta.color}22`,
                color: _latentMeta.color,
                fontSize: 10, fontWeight: 700, letterSpacing: "0.08em",
                fontFamily: "var(--tt-font-mono, ui-monospace, monospace)",
                whiteSpace: "nowrap",
              },
            },
              h("span", { style: { width: 6, height: 6, borderRadius: "50%", background: _latentMeta.color, boxShadow: `0 0 0 2px ${_latentMeta.color}33` } }),
              `MARKET REGIME · ${_latentMeta.label}`,
            ),
          ),
          h("div", { className: "tt-mp-tiles-row" },
            order.map(sym => h(MarketPulseTile, { key: sym, sym, t: data[sym], onSelectTicker })),
          ),
        );
        if (embedded) {
          return h("div", null,
            h("div", { className: "tt-sec-title" }, "MARKET PULSE"),
            body,
          );
        }
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "MARKET PULSE"),
          body,
        );
      }

      function MarketPulseWithMovers({ data, onSelectTicker }) {
        if (!data) return h(MarketStateSkeleton);
        const universe = new Set(Object.keys(data).map((s) => String(s).toUpperCase()));
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-card tt-card-pad tt-mp-panel" },
            h(MarketState, { data, onSelectTicker, embedded: true }),
            h("div", { className: "tt-mp-divider" }),
            h(TopMovers, { data, onSelectTicker, universe, embedded: true }),
          ),
        );
      }

      // ── Macro events strip ─────────────────────────────────────
      function MacroStrip({ brief, data }) {
        const info = brief?.infographic || {};
        const macro = info.macro || [];
        const items = Array.isArray(macro) ? macro.slice(0, 12) : [];
        // 2026-06-05 — S&P sector rotation row + a "themes to be mindful of"
        // callout derived from sector leadership.
        const sectors = Array.isArray(info.sectors) ? info.sectors.filter((s) => s && (s.sym || s.label)) : [];
        const sectorsSorted = sectors
          .map((s) => ({ sym: String(s.sym || s.label || "").toUpperCase(), chgPct: Number(s.chgPct), status: s.status }))
          .filter((s) => s.sym)
          .sort((a, b) => (Number.isFinite(b.chgPct) ? b.chgPct : -99) - (Number.isFinite(a.chgPct) ? a.chgPct : -99));
        const SECTOR_NAME = {
          XLK: "Technology", XLF: "Financials", XLY: "Consumer Disc.", XLC: "Communications",
          XLV: "Health Care", XLI: "Industrials", XLE: "Energy", XLB: "Materials",
          XLP: "Staples", XLU: "Utilities", XLRE: "Real Estate",
        };
        const leaders = sectorsSorted.filter((s) => Number.isFinite(s.chgPct) && s.chgPct > 0).slice(0, 2);
        const laggards = sectorsSorted.filter((s) => Number.isFinite(s.chgPct) && s.chgPct < 0).slice(-2).reverse();
        const themeCallout = (leaders.length || laggards.length)
          ? [
              leaders.length ? `Leadership: ${leaders.map((s) => SECTOR_NAME[s.sym] || s.sym).join(" + ")}` : null,
              laggards.length ? `Lagging: ${laggards.map((s) => SECTOR_NAME[s.sym] || s.sym).join(" + ")}` : null,
            ].filter(Boolean).join(" · ")
          : null;
        if (items.length === 0 && sectorsSorted.length === 0) return null;
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "CROSS-ASSET & SECTOR SIGNALS"),
          h("div", { className: "tt-sec-h" }, "What the model is weighting across assets + S&P sectors"),
          items.length > 0 && h("div", { className: "macro-row" },
            items.map((m, i) => {
              if (typeof m === "string") {
                return h("span", { key: i, className: "macro-chip" }, m);
              }
              if (!m || typeof m !== "object") return null;
              const label = m.label || m.event || m.name || m.sym || "";
              const value = Number(m.value);
              const chgPct = Number(m.chgPct);

              const hasChg = Number.isFinite(chgPct);
              const chgColor = hasChg ? (chgPct >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)") : "var(--tt-text-dim)";
              if (!label && !hasValue) return null;
              return h("span", { key: i, className: "macro-chip", title: m.hint || "" },
                label && h("span", { style: { color: "var(--tt-text)" } }, label),
                hasValue && h("span", { className: "ts" }, fmtUsd(value)),
                hasChg && h("span", { style: { color: chgColor, fontFamily: "var(--tt-font-mono)", fontSize: 11, fontWeight: 700 } },
                  (chgPct >= 0 ? "+" : "") + chgPct.toFixed(2) + "%"),
              );
            }),
          ),
          sectorsSorted.length > 0 && h("div", { style: { marginTop: 12 } },
            h("div", { style: { fontSize: 11, fontWeight: 700, letterSpacing: "0.04em", color: "var(--tt-text-muted)", marginBottom: 6 } }, "S&P SECTORS"),
            h("div", { className: "macro-row" },
              sectorsSorted.map((s, i) => {
                const hasChg = Number.isFinite(s.chgPct);
                const col = hasChg ? (s.chgPct >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)") : "var(--tt-text-dim)";
                return h("span", { key: i, className: "macro-chip", title: SECTOR_NAME[s.sym] || s.sym },
                  h("span", { style: { color: "var(--tt-text)", fontFamily: "var(--tt-font-mono)", fontWeight: 700 } }, s.sym),
                  hasChg && h("span", { style: { color: col, fontFamily: "var(--tt-font-mono)", fontSize: 11, fontWeight: 700 } },

      // ═══════════════════════════════════════════════════════════
      // FocusRail — Entry Zone strip (matches Entry Zone viewport chip).
      //
      // Tickers in the entry corridor with a priming kanban stage — long
      // or short setups worth considering before the model enters. Longs
      // sort first; Active Trader lanes use stricter entry criteria.
      // ═══════════════════════════════════════════════════════════
      // ── Growth Ideas (Today strip) ─────────────────
      // Fundamentally growing universe names worth watching for pullbacks.
      // Same feed as /timed/investor/holdbook — surfaced on Today as ideas
      // the model tracks for dip-buy entry (not a core-hold ledger).
      const HOLDBOOK_CACHE_URL = `${API_BASE}/timed/investor/holdbook`;
      const CTO_FEED_URL = `${API_BASE}/timed/cto/feed?limit=120`;

      function buildGrowthZoneModel(row, ctoItem) {
        const price = Number(row?.price);
        if (!Number.isFinite(price) || price <= 0) return null;
        const down = ctoItem?.top_downside;
        const up = ctoItem?.top_upside;
        let inv = Number(down?.price);
        let tgt = Number(up?.price);
        const fv = Number(row?.fair_value_price);
        if (!Number.isFinite(inv) || inv >= price) inv = price * 0.9;
        if (!Number.isFinite(tgt) || tgt <= price) {
          tgt = Number.isFinite(fv) && fv > price ? fv : price * 1.12;
        }
        if (inv >= tgt) {
          inv = price * 0.92;
          tgt = price * 1.1;
        }
        const span = tgt - inv;
        const pbLo = inv + span * 0.28;
        const pbHi = inv + span * 0.48;
        const pad = span * 0.04 || price * 0.01;
        const minPx = inv - pad;
        const maxPx = tgt + pad;
        const pct = (px) => Math.max(0, Math.min(100, ((px - minPx) / (maxPx - minPx)) * 100));
        return {
          inv,
          tgt,
          pbLo,
          pbHi,
          price,
          invProb: Number(down?.adj_prob),
          tgtProb: Number(up?.adj_prob),
          pct,
          minPx,
          maxPx,
        };
      }

      function GrowthZoneBar({ row, ctoItem }) {
        const zm = buildGrowthZoneModel(row, ctoItem);
        if (!zm) return null;
        const fmtPx = (n) => `$${Number(n).toFixed(Number(n) >= 100 ? 0 : 2)}`;
        const fmtProb = (p) => (Number.isFinite(p) ? `${Math.round(p * 100)}%` : null);
        const invPct = zm.pct(zm.inv);
        const pbLoPct = zm.pct(zm.pbLo);
        const pbHiPct = zm.pct(zm.pbHi);
        const tgtPct = zm.pct(zm.tgt);
        const pricePct = zm.pct(zm.price);
        return h("div", { className: "tt-opp-zone" },
          h("div", { className: "tt-opp-zone-labels" },
            h("span", null, "Invalidation"),
            h("span", null, "Pullback"),
            h("span", null, "Target"),
          ),
          h("div", { className: "tt-opp-zone-track", title: "Daily CTO levels — invalidation, pullback add zone, and upside target." },
            h("div", {
              className: "tt-opp-zone-seg tt-opp-zone-seg--inv",
              style: { left: "0%", width: `${pbLoPct}%` },
            }),
            h("div", {
              className: "tt-opp-zone-seg tt-opp-zone-seg--pb",
              style: { left: `${pbLoPct}%`, width: `${Math.max(0, pbHiPct - pbLoPct)}%` },
            }),
            h("div", {
              className: "tt-opp-zone-seg tt-opp-zone-seg--tgt",
              style: { left: `${pbHiPct}%`, width: `${Math.max(0, 100 - pbHiPct)}%` },
            }),
            h("div", {
              className: "tt-opp-zone-marker",
              style: { left: `${pricePct}%` },
              title: `Today ${fmtPx(zm.price)}`,
            }),
          ),
          h("div", { className: "tt-opp-zone-meta" },
            h("span", null, `Inv ${fmtPx(zm.inv)}`, fmtProb(zm.invProb) && h("span", { className: "tt-opp-zone-prob" }, ` · ${fmtProb(zm.invProb)} hit`)),
            h("span", null, `PB ${fmtPx(zm.pbLo)}–${fmtPx(zm.pbHi)}`),
            h("span", null, `Tgt ${fmtPx(zm.tgt)}`, fmtProb(zm.tgtProb) && h("span", { className: "tt-opp-zone-prob" }, ` · ${fmtProb(zm.tgtProb)} reach`)),
          ),
        );
      }

      function GrowthIdeasStrip({ onSelectTicker, user, embedded }) {
        const [rows, setRows] = useState(() => {
          const cached = CACHE?.peek(HOLDBOOK_CACHE_URL);
          const list = Array.isArray(cached?.holdings) ? cached.holdings : [];
          return list.length ? list.slice(0, 16) : null;
        });
        const [loadErr, setLoadErr] = useState(null);
        const [ctoBySym, setCtoBySym] = useState({});

        useEffect(() => {
          let alive = true;
          const loadCto = async () => {
            try {
              const j = window.TTFetchCache
                ? await window.TTFetchCache.get(CTO_FEED_URL, { ttlMs: 5 * 60 * 1000, maxAgeMs: 30 * 60 * 1000, fetchOpts: { credentials: "include" } })
                : await fetchJsonRetry(CTO_FEED_URL);
              if (!alive || !j?.ok || !Array.isArray(j.items)) return;
              const map = {};
              for (const it of j.items) {
                const sym = String(it?.ticker || "").toUpperCase();
                if (sym) map[sym] = it;
              }
              setCtoBySym(map);
            } catch (_) {}
          };
          const t = setTimeout(loadCto, 1800);
          return () => { alive = false; clearTimeout(t); };
        }, []);

        useEffect(() => {
          let cancelled = false;
          let attempt = 0;
          const maxAttempts = 4;

          const applyHoldbook = (j) => {
            const list = Array.isArray(j?.holdings) ? j.holdings : [];
            setLoadErr(null);
            setRows(list.slice(0, 16));
            if (CACHE && j?.ok) CACHE.put(HOLDBOOK_CACHE_URL, j);
          };

          const loadHoldbook = () => {
            const ctrl = new AbortController();
            const t = setTimeout(() => ctrl.abort(), 20000);
            return fetch(`${HOLDBOOK_CACHE_URL}?_t=${Date.now()}`, {
              credentials: "include",
              cache: "no-store",
              signal: ctrl.signal,
            })
              .then((r) => r.json())
              .then(async (j) => {
                if (cancelled) return;
                if (j.error_kind === "tier_required" && attempt < maxAttempts - 1) {
                  attempt += 1;
                  await new Promise((res) => setTimeout(res, 600 * attempt));
                  if (!cancelled) return loadHoldbook();
                  return;
                }
                if (j.error_kind === "tier_required") {
                  setLoadErr("Growth Ideas requires a Pro or Admin subscription.");
                  setRows([]);
                  return;
                }
                if (!j.ok && j.error) { setLoadErr(j.error); setRows([]); return; }
                applyHoldbook(j);
              })
              .catch((e) => {
                if (!cancelled) {
                  if (CACHE?.peek(HOLDBOOK_CACHE_URL)?.holdings?.length) return;
                  setLoadErr(e?.name === "AbortError" ? "Growth ideas request timed out." : String(e.message || e));
                  setRows([]);
                }
              })
              .finally(() => { clearTimeout(t); });
          };

          loadHoldbook();
          return () => { cancelled = true; };
        }, [
          user?.email,
          user?.role,
          user?.tier,
          user?.subscription_status,
          user?.expires_at,
        ]);

        const wrap = (children) => {
          if (embedded) return h("div", { className: "tt-universe-panel__growth", id: "opportunities" }, children);
          return h("section", { id: "opportunities", className: "tt-row" }, children);
        };

        if (rows === null) {
          return wrap(h(React.Fragment, null,
            h("div", { className: "tt-sec-title" }, "GROWTH IDEAS"),
            h("div", { className: "tt-sec-h" }, "Loading growth watchlist…"),
          ));
        }
        if (!rows.length) {
          return wrap(h(React.Fragment, null,
            h("div", { className: "tt-sec-title" }, "GROWTH IDEAS"),
            h("div", { className: "tt-sec-h" },

        const fmtPctOpp = (n) => {
          if (!Number.isFinite(Number(n))) return null;
          const v = Number(n);
          return `${v >= 0 ? "+" : ""}${v.toFixed(1)}%`;
        };

        return wrap(h(React.Fragment, null,
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 4 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "GROWTH IDEAS"),
              h("div", { className: "tt-sec-h" }, "Fundamentally growing names — watch for pullbacks to add"),
            ),
            h("a", {
              href: "/opportunities.html",
              style: { fontSize: 11, fontWeight: 600, color: "var(--tt-accent)", textDecoration: "none", fontFamily: "var(--tt-font-mono)" },
            }, "See all →"),
          ),
          loadErr && h("div", { style: { fontSize: 11, color: "var(--tt-text-dim)", marginBottom: 6 } }, loadErr),
          h("div", { className: "tt-opp-scroll" },
            rows.map((row) => {
              const sym = String(row.ticker || "").toUpperCase();
              const why = Array.isArray(row.hold_thesis) && row.hold_thesis[0]
                ? row.hold_thesis[0]
                : (row.trajectory?.cagr_pct != null
                  ? `Revenue runway ~${fmtPctOpp(row.trajectory.cagr_pct)} CAGR`
                  : "Growth profile flagged by fundamentals");
              const pct = Number(row.dailyChgPct);
              return h("button", {
                key: sym,
                type: "button",
                className: "tt-opp-card",
                onClick: () => onSelectTicker && onSelectTicker(sym, "FUNDAMENTALS"),
                title: `${sym} — open Fundamentals`,
              },
                h("div", { className: "tt-opp-card-head" },
                  h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                    h(TickerLogo, { sym, size: 22 }),
                    h("div", null,
                      h("div", { className: "tt-opp-ticker" }, sym),
                      row.companyName && h("div", { style: { fontSize: 10, color: "var(--tt-text-dim)", marginTop: 1 } }, row.companyName),
                    ),
                  ),
                  row.tier_label && h("span", { className: "tt-opp-chip" }, row.tier_label),
                ),
                h("div", { className: "tt-opp-meta" },
                  row.price != null && h("span", null, `$${Number(row.price).toFixed(2)}`),
                  Number.isFinite(pct) && h("span", { style: { color: pct >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)" } }, fmtPctOpp(pct)),
                  row.fair_value_price != null && h("span", null, `FV $${Number(row.fair_value_price).toFixed(0)}`),
                  row.trajectory?.cagr_pct != null && h("span", null, `${fmtPctOpp(row.trajectory.cagr_pct)} runway`),
                ),
                row.dip_buy && h("div", { className: "tt-opp-dip" }, "Dip posture active"),
                h(GrowthZoneBar, { row, ctoItem: ctoBySym[sym] }),
                h("p", { className: "tt-opp-why" }, why),
              );
            }),
          ),
        ));
      }

      function FocusRail({ data, onSelectTicker }) {

              );

      // ── TickerLogo ─────────────────────────────────────────────
      //
      // 2026-05-28 — React-friendly ticker logo. Renders monogram +
      // deterministic color background immediately, then async-loads the
      // real logo and swaps in on success.
      //
      // 2026-05-29 BUGFIX — was previously a thin wrapper around
      // window.DS.tickerLogo that snapshot the DS helper's DOM
      // synchronously. The DS helper kicks off an async img load and
      // appends to ITS node on img.onload — by then we'd already
      // discarded the node, so the img never made it to our React
      // wrapper. Net result on mobile / Today page Movers: every
      // ticker showed only the monogram fallback. We now load the
      // img directly onto our wrapper element with its own onload
      // handler, so the swap happens against the live DOM node.
      function TickerLogo({ sym, size = 22 }) {
        const SYM = String(sym || "").toUpperCase();
        const mono = SYM.slice(0, 2) || "?";
        const bg = (() => {
          let hash = 0;
          for (let i = 0; i < SYM.length; i++) hash = ((hash << 5) - hash) + SYM.charCodeAt(i);
          return `hsl(${Math.abs(hash) % 360}, 35%, 28%)`;
        })();
        const url = SYM && window.DS ? window.DS.tickerLogoUrl(SYM) : (SYM ? `/timed/logo/${encodeURIComponent(SYM)}.png` : null);
        return h("span", {
          className: "tt-trow__logo",
          style: {
            width: size, height: size,
            background: bg,
            display: "inline-flex", alignItems: "center", justifyContent: "center",
            borderRadius: "50%", overflow: "hidden",
            color: "#fff", fontSize: Math.max(8, Math.round(size * 0.38)),
            fontWeight: 700, letterSpacing: "0.02em",
            flexShrink: 0,
          },
          ref: (el) => {
            if (!el || el.dataset.dsInit) return;
            el.dataset.dsInit = "1";
            if (!url) return;
            const img = new Image();
            img.src = url;
            img.alt = SYM;
            img.style.width = "100%";
            img.style.height = "100%";
            img.style.borderRadius = "50%";
            img.style.objectFit = "cover";
            img.onload = () => {
              // Swap monogram for the real logo. White plate so
              // transparent-PNG ETFs (SPY/QQQ/IWM) remain visible
              // on dark backgrounds.
              while (el.firstChild) el.removeChild(el.firstChild);
              el.style.background = "#ffffff";
              el.style.color = "transparent";
              el.appendChild(img);
            };
            img.onerror = () => { /* keep monogram + colored background */ };
          },
        }, mono);
      }

      // ── Top movers ─────────────────────────────────────────────
      // 2026-05-27 (PR #319) — Two changes:
      //   1. mode='ext' now picks AH price (_ah_price / extended_price)
      //      not t.price. Previously t.price was the same field both
      //      RTH and EXT rows read from, so the EXT row sometimes
      //      showed the RTH close instead of the AH price.
      //   2. mode='ext' shows the RTH close stacked below the AH
      //      price so users can see how the EXT move compares to
      //      where the stock closed in the regular session.
      //
      // 2026-05-28 — Refactored to use the unified .tt-trow component
      // so it visually matches the Earnings strip and the Focus rail
      // (logo + symbol + meta + right-side stack). Click handler still
      // calls onSelectTicker to open the right rail.
      const MOVER_LIMIT = 10;
      const getExtMoverPct = (t) => {
        const ext = window.TimedPriceUtils?.getExtChange?.(t);
        return Number.isFinite(ext?.pct) ? ext.pct : NaN;
      };

      function MoverRow({ rk, t, mode, onSelectTicker, universe }) {
        const dc = getDailyChange(t);
        const ext = mode === "ext" ? window.TimedPriceUtils?.getExtChange?.(t) : null;
        const pct = mode === "ext" ? Number(ext?.pct) : Number(dc?.dayPct);
        const price = mode === "ext"
          ? Number(ext?.price ?? t?._ah_price ?? t?.extended_price)
          : Number(t?.price);
        const rthClose = mode === "ext"
          ? Number(window.TimedPriceUtils?.getHeadlinePrice?.(t) ?? t?.price)
          : null;
        const showRthSub = mode === "ext" && Number.isFinite(rthClose) && Number.isFinite(price) && Math.abs(rthClose - price) / price > 0.001;
        const sym = String(t?.ticker || "").toUpperCase();
        const dir = !Number.isFinite(pct) ? "mut" : pct >= 0 ? "up" : "dn";
        const isUni = universe instanceof Set ? universe.has(sym) : false;
        const onClick = (e) => {
          e.preventDefault();
          if (typeof onSelectTicker === "function") onSelectTicker(sym);
        };
        return h("button", {
          type: "button",
          className: "tt-trow tt-trow--mover" + (isUni ? " is-universe" : ""),
          onClick,
          title: `Open ${sym} in the right rail`,
        },
          h("span", { className: "tt-trow__rank" }, "#" + (rk + 1)),
          h(TickerLogo, { sym }),
          h("span", { className: "tt-trow__sym" }, sym),
          // Empty meta cell so the price column lines up across rows
          // (the grid template reserves the 1fr column for the meta
          // even when blank — keeps everything visually aligned).
          h("span", null),
          h("span", { className: "tt-trow__right" },
            h("span", { className: "tt-trow__px" }, Number.isFinite(price) ? fmtUsd(price) : "—"),
            h("span", { className: `tt-trow__chg ${dir}` },
              Number.isFinite(pct) ? (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%" : "—",
            ),
            showRthSub && h("span", { className: "tt-trow__sub" }, "RTH " + fmtUsd(rthClose)),
          ),
        );
      }
      function CompactMoverChip({ t, mode, onSelectTicker }) {
        const dc = getDailyChange(t);
        const ext = mode === "ext" ? window.TimedPriceUtils?.getExtChange?.(t) : null;
        const pct = mode === "ext" ? Number(ext?.pct) : Number(dc?.dayPct);
        const sym = String(t?.ticker || "").toUpperCase();
        const dir = !Number.isFinite(pct) ? "mut" : pct >= 0 ? "up" : "dn";
        return h("button", {
          type: "button",
          className: "tt-mover-compact",
          onClick: (e) => {
            e.preventDefault();
            if (typeof onSelectTicker === "function") onSelectTicker(sym);
          },
          title: `Open ${sym}`,
        },
          h(TickerLogo, { sym, size: 16 }),
          h("span", { className: "tt-mover-compact__sym" }, sym),
          h("span", { className: `tt-mover-compact__pct ${dir}` },
            Number.isFinite(pct) ? `${pct >= 0 ? "+" : ""}${pct.toFixed(2)}%` : "—",
            mode === "ext" && h("span", { className: "tt-mover-compact__ext" }, " EXT"),
          ),
        );
      }
      function CompactMoversCol({ title, items, mode, onSelectTicker }) {
        return h("div", { className: "tt-mover-compact-col" },
          h("div", { className: "tt-mover-compact-col__title" }, title),
          items.length === 0
            ? h("div", { className: "tt-mover-compact-empty" }, "—")
            : h("div", { className: "tt-mover-compact-list" },
                items.slice(0, 5).map((t, i) => h(CompactMoverChip, {
                  key: t.ticker || i, t, mode, onSelectTicker,
                })),
              ),
        );
      }
      function MoversCol({ title, items, mode, onSelectTicker, universe }) {
        return h("div", { className: "tt-card tt-card-pad" },
          h("div", { className: "tt-sec-title", style: { marginBottom: 10 } }, title),
          items.length === 0
            ? h("div", { style: { fontSize: 12, color: "var(--tt-text-dim)", fontStyle: "italic" } }, "No movers right now")
            : h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
                items.map((t, i) => h(MoverRow, { key: t.ticker || i, rk: i, t, mode, onSelectTicker, universe })),
              ),
        );
      }
      function TopMovers({ data, onSelectTicker, universe, strip, embedded }) {
        const arr = useMemo(() => {
          if (!data) return [];
          return Object.values(data).filter(t => t && t.ticker);
        }, [data]);

        const open = isNyRegularMarketOpen();
        const CRYPTO = new Set(["BTCUSD", "ETHUSD"]);

        // RTH gainers/losers
        const rthGain = useMemo(() => arr
          .map(t => { const dc = getDailyChange(t); return { t, pct: Number(dc?.dayPct) }; })
          .filter(x => Number.isFinite(x.pct))
          .sort((a, b) => b.pct - a.pct)
          .slice(0, MOVER_LIMIT)
          .map(x => x.t)
        , [arr]);
        const rthLoss = useMemo(() => arr
          .map(t => { const dc = getDailyChange(t); return { t, pct: Number(dc?.dayPct) }; })
          .filter(x => Number.isFinite(x.pct))
          .sort((a, b) => a.pct - b.pct)
          .slice(0, MOVER_LIMIT)
          .map(x => x.t)
        , [arr]);

        // EXT (after-hours) — only when market closed, exclude crypto
        const extGain = useMemo(() => {
          if (open) return [];
          return arr
            .filter(t => !CRYPTO.has(String(t.ticker).toUpperCase()))
            .map(t => ({ t, pct: getExtMoverPct(t) }))
            .filter(x => Number.isFinite(x.pct) && Math.abs(x.pct) > 0.05)
            .sort((a, b) => b.pct - a.pct)
            .slice(0, MOVER_LIMIT)
            .map(x => x.t);
        }, [arr, open]);
        const extLoss = useMemo(() => {
          if (open) return [];
          return arr
            .filter(t => !CRYPTO.has(String(t.ticker).toUpperCase()))
            .map(t => ({ t, pct: getExtMoverPct(t) }))
            .filter(x => Number.isFinite(x.pct) && Math.abs(x.pct) > 0.05)
            .sort((a, b) => a.pct - b.pct)
            .slice(0, MOVER_LIMIT)
            .map(x => x.t);
        }, [arr, open]);

        const hasExt = extGain.length > 0 || extLoss.length > 0;

        if (embedded) {
          return h("div", { className: "tt-mp-movers-embed" },
            h("div", { className: "tt-sec-title", style: { marginBottom: 4 } }, "TOP MOVERS"),
            h("div", {
              className: `tt-mp-movers-compact-grid${hasExt ? " has-ext" : ""}`,
            },
              h(CompactMoversCol, { title: "RTH GAINERS", items: rthGain, mode: "rth", onSelectTicker }),
              h(CompactMoversCol, { title: "RTH LOSERS", items: rthLoss, mode: "rth", onSelectTicker }),
              hasExt && h(CompactMoversCol, { title: "EXT GAINERS", items: extGain, mode: "ext", onSelectTicker }),
              hasExt && h(CompactMoversCol, { title: "EXT LOSERS", items: extLoss, mode: "ext", onSelectTicker }),
            ),
          );
        }

        // 2026-06-05 — Compact horizontal STRIPS: one scrolling row PER
        // category (RTH gainers, RTH losers, and — only when the market is
        // closed — EXT gainers, EXT losers).
        if (strip) {
          const moverChip = (t, mode) => {
            const sym = String(t.ticker || t.sym || "").toUpperCase();
            let pct;
            if (mode === "ext") {
              pct = getExtMoverPct(t);
            } else {
              const dc = (typeof getDailyChange === "function") ? getDailyChange(t) : null;
              pct = Number(dc?.dayPct);
            }
            const up = Number.isFinite(pct) && pct >= 0;
            return h("button", {
              key: sym, onClick: () => onSelectTicker && onSelectTicker(sym),
              className: "tt-strip-chip", title: sym,
            },
              h(TickerLogo, { sym, size: 18 }),
              h("span", { style: { fontWeight: 700, fontSize: 12, fontFamily: "var(--tt-font-mono)" } }, sym),
              Number.isFinite(pct) && h("span", { style: { fontSize: 11, fontWeight: 700, color: up ? "var(--tt-up-soft)" : "var(--tt-dn-soft)", fontFamily: "var(--tt-font-mono)" } }, `${up ? "+" : ""}${pct.toFixed(2)}%${mode === "ext" ? " EXT" : ""}`),
            );
          };
          const stripFor = (key, title, items, mode) =>
            items.length > 0 && h("section", { key, className: "tt-row" },
              h("div", { className: "tt-sec-title" }, title),
              h("div", { className: "tt-strip-scroll" }, items.slice(0, 12).map((t) => moverChip(t, mode))),
            );
          const open = isNyRegularMarketOpen();
          const strips = [
            stripFor("rth-up", "TOP MOVERS \u2014 RTH GAINERS", rthGain, "rth"),
            stripFor("rth-dn", "TOP MOVERS \u2014 RTH LOSERS", rthLoss, "rth"),
            // EXT only shown after the close / when the market is shut.
            !open && stripFor("ext-up", "AFTER-HOURS \u2014 EXT GAINERS", extGain, "ext"),
            !open && stripFor("ext-dn", "AFTER-HOURS \u2014 EXT LOSERS", extLoss, "ext"),
          ].filter(Boolean);
          if (strips.length === 0) return null;
          return h(React.Fragment, null, strips);
        }

        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "TOP MOVERS"),
          h("div", { className: "tt-sec-h" }, "Who's running and who's getting hit"),
          h("p", { className: "tt-sec-sub" },
            open
              ? "Live RTH movers across the universe. Click a row to open the ticker."
              : "RTH movers from today's session. EXT row shows after-hours follow-through."
          ),
          h("div", { className: "tt-grid tt-grid-2" },
            h(MoversCol, { title: "RTH GAINERS", items: rthGain, mode: "rth", onSelectTicker, universe }),
            h(MoversCol, { title: "RTH LOSERS",  items: rthLoss, mode: "rth", onSelectTicker, universe }),
          ),
          hasExt && h("div", { className: "tt-grid tt-grid-2", style: { marginTop: 12 } },
            h(MoversCol, { title: "EXT GAINERS (after-hours)", items: extGain, mode: "ext", onSelectTicker, universe }),
            h(MoversCol, { title: "EXT LOSERS (after-hours)",  items: extLoss, mode: "ext", onSelectTicker, universe }),
          ),
        );
      }

      // ── Earnings strip ─────────────────────────────────────────
      //
      // 2026-05-28 — Show the FULL day of earnings, sorted with our
      // SECTOR_MAP universe tickers first (then session, then symbol).
      // The previous version capped each day at 6 rows + total at 18,
      // which silently dropped DELL, COST, MDB, NTAP, OKTA, PATH on a
      // single busy day. Pass `universe` (a Set of symbols we actually
      // trade) so the strip can both prioritise AND visually distinguish
      // those rows.
      //
      // 2026-05-28 (cohesion pass) — Rows are now the unified
      // .tt-trow component (same shape as MoverRow and FocusRail).
      // Logo + bold symbol + hour chip + EPS estimate, fully
      // clickable via onSelectTicker → opens the right rail.
      // 2026-06-05 — Macro events strip. The brief's live econ feed (Finnhub
      // premium / ForexFactory scrape) frequently returns nothing, so big
