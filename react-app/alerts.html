<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Timed Trading - Trade Alerts</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='r' x1='6' y1='42' x2='42' y2='6'%3E%3Cstop offset='0%25' stop-color='%2334d399'/%3E%3Cstop offset='100%25' stop-color='%2367e8f9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='11' fill='%23000'/%3E%3Ccircle cx='24' cy='24' r='17' stroke='url(%23r)' stroke-width='3' fill='none'/%3E%3Cline x1='24' y1='24' x2='19' y2='18.5' stroke='%23636366' stroke-width='4' stroke-linecap='round'/%3E%3Cline x1='24' y1='24' x2='29.5' y2='16.5' stroke='%2330d158' stroke-width='4.5' stroke-linecap='round'/%3E%3Ccircle cx='24' cy='24' r='3.5' fill='%2330d158'/%3E%3Ccircle cx='24' cy='24' r='1.5' fill='%23000'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossOrigin="" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="tt-tokens.css?v=20260423a" />
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth-gate.js?v=20260316a"></script>
    <script src="shared-price-utils.js?v=20260316a"></script>
    <script src="shared-right-rail.compiled.js?v=20260318e"></script>
    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.02);
        --tt-bg-elevated: rgba(255,255,255,0.035);
        --tt-bg-hover: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.04);
        --tt-border-strong: rgba(255,255,255,0.08);
        --tt-text: #e5e7eb;
        --tt-text-muted: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-accent: #00c853;
        --tt-accent-dim: rgba(0, 200, 83, 0.12);
        --tt-negative: #ff5252;
        --tt-negative-dim: rgba(255, 82, 82, 0.12);
        --tt-radius: 12px;
        --tt-radius-sm: 8px;
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
      }
      body:not([data-user-role="admin"]) a[data-admin-only] { display: none !important; }

      .alert-card {
        background: transparent;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        padding: 12px 0;
        transition: background 0.12s;
      }
      .alert-card:hover { background: rgba(255,255,255,0.015); }
      .alert-card:last-child { border-bottom: none; }

      .week-header {
        background: transparent;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        cursor: pointer;
        transition: background 0.12s;
      }
      .week-header:hover { background: rgba(255,255,255,0.02); }

      .badge {
        display: inline-flex; align-items: center;
        padding: 1px 6px; border-radius: 3px;
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.06em; text-transform: uppercase;
      }
      .badge-entry { background: rgba(255,255,255,0.06); color: #e5e7eb; }
      .badge-trim { background: rgba(255,255,255,0.06); color: #d4a017; }
      .badge-defend { background: rgba(255,255,255,0.06); color: #7da2c4; }
      .badge-exit-win { background: rgba(34,197,94,0.08); color: #4ade80; }
      .badge-exit-loss { background: rgba(239,68,68,0.08); color: #f87171; }
      .badge-long { background: transparent; color: #4ade80; }
      .badge-short { background: transparent; color: #f87171; }

      .filter-pill {
        padding: 5px 14px; border-radius: 4px; font-size: 11px; font-weight: 600;
        letter-spacing: 0.03em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.06); background: transparent; color: #4b5563;
        cursor: pointer; transition: all 0.12s;
      }
      .filter-pill:hover { border-color: rgba(255,255,255,0.12); color: #9ca3af; }
      .filter-pill.active { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: #e5e7eb; }

      .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; border-radius: 2px; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

      .ticker-link { cursor: pointer; font-weight: 600; letter-spacing: -0.01em; transition: opacity 0.12s; }
      .ticker-link:hover { opacity: 0.7; }

      .type-dot { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback, useMemo, useRef } = React;
      const API_BASE = "";

      const fmtUsd = (v) => { const n = Number(v); return Number.isFinite(n) ? new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(n) : "—"; };
      const fmtPct = (v) => { const n = Number(v); return Number.isFinite(n) ? `${n >= 0 ? "+" : ""}${n.toFixed(2)}%` : "—"; };
      const fmtPrice = (v) => { const n = Number(v); return Number.isFinite(n) ? `$${n.toFixed(2)}` : "—"; };

      function getWeekRange(date) {
        const d = new Date(date);
        const day = d.getUTCDay();
        const mon = new Date(d);
        mon.setUTCDate(d.getUTCDate() - ((day + 6) % 7));
        const fri = new Date(mon);
        fri.setUTCDate(mon.getUTCDate() + 4);
        return { start: mon, end: fri, key: mon.toISOString().slice(0, 10) };
      }

      function formatWeekLabel(start, end) {
        const opts = { month: "short", day: "numeric", timeZone: "UTC" };
        const sy = start.getUTCFullYear();
        const ey = end.getUTCFullYear();
        const sl = start.toLocaleDateString("en-US", opts);
        const el = end.toLocaleDateString("en-US", { ...opts, year: sy !== ey ? "numeric" : undefined });
        return `${sl} – ${el}, ${ey}`;
      }

      function formatDayLabel(ts) {
        return new Date(ts).toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", timeZone: "America/New_York" });
      }

      function formatTime(ts) {
        return new Date(ts).toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
      }

      function typeDotColor(type, pnl) {
        if (type === "ENTRY" || type === "SCALE_IN") return "#e5e7eb";
        if (type === "TRIM") return "#d4a017";
        if (type === "DEFEND") return "#7da2c4";
        if (type === "EXIT") return (pnl != null && pnl >= 0) ? "#4ade80" : "#f87171";
        return "#6b7280";
      }

      function TypeBadge({ type, pnl }) {
        let cls = "badge-entry";
        let label = type;
        if (type === "TRIM") cls = "badge-trim";
        else if (type === "DEFEND") cls = "badge-defend";
        else if (type === "EXIT") {
          cls = (pnl != null && pnl >= 0) ? "badge-exit-win" : "badge-exit-loss";
        } else if (type === "SCALE_IN") { cls = "badge-entry"; label = "SCALE"; }
        else if (type === "ENTRY_CORRECTION") { cls = "badge-defend"; label = "ADJ"; }
        return <span className={`badge ${cls}`}>{label}</span>;
      }

      function DirectionBadge({ dir }) {
        return <span className="text-[10px] font-bold tracking-wider" style={{ color: dir === "LONG" ? "#4ade80" : "#f87171" }}>{dir}</span>;
      }

      function AlertCard({ alert, onTickerClick }) {
        const { type, ts, ticker, direction, entry_price, exit_price, setup_name, setup_grade, risk_budget, rank, rr, pnl, pnl_pct, reason, price, qty_pct_delta, qty_pct_total, pnl_realized, meta_json } = alert;

        let meta = {};
        try { meta = meta_json ? JSON.parse(meta_json) : {}; } catch {}

        const dotColor = typeDotColor(type, pnl);
        const reasonText = meta.reason_human || meta.exit_reason_human || meta.thesis || reason || meta.reason || "";
        const riskPct = meta.risk_pct || (risk_budget ? (risk_budget * 100).toFixed(1) : null);

        return (
          <div className="alert-card px-4">
            <div className="flex items-center gap-2.5 flex-wrap">
              <div className="type-dot" style={{ background: dotColor }} />
              <TypeBadge type={type} pnl={pnl} />
              <span className="text-[10px] text-[#374151] tabular-nums font-medium">{formatTime(ts)}</span>
              <span className="ticker-link text-[13px] text-white" onClick={() => onTickerClick(ticker)}>{ticker}</span>
              <DirectionBadge dir={direction} />
              {setup_grade && <span className="text-[10px] font-medium text-[#4b5563]">{setup_grade}</span>}
              {riskPct && <span className="text-[10px] text-[#374151] tabular-nums">{riskPct}%</span>}

              <span className="flex-1" />

              {type === "ENTRY" && (
                <div className="flex items-center gap-3 text-[11px] text-[#6b7280] tabular-nums">
                  <span>{fmtPrice(entry_price || price)}</span>
                  {meta.sl_price && <span className="text-[#374151]">SL {fmtPrice(meta.sl_price)}</span>}
                  {meta.tp_price && <span className="text-[#374151]">TP {fmtPrice(meta.tp_price)}</span>}
                  {rank != null && <span className="text-[#374151]">{rank}</span>}
                  {rr != null && <span className="text-[#374151]">{Number(rr).toFixed(1)}R</span>}
                </div>
              )}

              {type === "SCALE_IN" && (
                <div className="flex items-center gap-3 text-[11px] text-[#6b7280] tabular-nums">
                  <span>{fmtPrice(price)}</span>
                  {entry_price && <span className="text-[#374151]">avg {fmtPrice(entry_price)}</span>}
                </div>
              )}

              {type === "TRIM" && (
                <div className="flex items-center gap-3 text-[11px] text-[#6b7280] tabular-nums">
                  {meta.trimmed_pct ? <span className="font-semibold text-[#d4a017]">{meta.trimmed_pct}%</span>
                    : qty_pct_delta ? <span className="font-semibold text-[#d4a017]">{Math.abs(Number(qty_pct_delta)).toFixed(0)}%</span>
                    : null}
                  <span>{fmtPrice(entry_price)} → {fmtPrice(price || meta.current_price || meta.trim_price)}</span>
                  {(pnl_realized != null || meta.pnl_pct != null) && (
                    <span className={Number(pnl_realized || meta.pnl_pct || 0) >= 0 ? "text-[#4ade80]" : "text-[#f87171]"}>
                      {meta.pnl_pct != null ? fmtPct(meta.pnl_pct) : fmtUsd(pnl_realized)}
                    </span>
                  )}
                  {meta.remaining_pct != null && <span className="text-[#374151]">{meta.remaining_pct}% left</span>}
                </div>
              )}

              {type === "EXIT" && (
                <div className="flex items-center gap-3 text-[11px] tabular-nums">
                  <span className="text-[#6b7280]">{fmtPrice(entry_price)} → {fmtPrice(exit_price || price)}</span>
                  {pnl != null && (
                    <span className={pnl >= 0 ? "text-[#4ade80] font-semibold" : "text-[#f87171] font-semibold"}>
                      {fmtUsd(pnl)} ({fmtPct(pnl_pct)})
                    </span>
                  )}
                </div>
              )}

              {type === "DEFEND" && (
                <div className="flex items-center gap-3 text-[11px] text-[#6b7280] tabular-nums">
                  <span>{fmtPrice(entry_price)} → {fmtPrice(price || meta.current_price)}</span>
                  {meta.trailing_sl_price && <span className="text-[#374151]">SL {fmtPrice(meta.trailing_sl_price)}</span>}
                </div>
              )}

              {type === "ENTRY_CORRECTION" && (
                <div className="flex items-center gap-3 text-[11px] text-[#6b7280] tabular-nums">
                  <span>→ {fmtPrice(price)}</span>
                </div>
              )}
            </div>

            {reasonText && (
              <div className="mt-1 pl-[19px] text-[10px] text-[#374151] leading-relaxed truncate max-w-full" title={reasonText}>
                {reasonText}
              </div>
            )}
          </div>
        );
      }

      function WeekAccordion({ weekKey, weekLabel, alerts, expanded, onToggle, onTickerClick }) {
        const completedTrades = useMemo(() => {
          const exitEvents = alerts.filter(a => a.type === "EXIT");
          return exitEvents.length;
        }, [alerts]);

        const realizedPnl = useMemo(() => {
          return alerts.filter(a => a.type === "EXIT" && a.pnl != null).reduce((s, a) => s + Number(a.pnl || 0), 0);
        }, [alerts]);

        const winCount = useMemo(() => alerts.filter(a => a.type === "EXIT" && a.pnl > 0).length, [alerts]);
        const winRate = completedTrades > 0 ? ((winCount / completedTrades) * 100).toFixed(1) : null;

        const dayGroups = useMemo(() => {
          const groups = {};
          alerts.forEach(a => {
            const dayKey = new Date(a.ts).toLocaleDateString("en-US", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" });
            if (!groups[dayKey]) groups[dayKey] = [];
            groups[dayKey].push(a);
          });
          return Object.entries(groups).sort((a, b) => b[1][0].ts - a[1][0].ts);
        }, [alerts]);

        return (
          <div className="mb-0">
            <div className="week-header px-4 py-3 flex items-center justify-between" onClick={onToggle}>
              <div className="flex items-center gap-2.5">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4b5563" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                  style={{ transform: expanded ? "rotate(90deg)" : "rotate(0deg)", transition: "transform 0.15s" }}>
                  <polyline points="9 18 15 12 9 6" />
                </svg>
                <span className="text-[12px] font-semibold text-[#e5e7eb] tracking-tight">{weekLabel}</span>
              </div>
              <div className="flex items-center gap-5 text-[10px] text-[#4b5563] tabular-nums font-medium tracking-wide uppercase">
                <span>{completedTrades} closed</span>
                {winRate && <span>{winRate}% wr</span>}
                <span className={realizedPnl >= 0 ? "text-[#4ade80]" : "text-[#f87171]"}>
                  {fmtUsd(realizedPnl)}
                </span>
              </div>
            </div>

            {expanded && (
              <div className="mt-0">
                {dayGroups.map(([dayKey, dayAlerts]) => (
                  <div key={dayKey}>
                    <div className="px-4 pt-3 pb-1">
                      <span className="text-[10px] text-[#374151] font-semibold uppercase tracking-widest">{formatDayLabel(dayAlerts[0].ts)}</span>
                    </div>
                    <div>
                      {dayAlerts.map(alert => (
                        <AlertCard key={alert.event_id} alert={alert} onTickerClick={onTickerClick} />
                      ))}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function SkeletonCards() {
        return (
          <div className="space-y-2">
            {[1,2,3,4].map(i => (
              <div key={i} className="skeleton" style={{ height: 64 }} />
            ))}
          </div>
        );
      }

      function App({ user }) {
        const [alerts, setAlerts] = useState([]);
        const [loading, setLoading] = useState(true);
        const [totalCount, setTotalCount] = useState(0);
        const [offset, setOffset] = useState(0);
        const [typeFilter, setTypeFilter] = useState(null);
        const [tickerSearch, setTickerSearch] = useState("");
        const [dirFilter, setDirFilter] = useState(null);
        const [expandedWeeks, setExpandedWeeks] = useState({});
        const [selectedTicker, setSelectedTicker] = useState(null);
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const LIMIT = 200;

        const fetchAlerts = useCallback(async (reset = false) => {
          setLoading(true);
          try {
            const params = new URLSearchParams();
            params.set("limit", String(LIMIT));
            params.set("offset", reset ? "0" : String(offset));
            if (typeFilter) params.set("type", typeFilter);
            if (tickerSearch.trim()) params.set("ticker", tickerSearch.trim().toUpperCase());
            if (dirFilter) params.set("direction", dirFilter);
            const res = await fetch(`${API_BASE}/timed/alerts?${params}`, { credentials: "include" });
            const data = await res.json();
            if (data.ok) {
              if (reset) {
                setAlerts(data.alerts);
                setOffset(data.alerts.length);
              } else {
                setAlerts(prev => {
                  const existing = new Set(prev.map(a => a.event_id));
                  const newAlerts = data.alerts.filter(a => !existing.has(a.event_id));
                  return [...prev, ...newAlerts];
                });
                setOffset(prev => prev + data.alerts.length);
              }
              setTotalCount(data.total_count);
            }
          } catch (e) { console.error("[Alerts] fetch error:", e); }
          setLoading(false);
        }, [offset, typeFilter, tickerSearch, dirFilter]);

        useEffect(() => { fetchAlerts(true); }, [typeFilter, dirFilter]);

        const handleTickerSearch = useCallback(() => { fetchAlerts(true); }, [fetchAlerts]);

        const weekGroups = useMemo(() => {
          const groups = {};
          alerts.forEach(a => {
            const { key, start, end } = getWeekRange(new Date(a.ts));
            if (!groups[key]) groups[key] = { start, end, alerts: [] };
            groups[key].alerts.push(a);
          });
          return Object.entries(groups)
            .sort((a, b) => b[0].localeCompare(a[0]))
            .map(([key, data]) => ({ key, label: formatWeekLabel(data.start, data.end), alerts: data.alerts }));
        }, [alerts]);

        useEffect(() => {
          if (weekGroups.length > 0 && Object.keys(expandedWeeks).length === 0) {
            setExpandedWeeks({ [weekGroups[0].key]: true });
          }
        }, [weekGroups]);

        const toggleWeek = (key) => setExpandedWeeks(prev => ({ ...prev, [key]: !prev[key] }));

        const todayStats = useMemo(() => {
          const todayStr = new Date().toLocaleDateString("en-US", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" });
          const todayAlerts = alerts.filter(a => {
            const ds = new Date(a.ts).toLocaleDateString("en-US", { timeZone: "America/New_York", year: "numeric", month: "2-digit", day: "2-digit" });
            return ds === todayStr;
          });
          return {
            total: todayAlerts.length,
            entries: todayAlerts.filter(a => a.type === "ENTRY").length,
            exits: todayAlerts.filter(a => a.type === "EXIT").length,
            trims: todayAlerts.filter(a => a.type === "TRIM").length,
            defends: todayAlerts.filter(a => a.type === "DEFEND").length,
          };
        }, [alerts]);

        const uniqueTickers = useMemo(() => [...new Set(alerts.map(a => a.ticker))].sort(), [alerts]);

        const hasMore = alerts.length < totalCount;

        const handleTickerClick = useCallback((ticker) => {
          setSelectedTicker(ticker);
        }, []);

        const TickerDetailRightRail = useMemo(() => {
          if (typeof window.TickerDetailRightRailFactory !== "function") return () => null;
          const _fmtUsd = (v) => Number.isFinite(Number(v)) ? new Intl.NumberFormat("en-US", { style: "currency", currency: "USD", maximumFractionDigits: 2 }).format(Number(v)) : "—";
          return window.TickerDetailRightRailFactory({
            React,
            API_BASE,
            fmtUsd: _fmtUsd,
            fmtUsdAbs: (n) => Number.isFinite(Number(n)) ? `$${Math.abs(Number(n)).toFixed(2)}` : "—",
            getDailyChange: typeof getDailyChange === "function" ? getDailyChange : (t) => ({ dayPct: 0, dayChg: 0 }),
            isPrimeBubble: () => false,
            entryType: () => "—",
            getActionDescription: () => "",
            rankScoreForTicker: () => 0,
            getRankedTickers: () => [],
            getRankPosition: () => null,
            getRankPositionFromMap: () => null,
            detectPatterns: () => [],
            normalizeTrailPoints: () => [],
            phaseToColor: () => "#6b7280",
            completionForSize: () => 0,
            computeHorizonBucket: () => "—",
            computeEtaDays: () => 0,
            computeReturnPct: () => 0,
            computeRiskPct: () => 0,
            computeTpTargetPrice: () => 0,
            computeTpMaxPrice: () => 0,
            summarizeEntryDecision: () => "",
            getDirectionFromState: () => "—",
            getDirection: () => "—",
            numFromAny: (v) => Number(v) || 0,
            groupsForTicker: () => [],
            GROUP_ORDER: [],
            GROUP_LABELS: {},
            TRADE_SIZE: 1,
            FUTURES_SPECS: {},
            getStaleInfo: () => ({ stale: false }),
            isNyRegularMarketOpen: () => false,
            downsampleByInterval: (arr) => arr,
            getTickerSector: () => "Unknown",
            normalizeSectorKey: (s) => s,
            sectorKeyToCanonicalName: (s) => s,
          });
        }, []);

        return (
          <div className="min-h-screen flex flex-col">
            {/* Nav Bar */}
            <nav className="sticky top-0 z-50 border-b border-white/[0.06]" style={{background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)"}}>
              <div className="flex items-center justify-between px-4 py-2.5">
                <div className="flex items-center gap-3 md:gap-5 min-w-0">
                  <a href="index-react.html" className="flex items-center gap-2 no-underline shrink-0">
                    <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><defs><linearGradient id="tt-ring" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stopColor="#34d399"/><stop offset="100%" stopColor="#67e8f9"/></linearGradient></defs><rect width="48" height="48" rx="11" fill="#000"/><circle cx="24" cy="24" r="17" stroke="url(#tt-ring)" strokeWidth="2.5" fill="none"/><line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/><line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" strokeWidth="1.5" strokeLinecap="round" opacity="0.5"/><line x1="19" y1="18.5" x2="16" y2="15.5" stroke="#636366" strokeWidth="1.2" strokeLinecap="round"/><line x1="24" y1="24" x2="19" y2="18.5" stroke="#636366" strokeWidth="3.5" strokeLinecap="round"/><line x1="29.5" y1="16.5" x2="32" y2="12.9" stroke="#30d158" strokeWidth="1.2" strokeLinecap="round"/><line x1="24" y1="24" x2="29.5" y2="16.5" stroke="#30d158" strokeWidth="4" strokeLinecap="round"/><circle cx="24" cy="24" r="3.2" fill="#30d158"/><circle cx="24" cy="24" r="1.3" fill="#000"/></svg>
                    <span className="text-[14px] md:text-[15px] font-bold text-white hidden sm:inline" style={{letterSpacing:"-0.03em"}}>Timed Trading</span>
                  </a>
                  <div className="hidden md:flex items-center gap-0.5">
                    <a href="index-react.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Analysis</a>
                    <a href="simulation-dashboard.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Trades</a>
                    <a href="system-intelligence.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">System Intelligence</a>
                    <a href="screener.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Screener</a>
                    <a href="ticker-management.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Tickers</a>
                    <a href="trade-autopsy.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#14b8a6]/80 hover:text-[#14b8a6] hover:bg-[#14b8a6]/[0.06] transition-all font-medium">Trade Autopsy</a>
                    {(window.TimedAuthHelpers?.getStoredSession()?.role === "admin" || window.TimedAuthHelpers?.getStoredSession()?.tier === "admin") && (
                      <a href="admin-clients.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#a78bfa]/80 hover:text-[#a78bfa] hover:bg-[#a78bfa]/[0.06] transition-all font-medium">Admin</a>
                    )}
                    <a href="daily-brief.html" id="nav-daily-brief" className="relative px-3 py-1 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium">
                      Daily Brief
                      <span id="brief-badge" className="hidden absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-[#f59e0b]" style={{animation: "pulse-badge 2s ease-in-out infinite"}} />
                    </a>
                  </div>
                </div>
                <div className="flex items-center gap-1.5 md:gap-2 shrink-0">
                  <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
                  {window.TimedNotificationCenter && <window.TimedNotificationCenter apiBase={API_BASE} />}
                  {window.TimedUserBadge && <window.TimedUserBadge user={window.TimedAuthHelpers?.getStoredSession()} compact />}
                  <button onClick={() => setMobileMenuOpen(v => !v)} className="md:hidden p-1.5 rounded-md text-[#6b7280] hover:text-white hover:bg-white/[0.06] transition-all" aria-label="Toggle menu">
                    {mobileMenuOpen ? (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    ) : (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    )}
                  </button>
                </div>
              </div>
              {mobileMenuOpen && (
                <div className="md:hidden border-t border-white/[0.06] px-4 py-2 flex flex-col gap-0.5" style={{background:"rgba(10,10,15,0.98)"}}>
                  <a href="index-react.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all">Analysis</a>
                  <a href="simulation-dashboard.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all">Trades</a>
                  <a href="daily-brief.html" className="px-3 py-2 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] font-medium">Daily Brief</a>
                </div>
              )}
            </nav>

            {/* Main Content */}
            <div className="flex-1 w-full mx-auto px-4 pt-4 pb-20" style={{ maxWidth: 1200 }}>
              {/* Page Header */}
              <div className="flex items-center justify-between mb-5">
                <div>
                  <h1 className="text-lg font-semibold tracking-tight text-white">Trade Alerts</h1>
                  <p className="text-[12px] text-[#4b5563] mt-0.5">Complete history of every entry, trim, defend, and exit signal</p>
                </div>
                {!loading && (
                  <div className="flex items-center gap-3 text-[11px] text-[#6b7280]">
                    <span>{totalCount} total alerts</span>
                  </div>
                )}
              </div>

              {/* Summary Stats */}
              <div className="flex items-center gap-5 mb-5 text-[10px] font-semibold uppercase tracking-widest text-[#374151]">
                <span>Today <span className="text-[#e5e7eb] ml-1 tabular-nums">{todayStats.total}</span></span>
                {todayStats.entries > 0 && <span>Entries <span className="text-[#e5e7eb] ml-1 tabular-nums">{todayStats.entries}</span></span>}
                {todayStats.trims > 0 && <span>Trims <span className="text-[#d4a017] ml-1 tabular-nums">{todayStats.trims}</span></span>}
                {todayStats.defends > 0 && <span>Defends <span className="text-[#7da2c4] ml-1 tabular-nums">{todayStats.defends}</span></span>}
                {todayStats.exits > 0 && <span>Exits <span className="text-[#e5e7eb] ml-1 tabular-nums">{todayStats.exits}</span></span>}
              </div>

              {/* Filter Bar */}
              <div className="sticky top-[53px] z-40 py-3 mb-4 flex items-center gap-3 flex-wrap" style={{ background: "var(--tt-bg-base)" }}>
                <div className="flex items-center gap-1.5">
                  {[null, "ENTRY", "TRIM", "DEFEND", "EXIT"].map(t => (
                    <button key={t || "ALL"} className={`filter-pill ${typeFilter === t ? "active" : ""}`}
                      onClick={() => setTypeFilter(t)}>
                      {t || "All"}
                    </button>
                  ))}
                </div>
                <div className="flex items-center gap-1.5">
                  {[null, "LONG", "SHORT"].map(d => (
                    <button key={d || "ALL_DIR"} className={`filter-pill ${dirFilter === d ? "active" : ""}`}
                      onClick={() => setDirFilter(d)}>
                      {d || "All Directions"}
                    </button>
                  ))}
                </div>
                <div className="relative">
                  <input
                    type="text"
                    placeholder="Search ticker..."
                    value={tickerSearch}
                    onChange={e => setTickerSearch(e.target.value)}
                    onKeyDown={e => { if (e.key === "Enter") handleTickerSearch(); }}
                    className="bg-white/[0.03] border border-white/[0.08] rounded-lg px-3 py-1.5 text-[12px] text-white placeholder-[#4b5563] focus:outline-none focus:border-[#14b8a6]/50 w-36"
                    list="ticker-suggestions"
                  />
                  <datalist id="ticker-suggestions">
                    {uniqueTickers.map(t => <option key={t} value={t} />)}
                  </datalist>
                  {tickerSearch && (
                    <button onClick={() => { setTickerSearch(""); setTimeout(() => fetchAlerts(true), 0); }}
                      className="absolute right-2 top-1/2 -translate-y-1/2 text-[#6b7280] hover:text-white text-xs">✕</button>
                  )}
                </div>
              </div>

              {/* Alert Feed */}
              {loading && alerts.length === 0 ? (
                <SkeletonCards />
              ) : alerts.length === 0 ? (
                <div className="text-center py-20">
                  <p className="text-[13px] text-[#4b5563] font-medium">No trade alerts yet</p>
                  <p className="text-[11px] text-[#374151] mt-1">Alerts appear here as the system enters, manages, and exits trades.</p>
                </div>
              ) : (
                <div>
                  {weekGroups.map(wg => (
                    <WeekAccordion
                      key={wg.key}
                      weekKey={wg.key}
                      weekLabel={wg.label}
                      alerts={wg.alerts}
                      expanded={!!expandedWeeks[wg.key]}
                      onToggle={() => toggleWeek(wg.key)}
                      onTickerClick={handleTickerClick}
                    />
                  ))}
                  {hasMore && (
                    <div className="text-center py-6">
                      <button onClick={() => fetchAlerts(false)}
                        className="px-6 py-2 rounded-lg bg-white/[0.04] border border-white/[0.08] text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.06] transition-all font-medium">
                        {loading ? "Loading..." : `Load More (${totalCount - alerts.length} remaining)`}
                      </button>
                    </div>
                  )}
                </div>
              )}
            </div>

            {/* Right Rail Overlay */}
            {selectedTicker && (
              <div className="fixed inset-0 z-[9000]" onClick={() => setSelectedTicker(null)}>
                <div className="absolute inset-0 bg-black/50" />
                <div className="absolute right-0 top-0 bottom-0 w-full max-w-md" onClick={e => e.stopPropagation()}>
                  <TickerDetailRightRail
                    ticker={{ symbol: selectedTicker, ticker: selectedTicker }}
                    onClose={() => setSelectedTicker(null)}
                    allLoadedData={{}}
                    sectors={{}}
                  />
                </div>
              </div>
            )}

            <footer style={{position:"fixed",bottom:0,left:0,right:0,zIndex:9999,background:"rgba(10,10,15,0.92)",backdropFilter:"blur(6px)",borderTop:"1px solid rgba(255,255,255,0.06)",padding:"6px 16px",textAlign:"center",fontSize:"10px",color:"#6b7280",lineHeight:"1.4"}}>
              For informational and educational purposes only. Not investment advice. Past performance does not guarantee future results. All trading involves risk of loss. <a href="/terms.html" style={{color:"#6b7280",textDecoration:"underline"}}>Full Terms</a> · Market data powered by <a href="https://twelvedata.com" target="_blank" rel="noopener" style={{color:"#6b7280",textDecoration:"underline"}}>Twelve Data</a>
            </footer>
          </div>
        );
      }

      try {
        const rootElement = document.getElementById("root");
        const AuthGate = window.TimedAuthGate;
        const root = ReactDOM.createRoot ? ReactDOM.createRoot(rootElement) : null;
        const app = (
          <AuthGate apiBase={API_BASE} requiredTier="pro">
            {(user) => <App user={user} />}
          </AuthGate>
        );
        if (root) root.render(app);
        else ReactDOM.render(app, rootElement);
      } catch (error) {
        console.error("Error rendering Alerts app:", error);
      }
    </script>
    <script>
      (function() {
        fetch("/timed/daily-brief/badge", { cache: "no-store" })
          .then(r => r.json())
          .then(d => {
            if (d?.badge?.ts) {
              const seen = Number(localStorage.getItem("tt_brief_seen") || 0);
              if (d.badge.ts > seen) {
                const el = document.getElementById("brief-badge");
                if (el) el.classList.remove("hidden");
              }
            }
          })
          .catch(() => {});
      })();
    </script>
  </body>
</html>
