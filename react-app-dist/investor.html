    <style>
      :root {
        /* 2026-06-10 — VERDA MIGRATION (matches today.html exactly).
           Solid Ink/Bark/Moss surfaces (no alpha overlays), single mint
           accent, Manrope display face. Data semantics (--tt-up / --tt-dn)
           keep their green/red meaning — mint is the CTA/brand accent,
           NEVER a "price up" color. See skills/verda-ui-migration.md. */
        --tt-bg-base: var(--vf-ink, #0B1410);
        --tt-bg-surface: var(--vf-bark, #13201A);
        --tt-bg-elev: var(--vf-bark-hi, #1A2B22);
        --tt-border: var(--vf-moss, #1F3128);
        --tt-border-hi: var(--vf-moss-hi, #2A4136);
        --tt-text: var(--vf-cream, #E8F2EC);
        --tt-text-muted: var(--vf-sage, #8AA39A);
        --tt-text-dim: #6E867D;
        --tt-text-faint: #51635A;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: var(--vf-mint, #38F2A1);
        --tt-accent-dim: var(--vf-mint-dim, rgba(56,242,161,0.14));
        --tt-violet: var(--vf-spring, #A6F7CF);
        --tt-violet-dim: rgba(166,247,207,0.12);
        --tt-cyan: var(--vf-spring, #A6F7CF);
        --tt-cyan-dim: rgba(166,247,207,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-display: "Manrope", "Inter", -apple-system, sans-serif;
        --tt-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

        /* Shared ds-* components (ticker cards, chips, rail panels) read
           these tokens from tt-tokens.css — re-point them here so every
           shared component on THIS page picks up the Verda palette. */
        --ds-bg-canvas: var(--vf-ink, #0B1410);
        --ds-bg-surface: var(--vf-bark, #13201A);
        --ds-bg-surface-hi: var(--vf-bark-hi, #1A2B22);
        --ds-bg-glass: rgba(56, 242, 161, 0.035);
        --ds-bg-glass-hi: rgba(56, 242, 161, 0.07);
        --ds-text-display: var(--vf-cream, #E8F2EC);
        --ds-text-body: #CFDED6;
        --ds-text-muted: var(--vf-sage, #8AA39A);
        --ds-text-faint: #51635A;
        --ds-accent: var(--vf-mint, #38F2A1);
        --ds-accent-hi: var(--vf-spring, #A6F7CF);
        --ds-accent-soft: #5BE8AB;
        --ds-accent-dim: rgba(56, 242, 161, 0.14);
        --ds-accent-glow: rgba(56, 242, 161, 0.40);
        --ds-stroke-soft: rgba(166, 247, 207, 0.06);
        --ds-stroke: var(--vf-moss, #1F3128);
        --ds-stroke-hi: var(--vf-moss-hi, #2A4136);
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: var(--vf-radius-md, 18px); }
      .tt-card-pad { padding: 18px 20px 16px; }

      /* Top nav (matches /today + /active-trader) */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
        transition: background 120ms ease, color 120ms ease;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
      }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Page hero — mirrors today.html's .tt-status tier-1 strip:
         eyebrow label + Manrope greeting on a bark surface. */
      .inv-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 16px 18px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
        margin-bottom: 20px;
      }
      .inv-hero h1 { font-family: var(--tt-font-display); font-size: 22px; font-weight: 800; letter-spacing: -0.025em; margin: 0; }
      .inv-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .inv-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; max-width: 720px; }

      /* Account summary strip — small KPI tiles for the Investor account */
      .inv-account-strip {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        padding: 14px 16px;
        margin-bottom: 16px;
      }
      .inv-account-strip__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .inv-account-strip__label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
      }
      .inv-account-strip__link {
        font-size: 11.5px;
        color: var(--tt-cyan);
        text-decoration: none;
        font-weight: 600;
      }
      .inv-account-strip__link:hover { text-decoration: underline; }
      .inv-account-strip__grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 1024px) {
        .inv-account-strip__grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }
      @media (max-width: 540px) {
        .inv-account-strip__grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .inv-account-strip__tile {
        padding: 9px 11px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .inv-account-strip__l {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
      }
      .inv-account-strip__v {
        font-family: var(--tt-font-mono);
        font-size: 16px;
        font-weight: 700;
        color: var(--tt-text);
        line-height: 1.2;
      }
      .inv-account-strip__v.up { color: var(--tt-up-soft); }
      .inv-account-strip__v.dn { color: var(--tt-dn-soft); }
      .inv-account-strip__sub {
        font-size: 11px;
        color: var(--tt-text-dim);
        font-weight: 600;
      }

      /* Investor search + filter row */
      .inv-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .inv-search-wrap {
        position: relative;
        flex: 1 1 320px;
        max-width: 480px;
        display: flex;
        align-items: center;
      }
      .inv-search-icon {
        position: absolute;
        left: 12px;
        color: var(--tt-text-dim);
        pointer-events: none;
      }
      .inv-search {
        width: 100%;
        height: 36px;
        padding: 0 36px 0 36px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        font-family: var(--tt-font);
        font-size: 13px;
        color: var(--tt-text);
        transition: border-color 120ms ease, background 120ms ease;
      }
      .inv-search::placeholder { color: var(--tt-text-faint); }
      .inv-search:focus {
        outline: none;
        border-color: var(--tt-border-hi);
        background: var(--tt-bg-elev);
      }
      .inv-search-clear {
        position: absolute;
        right: 6px;
        width: 24px;
        height: 24px;
        background: transparent;
        border: 0;
        color: var(--tt-text-dim);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        border-radius: 6px;
      }
      .inv-search-clear:hover {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
      }
      .inv-filter-chips {
        display: inline-flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .inv-chip {
        font-family: var(--tt-font);
        font-size: 12px;
        font-weight: 600;
        padding: 6px 12px;
        background: var(--tt-bg-surface);
        color: var(--tt-text-muted);
        border: 1px solid var(--tt-border);
        border-radius: 999px;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
      }
      .inv-chip:hover:not(:disabled) {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
      }
      .inv-chip.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
        border-color: rgba(56,242,161,0.30);
      }
      .inv-chip:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Bubble map row at the bottom of the page — match AT sizing
         + heading typography exactly so the rhythm is consistent
         across the journey pages. */
      .inv-bubble-row { margin-top: 40px; }
      .inv-bubble-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .inv-bubble-legend {
        display: flex;
        gap: 14px;
        font-size: 11.5px;
        color: var(--tt-text-muted);
        flex-wrap: wrap;
        align-items: center;
      }
      .inv-bubble-legend .bdot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
      }
      .inv-bubble-card {
        padding: 0;
        overflow: hidden;
        border-radius: 14px;
      }
      .inv-bubble-stage {
        position: relative;
        height: min(82vh, 900px);
        min-height: 600px;
      }
      @media (max-width: 1024px) {
        .inv-bubble-stage { height: 70vh; min-height: 520px; }
      }
      @media (max-width: 720px) {
        .inv-bubble-stage { height: 70vh; min-height: 460px; }
      }
      .bm-quick-search-overlay {
        position: absolute;
        inset: 0;
        z-index: 20;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(6, 10, 8, 0.45);
        backdrop-filter: blur(2px);
      }
      .bm-quick-search-panel {
        width: min(340px, calc(100% - 32px));
        background: rgba(15, 17, 23, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        box-shadow: 0 24px 48px rgba(0, 0, 0, 0.45);
        padding: 16px;
      }
      .bm-quick-search-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }
      .bm-quick-search-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
      }
      .bm-quick-search-close {
        border: 0;
        background: transparent;
        color: var(--tt-text-faint);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        padding: 0 4px;
      }
      .bm-quick-search-close:hover { color: var(--tt-text); }
      .bm-quick-search-input {
        width: 100%;
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.04);
        color: var(--tt-text);
        font-size: 13px;
      }
      .bm-quick-search-input:focus {
        outline: none;
        border-color: rgba(255, 255, 255, 0.2);
      }
      .bm-quick-search-hint {
        margin-top: 8px;
        font-size: 10px;
        color: var(--tt-text-faint);
      }
      @media (max-width: 720px) {
        .inv-hero { grid-template-columns: 1fr; }
        .inv-hero h1 { font-size: 18px; }
      }

      /* Loading bar */
      .tt-loadbar {
        position: fixed; top: 0; left: 0; right: 0;
        height: 2px;
        background: rgba(56,242,161,0.12);
        z-index: 9000;
        overflow: hidden;
      }
      .tt-loadbar::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--tt-accent), transparent);
        animation: tt-loadbar 1.4s ease-in-out infinite;
      }
      @keyframes tt-loadbar { 0% { left: -30%; } 100% { left: 100%; } }

      /* Skeleton for first paint */
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;
        border-radius: 6px;
      }
      @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      .sk-card { height: 134px; background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: 12px; }
    </style>
