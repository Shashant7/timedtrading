    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <style>
      body { font-family: "Inter", system-ui, sans-serif; background: #0b0e11; color: #e5e7eb; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.04); border-radius: 12px; }
      .badge-good { background: rgba(16,185,129,0.15); color: #6ee7b7; }

      .badge-bad { background: rgba(244,63,94,0.15); color: #fca5a5; }
      .badge-info { background: rgba(56,189,248,0.12); color: #93c5fd; }
      .btn { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; border: none; }

      .tab-inactive { border-bottom: 2px solid transparent; color: #626b7d; cursor: pointer; }

      .meter-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.06); overflow: hidden; }
      .meter-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
      body:not([data-user-role="admin"]) [data-admin-only] { display: none !important; }

  <body>
    <div id="root"></div>
    <script type="text/babel">
const { useState, useEffect, useCallback } = React;
const API_BASE = "";

function NavHeader() {
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
  const UserBadge = window.TimedUserBadge;
  const storedUser = window.TimedAuthHelpers?.getStoredSession();
  return (
    <nav className="sticky top-0 z-50 border-b border-white/[0.06]" style={{background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)"}}>
      <div className="flex items-center justify-between px-4 py-2.5">
        <div className="flex items-center gap-3 md:gap-5 min-w-0">
          <a href="index-react.html" className="flex items-center gap-2 no-underline shrink-0">
            <div className="w-[28px] h-[28px] md:w-[32px] md:h-[32px] rounded-[8px] flex items-center justify-center" style={{background:"linear-gradient(135deg, #00c853, #00e676, #69f0ae)"}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17" />
                <polyline points="16 7 22 7 22 13" />
              </svg>
            </div>
            <span className="text-[14px] md:text-[15px] font-bold text-white hidden sm:inline" style={{letterSpacing:"-0.03em"}}>Timed Trading</span>
          </a>
          <div className="hidden md:flex items-center gap-0.5">
            <a href="index-react.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Analysis</a>
            <a href="simulation-dashboard.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Trades</a>
            <a href="system-intelligence.html" className="px-3 py-1 rounded-md text-[13px] text-white bg-white/[0.07] font-medium">System Intelligence</a>
            <a href="move-discovery.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Move Discovery</a>
            <a href="screener.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Screener</a>
            <a href="ticker-management.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Tickers</a>
            <a href="trade-autopsy.html" className="px-3 py-1 rounded-md text-[13px] text-[#14b8a6]/80 hover:text-[#14b8a6] hover:bg-[#14b8a6]/[0.06] transition-all font-medium">Trade Autopsy</a>
            {(storedUser?.role === 'admin' || storedUser?.tier === 'admin') && (
              <a href="admin-clients.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#a78bfa]/80 hover:text-[#a78bfa] hover:bg-[#a78bfa]/[0.06] transition-all font-medium">Admin</a>
            )}
            <a href="daily-brief.html" id="nav-daily-brief" className="relative px-3 py-1 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium">
              Daily Brief
              <span id="brief-badge" className="hidden absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-[#f59e0b]" style={{animation: "pulse-badge 2s ease-in-out infinite"}} />
            </a>
          </div>
        </div>
        <div className="flex items-center gap-1.5 md:gap-2 shrink-0">
          <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
          <a href="index-react.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
          <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
          <a href="index-react.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#60a5fa] hover:text-[#93bbfc] hover:bg-[#60a5fa]/[0.06] transition-all font-medium">Ask AI</a>
          {window.TimedNotificationCenter && <window.TimedNotificationCenter apiBase="" />}
          {UserBadge && <UserBadge user={storedUser} compact />}
          <button onClick={() => setMobileMenuOpen(v => !v)} className="md:hidden p-1.5 rounded-md text-[#6b7280] hover:text-white hover:bg-white/[0.06] transition-all" aria-label="Toggle menu">
            {mobileMenuOpen ? (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            ) : (
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
            )}
          </button>
        </div>
      </div>
      {mobileMenuOpen && (
        <div className="md:hidden border-t border-white/[0.06] px-4 py-2 flex flex-col gap-0.5" style={{background:"rgba(10,10,15,0.98)"}}>
          <a href="index-react.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Analysis</a>
          <a href="simulation-dashboard.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Trades</a>
          <a href="system-intelligence.html" className="px-3 py-2 rounded-md text-[13px] text-white bg-white/[0.07] font-medium" onClick={() => setMobileMenuOpen(false)}>System Intelligence</a>
          <a href="move-discovery.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Move Discovery</a>
          <a href="screener.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Screener</a>
          <a href="ticker-management.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Tickers</a>
          <a href="trade-autopsy.html" className="px-3 py-2 rounded-md text-[13px] text-[#14b8a6]/80 hover:text-[#14b8a6] font-medium" onClick={() => setMobileMenuOpen(false)}>Trade Autopsy</a>
          {(storedUser?.role === 'admin' || storedUser?.tier === 'admin') && (
            <a href="admin-clients.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#a78bfa]/80 hover:text-[#a78bfa] font-medium" onClick={() => setMobileMenuOpen(false)}>Admin</a>
          )}
          <a href="daily-brief.html" className="px-3 py-2 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium" onClick={() => setMobileMenuOpen(false)}>Daily Brief</a>
          <div className="border-t border-white/[0.06] mt-1 pt-1 flex items-center gap-2">
            <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
            <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
            <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
            <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#60a5fa] hover:text-white hover:bg-white/[0.04] transition-all">Ask AI</a>
            <a href="mailto:support@timed-trading.com" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Contact</a>
          </div>
        </div>
      )}
    </nav>
  );
}

// ── Shared helpers ──
function SQNBadge({ sqn }) {
  if (sqn == null) return null;
  const cls = sqn >= 3 ? "badge-good" : sqn >= 2 ? "badge-info" : sqn >= 1 ? "badge-warn" : "badge-bad";
  const label = sqn >= 3 ? "Excellent" : sqn >= 2 ? "Good" : sqn >= 1 ? "Needs Work" : "Broken";
  return <span className={`inline-block px-2 py-0.5 rounded-full text-[11px] font-semibold ${cls}`}>{sqn.toFixed(2)} — {label}</span>;
}
function DeltaBadge({ value, suffix = "", invert = false }) {
  if (value == null || value === 0) return null;
  const positive = invert ? value < 0 : value > 0;
  return <span className={`text-[10px] font-semibold ml-1.5 ${positive ? "text-emerald-400" : "text-rose-400"}`}>{value > 0 ? "+" : ""}{value}{suffix}</span>;
}
function MetricBox({ label, value, delta, suffix = "", color }) {
  return (
    <div className="card p-3">
      <div className="text-[10px] text-slate-500 uppercase tracking-wide mb-1">{label}</div>
      <div className="flex items-baseline gap-1">
        <span className={`text-lg font-bold ${color || "text-white"}`}>{value ?? "—"}{suffix && <span className="text-xs text-slate-400 ml-0.5">{suffix}</span>}</span>
        <DeltaBadge value={delta} />
      </div>
    </div>
  );
}
function BarChart({ data, maxVal, colorFn }) {
  if (!data || !data.length) return null;
  const max = maxVal || Math.max(...data.map(d => Math.abs(d.value)), 1);
  return (
    <div className="space-y-1">
      {data.map((d, i) => (
        <div key={i} className="flex items-center gap-2">
          <span className="text-[10px] text-slate-400 w-16 shrink-0 text-right">{d.label}</span>
          <div className="flex-1 meter-bar">
            <div className="meter-fill" style={{width:`${Math.min(100, Math.abs(d.value)/max*100)}%`, background: colorFn ? colorFn(d.value) : (d.value >= 0 ? "#10b981" : "#f43f5e")}} />
          </div>
          <span className="text-[10px] text-slate-300 w-10 text-right">{d.value}</span>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TAB: Dashboard
// ═══════════════════════════════════════════════════════════════
function DashboardTab({ dashboard }) {
  if (!dashboard) return <div className="text-slate-500 text-sm py-8 text-center">Loading dashboard...</div>;
  const s = dashboard.summary || {};
  const d = dashboard.delta || {};
  const mh = dashboard.model_health || {};
  const da = dashboard.direction_accuracy || {};
  return (
    <div className="space-y-5">
      {s.generation && (
        <div className="flex items-center gap-3 mb-2">
          <span className="text-xs text-slate-400">Generation <span className="text-white font-bold">#{s.generation}</span></span>
          {s.run_ts && <span className="text-[10px] text-slate-500">{new Date(s.run_ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })}</span>}
          {s.applied && <span className="px-1.5 py-0.5 rounded text-[10px] font-semibold badge-good">Applied</span>}
          <SQNBadge sqn={s.sqn} />
        </div>
      )}

      <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
        <MetricBox label="SQN" value={s.sqn} delta={d.sqn} color={s.sqn >= 2 ? "text-emerald-400" : s.sqn >= 1 ? "text-amber-400" : "text-rose-400"} />
        <MetricBox label="Win Rate" value={s.win_rate} delta={d.win_rate} suffix="%" />
        <MetricBox label="Expectancy" value={s.expectancy} delta={d.expectancy} color={s.expectancy >= 0 ? "text-emerald-400" : "text-rose-400"} />
        <MetricBox label="Avg R" value={s.avg_r} delta={d.avg_r} color={s.avg_r >= 0 ? "text-emerald-400" : "text-rose-400"} />
        <MetricBox label="Trades" value={s.n || s.trade_count} delta={d.trade_count} />
        <MetricBox label="Profit Factor" value={s.profit_factor} />
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        {/* Model Health */}
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-white mb-3">Model Health</h3>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">Predictions (total)</span><span className="text-white font-medium">{mh.predictions?.total ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Open predictions</span><span className="text-white font-medium">{mh.predictions?.open ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Hit rate</span><span className="text-white font-medium">{mh.outcomes?.hitRate ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Active patterns</span><span className="text-white font-medium">{mh.patterns?.active ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Degraded patterns</span><span className={`font-medium ${(mh.patterns?.degraded || 0) > 0 ? "text-rose-400" : "text-white"}`}>{mh.patterns?.degraded ?? "—"}</span></div>
          </div>
        </div>

        {/* Direction Accuracy */}
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-white mb-3">Direction Accuracy</h3>
          <div className="space-y-2 text-xs">
            <div className="flex justify-between"><span className="text-slate-400">Total resolved</span><span className="text-white font-medium">{da.total ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Correct</span><span className="text-emerald-400 font-medium">{da.correct ?? "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Accuracy</span><span className="text-white font-bold">{da.accuracy != null ? da.accuracy + "%" : "—"}</span></div>
            <div className="flex justify-between"><span className="text-slate-400">Wins / Losses</span><span className="text-white font-medium">{da.wins ?? "—"} / {da.losses ?? "—"}</span></div>
          </div>
        </div>
      </div>

      {/* What's working / Proceed with caution */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-emerald-400 mb-3">What's Working</h3>
          {(dashboard.whats_working || []).length === 0 ? (
            <p className="text-xs text-slate-500">No data yet — run a calibration first.</p>
          ) : (
            <div className="space-y-2">
              {dashboard.whats_working[0]?.source === "moves" && (
                <p className="text-[10px] text-slate-500 mb-1">Based on {dashboard.whats_working.reduce((s,p) => s + (p.n||0), 0).toLocaleString()} historical winning moves</p>
              )}
              {dashboard.whats_working.map((p, i) => (
                <div key={i} className="flex items-center justify-between text-xs">
                  <span className="font-mono text-slate-300">{p.path}</span>
                  <div className="flex items-center gap-3">
                    <span className="text-slate-400">{(p.n || 0).toLocaleString()} {p.source === "moves" ? "moves" : "trades"}</span>
                    {p.source === "moves" ? (
                      <span className="text-emerald-400 font-medium">{p.avg_atr ? `${p.avg_atr.toFixed(1)}x ATR` : ""}</span>
                    ) : (
                      <span className="text-emerald-400 font-medium">{p.win_rate}% WR</span>
                    )}
                    <span className="text-white font-medium">{typeof p.expectancy === "number" ? p.expectancy.toFixed(2) : p.expectancy} exp</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
        <div className="card p-4">
          <h3 className="text-sm font-semibold text-amber-400 mb-3">Proceed with Caution</h3>
          {(dashboard.proceed_with_caution || []).length === 0 ? (
            <p className="text-xs text-slate-500">No concerning paths identified.</p>
          ) : (
            <div className="space-y-2">
              {dashboard.proceed_with_caution.map((p, i) => (
                <div key={i} className="flex items-center justify-between text-xs">
                  <span className="font-mono text-slate-300">{p.path}</span>
                  <div className="flex items-center gap-3">
                    <span className="text-slate-400">{(p.n || 0).toLocaleString()} {p.source === "trades" ? "trades" : "trades"}</span>
                    <span className="text-rose-400 font-medium">{p.win_rate}% WR</span>
                    {p.action && <span className={`px-1.5 py-0.5 rounded text-[10px] font-semibold ${p.action === "DISABLE" ? "badge-bad" : "badge-warn"}`}>{p.action}</span>}
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>

      {/* What the Data Shows — winner profiles */}
      {dashboard.profiles && dashboard.profiles.length > 0 && (() => {
        const winners = dashboard.profiles.filter(p => p.profile_type === "winner_move" && p.entry_state !== "ALL").sort((a, b) => (b.sample_count || 0) - (a.sample_count || 0)).slice(0, 5);
        if (!winners.length) return null;
        return (
          <div className="card p-4">
            <h3 className="text-sm font-semibold text-blue-400 mb-1">What the Data Shows</h3>
            <p className="text-[10px] text-slate-500 mb-3">Top winning profiles from historical moves — the conditions present when big moves started</p>
            <div className="space-y-3">
              {winners.map((w, i) => {
                const stateLabel = (w.entry_state || "").replace(/HTF_/g, "").replace(/LTF_/g, "").replace(/_/g, " ");
                return (
                  <div key={i} className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
                    <div className="flex items-center justify-between mb-2">
                      <span className="text-xs font-semibold text-white">{stateLabel}</span>
                      <div className="flex items-center gap-2">
                        <span className="text-[10px] text-slate-400">{w.sample_count} moves</span>
                        <span className="text-[10px] font-semibold text-emerald-400">{w.avg_move_atr}x ATR avg</span>
                      </div>
                    </div>
                    <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 text-[10px]">
                      {w.rank_p50 > 0 && <div><span className="text-slate-500">Rank </span><span className="text-white font-medium">{Math.round(w.rank_p25)}–{Math.round(w.rank_p75)}</span></div>}
                      {w.htf_score_p50 !== 0 && <div><span className="text-slate-500">HTF </span><span className="text-white font-medium">{Math.round(w.htf_score_p25)} to {Math.round(w.htf_score_p75)}</span></div>}
                      {w.completion_p75 > 0 && <div><span className="text-slate-500">Completion </span><span className="text-white font-medium">≤{Math.round(w.completion_p75 * 100)}%</span></div>}
                      {w.vix_p50 > 0 && <div><span className="text-slate-500">VIX </span><span className="text-white font-medium">{w.vix_p25?.toFixed(0)}–{w.vix_p75?.toFixed(0)}</span></div>}
                    </div>
                    {w.top_signals_json && (() => {
                      try {
                        const sigs = typeof w.top_signals_json === "string" ? JSON.parse(w.top_signals_json) : w.top_signals_json;
                        const sigEntries = Object.entries(sigs).filter(([_, v]) => v > 0).sort((a, b) => b[1] - a[1]);
                        if (!sigEntries.length) return null;
                        return <div className="mt-1.5 flex gap-1.5 flex-wrap">{sigEntries.map(([sig, count]) => <span key={sig} className="px-1.5 py-0.5 rounded text-[9px] bg-blue-500/10 text-blue-300">{sig.replace(/_/g, " ")} ({count})</span>)}</div>;
                      } catch { return null; }

        <div><div className="text-[10px] text-slate-500 uppercase">Current</div><div className="text-lg font-bold">{sizing.current_sizing_pct || "5-7%"}</div></div>
      </div>
    </div>
  );
}

function ProfilesCard({ profiles }) {
  if (!profiles) return <div className="card p-5 text-center text-slate-500 text-xs">No profile data. Run calibration to generate winner/loser profiles.</div>;
  const types = ["winner_move", "winner_trade", "loser_trade"];
  const typeLabels = { winner_move: "Winner Moves (Historical)", winner_trade: "Winner Trades", loser_trade: "Loser Trades" };
  const typeColors = { winner_move: "text-blue-400", winner_trade: "text-emerald-400", loser_trade: "text-rose-400" };
  return (
    <div className="space-y-5">
      {types.map(type => {
        const items = (profiles.winner_move && Array.isArray(profiles[type === "winner_move" ? "winner_move" : type === "winner_trade" ? "winner_trade" : "loser_trade"])) 
          ? profiles[type === "winner_move" ? "winner_move" : type === "winner_trade" ? "winner_trade" : "loser_trade"]
          : (Array.isArray(profiles) ? profiles : []).filter(p => p.profile_type === type);
        const filtered = items.filter(p => p.entry_state !== "ALL");
        if (!filtered.length) return null;
        return (
          <div key={type} className="card p-5">
            <h3 className={`text-sm font-semibold mb-3 ${typeColors[type]}`}>{typeLabels[type]}</h3>
            <div className="overflow-x-auto">
              <table className="w-full text-xs"><thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">State</th><th className="text-right px-2 font-medium">N</th>
                <th className="text-right px-2 font-medium">Win%</th><th className="text-right px-2 font-medium">Exp</th>
                <th className="text-right px-2 font-medium">Avg R</th><th className="text-right px-2 font-medium">Rank(p50)</th>
                <th className="text-right px-2 font-medium">HTF(p50)</th><th className="text-right px-2 font-medium">Comp(p75)</th>
                <th className="text-right px-2 font-medium">VIX(p50)</th><th className="text-right px-2 font-medium">ATR</th>
                <th className="text-right pl-2 font-medium">Days</th>
              </tr></thead><tbody>
                {filtered.map((p, i) => (
                  <tr key={i} className="border-b border-white/[0.03]">
                    <td className="py-1.5 font-mono text-slate-300 text-[10px]">{(p.entry_state || "").replace(/HTF_/g, "").replace(/LTF_/g, "")}</td>
                    <td className="text-right px-2">{p.sample_count}</td>
                    <td className={`text-right px-2 ${p.win_rate >= 50 ? "text-emerald-400" : "text-rose-400"}`}>{p.win_rate}%</td>
                    <td className={`text-right px-2 ${(p.expectancy || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{p.expectancy}</td>
                    <td className="text-right px-2">{p.avg_r}</td>
                    <td className="text-right px-2">{p.rank_p50 > 0 ? Math.round(p.rank_p50) : "—"}</td>
                    <td className="text-right px-2">{p.htf_score_p50 ? Math.round(p.htf_score_p50) : "—"}</td>
                    <td className="text-right px-2">{p.completion_p75 > 0 ? Math.round(p.completion_p75 * 100) + "%" : "—"}</td>
                    <td className="text-right px-2">{p.vix_p50 > 0 ? p.vix_p50.toFixed(0) : "—"}</td>
                    <td className="text-right px-2">{p.avg_move_atr || "—"}</td>
                    <td className="text-right pl-2">{p.avg_duration_days || "—"}</td>
                  </tr>
                ))}
              </tbody></table>
            </div>
          </div>
        );
      })}
    </div>
  );
}
function VIXRegimeCard({ vixBuckets }) {
  if (!vixBuckets || !Object.keys(vixBuckets).length) return <div className="card p-5 text-center text-slate-500 text-xs">No VIX regime data. Run calibration with VIX candle data available.</div>;
  const order = ["low", "medium", "high", "extreme"];
  const labels = { low: "Low (<15)", medium: "Medium (15–22)", high: "High (22–30)", extreme: "Extreme (30+)" };
  const colors = { low: "border-emerald-500/30", medium: "border-blue-500/30", high: "border-amber-500/30", extreme: "border-rose-500/30" };
  return (
    <div className="card p-5">
      <h3 className="text-sm font-semibold text-white mb-3">Performance by VIX Regime</h3>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
        {order.filter(b => vixBuckets[b]).map(bucket => {
          const m = vixBuckets[bucket];
          return (
            <div key={bucket} className={`p-4 rounded-lg bg-white/[0.02] border ${colors[bucket]}`}>
              <div className="text-xs font-semibold text-white mb-2">{labels[bucket]}</div>
              <div className="space-y-1 text-xs">
                <div className="flex justify-between"><span className="text-slate-400">Trades</span><span className="text-white font-medium">{m.n || 0}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">Win Rate</span><span className={`font-medium ${(m.win_rate || 0) >= 50 ? "text-emerald-400" : "text-rose-400"}`}>{m.win_rate || 0}%</span></div>
                <div className="flex justify-between"><span className="text-slate-400">Expectancy</span><span className={`font-medium ${(m.expectancy || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{m.expectancy || 0}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">SQN</span><span className="text-white font-medium">{m.sqn?.toFixed(2) || "—"}</span></div>
                <div className="flex justify-between"><span className="text-slate-400">Avg R</span><span className={`font-medium ${(m.avg_r || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{m.avg_r || "—"}</span></div>
              </div>
            </div>
          );
        })}
      </div>
    </div>

}

function AnalysisSummary({ report, recs }) {
  if (!report) return null;
  const o = report.system_health?.overall || {};
  const paths = report.entry_paths || {};
  const sltp = report.sl_tp_calibration || {};
  const wfo = report.wfo_summary || {};

  const sqnGrade = o.sqn >= 7 ? "Holy Grail" : o.sqn >= 5 ? "Excellent" : o.sqn >= 3 ? "Good" : o.sqn >= 1.5 ? "Average" : o.sqn >= 0 ? "Poor" : "Broken";
  const sqnColor = o.sqn >= 3 ? "text-emerald-400" : o.sqn >= 1.5 ? "text-amber-400" : "text-rose-400";

  const sortedPaths = Object.entries(paths).filter(([, v]) => v.n >= 3).sort((a, b) => (b[1].sqn || 0) - (a[1].sqn || 0));
  const bestPaths = sortedPaths.filter(([, v]) => v.profit_factor > 1.2 && v.sqn > 0);
  const worstPaths = sortedPaths.filter(([, v]) => v.profit_factor < 0.8 || v.sqn < -0.5).reverse();

  const classifications = {};
  if (report.trade_classifications) for (const [k, v] of Object.entries(report.trade_classifications)) classifications[k] = v;
  const manualNotes = report.trade_classifications?.manual_notes_for_learning || [];
  const manualNotesCount = manualNotes.length;

  const moveMfe = sltp.move_mfe?.p50;
  const tpTrim = sltp.recommended_tp_trim_atr;
  const slAtr = sltp.recommended_sl_atr;
  const captureRatio = moveMfe && tpTrim ? Math.round((tpTrim / moveMfe) * 100) : null;

  return (
    <div className="card p-5 mb-4 border-l-4 border-blue-500/40">
      <h3 className="text-sm font-semibold text-blue-300 mb-3">Analysis Summary</h3>
      <div className="space-y-3 text-xs text-slate-300 leading-relaxed">
        {/* Overall Grade */}
        <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
          <div className="flex items-center gap-2 mb-1">
            <span className="text-slate-400 font-medium">System Grade:</span>
            <span className={`font-bold ${sqnColor}`}>{sqnGrade} (SQN {o.sqn})</span>
          </div>
          <p className="text-slate-400">
            {o.n} trades analyzed. Win rate {o.win_rate}%, profit factor {o.profit_factor}, expectancy {o.expectancy >= 0 ? "+" : ""}{o.expectancy} per trade.
            {o.sqn < 0 && " The system is currently losing money overall."}
            {o.sqn >= 0 && o.sqn < 1.5 && " The system is near break-even but has no reliable edge yet."}
            {o.sqn >= 1.5 && o.sqn < 3 && " The system has a modest edge but needs improvement for consistency."}
            {o.sqn >= 3 && " The system has a solid, consistent edge."}
            {o.n < 100 && ` Sample size is small (${o.n} trades) — run a full backtest for statistical confidence.`}
          </p>
        </div>

        {/* Walk-Forward */}
        {wfo?.verdict && (
          <div className={`p-3 rounded-lg border ${wfo.verdict === "WARNING" ? "bg-amber-500/5 border-amber-500/20" : wfo.verdict === "FAIL" ? "bg-rose-500/5 border-rose-500/20" : "bg-emerald-500/5 border-emerald-500/20"}`}>
            <span className="font-medium text-slate-400">Walk-Forward Test: </span>
            <span className={wfo.verdict === "PASS" ? "text-emerald-400" : wfo.verdict === "WARNING" ? "text-amber-400" : "text-rose-400"}>{wfo.verdict}</span>
            {wfo.in_sample_sqn != null && wfo.out_sample_sqn != null && (
              <span className="text-slate-400"> — In-sample SQN {wfo.in_sample_sqn}, out-of-sample SQN {wfo.out_sample_sqn}.</span>
            )}
            {wfo.verdict === "WARNING" && <p className="text-slate-400 mt-1">The system performed worse on recent trades than older ones. This suggests the model may not be adapting to current market conditions.</p>}
          </div>
        )}

        {/* Best / Worst Entry States */}
        {(bestPaths.length > 0 || worstPaths.length > 0) && (
          <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
            <div className="font-medium text-slate-400 mb-2">Entry State Performance</div>
            {bestPaths.length > 0 && (
              <div className="mb-2">
                <span className="text-emerald-400 font-medium">Working: </span>
                {bestPaths.map(([state, v]) => (
                  <span key={state} className="inline-block mr-2">
                    <span className="text-slate-300">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span>
                    <span className="text-emerald-400/70 ml-1">({v.n}t, {v.win_rate}% WR, PF {v.profit_factor})</span>
                  </span>
                ))}
              </div>
            )}
            {worstPaths.length > 0 && (
              <div>
                <span className="text-rose-400 font-medium">Losing money: </span>
                {worstPaths.map(([state, v]) => (
                  <span key={state} className="inline-block mr-2">
                    <span className="text-slate-300">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span>
                    <span className="text-rose-400/70 ml-1">({v.n}t, {v.win_rate}% WR, PF {v.profit_factor})</span>
                  </span>
                ))}
                <p className="text-slate-400 mt-1">Consider disabling or heavily filtering entries in these states.</p>
              </div>
            )}
          </div>
        )}

        {/* Manual feedback (Trade Autopsy) */}
        {(classifications.manual_bad_trade_count > 0 || manualNotesCount > 0) && (
          <div className="p-3 rounded-lg bg-teal-500/5 border border-teal-500/20">
            <div className="font-medium text-teal-300 mb-1">Manual feedback (Trade Autopsy)</div>
            <p className="text-slate-400">
              {classifications.manual_bad_trade_count > 0 && <span>{classifications.manual_bad_trade_count} trades tagged as Bad Trade (excluded from metrics). </span>}
              {manualNotesCount > 0 && <span>{manualNotesCount} trades include notes — used alongside classifications for learning and calibration.</span>}
            </p>
            {manualNotesCount > 0 && manualNotes.slice(0, 5).map((row, i) => (
              <div key={row.trade_id || i} className="mt-1.5 pl-2 border-l-2 border-teal-500/30 text-slate-400 text-[11px]">
                <span className="text-slate-300 font-medium">{row.ticker}</span>
                {row.classification && <span className="ml-1 text-teal-400/80">{row.classification}</span>}
                <span className="block text-slate-500 truncate max-w-md" title={row.notes}>{row.notes}</span>
              </div>
            ))}
          </div>
        )}

        {/* Same-ticker repeat trades (re-entries within short window) */}
        {report.same_ticker_repeat_analysis && report.same_ticker_repeat_analysis.cluster_count > 0 && (
          <div className="p-3 rounded-lg bg-amber-500/5 border border-amber-500/20">
            <div className="font-medium text-amber-300 mb-1">Same-ticker repeat trades (within {report.same_ticker_repeat_analysis.window_days} days)</div>
            <p className="text-slate-400 mb-1">
              {report.same_ticker_repeat_analysis.cluster_count} clusters ({report.same_ticker_repeat_analysis.total_trades_in_clusters} trades) — same ticker, same direction, re-entered within a short window. Total P&amp;L from repeats:{" "}
              <span className={report.same_ticker_repeat_analysis.total_pnl_pct_from_repeats >= 0 ? "text-emerald-400" : "text-rose-400"}>
                {report.same_ticker_repeat_analysis.total_pnl_pct_from_repeats >= 0 ? "+" : ""}{report.same_ticker_repeat_analysis.total_pnl_pct_from_repeats}%
              </span>
              {report.same_ticker_repeat_analysis.avg_capture_ratio != null && (
                <span className="text-slate-500"> · Avg capture vs MFE: {(report.same_ticker_repeat_analysis.avg_capture_ratio * 100).toFixed(0)}%</span>
              )}
              {report.same_ticker_repeat_analysis.sl_before_mfe_count > 0 && (
                <span className="text-slate-500"> · SL hit before MFE: {report.same_ticker_repeat_analysis.sl_before_mfe_count} times</span>
              )}
            </p>
            {report.same_ticker_repeat_analysis.interpretation && report.same_ticker_repeat_analysis.interpretation.length > 0 && (
              <ul className="list-disc list-inside text-slate-400 text-[11px] space-y-0.5 mt-1">
                {report.same_ticker_repeat_analysis.interpretation.map((line, i) => (
                  <li key={i}>{line}</li>
                ))}
              </ul>
            )}
            {report.same_ticker_repeat_analysis.clusters && report.same_ticker_repeat_analysis.clusters.length > 0 && (
              <div className="mt-2 text-[10px] text-slate-500">
                Sample: {report.same_ticker_repeat_analysis.clusters.slice(0, 5).map(c => (
                  <span key={`${c.ticker}-${c.direction}-${c.trade_ids?.[0]}`} className="inline-block mr-2">
                    <span className="text-slate-300">{c.ticker}</span> {c.direction} {c.n_trades}t <span className={c.total_pnl_pct >= 0 ? "text-emerald-500" : "text-rose-500"}>{c.total_pnl_pct}%</span> [{c.pattern}]
                  </span>
                ))}
              </div>
            )}
          </div>
        )}

        {/* SL/TP Diagnosis */}
        {slAtr != null && moveMfe != null && (
          <div className="p-3 rounded-lg bg-white/[0.02] border border-white/[0.04]">
            <div className="font-medium text-slate-400 mb-1">Stop Loss &amp; Take Profit</div>
            <p className="text-slate-400">
              Current SL recommendation: <span className="text-white font-medium">{slAtr} ATR</span>.
              Median market move: <span className="text-white font-medium">{moveMfe} ATR</span>.
              {captureRatio && <> TP trim at {tpTrim} ATR captures only <span className={captureRatio < 30 ? "text-rose-400 font-medium" : "text-white"}>{captureRatio}%</span> of the average move.</>}
              {slAtr < 0.5 && " Stops may be too tight — normal price noise is likely triggering exits before the trade has time to work."}
            </p>
          </div>
        )}

        {/* Key Actions */}
        {recs && (
          <div className="p-3 rounded-lg bg-purple-500/5 border border-purple-500/20">
            <div className="font-medium text-purple-300 mb-2">Recommended Actions</div>
            <ul className="space-y-1 text-slate-400">
              {recs.path_adjustments && Object.entries(recs.path_adjustments).filter(([, v]) => v.action === "DISABLE").map(([state]) => (
                <li key={state}>Disable entries in <span className="text-white">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span> — negative expectancy</li>
              ))}
              {Object.entries(paths).filter(([, v]) => v.action === "BOOST" && v.n >= 3).map(([state]) => (
                <li key={state}>Increase allocation to <span className="text-emerald-400">{state.replace(/HTF_|LTF_/g, "").replace(/_/g, " ")}</span> — positive edge</li>
              ))}
              {recs.sl_atr != null && <li>Set stop loss to <span className="text-white">{recs.sl_atr} ATR</span></li>}
              {recs.tp_tiers && <li>TP tiers: trim at <span className="text-white">{recs.tp_tiers.trim}</span>, exit at <span className="text-white">{recs.tp_tiers.exit}</span>, runner at <span className="text-white">{recs.tp_tiers.runner} ATR</span></li>}
              {recs.same_ticker_repeat_recommendation && <li className="text-amber-200/90">Same-ticker repeats: {recs.same_ticker_repeat_recommendation}</li>}
              {report.hindsight_oracle?.recommendations?.map((rec, i) => <li key={`oracle-${i}`}>{rec.message}</li>)}
            </ul>
          </div>
        )}
      </div>
    </div>
  );
}

// DEEP AUDIT TAB
// ═══════════════════════════════════════════════════════════════
function DeepAuditTab() {
  const [audit, setAudit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [applying, setApplying] = useState(false);
  const [appliedMsg, setAppliedMsg] = useState(null);
  const [subTab, setSubTab] = useState("summary");

  const runAudit = async () => {
    setLoading(true); setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/deep-audit?_t=${Date.now()}`, { cache: "no-store" });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "Audit failed");
      setAudit(json);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { runAudit(); }, []);

  const applyTopRecs = async () => {
    if (!audit?.recommendations?.length) return;
    setApplying(true); setAppliedMsg(null);
    try {
      const top3 = audit.recommendations.slice(0, 3);
      const config = {};
      for (const r of top3) { if (r.config) config[r.config.key] = r.config.value; }
      const res = await fetch(`${API_BASE}/timed/admin/model-config`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ updates: Object.entries(config).map(([k, v]) => ({ key: k, value: JSON.stringify(v) })) }),
      });
      const json = await res.json();
      setAppliedMsg(json.ok ? `Applied ${top3.length} recommendations to model_config` : (json.error || "Apply failed"));
    } catch (e) { setAppliedMsg("Error: " + e.message); }
    finally { setApplying(false); }
  };

  const pct = (v) => v != null ? `${v}%` : "—";
  const signPct = (v) => v != null ? (v >= 0 ? `+${v}%` : `${v}%`) : "—";
  const cardCls = "rounded-lg border p-3";
  const cardStyle = (positive) => ({ background: "rgba(255,255,255,0.02)", borderColor: positive ? "rgba(16,185,129,0.2)" : "rgba(239,68,68,0.2)" });

  if (loading) return (
    <div className="flex items-center justify-center py-20">
      <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />
      <span className="ml-3 text-sm text-slate-400">Running deep audit...</span>
    </div>
  );

  if (error) return (
    <div className="p-4 rounded-lg bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm">
      <p className="font-medium">Deep Audit Error</p><p className="mt-1">{error}</p>
      <button className="mt-2 px-3 py-1 rounded bg-rose-500/20 text-xs" onClick={runAudit}>Retry</button>
    </div>
  );

  if (!audit) return <div className="text-center py-10 text-slate-400 text-sm">Click "Run Audit" to start</div>;

  const subTabs = [
    { id: "summary", label: "Executive Summary" },
    { id: "direction", label: "Direction" },
    { id: "exits", label: "Exit Reasons" },
    { id: "tickers", label: "Tickers" },
    { id: "paths", label: "Entry Paths" },
    { id: "time", label: "Time & Hold" },
    { id: "recs", label: `Recommendations (${audit.recommendations?.length || 0})` },
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-base font-semibold text-white">Deep System Audit</h2>
          <p className="text-[11px] text-slate-400">{audit.trade_count} closed trades analyzed at {new Date(audit.generated_at).toLocaleString()}</p>
        </div>
        <div className="flex gap-2">
          <button className="px-3 py-1.5 rounded text-xs font-medium bg-white/5 border border-white/10 text-slate-300 hover:bg-white/10" onClick={runAudit}>Refresh</button>
          {audit.recommendations?.length > 0 && (

            <div>

                    <th className="py-1.5 text-right font-medium">SQN</th>
                  </tr></thead>
                  <tbody>
                    {Object.entries(audit.sector_analysis).sort((a, b) => b[1].n - a[1].n).map(([sec, d]) => (
                      <tr key={sec} className="border-b border-white/[0.03]">
                        <td className="py-1.5 text-white">{sec}</td>
                        <td className="py-1.5 text-right text-slate-300">{d.n}</td>
                        <td className="py-1.5 text-right">{pct(d.win_rate)}</td>
                        <td className={`py-1.5 text-right font-semibold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</td>
                        <td className="py-1.5 text-right text-slate-300">{d.sqn}</td>
                      </tr>
                    ))}

                </table>

            </div>

      )}

      {/* ── Recommendations ── */}
      {subTab === "recs" && (
        <div className="space-y-3">
          {(audit.recommendations || []).length === 0 && <div className="text-sm text-slate-400 text-center py-10">No recommendations generated</div>}
          {(audit.recommendations || []).map((r, i) => (
            <div key={r.id} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor: i < 3 ? "rgba(16,185,129,0.2)" : "rgba(255,255,255,0.06)"}}>
              <div className="flex items-center justify-between mb-1">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-bold text-slate-500">#{i + 1}</span>

    </div>
  );
}
