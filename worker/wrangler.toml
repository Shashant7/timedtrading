name = "timed-trading-ingest"
main = "index.js"
compatibility_date = "2024-01-01"
# 2026-06-10 — decomposition cutover flags (PRICE_FEED_EXTERNAL,
# RESEARCH_SLOTS_EXTERNAL) may still be set via the CF Dashboard;
# keep_vars makes them survive CI deploys (wrangler otherwise wipes any
# var not listed in [vars] on every deploy). ENGINE_EXTERNAL is pinned
# below so the monolith never dual-scores with tt-engine after deploy.
keep_vars = true

# Top-level bindings (used when deploying without --env flag)
[[kv_namespaces]]
binding = "KV_TIMED"
id = "e48593af3ef74bf986b2592909ed40cb"

[[d1_databases]]
binding = "DB"
database_name = "timed-trading-ledger"
database_id = "99fae5d6-98df-4e29-bab5-0665cac7a9ff"

# Durable Object: PriceHub — real-time WebSocket price + scoring push
[[durable_objects.bindings]]
name = "PRICE_HUB"
class_name = "PriceHub"

# Durable Object: AlpacaStream — real-time Alpaca WebSocket price streaming (legacy)
[[durable_objects.bindings]]
name = "ALPACA_STREAM"
class_name = "AlpacaStream"

# Durable Object: PriceStream — TwelveData WebSocket price streaming
[[durable_objects.bindings]]
name = "PRICE_STREAM"
class_name = "PriceStream"

# Durable Object: TradovateStream — futures via Tradovate WebSocket
[[durable_objects.bindings]]
name = "TRADOVATE_STREAM"
class_name = "TradovateStream"

[[durable_objects.bindings]]
name = "BACKTEST_RUNNER"
class_name = "BacktestRunner"

# 2026-06-15 — Foundation Phase 1b: per-shard candle-chain DO (dormant; no cron).
[[durable_objects.bindings]]
name = "CANDLE_CHAIN_SHARD"
class_name = "CandleChainShard"

# Delta One (@DeItaone) X Filtered Stream — push delivery replaces aggressive polling.
[[durable_objects.bindings]]
name = "DELTA_ONE_STREAM"
class_name = "DeltaOneStream"

[[migrations]]
tag = "v1"
new_classes = ["PriceHub"]

[[migrations]]
tag = "v2"
new_classes = ["AlpacaStream"]

[[migrations]]
tag = "v3"
new_classes = ["PriceStream"]

[[migrations]]
tag = "v4"
new_classes = ["BacktestRunner"]

[[migrations]]
tag = "v5"
new_classes = ["TradovateStream"]

[[migrations]]
tag = "v6"
new_sqlite_classes = ["CandleChainShard"]

[[migrations]]
tag = "v7"
new_classes = ["DeltaOneStream"]

[vars]
# ── P2 decomposition Step 3 — tt-engine owns the */5 scoring tail ──
ENGINE_EXTERNAL = "true"
# 2026-05-29 — Cron self-fetch goes through the custom domain to avoid
# Cloudflare's "error code: 1042" block on workers fetching their own
# .workers.dev URL. Investigation: the investor hourly cron was silently
# failing for 15+ days because env.WORKER_URL fell back to the
# .workers.dev fallback, which CF rejects as a self-fetch (verified via
# /timed/admin/investor-cron-debug). Custom domain is treated as a
# separate origin and CF lets the subrequest through.
WORKER_URL = "https://timed-trading.com"
DISCORD_ENABLE = "true"
ALERT_MIN_RR = "1.5"
ALERT_MAX_COMPLETION = "0.4"
ALERT_MAX_PHASE = "0.6"
ALERT_MIN_RANK = "70"
OPENAI_MODEL = "gpt-4o-mini"
DAILY_BRIEF_MODEL = "gpt-5.4"
CORS_ALLOW_ORIGIN = "https://timedtrading.pages.dev,https://timed-trading.com,https://www.timed-trading.com,http://localhost:8788,http://127.0.0.1:8788"
TV_ACK_ALWAYS_200 = "true"
ALPACA_ENABLED = "true"
EXECUTION_MODE = "simulation"
ALPACA_BASE_URL = "https://paper-api.alpaca.markets"
# ── Candle-chain cutover (Phase 2): LTF (10/15/30/60) scored from the chain's
# Alpaca-sourced 5m base via the DO hot-window; 240/D/W/M stay on legacy; both
# fail-safe to legacy per-ticker when the chain isn't complete. Rollback = set
# SCORE_CANDLE_SOURCE back to "legacy". CANDLE_CHAIN_INGEST keeps the DO fresh. ──
CANDLE_CHAIN_INGEST = "1"
SCORE_CANDLE_SOURCE = "hybrid_chain"
# ── Data Provider: "twelvedata" or "alpaca" ──
DATA_PROVIDER = "twelvedata"
TWELVEDATA_PLAN = "pro"
# ── Tradovate WebSocket (futures feed; replaces TV webhook) ──
# Default: disabled. Flip to "true" after adding TRADOVATE_* secrets via
# Cloudflare Dashboard → Workers → Secrets. See P0.7.132 PR description.
TRADOVATE_ENABLED = "false"
TRADOVATE_ENV = "live"
# ── Engine Selection ──
# ENTRY_ENGINE: legacy | tt_core | ripster_core (frozen reference)
# MANAGEMENT_ENGINE: legacy | tt_core | ripster_core (frozen reference)
ENTRY_ENGINE = "tt_core"
MANAGEMENT_ENGINE = "tt_core"
LEADING_LTF = "10"
RIPSTER_TUNE_V2 = "true"
TT_EXIT_DEBOUNCE_BARS = "3"
# V15 P0.7.17 (2026-04-29): gate signal-based exits/management to fire
# only on 30m bar closes in live mode. Empirical 30m vs 10m vs 5m smoke
# comparison (v16-fix1-p716-jul) showed 30m REPLAY produced 4-6x more
# PnL on matching trades because intra-bar 5m/10m wicks tripped exit
# rules prematurely. This makes LIVE behave like the proven 30m
# backtest cadence. Hard exits (SL, max-loss, V13 safety nets) bypass.
# Set to "5" or "10" to revert/test other cadences.
LIVE_MANAGE_INTERVAL_MIN = "30"
CF_ACCESS_TEAM_DOMAIN = "timedtrading"
ADMIN_EMAIL = "shashant@gmail.com"
EMAIL_ENABLED = "true"
EMAIL_FROM = "notifications@timed-trading.com"
# Provenance (Slice A): build identity stamped on every decision_record.
# Placeholder; deploy injects the real short SHA via
# `wrangler deploy --var ENGINE_GIT_SHA:$(git rev-parse --short HEAD)`.
ENGINE_GIT_SHA = "unset"
# ── AI COO (Chief Operating Officer) — self-learning + self-healing ──
# Turned on 2026-06-02. See worker/coo/coo-orchestrator.js. Tier-1
# changes are bounded by the calibration apply BOUNDS/blendVal so
# this can't make destructive moves. Operator gets Discord notification
# on every auto-promote with a 24h undo window via MC.
COO_ENABLED = "true"
COO_AUTO_APPLY_TIER1 = "true"          # auto-apply tier-1 calibration deltas
COO_SELF_HEAL = "true"
UNIVERSE_ONBOARD_HEAL = "true"                 # ledger repair / candle backfill on sanity-sweep fails
COO_SCREENER_AUTO_PROMOTE = "true"     # auto-approve high-conviction screener candidates
COO_SCREENER_AUTO_SCORE = "70"         # min total_score to auto-promote
COO_SCREENER_DAILY_MAX = "3"           # max universe adds per cycle (safety cap)
# ── Broker Bridge (Phase 1, 2026-05-29) ──
# Bridge worker deployed separately at this URL. See [env.production.vars]
# for full notes. The matching secret BROKER_BRIDGE_OPERATOR_KEY must be
# set via `wrangler secret put BROKER_BRIDGE_OPERATOR_KEY`.
BROKER_BRIDGE_URL = "https://tt-broker-bridge.shashant.workers.dev"
# 2026-07-23 — Long Term (investor) auto-rebalance → broker mirror ON.
# Set "false" to pause LT forwards without touching Short Term (trader).
BROKER_INVESTOR_MIRROR_ENABLED = "true"
# 2026-06-01 — Service Binding for direct worker-to-worker dispatch.
# Replaces HTTP fetch to the workers.dev URL above, which was hitting
# Cloudflare's worker-to-worker loop detection and returning a generic
# 404 + 'error code: 1042'. Service Bindings bypass the public edge
# entirely and call the bridge directly — same auth, zero latency,
# no loop detection. Bridge endpoints below now go through
# env.BROKER_BRIDGE.fetch(...) when this binding is present.
[[services]]
binding = "BROKER_BRIDGE"
service = "tt-broker-bridge"
# ── Dynamic Position Sizing (risk-based) ──
# Uncomment and adjust to override defaults:
# SIZING_BASE_RISK_PCT = "0.01"    # 1% of account per trade (baseline)
# SIZING_MIN_RISK_PCT = "0.005"    # 0.5% minimum (low confidence)
# SIZING_MAX_RISK_PCT = "0.02"     # 2% maximum (highest confidence)
# SIZING_MIN_NOTIONAL = "500"      # $500 floor per trade
# SIZING_MAX_NOTIONAL = "8000"     # $8,000 ceiling per trade
# SIZING_VIX_HIGH = "25"           # Scale down above this VIX level
# SIZING_VIX_EXTREME = "35"        # Aggressive scale-down above this VIX level

# Top-level triggers (used when deploying without --env flag)
# Architecture: 3 loops — Price feed, Scoring, Bar fetching
# Times: Sunday 6pm ET = 23:00 UTC, pre-market 4am ET = 09:00 UTC, close 4pm ET = 21:00 UTC
# CF Workers limit: 5 cron triggers per worker.
# Consolidate all schedules into 3 crons; handler uses time-based dispatch.
[triggers]
crons = [
  "*/1 * * * *",    # Every minute: price feed + Alpaca bar ingestion (time-gated in handler)
  "*/5 * * * *",    # Every 5 min: scoring + alerts + AI updates + investor tasks
  "0 * * * *",      # Top of hour: briefs + lifecycle + ML + ETF sync + investor hourly
  "30 * * * *",     # Half-hour: reserved slot (no-op in scheduled handler). Was the calibration queue runner; removed 2026-04 after CPU-limit overruns. Calibration is now operator-triggered via POST /timed/calibration/run or local scripts/calibrate.js. Slot kept so future agents can re-use the schedule without re-registering.
  "0 22 * * *",     # Daily 22:00 UTC: discovery batch — coverage-gaps -> macro -> insider -> news -> promotion-queue rebuild
]

# P1 HOTFIX 2026-05-20 (part 19): the */5 scoring cron has been hitting
# "Exceeded CPU Limit" — observed on 2026-05-19 23:15:05 UTC. Workers
# default to 30s CPU; paid tier supports up to 5 min (300_000 ms).
# This bump gives the scoring + kanban + reconcile path breathing room
# while we work on optimization (move heavy work to ctx.waitUntil,
# batched D1 queries, scoring waves prioritized by open positions).
# A more thoughtful optimization PR follows.
#
# Note: [env.production.limits] is set further down; this top-level
# block covers `wrangler dev` and the no-env deploy target.
[limits]
cpu_ms = 300000

[env.production]
name = "timed-trading-ingest"
main = "index.js"
# keep_vars is per-environment — mirror the top-level setting so dashboard
# cutover flags also survive `wrangler deploy --env production`.
keep_vars = true
# Note: workers.dev subdomains don't need route configuration
# Routes are only needed for custom domains
# The worker is automatically available at: timed-trading-ingest.shashant.workers.dev

[env.production.limits]
cpu_ms = 300000

# KV Namespace binding for production
# IMPORTANT: Configure bindings in wrangler.toml to persist across deployments
# Dashboard bindings are NOT preserved when deploying via wrangler
# 
# To get your KV namespace ID:
# 1. Go to: https://dash.cloudflare.com -> Workers & Pages -> KV
# 2. Click on your namespace (e.g., "TIMED_TRADING_KV")
# 3. Copy the "Namespace ID" (long alphanumeric string)
# 4. Replace "YOUR_KV_NAMESPACE_ID" below with your actual ID
#
[[env.production.kv_namespaces]]
binding = "KV_TIMED"
id = "e48593af3ef74bf986b2592909ed40cb"

# D1 Database binding (for 7-day historical trails)
# Create via: `wrangler d1 create timed_trading_db`
# Then paste the resulting database_id below.
[[env.production.d1_databases]]
binding = "DB"
database_name = "timed-trading-ledger"
database_id = "99fae5d6-98df-4e29-bab5-0665cac7a9ff"

# Durable Object: PriceHub — real-time WebSocket price + scoring push
[[env.production.durable_objects.bindings]]
name = "PRICE_HUB"
class_name = "PriceHub"

# Durable Object: AlpacaStream — real-time Alpaca WebSocket price streaming (legacy)
[[env.production.durable_objects.bindings]]
name = "ALPACA_STREAM"
class_name = "AlpacaStream"

# Durable Object: PriceStream — TwelveData WebSocket price streaming
[[env.production.durable_objects.bindings]]
name = "PRICE_STREAM"
class_name = "PriceStream"

# Durable Object: TradovateStream — futures WebSocket price streaming
# (replacement for fragile TradingView webhook → /timed/heartbeat path).
# Disabled by default: set TRADOVATE_ENABLED="true" + add TRADOVATE_* secrets
# (USERNAME, PASSWORD, APP_ID, APP_VERSION, CID, SEC, DEVICE_ID) to enable.
# See P0.7.132 PR description for setup walkthrough.
[[env.production.durable_objects.bindings]]
name = "TRADOVATE_STREAM"
class_name = "TradovateStream"

[[env.production.durable_objects.bindings]]
name = "BACKTEST_RUNNER"
class_name = "BacktestRunner"

[[env.production.durable_objects.bindings]]
name = "CANDLE_CHAIN_SHARD"
class_name = "CandleChainShard"

[[env.production.durable_objects.bindings]]
name = "DELTA_ONE_STREAM"
class_name = "DeltaOneStream"

# Environment variables (non-sensitive config - stored here for persistence)
# IMPORTANT: Secrets (API keys, webhooks) are NOT stored here for security
# Secrets must be set via Cloudflare Dashboard or `wrangler secret put`
#
# Required Secrets (set via Dashboard or CLI):
# - TIMED_API_KEY: API key for POST /timed/ingest authentication
# - DISCORD_WEBHOOK_URL: Discord webhook URL (#trade-signals — model trades only)
# - DISCORD_GENERAL_WEBHOOK_URL: Discord webhook (#general — briefs, intraday pulse, FSD intel)
# - DISCORD_SYSTEM_WEBHOOK_URL: Discord webhook (#system-alerts — cron/ops noise)
# - DISCORD_CLIENT_ID: Discord OAuth2 Application Client ID (community integration)
# - DISCORD_CLIENT_SECRET: Discord OAuth2 Application Client Secret
# - DISCORD_BOT_TOKEN: Discord Bot token (needs MANAGE_ROLES + guilds.join)
# - DISCORD_GUILD_ID: Discord server (guild) ID for community
# - DISCORD_SUBSCRIBER_ROLE_ID: Role ID to assign to subscribers
# - OPENAI_API_KEY: OpenAI API key for AI Assistant
# - ALPACA_API_KEY_ID: Alpaca Markets API Key ID (broker execution only)
# - ALPACA_API_SECRET_KEY: Alpaca Markets API Secret Key (broker execution only)
# - TWELVEDATA_API_KEY: TwelveData API key (data feed — Pro or Ultra plan)
# - TRADOVATE_USERNAME: Tradovate account username (for futures WS feed)
# - TRADOVATE_PASSWORD: Tradovate account password
# - TRADOVATE_APP_ID: Tradovate API application ID
# - TRADOVATE_APP_VERSION: Tradovate API app version (e.g., "1.0")
# - TRADOVATE_CID: Tradovate API client ID (numeric)
# - TRADOVATE_SEC: Tradovate API client secret
# - TRADOVATE_DEVICE_ID: Stable identifier for this worker instance (any unique string,
#                       defaults to "timed-trading-cf-worker" if unset)
# - FINNHUB_API_KEY: Finnhub API key for earnings, economic calendar, and news (Daily Brief)
# - X_API_BEARER_TOKEN: X API v2 app-only Bearer for curated wire-account ingest (x-wire-tracker)
# - X_DELTA_ONE_STREAM_ENABLED: "true" (default) — Filtered Stream DO for @DeItaone; set "false" to poll-only
# - SENDGRID_API_KEY: SendGrid API key for outbound emails
# - EMAIL_HMAC_SECRET: HMAC secret for unsubscribe token signing
# - STRIPE_SECRET_KEY: Stripe API secret key
# - STRIPE_WEBHOOK_SECRET: Stripe webhook signing secret
#
# Environment Variables (non-sensitive - stored in wrangler.toml):
# Required Secrets for Cloudflare Access (set via `wrangler secret put --env production`):
# - CF_ACCESS_AUD: Application Audience (AUD) tag from Zero Trust dashboard
#
# Non-sensitive Access config (stored here):
# CF_ACCESS_TEAM_DOMAIN: Your Cloudflare Zero Trust team domain (e.g., "myteam")
# ADMIN_EMAIL: Email address of the admin user (auto-promoted to admin role)

[env.production.vars]
# ── P2 decomposition Step 3 — tt-engine owns the */5 scoring tail ──
ENGINE_EXTERNAL = "true"
# 2026-05-29 — see top-level [vars] WORKER_URL comment.
WORKER_URL = "https://timed-trading.com"
DISCORD_ENABLE = "true"
ALERT_MIN_RR = "1.5"
ALERT_MAX_COMPLETION = "0.4"
ALERT_MAX_PHASE = "0.6"
ALERT_MIN_RANK = "70"
OPENAI_MODEL = "gpt-4o-mini"
DAILY_BRIEF_MODEL = "gpt-5.4"
CORS_ALLOW_ORIGIN = "https://timedtrading.pages.dev,https://timed-trading.com,https://www.timed-trading.com"
TV_ACK_ALWAYS_200 = "true"
ALPACA_ENABLED = "true"
EXECUTION_MODE = "simulation"
ALPACA_BASE_URL = "https://paper-api.alpaca.markets"
# ── Candle-chain cutover (Phase 2): LTF from the chain's Alpaca-sourced 5m base
# via the DO hot-window; 240/D/W/M stay legacy; fail-safe to legacy per-ticker.
# Rollback = SCORE_CANDLE_SOURCE="legacy". ──
CANDLE_CHAIN_INGEST = "1"
SCORE_CANDLE_SOURCE = "hybrid_chain"
# ── Data Provider: "twelvedata" or "alpaca" ──
DATA_PROVIDER = "twelvedata"
TWELVEDATA_PLAN = "pro"
# ── Tradovate WebSocket (futures feed) ──
TRADOVATE_ENABLED = "false"
TRADOVATE_ENV = "live"
# ── Engine Selection ──
ENTRY_ENGINE = "tt_core"
MANAGEMENT_ENGINE = "tt_core"
LEADING_LTF = "10"
RIPSTER_TUNE_V2 = "true"
TT_EXIT_DEBOUNCE_BARS = "3"
LIVE_MANAGE_INTERVAL_MIN = "30"
# Cloudflare Access — user auth via Google SSO / One-time PIN
CF_ACCESS_TEAM_DOMAIN = "timedtrading"
ADMIN_EMAIL = "shashant@gmail.com"
EMAIL_ENABLED = "true"
EMAIL_FROM = "notifications@timed-trading.com"
# ── AI COO — mirror of top-level [vars] block (2026-06-02) ──
COO_ENABLED = "true"
COO_AUTO_APPLY_TIER1 = "true"
COO_SELF_HEAL = "true"
UNIVERSE_ONBOARD_HEAL = "true"
COO_SCREENER_AUTO_PROMOTE = "true"
COO_SCREENER_AUTO_SCORE = "70"
COO_SCREENER_DAILY_MAX = "3"
# Shadow setup_events ledger — append on */5 scoring tick (tt-engine) + admin backfill
SETUP_EVENTS_WRITE = "1"
SETUP_TRAIL_SNAPSHOT = "1"
SETUP_SHADOW_STAMP = "1"
# ── Broker Bridge (Phase 1, 2026-05-29) ──
# The bridge worker (`worker-bridge/`) is deployed separately at this URL.
# Mission Control proxies its /bridge/status, /bridge/audit, /bridge/recent
# endpoints through the main worker so the operator UI sees one origin.
# Without these vars set, Mission Control shows "NOT DEPLOYED" even though
# the bridge worker itself is up. The matching secret
# BROKER_BRIDGE_OPERATOR_KEY must be set separately via
# `wrangler secret put BROKER_BRIDGE_OPERATOR_KEY --env production`.
BROKER_BRIDGE_URL = "https://tt-broker-bridge.shashant.workers.dev"
# 2026-07-23 — Long Term (investor) auto-rebalance → broker mirror ON.
BROKER_INVESTOR_MIRROR_ENABLED = "true"
# ── Options shadow calibration (2026-07-08) — ranked long call/put on entry alerts ──
OPTIONS_SHADOW_MODE = "1"
OPTIONS_SHADOW_FETCH_CHAIN = "1"
OPTIONS_DEFAULT_PROFILE = "speculator"
OPTIONS_ACCOUNT_VALUE = "100000"
# GitHub Actions screener dispatch (tvscreener path). GITHUB_TOKEN is a secret.
GITHUB_REPO = "Shashant7/timedtrading"
# 2026-06-01 — Mirror Service Binding in production. Same rationale
# as the top-level [[services]] block above — bypass worker-to-worker
# loop detection (CF error 1042).
[[env.production.services]]
binding = "BROKER_BRIDGE"
service = "tt-broker-bridge"

# Scheduled triggers — mirrors top-level [triggers] above
[env.production.triggers]
crons = [
  "*/1 * * * *",
  "*/5 * * * *",
  "0 * * * *",
  "30 * * * *",
  "0 22 * * *",     # Daily 22:00 UTC: discovery batch (mirror of top-level)
]

# ─────────────────────────────────────────────────────────────────────
# PRE-PRODUCTION ENVIRONMENT (Phase 3.7 — 2026-05-09)
#
# Isolated environment for destructive backtests, calibration testing,
# and schema migration validation. Has its OWN D1 database + KV
# namespace so anything we do here never touches live trader state.
#
# IMPORTANT — pre-prod has NO crons. The live cron logic depends on
# fresh ingest data which only exists in production. Pre-prod is
# request-driven only (replay endpoints, admin endpoints). This
# matches the "additive backtest" semantics — you push trades into
# pre-prod via replay, never via auto-ingest.
#
# Deploy: `npm run deploy:preprod` or
#         `cd worker && wrangler deploy --env=preprod`
# URL:    https://timed-trading-ingest-preprod.shashant.workers.dev
#
# Initial data clone is one-time via `scripts/clone-live-to-preprod.sh`
# which exports model_config + KV state from live and imports into
# preprod. Trade data (trades, account_ledger, investor_positions)
# starts EMPTY on preprod by design — backtest replays populate it.
# ─────────────────────────────────────────────────────────────────────
[env.preprod]
name = "timed-trading-ingest-preprod"
main = "index.js"

# KV namespace (created 2026-05-09 via wrangler kv namespace create)
[[env.preprod.kv_namespaces]]
binding = "KV_TIMED"
id = "246f397779e44e6bb8853585b74200ff"

# D1 database — replace database_id below with the value returned by:
#   wrangler d1 create timed-trading-ledger-preprod
# (or whichever name you choose in the Cloudflare dashboard).
[[env.preprod.d1_databases]]
binding = "DB"
database_name = "timed-trading-ledger-preprod"
database_id = "85a9ee08-3e3f-4a73-bb8c-8cd947e9b765"

# Durable Objects — same classes, separate instances per env.
[[env.preprod.durable_objects.bindings]]
name = "PRICE_HUB"
class_name = "PriceHub"

[[env.preprod.durable_objects.bindings]]
name = "ALPACA_STREAM"
class_name = "AlpacaStream"

[[env.preprod.durable_objects.bindings]]
name = "PRICE_STREAM"
class_name = "PriceStream"

[[env.preprod.durable_objects.bindings]]
name = "TRADOVATE_STREAM"
class_name = "TradovateStream"

[[env.preprod.durable_objects.bindings]]
name = "BACKTEST_RUNNER"
class_name = "BacktestRunner"

[[env.preprod.durable_objects.bindings]]
name = "CANDLE_CHAIN_SHARD"
class_name = "CandleChainShard"

[[env.preprod.durable_objects.bindings]]
name = "DELTA_ONE_STREAM"
class_name = "DeltaOneStream"

# Vars — mirror production EXCEPT:
#   - EXECUTION_MODE forced to "simulation" (no real broker calls ever)
#   - DISCORD_ENABLE off (no spam to live channels from preprod)
#   - EMAIL_ENABLED off (no outbound from preprod)
#   - DAILY_BRIEF_MODEL set to a smaller model to save tokens
[env.preprod.vars]
DISCORD_ENABLE = "false"
EMAIL_ENABLED = "false"
ALERT_MIN_RR = "1.5"
ALERT_MAX_COMPLETION = "0.4"
ALERT_MAX_PHASE = "0.6"
ALERT_MIN_RANK = "70"
OPENAI_MODEL = "gpt-4o-mini"
DAILY_BRIEF_MODEL = "gpt-4o-mini"
CORS_ALLOW_ORIGIN = "https://timedtrading.pages.dev,https://timed-trading.com,https://www.timed-trading.com,http://localhost:8788,http://127.0.0.1:8788"
TV_ACK_ALWAYS_200 = "true"
ALPACA_ENABLED = "false"
EXECUTION_MODE = "simulation"
ALPACA_BASE_URL = "https://paper-api.alpaca.markets"
DATA_PROVIDER = "twelvedata"
TWELVEDATA_PLAN = "pro"
ENTRY_ENGINE = "tt_core"
MANAGEMENT_ENGINE = "tt_core"
LEADING_LTF = "10"
RIPSTER_TUNE_V2 = "true"
TT_EXIT_DEBOUNCE_BARS = "3"
LIVE_MANAGE_INTERVAL_MIN = "30"
CF_ACCESS_TEAM_DOMAIN = "timedtrading"
ADMIN_EMAIL = "shashant@gmail.com"
EMAIL_FROM = "notifications@timed-trading.com"
# Pre-prod marker — the worker can read this to add a banner /
# disclaimer in any UI surface to make it impossible to confuse
# pre-prod data for live.
ENVIRONMENT_LABEL = "preprod"
# Shadow setup_events ledger writes (admin backfill + rescore paths)
SETUP_EVENTS_WRITE = "1"
SETUP_TRAIL_SNAPSHOT = "1"
SETUP_SHADOW_STAMP = "1"
SETUP_GATE_SHADOW = "1"

# Pre-prod has NO scheduled crons. Backtest replays drive all
# activity. Empty crons array EXPLICITLY overrides the top-level
# [triggers] block (which wrangler would otherwise inherit).
[env.preprod.triggers]
crons = []

