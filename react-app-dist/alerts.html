    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.02);
        --tt-bg-elevated: rgba(255,255,255,0.035);
        --tt-bg-hover: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.04);
        --tt-border-strong: rgba(255,255,255,0.08);
        --tt-text: #e5e7eb;
        --tt-text-muted: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-accent: #00c853;
        --tt-accent-dim: rgba(0, 200, 83, 0.12);
        --tt-negative: #ff5252;
        --tt-negative-dim: rgba(255, 82, 82, 0.12);
        --tt-radius: 12px;
        --tt-radius-sm: 8px;
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
      }
      body:not([data-user-role="admin"]) a[data-admin-only] { display: none !important; }

      .alert-card {
        background: transparent;
        border-bottom: 1px solid rgba(255,255,255,0.04);
        padding: 12px 0;
        transition: background 0.12s;
      }
      .alert-card:hover { background: rgba(255,255,255,0.015); }
      .alert-card:last-child { border-bottom: none; }

      .week-header {
        background: transparent;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        cursor: pointer;
        transition: background 0.12s;
      }
      .week-header:hover { background: rgba(255,255,255,0.02); }

      .badge {
        display: inline-flex; align-items: center;
        padding: 1px 6px; border-radius: 3px;
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.06em; text-transform: uppercase;
      }
      .badge-entry { background: rgba(255,255,255,0.06); color: #e5e7eb; }
      .badge-trim { background: rgba(255,255,255,0.06); color: #d4a017; }
      .badge-defend { background: rgba(255,255,255,0.06); color: #7da2c4; }
      .badge-exit-win { background: rgba(34,197,94,0.08); color: #4ade80; }
      .badge-exit-loss { background: rgba(239,68,68,0.08); color: #f87171; }
      .badge-long { background: transparent; color: #4ade80; }
      .badge-short { background: transparent; color: #f87171; }

      .filter-pill {
        padding: 5px 14px; border-radius: 4px; font-size: 11px; font-weight: 600;
        letter-spacing: 0.03em; text-transform: uppercase;
        border: 1px solid rgba(255,255,255,0.06); background: transparent; color: #4b5563;
        cursor: pointer; transition: all 0.12s;
      }
      .filter-pill:hover { border-color: rgba(255,255,255,0.12); color: #9ca3af; }
      .filter-pill.active { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.15); color: #e5e7eb; }

      .skeleton { background: linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.04) 50%, rgba(255,255,255,0.02) 75%); background-size: 200% 100%; animation: shimmer 1.8s infinite; border-radius: 2px; }
      @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

      .ticker-link { cursor: pointer; font-weight: 600; letter-spacing: -0.01em; transition: opacity 0.12s; }
      .ticker-link:hover { opacity: 0.7; }

      .type-dot { width: 6px; height: 6px; border-radius: 1px; flex-shrink: 0; }
    </style>

  <body>
    <div id="root"></div>
    <script src="alerts.compiled.697ea70572.js"></script>
    <script>
      (function() {
        fetch("/timed/daily-brief/badge", { cache: "no-store" })
          .then(r => r.json())
          .then(d => {
            if (d?.badge?.ts) {
              const seen = Number(localStorage.getItem("tt_brief_seen") || 0);
              if (d.badge.ts > seen) {
                const el = document.getElementById("brief-badge");
                if (el) el.classList.remove("hidden");
              }
            }
          })
          .catch(() => {});
      })();
    </script>
  </body>
