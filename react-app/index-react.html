    <!-- PropTypes for Recharts compatibility (React 18 doesn't include it) -->
    <script
      crossorigin
      src="https://unpkg.com/prop-types@15/prop-types.min.js"
      onerror="console.error('Failed to load PropTypes')"
    ></script>
    <script>
      // Make PropTypes available globally for Recharts
      if (typeof PropTypes === "undefined" && typeof window !== "undefined") {
        console.warn("PropTypes not loaded, Recharts may have issues");
      } else if (typeof PropTypes !== "undefined") {
        // Ensure React.PropTypes is available for older libraries
        if (typeof React !== "undefined" && !React.PropTypes) {
          React.PropTypes = PropTypes;
        }
      }
    </script>
<!-- Tailwind CSS -->
    <script
      src="https://cdn.tailwindcss.com"
      onerror="console.error('Failed to load Tailwind')"
    ></script>

    <!-- Recharts for lightweight charting - try multiple sources -->
    <script
      src="https://unpkg.com/recharts@2.10.3/umd/Recharts.js"
      onerror="
        console.error(
          'Failed to load Recharts from unpkg, trying alternative...',
        );
        loadRechartsFallback();
      "
    ></script>
    <script>
      function loadRechartsFallback() {
        // Try alternative CDN
        const script = document.createElement("script");
        script.src =
          "https://cdn.jsdelivr.net/npm/recharts@2.10.3/umd/Recharts.js";
        script.onerror = function () {
          console.error("Recharts failed to load from all sources");
          window.RechartsFailed = true;
        };
        script.onload = function () {
          debugLog("Recharts loaded from jsdelivr");
        };
        document.head.appendChild(script);
      }

      // Check if Recharts loaded after a delay
      window.addEventListener("load", function () {
        setTimeout(function () {
          if (typeof Recharts === "undefined" && !window.RechartsFailed) {
            console.warn("Recharts may not have loaded yet");
          }
        }, 2000);
      });
    </script>

    <!-- Loading indicator while scripts load -->
    <script>
      window.addEventListener("load", function () {
        // Check if all scripts loaded
        setTimeout(function () {
          const root = document.getElementById("root");
          if (root && root.innerHTML === "") {
            if (typeof React === "undefined") {
              root.innerHTML =
                '<div style="padding: 40px; text-align: center; color: #f0f2f5;"><h2 style="color: #e11d48;">Loading Error</h2><p>React failed to load. Check console (F12) for details.</p></div>';
            }
          }
        }, 2000);
      });
    </script>

    <style>
      /* Trade Tracker palette — Robinhood-inspired dark (v3) */
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.02);
        --tt-bg-elevated: rgba(255,255,255,0.035);
        --tt-bg-hover: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.04);
        --tt-border-strong: rgba(255,255,255,0.08);
        --tt-text: #e5e7eb;
        --tt-text-muted: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-accent: #14b8a6;
        --tt-accent-dim: rgba(20, 184, 166, 0.12);
        --tt-negative: #e11d48;
        --tt-negative-dim: rgba(225, 29, 72, 0.12);
        --tt-radius: 12px;
        --tt-radius-sm: 8px;
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-shadow-sm: 0 1px 2px rgba(0,0,0,0.15);
        --tt-shadow-md: 0 2px 8px rgba(0,0,0,0.12);
        --tt-shadow-lg: 0 4px 16px rgba(0,0,0,0.15);
        /* Aliases for existing usage */
        --bg: var(--tt-bg-base);
        --card: var(--tt-bg-surface);
        --text: var(--tt-text);
        --muted: var(--tt-text-muted);
        --line: var(--tt-border);
        --good: var(--tt-accent);
        --bad: var(--tt-negative);
      }

      body {
        margin: 0;
        font-family: var(--tt-font);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.01em;
      }

      /* Fix rare font ligature rendering issues (e.g., missing “r” in “tr”). */
      .no-ligatures {
        font-variant-ligatures: none;
        font-feature-settings:
          "liga" 0,
          "clig" 0,
          "calt" 0;
      }

      .slider-thumb::-webkit-slider-thumb {
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--tt-accent);
        cursor: pointer;
        box-shadow: 0 0 8px var(--tt-accent-dim);
      }

      .slider-thumb::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--tt-accent);
        cursor: pointer;
        border: none;
        box-shadow: 0 0 8px var(--tt-accent-dim);
      }

      /* Investor panel stage badges */
      .stage-badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
      .stage-accumulate { background: rgba(255,255,255,0.04); color: #e5e7eb; }
      .stage-core_hold { background: rgba(255,255,255,0.04); color: #9ca3af; }
      .stage-watch { background: rgba(255,255,255,0.03); color: #6b7280; }
      .stage-reduce { background: rgba(255,255,255,0.03); color: #6b7280; }
      .stage-research { background: rgba(255,255,255,0.03); color: #6b7280; }
      .stage-exited { background: rgba(255,255,255,0.02); color: #4b5563; }
      .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
      .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }

      .loading-spinner {
        width: 28px;
        height: 28px;
        position: relative;
        display: inline-block;
        will-change: transform;
      }
      .loading-spinner::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2.5px solid rgba(0,200,83,0.12);
        border-top-color: #00c853;
        animation: tt-spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      .loading-spinner::after {
        content: "";
        position: absolute;
        inset: 5px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: rgba(0,200,83,0.4);
        animation: tt-spin 1.4s cubic-bezier(0.4, 0, 0.2, 1) infinite reverse;
      }
      .loading-spinner-sm { width: 16px; height: 16px; }
      .loading-spinner-lg { width: 40px; height: 40px; }
      @keyframes tt-spin {
        to { transform: rotate(360deg); }
      }

      /* ─────────────────────────────────────────────────────────────────
         V15 P0.7.78 — Ticker Workspace layout (≥1024px desktop only).
         At ≥1024px, the ticker overlay expands to full viewport and the
         inner rail switches to a CSS Grid two-pane layout:
           [ HEADER...full width ]
           [ LEFT pane | RIGHT pane ]
         Left = chart + key levels (own scroll). Right = tab nav + tab
         content (own scroll). Below 1024px: existing slide-in modal.

         Note: this lives at top level (NOT inside @media (max-width:768px))
         so the >=1024px rules actually match. The earlier P0.7.76/77
         attempt put these rules inside the mobile-only block by mistake
         and they never applied.
         ───────────────────────────────────────────────────────────────── */
      @media (min-width: 1024px) {
        .tt-ticker-workspace-mount {
          /* V15 P0.7.79: leave existing top-[60px] sm:top-[52px] in place
             so the workspace starts BELOW the main app nav. Previously
             top:0 hid the rail's own sticky header (with the ✕ close
             button) behind the main nav, leaving users stuck. */
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100% !important;
          max-width: none !important;
          border-left: none !important;
          border-radius: 0 !important;
          box-shadow: none !important;
        }
      }
      .tt-rail-shell--workspace {
        display: grid !important;
        grid-template-columns: 1fr 460px;
        grid-template-rows: auto 1fr;
        grid-template-areas:
          "header header"
          "left   right";
        height: 100%; /* fill the mount; mount is positioned below nav */
        max-height: 100%;
        overflow: hidden;
        flex-direction: unset !important; /* override .flex.flex-col */
      }
      .tt-rail-shell--workspace > .tt-rail-area-header {
        grid-area: header;
        position: relative;
        z-index: 5;
      }
      .tt-rail-shell--workspace > .tt-rail-area-left-pane {
        grid-area: left;
        overflow-y: auto;
        padding: var(--ds-space-3); /* P0.7.100-r2: slightly tighter than space-4 */
        border-right: 1px solid var(--ds-stroke);
        min-width: 0;
      }
      .tt-rail-shell--workspace > .tt-rail-area-right-pane {
        grid-area: right;
        overflow-y: auto;
        min-width: 0;
      }
      /* Chart canvas height by breakpoint. Stable via CSS so the JSX
         does not re-evaluate window.innerWidth on every render.
         V15 P0.7.99 — sizes bumped now that Key Levels has been moved
         out of the left pane into the Setup tab.
         V15 P0.7.100-r2 — REVERT flex-fill (caused a ResizeObserver
         feedback loop where chart.applyOptions({height}) triggered the
         observer to fire again). Use a much larger viewport-based
         height instead — bigger than P0.7.99 but stable. */
      .tt-rail-chart-canvas {
        height: 240px;
      }
      @media (min-width: 1024px) {
        .tt-rail-chart-canvas { height: 380px; }
      }
      /* P0.7.102 — calc bumped to account for the rail's own footer
         (Open in TradingView, ~50px), the legal footer (~30px), and
         the chart's internal OHLC header + status bar (~45px) on top
         of the previous chrome stack. Total now ~340px so the time-
         axis labels at the bottom of the chart are always visible. */
      .tt-rail-shell--workspace .tt-rail-chart-canvas {
        height: calc(100vh - 340px) !important;
        max-height: 980px;
        min-height: 380px;
      }
      /* V15 P0.7.86 — Activity Feed drawer.
         Hidden on mobile/tablet (<1024px) — too narrow to dock a 300px
         strip without crowding the kanban / bubble map. Visible on
         desktop only. The drawer also self-hides when the right rail
         opens (via the React `selectedTicker` check inside the
         component). The drawer is `position: fixed` so it overlays
         content rather than pushing it; on a 1280px+ screen this still
         leaves ~980px of usable content width. */
      @media (max-width: 1023px) {
        .tt-activity-drawer { display: none !important; }
      }

      /* Modal mode (mobile/tablet < 1024px): left/right wrappers are
         transparent and children flow. Per user request (V15 P0.7.85),
         we use flex order to place tab content FIRST and chart+levels
         at the BOTTOM so the active tab is what reads first on a phone.
         Only applies when the workspace class is NOT on the shell. */
      .tt-rail-shell:not(.tt-rail-shell--workspace) {
        display: flex;
        flex-direction: column;
      }
      .tt-rail-shell:not(.tt-rail-shell--workspace) > .tt-rail-area-header { order: 0; flex: 0 0 auto; }
      .tt-rail-shell:not(.tt-rail-shell--workspace) > .tt-rail-area-right-pane { order: 1; flex: 1 1 auto; }
      .tt-rail-shell:not(.tt-rail-shell--workspace) > .tt-rail-area-left-pane { order: 2; flex: 0 0 auto; }
      .tt-rail-area-left-pane,
      .tt-rail-area-right-pane {
        display: block;
      }
      /* V15 P0.7.87 (per user): on mobile / narrow tablet (<1024px) hide
         the chart + levels left pane entirely. The user still couldn't
         see tab content with the left pane consuming so much vertical
         space. The chart + levels are still available on the desktop
         workspace mode where the side-by-side layout makes them useful. */
      @media (max-width: 1023px) {
        .tt-rail-shell:not(.tt-rail-shell--workspace) > .tt-rail-area-left-pane {
          display: none !important;
        }
      }
      /* V15 P0.7.160 — Mobile chart view toggle (DEPRECATED).
         Replaced by P0.7.161 CHART tab. Kept as a graceful fallback. */
      @media (max-width: 1023px) {
        .tt-rail-shell.tt-rail-chart-active:not(.tt-rail-shell--workspace) > .tt-rail-area-left-pane {
          display: flex !important;
          flex-direction: column;
          flex: 1 1 auto;
          overflow-y: auto;
        }
        .tt-rail-shell.tt-rail-chart-active:not(.tt-rail-shell--workspace) > .tt-rail-area-right-pane {
          display: none !important;
        }
        .tt-rail-chart-back-bar { display: none !important; }
      }
      @media (max-width: 1023px) {
        .tt-rail-chart-active .tt-rail-chart-back-bar {
          display: flex !important;
        }
      }
      /* V15 P0.7.162 (2026-05-14) — CHART tab full-height + static.
         P0.7.171 (2026-05-15) — Aggressive sizing. Per user feedback
         "Chart View itself is tiny and should be the full height and
         width" — the chart canvas now claims 100% of its flex parent
         (the chart-tab body), and the parent claims 100% of the right
         pane (which is itself flex:1 within the rail body). End result:
         on mobile, chart = rail height - sticky header (~80px) - tab
         nav (~40px) - TF chip row (~32px) - rail body padding (~20px)
         = ~vh-180. Significantly larger than the previous 240px. */
      .tt-rail-chart-tab-canvas {
        height: 100% !important;
        min-height: 320px;
        flex: 1 1 0 !important;
        width: 100%;
      }
      @media (min-width: 1024px) {
        .tt-rail-chart-tab-canvas { min-height: 480px; }
      }
      .tt-rail-body--chart {
        overflow: hidden !important;
        height: 100%;
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      .bubble-g { transition: filter 0.15s ease-out; }
      .bubble-g:hover { filter: brightness(1.3) drop-shadow(0 0 6px rgba(255,255,255,0.2)); }
      @keyframes pulse-badge {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.15); }
      }
      @keyframes coachmark-pulse {
        0%, 100% { box-shadow: 0 0 20px rgba(52, 211, 153, 0.2), inset 0 0 20px rgba(52, 211, 153, 0.05); }
        50% { box-shadow: 0 0 30px rgba(52, 211, 153, 0.35), inset 0 0 30px rgba(52, 211, 153, 0.1); }
      }
      @keyframes coachmark-slide-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .prime-glow {
        box-shadow: 0 0 12px var(--tt-accent-dim);
        animation: pulse-glow 2s ease-in-out infinite;
      }

      @keyframes pulse-glow {
        0%,
        100% {
          box-shadow: 0 0 12px var(--tt-accent-dim);
        }
        50% {
          box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
        }
      }

      .momentum-elite-glow {
        box-shadow:
          0 0 15px rgba(168, 85, 247, 0.5),
          0 0 25px rgba(236, 72, 153, 0.3);
        animation: momentum-pulse 2.5s ease-in-out infinite;
      }

      /* Subtle outline pulse for action-lane cards (ENTER NOW, TRIM, EXIT) */
      .card-pulse {
        animation: card-pulse 2s ease-in-out infinite;
      }
      @keyframes card-pulse {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.2); }
        50% { opacity: 1; box-shadow: 0 0 0 1px rgba(34, 211, 238, 0.5); }
      }
      @keyframes stage-dot-pulse {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.35); opacity: 1; }
      }
      .card-pulse-short {
        animation: card-pulse-short 2s ease-in-out infinite;
      }
      @keyframes card-pulse-short {
        0%, 100% { opacity: 1; box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.2); }
        50% { opacity: 1; box-shadow: 0 0 0 1px rgba(239, 68, 68, 0.5); }
      }

      /* Extreme move intensity pulse (>15% daily change) */
      .intensity-pulse {
        animation: intensity-pulse 1.8s ease-in-out infinite;
      }
      @keyframes intensity-pulse {
        0%, 100% { opacity: 1; filter: brightness(1); }
        50% { opacity: 0.92; filter: brightness(1.15); }
      }

      /* Sparkline live dot — pulses when market is open */
      .sparkline-pulse-dot {
        animation: sparkline-dot 1.8s ease-in-out infinite;
      }
      @keyframes sparkline-dot {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.4); opacity: 0.7; }
      }
      .sparkline-pulse-ring {
        animation: sparkline-ring 1.8s ease-in-out infinite;
      }
      @keyframes sparkline-ring {
        0% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.3; }
        50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0; }
        100% { transform: translate(-50%, -50%) scale(0.6); opacity: 0.3; }
      }

      /* Skeleton shimmer for card placeholders */
      @keyframes skeleton-shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .skeleton-card {
        background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.03) 75%);
        background-size: 200% 100%;
        animation: skeleton-shimmer 1.5s ease-in-out infinite;
        border-radius: 0.5rem;
        border: 1px solid rgba(255,255,255,0.04);
      }

      /* Prime + Entry Zone: amber glow card highlight */
      .prime-entry-card {
        animation: prime-entry-glow 2.5s ease-in-out infinite;
        border-color: rgba(251,191,36,0.5) !important;
      }
      @keyframes prime-entry-glow {
        0%, 100% { box-shadow: 0 0 8px rgba(251,191,36,0.15), 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04); }
        50% { box-shadow: 0 0 16px rgba(251,191,36,0.35), 0 2px 6px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04); }
      }

      @keyframes momentum-pulse {
        0%,
        100% {
          box-shadow:
            0 0 15px rgba(168, 85, 247, 0.5),
            0 0 25px rgba(236, 72, 153, 0.3);
        }
        50% {
          box-shadow:
            0 0 25px rgba(168, 85, 247, 0.8),
            0 0 45px rgba(236, 72, 153, 0.6);
        }
      }

      /* Slide-in overlay from right */
      .slide-in-right {
        animation: slideInRight 0.3s ease-out;
      }
      @keyframes slideInRight {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      /* Comet trail effect */
      .comet-trail {
        stroke-dasharray: 5, 5;
        animation: cometMove 2s linear infinite;
      }
      @keyframes cometMove {
        from {
          stroke-dashoffset: 0;
        }
        to {
          stroke-dashoffset: 20;
        }
      }

      /* Bubble Trail path (prefer readability over animation) */
      .trail-path {
        stroke-linecap: round;
        stroke-linejoin: round;
        filter: drop-shadow(0 0 4px rgba(0, 255, 255, 0.25));
      }

      @keyframes momentum-pulse-old {
        0%,
        100% {
          box-shadow:
            0 0 15px rgba(168, 85, 247, 0.5),
            0 0 25px rgba(236, 72, 153, 0.3);
        }
        50% {
          box-shadow:
            0 0 25px rgba(168, 85, 247, 0.7),
            0 0 35px rgba(236, 72, 153, 0.5);
        }
      }

      .bubble-transition {
        transition: all 0.2s ease-out;
      }

      .bubble-hover {
        transform: scale(1.15);
        filter: brightness(1.2);
      }

      .fade-in {
        animation: fadeIn 0.3s ease-in;
      }

      /* Performance: isolate card/lane layout to prevent cascade reflows */
      .kanban-card { contain: layout style paint; }
      .kanban-lane { contain: layout style; }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .slide-in {
        animation: slideIn 0.3s ease-out;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Phase color gradient helper — Trade Tracker palette */
      .phase-gradient {
        background: linear-gradient(
          to right,
          #14b8a6 0%,
          #0d9488 20%,
          #eab308 40%,
          #f97316 60%,
          #e11d48 80%,
          #9f1239 100%
        );
      }

      /* Hide scrollbars while keeping scroll functionality */
      .scrollbar-hide {
        -ms-overflow-style: none; /* IE and Edge */
        scrollbar-width: none; /* Firefox */
      }
      .scrollbar-hide::-webkit-scrollbar {
        display: none; /* Chrome, Safari, Opera */
      }

      /* Shell spacing for fixed legal footer + iOS safe area. */
      .tt-page-shell {
        padding-bottom: calc(148px + env(safe-area-inset-bottom));
      }
      @media (min-width: 768px) {
        .tt-page-shell {
          padding-bottom: 96px;
        }
      }

      /* Admin-only nav links: hidden for non-admin users */
      body:not([data-user-role="admin"]) a[data-admin-only] {
        display: none !important;
      }

      /* V2.1 round 11 (2026-05-04) — Market Pulse mobile fix.
         User reported tiles overlapping on mobile. Cause: the priority row
         uses `flex-1 min-w-0` on each ds-tickercard so 7 tiles squeeze to
         <80px each on phones, breaking the price/sparkline layout.
         Fix: on screens <768px the priority row becomes a horizontal
         scroll-snap track. Each tile pins at 44vw min-width so two fit on
         screen and the rest scroll smoothly with snap stops. The label
         column collapses to a tight header above the scroll track. */
      @media (max-width: 767px) {
        .ds-pulse-row {
          flex-direction: column;
          align-items: stretch !important;
          gap: 6px !important;
        }
        .ds-pulse-row__label {
          width: auto !important;
          padding-top: 0 !important;
          display: flex;
          align-items: baseline;
          gap: 8px;
        }
        .ds-pulse-row__content {
          flex-wrap: nowrap !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          scroll-snap-type: x mandatory;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          padding-bottom: 4px;
          scroll-behavior: smooth;
        }
        .ds-pulse-row__content::-webkit-scrollbar { display: none; }
        /* Boosted specificity so the priority tiles snap correctly even when
           inline styles or Tailwind utilities (flex-1 min-w-0) try to win. */
        .ds-pulse-row .ds-pulse-row__content > * {
          flex: 0 0 auto !important;
          min-width: 38vw !important;
          max-width: 60vw;
          scroll-snap-align: start;
        }
        .ds-pulse-context {
          flex-direction: column;
          align-items: stretch !important;
          gap: 6px !important;
        }
        /* Context (futures · sectors) chip strip becomes a horizontal scroll
           track instead of wrapping onto 5 lines. Same pattern as priority. */
        .ds-pulse-context .ds-row__content {
          flex-wrap: nowrap !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          padding-bottom: 4px;
          scroll-behavior: smooth;
          scroll-snap-type: x proximity;
        }
        .ds-pulse-context .ds-row__content::-webkit-scrollbar { display: none; }
        .ds-pulse-context .ds-row__content > * {
          flex: 0 0 auto !important;
          scroll-snap-align: start;
        }
      }

      /* ─────────────────────────────────────────────────────────────────
       * 2026-05-04 — Mobile-native pass.
       * All rules scoped to (max-width: 768px) or (max-width: 430px).
       * Desktop (>=769px) is untouched.
       * ───────────────────────────────────────────────────────────────── */
      @media (max-width: 768px) {
        /* ── Body / fonts: prefer iOS system stack on phones for
           instant render + native feel; keep mono for prices ── */
        body.ds-v2 {
          font-family: -apple-system, BlinkMacSystemFont, "Inter",
            "Segoe UI", Roboto, sans-serif;
        }
        /* Eliminate horizontal viewport jitter from oversize children. */
        html, body { overflow-x: hidden; }

        /* ── Macro/Earnings rows: same scroll-snap as Pulse rows so the
           50+ ticker chips don't wrap into a wall of text on phones. ── */
        .ds-row {
          flex-direction: column !important;
          align-items: stretch !important;
          gap: 6px !important;
        }
        .ds-row__label {
          width: auto !important;
          padding-top: 0 !important;
          display: flex;
          align-items: baseline;
          gap: 8px;
        }
        .ds-row__content {
          flex-wrap: nowrap !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          scroll-behavior: smooth;
          padding-bottom: 4px;
        }
        .ds-row__content::-webkit-scrollbar { display: none; }
        /* Earnings parent stays a vertical stack of day rows (don't apply
           the horizontal scroll there) — the inner per-day rows do the
           horizontal scrolling themselves. */
        .tt-earnings-content {
          flex-direction: column !important;
          flex-wrap: nowrap !important;
          overflow-x: visible !important;
          overflow-y: visible !important;
        }
        .tt-earn-day-row {
          flex-wrap: nowrap !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          scroll-behavior: smooth;
          scroll-snap-type: x proximity;
          padding-bottom: 4px;
        }
        .tt-earn-day-row::-webkit-scrollbar { display: none; }
        .tt-earn-day-row > * {
          flex: 0 0 auto !important;
          scroll-snap-align: start;
        }

        /* ── Status Strip (Regime · Vol · Breadth · Top Rank · Top
           Signals · Market state) collapses to 2-col grid on mobile.
           Was: single horizontal flex row that wrapped awkwardly. ── */
        [data-coachmark="status-strip"] {
          display: grid !important;
          grid-template-columns: 1fr 1fr;
          gap: 0;
          border-radius: 12px;
        }
        [data-coachmark="status-strip"] > * {
          padding: 8px 12px !important;
          border-right: 1px solid var(--tt-border-weak) !important;
          border-bottom: 1px solid var(--tt-border-weak) !important;
        }
        [data-coachmark="status-strip"] > *:nth-child(2n) { border-right: none !important; }
        [data-coachmark="status-strip"] > .tt-mkt-status-cell {
          margin-left: 0 !important;
          grid-column: 1 / -1;
          border-right: none !important;
          border-bottom: none !important;
          justify-content: flex-start !important;
        }
        /* Hide low-priority Top Signal cells on mobile (Just Flipped /
           Momentum Elite / High R:R) to keep the strip readable; Top
           Rank is the most useful single signal. */
        [data-coachmark="status-strip"] > button.tt-signal-low-prio {
          display: none !important;
        }
        /* Bigger value, smaller eyebrow per spec. */
        [data-coachmark="status-strip"] .tt-label {
          font-size: 8.5px !important;
          letter-spacing: 0.08em;
        }

        /* ── View tabs (Analysis / Active Trader / Investor / All) —
           keep hidden in main flow on mobile; we render a fixed bottom
           nav instead. The bottom nav is shown via tt-mobile-bottom-nav. ── */
        [data-coachmark="nav-modes"]:not(.tt-mobile-bottom-nav) {
          display: none !important;
        }

        /* ── Search box wrapper: tighter padding, single column ── */
        [data-coachmark="search-filter"] {
          padding: 10px !important;
        }

        /* ── Compact card (viewport) tighter padding so 4-5 fit
           without scrolling. ── */
        .ds-tickercard {
          padding: 12px !important;
        }

        /* ── Mobile right rail: full-screen overlay (was 80% partial). ── */
        .tt-rail-mobile {
          top: 0 !important;
          bottom: 0 !important;
          left: 0 !important;
          right: 0 !important;
          width: 100% !important;
          border-left: none !important;
          z-index: 60 !important;
          padding-bottom: env(safe-area-inset-bottom);
        }

        /* (Workspace CSS moved out of this @media (max-width: 768px) block —
           a sibling block at the top-level handles desktop workspace layout.) */
        /* Right rail tab bar — hide horizontal scrollbar but keep
           horizontal scroll behavior so all 5 tabs stay reachable. */
        .tt-rail-tabs::-webkit-scrollbar { display: none; }
        .tt-rail-tabs { scrollbar-width: none; -ms-overflow-style: none; }
        /* Top header — give it more breathing room on mobile so the
           logo / LIVE pill / waitlist icon / bell / avatar / hamburger
           don't feel cramped. Extra vertical padding plus a touch
           more horizontal spacing between groups. */
        .tt-top-nav__inner {
          padding-top: 14px !important;
          padding-bottom: 12px !important;
          padding-left: 14px !important;
          padding-right: 14px !important;
          gap: 10px;
        }
        .tt-top-nav .flex.items-center.gap-3 { gap: 12px !important; }
        .tt-top-nav .flex.items-center.gap-2 { gap: 10px !important; }

        /* ── Bubble Map: collapse the chart by default on mobile. The
           parent height: calc(100vh - 120px) is too tall to scroll past. ── */
        .tt-analysis-grid {
          height: auto !important;
          min-height: 0 !important;
          max-height: none !important;
          flex-direction: column !important;
        }
        /* V15 P0.7.119 (2026-05-09) — Filters stay visible on mobile.
           Previously `.tt-bubble-mobile-collapsed .tt-bubble-chart-wrap`
           was display:none — which hid the entire wrap including the
           filter pills above the chart. User reported "I don't see the
           bubble map filters on mobile". The pills also affect the
           Viewport list, so they need to be visible regardless of whether
           the bubble map is expanded.
           Now: keep the wrap mounted, hide only the canvas (.flex-1
           below the filter pills). The legend + filter pills stay. */
        .tt-bubble-mobile-collapsed .tt-bubble-chart-wrap {
          display: flex !important;
          flex-direction: column !important;
          min-height: 0;
          height: auto;
        }
        .tt-bubble-mobile-collapsed .tt-bubble-chart-wrap > .flex-1 {
          display: none !important;
        }
        /* When the bubble map IS shown on mobile, give the chart canvas
           real height (the parent's 700px min-height was leaving an
           empty void since lg:flex-1 only kicks in >=1024px). */
        .tt-analysis-grid:not(.tt-bubble-mobile-collapsed) .tt-bubble-chart-wrap {
          display: flex !important;
          min-height: 60vh;
          height: 60vh;
        }
        .tt-analysis-grid:not(.tt-bubble-mobile-collapsed) .tt-bubble-chart-wrap > .relative,
        .tt-analysis-grid:not(.tt-bubble-mobile-collapsed) .tt-bubble-chart-wrap > div:last-child {
          flex: 1 1 0;
          min-height: 0;
        }
        .tt-bubble-mobile-toggles {
          display: flex;
        }
        @media (min-width: 1024px) {
          .tt-bubble-mobile-toggles { display: none !important; }
        }
        .tt-bubble-toggle-btn {
          width: 100%;
          padding: 10px 14px;
          border-radius: 12px;
          background: var(--ds-bg-glass-hi);
          border: 1px solid var(--ds-stroke);
          color: var(--ds-text-display);
          font-size: 12px;
          font-weight: 700;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          cursor: pointer;
          font-family: var(--tt-font-mono);
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          margin-bottom: 8px;
        }
        .tt-bubble-toggle-btn:active { transform: scale(0.99); }
        /* Bubble Map full-screen modal mode — opens the chart in a
           landscape-oriented full-viewport overlay so the user has
           real estate to read the labels. The 'Open Full' button on
           the toggle bar opens this; tapping the close X dismisses. */
        .tt-bubble-fullscreen {
          position: fixed;
          inset: 0;
          z-index: 9999;
          background: var(--ds-bg-canvas);
          display: flex;
          flex-direction: column;
          padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .tt-bubble-fullscreen__head {
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 12px 14px;
          border-bottom: 1px solid var(--ds-stroke);
          background: var(--ds-bg-glass);
        }
        .tt-bubble-fullscreen__close {
          width: 36px; height: 36px;
          border-radius: 999px;
          background: var(--ds-bg-glass-hi);
          border: 1px solid var(--ds-stroke);
          color: var(--ds-text-display);
          display: flex; align-items: center; justify-content: center;
          cursor: pointer;
        }
        .tt-bubble-fullscreen__body {
          flex: 1 1 0; min-height: 0;
          padding: 8px;
          display: flex;
          flex-direction: column;
        }
        .tt-bubble-fullscreen__body > * {
          flex: 1 1 0;
          min-height: 0;
        }

        /* ── 44px minimum tap target for buttons / chips on mobile.
           Apply only to clearly-clickable elements so we don't blow
           up text containers. ── */
        button.ds-chip,
        .ds-tab__item,
        nav button,
        nav a {
          min-height: 36px;
        }

        /* ── Active press feedback ── */
        button:active,
        a:active,
        .ds-chip:active,
        .ds-tickercard:active {
          transform: scale(0.97);
          transition: transform 80ms ease-out;
        }

        /* ── Hide WaitlistButton's text label, show icon only. The label
           span is added in auth-gate.js as .tt-waitlist-label. ── */
        .tt-waitlist-label { display: none !important; }

        /* ── Sticky scroll-to-top button ── */
        .tt-scroll-top-btn {
          position: fixed;
          right: 14px;
          bottom: calc(72px + env(safe-area-inset-bottom));
          width: 44px;
          height: 44px;
          border-radius: 50%;
          background: rgba(20,22,30,0.92);
          border: 1px solid var(--ds-stroke);
          color: var(--ds-accent);
          z-index: 55;
          box-shadow: 0 6px 20px rgba(0,0,0,0.45);
          display: flex;
          align-items: center;
          justify-content: center;
          cursor: pointer;
          backdrop-filter: blur(10px);
          -webkit-backdrop-filter: blur(10px);
        }
        .tt-scroll-top-btn:active { transform: scale(0.95); }

        /* tt-mobile-chart-fab CSS removed (P0.7.156 follow-up, 2026-05-14).
           The floating FAB approach lost two stacking-context fights with
           the right-rail's slide-in transform. Replaced by a prominent
           "CHART" button inside the rail's chart panel header — see
           shared-right-rail.js. */

        /* ── Mobile bottom navigation bar ──
           P0.7.104 — bottom shifted UP from 0 to var(--tt-legal-footer-h)
           so the View tabs (Analysis / Active Trader / Investor / All)
           aren't covered by the fixed legal-disclaimer footer. The
           footer has z-index: 9999 (above this bar at z-index: 50).
           --tt-legal-footer-h is set just above based on the footer's
           computed height on mobile (~32px for single-line, ~50px when
           it wraps). Auto-measured via JS when the footer mounts so
           we never have to hard-code a magic number. */
        .tt-mobile-bottom-nav {
          position: fixed;
          left: 0; right: 0;
          bottom: 0;
          display: flex !important;
          align-items: stretch;
          justify-content: space-around;
          background: rgba(10,12,16,0.96);
          border-top: 1px solid var(--ds-stroke);
          backdrop-filter: blur(14px);
          -webkit-backdrop-filter: blur(14px);
          z-index: 9200;
          padding-bottom: env(safe-area-inset-bottom);
          transform: translate3d(0, 0, 0);
          -webkit-transform: translate3d(0, 0, 0);
        }
        .tt-mobile-bottom-nav__item {
          flex: 1;
          display: flex !important;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 2px;
          padding: 8px 4px;
          color: var(--ds-text-muted);
          background: transparent;
          border: none;
          cursor: pointer;
          font-size: 10px;
          font-weight: 600;
          letter-spacing: 0.04em;
          min-height: 56px;
          position: relative;
        }
        .tt-mobile-bottom-nav__item:active { transform: scale(0.95); }
        .tt-mobile-bottom-nav__item--active {
          color: var(--ds-accent);
        }
        .tt-mobile-bottom-nav__item--active::before {
          content: "";
          position: absolute;
          top: 0; left: 30%; right: 30%; height: 2px;
          background: var(--ds-accent);
          border-radius: 0 0 2px 2px;
        }
        .tt-mobile-bottom-nav__item svg { width: 20px; height: 20px; }
        .tt-mobile-bottom-nav__count {
          position: absolute;
          top: 4px; right: 25%;
          min-width: 14px; height: 14px;
          padding: 0 4px;
          border-radius: 7px;
          background: var(--ds-accent);
          color: #0a0d11;
          font-size: 9px;
          font-weight: 800;
          display: flex;
          align-items: center;
          justify-content: center;
          line-height: 1;
        }

        /* V15 P0.7.116 — body padding only needs to clear the FIXED
           mobile bottom nav (~64px) + safe area. The auth-gate footer
           is now inline at the end of page content (scrolls with page),
           so it doesn't need its own reservation. */
        .tt-page-shell,
        body {
          padding-bottom: calc(64px + env(safe-area-inset-bottom)) !important;
        }
      }

      /* ── Tighter mobile @ 430px (smaller phones) ── */
      @media (max-width: 430px) {
        /* Hide "MARKET CLOSED" label cell entirely on tiny phones. */
        .tt-mkt-status-cell { display: none !important; }
        /* Status strip: keep 2-col but pad less. */
        [data-coachmark="status-strip"] > * { padding: 6px 10px !important; }
        /* Compact viewport cards even more. */
        .ds-tickercard { padding: 10px !important; }
        /* Hamburger / icon-only nav buttons stay 36px tap targets. */
      }

      /* ── Hide the mobile bottom nav on desktop ── */
      @media (min-width: 769px) {
        .tt-mobile-bottom-nav { display: none !important; }
        .tt-scroll-top-btn { display: none !important; }
      }
    </style>

    <!-- Initialize app - separate script to avoid Babel parsing issues -->
    <script>
      // Render with error handling
      // Wait for all scripts to load before rendering
      function initializeApp() {
        try {
          // Check if React and ReactDOM are loaded
          if (typeof React === "undefined") {
            throw new Error("React not loaded. Check CDN connection.");
          }
          if (typeof ReactDOM === "undefined") {
            throw new Error("ReactDOM not loaded. Check CDN connection.");
          }

          const rootElement = document.getElementById("root");
          if (!rootElement) {
            throw new Error("Root element not found");
          }

          // Check if App component is available (from Babel script)
          if (typeof window.App === "undefined") {
            throw new Error(
              "App component not loaded. Compiled app bundle may not have finished loading.",
            );
          }

          // Check if React 18 createRoot is available
          const AuthGate = window.TimedAuthGate;
          const wrappedApp = AuthGate
            ? React.createElement(AuthGate, { apiBase: "", requiredTier: "pro" },
                (user) => React.createElement(window.App, { user }))
            : React.createElement(window.App);
          if (ReactDOM.createRoot) {
            const root = ReactDOM.createRoot(rootElement);
            root.render(wrappedApp);
          } else {
            // Fallback for React 17
            ReactDOM.render(wrappedApp, rootElement);
          }

          // Push notification registration is handled by AuthGate after server-verified auth.
          // Do NOT call TimedPushRegister here — it would fire before auth is confirmed.
          if (window.TimedSessionHeartbeat) window.TimedSessionHeartbeat(API_BASE);
        } catch (error) {
          console.error("Error rendering app:", error);
          const rootElement = document.getElementById("root");
          if (rootElement) {
            rootElement.innerHTML = `
              <div style="padding: 40px; text-align: center; color: #f0f2f5; max-width: 800px; margin: 0 auto;">
                <h2 style="color: #e11d48; margin-bottom: 20px;">Error Loading Dashboard</h2>
                <p style="margin-bottom: 20px; color: #ff6b6b;">${error.message}</p>
                <div style="background: #1a2440; padding: 20px; border-radius: 8px; margin: 20px 0; text-align: left; color: #8b92a0;">
                  <h3 style="color: #f0f2f5; margin-bottom: 10px;">Troubleshooting:</h3>
                  <ul style="list-style: disc; padding-left: 20px; line-height: 1.8;">
                    <li>Open browser console (F12 or Cmd+Option+I) to see detailed errors</li>
                    <li>Check your internet connection - CDN resources need to load</li>
                    <li>Try refreshing the page (Cmd+R or Ctrl+R)</li>
                    <li>Check if React is loaded: <code style="background: #252b36; padding: 2px 6px; border-radius: 4px;">typeof React !== 'undefined'</code></li>
                    <li>Check if API is reachable: <a href="/timed/health" target="_blank" style="color: #4a9eff;">API Health Check</a></li>
                  </ul>
                </div>
                <button 
                  onclick="window.location.reload()" 
                  style="padding: 12px 24px; background: #4a9eff; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 20px;"
                >
                  Reload Page
                </button>
              </div>
            `;
          }
        }
      }

      // Poll for window.App in case the compiled bundle is still loading.
      function waitForAppAndInit() {
        var attempts = 0;
        var maxAttempts = 100; // 10 seconds max (100 * 100ms)
        function poll() {
          attempts++;
          if (typeof window.App !== "undefined") {
            initializeApp();
          } else if (attempts < maxAttempts) {
            setTimeout(poll, 100);
          } else {
            console.error("[App] Timed out waiting for the app bundle after 10s");
            initializeApp(); // will show error UI
          }
        }
        poll();
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", waitForAppAndInit);
      } else {
        waitForAppAndInit();
      }

      // Fallback: If React still isn't loaded after 5 seconds, show error
      setTimeout(function () {
        if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
          const rootElement = document.getElementById("root");
          if (
            rootElement &&
            rootElement.innerHTML.includes("Loading dashboard")
          ) {
            rootElement.innerHTML = `
          <div style="padding: 40px; text-align: center; color: #f0f2f5;">
                <h2 style="color: #e11d48;">CDN Resources Not Loading</h2>
                <p style="margin: 20px 0; color: #8b92a0;">
                  React or other CDN resources failed to load. This may be due to:
                </p>
                <ul style="text-align: left; display: inline-block; color: #8b92a0; margin: 20px 0;">
                  <li>Network connectivity issues</li>
                  <li>Ad blockers blocking CDN scripts</li>
                  <li>Corporate firewall blocking unpkg.com</li>
                </ul>
                <p style="margin-top: 20px;">
                  <button onclick="window.location.reload()" style="padding: 12px 24px; background: #4a9eff; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    Retry
                  </button>
            </p>
          </div>
        `;
          }
        }
      }, 5000);
    </script>
    <script>
      // Daily Brief badge check
      (function() {
        fetch("/timed/daily-brief/badge", { cache: "no-store" })
          .then(r => r.json())
          .then(d => {
            if (d?.badge?.ts) {
              const seen = Number(localStorage.getItem("tt_brief_seen") || 0);
              if (d.badge.ts > seen) {
                const el = document.getElementById("brief-badge");
                if (el) el.classList.remove("hidden");
              }
            }
          })
          .catch(() => {});
      })();
    </script>
