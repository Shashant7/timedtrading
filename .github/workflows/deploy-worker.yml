name: Deploy worker

# Auto-deploys worker/index.js to Cloudflare Workers (timed-trading-ingest)
# whenever the worker source changes on main.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — https://dash.cloudflare.com/profile/api-tokens
#                            using the "Edit Cloudflare Workers" template.
#                            Or one of the aliases checked below.
#   CLOUDFLARE_ACCOUNT_ID  — right sidebar of any Cloudflare dashboard page.
#                            Or one of the aliases checked below.
#
# If the secrets aren't configured the workflow SKIPS the deploy step with
# a warning (instead of failing). That way merging worker changes doesn't
# spam failure emails until secrets are configured; once you add them, the
# next merge auto-deploys.

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:  # Manual re-deploy from the Actions tab

concurrency:
  group: deploy-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Check the standard secret names AND a couple of common aliases.
      # Sets `secrets-ok=true` on the step output when both a token and
      # an account ID are found.
      - name: Resolve Cloudflare secrets
        id: cfsec
        env:
          CF_TOKEN_A: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_TOKEN_B: ${{ secrets.CF_API_TOKEN }}
          CF_TOKEN_C: ${{ secrets.CLOUDFLARE_TOKEN }}
          CF_ACCT_A:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCT_B:  ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          CF_TOKEN=""
          CF_ACCT=""
          if   [ -n "$CF_TOKEN_A" ]; then CF_TOKEN="$CF_TOKEN_A"; SRC_T="CLOUDFLARE_API_TOKEN";
          elif [ -n "$CF_TOKEN_B" ]; then CF_TOKEN="$CF_TOKEN_B"; SRC_T="CF_API_TOKEN";
          elif [ -n "$CF_TOKEN_C" ]; then CF_TOKEN="$CF_TOKEN_C"; SRC_T="CLOUDFLARE_TOKEN";
          fi
          if   [ -n "$CF_ACCT_A" ];  then CF_ACCT="$CF_ACCT_A";   SRC_A="CLOUDFLARE_ACCOUNT_ID";
          elif [ -n "$CF_ACCT_B" ];  then CF_ACCT="$CF_ACCT_B";   SRC_A="CF_ACCOUNT_ID";
          fi
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCT" ]; then
            echo "::warning::Cloudflare API token or Account ID not configured."
            echo "::warning::Worker auto-deploy is SKIPPED. Configure repo secrets:"
            echo "::warning::  CLOUDFLARE_API_TOKEN (or CF_API_TOKEN / CLOUDFLARE_TOKEN)"
            echo "::warning::  CLOUDFLARE_ACCOUNT_ID (or CF_ACCOUNT_ID)"
            echo "::warning::See https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
            echo "secrets-ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✓ Found secrets (token: $SRC_T length=${#CF_TOKEN}, account: $SRC_A length=${#CF_ACCT})"
          echo "secrets-ok=true" >> "$GITHUB_OUTPUT"
          # Re-export under the canonical env var names that wrangler reads.
          {
            echo "CLOUDFLARE_API_TOKEN=$CF_TOKEN"
            echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCT"
          } >> "$GITHUB_ENV"

      - name: Deploy worker
        if: steps.cfsec.outputs.secrets-ok == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:        ${{ env.CLOUDFLARE_API_TOKEN }}
          accountId:       ${{ env.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.92.0"
          workingDirectory: worker
          command: deploy

      - name: Deploy skipped notice
        if: steps.cfsec.outputs.secrets-ok != 'true'
        run: |
          echo "Worker auto-deploy SKIPPED (no Cloudflare secrets configured)."
          echo "Run 'npx wrangler deploy' from the worker/ directory manually,"
          echo "or configure CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
