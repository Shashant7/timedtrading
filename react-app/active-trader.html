      // ── KanbanBandHeader — Watching vs Doing visual band.
      function KanbanBandHeader({ band, label, hint }) {
        return h("div", { className: `at-kanban-band at-kanban-band--${band}` },
          h("span", { className: "at-kanban-band__label" }, label),
          hint && h("span", { className: "at-kanban-band__hint" }, hint),
        );
      }

      // ── KanbanLane — one row of the board.
      function KanbanLane({ id, title, accentClass, tickers, sparkCache, savedSet, onToggleSaved, onOpen, tradeByTicker, tradesLoaded }) {
        return h("div", { className: `lane ${accentClass}` },
          h("div", { className: "lane-head" },
            h("div", { className: "lane-name" }, title),
            h("div", { className: "lane-count" }, `${tickers.length} ${tickers.length === 1 ? "ticker" : "tickers"}`),
          ),
          h("div", { className: "lane-body" },
            tickers.length === 0
              ? h("div", { className: "lane-empty" }, "No tickers in this lane right now.")
              : h("div", { className: "lane-cards" },
                  tickers.map((t) => {
                    const sym = String(t?.ticker || "").toUpperCase();
                    const isLt = t?._model_path === "long_term";
                    const cardKey = t?._card_key
                      || (window.TTHorizonLabels?.horizonCardKey?.(sym, isLt ? "long_term" : "short_term"))
                      || `${sym}:${isLt ? "long_term" : "short_term"}`;
                    // Long Term rows must use the investor holding on the card,
                    // not the Short Term open from tradeByTicker (dual cards).
                    const openRaw = isLt
                      ? (t?._openTrade || null)
                      : (tradeByTicker?.get?.(sym) || t?._openTrade || null);
                    return h(ATCard, {
                      key: cardKey,
                      t,
                      sparkSrc: sparkCache[sym] || null,
                      isSaved: savedSet.has(sym),
                      onToggleSaved,
                      onOpen,
                      openTrade: resolveOpenTrade(openRaw),
                      tradesLoaded,
                    });
                  }),
                ),
          ),
        );
      }

      // ── AccountStrip — compact account summary at the top of the
      //    page (Account Value · Open P&L · Realized · Entries / Exits).
      //
      // V15 P0.7.186 (2026-05-17) — Per user feedback "add the small
      // account summary strip on active trader and investor pages...
      // entries, exits, total account value, open pnl like we used
      // to have." Mirrors the 5-stat strip from /portfolio.html so
      // users on /active-trader and /investor see their account
      // snapshot at-a-glance without leaving the page.
      //
      // Data sources:
      //   • /timed/account-summary?mode=trader|investor → account
      //     value, cash, realized, unrealized, costBasis, mark.
      //   • /timed/ledger/summary?mode=… → entries (open + closed),
      //     exits (closed only), win rate.
      function AccountStrip({ mode, label }) {
        const [acc, setAcc] = useState(null);
        const [summary, setSummary] = useState(null);
        const [err, setErr] = useState(false);
        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const qs = mode === "investor" ? "?mode=investor" : "?mode=trader";
              const [a, s] = await Promise.all([
                fetch(`${API_BASE}/timed/account-summary${qs}`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
                fetch(`${API_BASE}/timed/ledger/summary${qs}`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
              ]);
              if (!alive) return;
              if (a?.ok) setAcc(a);
              if (s?.ok) setSummary(s);
              if (!a?.ok && !s?.ok) setErr(true);
            } catch (_) { if (alive) setErr(true); }
          })();
          return () => { alive = false; };
        }, [mode]);

        if (err) return null;

        const fmtUsd = (n) => {
          if (!Number.isFinite(n)) return "—";
          const sign = n < 0 ? "-" : "";
          const abs = Math.abs(n);
          if (abs >= 1000) return `${sign}$${(abs / 1000).toFixed(abs >= 10000 ? 1 : 2)}K`;
          return `${sign}$${abs.toFixed(0)}`;
        };
        const fmtUsdSigned = (n) => {
          if (!Number.isFinite(n)) return "—";
          const sign = n >= 0 ? "+" : "-";
          return `${sign}${fmtUsd(Math.abs(n))}`;
        };

        const accountValue = Number(acc?.accountValue);
        const unrealized = Number(acc?.unrealized);
        const totalRealized = Number(acc?.totalRealized);
        const totals = summary?.totals || {};
        const entries = Number(totals.totalTrades);
        const exits = Number(totals.closedTrades);
        const winRate = Number(totals.winRate);
        const profitFactor = Number(totals.profitFactor);
        // 2026-07-22 model-first labels (operator: Short Term Trades /
        // Long Term trades — not Active Trader / Investor account).
        const headLabel = label
          || (mode === "investor" ? "Long Term trades" : "Short Term Trades");

        return h("section", { className: "at-account-strip" },
          h("div", { className: "at-account-strip__head" },
            h("div", { className: "at-account-strip__label" }, headLabel),
            h("a", {
              href: "/portfolio.html",
              className: "at-account-strip__link",
              title: "View full portfolio",
            }, "View portfolio →"),
          ),
          h("div", { className: "at-account-strip__grid" },
            h("div", { className: "at-account-strip__tile" },
              h("div", { className: "at-account-strip__l" }, "Account"),
              h("div", { className: "at-account-strip__v" }, fmtUsd(accountValue)),
            ),
            h("div", { className: "at-account-strip__tile" },
              h("div", { className: "at-account-strip__l" }, "Open P&L"),
              h("div", {
                className: `at-account-strip__v ${unrealized >= 0 ? "up" : "dn"}`,
              }, fmtUsdSigned(unrealized)),
            ),
            h("div", { className: "at-account-strip__tile" },
              h("div", { className: "at-account-strip__l" }, "Realized"),
              h("div", {
                className: `at-account-strip__v ${totalRealized >= 0 ? "up" : "dn"}`,
              }, fmtUsdSigned(totalRealized)),
            ),
            h("div", { className: "at-account-strip__tile" },
              h("div", { className: "at-account-strip__l" }, "Entries"),
              h("div", { className: "at-account-strip__v" }, Number.isFinite(entries) ? String(entries) : "—"),
            ),
            h("div", { className: "at-account-strip__tile" },
              h("div", { className: "at-account-strip__l" }, "Exits"),
              h("div", { className: "at-account-strip__v" },
                Number.isFinite(exits) ? String(exits) : "—",
                Number.isFinite(winRate) && h("span", { className: "at-account-strip__sub" },
                  ` · ${winRate.toFixed(0)}% WR`,
                ),
              ),
            ),
            Number.isFinite(profitFactor) && h("div", { className: "at-account-strip__tile" },
              h("div", { className: "at-account-strip__l" }, "Profit Factor"),
              h("div", {
                className: `at-account-strip__v ${profitFactor >= 1.5 ? "up" : profitFactor >= 1 ? "" : "dn"}`,
              }, profitFactor.toFixed(2)),
            ),
          ),
        );
      }

      // ── ATBrief — regime + open-position summary + pipeline counts.
      function ATBrief({ allTickers, lanes, tradeByTicker }) {
        const dailyChange = (window.TimedPriceUtils && window.TimedPriceUtils.getDailyChange)
          || (() => ({ dayPct: null }));
        const spy = allTickers.find((t) => String(t?.ticker || "").toUpperCase() === "SPY");
        const spyPct = spy ? Number(dailyChange(spy)?.dayPct) : NaN;
        const regime = (() => {
          if (!Number.isFinite(spyPct)) return { word: "Mixed", cls: "regime-mix" };
          if (spyPct >  0.3) return { word: "Risk-On",  cls: "regime-on"  };
          if (spyPct < -0.3) return { word: "Risk-Off", cls: "regime-off" };
          return { word: "Mixed", cls: "regime-mix" };
        })();

        // Open positions — derive from lanes (hold / defend / trim / just-entered are open).
        const openLanes = [
          ...lanes.hold.map((t) => ({ t, lane: "hold" })),
          ...lanes.defend.map((t) => ({ t, lane: "defend" })),
          ...lanes.trim.map((t) => ({ t, lane: "trim" })),
          ...lanes.new.map((t) => ({ t, lane: "new" })),
        ];
        const openCount = openLanes.length;
        const positionChip = ({ t, lane }) => {
          const sym = String(t.ticker || "").toUpperCase();
          const trade = resolveOpenTrade(tradeByTicker?.get?.(sym) || null);
          const px = Number(t?.price ?? t?.close);
          const ep = Number(trade?.entry_price ?? trade?.entryPrice);
          const dirMul = String(trade?.direction || "").toUpperCase() === "SHORT" ? -1 : 1;
          const pl = (Number.isFinite(px) && Number.isFinite(ep) && ep > 0)
            ? ((px - ep) / ep) * 100 * dirMul
            : null;
          const plStr = Number.isFinite(pl) ? `${pl >= 0 ? "+" : ""}${pl.toFixed(2)}%` : "";
          return h("span", { key: `${sym}-${lane}`, className: `at-brief-chip lane-${lane}` },
            sym, " ", lane.toUpperCase(),
            Number.isFinite(pl) && h("span", { className: `pl ${pl >= 0 ? "up" : "down"}` }, plStr),
          );
        };

        // ── Narrative: what is the model doing right now? ──
        // Lightweight aggregation: counts per lane + cumulative open
        // P&L + how many positions are in profit. The user wanted a
        // sentence or two that frames the board ("the model is
        // holding 5 winners and defending 2"). This is computed from
        // the same lane state so it can never drift from the cards.
        const narrative = (() => {
          let winners = 0, losers = 0, totalPl = 0, plKnown = 0;
          for (const o of openLanes) {
            const sym = String(o.t.ticker || "").toUpperCase();
            const trade = resolveOpenTrade(tradeByTicker?.get?.(sym) || null);
            const px = Number(o.t?.price ?? o.t?.close);
            const ep = Number(trade?.entry_price ?? trade?.entryPrice);
            if (!(Number.isFinite(px) && Number.isFinite(ep) && ep > 0)) continue;
            const dirMul = String(trade?.direction || "").toUpperCase() === "SHORT" ? -1 : 1;
            const pl = ((px - ep) / ep) * 100 * dirMul;
            plKnown += 1;
            totalPl += pl;
            if (pl > 0) winners += 1;
            else if (pl < 0) losers += 1;
          }
          const avgPl = plKnown > 0 ? totalPl / plKnown : null;
          const parts = [];
          if (openCount === 0) {
            parts.push("No open trades right now — the model is in scouting mode.");
          } else {
            const verbs = [];
            if (lanes.hold.length > 0) verbs.push(`holding ${lanes.hold.length}`);
            if (lanes.defend.length > 0) verbs.push(`defending ${lanes.defend.length}`);
            if (lanes.trim.length > 0) verbs.push(`trimming ${lanes.trim.length}`);
            parts.push(`The model is ${verbs.join(", ")}.`);
            if (Number.isFinite(avgPl)) {
              const direction = avgPl >= 0 ? "in aggregate profit" : "drawing down";
              parts.push(`Average open P&L ${avgPl >= 0 ? "+" : ""}${avgPl.toFixed(2)}% (${winners} winning · ${losers} red).`);
            }
          }
          if (lanes.enter.length > 0) {
            parts.push(`${lanes.enter.length} setup${lanes.enter.length === 1 ? "" : "s"} in review for entry today.`);
          } else if (lanes.setup.length > 0) {
            parts.push(`${lanes.setup.length} on the setup watchlist — not yet triggered.`);
          }
          if (lanes.exit.length > 0) {
            parts.push(`${lanes.exit.length} recently exited (last 24h) — review what worked.`);
          }
          return parts.join(" ");
        })();

        return h("section", { className: "at-brief" },
          narrative && h("p", { className: "at-brief-narrative" }, narrative),
          h("div", { className: "at-brief-row" },
            h("span", { className: "at-brief-label" }, "Market"),
            h("span", { className: `at-pill ${regime.cls}` },
              h("span", { className: "dot", style: { background: "currentColor" } }),
              regime.word,
              Number.isFinite(spyPct) && h("strong", null,
                ` · SPY ${spyPct >= 0 ? "+" : ""}${spyPct.toFixed(2)}%`,
              ),
            ),
          ),
          openCount > 0 && h("div", { className: "at-brief-row" },
            h("span", { className: "at-brief-label" }, `${openCount} Open`),
            openLanes.slice(0, 20).map(positionChip),
            openLanes.length > 20 && h("span", { className: "at-brief-chip" },
              `+${openLanes.length - 20} more`,
            ),
          ),
          (lanes.setup.length > 0 || lanes.enter.length > 0 || lanes.new.length > 0) && h("div", { className: "at-brief-row" },
            h("span", { className: "at-brief-label" }, "Pipeline"),
            lanes.setup.length > 0 && h("span", { className: "at-brief-chip" }, `Setup ${lanes.setup.length}`),
            lanes.enter.length > 0 && h("span", { className: "at-brief-chip" }, `In Review ${lanes.enter.length}`),
            lanes.new.length > 0   && h("span", { className: "at-brief-chip" }, `Initiated ${lanes.new.length}`),
          ),
        );
      }

      // ── ATBubbleMap — shows ONLY the tickers in the kanban lanes
      //    (Setup → In Review → Position Initiated → Hold → Defend →
      //    Trim → Exit). User feedback: "Bubble Map on the Active
      //    Trader Page should just show the tickers in the Kanban
      //    Lanes themselves, from Setup to Exit." Anything not in
      //    a lane is off-board noise and shouldn't pollute the map.
      //    Height is governed by CSS (`.at-bubble-stage`) — defaults
      //    to 80vh on desktop so the bubble plot has room to breathe.
      function ATBubbleMap({ lanes, allTickers, data, onSelectTicker }) {
        const SharedChart = window.TimedBubbleChart?.BubbleChart || null;
        const getRankedTickers = window.TimedBubbleChart?.getRankedTickers || null;
        const [hovered, setHovered] = useState(null);

        const visible = useMemo(() => {
          if (!lanes) return [];
          // Union all 7 lanes — these are EXACTLY what the kanban
          // board shows. Dedup by ticker (a ticker can only sit in
          // one lane, but be defensive).
          const seen = new Set();
          const out = [];
          // 2026-07-22 model-first: lane keys are the five model lanes now.
          // Object.values keeps this resilient if lane names evolve again.
          for (const arr of Object.values(lanes || {})) {
            if (!Array.isArray(arr)) continue;
            for (const t of arr) {
              const sym = String(t?.ticker || "").toUpperCase();
              if (!sym || seen.has(sym)) continue;
              seen.add(sym);
              out.push(t);
            }
          }
          return out;
        }, [lanes]);

        const rankedTickers = useMemo(() => {
          if (!getRankedTickers || !data) return [];
          try { return getRankedTickers(data) || []; } catch { return []; }
        }, [data]);
        const rankedTickerPositions = useMemo(() => {
          const m = new Map();
          rankedTickers.forEach((t, idx) => { if (t?.ticker) m.set(t.ticker, idx + 1); });
          return m;
        }, [rankedTickers]);

        if (!SharedChart || visible.length === 0) return null;

        return h("section", { className: "tt-row at-bubble-row" },
          h("div", { className: "at-bubble-head" },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("h2", { className: "tt-sec-h2" }, "Where every board ticker sits on momentum \u00d7 trend"),
              h("p", { className: "tt-sec-sub" }, `${visible.length} tickers across all lanes`),
            ),
            h("div", { className: "at-bubble-legend", "aria-label": "Bubble map legend" }, (() => {
              const af = (window.TimedBubbleChart && window.TimedBubbleChart.ALIGN_FILL) || {
                bull_aligned: "#34d399", bull_mixed: "#34d399",
                pullback: "#e0b265", bear_aligned: "#f43f5e", bear_mixed: "#f43f5e",
              };
              return [
              h("span", null, h("span", { className: "bdot", style: { background: af.bull_aligned } }), "Bull"),
              h("span", null, h("span", { className: "bdot bdot--mixed bdot--mixed-bull", style: { background: af.bull_mixed } }), "Bull Mixed (~)"),
              h("span", null, h("span", { className: "bdot", style: { background: af.pullback } }), "Pullback"),
              h("span", null, h("span", { className: "bdot", style: { background: af.bear_aligned } }), "Bear"),
              h("span", null, h("span", { className: "bdot bdot--mixed bdot--mixed-bear", style: { background: af.bear_mixed } }), "Bear Mixed (~)"),
              h("span", { className: "bmeta" },
                h("span", { className: "bsize" }, h("i", { className: "s" }), h("i", { className: "l" })),
                "Size = R:R",
              ),
              h("span", { className: "bmeta" },
                h("span", { className: "bstroke" }), "Low/Med · ",
                h("span", { className: "bstroke bstroke--high" }), "High Prob",
              ),
              ];
            })()),
          ),
          h("div", { className: "tt-card at-bubble-card" },
            h("div", { className: "at-bubble-stage" },
              h(SharedChart, {
                tickers: visible,
                allData: data,
                rankedTickers,
                rankedTickerPositions,
                hoveredTicker: hovered,
                onHover: setHovered,
                onBubbleClick: (sym) => {
                  if (typeof onSelectTicker === "function") onSelectTicker(sym);
                  else window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`;
                },
                onBackgroundClick: () => {},
                selectedTicker: null,
                selectedTrail: null,
                isTimeTravelActive: false,
                highlightTrailPoint: null,
                thesisMode: false,
                forwardReturns: null,
                activeInsightTickers: null,
                layoutMode: "score",
              }),
            ),
          ),
        );
      }

      // ── ActiveTraderApp ────────────────────────────────────────
      // 2026-06-05 — "How to read this page" explainer. The page is a LIVE
      // SIMULATED portfolio of what the TT model is trading; users were
      // confused about what cards + lanes mean and when to act. Collapsible,
      // remembers dismissal in localStorage. Default open on first visit.
      function HowToReadCard() {
        // 2026-07-22 model-first: one Model board covers Short Term swings
        // and Long Term holdings. v3 key so the old AT-only copy doesn't
        // stick open from prior visits.
        const KEY = "tt_at_guide_open_v3";

          try { return localStorage.getItem(KEY) === "1"; } catch (_) { return false; }

          h("strong", { style: { minWidth: 110, color: "var(--tt-text)" } }, name),
          h("span", { style: { color: "var(--tt-text-muted)" } }, when));
        const el = (label, desc) => h("div", { style: { fontSize: 12, lineHeight: 1.5 } },
          h("strong", { style: { color: "var(--tt-text)" } }, label), " — ",
          h("span", { style: { color: "var(--tt-text-muted)" } }, desc));
        return h("details", { className: "tt-disclose", open, onToggle, style: { marginBottom: 14 } },
          h("summary", null,
            h("span", { className: "tt-disclose-title" }, "How to read this page"),
            h("span", { className: "tt-disclose-sub" }, "A live, simulated portfolio of what the TT model is trading"),
            h("span", { className: "tt-disclose-caret" }, "▼"),
          ),
          open && h("div", { className: "tt-disclose-body", style: { display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(280px, 1fr))", gap: 16, padding: "14px 16px 12px" } },
            h("div", null,
              h("div", { className: "tt-sec-title", style: { marginBottom: 6 } }, "WHAT THIS IS"),
              h("p", { style: { fontSize: 12.5, lineHeight: 1.55, color: "var(--tt-text-muted)", margin: 0 } },
                "One Model board for every position the system is managing in a simulated account — not personal advice. ",
                "Short Term trades are swing holds (typically 1–10 days). Long Term trades are multi-week to multi-month holdings. ",
                "Both share the same lifecycle lanes; cards with an LT chip are the longer-horizon book."),
              h("div", { className: "tt-sec-title", style: { margin: "12px 0 6px" } }, "TWO BOOKS"),
              h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
                el("Short Term Trades", "swing book summary above the board (account, open P&L, realized, entries/exits)."),
                el("Long Term trades", "investor-portfolio summary in the row beneath — same layout, longer horizon."),
              ),
              h("div", { className: "tt-sec-title", style: { margin: "12px 0 6px" } }, "ON AN OPEN CARD"),
              h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
                el("E (Entry)", "where the model entered the trade."),
                el("SL / Invalidation", "protective exit if the thesis breaks (stop on Short Term; invalidation on Long Term)."),
                el("T1 / T2 / T3", "profit targets the model is trimming into (or fair-value / structural targets on LT)."),
                el("P&L %", "current unrealized gain/loss on the open position."),
                el("Chips", "Bias, stage, LT, and pattern labels describe posture and which book it belongs to."),
              ),
            ),
            h("div", null,
              h("div", { className: "tt-sec-title", style: { marginBottom: 6 } }, "THE LANES — AND WHEN TO ACT"),
              lane("Queuing Up", "on the radar or waiting for a trigger. No action yet."),
              lane("Bought", "position is open — thesis intact; let it work."),
              lane("Defending", "under pressure — tighten risk until the book closes or recovers."),
              lane("Trimming", "partial profit taken or reduce signal active."),
              lane("Exited", "the model closed it (recent exits stay visible briefly)."),
              h("p", { style: { fontSize: 12, lineHeight: 1.5, color: "var(--tt-text-muted)", margin: "10px 0 0" } },
                h("strong", { style: { color: "var(--tt-text)" } }, "Tip: "),
                "click any card to open the full chart and a detailed per-ticker guide in the right rail (Short Term / Long Term / Options tabs)."),
            ),
          ),
        );
      }

      function ActiveTraderApp() {
        const [data, setData] = useState(null);
        const [error, setError] = useState(null);
        const [searchQuery, setSearchQuery] = useState("");
        const [filterLane, setFilterLane] = useState(null);

        // 2026-05-26 — Auto-refresh prices (30s) + scoring data (90s) so
        // the kanban lanes stay live without manual reloads. See
        // react-app/tt-live-data.js for merge semantics.
        const _liveHooks = window.TimedLiveData;
        if (_liveHooks?.usePriceFeed) _liveHooks.usePriceFeed(data, setData);
        // 2026-06-18 — sub-second live ticks via WS (restores the retired
        // monolith's live feed; the 30s poll above stays as the safety net so
        // prices never freeze if the WS can't connect). AT is behind
        // AuthGate requiredTier=pro, so every viewer is entitled to a ticket.
        if (_liveHooks?.usePriceWebSocket) _liveHooks.usePriceWebSocket(data, setData);
        if (_liveHooks?.useTickerRefresh) _liveHooks.useTickerRefresh(data, setData);

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const a = await fetchAll();
              if (!alive) return;
              if (a?.ok) setData(a.data || {});
              else setError("Failed to load /timed/all");
            } catch (err) { if (alive) setError(String(err?.message || err)); }
          })();
          const mergeRefresh = window.TimedLiveData?.mergeTimedAllRefresh;
          const unsub = CACHE?.subscribe?.(`${API_BASE}/timed/all`, (body) => {
            if (!alive || !body?.ok || !body.data) return;
            setData((prev) => (mergeRefresh ? mergeRefresh(prev, body.data) : body.data));
          });
          return () => { alive = false; unsub?.(); };
        }, []);

        const { tradeByTicker, closedByTicker, tradesLoaded } = useTraderBook(!!data);
        const { saved, toggle: toggleSaved } = useSavedTickers();
        const { cache: sparkCache, ensure: ensureSpark } = useSparklineCache();

        // 2026-07-22 — MODEL-FIRST MERGE. Operator: "merge trader and
        // investor … one section, model, with its own lanes … the model is
        // doing what it does, 1=1." Investor holdings + queue fold into the
        // same board; the card carries a subtle LT chip so the path stays
        // visible under the surface without splitting the mental model.
        const [investorBook, setInvestorBook] = useState(null);
        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const [scoresResp, posResp] = await Promise.all([
                fetch(`${API_BASE}/timed/investor/scores`, { credentials: "include" }).then((r) => r.json()).catch(() => null),
                fetch(`${API_BASE}/timed/investor/positions?status=OPEN&compact=true`, { credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
              ]);
              if (!alive) return;
              const rows = Array.isArray(scoresResp?.tickers) ? scoresResp.tickers : [];
              const posBySym = new Map();
              for (const p of (posResp?.positions || [])) {
                if (String(p?.status || "").toUpperCase() !== "OPEN") continue;
                if (!(Number(p?.total_shares) > 0)) continue;
                posBySym.set(String(p?.ticker || "").toUpperCase(), p);
              }
              setInvestorBook({ rows, posBySym });
            } catch (_) {
              if (alive) setInvestorBook({ rows: [], posBySym: new Map() });
            }
          })();
          const iv = setInterval(async () => {
            try {
              const r = await fetch(`${API_BASE}/timed/investor/positions?status=OPEN&compact=true`, { credentials: "include" });
              if (!r.ok || !alive) return;
              const j = await r.json();
              const posBySym = new Map();
              for (const p of (j?.positions || [])) {
                if (String(p?.status || "").toUpperCase() !== "OPEN") continue;
                if (!(Number(p?.total_shares) > 0)) continue;
                posBySym.set(String(p?.ticker || "").toUpperCase(), p);
              }
              setInvestorBook((prev) => ({ rows: prev?.rows || [], posBySym }));
            } catch (_) { /* keep last state */ }
          }, 120000);
          return () => { alive = false; clearInterval(iv); };
        }, []);

        const allTickers = useMemo(() => {
          if (!data) return [];
          // /timed/all returns { SYM: { ts, price, htf_score, ..., kanban_stage } }
          // — the VALUES don't carry a `ticker` field; the symbol is the KEY.
          // Mirror index-react.source.html line 4904 — `out.push({ ticker, ...d })` —
          // so every ticker object has both the field and the data.
          const raw = Object.entries(data)
            .filter(([k, v]) => !!k && v && typeof v === "object")
            .map(([k, v]) => v && v.ticker ? v : { ticker: String(k).toUpperCase(), ...(v || {}) });
          const mapped = raw.map((t) => {
            const sym = String(t.ticker || "").toUpperCase();
            const trade = resolveOpenTrade(tradeByTicker.get(sym) || null);
            const rawKanban = String(t?.kanban_stage || "").toLowerCase();
            const eff = computeEffectiveStage(t, trade);
            const trimSignalPending = hasTrimSignalPending({ _rawKanbanStage: rawKanban, kanban_stage: rawKanban }, trade);
            const exitSignalPending = hasExitSignalPending({ ...t, _rawKanbanStage: rawKanban, kanban_stage: rawKanban }, trade);
            const base = eff === rawKanban && !trade
              ? { ...t, _rawKanbanStage: rawKanban, _trimSignalPending: trimSignalPending, _exitSignalPending: exitSignalPending }
              : {
                  ...t,
                  _openTrade: trade,
                  _effectiveKanbanStage: eff,
                  _rawKanbanStage: rawKanban,
                  _trimSignalPending: trimSignalPending,
                  _exitSignalPending: exitSignalPending,
                  kanban_stage: eff,
                  ...(trade ? { has_open_position: true, position_direction: trade.direction || t.position_direction } : {}),
                };
            const out = window.TimedPriceUtils?.sanitizeTickerOpenPosture
              ? window.TimedPriceUtils.sanitizeTickerOpenPosture(base, trade)
              : base;
            if ((out.kanban_stage == null || out.kanban_stage === undefined) && closedByTicker?.has?.(sym) && !trade) {
              const closed = closedByTicker.get(sym);
              const exitPx = Number(closed?.exit_price ?? closed?.exitPrice ?? closed?.mark_price) || null;
              const pnlPct = closed?.pnl_pct ?? closed?.pnlPct ?? null;
              return {
                ...out,
                kanban_stage: "exit",
                _closedTrade: closed,
                _stickyExit: true,
                price: out.price || exitPx || null,
                pnlPct,
                _exitLabel: String(closed?.status || "CLOSED").toUpperCase(),
              };
            }
            // Recent D1 exit wins over stale /timed/all management stage (trim/hold).
            if (!trade && closedByTicker?.has?.(sym)) {
              const closed = closedByTicker.get(sym);
              const exitMs = Number(closed?.exit_ts ?? closed?.exitTs ?? 0);
              if (exitMs > 0 && (Date.now() - exitMs) < RECENT_EXIT_WINDOW_MS) {
                const exitPx = Number(closed?.exit_price ?? closed?.exitPrice) || out.price || null;
                return {
                  ...out,
                  kanban_stage: "exit",
                  _closedTrade: closed,
                  _stickyExit: true,
                  price: exitPx,
                  pnlPct: closed?.pnl_pct ?? closed?.pnlPct ?? out.pnlPct ?? null,
                  _exitLabel: String(closed?.status || "CLOSED").toUpperCase(),
                };
              }
            }
            if (trade && (out._stickyExit || String(out.kanban_stage || "").toLowerCase() === "exit")) {
              return {
                ...out,
                _stickyExit: false,
                _closedTrade: null,
                _openTrade: trade,
                kanban_stage: eff,
                _effectiveKanbanStage: eff,
                has_open_position: true,
                position_direction: trade.direction || out.position_direction,
              };
            }
            if (!trade && String(out.kanban_stage || "").toLowerCase() === "exit") {
              const closed = closedByTicker?.get?.(sym) || out._closedTrade || null;
              const exitMs = Number(closed?.exit_ts ?? closed?.exitTs ?? 0);
              if (!exitMs || (Date.now() - exitMs) >= RECENT_EXIT_WINDOW_MS) {
                return {
                  ...out,
                  kanban_stage: null,
                  _effectiveKanbanStage: null,
                  _closedTrade: null,
                  _stickyExit: false,
                };
              }
            }
            return out;
          });
          const known = new Set(mapped.map((t) => String(t?.ticker || "").toUpperCase()));
          const injected = [];
          tradeByTicker.forEach((trade, sym) => {
            const openTr = resolveOpenTrade(trade);
            if (!sym || !openTr || known.has(sym)) return;
            const stub = {
              ticker: sym,
              kanban_stage: "hold",
              price: Number(openTr?.mark_price ?? openTr?.current_price ?? openTr?.entry_price) || null,
              has_open_position: true,
              position_direction: openTr?.direction || null,
            };
            const eff = computeEffectiveStage(stub, openTr);
            injected.push({
              ...stub,
              kanban_stage: eff,
              _openTrade: openTr,
              _effectiveKanbanStage: eff,
              _rawKanbanStage: String(stub.kanban_stage || "hold").toLowerCase(),
              _trimSignalPending: hasTrimSignalPending(stub, openTr),
              _exitSignalPending: hasExitSignalPending(stub, openTr),
              _injectedOpenTrade: true,
            });
          });
          closedByTicker.forEach((closed, sym) => {
            if (!sym || known.has(sym) || tradeByTicker.has(sym)) return;
            const exitMs = Number(closed?.exit_ts ?? closed?.exitTs ?? 0);
            if (!exitMs || (Date.now() - exitMs) >= RECENT_EXIT_WINDOW_MS) return;
            if (String(closed?.exit_reason || "").startsWith("REVERSED_")) return;
            injected.push({
              ticker: sym,
              kanban_stage: "exit",
              price: Number(closed?.exit_price ?? closed?.exitPrice ?? closed?.mark_price) || null,
              _closedTrade: closed,
              _stickyExit: true,
              pnlPct: closed?.pnl_pct ?? closed?.pnlPct ?? null,
              _exitLabel: String(closed?.status || "CLOSED").toUpperCase(),
            });
            known.add(sym);
          });
          return injected.length ? mapped.concat(injected) : mapped;
        }, [data, tradeByTicker, closedByTicker]);

        const lanes = useMemo(() => categorizeKanbanLanes(allTickers, tradeByTicker, closedByTicker), [allTickers, tradeByTicker, closedByTicker]);

        // ── MODEL LANES (2026-07-22 / dual-horizon 2026-07-23)
        //    Five lanes: Queuing Up / Bought / Defending / Trimming / Exited.
        //    When BOTH Short Term and Long Term books have a live signal for
        //    the same ticker, emit TWO cards (keyed ticker:horizon). Broker
        //    mirror tags mode=trader vs mode=investor on separate trade_ids.
        const modelLanes = useMemo(() => {
          const tagShort = (list) => (list || []).map((t) => {
            const sym = String(t?.ticker || "").toUpperCase();
            return {
              ...t,
              _model_path: "short_term",
              _source_mode: t?._source_mode || "trader",
              _card_key: `${sym}:short_term`,
            };
          });
          const bySym = new Map();
          for (const t of allTickers) {
            const s = String(t?.ticker || "").toUpperCase();
            if (s && !bySym.has(s)) bySym.set(s, t);
          }
          const invQueue = [];
          const invBought = [];
          const invTrim = [];
          const invExit = [];
          const rows = investorBook?.rows || [];
          const posBySym = investorBook?.posBySym || new Map();
          for (const row of rows) {
            const sym = String(row?.ticker || "").toUpperCase();
            if (!sym) continue;
            const pos = posBySym.get(sym) || null;
            const owned = !!pos || !!(row?.position?.owned);
            const stage = String(row?.stage || "").toLowerCase();
            const base = bySym.get(sym) || { ticker: sym, price: Number(row?._live_price ?? row?.price) || null };
            // Investor position → open-trade-like object so the ATCard
            // position strip renders entry/P&L for LT holdings too.
            const invPos = pos || row?.position || null;
            const avgEntry = Number(invPos?.avg_entry) || 0;
            const shares = Number(invPos?.total_shares ?? invPos?.shares) || 0;
            const invalidation = Number(row?.primaryInvalidation?.price ?? row?.thesisInvalidationPrice) || null;
            const fv = Number(row?.fairValue?.fair_value ?? row?.fairValue) || null;
            const livePx = Number(base?.price ?? base?.close ?? row?._live_price) || null;
            const ltTarget = (() => {
              if (fv && livePx && fv > livePx) return fv;
              const structural = Number(base?.tp_runner ?? base?.tp_max ?? base?.tp_exit ?? base?.tp) || null;
              if (structural && (!livePx || structural > livePx)) return structural;
              const yearHigh = Number(base?.year_high ?? base?.yearHigh) || null;
              if (yearHigh && (!livePx || yearHigh > livePx)) return yearHigh;
              return null;
            })();
            const invTrade = (owned && avgEntry > 0) ? {
              ticker: sym,
              direction: "LONG",
              status: "OPEN",
              entry_price: avgEntry,
              entryPrice: avgEntry,
              shares,
              sl: invalidation,
              stop_loss: invalidation,
              tp: ltTarget,
              take_profit: ltTarget,
              _source_mode: "investor",
            } : null;
            // Strip Short Term open so LT card P&L is not polluted by ST trade.
            const enriched = {
              ...base,
              ticker: sym,
              _model_path: "long_term",
              _source_mode: "investor",
              _card_key: `${sym}:long_term`,
              _investorStage: stage,
              _openTrade: invTrade,
              has_open_position: owned,
              position_direction: owned ? "LONG" : null,
            };
            const recentlyExited = stage === "exited" || (row?.recentlyExited && typeof row.recentlyExited === "object");
            if (recentlyExited) { invExit.push(enriched); continue; }
            if (owned) {
              if (stage === "reduce") invTrim.push(enriched);
              else invBought.push(enriched);
              continue;
            }
            // Unowned: only the genuine queue — radar noise stays off-board.
            if (stage === "accumulate" || stage === "accumulate_queued" || stage === "research_on_watch") {
              invQueue.push(enriched);
            }
          }
          const byAlpha = (a, b) => String(a?.ticker || "").localeCompare(String(b?.ticker || ""));
          // Within a horizon, keep alpha order; Short Term cards precede Long Term
          // for the same ticker so the board reads ST then LT when both present.
          const byHorizonThenAlpha = (a, b) => {
            const c = byAlpha(a, b);
            if (c !== 0) return c;
            const ah = a?._model_path === "long_term" ? 1 : 0;
            const bh = b?._model_path === "long_term" ? 1 : 0;
            return ah - bh;
          };
          invBought.sort(byAlpha); invTrim.sort(byAlpha);
          return {
            queue: [...tagShort(lanes.enter), ...tagShort(lanes.setup), ...invQueue].sort(byHorizonThenAlpha),
            bought: [...tagShort(lanes.new), ...tagShort(lanes.hold), ...invBought].sort(byHorizonThenAlpha),
            defend: tagShort(lanes.defend),
            trim: [...tagShort(lanes.trim), ...invTrim].sort(byHorizonThenAlpha),
            exit: [...tagShort(lanes.exit), ...invExit].sort(byHorizonThenAlpha),
          };
        }, [lanes, allTickers, investorBook]);

        const laneCounts = useMemo(() => ({
          queue: modelLanes.queue.length,
          bought: modelLanes.bought.length,
          defend: modelLanes.defend.length,
          trim: modelLanes.trim.length,
          exit: modelLanes.exit.length,
        }), [modelLanes]);

        const displayLanes = useMemo(() => {
          const q = searchQuery.trim().toUpperCase();
          const match = (list) => {
            if (!q) return list;
            return list.filter((t) => String(t?.ticker || "").toUpperCase().includes(q));
          };
          const base = {
            queue: match(modelLanes.queue),
            bought: match(modelLanes.bought),
            defend: match(modelLanes.defend),
            trim: match(modelLanes.trim),
            exit: match(modelLanes.exit),
          };
          if (!filterLane) return base;
          const empty = { queue: [], bought: [], defend: [], trim: [], exit: [] };
          if (Object.prototype.hasOwnProperty.call(base, filterLane)) {
            return { ...empty, [filterLane]: base[filterLane] };
          }
          return base;
        }, [modelLanes, searchQuery, filterLane]);

        // Pre-fetch sparklines for every card rendered in each lane.
        useEffect(() => {
          if (!ensureSpark) return;
          const syms = new Set();
          for (const lane of Object.values(displayLanes)) {
            for (const t of lane || []) {
              const s = String(t?.ticker || "").toUpperCase();
              if (s) syms.add(s);
            }
          }
          syms.forEach((s) => ensureSpark(s));
        }, [displayLanes, ensureSpark]);

        // Right rail overlay state — card clicks pop the slide-in panel
        // (same component /index-react.html uses) so users can drill into
        // a ticker without leaving the Active Trader board.
        const [railTicker, setRailTicker] = useState(null);
        const [railInitialTab, setRailInitialTab] = useState(null);
        const [railOpenSource, setRailOpenSource] = useState(null);
        const [highlightTradeId, setHighlightTradeId] = useState(null);
        const [openAutopsyForTrade, setOpenAutopsyForTrade] = useState(null);

        const allTickersRef = useRef(allTickers);
        const dataRef = useRef(data);
        allTickersRef.current = allTickers;
        dataRef.current = data;
        const [railTickerSnapshot, setRailTickerSnapshot] = useState(null);
        useEffect(() => {
          if (!railTicker) {
            setRailTickerSnapshot(null);
            return;
          }
          const key = String(railTicker).toUpperCase();
          const tickers = allTickersRef.current;
          const payload = dataRef.current;
          const found = (tickers || []).find((t) => String(t?.ticker || "").toUpperCase() === key);
          if (found) {
            setRailTickerSnapshot(found);
            return;
          }
          if (payload && typeof payload === "object" && payload[key]) {
            const raw = payload[key];
            setRailTickerSnapshot(raw.ticker ? raw : { ...raw, ticker: key });
            return;
          }
          setRailTickerSnapshot({ ticker: key });
        }, [railTicker]);
        // V15 P0.7.181 — Reactive RailOverlay state so card clicks
        // work the instant the rail scripts load.
        const [RailOverlay, setRailOverlay] = useState(() => window.TimedRightRail?.Overlay || null);
        useEffect(() => {
          if (RailOverlay) return;
          const id = setInterval(() => {
            if (window.TimedRightRail?.Overlay) {
              setRailOverlay(() => window.TimedRightRail.Overlay);
              clearInterval(id);
            }
          }, 80);
          return () => clearInterval(id);
        }, [RailOverlay]);

        const onOpen = useCallback((sym, initialTab = null) => {
          if (!sym) return;
          const ticker = String(sym).toUpperCase();
          const tab = initialTab ? String(initialTab).toUpperCase() : null;
          if (typeof window.ttOpenTickerInRail === "function") {
            window.ttOpenTickerInRail({
              ticker,
              initialRailTab: tab,
              source: "active-trader",
            });
            return;
          }
          setRailTicker(ticker);
          if (tab) setRailInitialTab(tab);
        }, []);
                const applyRailOpen = useCallback((detail) => {
          const p = typeof window.ttConsumeRailOpenForReact === "function"
            ? window.ttConsumeRailOpenForReact(detail)
            : null;
          const t = p?.ticker || String(detail?.ticker || "").toUpperCase();
          if (!t) return;
          setRailTicker(t);
          setRailInitialTab(p?.initialRailTab || detail?.initialRailTab || null);
          setRailOpenSource(p?.railOpenSource || detail?.source || null);
          setHighlightTradeId(p?.highlightTradeId || detail?.tradeId || null);
          setOpenAutopsyForTrade(p?.openAutopsyForTrade || null);
        }, []);

        const onCloseRail = useCallback(() => {
          setRailTicker(null);
          setRailInitialTab(null);
          setRailOpenSource(null);
          setHighlightTradeId(null);
          setOpenAutopsyForTrade(null);
          try { window.ttClearRailUrlParams?.(); } catch (_) {}
        }, []);

        useEffect(() => {
          if (!RailOverlay) return;
          const handler = (ev) => {
            applyRailOpen(ev?.detail);
            try { if (typeof window.ttGlobalSearchMarkHandled === "function") window.ttGlobalSearchMarkHandled(ev?.detail?.ticker); } catch (_) {}
          };

          if (typeof window.ttApplyPendingRailDeepLink === "function") {

        if (error) {
          return h("main", null,
            h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-dn-soft)" } },
              "Couldn't load Active Trader: " + error,

        return h(React.Fragment, null,

          h("main", null,
            h("section", { className: "at-hero" },
              h("div", null,
                h("div", { className: "label" }, "MODEL"),
                h("h1", null, "What the model is doing"),
                h("div", { className: "sub" }, "One board for every model position — short-term swings and long-term holdings. Queuing Up → Bought → Defending → Trimming → Exited. Click any card to deep-dive."),
              ),
              loading
                ? h("div", { className: "pills" }, h("span", { className: "sk", style: { width: 120, height: 26, borderRadius: 999 } }))
                : null,

            loading
              ? h("section", { className: "at-brief" },
                  h("div", { className: "at-brief-row" },

                h("button", {
                  className: "at-chip" + (filterLane === "bought" ? " active" : ""),
                  onClick: () => setFilterLane(filterLane === "bought" ? null : "bought"),
                  disabled: laneCounts.bought === 0,
                  title: "Open positions the model holds (short-term and long-term)",
                }, `Bought${laneCounts.bought > 0 ? ` (${laneCounts.bought})` : ""}`),
                h("button", {
                  className: "at-chip" + (filterLane === "defend" ? " active" : ""),
                  onClick: () => setFilterLane(filterLane === "defend" ? null : "defend"),
                  disabled: laneCounts.defend === 0,
                  title: "Open positions where the model wants the stop tightened",
                }, `Defending${laneCounts.defend > 0 ? ` (${laneCounts.defend})` : ""}`),
                h("button", {
                  className: "at-chip" + (filterLane === "trim" ? " active" : ""),
                  onClick: () => setFilterLane(filterLane === "trim" ? null : "trim"),
                  disabled: laneCounts.trim === 0,
                  title: "Positions the model is taking profits on",
                }, `Trimming${laneCounts.trim > 0 ? ` (${laneCounts.trim})` : ""}`),
                h("button", {
                  className: "at-chip" + (filterLane === "exit" ? " active" : ""),
                  onClick: () => setFilterLane(filterLane === "exit" ? null : "exit"),
                  disabled: laneCounts.exit === 0,
                  title: "Recently closed model positions (visible 24h)",
                }, `Exited${laneCounts.exit > 0 ? ` (${laneCounts.exit})` : ""}`),
              ),
            ),
            loading
              ? [0,1,2,3,4,5,6].map((i) =>
                  h("div", { key: i, className: "lane" },
                    h("div", { className: "lane-head" },
                      h("span", { className: "sk", style: { width: 80, height: 11 } }),
                      h("span", { className: "sk", style: { width: 50, height: 10, marginTop: 6 } }),
                    ),
                    h("div", { className: "lane-body" },
                      h("div", { className: "lane-cards" },
                        [0,1,2].map((j) => h("div", { key: j, className: "sk sk-card", style: { width: 280 } })),
                      ),
                    ),
                  ),
                )
              // 2026-07-22 model-first: five straightforward lanes — the
              // model is either queuing up, bought, defending, trimming or
              // exited. WATCHING/DOING band split removed (operator: "The
              // lanes should be merged and straight forward").
              : [
                  h(KanbanLane, { key: "queue",  id: "queue",  title: "Queuing Up", accentClass: "review",    tickers: displayLanes.queue,  sparkCache, savedSet: saved, onToggleSaved: toggleSaved, onOpen, tradeByTicker, tradesLoaded }),
                  h(KanbanLane, { key: "bought", id: "bought", title: "Bought",     accentClass: "hold",      tickers: displayLanes.bought, sparkCache, savedSet: saved, onToggleSaved: toggleSaved, onOpen, tradeByTicker, tradesLoaded }),
                  h(KanbanLane, { key: "defend", id: "defend", title: "Defending",  accentClass: "defend",    tickers: displayLanes.defend, sparkCache, savedSet: saved, onToggleSaved: toggleSaved, onOpen, tradeByTicker, tradesLoaded }),
                  h(KanbanLane, { key: "trim",   id: "trim",   title: "Trimming",   accentClass: "trim",      tickers: displayLanes.trim,   sparkCache, savedSet: saved, onToggleSaved: toggleSaved, onOpen, tradeByTicker, tradesLoaded }),
                  h(KanbanLane, { key: "exit",   id: "exit",   title: "Exited",     accentClass: "exit",      tickers: displayLanes.exit,   sparkCache, savedSet: saved, onToggleSaved: toggleSaved, onOpen, tradeByTicker, tradesLoaded }),
                ],
            // Bubble map of the AT board's tickers ONLY (the union of
            // all 7 kanban lanes — Setup → In Review → Position
            // Initiated → Hold → Defend → Trim → Exit). Anything not
            // in a lane is off-board noise and isn't plotted here.
            !loading && h(ATBubbleMap, { lanes: displayLanes, allTickers, data, onSelectTicker: onOpen }),
          ),
          // Right rail slide-in. The Overlay component lives in
          // shared-rail-bootstrap.js and reuses the same factory the
          // Active Trader dashboard uses, so tabs / actions / sector
          // group / pattern detection all match.
          RailOverlay && railTickerSnapshot && h(RailOverlay, {
            ticker: railTickerSnapshot,
            allLoadedData: data,
            onClose: onCloseRail,
            initialRailTab: railInitialTab,
            railOpenSource,
            openAutopsyForTrade,
            highlightTradeId,
          }),
        );
      }

      // ── Mount with auth gate ───────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const app = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="pro">{(user) => <ActiveTraderApp user={user} />}</AuthGate>
        : <ActiveTraderApp />;
      ReactDOM.createRoot(document.getElementById("root")).render(app);
    </script>
