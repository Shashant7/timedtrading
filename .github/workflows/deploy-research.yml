name: Deploy research worker

# Auto-deploys worker-research/ (tt-research) — the dedicated research-slot
# worker (P2 decomposition Step 2 v2). Like tt-engine, it deploys the SAME
# bundle as the monolith (main = ../worker/index.js) under its own name,
# owning the hourly / half-hour / 22:00 cron slots via role gating. Safe to
# deploy at any time: ticks no-op until RESEARCH_ENABLED=true (cutover
# runbook in worker-research/wrangler.toml — gap-preferred: set
# RESEARCH_SLOTS_EXTERNAL on the monolith FIRST so investor hourly can
# never run twice in the same hour).

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "worker-research/**"
      - "react-app/**"
      - "scripts/build-frontend.js"
      - "scripts/embed-dashboard.js"
      - "package.json"
      - "scripts/deploy-wrangler-retry.sh"
      - ".github/workflows/deploy-research.yml"
  workflow_dispatch:

concurrency:
  # 2026-06-22 — Per-worker group. Was shared deploy-monolith-bundle, which
  # made THIS workflow the consistently-cancelled 3rd run, so tt-research
  # (Daily Brief + investor crons) never deployed via CI. See deploy-worker.yml.
  group: deploy-research-worker
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy (tt-research)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Resolve Cloudflare secrets
        id: cfsec
        env:
          CF_TOKEN_A: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_TOKEN_B: ${{ secrets.CF_API_TOKEN }}
          CF_TOKEN_C: ${{ secrets.CLOUDFLARE_TOKEN }}
          CF_ACCT_A:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCT_B:  ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          CF_TOKEN=""
          CF_ACCT=""
          if   [ -n "$CF_TOKEN_A" ]; then CF_TOKEN="$CF_TOKEN_A";
          elif [ -n "$CF_TOKEN_B" ]; then CF_TOKEN="$CF_TOKEN_B";
          elif [ -n "$CF_TOKEN_C" ]; then CF_TOKEN="$CF_TOKEN_C";
          fi
          if   [ -n "$CF_ACCT_A" ];  then CF_ACCT="$CF_ACCT_A";
          elif [ -n "$CF_ACCT_B" ];  then CF_ACCT="$CF_ACCT_B";
          fi
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCT" ]; then
            echo "::warning::Cloudflare secrets not configured — research deploy SKIPPED."
            echo "secrets-ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "secrets-ok=true" >> "$GITHUB_OUTPUT"
          {
            echo "CLOUDFLARE_API_TOKEN=$CF_TOKEN"
            echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCT"
          } >> "$GITHUB_ENV"

      - name: Install root deps
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: |
          _install() { npm install --no-audit --no-fund --ignore-scripts; }
          _install
          # 2026-06-11 — npm's optional-deps bug (npm/cli#4828) intermittently
          # skips platform-specific binaries (e.g. @rolldown/binding-linux-
          # x64-gnu), which kills vitest at startup ("Cannot find native
          # binding") — it failed the tt-research deploy twice in two days.
          # Verify the binding landed; one clean reinstall self-heals.
          if ! npm ls @rolldown/binding-linux-x64-gnu >/dev/null 2>&1; then
            echo "rolldown native binding missing — clean reinstall"
            rm -rf node_modules
            _install
          fi

      - name: Run tests
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: npm test

      - name: Build frontend + embed dashboard
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: |
          npm run build:frontend
          node scripts/embed-dashboard.js

      - name: Deploy research worker
        if: steps.cfsec.outputs.secrets-ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/deploy-wrangler-retry.sh worker-research

      - name: Post-deploy smoke
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: |
          sleep 5
          HEALTH=$(curl -s -m 20 "https://tt-research.shashant.workers.dev/timed/health" || echo "{}")
          if ! echo "$HEALTH" | jq -e . >/dev/null 2>&1; then
            echo "::error::tt-research /timed/health returned non-JSON after deploy"
            exit 1
          fi
          OK=$(echo "$HEALTH" | jq -r '.ok // false')
          echo "ok=$OK (full bundle serves the shared router; cron work gated by WORKER_ROLE=research + RESEARCH_ENABLED)"
          if [ "$OK" != "true" ]; then
            echo "::error::tt-research /timed/health did not return ok:true after deploy"
            exit 1
          fi
