name: Tests

# Runs the vitest suite on every PR and on pushes to main. The suite
# existed for months but CI never executed it — deploys could ship
# broken modules (full-system-review P1.7).

on:
  pull_request:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - "worker-bridge/**"
      - "scripts/**"
      - "tests/**"
      - "react-app/**"
      - "package.json"
      - "vitest.config.js"
      - ".github/workflows/test.yml"
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: vitest run
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: |
          _install() { npm install --no-audit --no-fund; }
          _install
          # 2026-06-11 — npm's optional-deps bug (npm/cli#4828) intermittently
          # skips platform-specific binaries (e.g. @rolldown/binding-linux-
          # x64-gnu), which kills vitest at startup ("Cannot find native
          # binding") — it failed the tt-research deploy twice in two days.
          # Verify the binding landed; one clean reinstall self-heals.
          if ! npm ls @rolldown/binding-linux-x64-gnu >/dev/null 2>&1; then
            echo "rolldown native binding missing — clean reinstall"
            rm -rf node_modules
            _install
          fi

      - name: Run tests
        run: npm test

      - name: Syntax-check worker entry points
        run: |
          node --check worker/index.js
          node --check worker/api.js
          node --check worker-bridge/bridge-index.js
          node --check react-app/_worker.js

      # 2026-06-11 — full bundle check. `node --check` parses ONLY the
      # entry file, not its imports: PR #621 shipped a syntax error in
      # worker/chart-candle-calendar.js (a star-slash-five cron pattern
      # inside a JSDoc comment terminated the comment), tests stayed
      # green (no test imports that module), and ALL THREE worker
      # deploys went red at wrangler-bundle time. This step fails the
      # PR instead.
      - name: Bundle-check the worker graph
        run: |
          node scripts/embed-dashboard.js
          npx esbuild worker/index.js --bundle --format=esm --outfile=/dev/null
