// TAB: Backtest Runs
// ═══════════════════════════════════════════════════════════════
function RunsTab({ isAdmin }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [runs, setRuns] = useState([]);
  const [liveSummary, setLiveSummary] = useState(null);
  const [promotingRunId, setPromotingRunId] = useState("");
  const [finalizingRunId, setFinalizingRunId] = useState("");
  const [archivingRunId, setArchivingRunId] = useState("");
  const [deletingRunId, setDeletingRunId] = useState("");
  const [detailRunId, setDetailRunId] = useState(null);
  const [detailData, setDetailData] = useState(null);
  const [message, setMessage] = useState(null);
  const [showOnlyCompleted, setShowOnlyCompleted] = useState(true);
  const [showArchived, setShowArchived] = useState(false);
  const [hideNoisyPlaceholders, setHideNoisyPlaceholders] = useState(true);
  const [editingDescRunId, setEditingDescRunId] = useState(null);
  const [editingDescValue, setEditingDescValue] = useState("");
  const [savingDescRunId, setSavingDescRunId] = useState(null);
  const [compareRuns, setCompareRuns] = useState(null);
  const [variantRunId, setVariantRunId] = useState(null);
  const [variantData, setVariantData] = useState(null);

  const fmtNum = (n) => {
    const v = Number(n);
    return Number.isFinite(v) ? v.toLocaleString() : "—";
  };
  const fmtPct = (n) => {
    const v = Number(n);
    return Number.isFinite(v) ? `${v.toFixed(2)}%` : "—";
  };
  const fmtMoney = (n) => {
    const v = Number(n);
    if (!Number.isFinite(v)) return "—";
    return `${v >= 0 ? "+" : "-"}$${Math.abs(v).toFixed(2)}`;
  };
  const fmtRunDate = (ms) => {
    const v = Number(ms);
    if (!Number.isFinite(v) || v <= 0) return "—";
    const d = new Date(v);
    return d.toLocaleString(undefined, { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  };
  const shortRunId = (rid) => {
    const s = String(rid || "");
    if (!s) return "—";
    if (s.length <= 42) return s;
    return `${s.slice(0, 26)}...${s.slice(-12)}`;
  };
  const parseMetricObj = (v) => {
    if (!v) return {};
    if (typeof v === "object") return v || {};
    try { return JSON.parse(v) || {}; } catch (_) { return {}; }
  };
  const topCounts = (obj, max = 3) => {
    const entries = Object.entries(obj || {}).filter(([, val]) => Number(val) > 0);
    entries.sort((a, b) => Number(b[1]) - Number(a[1]));
    return entries.slice(0, max);
  };

  const fetchRuns = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const includeArchived = showArchived ? "1" : "0";
      const [listRes, liveRes] = await Promise.all([
        fetch(`${API_BASE}/timed/admin/runs?limit=60&include_archived=${includeArchived}`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/admin/runs/live`, { credentials: "include" }).then(r => r.json()).catch(() => null),
      ]);
      if (!listRes?.ok) {
        setError(listRes?.error || "Failed to load backtest runs");
        setRuns([]);
      } else {
        const rows = Array.isArray(listRes.summaries) && listRes.summaries.length
          ? listRes.summaries
          : (Array.isArray(listRes.runs) ? listRes.runs : []);
        setRuns(rows);
      }
      if (liveRes?.ok) setLiveSummary(liveRes.summary || null);
    } catch (e) {
      setError(String(e || "Failed to load runs"));
    }
    setLoading(false);
  }, [showArchived]);

  useEffect(() => { fetchRuns(); }, [fetchRuns]);

  const updateRunDescription = async (runId, description) => {
    if (!isAdmin || !runId) return;
    setSavingDescRunId(runId);
    setMessage(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: runId, description }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) setError(data?.error || "Failed to update description");
      else {
        setMessage("Description updated");
        setEditingDescRunId(null);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to update"));
    }
    setSavingDescRunId(null);
  };

  const promoteRun = async (runId) => {
    if (!isAdmin) return;
    if (!runId) return;
    setPromotingRunId(runId);
    setMessage(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/mark-live`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: runId }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) {
        setError(data?.error || "Failed to promote run");
      } else {
        setMessage(`Live baseline updated: ${runId}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to promote run"));
    }
    setPromotingRunId("");
  };
  const finalizeRun = async (run) => {
    if (!isAdmin || !run?.run_id) return;
    setFinalizingRunId(run.run_id);
    setMessage(null);
    setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/finalize`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          run_id: run.run_id,
          label: run.label || null,
          description: run.description || null,
          start_date: run.start_date || null,
          end_date: run.end_date || null,
          interval_min: run.interval_min || null,
          ticker_batch: run.ticker_batch || null,
          ticker_universe_count: run?.tickers?.universe_count ?? run?.ticker_universe_count ?? null,
          trader_only: !!run.trader_only,
          keep_open_at_end: !!run.keep_open_at_end,
          low_write: !!run.low_write,
          status: run.status || "completed",
          status_note: "Manual metrics refresh from Runs tab",
        }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) {
        setError(data?.error || "Failed to recompute run metrics");
      } else {
        setMessage(`Run metrics refreshed: ${run.run_id}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to recompute run metrics"));
    }
    setFinalizingRunId("");
  };
  const archiveRun = async (run) => {
    if (!isAdmin || !run?.run_id) return;
    setArchivingRunId(run.run_id);
    setMessage(null);
    setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/archive`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: run.run_id, reason: "Archived from Runs UI" }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) setError(data?.error || "Failed to archive run");
      else {
        setMessage(`Run archived: ${run.run_id}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to archive run"));
    }
    setArchivingRunId("");
  };
  const viewRunDetails = async (runId) => {
    if (!runId) return;
    setDetailRunId(runId);
    setDetailData(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/detail?run_id=${encodeURIComponent(runId)}`, { credentials: "include" });
      const data = await res.json();
      setDetailData(data?.ok ? data : { error: data?.error || "Failed to load run details" });
    } catch (e) {
      setDetailData({ error: String(e || "Failed to load") });
    }
  };
  const deleteRun = async (run) => {
    if (!isAdmin || !run?.run_id) return;
    if (!confirm(`Delete run ${run.run_id}? This removes the run from the registry and purges the active experiment fact store if this run owns it.`)) return;
    setDeletingRunId(run.run_id);
    setMessage(null);
    setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/delete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: run.run_id }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) setError(data?.error || "Failed to delete run");
      else {
        const pf = data?.purged_facts || {};
        setMessage(`Run deleted: ${run.run_id}${(pf.facts || pf.daily) ? ` (purged ${pf.facts || 0} facts / ${pf.daily || 0} daily rows)` : ""}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to delete run"));
    }
    setDeletingRunId("");
  };
  let filteredRuns = showOnlyCompleted ? runs.filter(r => String(r?.status || "").toLowerCase() === "completed") : runs;
  if (hideNoisyPlaceholders) {
    filteredRuns = filteredRuns.filter(r => {
      const status = String(r?.status || "").toLowerCase();
      const totalTrades = Number(r?.trades?.total ?? r?.total_trades ?? 0);
      const isPlaceholder = status === "running" && totalTrades === 0;
      return !isPlaceholder;
    });
  }

  return (
    <div className="space-y-4">
      <div className="card p-4">
        <div className="flex items-center justify-between mb-3">
          <h3 className="text-sm font-semibold text-white">Live Baseline</h3>
          <button className="btn btn-secondary text-xs" onClick={fetchRuns} disabled={loading}>Refresh</button>
        </div>
        {liveSummary ? (
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
            <div><div className="text-slate-500">Run ID</div><div className="text-slate-200 font-mono break-all">{liveSummary.run_id || "—"}</div></div>
            <div><div className="text-slate-500">Date Range</div><div className="text-slate-200">{liveSummary.start_date || "—"} → {liveSummary.end_date || "—"}</div></div>
            <div><div className="text-slate-500">Trades / Win Rate</div><div className="text-slate-200">{fmtNum(liveSummary?.trades?.total)} / {fmtPct(liveSummary?.trades?.win_rate)}</div></div>
            <div><div className="text-slate-500">Realized P&L</div><div className={`${Number(liveSummary?.pnl?.realized || 0) >= 0 ? "text-emerald-400" : "text-rose-400"} font-semibold`}>{fmtMoney(liveSummary?.pnl?.realized)}</div></div>
          </div>
        ) : (
          <p className="text-xs text-slate-500">No live baseline selected yet.</p>
        )}
      </div>

      {message && <div className="p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-xs text-emerald-300">{message}</div>}
      {error && <div className="p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-xs text-rose-300">{error}</div>}

      {detailRunId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={() => setDetailRunId(null)}>
          <div className="card max-w-2xl max-h-[85vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between p-3 border-b border-white/[0.06]">
              <h3 className="text-sm font-semibold text-white">Run Details: {detailRunId?.slice(0, 40)}…</h3>
              <button className="text-slate-400 hover:text-white text-lg" onClick={() => setDetailRunId(null)}>×</button>
            </div>
            <div className="p-3 overflow-auto flex-1 text-xs font-mono text-slate-300 bg-slate-900/50 rounded">
              {detailData ? (
                detailData.error ? (
                  <p className="text-rose-400">{detailData.error}</p>
                ) : (
                  <pre className="whitespace-pre-wrap break-words">{JSON.stringify({
                    summary: detailData.summary,
                    rule_snapshot_meta: detailData.rule_snapshot_meta,
                    rule_snapshot_type: detailData.rule_snapshot?.snapshot_type,
                    rule_snapshot_note: detailData.rule_snapshot?.note,
                    env_flags: detailData.rule_snapshot?.env_flags,
                    tags: detailData.tags,
                  }, null, 2)}</pre>
                )
              ) : (
                <p className="text-slate-500">Loading…</p>
              )}
            </div>
          </div>
        </div>
      )}

      <div className="card overflow-hidden">
        <div className="px-4 py-3 border-b border-white/[0.06]">
          <div className="flex flex-wrap items-center justify-between gap-2">
            <div>
              <h3 className="text-sm font-semibold text-white">Backtest Runs</h3>
              <p className="text-[11px] text-slate-500 mt-1">Track run metrics and promote a specific run ID to live baseline.</p>
            </div>
            <div className="flex flex-wrap items-center gap-4 text-[11px] text-slate-400">
              <label className="inline-flex items-center gap-2">
                <input type="checkbox" checked={showOnlyCompleted} onChange={(e) => setShowOnlyCompleted(e.target.checked)} />
                Show completed only
              </label>
              <label className="inline-flex items-center gap-2">
                <input type="checkbox" checked={showArchived} onChange={(e) => setShowArchived(e.target.checked)} />
                Show archived
              </label>
              <label className="inline-flex items-center gap-2">
                <input type="checkbox" checked={hideNoisyPlaceholders} onChange={(e) => setHideNoisyPlaceholders(e.target.checked)} />
                Hide running (no metrics)
              </label>
            </div>
          </div>
          <p className="text-[10px] text-slate-500 mt-2">Runs with status <span className="text-slate-300 font-semibold">running</span> often show zeros until finalized; use <span className="text-slate-300 font-semibold">Refresh Metrics</span> when needed.</p>
        </div>
        {loading ? (
          <div className="p-5 text-center text-xs text-slate-500">Loading runs...</div>
        ) : filteredRuns.length === 0 ? (
          <div className="p-5 text-center text-xs text-slate-500">No runs found.</div>
        ) : (
          <div className="overflow-auto">
            <table className="w-full text-xs min-w-[1540px]">
              <thead className="bg-white/[0.03] text-slate-500">
                <tr>
                  <th className="px-3 py-2 text-left font-semibold">Run</th>
                  <th className="px-3 py-2 text-left font-semibold">Run Date</th>
                  <th className="px-3 py-2 text-left font-semibold">Description</th>
                  <th className="px-3 py-2 text-left font-semibold">Range</th>
                  <th className="px-3 py-2 text-right font-semibold">Tickers</th>
                  <th className="px-3 py-2 text-right font-semibold">Trades</th>
                  <th className="px-3 py-2 text-right font-semibold">W / L / BE</th>
                  <th className="px-3 py-2 text-right font-semibold">Win Rate</th>
                  <th className="px-3 py-2 text-right font-semibold">P&L</th>
                  <th className="px-3 py-2 text-right font-semibold">Avg W/L %</th>
                  <th className="px-3 py-2 text-left font-semibold">Status Mix</th>
                  <th className="px-3 py-2 text-left font-semibold">Top Classifications</th>
                  <th className="px-3 py-2 text-left font-semibold">Autopsy</th>
                  <th className="px-3 py-2 text-left font-semibold">Actions</th>
                </tr>
              </thead>
              <tbody>
                {filteredRuns.map((r) => {
                  const runId = r.run_id || "";
                  const pnl = Number(r?.pnl?.realized ?? r?.realized_pnl ?? 0);
                  const autopsyUrl = r?.autopsy_url || "#";
                  const tradedCount = r?.tickers?.traded_count ?? r?.total_tickers_traded;
                  const universeCount = r?.tickers?.universe_count ?? r?.ticker_universe_count;
                  const totalTrades = r?.trades?.total ?? r?.total_trades;
                  const wins = r?.trades?.wins ?? r?.wins;
                  const losses = r?.trades?.losses ?? r?.losses;
                  const be = r?.trades?.breakevens ?? r?.breakevens;
                  const winRate = r?.trades?.win_rate ?? r?.win_rate;
                  const avgWinPct = r?.pnl?.avg_win_pct ?? r?.avg_win_pct;
                  const avgLossPct = r?.pnl?.avg_loss_pct ?? r?.avg_loss_pct;
                  const byStatus = parseMetricObj(r?.by_status ?? r?.by_status_json);
                  const classifications = parseMetricObj(r?.classifications ?? r?.classifications_json);
                  const statusTop = topCounts(byStatus, 3);
                  const classTop = topCounts(classifications, 3);
                  const isLive = !!(r?.live_config_slot);
                  const isProtected = !!(r?.is_protected_baseline);
                  const isActiveExperiment = !!(r?.active_experiment_slot);
                  return (
                    <tr key={runId} className="border-t border-white/[0.04] hover:bg-white/[0.02]">
                      <td className="px-3 py-2">
                        <div className="font-mono text-slate-200" title={runId}>{shortRunId(runId)}</div>
                        <div className="text-[10px] text-slate-500">
                          {r?.label || "—"}
                          {isLive ? <span className="ml-1 text-emerald-400 font-semibold">LIVE</span> : null}
                          {isProtected ? <span className="ml-1 text-amber-300 font-semibold">PROTECTED</span> : null}
                          {isActiveExperiment ? <span className="ml-1 text-cyan-300 font-semibold">ACTIVE</span> : null}
                        </div>
                      </td>
                      <td className="px-3 py-2 text-slate-400 text-[11px]" title={r?.started_at ? new Date(Number(r.started_at)).toISOString() : ""}>
                        {fmtRunDate(r?.started_at ?? r?.created_at)}
                      </td>
                      <td className="px-3 py-2 text-slate-300">
                        {editingDescRunId === runId ? (
                          <div className="flex items-center gap-2">
                            <input
                              type="text"
                              className="flex-1 min-w-[120px] px-2 py-1 text-xs bg-slate-800 border border-white/20 rounded text-slate-200"
                              value={editingDescValue}
                              onChange={(e) => setEditingDescValue(e.target.value)}
                              placeholder="Description"
                              autoFocus
                            />
                            <button className="text-emerald-400 text-[10px] hover:underline" disabled={savingDescRunId === runId} onClick={() => updateRunDescription(runId, editingDescValue)}>
                              {savingDescRunId === runId ? "Saving…" : "Save"}
                            </button>
                            <button className="text-slate-400 text-[10px] hover:underline" onClick={() => { setEditingDescRunId(null); setEditingDescValue(""); }}>Cancel</button>
                          </div>
                        ) : (
                          <span
                            className={isAdmin ? "cursor-pointer hover:text-white hover:underline" : ""}
                            title={isAdmin ? "Click to edit" : ""}
                            onClick={() => isAdmin && (setEditingDescRunId(runId), setEditingDescValue(r?.description || r?.status_note || ""))}
                          >
                            {r?.description || r?.status_note || "—"}
                          </span>
                        )}
                      </td>
                      <td className="px-3 py-2 text-slate-300">{r?.start_date || "—"} → {r?.end_date || "—"}</td>
                      <td className="px-3 py-2 text-right text-slate-300">{fmtNum(tradedCount)} / {fmtNum(universeCount)}</td>
                      <td className="px-3 py-2 text-right text-slate-300">{fmtNum(totalTrades)}</td>
                      <td className="px-3 py-2 text-right text-slate-300">{fmtNum(wins)} / {fmtNum(losses)} / {fmtNum(be)}</td>
                      <td className="px-3 py-2 text-right text-slate-300">{fmtPct(winRate)}</td>
                      <td className={`px-3 py-2 text-right font-semibold ${pnl >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{fmtMoney(pnl)}</td>
                      <td className="px-3 py-2 text-right">
                        <div className="text-emerald-400">{fmtPct(avgWinPct)}</div>
                        <div className="text-rose-400">{fmtPct(avgLossPct)}</div>
                      </td>
                      <td className="px-3 py-2 text-slate-300">
                        {statusTop.length ? statusTop.map(([k, v]) => `${k}:${v}`).join("  ") : "—"}
                      </td>
                      <td className="px-3 py-2 text-slate-300">
                        {classTop.length ? classTop.map(([k, v]) => `${k}:${v}`).join("  ") : "—"}
                      </td>
                      <td className="px-3 py-2">
                        <div className="flex flex-wrap items-center gap-2">
                          <button className="text-cyan-300 hover:text-cyan-200 underline text-[11px]" onClick={() => viewRunDetails(runId)}>Details</button>
                          {autopsyUrl && autopsyUrl !== "#" ? (
                            <a className="text-cyan-300 hover:text-cyan-200 underline text-[11px]" href={autopsyUrl}>Autopsy</a>
                          ) : (
                            <span className="text-slate-500 text-[11px]">—</span>
                          )}
                          {isAdmin ? (
                            <button
                              className="text-cyan-300 hover:text-cyan-200 underline text-[11px]"
                              onClick={() => {
                                if (compareRuns?.length === 1 && compareRuns[0]?.run_id === runId) setCompareRuns(null);
                                else if (compareRuns?.length === 1) setCompareRuns([compareRuns[0], r]);
                                else setCompareRuns([r]);
                              }}
                            >
                              {compareRuns?.length === 1 && compareRuns[0]?.run_id === runId ? "Cancel" : "Compare"}
                            </button>
                          ) : null}
                        </div>
                      </td>
                      <td className="px-3 py-2">
                        {isAdmin ? (
                          <div className="flex items-center gap-2">
                            <button
                              className="btn text-[11px]"
                              style={{ background: "rgba(251,191,36,0.15)", color: "#fcd34d", border: "1px solid rgba(251,191,36,0.25)", padding: "5px 10px" }}
                              disabled={finalizingRunId === runId}
                              onClick={() => finalizeRun(r)}
                            >
                              {finalizingRunId === runId ? "Refreshing..." : "Refresh Metrics"}
                            </button>
                            <button
                              className="btn text-[11px]"
                              style={{ background: "rgba(100,116,139,0.15)", color: "#94a3b8", border: "1px solid rgba(100,116,139,0.3)", padding: "5px 10px" }}
                              onClick={() => viewRunDetails(runId)}
                            >
                              View
                            </button>
                            {isProtected ? (
                              <button
                                className="btn text-[11px]"
                                style={{ background: "rgba(139,92,246,0.15)", color: "#c4b5fd", border: "1px solid rgba(139,92,246,0.3)", padding: "5px 10px" }}
                                onClick={() => { setVariantRunId(runId); setVariantData(null); fetch(`${API_BASE}/timed/admin/runs/detail?run_id=${encodeURIComponent(runId)}`, { credentials: "include" }).then(x => x.json()).then(d => d?.ok && setVariantData(d)); }}
                              >
                                Create Variant
                              </button>
                            ) : null}
                            <button
                              className="btn text-[11px]"
                              style={{ background: isLive ? "rgba(16,185,129,0.15)" : "rgba(29,78,216,0.2)", color: isLive ? "#6ee7b7" : "#93c5fd", border: "1px solid rgba(147,197,253,0.25)", padding: "5px 10px" }}
                              disabled={isLive || promotingRunId === runId}
                              onClick={() => promoteRun(runId)}
                            >
                              {isLive ? "Live" : (promotingRunId === runId ? "Promoting..." : "Promote Live")}
                            </button>
                            <button
                              className="btn text-[11px]"
                              style={{ background: "rgba(148,163,184,0.12)", color: "#cbd5e1", border: "1px solid rgba(148,163,184,0.22)", padding: "5px 10px" }}
                              disabled={archivingRunId === runId || isLive}
                              onClick={() => archiveRun(r)}
                            >
                              {archivingRunId === runId ? "Archiving..." : "Archive"}
                            </button>
                            <button
                              className="btn text-[11px]"
                              style={{ background: "rgba(239,68,68,0.14)", color: "#fca5a5", border: "1px solid rgba(239,68,68,0.22)", padding: "5px 10px" }}
                              disabled={deletingRunId === runId || isLive || isProtected}
                              onClick={() => deleteRun(r)}
                            >
                              {deletingRunId === runId ? "Deleting..." : "Delete Run"}
                            </button>
                          </div>
                        ) : (
                          <span className="text-slate-500">Admin only</span>
                        )}
                      </td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </div>

      {compareRuns?.length === 2 && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={() => setCompareRuns(null)}>
          <div className="bg-slate-800 border border-white/10 rounded-lg shadow-xl max-w-4xl w-full max-h-[85vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="px-4 py-3 border-b border-white/10 flex items-center justify-between">
              <h3 className="text-sm font-semibold text-white">Compare Runs</h3>
              <button className="text-slate-400 hover:text-white text-lg leading-none" onClick={() => setCompareRuns(null)}>&times;</button>
            </div>
            <div className="p-4 overflow-auto grid grid-cols-2 gap-4 text-xs">
              {compareRuns.map((run, i) => {
                const t = run?.trades ?? {};
                const p = run?.pnl ?? {};
                return (
                  <div key={run?.run_id || i} className="bg-slate-900/50 rounded p-3 space-y-2">
                    <div className="font-mono text-slate-200 truncate" title={run?.run_id}>{shortRunId(run?.run_id)}</div>
                    <div className="text-slate-500">{run?.label || "—"}</div>
                    <div className="grid grid-cols-2 gap-2 text-slate-300">
                      <div>Range</div><div>{run?.start_date || "—"} → {run?.end_date || "—"}</div>
                      <div>Trades</div><div>{fmtNum(t?.total ?? run?.total_trades)}</div>
                      <div>W / L / BE</div><div>{fmtNum(t?.wins ?? run?.wins)} / {fmtNum(t?.losses ?? run?.losses)} / {fmtNum(t?.breakevens ?? run?.breakevens)}</div>
                      <div>Win Rate</div><div>{fmtPct(t?.win_rate ?? run?.win_rate)}</div>
                      <div>P&L</div><div className={Number(p?.realized ?? run?.realized_pnl ?? 0) >= 0 ? "text-emerald-400" : "text-rose-400"}>{fmtMoney(p?.realized ?? run?.realized_pnl)}</div>
                      <div>Avg W/L %</div><div><span className="text-emerald-400">{fmtPct(p?.avg_win_pct ?? run?.avg_win_pct)}</span> / <span className="text-rose-400">{fmtPct(p?.avg_loss_pct ?? run?.avg_loss_pct)}</span></div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {variantRunId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 p-4" onClick={() => { setVariantRunId(null); setVariantData(null); }}>
          <div className="bg-slate-800 border border-white/10 rounded-lg shadow-xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="px-4 py-3 border-b border-white/10 flex items-center justify-between">
              <h3 className="text-sm font-semibold text-white">Create Variant: {shortRunId(variantRunId)}</h3>
              <button className="text-slate-400 hover:text-white text-lg leading-none" onClick={() => { setVariantRunId(null); setVariantData(null); }}>&times;</button>
            </div>
            <div className="p-4 overflow-auto text-xs space-y-3">
              <p className="text-slate-400">Review the rule snapshot from this baseline. To launch a variant backtest, run:</p>
              <div className="relative">
                <pre className="bg-slate-900/50 p-3 pr-20 rounded font-mono text-slate-300 overflow-x-auto">
{`./scripts/full-backtest.sh --trader-only --low-write --keep-open-at-end \\
  2025-07-01 2025-07-31 15 --label=variant-from-baseline`}
                </pre>
                <button
                  className="absolute top-2 right-2 px-2 py-1 text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 rounded border border-white/10"
                  onClick={() => { navigator.clipboard.writeText('./scripts/full-backtest.sh --trader-only --low-write --keep-open-at-end 2025-07-01 2025-07-31 15 --label=variant-from-baseline'); setMessage('Command copied to clipboard'); setTimeout(() => setMessage(null), 2000); }}
                >
                  Copy
                </button>
              </div>
              {!variantData ? (
                <p className="text-slate-500">Loading run details…</p>
              ) : (
                <>
                  {variantData?.rule_snapshot?.env_flags && (
                    <div>
                      <div className="text-slate-500 mb-1">Env flags (at capture)</div>
                      <pre className="bg-slate-900/50 p-3 rounded font-mono text-slate-300 overflow-x-auto">{JSON.stringify(variantData.rule_snapshot.env_flags, null, 2)}</pre>
                    </div>
                  )}
                  {variantData?.rule_snapshot_meta && (
                    <div className="text-slate-500">Snapshot: {variantData.rule_snapshot_meta.ready ? "Ready" : "—"} · {variantData.rule_snapshot_meta.source || "—"}</div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      )}

      {detailRunId && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/60" onClick={() => { setDetailRunId(null); setDetailData(null); }}>
          <div className="bg-slate-800 border border-white/10 rounded-lg shadow-xl max-w-2xl w-full max-h-[85vh] overflow-hidden flex flex-col" onClick={e => e.stopPropagation()}>
            <div className="px-4 py-3 border-b border-white/10 flex items-center justify-between">
              <h3 className="text-sm font-semibold text-white">Run details: {shortRunId(detailRunId)}</h3>
              <button className="text-slate-400 hover:text-white text-lg leading-none" onClick={() => { setDetailRunId(null); setDetailData(null); }}>&times;</button>
            </div>
            <div className="p-4 overflow-auto flex-1 text-xs">
              {loadingDetail ? (
                <p className="text-slate-500">Loading...</p>
              ) : detailData ? (
                <div className="space-y-3">
                  {detailData.summary && (
                    <div>
                      <div className="text-slate-500 mb-1">Summary</div>
                      <div className="text-slate-300 font-mono bg-slate-900/50 p-3 rounded overflow-x-auto">
                        {JSON.stringify(detailData.summary, null, 2)}
                      </div>
                    </div>
                  )}
                  {detailData.rule_snapshot_meta && (
                    <div>
                      <div className="text-slate-500 mb-1">Rule snapshot</div>
                      <div className="text-slate-300 font-mono bg-slate-900/50 p-3 rounded">
                        Ready: {detailData.rule_snapshot_meta.ready ? "Yes" : "No"}
                        {detailData.rule_snapshot_meta.source && ` · Source: ${detailData.rule_snapshot_meta.source}`}
                        {detailData.rule_snapshot_meta.stage && ` · Stage: ${detailData.rule_snapshot_meta.stage}`}
                        {detailData.rule_snapshot?.note && (
                          <div className="mt-2 text-amber-300/90">{detailData.rule_snapshot.note}</div>
                        )}
                      </div>
                    </div>
                  )}
                  {detailData.rule_snapshot && detailData.rule_snapshot.env_flags && (
                    <div>
                      <div className="text-slate-500 mb-1">Env flags (at capture)</div>
                      <div className="text-slate-300 font-mono bg-slate-900/50 p-3 rounded overflow-x-auto">
                        {JSON.stringify(detailData.rule_snapshot.env_flags, null, 2)}
                      </div>
                    </div>
                  )}
                </div>
              ) : (
                <p className="text-slate-500">No data</p>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState("dashboard");
  const [dashboard, setDashboard] = useState(null);
  const [report, setReport] = useState(null);
  const [recs, setRecs] = useState(null);
  const [reportId, setReportId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [running, setRunning] = useState(false);
  const [queued, setQueued] = useState(false);
  const [progress, setProgress] = useState(null);
  const preCalibReportIdRef = React.useRef(null);
  const [applying, setApplying] = useState(false);
  const [appliedMsg, setAppliedMsg] = useState(null);
  const [resetting, setResetting] = useState(false);
  const [resetMsg, setResetMsg] = useState(null);
  const [error, setError] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const pollIntervalRef = React.useRef(null);
  const statusPollRef = React.useRef(null);

  useEffect(() => {
    const session = window.TimedAuthHelpers?.getStoredSession();
    const r = String(session?.role || "").toLowerCase();
    const t = String(session?.tier || "").toLowerCase();
    const admin = r === "admin" || t === "admin";
    document.body.setAttribute("data-user-role", admin ? "admin" : (session?.role || ""));
    setIsAdmin(admin);
  }, []);

  const fetchData = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const [dashRes, reportRes] = await Promise.all([
        fetch(`${API_BASE}/timed/system/dashboard`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" }).then(r => r.json()).catch(() => null),
      ]);
      if (dashRes?.ok) setDashboard(dashRes);
      if (reportRes?.ok) {
        setReport(reportRes.report);
        setRecs(reportRes.recommendations);
        setReportId(reportRes.report_id);
      }
    } catch (e) { setError(String(e)); }
    setLoading(false);
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);

  // Poll status when queued
  useEffect(() => {
    if (!queued) return;
    const fetchStatus = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/calibration/status`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          if (data.ok) {
            setProgress({ message: data.message, step: data.step, total_steps: data.total_steps, steps: data.steps, status: data.status });
            if (data.status === "error" && data.message) {
              setError(data.message);
              setQueued(false);
            }
            // When status reports "done", fetch the new report and finish
            if (data.status === "done") {
              try {
                const rptRes = await fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" });
                const rptData = await rptRes.json();
                if (rptData.ok && rptData.report) {
                  setReport(rptData.report); setRecs(rptData.recommendations); setReportId(rptData.report_id);
                }
              } catch (_) {}
              setQueued(false);
              fetchData();
            }
          }
        }
      } catch (_) {}
    };
    fetchStatus();
    statusPollRef.current = setInterval(fetchStatus, 3000);
    return () => { if (statusPollRef.current) clearInterval(statusPollRef.current); statusPollRef.current = null; };
  }, [queued]);

  useEffect(() => {
    if (!queued) return;
    const tick = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          // Only treat as "done" if this is a NEW report (different from the one before we clicked Run)
          if (data.ok && data.report && data.report_id && data.report_id !== preCalibReportIdRef.current) {
            setReport(data.report); setRecs(data.recommendations); setReportId(data.report_id);
            setQueued(false); setProgress(null);
            if (pollIntervalRef.current) clearInterval(pollIntervalRef.current);
            fetchData();
            return;
          }
        }
      } catch (_) {}
    };
    pollIntervalRef.current = setInterval(tick, 15000);
    return () => { if (pollIntervalRef.current) clearInterval(pollIntervalRef.current); };
  }, [queued]);

  const handleRun = async () => {
    setRunning(true); setError(null);
    preCalibReportIdRef.current = reportId;
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/run`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ analysis_only: true }), credentials: "include" });
      const data = await res.json();
      if (data.ok && data.report) { setReport(data.report); setRecs(data.report?.recommendations); setReportId(data.report?.report_id || reportId); fetchData(); }
      else if (!data.ok) setError(data.error || "Analysis failed");
    } catch (e) { setError(String(e)); }
    setRunning(false);
  };
  const handleApply = async (id) => {
    setApplying(true); setAppliedMsg(null);
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/apply`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ report_id: id }), credentials: "include" });
      const data = await res.json();
      if (data.ok) setAppliedMsg(`Applied: ${data.applied?.join(", ")}`);
      else setError(data.error);
    } catch (e) { setError(String(e)); }
    setApplying(false);
  };
  const handleReset = async () => {
    if (!confirm("This will permanently delete ALL trades and reset the account to $100,000. Continue?")) return;
    setResetting(true); setResetMsg(null); setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/trades/reset`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}", credentials: "include" });
      const data = await res.json();
      if (data.ok) { setResetMsg(data.message || "Account reset to $100,000."); setReport(null); setRecs(null); fetchData(); }
      else setError(data.error || "Reset failed");
    } catch (e) { setError(String(e)); }
    setResetting(false);
  };
  const handleViewReport = async (rid) => {
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/report?report_id=${rid}`, { credentials: "include" });
      const data = await res.json();
      if (data.ok) { setReport(data.report); setRecs(data.recommendations); setReportId(data.report_id); setTab("analysis"); }
    } catch (_) {}
  };

  const tabs = [
    { id: "dashboard", label: "Dashboard" },
    { id: "analysis", label: "Analysis" },
    ...(isAdmin ? [{ id: "runs", label: "Runs" }] : []),
    { id: "patterns", label: "Patterns & Learning" },
    { id: "history", label: "History" },
  ];

  return (
    <div className="min-h-screen pb-16">
      <NavHeader />
      <div className="max-w-[1520px] mx-auto px-4 py-6">
        <div className="flex items-center justify-between mb-5">
          <div>
            <h1 className="text-xl font-bold text-white">System Intelligence</h1>
            <p className="text-xs text-slate-400 mt-1">Unified calibration, model performance, and learning loop</p>
          </div>
          {isAdmin && (
            <div className="flex items-center gap-2">
              <button className="btn btn-primary text-xs" onClick={handleRun} disabled={running}>
                {running ? <span className="flex items-center gap-1.5"><span className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full" style={{animation:"spin 0.7s linear infinite"}} />Analyzing...</span> : "Run Analysis"}
              </button>
              <button className="btn text-xs" style={{background:"rgba(239,68,68,0.15)", color:"#fca5a5", border:"1px solid rgba(239,68,68,0.25)"}} onClick={handleReset} disabled={resetting}>
                {resetting ? <span className="flex items-center gap-1.5"><span className="w-3 h-3 border-2 border-rose-400/30 border-t-rose-400 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />Resetting...</span> : "Reset Account"}
              </button>
            </div>
          )}
        </div>

        {isAdmin && (
          <div className="mb-4 p-3 rounded-lg border text-xs" style={{background:"rgba(99,102,241,0.06)", borderColor:"rgba(99,102,241,0.2)"}}>
            <p className="text-indigo-300 font-medium mb-1">Local Calibration Pipeline</p>
            <p className="text-slate-400">Full calibration (harvest + autopsy) runs locally for reliability. Upload data, then click <span className="text-white font-medium">Run Analysis</span> to build profiles.</p>
            <code className="block mt-1.5 text-[10px] text-slate-500 bg-white/[0.04] rounded px-2 py-1 font-mono">node scripts/calibrate.js</code>
          </div>
        )}
        {error && <div className="mb-4 p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-sm text-rose-300">{error}</div>}
        {resetMsg && <div className="mb-4 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-sm text-emerald-300">{resetMsg}</div>}

        {/* Main tabs */}
        <div className="flex gap-1 border-b border-white/[0.06] mb-5 overflow-x-auto">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-2 text-xs font-medium whitespace-nowrap ${tab === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
          ))}
        </div>

        {loading && tab === "dashboard" ? (
          <div className="flex items-center justify-center py-20">
            <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />
          </div>
        ) : (
          <>
            {tab === "dashboard" && <DashboardTab dashboard={dashboard} />}
            {tab === "analysis" && <UnifiedAnalysisTab report={report} recs={recs} reportId={reportId} onApply={handleApply} applying={applying} appliedMsg={appliedMsg} />}
            {tab === "runs" && <RunsTab isAdmin={isAdmin} />}
            {tab === "patterns" && <PatternsTab />}
            {tab === "history" && <HistoryTab onViewReport={handleViewReport} />}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
