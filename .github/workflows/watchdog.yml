name: Health watchdog

# External watchdog that lives OUTSIDE the worker (full-system-review
# R5). Until now all monitoring ran inside the worker being monitored —
# when the worker was fully wedged, nothing paged until the operator
# opened Mission Control.
#
# Every 30 minutes: hit /timed/health, check (a) it answers ok:true,
# (b) the 5-min cron heartbeat is fresh during operating hours, (c) the
# tombstone count is sane, (d) tt-feed freshness when it owns the price
# feed AND the feed cron window is active, (e) universe orphan count stays
# below threshold. On failure the
# run goes red (GitHub emails the repo owner) and, if
# DISCORD_SYSTEM_WEBHOOK_URL is configured as a repo secret, posts to
# the system Discord lane.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: health-watchdog
  cancel-in-progress: false

jobs:
  check:
    name: probe /timed/health
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Probe health
        id: probe
        run: |
          FAILED=""
          DETAIL=""

          # Retry wrapper — transient network blips should not page.
          fetch_health() {
            local url="$1"
            local attempt body
            for attempt in 1 2 3; do
              body=$(curl -s -m 25 "$url" || echo "{}")
              if echo "$body" | jq -e . >/dev/null 2>&1; then
                echo "$body"
                return 0
              fi
              sleep $((attempt * 3))
            done
            echo "$body"
            return 1
          }

          # Authoritative session flags from the monolith workers.dev probe.
          MONOLITH_OP_HOURS="false"
          MONOLITH_NY_RTH="false"

          for BASE in "https://timed-trading-ingest.shashant.workers.dev" "https://timed-trading.com"; do
            HEALTH=$(fetch_health "$BASE/timed/health" || echo "{}")

            if ! echo "$HEALTH" | jq -e . >/dev/null 2>&1; then
              if echo "$HEALTH" | grep -qi "challenges.cloudflare.com\|Just a moment"; then
                echo "::warning::$BASE served a Cloudflare bot challenge to the watchdog (curl). Add a WAF skip rule for /timed/health to restore custom-domain probing."
                echo "$BASE → SKIPPED (cf bot challenge)"
              else
                FAILED="yes"; DETAIL="$DETAIL $BASE: non-JSON health response after retries."
                echo "$BASE → FAILED (non-JSON response: $(echo "$HEALTH" | head -c 120 | tr -d '\n'))"
              fi
              continue
            fi

            OK=$(echo "$HEALTH" | jq -r '.ok // false')
            TICK=$(echo "$HEALTH" | jq -r '.cronTickAgeMin // "null"')
            FAILS=$(echo "$HEALTH" | jq -r '.cronFailures.count // 0')
            OPS=$(echo "$HEALTH" | jq -r '(.cronFailures.ops // []) | join(",")')
            TRACKED=$(echo "$HEALTH" | jq -r '.cronFailures.tracked // "?"')
            SCORING=$(echo "$HEALTH" | jq -r '.minutesSinceScoring // "null"')
            FEEDAGE=$(echo "$HEALTH" | jq -r '.pricesAgeSec // "null"')
            NY_RTH=$(echo "$HEALTH" | jq -r '.nyRthOpen // false')
            OP_HOURS=$(echo "$HEALTH" | jq -r '.operatingHours // false')
            ORPHANS=$(echo "$HEALTH" | jq -r '.universe_onboard.orphans // "null"')
            ORPHAN_AGE=$(echo "$HEALTH" | jq -r '.universe_onboard.orphan_age_min // "null"')
            ORPHAN_SAMPLE=$(echo "$HEALTH" | jq -r '(.universe_onboard.orphan_sample // []) | join(",")')
            FEED_EXT=$(echo "$HEALTH" | jq -r '.universe_onboard.feed_external // false')
            echo "$BASE → ok=$OK cronTickAgeMin=$TICK scoringAgeMin=$SCORING feedAgeSec=$FEEDAGE orphans=$ORPHANS nyRthOpen=$NY_RTH operatingHours=$OP_HOURS activeFailures=$FAILS (tracked=$TRACKED) [$OPS]"

            if [ "$BASE" = "https://timed-trading-ingest.shashant.workers.dev" ]; then
              MONOLITH_OP_HOURS="$OP_HOURS"
              MONOLITH_NY_RTH="$NY_RTH"
            fi

            if [ "$OK" != "true" ]; then
              FAILED="yes"; DETAIL="$DETAIL $BASE: health endpoint not ok."
              continue
            fi

            if [ "$OP_HOURS" = "true" ]; then
              if [ "$TICK" != "null" ]; then
                TICK_INT=$(printf "%.0f" "$TICK")
                if [ "$TICK_INT" -gt 20 ]; then
                  FAILED="yes"; DETAIL="$DETAIL $BASE: 5-min cron heartbeat is ${TICK_INT}min stale during operating hours."
                fi
              fi
              if [ "$FEEDAGE" != "null" ] && [ "$FEEDAGE" -gt 600 ]; then
                FAILED="yes"; DETAIL="$DETAIL $BASE: timed:prices is ${FEEDAGE}s stale during operating hours."
              fi
              if [ "$SCORING" != "null" ]; then
                SCORING_INT=$(printf "%.0f" "$SCORING")
                if [ "$SCORING_INT" -gt 30 ]; then
                  FAILED="yes"; DETAIL="$DETAIL $BASE: scoring loop is ${SCORING_INT}min stale during operating hours (engine worker down?)."
                fi
              fi
            fi

            if [ "$NY_RTH" = "true" ]; then
              STALESYMS=$(echo "$HEALTH" | jq -r '.staleSymbolCount // "null"')
              if [ "$STALESYMS" != "null" ] && [ "$STALESYMS" -gt 5 ]; then
                STALELIST=$(echo "$HEALTH" | jq -r '(.staleSymbols // []) | join(",")')
                FAILED="yes"; DETAIL="$DETAIL $BASE: ${STALESYMS} symbols stale despite sweep (${STALELIST})."
              fi
              FRESH_STALE=$(echo "$HEALTH" | jq -r '.freshness.stale // "null"')
              FRESH_SLO=$(echo "$HEALTH" | jq -r '.freshness.slo_ok // true')
              if [ "$FRESH_STALE" != "null" ] && [ "$FRESH_STALE" -gt 25 ]; then
                FRESH_LIST=$(echo "$HEALTH" | jq -r '(.freshness.stale_tickers // []) | map(.ticker) | join(",")')
                FAILED="yes"; DETAIL="$DETAIL $BASE: ${FRESH_STALE} tickers quarantined by the Data Age Contract (${FRESH_LIST})."
              elif [ "$FRESH_STALE" != "null" ] && [ "$FRESH_STALE" -gt 10 ] && [ "$FRESH_SLO" != "true" ]; then
                FRESH_LIST=$(echo "$HEALTH" | jq -r '(.freshness.stale_tickers // []) | map(.ticker) | join(",")')
                FAILED="yes"; DETAIL="$DETAIL $BASE: ${FRESH_STALE} tickers quarantined by the Data Age Contract — freshness SLO breached (${FRESH_LIST})."
              fi
            fi

            # Universe orphans — registry tickers missing candles/profile/score.
            # Snapshot refreshed hourly by onboard-gaps heal cron; stale snapshot
            # (>3h) is a signal the heal cron itself may be wedged.
            if [ "$ORPHANS" != "null" ] && [ "$ORPHANS" -gt 15 ]; then
              FAILED="yes"; DETAIL="$DETAIL $BASE: ${ORPHANS} universe orphans (incomplete onboard: ${ORPHAN_SAMPLE})."
            fi
            if [ "$ORPHAN_AGE" != "null" ] && [ "$ORPHAN_AGE" -gt 180 ] && [ "$ORPHANS" != "null" ] && [ "$ORPHANS" -gt 0 ]; then
              FAILED="yes"; DETAIL="$DETAIL $BASE: orphan snapshot is ${ORPHAN_AGE}min stale with ${ORPHANS} orphans (onboard heal cron stuck?)."
            fi

            if [ "$FAILS" -gt 5 ]; then
              FAILED="yes"; DETAIL="$DETAIL $BASE: $FAILS cron tombstones active ($OPS)."
            fi
          done

          # tt-feed owns the */1 price feed after cutover — probe it directly
          # so a healthy monolith + dead feed cannot slip through.
          FEED_HEALTH=$(fetch_health "https://tt-feed.shashant.workers.dev/feed/health" || echo "{}")
          if echo "$FEED_HEALTH" | jq -e . >/dev/null 2>&1; then
            FEED_OK=$(echo "$FEED_HEALTH" | jq -r '.ok // false')
            FEED_ENABLED=$(echo "$FEED_HEALTH" | jq -r '.feed_enabled // false')
            FEED_AGE=$(echo "$FEED_HEALTH" | jq -r '.prices_age_sec // "null"')
            FEED_OP_HOURS=$(echo "$FEED_HEALTH" | jq -r '.operating_hours // false')
            FEED_CRON=$(echo "$FEED_HEALTH" | jq -r '.price_feed_cron_active // false')
            FEED_MODE=$(echo "$FEED_HEALTH" | jq -r '.feed_mode // "?"')
            echo "tt-feed → ok=$FEED_OK feed_enabled=$FEED_ENABLED prices_age_sec=$FEED_AGE mode=$FEED_MODE cron_active=$FEED_CRON operating_hours=$FEED_OP_HOURS"
            if [ "$FEED_OK" != "true" ]; then
              FAILED="yes"; DETAIL="$DETAIL tt-feed: /feed/health not ok."
            elif [ "$FEED_ENABLED" = "true" ] && [ "$FEED_AGE" != "null" ] && [ "$FEED_AGE" -gt 600 ]; then
              # Match monolith gates: stale timed:prices is expected when the
              # feed cron window is quiet (e.g. Saturday afternoon) or outside
              # operating hours. computeFeedWindow() in worker/feed/feed-window.js.
              if [ "$MONOLITH_OP_HOURS" != "true" ] && [ "$FEED_OP_HOURS" != "true" ]; then
                echo "::notice::tt-feed prices ${FEED_AGE}s stale outside operating hours — expected when feed cron is quiet."
              elif [ "$FEED_CRON" != "true" ]; then
                echo "::notice::tt-feed prices ${FEED_AGE}s stale but price_feed_cron_active=false (quiet window) — skip."
              else
                FAILED="yes"; DETAIL="$DETAIL tt-feed: owns price feed but timed:prices is ${FEED_AGE}s stale during active feed window."
              fi
            fi
          else
            echo "::warning::tt-feed /feed/health returned non-JSON — skipping feed probe."
          fi

          # B2 (2026-07-03 stabilization plan): end-to-end chain smoke.
          # Walks feed → candles → scoring → overlay for sentinel tickers and
          # names the LINK that broke instead of a downstream symptom.
          # Links report "idle" outside their session window and never fail.
          CHAIN=$(fetch_health "https://timed-trading-ingest.shashant.workers.dev/timed/health/chain" || echo "{}")
          if echo "$CHAIN" | jq -e . >/dev/null 2>&1 && [ "$(echo "$CHAIN" | jq -r 'has("links")')" = "true" ]; then
            CHAIN_OK=$(echo "$CHAIN" | jq -r '.ok // false')
            CHAIN_LINKS=$(echo "$CHAIN" | jq -r '[.links | to_entries[] | "\(.key)=\(.value.status)"] | join(" ")')
            echo "chain-smoke → ok=$CHAIN_OK $CHAIN_LINKS"
            if [ "$CHAIN_OK" != "true" ]; then
              CHAIN_FAILING=$(echo "$CHAIN" | jq -r '(.failing_links // []) | join(",")')
              CHAIN_DETAIL=$(echo "$CHAIN" | jq -r '[.links | to_entries[] | select(.value.status == "fail") | "\(.key): \(.value.detail // "?")"] | join("; ")')
              FAILED="yes"; DETAIL="$DETAIL chain-smoke: broken link(s) [$CHAIN_FAILING] — $CHAIN_DETAIL."
            fi
          else
            echo "::warning::/timed/health/chain returned non-JSON or is not deployed yet — skipping chain smoke."
          fi

          if [ -n "$FAILED" ]; then
            echo "detail=$DETAIL" >> "$GITHUB_OUTPUT"
            echo "failed=true" >> "$GITHUB_OUTPUT"
            echo "::error::Watchdog failed:$DETAIL"
          else
            echo "failed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Page Discord
        if: steps.probe.outputs.failed == 'true'
        env:
          WEBHOOK: ${{ secrets.DISCORD_SYSTEM_WEBHOOK_URL }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "No DISCORD_SYSTEM_WEBHOOK_URL secret — relying on red-run email."
          else
            DETAIL="${{ steps.probe.outputs.detail }}"
            curl -s -m 15 -X POST "$WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg d "$DETAIL" '{embeds:[{title:"External watchdog: Timed Trading health check failed",description:$d,color:15548997}]}')" || true
          fi

      - name: Fail run on probe failure
        if: steps.probe.outputs.failed == 'true'
        run: exit 1
