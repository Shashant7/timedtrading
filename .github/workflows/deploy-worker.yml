name: Deploy worker

# Auto-deploys worker/index.js to Cloudflare Workers (timed-trading-ingest)
# whenever the worker source changes on main.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — https://dash.cloudflare.com/profile/api-tokens
#                            using the "Edit Cloudflare Workers" template.
#                            Or one of the aliases checked below.
#   CLOUDFLARE_ACCOUNT_ID  — right sidebar of any Cloudflare dashboard page.
#                            Or one of the aliases checked below.
#
# If the secrets aren't configured the workflow SKIPS the deploy step with
# a warning (instead of failing). That way merging worker changes doesn't
# spam failure emails until secrets are configured; once you add them, the
# next merge auto-deploys.

on:
  push:
    branches: [main]
    paths:
      - "worker/**"
      # The worker embeds react-app-dist/simulation-dashboard.html (built
      # from react-app/ + scripts/build-frontend.js + scripts/embed-dashboard.js),
      # so any of these inputs can change what actually ships in the worker.
      - "react-app/**"
      - "scripts/build-frontend.js"
      - "scripts/embed-dashboard.js"
      - "package.json"
      - "scripts/deploy-wrangler-retry.sh"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:  # Manual re-deploy from the Actions tab

concurrency:
  # 2026-06-22 — Per-worker group. Previously all three deploy workflows
  # (worker / engine / research) shared `deploy-monolith-bundle`. GitHub
  # only keeps ONE pending run per concurrency group, so when all three fire
  # on the same `worker/**` push, one runs, one pends, and the third is
  # CANCELLED — consistently "Deploy research worker". That left tt-research
  # (Daily Brief + investor crons) permanently behind on CI. Each workflow
  # now serializes against ITSELF only. Concurrent wrangler uploads can hit
  # Cloudflare API 10013; scripts/deploy-wrangler-retry.sh already retries.
  group: deploy-worker-monolith
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # wrangler >= 4.92.0 requires Node >= 22 (engine check, not just a warning).
          # Last 4 deploys (#184, #187, #194, #196) failed because the runner was on
          # Node 20 and `npx wrangler` aborted before any deploy occurred.
          node-version: "22"

      # Check the standard secret names AND a couple of common aliases.
      # Sets `secrets-ok=true` on the step output when both a token and
      # an account ID are found.
      - name: Resolve Cloudflare secrets
        id: cfsec
        env:
          CF_TOKEN_A: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_TOKEN_B: ${{ secrets.CF_API_TOKEN }}
          CF_TOKEN_C: ${{ secrets.CLOUDFLARE_TOKEN }}
          CF_ACCT_A:  ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ACCT_B:  ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          CF_TOKEN=""
          CF_ACCT=""
          if   [ -n "$CF_TOKEN_A" ]; then CF_TOKEN="$CF_TOKEN_A"; SRC_T="CLOUDFLARE_API_TOKEN";
          elif [ -n "$CF_TOKEN_B" ]; then CF_TOKEN="$CF_TOKEN_B"; SRC_T="CF_API_TOKEN";
          elif [ -n "$CF_TOKEN_C" ]; then CF_TOKEN="$CF_TOKEN_C"; SRC_T="CLOUDFLARE_TOKEN";
          fi
          if   [ -n "$CF_ACCT_A" ];  then CF_ACCT="$CF_ACCT_A";   SRC_A="CLOUDFLARE_ACCOUNT_ID";
          elif [ -n "$CF_ACCT_B" ];  then CF_ACCT="$CF_ACCT_B";   SRC_A="CF_ACCOUNT_ID";
          fi
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCT" ]; then
            echo "::warning::Cloudflare API token or Account ID not configured."
            echo "::warning::Worker auto-deploy is SKIPPED. Configure repo secrets:"
            echo "::warning::  CLOUDFLARE_API_TOKEN (or CF_API_TOKEN / CLOUDFLARE_TOKEN)"
            echo "::warning::  CLOUDFLARE_ACCOUNT_ID (or CF_ACCOUNT_ID)"
            echo "::warning::See https://developers.cloudflare.com/fundamentals/api/get-started/create-token/"
            echo "secrets-ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "✓ Found secrets (token: $SRC_T length=${#CF_TOKEN}, account: $SRC_A length=${#CF_ACCT})"
          echo "secrets-ok=true" >> "$GITHUB_OUTPUT"
          # Re-export under the canonical env var names that wrangler reads.
          {
            echo "CLOUDFLARE_API_TOKEN=$CF_TOKEN"
            echo "CLOUDFLARE_ACCOUNT_ID=$CF_ACCT"
          } >> "$GITHUB_ENV"

      # The worker imports a generated `worker/dashboard-html.js` (gitignored)
      # produced by `scripts/build-frontend.js` + `scripts/embed-dashboard.js`.
      # Locally, `npm run deploy:worker` chains build → embed → wrangler deploy.
      # CI must mirror that or wrangler bails with
      # `Could not resolve "./dashboard-html.js"`.
      - name: Install root deps
        if: steps.cfsec.outputs.secrets-ok == 'true'
        # `npm install` (not `npm ci`) because package-lock.json is gitignored.
        # `--no-audit --no-fund` keeps logs quiet; `--ignore-scripts` skips
        # native postinstall (e.g. better-sqlite3) we don't need for deploy.
        run: |
          _install() { npm install --no-audit --no-fund --ignore-scripts; }
          _install
          # 2026-06-11 — npm's optional-deps bug (npm/cli#4828) intermittently
          # skips platform-specific binaries (e.g. @rolldown/binding-linux-
          # x64-gnu), which kills vitest at startup ("Cannot find native
          # binding") — it failed the tt-research deploy twice in two days.
          # Verify the binding landed; one clean reinstall self-heals.
          if ! npm ls @rolldown/binding-linux-x64-gnu >/dev/null 2>&1; then
            echo "rolldown native binding missing — clean reinstall"
            rm -rf node_modules
            _install
          fi

      # Gate the deploy on the test suite — broken modules must never
      # ship just because they bundle (full-system-review P1.7).
      - name: Run tests
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: npm test

      - name: Build frontend + embed dashboard
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: |
          npm run build:frontend
          node scripts/embed-dashboard.js

      # `npm run deploy:worker` deploys BOTH the default env and the
      # `production` env. Mirror that so production vars (e.g.
      # LIVE_MANAGE_INTERVAL_MIN) actually take effect.
      #
      # NOTE on `--env=`: wrangler-action v3 uses @actions/exec (no shell),
      # which splits `command:` on whitespace and preserves quote characters
      # literally. Writing `--env=''` passed the four-character string `''`
      # to wrangler, which then failed with `No environment found in
      # configuration with name "''"`. Use bare `--env=` (empty value, no
      # quotes) — that's a single token and wrangler reads the value as
      # the empty string, selecting the top-level config.
      - name: Deploy worker — default env
        if: steps.cfsec.outputs.secrets-ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/deploy-wrangler-retry.sh worker --env=

      - name: Deploy worker — production env
        if: steps.cfsec.outputs.secrets-ok == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ env.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/deploy-wrangler-retry.sh worker --env production

      # Post-deploy smoke: the worker must answer /timed/health with
      # ok:true on both the workers.dev URL and the custom domain.
      # Catches the "deployed but instantly broken" class (missing
      # secrets in one env, bundle-time import failures).
      - name: Post-deploy smoke
        if: steps.cfsec.outputs.secrets-ok == 'true'
        run: |
          sleep 5
          for BASE in "https://timed-trading-ingest.shashant.workers.dev" "https://timed-trading.com"; do
            HEALTH=$(curl -s -m 20 "$BASE/timed/health" || echo "{}")
            # 2026-06-10 — same non-JSON guard as watchdog.yml: the custom
            # domain can serve a Cloudflare bot challenge to CI curl, which
            # previously crashed jq (exit 5 under bash -e) and failed the
            # deploy red even though the worker was healthy.
            if ! echo "$HEALTH" | jq -e . >/dev/null 2>&1; then
              if echo "$HEALTH" | grep -qi "challenges.cloudflare.com\|Just a moment"; then
                echo "::warning::$BASE served a Cloudflare bot challenge to the smoke probe — skipping (workers.dev probe covers origin health). Add a WAF skip rule for /timed/health."
                continue
              fi
              echo "::error::$BASE/timed/health returned non-JSON after deploy: $(echo "$HEALTH" | head -c 120 | tr -d '\n')"
              exit 1
            fi
            OK=$(echo "$HEALTH" | jq -r '.ok // false')
            TICK=$(echo "$HEALTH" | jq -r '.cronTickAgeMin // "null"')
            FAILS=$(echo "$HEALTH" | jq -r '.cronFailures.count // "null"')
            echo "$BASE → ok=$OK cronTickAgeMin=$TICK activeCronFailures=$FAILS"
            if [ "$OK" != "true" ]; then
              echo "::error::$BASE/timed/health did not return ok:true after deploy"
              exit 1
            fi
          done

      - name: Deploy skipped notice
        if: steps.cfsec.outputs.secrets-ok != 'true'
        run: |
          echo "Worker auto-deploy SKIPPED (no Cloudflare secrets configured)."
          echo "Run 'npm run deploy:worker' from the repo root manually,"
          echo "or configure CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID."
