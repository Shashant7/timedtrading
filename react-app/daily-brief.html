    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%27%20viewBox%3D%270%200%2048%2048%27%20fill%3D%27none%27%3E%3Cdefs%3E%3ClinearGradient%20id%3D%27r%27%20x1%3D%276%27%20y1%3D%2742%27%20x2%3D%2742%27%20y2%3D%276%27%3E%3Cstop%20offset%3D%270%25%27%20stop-color%3D%27%2334d399%27%2F%3E%3Cstop%20offset%3D%27100%25%27%20stop-color%3D%27%2367e8f9%27%2F%3E%3C%2FlinearGradient%3E%3C%2Fdefs%3E%3Crect%20width%3D%2748%27%20height%3D%2748%27%20rx%3D%2711%27%20fill%3D%27%23000%27%2F%3E%3Ccircle%20cx%3D%2724%27%20cy%3D%2724%27%20r%3D%2717%27%20stroke%3D%27url%28%23r%29%27%20stroke-width%3D%272.5%27%20fill%3D%27none%27%2F%3E%3Cline%20x1%3D%2724%27%20y1%3D%277.5%27%20x2%3D%2724%27%20y2%3D%2710.5%27%20stroke%3D%27%2334d399%27%20stroke-width%3D%271.5%27%20stroke-linecap%3D%27round%27%20opacity%3D%270.5%27%2F%3E%3Cline%20x1%3D%277.5%27%20y1%3D%2724%27%20x2%3D%2710.5%27%20y2%3D%2724%27%20stroke%3D%27%2334d399%27%20stroke-width%3D%271.5%27%20stroke-linecap%3D%27round%27%20opacity%3D%270.5%27%2F%3E%3Cline%20x1%3D%2719%27%20y1%3D%2718.5%27%20x2%3D%2716%27%20y2%3D%2715.5%27%20stroke%3D%27%23636366%27%20stroke-width%3D%271.2%27%20stroke-linecap%3D%27round%27%2F%3E%3Cline%20x1%3D%2724%27%20y1%3D%2724%27%20x2%3D%2719%27%20y2%3D%2718.5%27%20stroke%3D%27%23636366%27%20stroke-width%3D%273.5%27%20stroke-linecap%3D%27round%27%2F%3E%3Cline%20x1%3D%2729.5%27%20y1%3D%2716.5%27%20x2%3D%2732%27%20y2%3D%2712.9%27%20stroke%3D%27%2330d158%27%20stroke-width%3D%271.2%27%20stroke-linecap%3D%27round%27%2F%3E%3Cline%20x1%3D%2724%27%20y1%3D%2724%27%20x2%3D%2729.5%27%20y2%3D%2716.5%27%20stroke%3D%27%2330d158%27%20stroke-width%3D%274%27%20stroke-linecap%3D%27round%27%2F%3E%3Ccircle%20cx%3D%2724%27%20cy%3D%2724%27%20r%3D%273.2%27%20fill%3D%27%2330d158%27%2F%3E%3Ccircle%20cx%3D%2724%27%20cy%3D%2724%27%20r%3D%271.3%27%20fill%3D%27%23000%27%2F%3E%3C%2Fsvg%3E" />

    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.02);
        --tt-bg-elevated: rgba(255,255,255,0.035);
        --tt-bg-hover: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.04);
        --tt-border-strong: rgba(255,255,255,0.08);
        --tt-text: #e5e7eb;
        --tt-text-muted: #6b7280;
        --tt-text-faint: #4b5563;
        /* Brand colors — aligned with main app (index-react.html) */
        --tt-accent: #14b8a6;
        --tt-accent-dim: rgba(20, 184, 166, 0.12);
        --tt-negative: #e11d48;
        --tt-negative-dim: rgba(225, 29, 72, 0.12);
        /* Chart candle colors — TradingView standard palette */
        --tt-candle-up: #26a69a;
        --tt-candle-down: #ef5350;
        --tt-amber: #f59e0b;
        --tt-amber-dim: rgba(245, 158, 11, 0.12);
        --tt-indigo: #6366f1;
        --tt-indigo-dim: rgba(99, 102, 241, 0.12);
        --tt-radius: 12px;
        --tt-radius-sm: 8px;
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-shadow-sm: 0 1px 2px rgba(0,0,0,0.15);
        --tt-shadow-md: 0 2px 8px rgba(0,0,0,0.12);
        --tt-shadow-lg: 0 4px 16px rgba(0,0,0,0.15);
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
      }
      .tt-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--tt-radius);
      }
      .loading-spinner {
        width: 28px; height: 28px;
        position: relative; display: inline-block;
      }
      .loading-spinner::before {
        content: ""; position: absolute; inset: 0; border-radius: 6px;
        background: linear-gradient(135deg, rgba(0,200,83,0.15), rgba(0,200,83,0.04));
        animation: tt-loader-pulse 1.6s ease-in-out infinite;
      }
      .loading-spinner::after {
        content: ""; position: absolute; left: 3px; right: 3px; top: 50%; height: 2px;
        background: linear-gradient(90deg, transparent, #00c853, #00e676, #69f0ae, transparent);
        background-size: 200% 100%; border-radius: 1px;
        animation: tt-loader-sweep 1.2s ease-in-out infinite;
      }
      @keyframes tt-loader-pulse { 0%, 100% { opacity: 0.4; transform: scale(0.92); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes tt-loader-sweep { 0% { background-position: -100% 0; opacity: 0.5; } 50% { opacity: 1; } 100% { background-position: 200% 0; opacity: 0.5; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-badge {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.15); }
      }
      .badge-pulse { animation: pulse-badge 2s ease-in-out infinite; }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
      body:not([data-user-role="admin"]) a[data-admin-only] {
        display: none !important;
      }
      /* Markdown styling for brief content — Galloway-inspired:
         prominent editorialized H2 headlines, tighter paragraph rhythm,
         one-sentence paragraphs carry weight. */
      .brief-content h2 {
        font-family: var(--tt-font-editorial), Georgia, serif;
        font-size: 28px;
        font-weight: 400;
        color: var(--tt-text-0);
        letter-spacing: -0.015em;
        line-height: 1.15;
        margin: 32px 0 12px 0;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--tt-border-strong);
      }
      .brief-content h2:first-child { margin-top: 0; }
      .brief-content h3 {
        font-family: var(--tt-font-ui);
        font-size: 11px;
        font-weight: 700;
        color: var(--tt-text-3);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        margin: 24px 0 10px 0;
      }
      .brief-content h4 {
        font-size: 13px;
        font-weight: 600;
        color: #d1d5db;
        margin: 16px 0 6px 0;
      }
      .brief-content p {
        font-size: 14px;
        line-height: 1.65;
        color: #d1d5db;
        margin: 10px 0;
      }
      /* One-sentence emphasis paragraphs (Galloway "Full stop." "Bold." rhythm):
         when a paragraph is a single short sentence wrapped in <strong>,
         render it as a callout-style pull line. */
      .brief-content p > strong:only-child {
        display: block;
        font-family: var(--tt-font-editorial), Georgia, serif;
        font-size: 19px;
        font-weight: 400;
        font-style: italic;
        color: var(--tt-text-0);
        line-height: 1.35;
        letter-spacing: -0.005em;
        border-left: 2px solid var(--tt-editorial);
        padding-left: 14px;
        margin: 18px 0;
      }
      .brief-content ul, .brief-content ol {
        font-size: 13px;
        line-height: 1.75;
        color: #9ca3af;
        margin: 8px 0;
        padding-left: 20px;
      }
      .brief-content li {
        margin: 4px 0;
        padding-left: 2px;
      }
      .brief-content li::marker { color: #4b5563; }
      .brief-content strong { color: #e5e7eb; }
      .brief-content em { color: #d1d5db; }
      .brief-content code {
        background: rgba(255,255,255,0.05);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 12px;
        color: #f59e0b;
      }
      .brief-content blockquote {
        font-family: var(--tt-font-editorial), Georgia, serif;
        font-size: 17px;
        line-height: 1.45;
        border-left: 3px solid var(--tt-warning);
        padding: 4px 0 4px 16px;
        margin: 18px 0;
        color: var(--tt-text-1);
        font-style: italic;
      }
      .brief-content blockquote p { font-family: inherit; font-size: inherit; line-height: inherit; color: inherit; margin: 0; }
      .brief-content hr {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.06);
        margin: 20px 0;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      const API_BASE = "";

      // ── Markdown Renderer ──────────────────────────────────────────────────
      function renderMarkdown(md) {
        if (!md) return "";
        // Pre-process: AI briefs arrive as one long line with headers like " ### "
        // inline. Insert blank lines so marked renders them as real headings.
        let cleaned = md
          .replace(/ (#{2,4}) /g, "\n\n$1 ")             // blank line before ## / ### / #### headers
          .replace(/ - \*\*/g, "\n- **")                 // split inline bold-list items onto new lines
          .replace(/ - ([A-Z])/g, "\n- $1")              // split inline dash-lists starting with uppercase
        if (typeof marked !== "undefined" && marked.parse) {
          return marked.parse(cleaned, { breaks: true, gfm: true });
        }
        return cleaned.replace(/\n/g, "<br/>");
      }

      // ── Brief Infographic Strip ────────────────────────────────────────────
      // Renders above the markdown body so users can glance the regime:
      //   - Headline bar (regime + VIX bucket + sector breadth + open trades)
      //   - Index cards (SPY/QQQ/IWM price · %chg · ATR · Golden Gate badge)
      //   - Sector heatmap (11 SPDR ETFs)
      //   - Macro rail (Crude / Gold / Bonds / Dollar)
      //   - Risks / Opportunities pill list
      //   - Event ribbon (earnings + macro events today)
      function BriefInfographic({ data }) {
        if (!data) return null;
        const hl = data.headline || {};
        const vixBucket = hl.vix?.bucket;
        const vixColor = vixBucket === "calm" ? "#34d399"
          : vixBucket === "normal" ? "#86efac"
            : vixBucket === "elevated" ? "#fbbf24"
              : vixBucket === "high" ? "#fb923c"
                : vixBucket === "panic" ? "#ef4444" : "#9ca3af";

        const Badge = ({ label, value, color }) => (
          <div className="flex flex-col items-start px-3 py-2 rounded-md bg-white/[0.03] border border-white/[0.06] min-w-[84px]">
            <span className="text-[9px] uppercase tracking-wider text-[#6b7280]">{label}</span>
            <span className="text-[13px] font-semibold tabular-nums" style={{ color: color || "#e5e7eb" }}>{value}</span>
          </div>
        );

        const ggColor = (gg) => gg === "OPEN_UP" ? "#34d399" : gg === "OPEN_DOWN" ? "#ef4444" : "#9ca3af";
        const pctColor = (p) => p == null ? "#9ca3af" : p > 0 ? "#34d399" : p < 0 ? "#ef4444" : "#9ca3af";
        const indicies = Array.isArray(data.indices) ? data.indices : [];
        const sectors = Array.isArray(data.sectors) ? data.sectors : [];
        const macro = Array.isArray(data.macro) ? data.macro : [];
        const events = Array.isArray(data.events) ? data.events : [];
        const risks = Array.isArray(data.risks) ? data.risks : [];
        const opps = Array.isArray(data.opportunities) ? data.opportunities : [];

        const topThree = Array.isArray(data.topThree) ? data.topThree : null;
        const closingLine = data.closingLine || null;

        return (
          <div className="mb-4 rounded-xl border border-white/[0.06] bg-white/[0.02] p-4 space-y-4">
            {/* Galloway-style "Today's Three" TOC */}
            {topThree && topThree.length === 3 && (
              <div className="rounded-lg bg-gradient-to-br from-amber-500/5 to-amber-500/[0.02] border border-amber-500/20 p-3">
                <div className="text-[9px] uppercase tracking-[0.18em] text-amber-300/80 mb-2">Today's three</div>
                <ol className="space-y-1.5">
                  {topThree.map((t) => (
                    <li key={t.n} className="flex items-baseline gap-2 text-[12.5px] leading-relaxed">
                      <span className="font-bold text-amber-300 tabular-nums shrink-0">{t.n}.</span>
                      <span className="text-[#e5e7eb]">
                        {t.label && <span className="text-[#9ca3af] font-medium">{t.label}: </span>}
                        <span>{t.body}</span>
                      </span>
                    </li>
                  ))}
                </ol>
              </div>
            )}

            {/* Headline strip */}
            <div className="flex flex-wrap items-center gap-2">
              {hl.regime && <Badge label="Regime" value={hl.regime.replace(/_/g, " ")} color="#67e8f9" />}
              {hl.vix && <Badge label="VIX" value={`${hl.vix.level.toFixed(2)} · ${vixBucket}`} color={vixColor} />}
              {hl.breadth && <Badge label="Breadth" value={`${hl.breadth.green}/${hl.breadth.total}`} color={hl.breadth.green >= (hl.breadth.total * 0.6) ? "#34d399" : hl.breadth.green <= (hl.breadth.total * 0.4) ? "#ef4444" : "#fbbf24"} />}
              {hl.openTrades != null && <Badge label="Open Trades" value={String(hl.openTrades)} color="#a78bfa" />}
            </div>

            {/* Index cards (V15 P0.7.42 — Day & Week GG with close-prob) */}
            {indicies.length > 0 && (
              <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                {indicies.map((idx) => {
                  const lvls = idx.levels || {};
                  const wlvls = idx.weeklyLevels || null;
                  const gg = lvls.goldenGate || "NEUTRAL";
                  const wgg = wlvls?.goldenGate || "NEUTRAL";
                  const dayProb = lvls.goldenGateProbability;
                  const weekProb = wlvls?.goldenGateProbability;
                  const anchor = lvls.anchor;
                  const cp = lvls.currentPrice ?? idx.price;
                  const up382 = lvls.levels?.["+38.2%"];
                  const dn382 = lvls.levels?.["-38.2%"];
                  const wUp382 = wlvls?.levels?.["+38.2%"];
                  const wDn382 = wlvls?.levels?.["-38.2%"];
                  const barProgress = (cp != null && up382 != null && dn382 != null)
                    ? Math.max(0, Math.min(100, ((cp - dn382) / (up382 - dn382)) * 100))
                    : 50;
                  const wBarProgress = (cp != null && wUp382 != null && wDn382 != null)
                    ? Math.max(0, Math.min(100, ((cp - wDn382) / (wUp382 - wDn382)) * 100))
                    : 50;
                  const probColor = (lbl) => lbl === "HIGH" ? "#34d399" : lbl === "MODERATE" ? "#fbbf24" : "#9ca3af";
                  return (
                    <div key={idx.sym} className="p-3 rounded-md bg-white/[0.02] border border-white/[0.06]">
                      <div className="flex items-center justify-between mb-1">
                        <span className="text-[12px] font-semibold text-white">{idx.sym}</span>
                        <span className="text-[10px] font-semibold" style={{ color: ggColor(gg) }}>
                          {gg === "OPEN_UP" ? "▲ GG Up" : gg === "OPEN_DOWN" ? "▼ GG Down" : "◆ Neutral"}
                        </span>
                      </div>
                      <div className="flex items-baseline gap-2 mb-2">
                        <span className="text-lg font-bold text-white tabular-nums">
                          {idx.price != null ? `$${idx.price.toFixed(2)}` : "—"}
                        </span>
                        <span className="text-[11px] font-semibold tabular-nums" style={{ color: pctColor(idx.chgPct) }}>
                          {idx.chgPct != null ? `${idx.chgPct >= 0 ? "+" : ""}${idx.chgPct.toFixed(2)}%` : ""}
                        </span>
                        {idx.atr != null && (
                          <span className="ml-auto text-[10px] text-[#6b7280]">ATR ${idx.atr.toFixed(2)}</span>
                        )}
                      </div>
                      {/* Day GG bar */}
                      <div className="text-[9px] uppercase tracking-wider text-[#6b7280] mb-0.5 flex items-center justify-between">
                        <span>Day Gate</span>
                        {dayProb && gg !== "NEUTRAL" && (
                          <span className="tabular-nums" style={{ color: probColor(dayProb.dayLabel) }}>
                            {(dayProb.day * 100).toFixed(0)}% close · {dayProb.dayLabel}
                          </span>
                        )}
                      </div>
                      {dn382 != null && up382 != null && (
                        <div className="relative h-2 rounded bg-white/[0.05] overflow-hidden mb-1">
                          <div className="absolute left-0 top-0 bottom-0" style={{ width: `${barProgress}%`, background: "linear-gradient(90deg, rgba(239,68,68,0.35), rgba(107,114,128,0.25), rgba(52,211,153,0.35))" }} />
                          {anchor != null && cp != null && (
                            <div className="absolute top-0 bottom-0" style={{ left: `${Math.max(0, Math.min(100, ((anchor - dn382) / (up382 - dn382)) * 100))}%`, width: 2, background: "#9ca3af" }} title={`Prev close ${anchor}`} />
                          )}
                        </div>
                      )}
                      {dn382 != null && up382 != null && (
                        <div className="flex items-center justify-between text-[9px] text-[#6b7280] tabular-nums mb-2">
                          <span>-38.2% ${dn382.toFixed(2)}</span>
                          <span>+38.2% ${up382.toFixed(2)}</span>
                        </div>
                      )}
                      {/* Week GG bar */}
                      {wlvls && (
                        <>
                          <div className="text-[9px] uppercase tracking-wider text-[#6b7280] mb-0.5 flex items-center justify-between">
                            <span style={{ color: ggColor(wgg) }}>
                              Week Gate {wgg === "OPEN_UP" ? "▲" : wgg === "OPEN_DOWN" ? "▼" : "◆"}
                            </span>
                            {weekProb && wgg !== "NEUTRAL" && (
                              <span className="tabular-nums" style={{ color: probColor(weekProb.weekLabel) }}>
                                {(weekProb.week * 100).toFixed(0)}% close · {weekProb.weekLabel}
                              </span>
                            )}
                          </div>
                          {wDn382 != null && wUp382 != null && (
                            <>
                              <div className="relative h-1.5 rounded bg-white/[0.05] overflow-hidden mb-1">
                                <div className="absolute left-0 top-0 bottom-0" style={{ width: `${wBarProgress}%`, background: "linear-gradient(90deg, rgba(239,68,68,0.25), rgba(107,114,128,0.15), rgba(52,211,153,0.25))" }} />
                              </div>
                              <div className="flex items-center justify-between text-[9px] text-[#6b7280] tabular-nums">
                                <span>-38.2% ${wDn382.toFixed(2)}</span>
                                <span>+38.2% ${wUp382.toFixed(2)}</span>
                              </div>
                            </>
                          )}
                        </>
                      )}
                    </div>
                  );
                })}
              </div>
            )}

            {/* Game Plan triggers — V15 P0.7.42: visual bull/bear trigger ↔ target */}
            {indicies.some((i) => i.levels?.gamePlan) && (
              <div>
                <div className="text-[9px] uppercase tracking-wider text-[#6b7280] mb-1">Game Plan triggers</div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                  {indicies.filter((i) => i.levels?.gamePlan).map((idx) => {
                    const gp = idx.levels.gamePlan;
                    const cp = idx.levels.currentPrice ?? idx.price;
                    return (
                      <div key={"gp-" + idx.sym} className="p-2 rounded bg-white/[0.02] border border-white/[0.06]">
                        <div className="flex items-center justify-between mb-1.5">
                          <span className="text-[11px] font-semibold text-white">{idx.sym} Plan</span>
                          {cp != null && <span className="text-[10px] text-[#9ca3af] tabular-nums">${cp.toFixed(2)}</span>}
                        </div>
                        <div className="space-y-1.5">
                          <div className="flex items-center gap-2">
                            <span className="text-[9px] font-semibold uppercase tracking-wider text-emerald-300/80 w-9">Bull</span>
                            <div className="flex-1 flex items-center gap-1 text-[10px] tabular-nums">
                              <span className="text-[#86efac]">${gp.bullTrigger.toFixed(2)}</span>
                              <span className="text-[#6b7280]">→</span>
                              <span className="text-emerald-300 font-semibold">${gp.bullTarget.toFixed(2)}</span>
                              <span className="ml-auto text-[9px] text-[#6b7280]">+{((gp.bullTarget - gp.bullTrigger) / gp.bullTrigger * 100).toFixed(2)}%</span>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className="text-[9px] font-semibold uppercase tracking-wider text-red-300/80 w-9">Bear</span>
                            <div className="flex-1 flex items-center gap-1 text-[10px] tabular-nums">
                              <span className="text-[#fecaca]">${gp.bearTrigger.toFixed(2)}</span>
                              <span className="text-[#6b7280]">→</span>

      // ── Archive Tree Component ─────────────────────────────────────────────
      function ArchiveTree({ briefs, onSelect }) {
        const [expandedMonths, setExpandedMonths] = useState({});
        const [expandedDays, setExpandedDays] = useState({});

        // Group by month, then by day
        const tree = useMemo(() => {
          const grouped = {};
          for (const b of briefs) {
            const month = b.date?.slice(0, 7); // YYYY-MM
            const day = b.date; // YYYY-MM-DD
            if (!month || !day) continue;
            if (!grouped[month]) grouped[month] = {};
            if (!grouped[month][day]) grouped[month][day] = [];
            grouped[month][day].push(b);
          }
          return grouped;
        }, [briefs]);

        const months = Object.keys(tree).sort().reverse();

        const toggleMonth = (m) => setExpandedMonths(prev => ({ ...prev, [m]: !prev[m] }));
        const toggleDay = (d) => setExpandedDays(prev => ({ ...prev, [d]: !prev[d] }));

        const fmtMonthLabel = (m) => {
          const [y, mo] = m.split("-");
          const d = new Date(Number(y), Number(mo) - 1, 1);
          return d.toLocaleDateString("en-US", { month: "long", year: "numeric" });
        };

        const fmtDayLabel = (d) => {
          const dt = new Date(d + "T12:00:00");
          const dow = dt.toLocaleDateString("en-US", { weekday: "short" });
          const day = dt.toLocaleDateString("en-US", { month: "short", day: "numeric" });
          return `${dow}, ${day}`;
        };

        if (months.length === 0) {
          return <div className="text-[13px] text-[#4b5563] py-4">No archived briefs yet.</div>;
        }

        return (
          <div className="space-y-1">
            {months.map(month => (
              <div key={month}>
                <button
                  onClick={() => toggleMonth(month)}
                  className="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-[13px] font-medium text-[#9ca3af] hover:bg-white/[0.03] transition-all"
                >
                  <span className="text-[10px] text-[#4b5563]">{expandedMonths[month] ? "\u25BC" : "\u25B6"}</span>
                  {fmtMonthLabel(month)}
                  <span className="text-[11px] text-[#4b5563] ml-auto">{Object.keys(tree[month]).length} days</span>
                </button>
                {expandedMonths[month] && (
                  <div className="ml-4 space-y-0.5">
                    {Object.keys(tree[month]).sort().reverse().map(day => {
                      const dayBriefs = tree[month][day];
                      const morning = dayBriefs.find(b => b.type === "morning");
                      const evening = dayBriefs.find(b => b.type === "evening");
                      return (
                        <div key={day}>
                          <button
                            onClick={() => toggleDay(day)}
                            className="w-full flex items-center gap-2 px-3 py-1.5 rounded-md text-[12px] text-[#6b7280] hover:bg-white/[0.03] transition-all"
                          >
                            <span className="text-[9px] text-[#4b5563]">{expandedDays[day] ? "\u25BC" : "\u25B6"}</span>
                            <span>{fmtDayLabel(day)}</span>
                            <div className="ml-auto flex items-center gap-3">
                              {morning && (
                                <span className="flex items-center gap-1 text-[11px]">
                                  <span className="text-[#f59e0b]">{"\u2600\uFE0F"}</span>
                                  <PredictionBadge value={morning.es_prediction_correct} />
                                </span>
                              )}
                              {evening && (
                                <span className="flex items-center gap-1 text-[11px]">
                                  <span className="text-[#6366f1]">{"\uD83C\uDF19"}</span>
                                  <PredictionBadge value={evening.es_prediction_correct} />
                                </span>
                              )}
                            </div>
                          </button>
                          {expandedDays[day] && (
                            <div className="ml-6 py-1 space-y-1">
                              {morning && (
                                <button
                                  onClick={() => onSelect(morning.id)}
                                  className="w-full text-left px-3 py-1.5 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all flex items-center gap-2"
                                >
                                  <span>{"\u2600\uFE0F"}</span> Morning Brief
                                  <PredictionBadge value={morning.es_prediction_correct} />
                                  {morning.es_prediction && (
                                    <span className="ml-auto text-[10px] text-[#4b5563] truncate max-w-[200px]">{morning.es_prediction}</span>

                                >
                                  <span>{"\uD83C\uDF19"}</span> Evening Brief

      // ── Mini Chart Component (TradingView Lightweight Charts) ────────────
      // Primary: SPY, QQQ + VIX proxy (VX1! for admin, VIXY for non-admin)
      // Advanced: ES1!, NQ1! (admin-only — TradingView futures)
      const _isAdminCharts = () => document.body.dataset.userRole === "admin";
      const CHART_SYMBOLS_PRIMARY_ADMIN = [
        { sym: "SPY", label: "SPY", color: "#00c853" },
        { sym: "QQQ", label: "QQQ", color: "#2196f3" },
        { sym: "IWM", label: "IWM (Russell 2000)", color: "#f97316" },

      ];
      const CHART_SYMBOLS_PRIMARY_USER = [
        { sym: "SPY", label: "SPY", color: "#00c853" },
        { sym: "QQQ", label: "QQQ", color: "#2196f3" },
        { sym: "IWM", label: "IWM (Russell 2000)", color: "#f97316" },
        { sym: "VIXY", label: "VIXY (VIX ETF)", color: "#f59e0b" },
      ];
      const CHART_SYMBOLS_ADVANCED = [
        { sym: "ES1!", label: "ES (S&P Futures)", color: "#a78bfa" },
        { sym: "NQ1!", label: "NQ (Nasdaq Futures)", color: "#6366f1" },

        { value: "5", label: "5m", limit: 250 },
        { value: "15", label: "15m", limit: 180 },
        { value: "60", label: "1H", limit: 100 },
        { value: "D", label: "D", limit: 60 },
      ];

      // Check if we're currently in Regular Trading Hours (for live update frequency)
      function isMarketOpen() {
        const d = new Date();
        const et = new Date(d.toLocaleString("en-US", { timeZone: "America/New_York" }));
        const day = et.getDay();
        const min = et.getHours() * 60 + et.getMinutes();
        if (day === 0 || day === 6) return false;
        return min >= 570 && min < 960; // 9:30 AM - 4:00 PM ET
      }

      // Stable empty array reference — avoids useEffect re-runs from levels={[]}
      const EMPTY_LEVELS = [];

      function MiniChart({ sym, label, accentColor, tf, limit }) {
        const containerRef = useRef(null);
        const chartRef = useRef(null);
        const seriesRef = useRef(null);
        const firstCandleRef = useRef(null);
        const priceLinesRef = useRef([]);
        const trendlineSeriesRef = useRef([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [lastPrice, setLastPrice] = useState(null);
        const [change, setChange] = useState(null);
        const [isLive, setIsLive] = useState(false);
        const [patternLabel, setPatternLabel] = useState(null);

        const mapCandles = useCallback((candles) => {
          const raw = candles.map(c => {
            const ts = c.ts / 1000;
            const o = Number(c.o), h = Number(c.h), l = Number(c.l), cl = Number(c.c);
            return { ts, o, h, l, c: cl };
          }).filter(c => c.o > 0 && c.h > 0 && c.l > 0 && c.c > 0);

          if (raw.length < 3) return raw.map(c => ({ time: c.ts, open: c.o, high: c.h, low: c.l, close: c.c }));

          return raw.map((c, i) => {
            const bodyHigh = Math.max(c.o, c.c);
            const bodyLow = Math.min(c.o, c.c);
            const bodyRange = bodyHigh - bodyLow || bodyHigh * 0.001;

            // Context-aware wick clamping: compare to neighbor candle ranges
            const neighbors = raw.slice(Math.max(0, i - 3), Math.min(raw.length, i + 4));
            const avgRange = neighbors.reduce((s, n) => s + (Math.max(n.o, n.c) - Math.min(n.o, n.c)), 0) / neighbors.length || bodyRange;
            const maxWick = Math.max(avgRange * 3, bodyRange * 3);
            const clampedH = Math.min(c.h, bodyHigh + maxWick);
            const clampedL = Math.max(c.l, bodyLow - maxWick);

            const up = c.c >= c.o;
            const mapped = { time: c.ts, open: c.o, high: clampedH, low: clampedL, close: c.c };

            if (tf !== "D" && tf !== "W") {
              const d = new Date(c.ts * 1000);
              const etStr = d.toLocaleString("en-US", { timeZone: "America/New_York", hour12: false, hour: "2-digit", minute: "2-digit" });
              const [hh, mm] = etStr.split(":").map(Number);
              const etMin = hh * 60 + mm;
              if (etMin < 570 || etMin >= 960) {
                mapped.color = up ? "rgba(34,197,94,0.30)" : "rgba(239,68,68,0.30)";
                mapped.borderColor = up ? "rgba(34,197,94,0.40)" : "rgba(239,68,68,0.40)";
                mapped.wickColor = up ? "rgba(34,197,94,0.25)" : "rgba(239,68,68,0.25)";
              }
            }
            return mapped;
          });
        }, [tf]);

        // Fetch candle data from API
        const fetchCandles = useCallback(async (fetchLimit) => {
          const res = await fetch(
            `${API_BASE}/timed/candles?ticker=${encodeURIComponent(sym)}&tf=${tf}&limit=${fetchLimit}`,
            { cache: "no-store" }
          );
          const data = await res.json();
          if (!data.ok || !data.candles || data.candles.length === 0) return [];
          return data.candles;
        }, [sym, tf]);

        // Initial chart setup + full data load
        useEffect(() => {
          let cancelled = false; // prevents stale async from adding duplicate levels

          if (!containerRef.current || typeof LightweightCharts === "undefined") {
            setError("Charts unavailable");
            setLoading(false);
            return;
          }

          const chart = LightweightCharts.createChart(containerRef.current, {
            width: containerRef.current.clientWidth,
            height: 500,
            layout: {
              background: { type: "solid", color: "#0b0e11" },
              textColor: "#7c8493",
              fontSize: 11,
            },
            grid: {
              vertLines: { color: "rgba(38,50,95,0.20)" },
              horzLines: { color: "rgba(38,50,95,0.20)" },
            },
            crosshair: {
              mode: LightweightCharts.CrosshairMode.Normal,
              vertLine: { color: "rgba(255,255,255,0.12)", width: 1, style: 2, labelBackgroundColor: "#1e293b" },
              horzLine: { color: "rgba(255,255,255,0.12)", width: 1, style: 2, labelBackgroundColor: "#1e293b" },
            },
            rightPriceScale: {
              borderColor: "rgba(38,50,95,0.3)",
              scaleMargins: { top: 0.08, bottom: 0.08 },
              autoScale: true,
              minimumWidth: 70,
              entireTextOnly: true,
            },
            timeScale: {
              borderColor: "rgba(38,50,95,0.3)",
              timeVisible: tf !== "D" && tf !== "W",
              secondsVisible: false,
              rightOffset: 5,
              barSpacing: tf === "D" ? 12 : tf === "60" ? 8 : 6,
              tickMarkFormatter: (time) => {
                try {
                  const d = new Date(time * 1000);
                  if (tf === "D") return d.toLocaleDateString("en-US", { month: "short", day: "numeric", timeZone: "America/New_York" });
                  return d.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
                } catch { return ""; }
              },
            },
            localization: {
              priceFormatter: (p) => {
                if (sym === "VX1!" || sym === "VIX") return p.toFixed(2);
                return p >= 1000 ? p.toFixed(2) : p.toFixed(2);
              },
              timeFormatter: (time) => {
                try {
                  const d = new Date(time * 1000);
                  if (tf === "D") return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric", timeZone: "America/New_York" });
                  return d.toLocaleString("en-US", { month: "short", day: "numeric", hour: "numeric", minute: "2-digit", timeZone: "America/New_York" });
                } catch { return ""; }
              },
            },
            handleScroll: { vertTouchDrag: false },
          });
          chartRef.current = chart;

          const candleSeries = chart.addCandlestickSeries({
            upColor: "#26a69a",
            downColor: "#ef5350",
            borderUpColor: "#26a69a",
            borderDownColor: "#ef5350",
            wickUpColor: "#26a69a",
            wickDownColor: "#ef5350",
          });
          seriesRef.current = candleSeries;

          // Initial full load with retry (no cross-TF fallback to avoid mismatched candles)
          const loadWithRetry = async (retriesLeft = 2) => {
            const raw = await fetchCandles(limit);
            if (raw.length === 0 && retriesLeft > 0) {
              await new Promise(r => setTimeout(r, 3000));
              return loadWithRetry(retriesLeft - 1);
            }
            return raw;
          };
          loadWithRetry().then(async (raw) => {
            const mapped = mapCandles(raw);
            if (mapped.length === 0) {
              // Try to show last known price even when chart data is unavailable
              try {
                const latestRes = await fetch(`${API_BASE}/timed/latest?ticker=${encodeURIComponent(sym)}`, { cache: "no-store" });
                const latestData = await latestRes.json();
                if (latestData?.price) {
                  setLastPrice(Number(latestData.price));
                  const daily = window.getDailyChange ? window.getDailyChange(latestData) : null;
                  const latestPct = daily && Number.isFinite(Number(daily.dayPct))
                    ? Number(daily.dayPct)
                    : Number(latestData.day_change_pct);
                  if (Number.isFinite(latestPct)) setChange(latestPct);
                }
              } catch (_) {}
              setError("Chart data unavailable — candles still loading");
              setLoading(false);
              return;
            }

            candleSeries.setData(mapped);
            firstCandleRef.current = mapped[0];
            const lastCandle = mapped[mapped.length - 1];
            setLastPrice(lastCandle.close);
            setChange((lastCandle.close - mapped[0].open) / mapped[0].open * 100);

            const settleChart = () => {
              if (!chartRef.current || !containerRef.current) return;
              const w = containerRef.current.clientWidth;
              if (w > 0) chartRef.current.applyOptions({ width: w });
              const visibleBars = { "5": 156, "15": 52, "30": 26, "60": 20, "D": 30 };
              const barsToShow = visibleBars[tf] || mapped.length;
              const from = Math.max(0, mapped.length - barsToShow);
              if (mapped.length > barsToShow) {
                chartRef.current.timeScale().setVisibleLogicalRange({ from, to: mapped.length + 5 });
              } else {
                chartRef.current.timeScale().fitContent();
              }
            };

            requestAnimationFrame(() => {
              settleChart();
              setTimeout(settleChart, 250);
            });

            setLoading(false);
            setIsLive(false);

            // Overlay levels, trendlines, and pattern annotations
            const applyOverlays = (overlayData) => {
              if (cancelled || !overlayData || !seriesRef.current || !chartRef.current) return;
              // Remove existing overlays
              for (const pl of priceLinesRef.current) {
                try { seriesRef.current.removePriceLine(pl); } catch (_) {}
              }
              priceLinesRef.current = [];
              for (const ls of trendlineSeriesRef.current) {
                try { chartRef.current.removeSeries(ls); } catch (_) {}
              }
              trendlineSeriesRef.current = [];

              // Price lines (support, resistance, prev close, ATR targets)
              for (const lvl of (overlayData.levels || [])) {
                const styleMap = { dotted: LightweightCharts.LineStyle.Dotted, dashed: LightweightCharts.LineStyle.Dashed, solid: LightweightCharts.LineStyle.Solid };
                const pl = seriesRef.current.createPriceLine({
                  price: lvl.price,
                  color: lvl.color || "rgba(255,255,255,0.2)",
                  lineWidth: lvl.lineWidth || 1,
                  lineStyle: styleMap[lvl.style] || LightweightCharts.LineStyle.Dashed,
                  axisLabelVisible: true,
                  title: lvl.label || "",
                });
                priceLinesRef.current.push(pl);
              }

              // Trendlines as line series
              for (const tl of (overlayData.trendlines || [])) {
                if (!tl.points || tl.points.length < 2) continue;
                const lineSeries = chartRef.current.addLineSeries({
                  color: tl.color || "rgba(255,255,255,0.3)",
                  lineWidth: 2,
                  lineStyle: LightweightCharts.LineStyle.LargeDashed,
                  crosshairMarkerVisible: false,
                  priceLineVisible: false,
                  lastValueVisible: false,
                });
                lineSeries.setData(tl.points);
                trendlineSeriesRef.current.push(lineSeries);
              }

              // Pattern markers
              if (overlayData.patterns && overlayData.patterns.length > 0 && seriesRef.current) {
                const markers = overlayData.patterns.map(p => ({
                  time: p.ts,
                  position: p.bias === "bearish" ? "aboveBar" : "belowBar",
                  color: p.bias === "bearish" ? "#ef5350" : p.bias === "bullish" ? "#26a69a" : "#7c8493",
                  shape: p.bias === "bearish" ? "arrowDown" : p.bias === "bullish" ? "arrowUp" : "circle",
                  text: p.type,
                }));
                try { seriesRef.current.setMarkers(markers); } catch (_) {}
                setPatternLabel(overlayData.patterns[overlayData.patterns.length - 1]?.type || null);
              }
            };
            const fetchOverlays = async (attempt = 0) => {
              try {
                const data = await fetchChartLevels(sym, tf, mapped);
                applyOverlays(data);
              } catch (e) {
                if (attempt < 2 && !cancelled) {
                  await new Promise(r => setTimeout(r, 1500 * (attempt + 1)));
                  return fetchOverlays(attempt + 1);
                }
              }
            };
            fetchOverlays();
          }).catch(e => {
            console.error(`Chart ${sym} initial load error:`, e);
            setError("Load failed");
            setLoading(false);
          });

          // Resize handler — use ResizeObserver on the container so we catch both
          // window resizes AND CSS grid reflows (which don't fire window.resize)
          let resizeObserver = null;
          const handleResize = () => {
            if (containerRef.current && chart) {
              chart.applyOptions({ width: containerRef.current.clientWidth });
            }
          };
          if (typeof ResizeObserver !== "undefined") {
            resizeObserver = new ResizeObserver(handleResize);
            resizeObserver.observe(containerRef.current);
          }
          window.addEventListener("resize", handleResize);

          return () => {
            cancelled = true;
            window.removeEventListener("resize", handleResize);
            if (resizeObserver) resizeObserver.disconnect();
            priceLinesRef.current = [];
            trendlineSeriesRef.current = [];
            chart.remove();
            chartRef.current = null;
            seriesRef.current = null;
            firstCandleRef.current = null;
          };
        }, [sym, tf, limit, fetchCandles, mapCandles]);

        // Live update polling — fetches last few candles and updates the series
        useEffect(() => {
          if (!isLive) return;

          const poll = async () => {
            try {
              // Fetch only last 5 candles for the update
              const raw = await fetchCandles(5);
              const mapped = mapCandles(raw);
              if (mapped.length === 0 || !seriesRef.current) return;

              // update() adds new candles or updates the last one in-place
              // without resetting zoom/pan state
              for (const candle of mapped) {
                seriesRef.current.update(candle);
              }

              const lastCandle = mapped[mapped.length - 1];
              setLastPrice(lastCandle.close);
              if (firstCandleRef.current) {
                setChange((lastCandle.close - firstCandleRef.current.open) / firstCandleRef.current.open * 100);
              }
            } catch (_) { /* silent — next tick will retry */ }
          };

          // Poll every 30s during market hours, 60s otherwise
          const intervalMs = isMarketOpen() ? 30000 : 60000;
          const id = setInterval(poll, intervalMs);
          return () => clearInterval(id);
        }, [isLive, fetchCandles, mapCandles]);

        // V15 P0.7.38 (2026-04-30) — Live price overlay
        // Per user feedback: "I noticed it shows the price of SPY, IWM, and
        // QQQ as of prev close, is it possible to show the real-time price
        // is provided by TwelveData?"
        //
        // The chart candles only update on bar close (and on Daily TF, only
        // once per day). The header price/change need to reflect the LATEST
        // tick. We poll /timed/latest (TwelveData-fed KV cache) every 15s
        // during market hours and 60s otherwise, overriding lastPrice/change
        // with the live values when available. The chart candles still come
        // from candle data — only the price/change badge updates faster.
        useEffect(() => {
          if (!sym) return;
          let cancelled = false;
          const refreshLivePrice = async () => {
            try {
              const res = await fetch(`${API_BASE}/timed/latest?ticker=${encodeURIComponent(sym)}`, { cache: "no-store" });
              if (!res.ok) return;
              const latest = await res.json();
              if (cancelled) return;
              const livePrice = Number(latest?.price);
              if (Number.isFinite(livePrice) && livePrice > 0) {
                setLastPrice(livePrice);
              }
              const daily = window.getDailyChange ? window.getDailyChange(latest) : null;
              const livePct = daily && Number.isFinite(Number(daily.dayPct))
                ? Number(daily.dayPct)
                : Number(latest?.day_change_pct);
              if (Number.isFinite(livePct)) setChange(livePct);
            } catch (_) { /* silent — next tick retries */ }
          };
          // Immediate refresh on mount, then poll
          refreshLivePrice();
          const intervalMs = isMarketOpen() ? 15000 : 60000;
          const id = setInterval(refreshLivePrice, intervalMs);
          return () => { cancelled = true; clearInterval(id); };
        }, [sym]);

        return (
          <div className="tt-card overflow-hidden">
            <div className="px-3 py-2.5 flex items-center justify-between border-b border-white/[0.04]">
              <div className="flex items-center gap-2.5">
                <span className="text-[14px] font-semibold" style={{ color: accentColor }}>{label}</span>
                {lastPrice != null && (
                  <span className="text-[13px] text-[#9ca3af] font-medium">{lastPrice.toFixed(2)}</span>
                )}
                {change != null && (
                  <span className={`text-[12px] font-semibold ${change >= 0 ? "text-[#26a69a]" : "text-[#ef5350]"}`}>
                    {change >= 0 ? "+" : ""}{change.toFixed(2)}%
                  </span>
                )}
                {patternLabel && (
                  <span className="text-[10px] font-medium px-2 py-0.5 rounded-full bg-white/[0.06] text-[#7c8493] border border-white/[0.08]">
                    {patternLabel}
                  </span>
                )}
              </div>
              <div className="flex items-center gap-2">
                {loading && <div className="loading-spinner" style={{ width: 12, height: 12, borderWidth: 1.5 }} />}
                {isLive && !loading && (
                  <span className="flex items-center gap-1 text-[9px] font-medium text-[#26a69a] uppercase tracking-wider">
                    <span className="inline-block w-1.5 h-1.5 rounded-full bg-[#26a69a] badge-pulse" />
                    Live
                  </span>
                )}
              </div>
            </div>
            <div ref={containerRef} style={{ height: 500 }}>
              {error && (
                <div className="flex items-center justify-center h-full">
                  <span className="text-[11px] text-[#4b5563]">{error}</span>
                </div>
              )}
            </div>
          </div>
        );
      }

      // ── Chart Levels & Pattern Detection ─────────────────────────────────
      const chartLevelsCache = {};

      function detectSwingPoints(candles, lookback = 3) {
        const highs = [], lows = [];
        for (let i = lookback; i < candles.length - lookback; i++) {
          const c = candles[i];
          let isHigh = true, isLow = true;
          for (let j = 1; j <= lookback; j++) {
            if (candles[i - j].h >= c.h || candles[i + j].h >= c.h) isHigh = false;
            if (candles[i - j].l <= c.l || candles[i + j].l <= c.l) isLow = false;
          }
          if (isHigh) highs.push({ price: c.h, idx: i, ts: c.ts });
          if (isLow) lows.push({ price: c.l, idx: i, ts: c.ts });
        }
        return { highs, lows };
      }

      function fitTrendline(points) {
        if (points.length < 2) return null;
        const n = points.length;
        let sx = 0, sy = 0, sxy = 0, sxx = 0;
        for (const p of points) { sx += p.idx; sy += p.price; sxy += p.idx * p.price; sxx += p.idx * p.idx; }
        const denom = n * sxx - sx * sx;
        if (Math.abs(denom) < 1e-10) return null;
        const slope = (n * sxy - sx * sy) / denom;
        const intercept = (sy - slope * sx) / n;
        return { slope, intercept, points };
      }

      function detectPatterns(candles) {
        if (candles.length < 15) return { trendlines: [], patterns: [] };
        const { highs, lows } = detectSwingPoints(candles, 2);
        const trendlines = [];
        const patterns = [];
        const rnd = v => Math.round(v * 100) / 100;

        // Resistance trendline from recent swing highs (last 5)
        const recentHighs = highs.slice(-5);
        if (recentHighs.length >= 2) {
          const rl = fitTrendline(recentHighs);
          if (rl) {
            const startIdx = recentHighs[0].idx;
            const endIdx = Math.min(candles.length - 1, recentHighs[recentHighs.length - 1].idx + 5);
            trendlines.push({
              type: "resistance",
              color: "rgba(239,83,80,0.50)",
              points: [
                { time: candles[startIdx].ts, value: rnd(rl.intercept + rl.slope * startIdx) },
                { time: candles[endIdx].ts, value: rnd(rl.intercept + rl.slope * endIdx) },
              ],
            });
          }
        }

        // Support trendline from recent swing lows
        const recentLows = lows.slice(-5);
        if (recentLows.length >= 2) {
          const sl = fitTrendline(recentLows);
          if (sl) {
            const startIdx = recentLows[0].idx;
            const endIdx = Math.min(candles.length - 1, recentLows[recentLows.length - 1].idx + 5);
            trendlines.push({
              type: "support",
              color: "rgba(38,166,154,0.50)",
              points: [
                { time: candles[startIdx].ts, value: rnd(sl.intercept + sl.slope * startIdx) },
                { time: candles[endIdx].ts, value: rnd(sl.intercept + sl.slope * endIdx) },
              ],
            });
          }
        }

        // Pattern: Descending Triangle — lower highs + flat support
        if (recentHighs.length >= 2 && recentLows.length >= 2) {
          const hSlope = recentHighs.length >= 2 ? (recentHighs[recentHighs.length - 1].price - recentHighs[0].price) / (recentHighs[recentHighs.length - 1].idx - recentHighs[0].idx || 1) : 0;
          const lSlope = recentLows.length >= 2 ? (recentLows[recentLows.length - 1].price - recentLows[0].price) / (recentLows[recentLows.length - 1].idx - recentLows[0].idx || 1) : 0;
          const avgPrice = candles[candles.length - 1].c;
          const slopeThreshold = avgPrice * 0.0005;

          if (hSlope < -slopeThreshold && Math.abs(lSlope) < slopeThreshold) {
            patterns.push({ type: "Descending Triangle", idx: recentLows[recentLows.length - 1].idx, ts: recentLows[recentLows.length - 1].ts, bias: "bearish" });
          }
          // Ascending Triangle — higher lows + flat resistance
          if (lSlope > slopeThreshold && Math.abs(hSlope) < slopeThreshold) {
            patterns.push({ type: "Ascending Triangle", idx: recentHighs[recentHighs.length - 1].idx, ts: recentHighs[recentHighs.length - 1].ts, bias: "bullish" });
          }
          // Channel / Range — both slopes are flat
          if (Math.abs(hSlope) < slopeThreshold && Math.abs(lSlope) < slopeThreshold) {
            const rangeHi = Math.max(...recentHighs.map(h => h.price));
            const rangeLo = Math.min(...recentLows.map(l => l.price));
            const rangePct = (rangeHi - rangeLo) / rangeLo * 100;
            if (rangePct < 8) {
              patterns.push({ type: `Range ${rnd(rangeLo)}-${rnd(rangeHi)}`, idx: candles.length - 3, ts: candles[candles.length - 3]?.ts, bias: "neutral" });
            }
          }
          // Bear Flag — both slopes negative (down-sloping channel)
          if (hSlope < -slopeThreshold && lSlope < -slopeThreshold && Math.abs(hSlope - lSlope) < slopeThreshold * 2) {
            patterns.push({ type: "Bear Flag", idx: recentLows[recentLows.length - 1].idx, ts: recentLows[recentLows.length - 1].ts, bias: "bearish" });
          }
          // Bull Flag — both slopes positive
          if (hSlope > slopeThreshold && lSlope > slopeThreshold && Math.abs(hSlope - lSlope) < slopeThreshold * 2) {
            patterns.push({ type: "Bull Flag", idx: recentHighs[recentHighs.length - 1].idx, ts: recentHighs[recentHighs.length - 1].ts, bias: "bullish" });
          }
        }

        // Double Top / Double Bottom
        if (recentHighs.length >= 2) {
          const last2H = recentHighs.slice(-2);
          const diff = Math.abs(last2H[0].price - last2H[1].price) / last2H[0].price;
          if (diff < 0.005 && (last2H[1].idx - last2H[0].idx) >= 5) {
            patterns.push({ type: "Double Top", idx: last2H[1].idx, ts: last2H[1].ts, bias: "bearish" });
          }
        }
        if (recentLows.length >= 2) {
          const last2L = recentLows.slice(-2);
          const diff = Math.abs(last2L[0].price - last2L[1].price) / last2L[0].price;
          if (diff < 0.005 && (last2L[1].idx - last2L[0].idx) >= 5) {
            patterns.push({ type: "Double Bottom", idx: last2L[1].idx, ts: last2L[1].ts, bias: "bullish" });
          }
        }

        return { trendlines, patterns };
      }

      async function fetchChartLevels(sym, chartTf, chartCandles) {
        const cacheKey = `${sym}-${chartTf}`;
        if (chartLevelsCache[cacheKey] && Date.now() - chartLevelsCache[cacheKey].ts < 300000) {
          return chartLevelsCache[cacheKey].data;
        }
        try {
          const dailyRes = await fetch(`${API_BASE}/timed/candles?ticker=${encodeURIComponent(sym)}&tf=D&limit=40`, { cache: "no-store" });
          const dailyData = await dailyRes.json();
          if (!dailyData.ok || !dailyData.candles || dailyData.candles.length < 5) return null;

          const dailies = dailyData.candles;
          const rnd = v => Math.round(v * 100) / 100;
          const levels = [];

          // ATR computation
          let atrSum = 0, atrCount = 0;
          for (let i = 1; i < dailies.length; i++) {
            const h = Number(dailies[i].h), l = Number(dailies[i].l), pc = Number(dailies[i - 1].c);
            const tr = Math.max(h - l, Math.abs(h - pc), Math.abs(l - pc));
            if (tr > 0) { atrSum += tr; atrCount++; }
          }
          const dayAtr = atrCount > 0 ? atrSum / atrCount : 0;
          if (dayAtr <= 0) return null;

          const prevDay = dailies[dailies.length - 2];
          const anchor = Number(prevDay.c);

          // Previous close
          levels.push({ price: rnd(anchor), color: "rgba(255,255,255,0.40)", label: "Prev Close", lineWidth: 1, style: "dotted" });

          // Swing high/low support and resistance from daily candles
          const dailyParsed = dailies.map(c => ({ h: Number(c.h), l: Number(c.l), c: Number(c.c), o: Number(c.o), ts: Number(c.ts) / 1000 }));
          const { highs, lows } = detectSwingPoints(dailyParsed, 2);

          // Key resistance levels (top 2 swing highs near current price)
          const currentPrice = dailyParsed[dailyParsed.length - 1].c;
          const nearHighs = highs.filter(h => h.price > currentPrice * 0.98).sort((a, b) => a.price - b.price).slice(0, 2);
          const nearLows = lows.filter(l => l.price < currentPrice * 1.02).sort((a, b) => b.price - a.price).slice(0, 2);

          for (const h of nearHighs) {
            levels.push({ price: rnd(h.price), color: "rgba(239,83,80,0.50)", label: `R ${rnd(h.price)}`, lineWidth: 1, style: "dashed" });
          }
          for (const l of nearLows) {
            levels.push({ price: rnd(l.price), color: "rgba(38,166,154,0.50)", label: `S ${rnd(l.price)}`, lineWidth: 1, style: "dashed" });
          }

          // ATR targets for intraday charts only
          if (chartTf !== "D") {
            let currentPx = currentPrice;
            try {
              const latestRes = await fetch(`${API_BASE}/timed/latest?ticker=${encodeURIComponent(sym)}`, { cache: "no-store" });
              const latestData = await latestRes.json();
              if (latestData.ok && latestData.data?.price) currentPx = Number(latestData.data.price);
            } catch (_) {}
            const dist = currentPx - anchor;
            const pctOfAtr = dist / dayAtr;
            if (pctOfAtr > 0.382) {
              levels.push({ price: rnd(anchor + dayAtr * 0.618), color: "rgba(245,158,11,0.50)", label: "ATR +61.8%", lineWidth: 1, style: "dashed" });
              levels.push({ price: rnd(anchor + dayAtr * 1.0), color: "rgba(245,158,11,0.50)", label: "ATR +100%", lineWidth: 1, style: "dashed" });
            } else if (pctOfAtr < -0.382) {
              levels.push({ price: rnd(anchor - dayAtr * 0.618), color: "rgba(245,158,11,0.50)", label: "ATR -61.8%", lineWidth: 1, style: "dashed" });
              levels.push({ price: rnd(anchor - dayAtr * 1.0), color: "rgba(245,158,11,0.50)", label: "ATR -100%", lineWidth: 1, style: "dashed" });
            }
          }

          // Pattern detection from chart candles
          let patternData = { trendlines: [], patterns: [] };
          if (chartCandles && chartCandles.length > 15) {
            const parsed = chartCandles.map(c => ({
              h: typeof c.high !== "undefined" ? c.high : c.h,
              l: typeof c.low !== "undefined" ? c.low : c.l,
              c: typeof c.close !== "undefined" ? c.close : c.c,
              o: typeof c.open !== "undefined" ? c.open : c.o,
              ts: c.time || c.ts,
            }));
            patternData = detectPatterns(parsed);
          }

          const result = { levels, dayAtr: rnd(dayAtr), anchor: rnd(anchor), trendlines: patternData.trendlines, patterns: patternData.patterns };
          chartLevelsCache[cacheKey] = { data: result, ts: Date.now() };
          return result;
        } catch (e) {
          console.error(`Chart levels error for ${sym}:`, e);
          return null;
        }
      }

      function MarketCharts() {
        const [tf, setTf] = useState("15");
        const [showAdvanced, setShowAdvanced] = useState(false);
        const tfConfig = TF_OPTIONS.find(t => t.value === tf) || TF_OPTIONS[0];
        const isAdmin = _isAdminCharts();
        const primarySymbols = isAdmin ? CHART_SYMBOLS_PRIMARY_ADMIN : CHART_SYMBOLS_PRIMARY_USER;

        return (

      // ── Main App ───────────────────────────────────────────────────────────
      // ── Intraday Pulse Strip (compact infographic for intraday flash) ─────
      // Same data as Daily Brief infographic but rendered as a single-row
      // strip: VIX badge, breadth pill, SPY/QQQ/IWM mini-tiles, open-trades
      // counter. Optimized for quick-glance mid-session updates, not full
      // morning/evening study.
      function IntradayPulse({ infographic }) {
        if (!infographic) return null;
        const hl = infographic.headline || {};
        const indices = Array.isArray(infographic.indices) ? infographic.indices : [];
        const vixBucket = hl.vix?.bucket;
        const vixColor = vixBucket === "calm" ? "#34d399"
          : vixBucket === "normal" ? "#86efac"
            : vixBucket === "elevated" ? "#fbbf24"
              : vixBucket === "high" ? "#fb923c"
                : vixBucket === "panic" ? "#ef4444" : "#9ca3af";
        const pctColor = (p) => p == null ? "#9ca3af" : p > 0 ? "#34d399" : p < 0 ? "#ef4444" : "#9ca3af";
        const ggColor = (gg) => gg === "OPEN_UP" ? "#34d399" : gg === "OPEN_DOWN" ? "#ef4444" : "#6b7280";
        const closing = infographic.closingLine || null;

        return (
          <div className="mb-3">
            <div
              className="flex flex-wrap items-center gap-2 rounded-lg border px-3 py-2"
              style={{
                background: "linear-gradient(135deg, rgba(99,102,241,0.04), rgba(139,92,246,0.02))",
                borderColor: "rgba(139,92,246,0.18)",
              }}
            >
              {/* Live pulse dot */}
              <span className="flex items-center gap-1.5 pr-2 border-r border-white/[0.08]">
                <span
                  className="w-1.5 h-1.5 rounded-full"
                  style={{ background: "#a78bfa", boxShadow: "0 0 8px rgba(167,139,250,0.7)" }}
                />
                <span className="text-[9px] uppercase tracking-[0.14em] font-bold text-[#a78bfa]">LIVE PULSE</span>
              </span>

              {/* VIX */}
              {hl.vix && (
                <span className="flex items-baseline gap-1">
                  <span className="text-[9px] uppercase tracking-wider text-[#6b7280]">VIX</span>
                  <span className="text-[12px] font-semibold tabular-nums" style={{ color: vixColor }}>
                    {hl.vix.level.toFixed(1)}
                  </span>
                  {vixBucket && <span className="text-[9px] lowercase text-[#6b7280]">{vixBucket}</span>}
                </span>
              )}

              {/* Breadth */}
              {hl.breadth && (
                <span className="flex items-baseline gap-1">
                  <span className="text-[9px] uppercase tracking-wider text-[#6b7280]">Breadth</span>
                  <span
                    className="text-[12px] font-semibold tabular-nums"
                    style={{ color: hl.breadth.green >= hl.breadth.total * 0.6 ? "#34d399"
                      : hl.breadth.green <= hl.breadth.total * 0.4 ? "#ef4444" : "#fbbf24" }}
                  >
                    {hl.breadth.green}/{hl.breadth.total}
                  </span>
                </span>
              )}

              {/* Index mini-tiles */}
              {indices.map((idx) => {
                const gg = idx.levels?.goldenGate || "NEUTRAL";
                return (
                  <span
                    key={idx.sym}
                    className="flex items-baseline gap-1.5 px-2 py-0.5 rounded-md"
                    style={{ background: "rgba(255,255,255,0.03)" }}
                  >
                    <span className="text-[10px] font-bold text-white">{idx.sym}</span>
                    {idx.chgPct != null && (
                      <span className="text-[11px] font-semibold tabular-nums" style={{ color: pctColor(idx.chgPct) }}>
                        {idx.chgPct >= 0 ? "+" : ""}{idx.chgPct.toFixed(2)}%
                      </span>
                    )}
                    <span className="text-[9px]" style={{ color: ggColor(gg) }}>
                      {gg === "OPEN_UP" ? "▲" : gg === "OPEN_DOWN" ? "▼" : "◆"}
                    </span>
                  </span>
                );
              })}

              {/* Open trades counter */}
              {hl.openTrades != null && hl.openTrades > 0 && (
                <span className="ml-auto flex items-center gap-1.5 pl-2 border-l border-white/[0.08]">
                  <span className="text-[9px] uppercase tracking-wider text-[#6b7280]">Open</span>
                  <span className="text-[12px] font-semibold tabular-nums text-[#a78bfa]">{hl.openTrades}</span>
                </span>
              )}
            </div>

            {/* Bottom line (if extracted from content) */}
            {closing && (
              <div
                className="mt-2 px-3 py-1.5 rounded-md text-[11.5px] leading-snug"
                style={{
                  background: "rgba(139,92,246,0.04)",
                  borderLeft: "2px solid rgba(139,92,246,0.4)",
                  color: "#d1d5db",
                }}
              >
                <span className="text-[9px] uppercase tracking-widest font-bold text-[#a78bfa] mr-1.5">Take:</span>
                {closing}
              </div>
            )}
          </div>
        );
      }

      // ── Intraday Flash Insight Component ──────────────────────────────────
      function IntradayFlash({ entries }) {
        const [expanded, setExpanded] = useState(true);
        if (!entries || entries.length === 0) return null;
        const sorted = [...entries].sort((a, b) => (b.publishedAt || 0) - (a.publishedAt || 0));
        return (
          <div className="mb-8">
            <div
              className="flex items-baseline gap-3 mb-4 cursor-pointer select-none"
              onClick={() => setExpanded(v => !v)}
              title={expanded ? "Collapse intraday flashes" : "Expand intraday flashes"}
            >
              <span className="tt-label-editorial">Intraday Flash</span>
              <h2 className="tt-editorial m-0" style={{ fontSize: 20, lineHeight: 1.15, color: "var(--tt-text-1)", letterSpacing: "-0.01em" }}>
                Live market pulse

              <span className="tt-num" style={{ fontSize: 10.5, color: "var(--tt-text-4)" }}>{sorted.length}</span>
              <span style={{ flex: 1, height: 1, background: "var(--tt-border-weak)" }} />
              <svg
                width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"
                style={{ color: "var(--tt-text-3)", transform: expanded ? "rotate(180deg)" : "rotate(0deg)", transition: "transform var(--tt-dur-fast) var(--tt-ease-out)" }}

                <polyline points="6 9 12 15 18 9" />
              </svg>
            </div>

              <div key={entry.id || i} className="mb-6 pb-5" style={{ borderBottom: "1px solid var(--tt-border-weak)" }}>
                <div className="flex items-baseline gap-2 mb-3">
                  <span className="tt-heartbeat" aria-hidden="true" />
                  <span className="tt-label-editorial" style={{ fontSize: 10 }}>{entry.timeET || "Update"}</span>
                  {entry.publishedAt && (

                      {new Date(entry.publishedAt).toLocaleTimeString("en-US", { timeZone: "America/New_York", hour: "numeric", minute: "2-digit", hour12: true })} ET
                    </span>

              </div>
            ))}
          </div>
        );
      }

        // occasionally re-emits the same ID and also produces no-op

        const fetchIntraday = useCallback(async () => {
          try {
            const res = await fetch(`${API_BASE}/timed/daily-brief/intraday`, { cache: "no-store" });
            if (!res.ok) return;
            const data = await res.json();
            const raw = Array.isArray(data.entries) ? data.entries : [];
            const todayNy = new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
            const seen = new Set();
            const kept = [];
            for (const e of raw) {
              // Only today's flashes (anything older is stale noise)
              const pubDate = e.publishedAt
                ? new Date(e.publishedAt).toLocaleDateString("en-CA", { timeZone: "America/New_York" })
                : null;
              if (pubDate && pubDate !== todayNy) continue;
              // Dedupe on id (fallback: publishedAt+timeET)
              const key = e.id || `${e.publishedAt || ""}:${e.timeET || ""}`;
              if (seen.has(key)) continue;
              seen.add(key);
              // Skip empty entries — no content AND no notable flag
              const hasBody = typeof e.content === "string" && e.content.trim().length > 40;
              const notable = e.notable === true || e.severity === "high" || e.flash_kind === "event";
              if (!hasBody && !notable) continue;
              kept.push(e);

            setIntradayEntries(kept);

            </nav>

            {/* Content */}
            <div className="max-w-[1100px] mx-auto px-6 py-8">
              {/* Header */}
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h1 className="tt-editorial flex items-baseline gap-3" style={{ fontSize: "34px", lineHeight: 1.1, color: "var(--tt-text-0)", letterSpacing: "-0.02em" }}>
                    Daily Brief
                    <span className="tt-label-editorial" style={{ fontFamily: "var(--tt-font-ui)", fontSize: "9.5px" }}>AI-Powered</span>
                  </h1>
                  <p className="text-[12px] mt-1" style={{ color: "var(--tt-text-3)", letterSpacing: "0.12em", textTransform: "uppercase" }}>{today}</p>
                </div>
                {loading && <div className="loading-spinner" />}
              </div>

              {/* Market Overview Charts */}
              <MarketCharts />

              {/* Today's content in reverse chronological order */}
              {loading ? (
                <div className="flex items-center justify-center py-20">
                  <div className="loading-spinner mr-3" />
                  <span className="text-[13px] text-[#6b7280]">Loading brief...</span>
                </div>
              ) : (
                <div>
                  {/* 1. Evening Brief (5 PM) */}
                  {hasEvening ? (
                    <BriefCard brief={brief.evening} type="evening" />
                  ) : etNow >= 17 ? (
                    <BriefPlaceholder type="evening" />
                  ) : null}

                  {/* 2. Intraday Flash Insights (mid-day) */}
                  <IntradayFlash entries={intradayEntries} />

                  {/* 3. Morning Brief (9 AM) */}
                  {hasMorning ? (
                    <BriefCard brief={brief.morning} type="morning" />
                  ) : (
                    <BriefPlaceholder type="morning" />
                  )}
                </div>
              )}

              {/* Selected Archive Brief */}
              {selectedArchive && (
                <div className="mt-6">
                  <div className="flex items-center gap-3 mb-3">
                    <button onClick={() => { setSelectedArchive(null); setSelectedArchiveData(null); }} className="text-[12px] text-[#6b7280] hover:text-white transition-all">&larr; Back to current</button>
                    <span className="text-[12px] text-[#4b5563]">{selectedArchive}</span>
                    {isAdmin && selectedArchiveData && (
                      <div className="ml-auto flex items-center gap-2">
                        <span className="text-[11px] text-[#4b5563]">ES Prediction:</span>
                        <button onClick={() => markPrediction(selectedArchive, 1)} className="text-[11px] px-2 py-0.5 rounded bg-[#00c853]/10 text-[#00c853] hover:bg-[#00c853]/20 transition-all">Correct</button>
                        <button onClick={() => markPrediction(selectedArchive, 0)} className="text-[11px] px-2 py-0.5 rounded bg-[#ff5252]/10 text-[#ff5252] hover:bg-[#ff5252]/20 transition-all">Incorrect</button>
                      </div>
                    )}
                  </div>
                  {archiveDetailLoading ? (
                    <div className="flex items-center py-8"><div className="loading-spinner mr-3" /><span className="text-[13px] text-[#6b7280]">Loading...</span></div>
                  ) : selectedArchiveData ? (
                    (() => {
                      const _isM = selectedArchiveData.type === "morning";
                      const _acc = _isM ? "var(--tt-warning)" : "var(--tt-editorial)";
                      const _dateStr = selectedArchiveData.date
                        ? new Date(selectedArchiveData.date + "T12:00:00").toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" })
                        : selectedArchiveData.date;
                      return (
                        <div className="tt-card p-6">
                          <div className="flex items-baseline gap-3 mb-1">
                            <span className="tt-label-editorial" style={{ color: _acc }}>{_isM ? "Morning Brief" : "Evening Brief"}</span>
                            {selectedArchiveData.es_prediction_correct != null && (
                              <PredictionBadge value={selectedArchiveData.es_prediction_correct} />
                            )}
                          </div>
                          <h2 className="tt-editorial mb-4" style={{ fontSize: 22, lineHeight: 1.15, color: "var(--tt-text-0)", letterSpacing: "-0.01em" }}>{_dateStr}</h2>
                          <hr className="tt-divider" style={{ margin: "0 0 18px" }} />
                          <div className="brief-content" dangerouslySetInnerHTML={{ __html: renderMarkdown(selectedArchiveData.content) }} />
                        </div>
                      );
                    })()
                  ) : (
                    <div className="text-[13px] text-[#4b5563]">Brief not found.</div>
                  )}
                </div>
              )}

              {/* Archive Section */}
              <div className="mt-10">
                <div className="flex items-baseline gap-3 mb-4">
                  <span className="tt-label-editorial">Archive</span>
                  <h2 className="tt-editorial m-0" style={{ fontSize: 20, lineHeight: 1.15, color: "var(--tt-text-1)", letterSpacing: "-0.01em" }}>
                    Past briefs
                  </h2>
                  <span style={{ flex: 1, height: 1, background: "var(--tt-border-weak)" }} />
                  {archiveLoading && <div className="loading-spinner" style={{ width: 14, height: 14, borderWidth: 1.5 }} />}
                </div>
                <div className="tt-card p-4">
                  <ArchiveTree briefs={archiveBriefs} onSelect={fetchArchiveBrief} />
                </div>
              </div>
            </div>
          </div>
        );
      }

      // ── Mount ──────────────────────────────────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const briefApp = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="pro">{(user) => <App user={user} />}</AuthGate>
        : <App />;
      ReactDOM.createRoot(document.getElementById("root")).render(briefApp);
    </script>
    <footer id="legal-footer" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(10,10,15,0.92);backdrop-filter:blur(6px);border-top:1px solid rgba(255,255,255,0.06);padding:6px 16px;text-align:center;font-size:10px;color:#6b7280;line-height:1.4;">
      For informational and educational purposes only. Not investment advice. Past performance does not guarantee future results. All trading involves risk of loss. <a href="/terms.html" style="color:#6b7280;text-decoration:underline;">Full Terms</a> · Market data powered by <a href="https://twelvedata.com" target="_blank" rel="noopener" style="color:#6b7280;text-decoration:underline;">Twelve Data</a>
    </footer>
  </body>
</html>
