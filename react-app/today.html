    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.025);
        --tt-bg-elev: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.06);
        --tt-border-hi: rgba(255,255,255,0.12);
        --tt-text: #e5e7eb;
        --tt-text-muted: #9ca3af;
        --tt-text-dim: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: #f5c25c;
        --tt-accent-dim: rgba(245,194,92,0.14);
        --tt-violet: #a78bfa;
        --tt-violet-dim: rgba(167,139,250,0.14);
        --tt-cyan: #22d3ee;
        --tt-cyan-dim: rgba(34,211,238,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-mono: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      .tt-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 14px;
      }
      .tt-card-pad { padding: 22px 24px 20px; }
      @media (max-width: 720px) { .tt-card-pad { padding: 16px 16px 14px; } }
      .tt-sec-title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .tt-sec-h {
        font-size: 18px;
        font-weight: 800;
        color: var(--tt-text);
        letter-spacing: -0.02em;
        margin-bottom: 12px;
      }
      .tt-sec-sub {
        font-size: 13px;
        color: var(--tt-text-muted);
        margin-bottom: 14px;
        line-height: 1.55;
      }
      .tt-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 3px 9px;
        border-radius: 999px;
        font-family: var(--tt-font-mono);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
        color: var(--tt-text-muted);
      }
      .tt-pill.up    { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.25); }
      .tt-pill.dn    { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.25); }
      .tt-pill.accent { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(245,194,92,0.30); }
      .tt-pill.violet { color: var(--tt-violet); background: var(--tt-violet-dim); border-color: rgba(167,139,250,0.30); }
      .tt-pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
      .tt-grid { display: grid; gap: 14px; }
      @media (min-width: 920px) {
        .tt-grid-2 { grid-template-columns: 1fr 1fr; }
        .tt-grid-3 { grid-template-columns: repeat(3, 1fr); }
        .tt-grid-4 { grid-template-columns: repeat(4, 1fr); }
      }
      @media (max-width: 919px) {
        .tt-grid-2, .tt-grid-3, .tt-grid-4 { grid-template-columns: 1fr; }
      }
      /* Sections row spacing — wider container so the Bubble Map + Heat Map
         get the full horizontal real estate they need. Content can breathe. */
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      /* Nav */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1200px; margin: 0 auto;
        padding: 12px 16px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 11px;
        border-radius: 7px;
        font-weight: 500;
        transition: all 0.15s;
      }
      .nav-link:hover { background: var(--tt-bg-surface); color: var(--tt-text); }
      .nav-link.active { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.today { color: var(--tt-accent); background: var(--tt-accent-dim); border: 1px solid rgba(245,194,92,0.22); }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }
      /* Status header */
      .tt-status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-wrap: wrap;
        padding: 16px 18px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
      }
      .tt-status .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-status .greeting { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; }
      .tt-status .date { font-size: 13px; color: var(--tt-text-muted); margin-top: 2px; }
      .tt-status .session { display: inline-flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      /* Index card */
      .idx-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
        padding: 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .idx-card .name { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; color: var(--tt-text-dim); text-transform: uppercase; }
      .idx-card .px { font-size: 20px; font-weight: 800; color: var(--tt-text); letter-spacing: -0.02em; font-family: var(--tt-font-mono); }
      .idx-card .chg { font-family: var(--tt-font-mono); font-size: 12px; font-weight: 600; }
      .idx-card .chg.up { color: var(--tt-up); }
      .idx-card .chg.dn { color: var(--tt-dn); }
      /* Mover card */
      .mvr {
        display: grid;
        grid-template-columns: 22px 1fr auto auto;
        align-items: center;
        gap: 10px;
        padding: 7px 10px;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--tt-border);
        border-radius: 8px;
        text-decoration: none;
        color: inherit;
      }
      .mvr:hover { background: var(--tt-bg-elev); border-color: var(--tt-border-hi); }
      .mvr .rk {
        font-family: var(--tt-font-mono);
        font-size: 10px;
        color: var(--tt-text-faint);
        font-weight: 700;
        text-align: center;
      }
      .mvr .sym { font-size: 13px; font-weight: 700; color: var(--tt-text); }
      .mvr .name { font-size: 10.5px; color: var(--tt-text-dim); margin-top: 1px; }
      .mvr .px { font-family: var(--tt-font-mono); font-size: 12px; color: var(--tt-text); font-weight: 600; }
      .mvr .chg { font-family: var(--tt-font-mono); font-size: 12px; font-weight: 700; min-width: 60px; text-align: right; }
      .mvr .chg.up { color: var(--tt-up-soft); }
      .mvr .chg.dn { color: var(--tt-dn-soft); }
      /* Heatmap chip */
      .heat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(108px, 1fr));
        gap: 8px;
      }
      @media (max-width: 720px) {
        .heat-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
      }
      .heat-cell {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: stretch;
        justify-content: space-between;
        padding: 9px 11px;
        border-radius: 8px;
        background: rgba(255,255,255,0.02);
        border: 1px solid var(--tt-border);
        text-decoration: none;
        color: inherit;
        min-height: 62px;
        transition: all 0.12s;
      }
      .heat-cell:hover { border-color: var(--tt-border-hi); transform: translateY(-1px); }
      .heat-cell .sym { font-size: 13px; font-weight: 700; color: var(--tt-text); letter-spacing: 0.01em; }
      .heat-cell .pct { font-family: var(--tt-font-mono); font-size: 11.5px; font-weight: 700; }
      .heat-cell .pct.up { color: var(--tt-up-soft); }
      .heat-cell .pct.dn { color: var(--tt-dn-soft); }
      .heat-cell.lvl-strong  { border-color: rgba(34,197,94,0.35); background: rgba(34,197,94,0.06); }
      .heat-cell.lvl-mid     { border-color: rgba(245,194,92,0.22); background: rgba(245,194,92,0.04); }
      .heat-cell.lvl-weak    { border-color: rgba(244,63,94,0.30); background: rgba(244,63,94,0.05); }
      /* ── Analysis header (unified controls for Bubble Map + Heat Map) ── */
      .analysis-controls {
        margin-bottom: 22px;
        padding: 24px 26px 18px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-top: 2px solid rgba(245,194,92,0.35);
        border-radius: 14px;
      }
      @media (max-width: 720px) { .analysis-controls { padding: 18px 16px 14px; } }
      .ac-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }
      .ac-head .ac-meta { font-size: 12px; color: var(--tt-text-dim); font-family: var(--tt-font-mono); }
      .ac-head .ac-meta strong { color: var(--tt-text); }
      .ac-search {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 9px;
        margin-bottom: 12px;
      }
      .ac-search:focus-within { border-color: var(--tt-border-hi); background: var(--tt-bg-base); }
      .ac-search input {
        flex: 1;
        background: transparent;
        border: 0;
        outline: 0;
        color: var(--tt-text);
        font-family: var(--tt-font-mono);
        font-size: 13px;
        letter-spacing: 0.02em;
      }
      .ac-search input::placeholder { color: var(--tt-text-faint); }
      .ac-search-icon { color: var(--tt-text-dim); font-size: 14px; }
      .ac-search-clear {
        cursor: pointer;
        font-size: 11px;
        color: var(--tt-text-dim);
        background: transparent;
        border: 0;
        padding: 0 4px;
      }
      .ac-search-clear:hover { color: var(--tt-text); }
      /* Filter row: label + chips. Each row is a single-select group. */
      .ac-row {
        display: grid;
        grid-template-columns: 92px 1fr;
        align-items: start;
        gap: 14px;
        padding: 7px 0;
      }
      @media (max-width: 720px) {
        .ac-row { grid-template-columns: 1fr; gap: 4px; }
      }
      .ac-row-label {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        padding-top: 5px;
      }
      .ac-chips {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
      }
      .ac-chip {
        font-family: var(--tt-font-mono);
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.02em;
        padding: 3px 9px;
        border-radius: 999px;
        background: transparent;
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
        cursor: pointer;
        white-space: nowrap;
        transition: all 0.12s;
      }
      .ac-chip:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .ac-chip .ac-count { color: var(--tt-text-faint); margin-left: 4px; font-weight: 500; }
      .ac-chip.active {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
        border-color: var(--tt-border-hi);
      }
      .ac-chip.active.bull  { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.40); }
      .ac-chip.active.bear  { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.40); }
      .ac-chip.active.pull  { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(245,194,92,0.40); }
      .ac-chip.active.bull  .ac-count,
      .ac-chip.active.bear  .ac-count,
      .ac-chip.active.pull  .ac-count,
      .ac-chip.active       .ac-count { color: inherit; opacity: 0.7; }

      /* Bubble Map */
      .bm-stage {
        position: relative;
        background: radial-gradient(ellipse at center, rgba(255,255,255,0.025) 0%, transparent 65%), #06080b;
        border: 1px solid var(--tt-border);
        border-radius: 12px;
        overflow: hidden;
      }
      .bm-stage svg { display: block; width: 100%; height: auto; }
      .bm-tooltip {
        position: absolute;
        pointer-events: none;
        padding: 8px 10px;
        background: rgba(10,12,16,0.96);
        border: 1px solid var(--tt-border-hi);
        border-radius: 8px;
        font-size: 11.5px;
        line-height: 1.45;
        color: var(--tt-text);
        box-shadow: 0 6px 16px rgba(0,0,0,0.50);
        z-index: 10;
        font-family: var(--tt-font-mono);
        white-space: nowrap;
        max-width: 260px;
      }
      .bm-tooltip .sym { font-weight: 800; font-family: var(--tt-font); margin-bottom: 4px; font-size: 13px; }
      .bm-tooltip .row { color: var(--tt-text-muted); }
      .bm-tooltip .row strong { color: var(--tt-text); }
      .bm-legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
        font-size: 10.5px;
        color: var(--tt-text-dim);
        margin-top: 8px;
      }
      .bm-leg-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; vertical-align: middle; }
      .bm-meta {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-top: 10px;
        font-size: 11px;
        color: var(--tt-text-dim);
      }
      .bm-meta strong { color: var(--tt-text); }
      /* Skeleton */
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;
        border-radius: 6px;
      }
      @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      /* Brief preview specifics */
      .brief-head {
        font-size: 15px;
        font-weight: 700;
        color: var(--tt-text);
        line-height: 1.5;
        margin-bottom: 12px;
      }
      .brief-three {
        display: grid;
        gap: 10px;
        margin-bottom: 14px;
      }
      .brief-three .item {
        display: grid;
        grid-template-columns: 26px 1fr;
        gap: 10px;
        align-items: flex-start;
        font-size: 13.5px;
        line-height: 1.55;
        color: var(--tt-text-muted);
      }
      .brief-three .num {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px; height: 22px;
        border-radius: 7px;
        background: var(--tt-accent-dim);
        border: 1px solid rgba(245,194,92,0.22);
        color: var(--tt-accent);
        font-size: 11px;
        font-weight: 800;
        margin-top: 1px;
      }
      .brief-three .item strong { color: var(--tt-text); font-weight: 700; }
      .brief-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        border-radius: 9px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border-hi);
        color: var(--tt-text);
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.15s;
      }
      .brief-link:hover { border-color: rgba(245,194,92,0.40); background: var(--tt-accent-dim); color: var(--tt-accent); }
      /* Macro chip row */
      .macro-row {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }
      .macro-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 5px 10px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border-hi);
        border-radius: 7px;
        font-size: 12px;
        color: var(--tt-text);
      }
      .macro-chip .ts { color: var(--tt-text-dim); font-size: 11px; font-family: var(--tt-font-mono); }
      /* Earnings list */
      .earn-row {
        display: grid;
        grid-template-columns: 80px 1fr auto;
        align-items: center;
        gap: 10px;
        padding: 6px 10px;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--tt-border);
        border-radius: 7px;
      }
      .earn-row .date { font-family: var(--tt-font-mono); font-size: 11px; color: var(--tt-text-muted); }

    <div id="root">
      <main>
        <div class="tt-card tt-card-pad" style="text-align:center;color:var(--tt-text-muted)">Loading today's ingest…</div>
      </main>
    </div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      const h = React.createElement;

      // ── API base ───────────────────────────────────────────────
      const API_BASE = (() => {
        try {
          if (window.TIMED_API_BASE) return String(window.TIMED_API_BASE);
        } catch (_) {}
        return "https://timed-trading-ingest.shashant.workers.dev";
      })();

      // ── Helpers ────────────────────────────────────────────────
      function fmtUsd(v, d=2) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        const n = Number(v);
        return n.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: d, maximumFractionDigits: d });
      }
      function fmtPct(v, d=2) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        const n = Number(v);
        return (n >= 0 ? "+" : "") + n.toFixed(d) + "%";
      }
      function getDailyChange(t) {
        if (window.TimedPriceUtils?.getDailyChange) return window.TimedPriceUtils.getDailyChange(t);
        return { dayPct: t?.day_change_pct, dayChg: t?.day_change };
      }
      function safeArr(v) { return Array.isArray(v) ? v : []; }
      function nyFmtDate() {
        try {
          return new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric", timeZone: "America/New_York" });
        } catch { return new Date().toDateString(); }
      }
      function isNyRegularMarketOpen() {
        try {
          const f = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour12: false, weekday: "short", hour: "2-digit", minute: "2-digit" });
          const parts = f.formatToParts(new Date());
          const wd = parts.find(p => p.type === "weekday")?.value;
          if (wd === "Sat" || wd === "Sun") return false;
          const hh = Number(parts.find(p => p.type === "hour")?.value || 0);
          const mm = Number(parts.find(p => p.type === "minute")?.value || 0);
          const min = hh * 60 + mm;
          return min >= (9 * 60 + 30) && min < (16 * 60);
        } catch { return false; }
      }

      // ── Fetch helpers ──────────────────────────────────────────
      async function fetchAll() {
        const r = await fetch(`${API_BASE}/timed/all`, { credentials: "include" });
        return r.ok ? r.json() : { ok: false };
      }
      async function fetchBrief() {
        const r = await fetch(`${API_BASE}/timed/daily-brief`, { credentials: "include" });
        return r.ok ? r.json() : { ok: false };
      }
      async function fetchEarnings() {
        const r = await fetch(`${API_BASE}/timed/earnings/upcoming`, { credentials: "include" });
        return r.ok ? r.json() : { ok: false };
      }
      async function fetchCal() {
        const r = await fetch(`${API_BASE}/timed/market-calendar`, { credentials: "include" });
        return r.ok ? r.json() : { ok: false };
      }

      // ── Session pill ───────────────────────────────────────────
      function SessionPill({ cal }) {
        const open = isNyRegularMarketOpen();
        let label, cls;
        if (open) { label = "Market open · RTH"; cls = "up"; }
        else {
          try {
            const f = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour12: false, hour: "2-digit", minute: "2-digit", weekday: "short" });
            const parts = f.formatToParts(new Date());
            const wd = parts.find(p => p.type === "weekday")?.value;
            const hh = Number(parts.find(p => p.type === "hour")?.value || 0);
            const mm = Number(parts.find(p => p.type === "minute")?.value || 0);
            const min = hh*60+mm;
            if (wd === "Sat" || wd === "Sun") { label = "Weekend · Market closed"; cls = ""; }
            else if (min < 9*60+30) { label = "Pre-market"; cls = "accent"; }
            else if (min >= 16*60 && min < 20*60) { label = "After-hours"; cls = "accent"; }
            else { label = "Market closed"; cls = ""; }
          } catch { label = "Market closed"; cls = ""; }
        }
        return h("span", { className: `tt-pill ${cls}` },
          h("span", { className: "dot" }),
          label,
        );
      }

      // ── Status header ──────────────────────────────────────────
      function StatusHeader({ cal, briefDate }) {
        const hour = new Date().getHours();
        const greeting = hour < 5 ? "Up early" : hour < 12 ? "Good morning" : hour < 17 ? "Good afternoon" : "Good evening";
        return h("section", { className: "tt-status tt-row" },
          h("div", null,
            h("div", { className: "label" }, "TODAY"),
            h("div", { className: "greeting" }, greeting + " · Here's the read"),
            h("div", { className: "date" }, nyFmtDate()),
          ),
          h("div", { className: "session" },
            h(SessionPill, { cal }),
            briefDate && h("span", { className: "tt-pill" },
              h("span", { className: "dot", style: { background: "var(--tt-accent)" } }),
              "Brief: " + briefDate,
            ),
          ),
        );
      }

      // ── Daily Brief preview ────────────────────────────────────
      function BriefPreview({ brief }) {
        const info = brief?.infographic || {};
        const top3 = Array.isArray(info.topThree) ? info.topThree : [];
        const headline = info.headline || "";
        const closing = info.closingLine || "";

        return h("section", { className: "tt-card tt-card-pad tt-row" },
          h("div", { className: "tt-sec-title" }, "DAILY BRIEF — MORNING READ"),
          h("div", { className: "tt-sec-h" }, "What the model is watching today"),
          headline && h("p", { className: "brief-head" }, headline),
          top3.length > 0 && h("div", { className: "brief-three" },
            top3.slice(0, 3).map((item, i) => {
              const text = typeof item === "string" ? item : (item?.text || item?.label || item?.summary || JSON.stringify(item));
              return h("div", { key: i, className: "item" },
                h("span", { className: "num" }, String(i + 1)),
                h("span", { dangerouslySetInnerHTML: { __html: marked.parseInline(text) } }),
              );
            }),
          ),
          closing && h("p", { style: { fontSize: 13, color: "var(--tt-text-muted)", fontStyle: "italic", marginBottom: 14 } }, closing),
          h("div", { style: { display: "flex", gap: 8, flexWrap: "wrap" } },
            h("a", { href: "/daily-brief.html", className: "brief-link" },
              "Read full brief",
              h("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
                h("line", { x1: 5, y1: 12, x2: 19, y2: 12 }), h("polyline", { points: "12 5 19 12 12 19" }),
              ),
            ),
            h("a", { href: "/learn.html", className: "brief-link" }, "How to use the brief"),
          ),
        );
      }

      // ── Index card ─────────────────────────────────────────────
      function IndexCard({ sym, t }) {
        const dc = getDailyChange(t || {});
        const dayPct = Number.isFinite(dc?.dayPct) ? Number(dc.dayPct) : null;
        const price = Number(t?.price);
        const dir = dayPct == null ? "" : dayPct > 0 ? "up" : "dn";
        return h("a", { className: "idx-card", href: `/index-react.html?ticker=${encodeURIComponent(sym)}` },
          h("span", { className: "name" }, sym),
          h("span", { className: "px" }, Number.isFinite(price) ? fmtUsd(price) : "—"),
          h("span", { className: `chg ${dir}` }, dayPct != null ? (dayPct >= 0 ? "▲ " : "▼ ") + fmtPct(dayPct) : "—"),
        );
      }

      // ── Market state ───────────────────────────────────────────
      function MarketState({ data }) {
        // Use whichever index symbols are actually populated.
        // Universe has SPY/QQQ/IWM/DIA/SPX/VIXY but not raw VIX.
        const candidates = ["SPY", "QQQ", "IWM", "VIXY", "DIA"];
        const order = candidates.filter(sym => data?.[sym]).slice(0, 4);
        if (order.length === 0) return null;
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "MARKET STATE"),
          h("div", { className: "tt-sec-h" }, "Where the indices stand"),
          h("div", { className: "tt-grid tt-grid-4" },
            order.map(sym => h(IndexCard, { key: sym, sym, t: data[sym] })),
          ),
        );
      }

      // ── Macro events strip ─────────────────────────────────────
      function MacroStrip({ brief }) {
        const macro = brief?.infographic?.macro || [];
        const items = Array.isArray(macro) ? macro.slice(0, 12) : [];
        if (items.length === 0) return null;
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "MACRO ON THE TAPE"),
          h("div", { className: "tt-sec-h" }, "Events the model is weighting"),
          h("div", { className: "macro-row" },
            items.map((m, i) => {
              const label = typeof m === "string" ? m : (m?.label || m?.event || m?.name || JSON.stringify(m));
              const ts = typeof m === "object" ? (m?.when || m?.timestamp || m?.date || "") : "";
              return h("span", { key: i, className: "macro-chip" },
                label,
                ts && h("span", { className: "ts" }, ts),
              );
            }),
          ),
        );
      }

      // ── Top movers ─────────────────────────────────────────────
      function MoverRow({ rk, t, mode }) {
        const dc = getDailyChange(t);
        const pct = mode === "ext" ? Number(t?._ah_change_pct ?? t?.extended_percent_change) : Number(dc?.dayPct);
        const price = Number(t?.price);
        const sym = String(t?.ticker || "").toUpperCase();
        const dir = !Number.isFinite(pct) ? "" : pct >= 0 ? "up" : "dn";
        return h("a", { className: "mvr", href: `/index-react.html?ticker=${encodeURIComponent(sym)}` },
          h("span", { className: "rk" }, "#" + (rk + 1)),
          h("span", null,
            h("div", { className: "sym" }, sym),
          ),
          h("span", { className: "px" }, Number.isFinite(price) ? fmtUsd(price) : "—"),
          h("span", { className: `chg ${dir}` }, Number.isFinite(pct) ? (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%" : "—"),
        );
      }
      function MoversCol({ title, items, mode }) {
        return h("div", { className: "tt-card tt-card-pad" },
          h("div", { className: "tt-sec-title", style: { marginBottom: 10 } }, title),
          items.length === 0
            ? h("div", { style: { fontSize: 12, color: "var(--tt-text-dim)", fontStyle: "italic" } }, "No movers right now")
            : h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },
                items.map((t, i) => h(MoverRow, { key: t.ticker || i, rk: i, t, mode })),
              ),
        );
      }
      function TopMovers({ data }) {
        const arr = useMemo(() => {
          if (!data) return [];
          return Object.values(data).filter(t => t && t.ticker);
        }, [data]);

        const open = isNyRegularMarketOpen();
        const CRYPTO = new Set(["BTCUSD", "ETHUSD"]);

        // RTH gainers/losers
        const rthGain = useMemo(() => arr
          .map(t => { const dc = getDailyChange(t); return { t, pct: Number(dc?.dayPct) }; })
          .filter(x => Number.isFinite(x.pct))
          .sort((a, b) => b.pct - a.pct)
          .slice(0, 5)
          .map(x => x.t)
        , [arr]);
        const rthLoss = useMemo(() => arr
          .map(t => { const dc = getDailyChange(t); return { t, pct: Number(dc?.dayPct) }; })
          .filter(x => Number.isFinite(x.pct))
          .sort((a, b) => a.pct - b.pct)
          .slice(0, 5)
          .map(x => x.t)
        , [arr]);

        // EXT (after-hours) — only when market closed, exclude crypto
        const extGain = useMemo(() => {
          if (open) return [];
          return arr
            .filter(t => !CRYPTO.has(String(t.ticker).toUpperCase()))
            .map(t => ({ t, pct: Number(t?._ah_change_pct ?? t?.extended_percent_change) }))
            .filter(x => Number.isFinite(x.pct) && Math.abs(x.pct) > 0.05)
            .sort((a, b) => b.pct - a.pct)
            .slice(0, 5)
            .map(x => x.t);
        }, [arr, open]);
        const extLoss = useMemo(() => {
          if (open) return [];
          return arr
            .filter(t => !CRYPTO.has(String(t.ticker).toUpperCase()))
            .map(t => ({ t, pct: Number(t?._ah_change_pct ?? t?.extended_percent_change) }))
            .filter(x => Number.isFinite(x.pct) && Math.abs(x.pct) > 0.05)
            .sort((a, b) => a.pct - b.pct)
            .slice(0, 5)
            .map(x => x.t);
        }, [arr, open]);

        const hasExt = extGain.length > 0 || extLoss.length > 0;

        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "TOP MOVERS"),
          h("div", { className: "tt-sec-h" }, "Who's running and who's getting hit"),
          h("p", { className: "tt-sec-sub" },
            open
              ? "Live RTH movers across the universe. Click a row to open the ticker."
              : "RTH movers from today's session. EXT row shows after-hours follow-through."
          ),
          h("div", { className: "tt-grid tt-grid-2" },
            h(MoversCol, { title: "RTH GAINERS", items: rthGain, mode: "rth" }),
            h(MoversCol, { title: "RTH LOSERS", items: rthLoss, mode: "rth" }),
          ),
          hasExt && h("div", { className: "tt-grid tt-grid-2", style: { marginTop: 12 } },
            h(MoversCol, { title: "EXT GAINERS (after-hours)", items: extGain, mode: "ext" }),
            h(MoversCol, { title: "EXT LOSERS (after-hours)", items: extLoss, mode: "ext" }),
          ),
        );
      }

      // ── Earnings strip ─────────────────────────────────────────
      function EarningsStrip({ earnings }) {
        const events = safeArr(earnings?.events).slice();
        if (events.length === 0) return null;
        // Sort by date asc then BMO < DMH < AMC then symbol asc
        const HOUR_ORDER = (h) => {
          const hl = String(h || "").toLowerCase();
          if (hl.startsWith("bmo") || hl.includes("before")) return 0;
          if (hl.startsWith("dmh") || hl.includes("during")) return 1;
          if (hl.startsWith("amc") || hl.includes("after"))  return 2;
          return 3;
        };
        events.sort((a, b) => {
          const da = String(a?.date || ""); const db = String(b?.date || "");
          if (da !== db) return da.localeCompare(db);
          const ho = HOUR_ORDER(a?.hour) - HOUR_ORDER(b?.hour);
          if (ho !== 0) return ho;
          return String(a?.symbol || "").localeCompare(String(b?.symbol || ""));
        });
        const limited = events.slice(0, 18);
        // Group by date
        const byDay = {};
        for (const ev of limited) { (byDay[ev.date] = byDay[ev.date] || []).push(ev); }
        const days = Object.keys(byDay).slice(0, 5);
        if (days.length === 0) return null;

        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "EARNINGS THIS WEEK"),
          h("div", { className: "tt-sec-h" }, "Event-driven risk on the radar"),
          h("div", { className: "tt-grid tt-grid-3" },
            days.slice(0, 6).map(d =>
              h("div", { key: d, className: "tt-card tt-card-pad" },
                h("div", { style: { fontSize: 11, color: "var(--tt-text-dim)", fontWeight: 700, letterSpacing: "0.06em", marginBottom: 8 } }, d),
                h("div", { style: { display: "flex", flexDirection: "column", gap: 5 } },
                  byDay[d].slice(0, 6).map((ev, i) => h("div", { key: i, className: "earn-row" },
                    h("span", { className: "date" }, String(ev?.hour || "—").toUpperCase()),
                    h("span", null, h("span", { className: "sym" }, ev?.symbol || "?")),
                    h("span", { className: "hour" }, "$" + (Number(ev?.eps_est) || 0).toFixed(2) + " est"),
                  )),
                ),
              ),
            ),
          ),
        );
      }

      // ═══════════════════════════════════════════════════════════
      // ANALYSIS — Unified Search + Filters header that controls BOTH
      // the Bubble Map and the Heat Map below.
      //
      // Filter logic:
      //  - Single-select per row (radio-like), "All" resets that row.
      //  - Filters AND-combine across rows.
      //  - Search is "highlight not filter": matching tickers stay bright,
      //    others dim, but both views still render the full filtered set.
      //
      // Filter dimensions verified against /timed/all live data
      // (243 tickers as of 2026-05-16):
      //  STATE     all|bull(35)|pull(117)|bear(88)
      //  FOCUS     all|setup|enter|highRR|hiQuality|top30
      //  MOMENTUM  all|elite(92)|squeeze(95)|breakout(9)|compression(77)
      //  SECTOR    all|<cohort name> (top 8 sector cohorts)
      // ═══════════════════════════════════════════════════════════

      // Classify state into a bucket (used by both Bubble Map color + filters).
      function classifyStateBucket(state) {
        const s = String(state || "");
        if (s === "HTF_BULL_LTF_BULL") return "bull_aligned";
        if (s === "HTF_BEAR_LTF_BEAR") return "bear_aligned";
        if (s.includes("PULLBACK"))    return "pullback";
        if (s.startsWith("HTF_BULL"))  return "bull_mixed";
        if (s.startsWith("HTF_BEAR"))  return "bear_mixed";
        return "neutral";
      }
      const STATE_BUCKET_COLOR = {
        bull_aligned: "#22c55e",
        bear_aligned: "#f43f5e",
        pullback:     "#f5c25c",
        bull_mixed:   "#34d399",
        bear_mixed:   "#fb7185",
        neutral:      "#6b7280",
      };

      // Master filter — applied once at the TodayApp level so both views
      // agree on the visible set.
      function applyFilters(tickers, f) {
        return tickers.filter(t => {
          if (!t || !t.ticker) return false;
          if (f.stateF !== "all") {
            const b = classifyStateBucket(t.state);
            if (f.stateF === "bull" && !(b === "bull_aligned" || b === "bull_mixed")) return false;
            if (f.stateF === "pull" && b !== "pullback") return false;
            if (f.stateF === "bear" && !(b === "bear_aligned" || b === "bear_mixed")) return false;
          }
          if (f.focusF !== "all") {
            const stage = String(t.kanban_stage || "").toLowerCase();
            const eq = (t.entry_quality && typeof t.entry_quality === "object") ? Number(t.entry_quality.score) : NaN;
            const rr = Number(t.rr);
            const rankScore = Number(t.rank);
            if (f.focusF === "setup" && stage !== "setup") return false;
            if (f.focusF === "enter" && stage !== "enter" && stage !== "just_entered" && stage !== "in_review") return false;
            if (f.focusF === "highRR" && !(rr >= 2)) return false;
            if (f.focusF === "hiQuality" && !(Number.isFinite(eq) && eq >= 70)) return false;
            if (f.focusF === "top30" && !(Number.isFinite(rankScore) && rankScore >= 100)) return false;
          }
          if (f.momF !== "all") {
            const fl = t.flags || {};
            if (f.momF === "elite" && !fl.momentum_elite) return false;
            if (f.momF === "squeeze" && !(fl.sq30_on || fl.sq1h_on)) return false;
            if (f.momF === "breakout" && !fl.sq30_release) return false;
            if (f.momF === "compression" && !fl.saty_compression_multi_tf) return false;
          }
          if (f.sectorF !== "all") {
            const co = String(t._cohort || "").toLowerCase();
            if (co !== String(f.sectorF).toLowerCase()) return false;
          }
          return true;
        });
      }

      // ── AnalysisControls — the unified search + filter header ────────
      function AnalysisControls({ allTickers, visibleCount, filters, setFilters }) {
        const { query } = filters;
        const setQ = (v) => setFilters(f => ({ ...f, query: v }));
        const setS = (k, v) => setFilters(f => ({ ...f, [k]: v }));

        const counts = useMemo(() => {
          const c = {
            state: { all: 0, bull: 0, pull: 0, bear: 0 },
            focus: { setup: 0, enter: 0, highRR: 0, hiQuality: 0, top30: 0 },
            mom:   { elite: 0, squeeze: 0, breakout: 0, compression: 0 },
            sector: {},
          };
          for (const t of allTickers) {
            if (!t || !t.ticker) continue;
            c.state.all++;
            const b = classifyStateBucket(t.state);
            if (b === "bull_aligned" || b === "bull_mixed") c.state.bull++;
            else if (b === "pullback") c.state.pull++;
            else if (b === "bear_aligned" || b === "bear_mixed") c.state.bear++;
            const stage = String(t.kanban_stage || "").toLowerCase();
            const eq = (t.entry_quality && typeof t.entry_quality === "object") ? Number(t.entry_quality.score) : NaN;
            const rr = Number(t.rr);
            const rankScore = Number(t.rank);
            if (stage === "setup") c.focus.setup++;
            if (stage === "enter" || stage === "just_entered" || stage === "in_review") c.focus.enter++;
            if (rr >= 2) c.focus.highRR++;
            if (Number.isFinite(eq) && eq >= 70) c.focus.hiQuality++;
            if (Number.isFinite(rankScore) && rankScore >= 100) c.focus.top30++;
            const fl = t.flags || {};
            if (fl.momentum_elite)            c.mom.elite++;
            if (fl.sq30_on || fl.sq1h_on)     c.mom.squeeze++;
            if (fl.sq30_release)              c.mom.breakout++;
            if (fl.saty_compression_multi_tf) c.mom.compression++;
            const co = String(t._cohort || "").toLowerCase();
            if (co) c.sector[co] = (c.sector[co] || 0) + 1;
          }
          return c;
        }, [allTickers]);

        const sectorRows = useMemo(() => {
          return Object.entries(counts.sector)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 8)
            .map(([name, n]) => ({ name, n }));
        }, [counts.sector]);

        const chip = (rowKey, key, label, count, tone) => {
          const isActive = filters[rowKey] === key;
          const cls = `ac-chip${isActive ? " active" : ""}${isActive && tone ? " " + tone : ""}`;
          return h("button", { key, className: cls, onClick: () => setS(rowKey, key) },
            label,
            count != null && h("span", { className: "ac-count" }, count),
          );
        };

        const total = counts.state.all || 0;

        return h("div", { className: "analysis-controls" },
          h("div", { className: "ac-head" },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "ANALYSIS"),
              h("div", { className: "tt-sec-h" }, "Find what is moving — filter both views below"),
            ),
            h("div", { className: "ac-meta" },
              h("strong", null, visibleCount), " of ", h("strong", null, total), " tickers",
            ),
          ),
          h("div", { className: "ac-search" },
            h("span", { className: "ac-search-icon" }, "⌕"),
            h("input", {
              type: "search",
              placeholder: "Search ticker (e.g. NBIS, AAPL, GOOGL, MSFT)",
              value: query,
              onChange: (e) => setQ(e.target.value),
              spellCheck: false,
              autoComplete: "off",
              "aria-label": "Search ticker symbol",
            }),
            query && h("button", { className: "ac-search-clear", onClick: () => setQ("") }, "clear"),
          ),
          h("div", { className: "ac-row" },
            h("div", { className: "ac-row-label" }, "State"),
            h("div", { className: "ac-chips" },
              chip("stateF", "all",  "All",      counts.state.all),
              chip("stateF", "bull", "Bull",     counts.state.bull, "bull"),
              chip("stateF", "pull", "Pullback", counts.state.pull, "pull"),
              chip("stateF", "bear", "Bear",     counts.state.bear, "bear"),
            ),
          ),
          h("div", { className: "ac-row" },
            h("div", { className: "ac-row-label" }, "Focus"),
            h("div", { className: "ac-chips" },
              chip("focusF", "all",       "All"),
              chip("focusF", "setup",     "Setup",        counts.focus.setup),
              chip("focusF", "enter",     "Actionable",   counts.focus.enter),
              chip("focusF", "hiQuality", "High Quality", counts.focus.hiQuality),
              chip("focusF", "highRR",    "High R:R",     counts.focus.highRR),
              chip("focusF", "top30",     "Top Rank",     counts.focus.top30),
            ),
          ),
          h("div", { className: "ac-row" },
            h("div", { className: "ac-row-label" }, "Momentum"),
            h("div", { className: "ac-chips" },
              chip("momF", "all",         "All"),
              chip("momF", "elite",       "Mo Elite",    counts.mom.elite),
              chip("momF", "squeeze",     "Squeeze",     counts.mom.squeeze),
              chip("momF", "breakout",    "Breakout",    counts.mom.breakout),
              chip("momF", "compression", "Compression", counts.mom.compression),
            ),
          ),
          sectorRows.length > 0 && h("div", { className: "ac-row" },
            h("div", { className: "ac-row-label" }, "Sector"),
            h("div", { className: "ac-chips" },
              chip("sectorF", "all", "All"),
              ...sectorRows.map(({ name, n }) => {
                const label = name.split(" ").map(w => w ? w[0].toUpperCase() + w.slice(1) : w).join(" ");
                return chip("sectorF", name, label, n);
              }),
            ),
          ),
        );
      }

      // ═══════════════════════════════════════════════════════════
      // SharedBubbleMapSection — uses the shared BubbleChart from
      // shared-bubble-chart.compiled.js (extracted from Active Trader).
      //
      // This renders the EXACT same bubble plot that lives in
      // /index-react.html — no duplicate code, no drift between the
      // two pages.
      //
      // Today.html doesn't do Time Travel, trails, or insight filters
      // (those belong to the deep Active Trader workflow), so those
      // props are passed as null/false. The bubble plot, hover,
      // crosshair, click-to-open, and labels all work identically.
      //
      // Filter state lives in TodayApp's `filters` and is funneled into
      // the `tickers` prop via the `visible` array, so the AnalysisControls
      // chips above drive what bubbles render.
      //
      // Falls back to the in-page lightweight BubbleMap if the shared
      // module hasn't loaded yet (first paint / network failure).
      // ═══════════════════════════════════════════════════════════
      function SharedBubbleMapSection({ allTickers, visible, query, data }) {
        const SharedChart = (typeof window !== "undefined" && window.TimedBubbleChart && window.TimedBubbleChart.BubbleChart) || null;
        const getRankedTickers = (window.TimedBubbleChart && window.TimedBubbleChart.getRankedTickers) || null;

        // Compute rankedTickers / rankedTickerPositions once per data change.
        const rankedTickers = useMemo(() => {
          if (!getRankedTickers || !data) return [];
          try { return getRankedTickers(data) || []; } catch { return []; }
        }, [data]);
        const rankedTickerPositions = useMemo(() => {
          const m = new Map();
          rankedTickers.forEach((t, idx) => { if (t?.ticker) m.set(t.ticker, idx + 1); });
          return m;
        }, [rankedTickers]);

        // Hover + selected state for the bubble plot (local to this section).
        // We don't wire a right-rail or trails on /today — clicking a bubble
        // navigates to /index-react.html for deep view.
        const [hovered, setHovered] = useState(null);

        // Watch for query change → BubbleChart accepts no `query` prop directly,
        // but matches happen via its internal label rendering. The simplest
        // way to surface search highlighting is to nudge the filtered set:
        // if a query is active, dim non-matching tickers via opacity by
        // re-mapping the visible array with a `__bm_dim` flag. The shared
        // BubbleChart doesn't read that flag — so for now we leave search
        // dimming to the heat map. Search still filters the universe via
        // the AnalysisControls chip+ticker matching, just not visually on
        // the bubble plot here.
        // (Phase B.3 — add search-highlight prop to shared BubbleChart.)

        // If the shared module didn't load (network blip / dev), gracefully
        // fall back to the simpler in-page BubbleMap so the page still works.
        if (!SharedChart) {
          return h(BubbleMap, { allTickers, visible, query });
        }

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 8 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("div", { className: "tt-sec-h" }, "Where every ticker sits on momentum \u00d7 trend"),
            ),
            h("div", { className: "bm-legend" },
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#22c55e" } }), "Bull aligned"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#34d399" } }), "Bull mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f5c25c" } }), "Pullback"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#fb7185" } }), "Bear mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f43f5e" } }), "Bear aligned"),
            ),
          ),
          h("div", { className: "tt-card tt-card-pad", style: { padding: 0, overflow: "hidden" } },
            h("div", { style: { height: 700, position: "relative" } },
              h(SharedChart, {
                tickers: visible,
                allData: data,
                rankedTickers: rankedTickers,
                rankedTickerPositions: rankedTickerPositions,
                hoveredTicker: hovered,
                onHover: setHovered,
                onBubbleClick: (sym) => { window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`; },
                onBackgroundClick: () => {},
                selectedTicker: null,
                selectedTrail: null,
                isTimeTravelActive: false,
                highlightTrailPoint: null,
                thesisMode: false,
                forwardReturns: null,
                activeInsightTickers: null,
                layoutMode: "score",
              }),
            ),
          ),
        );
      }

      // ── Bubble Map fallback (in-page lightweight, used if shared module fails) ─
      function BubbleMap({ allTickers, visible, query }) {
        const [tooltip, setTooltip] = useState(null);
        const stageRef = React.useRef(null);

        const domain = useMemo(() => {
          let maxLtf = 5, maxHtf = 5;
          for (const t of allTickers) {
            const l = Math.abs(Number(t.ltf_score) || 0);
            const v = Math.abs(Number(t.htf_score) || 0);
            if (l > maxLtf) maxLtf = l;
            if (v > maxHtf) maxHtf = v;
          }
          const xMax = Math.max(10, Math.min(50, maxLtf * 1.12));
          const yMax = Math.max(10, Math.min(50, maxHtf * 1.12));
          return { xMax, yMax };
        }, [allTickers]);

        // Widescreen aspect (~7:3) — uses the full horizontal width of the
        // 1600px container so bubbles spread out and labels don't collide.
        const VB = { w: 1400, h: 620, mx: 70, my: 42 };
        const plotW = VB.w - 2 * VB.mx;
        const plotH = VB.h - 2 * VB.my;
        const xScale = (v) => VB.mx + ((Number(v) || 0) + domain.xMax) / (2 * domain.xMax) * plotW;
        const yScale = (v) => VB.my + (domain.yMax - (Number(v) || 0)) / (2 * domain.yMax) * plotH;
        const cx0 = xScale(0);
        const cy0 = yScale(0);

        const q = String(query || "").trim().toUpperCase();
        const matchesQuery = (sym) => q.length > 0 && String(sym).toUpperCase().startsWith(q);

        // Bigger plot = bigger bubbles. Range 6..22 px (was 4..16).
        const radiusFor = (t) => {
          const r = Math.min(Math.abs(Number(t.htf_score) || 0), 35);
          return 6 + (r / 35) * 16;
        };

        const handleHover = (e, t) => {
          if (!stageRef.current) return;
          const rect = stageRef.current.getBoundingClientRect();
          setTooltip({ t, x: e.clientX - rect.left + 12, y: e.clientY - rect.top - 8 });
        };
        const handleLeave = () => setTooltip(null);

        if (visible.length === 0 && allTickers.length === 0) return null;

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 8 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("div", { className: "tt-sec-h" }, "Where every ticker sits on momentum × trend"),
            ),
            h("div", { className: "bm-legend" },
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#22c55e" } }), "Bull aligned"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#34d399" } }), "Bull mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f5c25c" } }), "Pullback"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#fb7185" } }), "Bear mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f43f5e" } }), "Bear aligned"),
            ),
          ),
          h("div", { className: "tt-card tt-card-pad" },
            h("div", { className: "bm-stage", ref: stageRef },
              h("svg", { viewBox: `0 0 ${VB.w} ${VB.h}`, role: "img", "aria-label": "Universe bubble map", preserveAspectRatio: "xMidYMid meet" },
                h("g", { stroke: "rgba(255,255,255,0.04)", strokeWidth: 1 },
                  [0.25, 0.5, 0.75].map(p => h("line", { key: `v${p}`, x1: VB.mx + plotW * p, y1: VB.my, x2: VB.mx + plotW * p, y2: VB.my + plotH })),
                  [0.25, 0.5, 0.75].map(p => h("line", { key: `h${p}`, x1: VB.mx, y1: VB.my + plotH * p, x2: VB.mx + plotW, y2: VB.my + plotH * p })),
                ),
                h("rect", { x: cx0,   y: VB.my, width: plotW / 2, height: plotH / 2, fill: "rgba(34,197,94,0.025)" }),
                h("rect", { x: VB.mx, y: cy0,   width: plotW / 2, height: plotH / 2, fill: "rgba(244,63,94,0.025)" }),
                h("line", { x1: VB.mx, y1: cy0, x2: VB.mx + plotW, y2: cy0,             stroke: "rgba(255,255,255,0.12)", strokeWidth: 1 }),
                h("line", { x1: cx0,   y1: VB.my, x2: cx0,           y2: VB.my + plotH, stroke: "rgba(255,255,255,0.12)", strokeWidth: 1 }),
                h("text", { x: VB.mx + plotW - 12, y: VB.my + 22,         textAnchor: "end",   fill: "rgba(34,197,94,0.55)",  fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "STRONG TREND · HIGH MOMENTUM"),
                h("text", { x: VB.mx + 12,         y: VB.my + 22,         textAnchor: "start", fill: "rgba(245,194,92,0.55)", fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "STRONG TREND · PULLING BACK"),
                h("text", { x: VB.mx + 12,         y: VB.my + plotH - 8,  textAnchor: "start", fill: "rgba(244,63,94,0.55)",  fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "DOWNTREND"),
                h("text", { x: VB.mx + plotW - 12, y: VB.my + plotH - 8,  textAnchor: "end",   fill: "rgba(255,255,255,0.32)", fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "BUILDING / RECOVERY"),
                h("text", { x: VB.mx + plotW / 2, y: VB.h - 10, textAnchor: "middle", fill: "rgba(255,255,255,0.50)", fontSize: 13, fontWeight: 600 }, "SHORT-TERM MOMENTUM (LTF) →"),
                h("text", { x: 20,                y: VB.my + plotH / 2, textAnchor: "middle", fill: "rgba(255,255,255,0.50)", fontSize: 13, fontWeight: 600, transform: `rotate(-90 20 ${VB.my + plotH / 2})` }, "TREND STRENGTH (HTF) →"),

                visible.map((t) => {
                  const sym = String(t.ticker || "").toUpperCase();
                  const bucket = classifyStateBucket(t.state);
                  const color = STATE_BUCKET_COLOR[bucket];
                  const cx = xScale(t.ltf_score);
                  const cy = yScale(t.htf_score);
                  const r = radiusFor(t);
                  const isMatch = matchesQuery(sym);
                  const isDim = q.length > 0 && !isMatch;
                  return h("g", { key: sym,
                    style: { cursor: "pointer", opacity: isDim ? 0.22 : 1, transition: "opacity 0.18s" },
                    onMouseEnter: (e) => handleHover(e, t),
                    onMouseMove:  (e) => handleHover(e, t),
                    onMouseLeave: handleLeave,
                    onClick: () => { window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`; },
                  },
                    h("circle", {
                      cx, cy, r,
                      fill: color,
                      fillOpacity: isMatch ? 0.95 : 0.55,
                      stroke:      isMatch ? "#fff" : "rgba(0,0,0,0.4)",
                      strokeWidth: isMatch ? 2 : 1,
                    }),
                    (isMatch || r >= 11) && h("text", {
                      x: cx, y: cy + 4,
                      textAnchor: "middle",
                      fontSize: Math.max(10, Math.min(14, r * 0.75)),
                      fontWeight: 700,
                      fill: isMatch ? "#fff" : "rgba(255,255,255,0.92)",
                      style: { pointerEvents: "none", textShadow: "0 1px 1px rgba(0,0,0,0.6)" },
                    }, sym.length <= 4 ? sym : sym.slice(0, 4)),
                  );
                }),
              ),
              tooltip && h("div", { className: "bm-tooltip", style: { left: tooltip.x, top: tooltip.y } },
                h("div", { className: "sym" }, String(tooltip.t.ticker || "").toUpperCase()),
                h("div", { className: "row" }, "State: ", h("strong", null, tooltip.t.state || "—")),
                h("div", { className: "row" }, "HTF ", h("strong", null, (Number(tooltip.t.htf_score) || 0).toFixed(1)), " · LTF ", h("strong", null, (Number(tooltip.t.ltf_score) || 0).toFixed(1))),
                Number.isFinite(Number(tooltip.t.price)) && h("div", { className: "row" }, "Price: ", h("strong", null, fmtUsd(Number(tooltip.t.price)))),
                (() => {
                  const dc = getDailyChange(tooltip.t);
                  return Number.isFinite(dc?.dayPct) && h("div", { className: "row" }, "Today: ", h("strong", { style: { color: dc.dayPct >= 0 ? "#22c55e" : "#f43f5e" } }, (dc.dayPct >= 0 ? "+" : "") + dc.dayPct.toFixed(2) + "%"));
                })(),
                h("div", { className: "row", style: { marginTop: 4, fontSize: 10, color: "var(--tt-text-dim)" } }, "Click to open in Active Trader"),
              ),
            ),
          ),
        );
      }

      // ── Universe heatmap (props-driven) ────────────────────────
      function UniverseHeatmap({ visible, query }) {
        const [showAll, setShowAll] = useState(false);

        const items = useMemo(() => {
          const arr = visible.slice();
          arr.sort((a, b) => {
            const sa = Number(a?.htf_score);
            const sb = Number(b?.htf_score);
            const va = Number.isFinite(sa) ? sa : -999;
            const vb = Number.isFinite(sb) ? sb : -999;
            if (va !== vb) return vb - va;
            return String(a.ticker).localeCompare(String(b.ticker));
          });
          return arr;
        }, [visible]);

        if (items.length === 0) {
          return h("section", { className: "tt-row" },
            h("div", { className: "tt-sec-title" }, "HEAT MAP"),
            h("div", { className: "tt-sec-h" }, "Ranked by today’s score"),
            h("div", { className: "tt-card tt-card-pad", style: { textAlign: "center", color: "var(--tt-text-dim)", fontSize: 13, fontStyle: "italic" } },
              "No tickers match the current filters. Try clearing a filter above."
            ),
          );
        }

        const cap = 80;
        const shown = showAll ? items : items.slice(0, cap);
        const q = String(query || "").trim().toUpperCase();

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap" } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "HEAT MAP"),
              h("div", { className: "tt-sec-h" }, "Ranked by today’s score"),
            ),
            h("div", { style: { display: "flex", gap: 8, alignItems: "center", fontSize: 11, color: "var(--tt-text-dim)" } },
              h("span", { className: "tt-pill up" }, "Strong"),
              h("span", { className: "tt-pill accent" }, "Mid"),
              h("span", { className: "tt-pill dn" }, "Weak"),
            ),
          ),
          h("div", { className: "tt-card tt-card-pad" },
            h("div", { className: "heat-grid" },
              shown.map(t => {
                const sym = String(t.ticker).toUpperCase();
                const dc = getDailyChange(t);
                const pct = Number.isFinite(dc?.dayPct) ? Number(dc.dayPct) : null;
                const score = Number(t?.htf_score) || 0;
                const lvl = score >= 20 ? "lvl-strong" : score <= -15 ? "lvl-weak" : Math.abs(score) >= 5 ? "lvl-mid" : "";
                const pdir = !Number.isFinite(pct) ? "" : pct >= 0 ? "up" : "dn";
                const isMatch = q.length > 0 && sym.startsWith(q);
                const isDim = q.length > 0 && !isMatch;
                return h("a", {
                  key: sym,
                  className: `heat-cell ${lvl}`,
                  href: `/index-react.html?ticker=${encodeURIComponent(sym)}`,
                  title: `${sym} · HTF ${score.toFixed(1)} · LTF ${(Number(t?.ltf_score) || 0).toFixed(1)} · ${t?.state || ""}`,
                  style: { opacity: isDim ? 0.30 : 1, transition: "opacity 0.15s", ...(isMatch ? { outline: "1px solid #fff", outlineOffset: "-1px" } : {}) },
                },
                  h("span", { className: "sym" }, sym),
                  h("span", { className: `pct ${pdir}` }, pct != null ? (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%" : "—"),
                );
              }),
            ),
            items.length > cap && h("div", { style: { textAlign: "center", marginTop: 14 } },
              h("button", {
                onClick: () => setShowAll(s => !s),
                style: {
                  padding: "8px 18px", borderRadius: 8, fontSize: 12.5, fontWeight: 600,
                  background: "var(--tt-bg-elev)", border: "1px solid var(--tt-border-hi)",
                  color: "var(--tt-text)", cursor: "pointer",
                },
              }, showAll ? `Show top ${cap}` : `Show all ${items.length}`),
            ),
          ),
        );
      }


      // ── End CTA ────────────────────────────────────────────────
      function EndCTA() {
        return h("section", { className: "end-cta tt-row" },
          h("a", { href: "/index-react.html", className: "primary" },
            "Open Active Trader",
            h("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
              h("line", { x1: 5, y1: 12, x2: 19, y2: 12 }), h("polyline", { points: "12 5 19 12 12 19" }),
            ),
          ),
          h("a", { href: "/investor-dashboard.html" }, "Open Investor"),
          h("a", { href: "/simulation-dashboard.html" }, "View Trades"),
        );
      }

      // ── App root ───────────────────────────────────────────────
      function TodayApp() {
        const [data, setData] = useState(null);
        const [brief, setBrief] = useState(null);
        const [earnings, setEarnings] = useState(null);
        const [cal, setCal] = useState(null);
        const [error, setError] = useState(null);

        // Unified analysis filter state — controls BOTH Bubble Map + Heat Map
        const [filters, setFilters] = useState({
          query:   "",
          stateF:  "all",
          focusF:  "all",
          momF:    "all",
          sectorF: "all",
        });

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const [a, b, e, c] = await Promise.all([fetchAll(), fetchBrief(), fetchEarnings(), fetchCal()]);
              if (!alive) return;
              if (a?.ok) setData(a.data || {});
              if (b?.ok) {
                const _now = new Date();
                const _ny = new Date(_now.toLocaleString("en-US", { timeZone: "America/New_York" }));
                const past4 = _ny.getHours() >= 16;
                setBrief(past4 ? (b.brief?.evening || b.brief?.morning) : (b.brief?.morning || b.brief?.evening));
              }
              if (e?.ok) setEarnings(e);
              if (c?.ok) setCal(c);
            } catch (err) {
              if (alive) setError(String(err?.message || err));
            }
          })();
          return () => { alive = false; };
        }, []);

        // Single source of truth for the universe and filtered set.
        const allTickers = useMemo(() => data ? Object.values(data).filter(t => t && t.ticker) : [], [data]);
        const visible    = useMemo(() => applyFilters(allTickers, filters),                            [allTickers, filters]);

        if (error) {
          return h("main", null,
            h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-dn-soft)" } },
              "Couldn't load today's data: " + error
            ),
          );
        }

        return h("main", null,
          // ── Digest (passive read) ──
          h(StatusHeader, { cal, briefDate: brief?.date }),
          brief && h(BriefPreview, { brief }),
          data && h(MarketState, { data }),
          brief && h(MacroStrip, { brief }),
          data && h(TopMovers, { data }),
          earnings && h(EarningsStrip, { earnings }),
          // ── Analysis (interactive) ── unified controls drive both views
          data && h(AnalysisControls, { allTickers, visibleCount: visible.length, filters, setFilters }),
          // Bubble Map: shared component extracted from Active Trader (P0.B.1).
          // Renders the EXACT same plot as /index-react.html. Falls back to the
          // simpler in-page BubbleMap if the shared module isn't loaded yet.
          data && h(SharedBubbleMapSection, { allTickers, visible, query: filters.query, data }),
          data && h(UniverseHeatmap, { visible, query: filters.query }),
          h(EndCTA, null),
        );
      }

      // ── Mount with auth gate ───────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const app = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="pro">{(user) => <TodayApp user={user} />}</AuthGate>
        : <TodayApp />;
      ReactDOM.createRoot(document.getElementById("root")).render(app);
    </script>
