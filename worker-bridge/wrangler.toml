name = "tt-broker-bridge"
main = "bridge-index.js"
compatibility_date = "2026-05-29"
compatibility_flags = ["nodejs_compat"]

# 2026-06-01 — Phase C reconciler cron. Runs every 5 minutes; the
# scheduled() handler gates on NY regular-hours so off-hours
# invocations are cheap no-ops. Set BROKER_RECONCILE_24_7=true to
# disable the gate (useful for Investor mode + post-market checks).
# Set BROKER_RECONCILE_DRY_RUN=true to log without persisting.
[triggers]
crons = ["*/5 * * * *"]

# 2026-05-29 — Phase 1 sidecar bridge for live broker integration.
# Separate worker from timed-trading-ingest by design: keeps RH OAuth
# tokens + the entire credentials surface OUT of the main worker, and
# isolates rate-limit / outage risk. See PR #340 + tasks/2026-05-29-
# broker-bridge-phase1-plan.md for the design rationale.

[vars]
# Mock mode — when "true", the bridge logs orders to D1 audit but
# DOES NOT call the actual broker (RH MCP or IBKR REST). Flipped to
# "false" 2026-05-29 after operator wired IBKR OAuth 1.0a creds as
# env-level secrets. Read-only verification calls (get_portfolio,
# get_equity_positions) now hit IBKR for real; place_equity_order
# is still gated by broker_integration_enabled on the user record
# (default false), so no live order can fire by accident.
BROKER_BRIDGE_MOCK = "false"

# Bridge environment label — surfaces in audit log + responses.
BRIDGE_ENV = "phase1-mvp"

# Hard caps — defaults; per-user values in KV override these.
DEFAULT_MAX_ORDER_USD = "5000"
DEFAULT_MAX_ORDERS_PER_DAY = "3"

# Long-only enforcement — RH Agentic doesn't support shorts at launch.
# When "true" the bridge rejects any side='short' / side='sell_short'.
# 2026-06-01 — Naked shorts are now HARD-rejected at the code level
# regardless of this var; left here for documentation only.
REJECT_SHORT_SIDES = "true"

# 2026-06-01 — Phase B manifest-aware reducer rollout switch.
#   "on"  — reject TRIM/EXIT per §4.1 (manifest required)
#   "log" — shadow mode: log "would_reject" but allow the order
#   "off" — skip manifest check entirely (back-compat / emergency rollback)
# Default to "log" for the first week of production so the operator
# can review the warn-logs before flipping to "on".
BROKER_MANIFEST_ENFORCE = "log"

# 2026-06-01 — Phase C reconciler config.
# When "true" the cron runs 24/7 (useful for Investor mode); otherwise
# it skips off-hours invocations. Default false.
BROKER_RECONCILE_24_7 = "false"
# When "true" the cron classifies drift + logs but does NOT persist
# updates to the manifest. Default false (live reconciliation).
BROKER_RECONCILE_DRY_RUN = "false"

# 2026-06-01 — Phase D OCO (One-Cancels-Other) order lifecycle.
# When "true" the bridge plans + logs the SL/TP cancel-then-replace
# orchestration for TRIM/EXIT reducers. When "false" (default) the
# orchestration is skipped entirely and SL/TP placement is operator-
# managed. Full cancel/place dispatch lands in Phase E.
BROKER_OCO_ENABLED = "false"

# Operator email for audit-log notifications when limits trip.
OPERATOR_EMAIL = "shashant@gmail.com"

[[d1_databases]]
binding = "BRIDGE_DB"
database_name = "timed-trading-ledger"
database_id = "99fae5d6-98df-4e29-bab5-0665cac7a9ff"

[[kv_namespaces]]
binding = "BRIDGE_KV"
id = "951f03a0c0464ecfa0d8dad25ebb3361"

# Secrets (must be set via `wrangler secret put` — not in wrangler.toml):
#   BRIDGE_ENCRYPTION_KEY      AES-256 key (32 bytes b64) for token wrap
#   BRIDGE_INTERNAL_HMAC_KEY   HMAC for verifying inbound webhooks from TT
#   ROBINHOOD_OAUTH_CLIENT_ID  RH OAuth client id (once issued by RH)
#   ROBINHOOD_OAUTH_CLIENT_SECRET
