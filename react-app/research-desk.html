    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.025);
        --tt-bg-elev: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.06);
        --tt-border-hi: rgba(255,255,255,0.12);
        --tt-text: #e5e7eb;
        --tt-text-muted: #9ca3af;
        --tt-text-dim: #6b7280;
        --tt-up: #22c55e;
        --tt-dn: #f43f5e;
        --tt-amber: #f59e0b;
        --tt-blue: #3b82f6;
        --tt-purple: #a855f7;
        --tt-font: 'Inter', system-ui, -apple-system, sans-serif;
      }
      body { background: var(--tt-bg-base); color: var(--tt-text); font-family: var(--tt-font); margin: 0; }
      main { max-width: 1180px; margin: 0 auto; padding: 24px 16px 80px; }
      h1, h2, h3 { font-weight: 700; letter-spacing: -0.01em; }
      h1 { font-size: 24px; margin: 0 0 4px; }
      h2 { font-size: 16px; margin: 0 0 12px; color: var(--tt-text); }
      h3 { font-size: 13px; margin: 0 0 8px; color: var(--tt-text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
      .card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: 12px; padding: 18px; }
      .card + .card { margin-top: 14px; }
      .grid-2 { display: grid; grid-template-columns: 1fr; gap: 14px; }
      @media (min-width: 900px) { .grid-2 { grid-template-columns: 1fr 1fr; } }
      .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 600; border: 1px solid var(--tt-border-hi); background: var(--tt-bg-elev); color: var(--tt-text-muted); }
      .chip-on { color: #34d399; border-color: rgba(52,211,153,0.4); background: rgba(52,211,153,0.08); }
      .chip-warn { color: #f59e0b; border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.08); }
      .chip-blue { color: #93c5fd; border-color: rgba(59,130,246,0.4); background: rgba(59,130,246,0.08); }
      .chip-pur { color: #d8b4fe; border-color: rgba(168,85,247,0.4); background: rgba(168,85,247,0.08); }
      .chip-dn { color: #fb7185; border-color: rgba(244,63,94,0.4); background: rgba(244,63,94,0.08); }
      .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
      .muted { color: var(--tt-text-muted); font-size: 12px; }
      .dim { color: var(--tt-text-dim); font-size: 11px; }
      .topnav { background: rgba(10,10,15,0.95); border-bottom: 1px solid var(--tt-border); }
      .nav-row { max-width: 1180px; margin: 0 auto; padding: 10px 16px; display: flex; align-items: center; gap: 18px; }
      .nav-brand { display: inline-flex; align-items: center; gap: 8px; color: var(--tt-text); text-decoration: none; font-weight: 700; }
      .nav-links { display: flex; gap: 14px; margin-left: 12px; }
      .nav-link { color: var(--tt-text-muted); text-decoration: none; font-size: 14px; font-weight: 600; padding: 6px 0; }
      .nav-link.active { color: var(--tt-text); }
      .nav-link:hover { color: var(--tt-text); }
      .verdict {
        background: linear-gradient(135deg, rgba(168,85,247,0.06), rgba(59,130,246,0.04));
        border: 1px solid rgba(168,85,247,0.25);
        border-radius: 12px;
        padding: 18px;
        font-size: 15px;
        line-height: 1.55;
      }
      .obs-row { display: grid; grid-template-columns: 140px 1fr 100px; gap: 12px; padding: 10px 0; border-bottom: 1px solid var(--tt-border); align-items: start; font-size: 13px; }
      .obs-row:last-child { border-bottom: 0; }
      .obs-section { color: var(--tt-text-muted); font-weight: 600; font-size: 12px; }
      .obs-source { color: var(--tt-text-dim); font-size: 11px; text-align: right; }
      .sig-line { padding: 8px 12px; background: var(--tt-bg-elev); border-radius: 8px; margin-bottom: 6px; font-size: 12px; line-height: 1.5; }
      .sig-line .pair { font-weight: 700; color: #67e8f9; }
      .sig-line .dir { color: var(--tt-text-muted); }
      .lvl-row { display: grid; grid-template-columns: 80px 1fr 70px 80px; gap: 8px; padding: 6px 0; font-size: 12px; align-items: center; }
      .lvl-label { font-weight: 600; }
      .lvl-prob { text-align: right; font-variant-numeric: tabular-nums; font-weight: 700; }
      .markdown { font-size: 13px; line-height: 1.6; color: var(--tt-text); }
      .markdown h1, .markdown h2, .markdown h3 { color: var(--tt-text); margin: 12px 0 6px; text-transform: none; letter-spacing: 0; font-size: 14px; }
      .markdown ul { margin: 6px 0; padding-left: 20px; }
      .markdown li { margin: 3px 0; }
      .markdown p { margin: 6px 0; }
      .markdown code { background: var(--tt-bg-elev); padding: 2px 5px; border-radius: 4px; font-size: 12px; }
      .btn {
        background: var(--tt-bg-elev); border: 1px solid var(--tt-border-hi); color: var(--tt-text);
        padding: 7px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer;
        transition: background 120ms;
      }
      .btn:hover { background: rgba(255,255,255,0.08); }
      .btn-danger { color: #fb7185; border-color: rgba(244,63,94,0.4); }
      .btn-danger:hover { background: rgba(244,63,94,0.08); }
      .btn-go { color: #34d399; border-color: rgba(52,211,153,0.4); }
      .btn-go:hover { background: rgba(52,211,153,0.08); }
      .table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .table th { text-align: left; font-weight: 600; padding: 8px 6px; border-bottom: 1px solid var(--tt-border); color: var(--tt-text-muted); }
      .table td { padding: 8px 6px; border-bottom: 1px solid var(--tt-border); }
      .table tr:last-child td { border-bottom: 0; }
      .tabular { font-variant-numeric: tabular-nums; }
      .ok { color: #34d399; }
      .err { color: #fb7185; }
      .warn { color: #fbbf24; }
      .json-pre {
        background: var(--tt-bg-elev); border: 1px solid var(--tt-border); border-radius: 8px;
        padding: 12px; font-size: 11px; font-family: 'SF Mono', Menlo, Consolas, monospace;
        overflow-x: auto; color: var(--tt-text-muted); max-height: 360px;
      }
      .actions-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 10px;
      }
      .action-tile {
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .btn-sm { padding: 4px 10px; font-size: 11px; }
      .spinner {
        display: inline-block; width: 14px; height: 14px;
        border: 2px solid var(--tt-border-hi); border-top-color: var(--tt-text-muted);
        border-radius: 50%; animation: spin 700ms linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;
      const h = React.createElement;
      const API_BASE = "";

      const fmtDate = (ts) => {
        if (!ts) return "—";
        const d = new Date(ts);
        return d.toLocaleString("en-US", { dateStyle: "medium", timeStyle: "short" });
      };
      const fmtAgo = (ts) => {
        if (!ts) return "—";
        const diff = Math.max(0, Date.now() - Number(ts));
        const m = Math.floor(diff / 60000);
        if (m < 1) return "just now";
        if (m < 60) return `${m}m ago`;
        const hr = Math.floor(m / 60);
        if (hr < 24) return `${hr}h ago`;
        return `${Math.floor(hr / 24)}d ago`;
      };
      const pct = (n, d = 0) => Number.isFinite(n) ? `${(n * 100).toFixed(d)}%` : "—";

      async function jget(path) {
        try {
          const r = await fetch(`${API_BASE}${path}`, { credentials: "include", cache: "no-store" });
          const json = await r.json().catch(() => null);
          return { status: r.status, ok: r.ok, body: json };
        } catch (e) {
          return { status: 0, ok: false, body: null, error: String(e?.message || e) };
        }
      }
      async function jpost(path, body) {
        try {
          const r = await fetch(`${API_BASE}${path}`, {
            method: "POST",
            credentials: "include",
            cache: "no-store",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(body || {}),
          });
          const json = await r.json().catch(() => null);
          return { status: r.status, ok: r.ok, body: json };
        } catch (e) {
          return { status: 0, ok: false, body: null, error: String(e?.message || e) };
        }
      }

      function StatusBanner({ data }) {
        const cro = data?.cro;
        const cto = data?.cto;
        const strat = data?.strategy;
        const override = data?.override?.body;
        const overrideActive = !!(override?.active);
        // 2026-06-03 — Surface the orchestrator's last-cycle tombstone so the
        // operator can see WHEN the cycle last ran and what failed even if
        // the data panels below render empty. Single source of truth: KV blob
        // timed:cro:last_summary, written by runCROFullCycle.
        const sumWrap = data?.lastSummary;
        const sum = (sumWrap && sumWrap.ok && sumWrap.body && sumWrap.body.ok !== false) ? sumWrap.body : null;
        const cycleChip = sum ? (() => {
          const t = sum.finished_at || sum.started_at;
          const ageMin = t ? Math.round((Date.now() - t) / 60000) : null;
          const tone = (!sum.ok || (sum.errors && sum.errors.length > 0)) ? "chip-warn" : "chip-on";
          const head = sum.ok ? "Last cycle OK" : "Last cycle had errors";
          const ageStr = ageMin == null ? "" : (ageMin < 60 ? ` · ${ageMin}m ago` : ` · ${(ageMin/60).toFixed(1)}h ago`);
          return h("span", { className: `chip ${tone}`, title: (sum.errors || []).join("; ") || "" }, `${head}${ageStr}`);
        })() : h("span", { className: "chip chip-warn" }, "No cycle has run yet");
        // Per-step health glance
        const stepChips = sum ? [
          sum.cto && h("span", { key: "cto", className: `chip ${sum.cto.ok ? "chip-on" : "chip-warn"}` }, `CTO ${sum.cto.tickers_ok}/${sum.cto.tickers_processed}`),
          sum.rotation && h("span", { key: "rot", className: `chip ${sum.rotation.ok ? "chip-on" : "chip-warn"}` }, `Rotation ${sum.rotation.ok ? "ok" : "fail"}`),
          sum.fsd_ingestion && h("span", { key: "fsd", className: `chip ${sum.fsd_ingestion.ok ? "chip-on" : sum.fsd_ingestion.skipped ? "chip" : "chip-warn"}` }, sum.fsd_ingestion.skipped ? `FSD skipped (${sum.fsd_ingestion.skipped.slice(0,20)})` : `FSD ${sum.fsd_ingestion.ingested} ingested`),
          sum.applies_count > 0 && h("span", { key: "app", className: "chip chip-blue" }, `${sum.applies_count} auto-applied`),
        ].filter(Boolean) : [];
        return h("div", { className: "card", style: { marginBottom: 14 } },
          h("div", { className: "row", style: { justifyContent: "space-between", marginBottom: 8 } },
            h("h1", null, "Research Desk"),
            h("div", { className: "muted" }, "Live · refreshes every 5 min · admin actions visible to admins only")
          ),
          h("div", { className: "row" },
            h("span", { className: `chip ${strat?.body?.vintage ? "chip-on" : "chip-warn"}` },
              `Playbook ${strat?.body?.vintage || "?"}`),
            h("span", { className: `chip ${strat?.body?.tactical?.vintage ? "chip-on" : "chip-warn"}` },
              `Tactical ${strat?.body?.tactical?.vintage || "?"} · ${(strat?.body?.tactical?.signals || []).length} signals`),
            overrideActive
              ? h("span", { className: "chip chip-pur" }, `CRO override active: ${override?.blob?.proposal_id || "?"}`)
              : h("span", { className: "chip" }, "No CRO override"),
            cro?.body?.ok
              ? h("span", { className: "chip chip-blue" }, `CRO note ${cro?.body?.as_of_date || ""}`)
              : h("span", { className: "chip chip-warn" }, "No CRO note yet (cron fires 22:00 UTC)"),
            cto?.body?.ok
              ? h("span", { className: "chip chip-blue" }, `CTO universe ${cto?.body?.tickers_ok || 0}/${cto?.body?.tickers_processed || 0} tickers`)
              : h("span", { className: "chip chip-warn" }, "No CTO rollup yet"),
            h("span", { className: "chip" }, `Refreshed ${fmtAgo(data?.fetched_at)}`)
          ),
          h("div", { className: "row", style: { marginTop: 8 } },
            cycleChip,
            ...stepChips,
          ),
          sum && Array.isArray(sum.errors) && sum.errors.length > 0 && h("div", { className: "muted", style: { marginTop: 6, fontSize: 11, fontFamily: "monospace" } },
            `errors: ${sum.errors.slice(0,3).join("; ").slice(0,300)}`
          )
        );
      }

      function CRONoteCard({ data }) {
        const cro = data?.cro;
        // 2026-06-03 — Also gate on inner body.ok (the endpoint returns 200 +
        // { ok:false, error_kind:"no_note_yet" } before the first cycle).
        if (!cro || !cro.ok || !cro.body || cro.body.ok === false) {
          return h("div", { className: "card" },
            h("h2", null, "🧠 CRO Daily Research Note"),
            h("div", { className: "muted" },
              "No note for today yet. The synthesis fires nightly at 22:00 UTC after CTO + rotation + FSD ingestion complete. ",
              "FSD ingestion ALSO runs hourly during US business hours (13-21 UTC Mon-Fri) so daily-strategy publications land within ~1h of release. ",
              "Click \"Kick full CRO/CTO cycle\" in Admin Actions below to populate immediately.")
          );
        }
        const n = cro.body;
        const verdict = n.verdict || "(no verdict)";
        const obs = Array.isArray(n.observations) ? n.observations : [];
        const drifts = Array.isArray(n.notable_drifts) ? n.notable_drifts : [];
        const indicators = Array.isArray(n.early_indicators) ? n.early_indicators : [];
        const gaps = Array.isArray(n.data_gaps) ? n.data_gaps : [];
        const md = n.full_note_md ? marked.parse(n.full_note_md) : "";
        return h("div", { className: "card" },
          h("div", { className: "row", style: { justifyContent: "space-between", marginBottom: 8 } },
            h("h2", null, "🧠 CRO Daily Research Note"),
            h("div", { className: "dim" },
              `${n.as_of_date} · ${n.model_used || ""} · ${fmtAgo(n.produced_at)}`)
          ),
          h("div", { className: "verdict" }, verdict),
          obs.length > 0 && h("div", { style: { marginTop: 16 } },
            h("h3", null, "Observations (cited)"),
            obs.map((o, i) => h("div", { key: i, className: "obs-row" },
              h("div", { className: "obs-section" }, o.section),
              h("div", null, o.text),
              h("div", { className: "obs-source" }, o.source)
            ))
          ),
          indicators.length > 0 && h("div", { style: { marginTop: 16 } },
            h("h3", null, "Early indicators"),
            indicators.slice(0, 6).map((e, i) => h("div", { key: i, className: "sig-line" },
              h("span", { className: "pair" }, e.indicator || ""),
              " — ",
              h("span", { className: "dir" }, e.implication || ""),
              e.source && h("span", { className: "dim", style: { marginLeft: 8 } }, `[${e.source}]`)
            ))
          ),
          drifts.length > 0 && h("div", { style: { marginTop: 16 } },
            h("h3", null, "⚠️ Notable drifts vs playbook"),
            drifts.map((d, i) => h("div", { key: i, className: "sig-line", style: { borderLeft: "3px solid #f59e0b", paddingLeft: 12 } },
              h("div", null, h("strong", null, "Observation: "), d.claim),
              d.drift_from && h("div", { className: "muted", style: { marginTop: 4 } },
                h("strong", null, "Conflicts with: "), d.drift_from),
              d.evidence && h("div", { className: "dim", style: { marginTop: 2 } }, `Evidence: ${d.evidence}`)
            ))
          ),
          gaps.length > 0 && h("div", { style: { marginTop: 16 } },
            h("h3", null, "Data gaps"),
            h("div", { className: "muted" }, gaps.join(" · "))
          ),
          md && h("div", { style: { marginTop: 16 } },
            h("h3", null, "Full note"),
            h("div", { className: "markdown", dangerouslySetInnerHTML: { __html: md } })
          )
        );
      }

      function CTOUniverseCard({ data }) {
        const cto = data?.cto;
        // 2026-06-03 — Properly detect the "no rollup yet" body shape. The
        // GET /timed/cto/universe endpoint returns HTTP 200 with body
        // { ok:false, error_kind:"no_rollup_yet" } when no KV rollup exists.
        // The outer cto.ok (HTTP wrapper) is true so the old guard fell
        // through and rendered "undefined/undefined tickers · —". Now we
        // also check the inner body.ok before treating the data as live.
        const body = cto?.body;
        const isLive = !!(cto && cto.ok && body && body.ok !== false && Number.isFinite(Number(body.tickers_processed)));
        if (!isLive) {
          const summary = data?.lastSummary?.body || null;
          const cycleNote = summary && summary.cto
            ? `Last cycle: CTO ok=${summary.cto.ok} (${summary.cto.tickers_ok || 0}/${summary.cto.tickers_processed || 0} tickers). ${summary.errors && summary.errors.length ? "Errors: " + summary.errors.slice(0,2).join("; ").slice(0,200) : ""}`
            : null;
          return h("div", { className: "card" },
            h("h2", null, "📐 CTO Probabilistic Levels"),
            h("div", { className: "muted" },
              body?.error_kind === "no_rollup_yet"
                ? "No universe rollup written yet. The hourly CRO/CTO cycle has not produced a snapshot. "
                : "No universe rollup available. ",
              "Runs nightly at 22:00 UTC and refreshes hourly 14:00-21:00 UTC on US business days. ",
              "Click \"Refresh CTO universe\" in Admin Actions to populate immediately."),
            cycleNote && h("div", { className: "dim", style: { marginTop: 8, fontFamily: "monospace", fontSize: 11 } }, cycleNote)
          );
        }
        const r = body;
        const headlines = Array.isArray(r.headlines) ? r.headlines : [];
        const top = Array.isArray(r.results) ? r.results.filter((x) => x.ok).slice(0, 12) : [];
        return h("div", { className: "card" },
          h("div", { className: "row", style: { justifyContent: "space-between", marginBottom: 8 } },
            h("h2", null, "📐 CTO Probabilistic Levels"),
            h("div", { className: "dim" }, `${r.tickers_ok}/${r.tickers_processed} tickers · ${fmtAgo(r.computed_at)}`)
          ),
          headlines.length > 0 && h("div", null,
            h("h3", null, "Universe headlines"),
            headlines.slice(0, 10).map((line, i) => h("div", { key: i, className: "sig-line" }, line))
          ),
          top.length > 0 && h("div", { style: { marginTop: 16 } },
            h("h3", null, "Top per-ticker reads"),
            h("table", { className: "table" },
              h("thead", null,
                h("tr", null,
                  h("th", null, "Ticker"),
                  h("th", null, "Narrative"))),
              h("tbody", null,
                top.map((row, i) => h("tr", { key: i },
                  h("td", null,
                    h("a", { href: `#cto-${row.ticker}`, onClick: (e) => { e.preventDefault(); window.open(`/timed/cto/ticker?ticker=${row.ticker}`, "_blank"); } }, row.ticker)),
                  h("td", { className: "muted" }, row.narrative || "—")
                ))
              )
            )
          ),
          h("div", { className: "dim", style: { marginTop: 8 } },
            "Each level = empirical hit-rate from this ticker's own 504-bar history × Markov regime forecast. Click ticker for full level table.")
        );
      }

      function OverrideCard({ data, onClear, isAdmin }) {
        const o = data?.override?.body;
        const active = !!(o?.active);
        if (!active) {
          return h("div", { className: "card" },
            h("h2", null, "🎚 Active CRO Tactical Override"),
            h("div", { className: "muted" }, "No override applied — the system is reading the in-code TACTICAL_SIGNALS unchanged."),
            o?.history?.length > 0 && h("div", { style: { marginTop: 10 } },
              h("h3", null, "Recent apply / clear history"),
              o.history.slice(0, 6).map((h2, i) => h("div", { key: i, className: "dim" },
                h2.applied_at ? `Applied ${fmtAgo(h2.applied_at)} — ${h2.proposal_id || ""}` : `Cleared ${fmtAgo(h2.cleared_at)} — ${h2.reason || ""}`
              ))
            )
          );
        }
        const blob = o.blob || {};
        const sigs = Array.isArray(blob.tactical_signals) ? blob.tactical_signals : [];
        return h("div", { className: "card" },
          h("div", { className: "row", style: { justifyContent: "space-between", marginBottom: 8 } },
            h("h2", null, "🎚 Active CRO Tactical Override"),
            isAdmin && h("button", { className: "btn btn-danger", onClick: onClear },
              "Revert (KV delete)")
          ),
          h("div", { className: "muted", style: { marginBottom: 10 } },
            `Proposal `, h("code", null, blob.proposal_id || "?"), ` from pub `, h("code", null, blob.pub_id || "?"),
            ` · applied ${fmtAgo(blob.applied_at)}`),
          blob.tactical_overlay && h("div", { className: "verdict" }, blob.tactical_overlay),
          sigs.length > 0 && h("div", { style: { marginTop: 12 } },
            h("h3", null, `Tactical signals (${sigs.length})`),
            sigs.map((s, i) => h("div", { key: i, className: "sig-line" },
              h("span", { className: "pair" }, s.pair || s.signal),
              " → ",
              h("span", { className: "dir" }, s.direction || ""),
              " · ",
              h("span", { className: "dim" }, s.horizon || ""),
              s.playbook_action && h("div", { style: { marginTop: 4 } }, s.playbook_action)
            ))
          )
        );
      }

      function PublicationsCard({ data, isAdmin, onAction }) {
        const pubs = data?.pubs?.body?.publications || [];
        const proposals = data?.proposals?.body?.proposals || [];
        if (!isAdmin) {
          return h("div", { className: "card" },
            h("h2", null, "📚 Recent Publications + Proposals"),
            h("div", { className: "muted" }, "Visible to admin only.")
          );
        }
        const noData = pubs.length === 0 && proposals.length === 0;
        return h("div", { className: "card" },
          h("h2", null, "📚 Recent Publications + Proposals (admin)"),
          h("div", { className: "muted", style: { marginBottom: 8 } },
            "Each per-row action is a one-click human button paired with its admin endpoint. The AI CIO can call the same endpoints directly to act autonomously (each button shows the endpoint as a tooltip)."),
          noData && h("div", {
            style: {
              background: "rgba(245,158,11,0.06)",
              border: "1px solid rgba(245,158,11,0.30)",
              borderRadius: 10,
              padding: 12,
              marginBottom: 10,
            }
          },
            h("div", { style: { color: "#fbbf24", fontWeight: 700, marginBottom: 6 } },
              "No publications ingested yet"),
            h("div", { className: "muted", style: { marginBottom: 10 } },
              "The system is configured but the daily cron (22:00 UTC) hasn't fired yet today. " +
              "Use \"Pull from FSD now\" below to populate the table immediately, or " +
              "\"Probe FSD login\" first if the credentials may have drifted."),
            h("div", { className: "row" },
              h("button", {
                className: "btn btn-go",
                title: "POST /timed/admin/cro/fsd/ingest",
                onClick: () => onAction("fsd_ingest_inline", "POST", "/timed/admin/cro/fsd/ingest", {}),
              }, "Pull from FSD now"),
              h("button", {
                className: "btn",
                title: "POST /timed/admin/cro/fsd/probe",
                onClick: () => onAction("fsd_probe_inline", "POST", "/timed/admin/cro/fsd/probe", {}),
              }, "Probe FSD login"),
              h("button", {
                className: "btn",
                title: "POST /timed/admin/cro/cycle — runs everything: CTO + rotation + FSD + extract + apply + synthesis",
                onClick: () => onAction("cycle_inline", "POST", "/timed/admin/cro/cycle", { force: true }),
              }, "Kick full cycle (force)")
            )
          ),
          h("h3", null, "Publications"),
          pubs.length === 0
            ? h("div", { className: "muted" }, "None yet.")
            : h("table", { className: "table" },
                h("thead", null,
                  h("tr", null,
                    h("th", null, "Pub id"),
                    h("th", null, "Title"),
                    h("th", null, "Fetched"),
                    h("th", null, "Extract"),
                    h("th", null, "Applied"),
                    h("th", null, "Action"))),
                h("tbody", null,
                  pubs.slice(0, 10).map((p, i) => h("tr", { key: i },
                    h("td", null, h("code", null, (p.pub_id || "").slice(0, 24))),
                    h("td", { className: "muted" }, (p.title || "").slice(0, 60)),
                    h("td", { className: "tabular dim" }, fmtAgo(p.fetched_at)),
                    h("td", null, p.extracted_at ? h("span", { className: "ok" }, "✓") : h("span", { className: "dim" }, "—")),
                    h("td", null, p.applied_at ? h("span", { className: "ok" }, "✓") : h("span", { className: "dim" }, "—")),
                    h("td", null,
                      (!p.extracted_at && p.fetch_status === "ok") &&
                        h("button", {
                          className: "btn btn-sm btn-go",
                          title: "POST /timed/admin/cro/extract {pub_id}",
                          onClick: () => onAction(`extract_${p.pub_id}`, "POST", "/timed/admin/cro/extract", { pub_id: p.pub_id, force: false }),
                        }, "Extract"),
                      (p.extracted_at && !p.applied_at && p.proposal_id) &&
                        h("button", {
                          className: "btn btn-sm",
                          title: "Re-extract overrides any prior pending proposal for this pub",
                          onClick: () => onAction(`reextract_${p.pub_id}`, "POST", "/timed/admin/cro/extract", { pub_id: p.pub_id, force: true }),
                        }, "Re-extract")
                    )
                  ))
                )
              ),
          h("h3", { style: { marginTop: 12 } }, "Recent proposals"),
          proposals.length === 0
            ? h("div", { className: "muted" }, "None yet.")
            : h("table", { className: "table" },
                h("thead", null,
                  h("tr", null,
                    h("th", null, "Proposal id"),
                    h("th", null, "Pub"),
                    h("th", null, "Class"),
                    h("th", null, "Status"),
                    h("th", null, "Created"),
                    h("th", null, "Action"))),
                h("tbody", null,
                  proposals.slice(0, 10).map((p, i) => h("tr", { key: i },
                    h("td", null, h("code", null, (p.proposal_id || "").slice(0, 24))),
                    h("td", { className: "dim" }, (p.pub_id || "").slice(0, 20)),
                    h("td", null, h("span", { className: p.classification === "structural" ? "chip chip-warn" : "chip chip-blue" }, p.classification)),
                    h("td", null, h("span", { className: p.status === "applied" ? "ok" : p.status === "rejected" ? "err" : "warn" }, p.status)),
                    h("td", { className: "tabular dim" }, fmtAgo(p.created_at)),
                    h("td", null,
                      p.status === "pending" && h(React.Fragment, null,
                        h("button", {
                          className: "btn btn-sm btn-go",
                          title: "POST /timed/admin/cro/proposal/approve {proposal_id}",
                          style: { marginRight: 6 },
                          onClick: () => onAction(`approve_${p.proposal_id}`, "POST", "/timed/admin/cro/proposal/approve", { proposal_id: p.proposal_id, note: "operator_approved_via_research_desk" }),
                        }, "Approve"),
                        h("button", {
                          className: "btn btn-sm btn-danger",
                          title: "POST /timed/admin/cro/proposal/reject {proposal_id}",
                          onClick: () => onAction(`reject_${p.proposal_id}`, "POST", "/timed/admin/cro/proposal/reject", { proposal_id: p.proposal_id, note: "operator_rejected_via_research_desk" }),
                        }, "Reject")
                      ),
                      p.status === "applied" && h("button", {
                        className: "btn btn-sm",
                        title: "View full proposal JSON",
                        onClick: () => onAction(`view_${p.proposal_id}`, "GET", `/timed/admin/cro/proposal?id=${encodeURIComponent(p.proposal_id)}`),
                      }, "View JSON")
                    )
                  ))
                )
              ),
          h("div", { className: "dim", style: { marginTop: 8 } },
            "AI CIO programmatic equivalent: POST /timed/admin/cro/proposal/approve {proposal_id} (or reject). " +
            "These same endpoints accept the API key the CIO already has via env.TIMED_API_KEY.")
        );
      }

      function RotationCard({ data }) {
        const r = data?.rotation?.body;
        if (!r || !r.ok) {
          return h("div", { className: "card" },
            h("h2", null, "🔄 Rotation Engine"),
            h("div", { className: "muted" }, "No snapshot yet.")
          );
        }
        const headlines = r.headlines || [];
        const rsPairs = (r.rs_pairs || []).filter((p) => p.ok).slice(0, 10);
        return h("div", { className: "card" },
          h("div", { className: "row", style: { justifyContent: "space-between", marginBottom: 8 } },
            h("h2", null, "🔄 Rotation Engine"),
            h("div", { className: "dim" }, `${r.universe_size} ticker universe · ${fmtAgo(r.computed_at)}`)
          ),
          headlines.length > 0 && h("div", null,
            h("h3", null, "Headlines"),
            headlines.slice(0, 8).map((line, i) => h("div", { key: i, className: "sig-line" }, line))
          ),
          rsPairs.length > 0 && h("div", { style: { marginTop: 12 } },
            h("h3", null, "Relative-strength pairs (top 10 by movement)"),
            h("table", { className: "table" },
              h("thead", null,
                h("tr", null,
                  h("th", null, "Pair"),
                  h("th", null, "Trend"),
                  h("th", null, "20d ROC"),
                  h("th", null, "TD Setup"))),
              h("tbody", null,
                rsPairs.map((p, i) => h("tr", { key: i },
                  h("td", null, `${p.numer}/${p.denom}`),
                  h("td", null, h("span", { className: `chip ${p.trend_state.includes("up") ? "chip-on" : p.trend_state.includes("down") ? "chip-dn" : ""}` }, p.trend_state)),
                  h("td", { className: "tabular" }, `${p.roc_20d_pct >= 0 ? "+" : ""}${p.roc_20d_pct.toFixed(1)}%`),
                  h("td", { className: "dim" }, p.td_setup_state === "none" ? "—" : `${p.td_setup_state.replace(/_/g, " ")} (${p.td_setup_count})`)
                ))
              )
            )
          )
        );
      }

      function ActionsCard({ isAdmin, onAction, lastAction }) {
        if (!isAdmin) return null;
        const actions = [
          { key: "cycle",      label: "Kick full CRO/CTO cycle",    cls: "btn btn-go", path: "/timed/admin/cro/cycle",            body: {}, hint: "Runs the whole nightly pipeline now (CTO + rotation + FSD ingest + extract + apply + synthesis)." },
          { key: "synth",      label: "Synthesize CRO note now",    cls: "btn",        path: "/timed/admin/cro/synthesize",       body: { force: true }, hint: "Re-runs only the LLM synthesis step against current cached inputs. Idempotent per date unless force=true." },
          { key: "cto",        label: "Refresh CTO universe",       cls: "btn",        path: "/timed/admin/cto/universe/refresh", body: {}, hint: "Recomputes Markov-biased probabilistic levels for the active universe (~50 tickers)." },
          { key: "rotation",   label: "Refresh rotation engine",    cls: "btn",        path: "/timed/admin/cro/rotation/refresh", body: {}, hint: "Recomputes pairwise RS + theme breadth + intra-theme correlation." },
          { key: "fsd_probe",  label: "Probe FSD login",            cls: "btn",        path: "/timed/admin/cro/fsd/probe",        body: {}, hint: "Returns a 500-char snippet of the FSD login page response. No credentials echoed back." },
          { key: "fsd_ingest", label: "Pull from FSD now",          cls: "btn btn-go", path: "/timed/admin/cro/fsd/ingest",       body: {}, hint: "Lists FSD publications + ingests any new ones. Auto-applies tactical proposals downstream if cro_auto_apply_tactical is true." },
        ];
        return h("div", { className: "card" },
          h("h2", null, "⚙️ Admin Actions"),
          h("div", { className: "muted", style: { marginBottom: 4 } },
            "These call admin endpoints and may take 10-60 seconds each."),
          h("div", { className: "muted", style: { marginBottom: 12 } },
            "Each button maps 1:1 to a documented admin endpoint — the AI CIO can call the same path programmatically via its existing TIMED_API_KEY."),
          h("div", { className: "actions-grid" },
            actions.map((a) => h("div", { key: a.key, className: "action-tile" },
              h("button", { className: a.cls, title: `POST ${a.path}`, onClick: () => onAction(a.key, "POST", a.path, a.body) }, a.label),
              h("div", { className: "dim", style: { marginTop: 4, fontFamily: "'SF Mono',Menlo,Consolas,monospace" } }, `POST ${a.path}`),
              h("div", { className: "muted", style: { marginTop: 2, fontSize: 11 } }, a.hint)
            ))
          ),
          lastAction && h("div", { style: { marginTop: 14 } },
            h("h3", null, `Last action: ${lastAction.kind}`),
            h("div", { className: "muted" },
              `Status ${lastAction.status} · `,
              lastAction.body?.ok ? h("span", { className: "ok" }, "ok") : h("span", { className: "err" }, "failed"),
              lastAction.body?.elapsed_ms ? ` · ${lastAction.body.elapsed_ms}ms` : ""
            ),
            h("pre", { className: "json-pre" }, JSON.stringify(lastAction.body, null, 2).slice(0, 4000))
          )
        );
      }

      function AICIOActionsCard() {
        return h("div", { className: "card" },
          h("h2", null, "🤖 AI CIO Programmatic Actions"),
          h("div", { className: "muted", style: { marginBottom: 10 } },
            "Every UI action above maps to one of these admin endpoints. The AI CIO can call any of them autonomously using its existing env.TIMED_API_KEY. Use the URL paths verbatim — no SDK needed."),
          h("table", { className: "table" },
            h("thead", null,
              h("tr", null,
                h("th", null, "Action"),
                h("th", null, "Method + Path"),
                h("th", null, "Body shape"),
                h("th", null, "Idempotent?"))),
            h("tbody", null,
              [
                ["Approve a pending proposal",      "POST /timed/admin/cro/proposal/approve", "{ proposal_id, note? }", "yes"],
                ["Reject a pending proposal",       "POST /timed/admin/cro/proposal/reject",  "{ proposal_id, note? }", "yes"],
                ["Apply (re-apply) a proposal",     "POST /timed/admin/cro/proposal/approve", "{ proposal_id }",        "yes"],
                ["Clear active tactical override",  "POST /timed/admin/cro/override/clear",   "{ reason? }",            "yes"],
                ["Re-extract a publication",        "POST /timed/admin/cro/extract",          "{ pub_id, force? }",     "yes (force=true supersedes pending)"],
                ["Ingest URL or blob",              "POST /timed/admin/cro/ingest-from-url OR /ingest-from-blob", "{ url } OR { body_text } / { body_bytes_b64 }", "no (creates new pub)"],
                ["Run full cycle",                  "POST /timed/admin/cro/cycle",            "{ force? }",             "mostly (force=true bypasses dedup)"],
                ["Run synthesis only",              "POST /timed/admin/cro/synthesize",       "{ force?, as_of_date? }", "yes per date"],
                ["Refresh CTO universe",            "POST /timed/admin/cto/universe/refresh", "{ tickers?, limit? }",   "yes"],
                ["Refresh rotation engine",         "POST /timed/admin/cro/rotation/refresh", "{}",                     "yes"],
                ["Probe FSD login",                 "POST /timed/admin/cro/fsd/probe",        "{}",                     "yes (read-only)"],
                ["List FSD publications",           "POST /timed/admin/cro/fsd/list",         "{ limit? }",             "yes (read-only)"],
                ["Get proposal payload",            "GET  /timed/admin/cro/proposal?id=...",  "(query)",                "yes (read-only)"],
                ["Get active override blob",        "GET  /timed/admin/cro/override",         "(none)",                 "yes (read-only)"],
                ["Get rotation snapshot",           "GET  /timed/admin/cro/rotation/snapshot","(none)",                 "yes (read-only)"],
                ["Get CTO ticker levels",           "GET  /timed/cto/ticker?ticker=SYM",      "(query)",                "yes (read-only)"],
                ["Get CTO universe rollup",         "GET  /timed/cto/universe",               "(none)",                 "yes (read-only)"],
                ["Get latest CRO note",             "GET  /timed/cro/latest",                 "(none)",                 "yes (read-only)"],
              ].map((row, i) => h("tr", { key: i },
                h("td", null, row[0]),
                h("td", null, h("code", { style: { fontSize: 11 } }, row[1])),
                h("td", { className: "dim" }, row[2]),
                h("td", { className: "muted" }, row[3])
              ))
            )
          ),
          h("div", { className: "dim", style: { marginTop: 8 } },
            "Auth: requireKeyOrAdmin — pass either ?key=TIMED_API_KEY (machine path, AI CIO) or a CF Access JWT (human path, this UI).")
        );
      }

      function App() {
        const [data, setData] = useState({ loading: true, fetched_at: Date.now() });
        const [lastAction, setLastAction] = useState(null);
        // 2026-06-03 — auth-gate.js sets window._ttIsAdmin asynchronously
        // (after fetching /timed/me). Capturing isAdmin once at mount left
        // the admin cards null forever. Subscribe to the auth-bootstrap
        // event so we re-render when the role lands.
        const [isAdmin, setIsAdmin] = useState(
          typeof window !== "undefined" && (
            window._ttIsAdmin === true ||
            document.body?.dataset?.isAdmin === "true"
          )
        );
        useEffect(() => {
          const onAuth = () => {
            const v = window._ttIsAdmin === true ||
                      document.body?.dataset?.isAdmin === "true";
            setIsAdmin(v);
          };
          window.addEventListener("tt-auth-bootstrap-updated", onAuth);
          // Belt-and-suspenders: re-check after auth-gate's typical
          // settle window (auth-gate fires the event after /timed/me
          // resolves; in case the listener was attached late, poll once.)
          const t = setTimeout(onAuth, 1500);
          return () => {
            window.removeEventListener("tt-auth-bootstrap-updated", onAuth);
            clearTimeout(t);
          };
        }, []);

        const load = useCallback(async () => {
          const [cro, cto, strategy, override, pubs, proposals, rotation, lastSummary] = await Promise.all([
            jget("/timed/cro/latest"),
            jget("/timed/cto/universe"),
            jget("/timed/strategy"),
            isAdmin ? jget("/timed/admin/cro/override") : Promise.resolve({ body: null }),
            isAdmin ? jget("/timed/admin/cro/publications?limit=15") : Promise.resolve({ body: null }),
            isAdmin ? jget("/timed/admin/cro/proposals?limit=15") : Promise.resolve({ body: null }),
            isAdmin ? jget("/timed/admin/cro/rotation/snapshot") : Promise.resolve({ body: null }),
            jget("/timed/cro/last-summary"),
          ]);
          setData({ loading: false, fetched_at: Date.now(), cro, cto, strategy, override, pubs, proposals, rotation, lastSummary });
        }, [isAdmin]);

        useEffect(() => {
          load();
          const id = setInterval(load, 5 * 60 * 1000);
          return () => clearInterval(id);
        }, [load]);

        const onClearOverride = async () => {
          if (!confirm("Revert the active CRO tactical override (single KV delete)?")) return;
          const r = await jpost("/timed/admin/cro/override/clear", { reason: "operator_ui_clear" });
          setLastAction({ kind: "override_clear", status: r.status, body: r.body });
          load();
        };

        const onAction = async (kind, method, path, body) => {
          setLastAction({ kind, status: "running", body: { ok: null, message: "Running…" } });
          const r = method === "POST" ? await jpost(path, body) : await jget(path);
          setLastAction({ kind, status: r.status, body: r.body });
          // Reload data after a few seconds to give the backend time to write to KV.
          setTimeout(load, 3000);
        };

        if (data.loading) {
          return h("main", null,
            h("div", { className: "card", style: { textAlign: "center" } },
              h("div", { className: "spinner" }),
              h("div", { style: { marginTop: 10, color: "var(--tt-text-muted)" } }, "Loading Research Desk…")
            )
          );
        }

        return h("main", null,
          h(StatusBanner, { data }),
          h("div", { className: "grid-2" },
            h(CRONoteCard, { data }),
            h("div", null,
              h(CTOUniverseCard, { data }),
              h(RotationCard, { data })
            )
          ),
          h("div", { style: { marginTop: 14 } },
            h(OverrideCard, { data, onClear: onClearOverride, isAdmin })
          ),
          h("div", { style: { marginTop: 14 } },
            h(PublicationsCard, { data, isAdmin, onAction })
          ),
          h("div", { style: { marginTop: 14 } },
            h(ActionsCard, { isAdmin, onAction, lastAction })
          ),
          isAdmin && h("div", { style: { marginTop: 14 } },
            h(AICIOActionsCard)
          )
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(h(App));
    </script>
  </body>
</html>
