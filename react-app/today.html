              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#34d399" } }), "Bull mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f5c25c" } }), "Pullback"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#fb7185" } }), "Bear mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f43f5e" } }), "Bear aligned"),
            ),
          ),
          h("div", { className: "tt-card tt-card-pad" },
            h("div", { className: "bm-stage", ref: stageRef },
              h("svg", { viewBox: `0 0 ${VB.w} ${VB.h}`, role: "img", "aria-label": "Universe bubble map", preserveAspectRatio: "xMidYMid meet" },
                h("g", { stroke: "rgba(255,255,255,0.04)", strokeWidth: 1 },
                  [0.25, 0.5, 0.75].map(p => h("line", { key: `v${p}`, x1: VB.mx + plotW * p, y1: VB.my, x2: VB.mx + plotW * p, y2: VB.my + plotH })),
                  [0.25, 0.5, 0.75].map(p => h("line", { key: `h${p}`, x1: VB.mx, y1: VB.my + plotH * p, x2: VB.mx + plotW, y2: VB.my + plotH * p })),
                ),
                h("rect", { x: cx0,   y: VB.my, width: plotW / 2, height: plotH / 2, fill: "rgba(34,197,94,0.025)" }),
                h("rect", { x: VB.mx, y: cy0,   width: plotW / 2, height: plotH / 2, fill: "rgba(244,63,94,0.025)" }),
                h("line", { x1: VB.mx, y1: cy0, x2: VB.mx + plotW, y2: cy0,             stroke: "rgba(255,255,255,0.12)", strokeWidth: 1 }),
                h("line", { x1: cx0,   y1: VB.my, x2: cx0,           y2: VB.my + plotH, stroke: "rgba(255,255,255,0.12)", strokeWidth: 1 }),
                h("text", { x: VB.mx + plotW - 12, y: VB.my + 22,         textAnchor: "end",   fill: "rgba(34,197,94,0.55)",  fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "STRONG TREND · HIGH MOMENTUM"),
                h("text", { x: VB.mx + 12,         y: VB.my + 22,         textAnchor: "start", fill: "rgba(245,194,92,0.55)", fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "STRONG TREND · PULLING BACK"),
                h("text", { x: VB.mx + 12,         y: VB.my + plotH - 8,  textAnchor: "start", fill: "rgba(244,63,94,0.55)",  fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "DOWNTREND"),
                h("text", { x: VB.mx + plotW - 12, y: VB.my + plotH - 8,  textAnchor: "end",   fill: "rgba(255,255,255,0.32)", fontSize: 14, fontWeight: 700, letterSpacing: "0.08em" }, "BUILDING / RECOVERY"),
                h("text", { x: VB.mx + plotW / 2, y: VB.h - 10, textAnchor: "middle", fill: "rgba(255,255,255,0.50)", fontSize: 13, fontWeight: 600 }, "SHORT-TERM MOMENTUM (LTF) →"),
                h("text", { x: 20,                y: VB.my + plotH / 2, textAnchor: "middle", fill: "rgba(255,255,255,0.50)", fontSize: 13, fontWeight: 600, transform: `rotate(-90 20 ${VB.my + plotH / 2})` }, "TREND STRENGTH (HTF) →"),

                visible.map((t) => {
                  const sym = String(t.ticker || "").toUpperCase();
                  const bucket = classifyStateBucket(t.state);
                  const color = STATE_BUCKET_COLOR[bucket];
                  const cx = xScale(t.ltf_score);
                  const cy = yScale(t.htf_score);
                  const r = radiusFor(t);
                  const isMatch = matchesQuery(sym);
                  const isDim = q.length > 0 && !isMatch;
                  return h("g", { key: sym,
                    style: { cursor: "pointer", opacity: isDim ? 0.22 : 1, transition: "opacity 0.18s" },
                    onMouseEnter: (e) => handleHover(e, t),
                    onMouseMove:  (e) => handleHover(e, t),
                    onMouseLeave: handleLeave,
                    onClick: () => { window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`; },
                  },
                    h("circle", {
                      cx, cy, r,
                      fill: color,
                      fillOpacity: isMatch ? 0.95 : 0.55,
                      stroke:      isMatch ? "#fff" : "rgba(0,0,0,0.4)",
                      strokeWidth: isMatch ? 2 : 1,
                    }),
                    (isMatch || r >= 11) && h("text", {
                      x: cx, y: cy + 4,
                      textAnchor: "middle",
                      fontSize: Math.max(10, Math.min(14, r * 0.75)),
                      fontWeight: 700,
                      fill: isMatch ? "#fff" : "rgba(255,255,255,0.92)",
                      style: { pointerEvents: "none", textShadow: "0 1px 1px rgba(0,0,0,0.6)" },
                    }, sym.length <= 4 ? sym : sym.slice(0, 4)),
                  );
                }),
              ),
              tooltip && h("div", { className: "bm-tooltip", style: { left: tooltip.x, top: tooltip.y } },
                h("div", { className: "sym" }, String(tooltip.t.ticker || "").toUpperCase()),
                h("div", { className: "row" }, "State: ", h("strong", null, tooltip.t.state || "—")),
                h("div", { className: "row" }, "HTF ", h("strong", null, (Number(tooltip.t.htf_score) || 0).toFixed(1)), " · LTF ", h("strong", null, (Number(tooltip.t.ltf_score) || 0).toFixed(1))),
                Number.isFinite(Number(tooltip.t.price)) && h("div", { className: "row" }, "Price: ", h("strong", null, fmtUsd(Number(tooltip.t.price)))),
                (() => {
                  const dc = getDailyChange(tooltip.t);
                  return Number.isFinite(dc?.dayPct) && h("div", { className: "row" }, "Today: ", h("strong", { style: { color: dc.dayPct >= 0 ? "#22c55e" : "#f43f5e" } }, (dc.dayPct >= 0 ? "+" : "") + dc.dayPct.toFixed(2) + "%"));
                })(),
                h("div", { className: "row", style: { marginTop: 4, fontSize: 10, color: "var(--tt-text-dim)" } }, "Click to open in Active Trader"),
              ),
            ),
          ),
        );
      }

      // ── Universe heatmap (props-driven) ────────────────────────
      function UniverseHeatmap({ visible, query, onSelectTicker }) {
        const [showAll, setShowAll] = useState(false);
        const [sortMode, setSortMode] = useState("htf");

        const stageLabel = (t) => {
          const stage = String(t?.kanban_stage || "").toLowerCase();
          if (stage === "trim") return "Trim";
          if (stage === "defend") return "Def";
          if (stage === "exit") return "Exit";
          if (stage === "enter" || stage === "enter_now" || stage === "just_flipped") return "Enter";
          if (stage === "hold" || stage === "active" || stage === "just_entered") return "Hold";
          if (stage === "setup" || stage === "setup_watch" || stage === "flip_watch") return "Setup";
          return stage ? stage.slice(0, 5) : "";
        };

        const items = useMemo(() => {
          const arr = visible.slice();
          arr.sort((a, b) => {
            if (sortMode === "day") {
              const pa = Number(getDailyChange(a)?.dayPct);
              const pb = Number(getDailyChange(b)?.dayPct);
              const va = Number.isFinite(pa) ? pa : -999;
              const vb = Number.isFinite(pb) ? pb : -999;
              if (va !== vb) return vb - va;
            } else if (sortMode === "rank") {
              const ra = Number(a?.rank_position ?? a?.rp);
              const rb = Number(b?.rank_position ?? b?.rp);
              const hasA = Number.isFinite(ra) && ra > 0;
              const hasB = Number.isFinite(rb) && rb > 0;
              if (hasA && hasB && ra !== rb) return ra - rb;
              if (hasA !== hasB) return hasA ? -1 : 1;
            } else {
              const sa = Number(a?.htf_score);
              const sb = Number(b?.htf_score);
              const va = Number.isFinite(sa) ? sa : -999;
              const vb = Number.isFinite(sb) ? sb : -999;
              if (va !== vb) return vb - va;
            }
            return String(a.ticker).localeCompare(String(b.ticker));
          });
          return arr;
        }, [visible, sortMode]);

        const sortSubtitle = sortMode === "day"
          ? "Sorted by today's move"
          : sortMode === "rank"
            ? "Sorted by universe rank (best first)"
            : "Sorted by HTF score";

        if (items.length === 0) {
          return h("section", { className: "tt-row" },
            h("div", { className: "tt-sec-title" }, "HEAT MAP"),
            h("div", { className: "tt-sec-h" }, sortSubtitle),
            h("div", { className: "tt-card tt-card-pad", style: { textAlign: "center", color: "var(--tt-text-dim)", fontSize: 13, fontStyle: "italic" } },
              "No tickers match the current filters. Try clearing a filter above."
            ),
          );
        }

        const cap = 80;
        const shown = showAll ? items : items.slice(0, cap);
        const q = String(query || "").trim().toUpperCase();

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap" } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "HEAT MAP"),
              h("div", { className: "tt-sec-h" }, sortSubtitle),
            ),
            h("div", { style: { display: "flex", gap: 6, alignItems: "center", flexWrap: "wrap" } },
              ["htf", "day", "rank"].map((mode) => h("button", {
                key: mode,
                type: "button",
                className: `heat-sort-btn${sortMode === mode ? " is-active" : ""}`,
                onClick: () => setSortMode(mode),
              }, mode === "htf" ? "HTF" : mode === "day" ? "Day %" : "Rank")),
            ),
          ),
          h("div", { style: { display: "flex", gap: 8, alignItems: "center", fontSize: 11, color: "var(--tt-text-dim)", marginBottom: 10, flexWrap: "wrap" } },
            h("span", null, "Border = trend state"),
            Object.entries(STATE_BUCKET_COLOR).slice(0, 4).map(([key, color]) => h("span", {
              key,
              style: { display: "inline-flex", alignItems: "center", gap: 4 },
            },
              h("span", { style: { width: 8, height: 8, borderRadius: 2, background: color, display: "inline-block" } }),
              key.replace(/_/g, " "),
            )),
          ),
          h("div", { className: "tt-card tt-card-pad" },
            h("div", { className: "heat-grid" },
              shown.map(t => {
                const sym = String(t.ticker).toUpperCase();
                const dc = getDailyChange(t);
                const pct = Number.isFinite(dc?.dayPct) ? Number(dc.dayPct) : null;
                const score = Number(t?.htf_score) || 0;
                const ltf = Number(t?.ltf_score) || 0;
                const rank = Number(t?.rank_position ?? t?.rp);
                const bucket = classifyStateBucket(t?.state);
                const bucketColor = STATE_BUCKET_COLOR[bucket] || STATE_BUCKET_COLOR.neutral;
                const stage = stageLabel(t);
                const lvl = score >= 20 ? "lvl-strong" : score <= -15 ? "lvl-weak" : Math.abs(score) >= 5 ? "lvl-mid" : "";
                // 2026-05-29 — pdir: flat for near-zero (within ±0.05%) so
                // micro-moves don't get false-positive green/red flashes.
                const pdir = !Number.isFinite(pct) ? "flat"
                          : Math.abs(pct) < 0.05 ? "flat"
                          : pct > 0 ? "up" : "dn";
                const side = pdir === "flat" ? "flat" : pdir;
                const isMatch = q.length > 0 && sym.startsWith(q);
                const isDim = q.length > 0 && !isMatch;
                const tip = [
                  sym,
                  pct != null ? `${pct >= 0 ? "+" : ""}${pct.toFixed(2)}% today` : "no day change",
                  `HTF ${score.toFixed(1)} · LTF ${ltf.toFixed(1)}`,
                  t?.state ? String(t.state).replace(/_/g, " ") : "",
                  stage ? `Stage: ${stage}` : "",
                  Number.isFinite(rank) && rank > 0 ? `Rank #${rank}` : "",
                ].filter(Boolean).join(" · ");
                return h("a", {
                  key: sym,
                  className: `heat-cell ${lvl}`,
                  href: `/index-react.html?ticker=${encodeURIComponent(sym)}`,
                  onClick: (e) => {
                    if (typeof onSelectTicker === "function") {
                      e.preventDefault();
                      onSelectTicker(sym);
                    }
                  },
                  title: tip,
                  "data-side": side,
                  style: {
                    opacity: isDim ? 0.28 : 1,
                    transition: "opacity 0.15s",
                    "--heat-pct": pct != null ? pct : 0,
                    borderColor: bucketColor,
                    ...(isMatch ? { outline: "1px solid #fff", outlineOffset: "-1px" } : {}),
                  },
                },
                  h("div", { className: "heat-cell__head" },
                    h("span", {
                      className: "heat-cell__logo",
                      ref: (el) => {
                        if (el && !el.dataset.dsInit && window.DS && typeof window.DS.tickerLogo === "function") {
                          el.dataset.dsInit = "1";
                          try { el.replaceWith(window.DS.tickerLogo(sym, { size: 16 })); } catch (_) {}
                        }
                      },
                    }, sym.slice(0, 2)),
                    h("span", { className: "sym" }, sym),
                  ),
                  h("span", { className: `pct ${pdir}` },
                    pct != null ? (pct >= 0 ? "+" : "") + pct.toFixed(1) + "%" : "—",
                  ),
                  h("div", { className: "heat-cell__foot" },
                    h("div", { className: "heat-cell__meta" },
                      stage && h("span", { className: "heat-cell__chip heat-cell__chip--stage", title: "Kanban stage" }, stage),
                      Number.isFinite(rank) && rank > 0 && h("span", { className: "heat-cell__chip heat-cell__chip--rank", title: "Universe rank" }, `R${rank}`),
                    ),
                    h("span", { className: "heat-cell__score", title: "HTF score" }, score.toFixed(0)),
                  ),
                );
              }),
            ),
            items.length > cap && h("div", { style: { textAlign: "center", marginTop: 14 } },
              h("button", {
                onClick: () => setShowAll(s => !s),
                style: {
                  padding: "8px 18px", borderRadius: 8, fontSize: 12.5, fontWeight: 600,
                  background: "var(--tt-bg-elev)", border: "1px solid var(--tt-border-hi)",
                  color: "var(--tt-text)", cursor: "pointer",
                },
              }, showAll ? `Show top ${cap}` : `Show all ${items.length}`),
            ),
          ),
        );
      }


      // ── End CTA ────────────────────────────────────────────────
      function EndCTA() {
        return h("section", { className: "end-cta tt-row" },
          h("a", { href: "/active-trader.html", className: "primary" },
            "Open Active Trader",
            h("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },

      function BriefPlaceholder({ data, earnings, onSelectTicker, cal }) {

        const session = resolveMarketSession(cal);

        const countdownInfo = (() => {
          if (sessionPhase === "closed") return null;

            const parts = f.formatToParts(new Date());
            const hh = Number(parts.find(p => p.type === "hour")?.value || 0);
            const mm = Number(parts.find(p => p.type === "minute")?.value || 0);
            const min = hh * 60 + mm;
            const RTH_OPEN = 9 * 60 + 30;
            const RTH_CLOSE = 16 * 60;
            const AH_CLOSE = 20 * 60;
            if (sessionPhase === "pre") {
              const delta = RTH_OPEN - min;
              return delta > 0 ? { countdown: fmtCountdown(delta), countdownLabel: "to open" } : null;
            }
            if (sessionPhase === "rth") {
              const delta = RTH_CLOSE - min;
              return delta > 0 ? { countdown: fmtCountdown(delta), countdownLabel: "to close" } : null;
            }
            if (sessionPhase === "ah") {
              const delta = AH_CLOSE - min;
              return delta > 0 ? { countdown: fmtCountdown(delta), countdownLabel: "to AH close" } : null;
            }

            return null;

        const arr = Object.entries(data)

          ? arr
              .filter(t => !CRYPTO.has(String(t.ticker).toUpperCase()))

                      },
                    },
                      h("span", { className: "bp-signal-sym" }, sym),
                      Number.isFinite(price) && h("span", { className: "bp-signal-px" }, fmtUsd(price)),
                      h("span", { className: `bp-signal-pct ${dir}` },
                        (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%",
                        signalMode === "ext" && h("span", { className: "ext-tag" }, "EXT"),
                      ),
                    );
                  }),
                )
              : h("div", { className: "bp-empty" }, "No standout moves yet — waiting for the open."),
            // Footer micro-stats: ticker universe + earnings today.
            h("div", { className: "bp-meta" },
              h("span", null, arr.length.toLocaleString() + " tickers scored"),
              earningsTodayCount > 0 && h("span", null, "·"),
              earningsTodayCount > 0 && h("span", null,
                h("strong", null, earningsTodayCount),
                " earnings today",
              ),
            ),
            h("div", { className: "brief-actions", style: { display: "flex", gap: 8, flexWrap: "wrap", marginTop: 14 } },
              h("a", { href: "/daily-brief.html#archive", className: "brief-link" },
                "Browse past briefs",
                h("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
                  h("line", { x1: 5, y1: 12, x2: 19, y2: 12 }), h("polyline", { points: "12 5 19 12 12 19" }),
                ),
              ),
            ),
          ),
        );
      }

      // Format a positive minutes count as "Xh Ym" or "Ym".
      function fmtCountdown(mins) {
        const m = Math.max(0, Math.floor(mins));
        if (m < 60) return m + "m";
        const h = Math.floor(m / 60);
        const r = m % 60;
        return r === 0 ? h + "h" : h + "h " + r + "m";
      }
      function MarketStateSkeleton() {
        return h("section", { className: "tt-row" },
          h("div", { style: { marginBottom: 10 } },
            h("div", { className: "sk", style: { width: 110, height: 10, marginBottom: 8 } }),
            h("div", { className: "sk", style: { width: 240, height: 18 } }),
          ),
          h("div", { className: "sk-grid-4" },
            [0,1,2,3].map((i) =>
              h("div", { key: i, className: "tt-card tt-card-pad" },
                h("div", { className: "sk", style: { width: 40,  height: 10, marginBottom: 10 } }),
                h("div", { className: "sk", style: { width: 100, height: 22, marginBottom: 10 } }),
                h("div", { className: "sk", style: { width: 64,  height: 12 } }),
              ),
            ),
          ),
        );
      }
      function AnalysisControlsSkeleton() {
        return h("section", { className: "analysis-controls" },
          h("div", { className: "ac-head" },
            h("div", null,
              h("div", { className: "sk", style: { width: 90,  height: 11, marginBottom: 8 } }),
              h("div", { className: "sk", style: { width: 280, height: 16 } }),
            ),
            h("div", { className: "sk", style: { width: 110, height: 12 } }),
          ),
          h("div", { className: "sk", style: { width: "100%", height: 38, borderRadius: 10, margin: "12px 0 14px" } }),
          [0,1,2,3].map((i) =>
            h("div", { key: i, className: "ac-row" },
              h("div", { className: "sk", style: { width: 60, height: 10 } }),
              h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
                [0,1,2,3,4].map((j) =>
                  h("div", { key: j, className: "sk", style: { width: 78 + (j % 3) * 12, height: 22, borderRadius: 999 } }),
                ),
              ),
            ),
          ),
        );
      }
      function BubbleViewportSkeleton() {
        return h(React.Fragment, null,
          h("div", { className: "tt-viewport-map-head" },
            h("div", { className: "sk", style: { width: 130, height: 10, marginBottom: 6 } }),
            h("div", { className: "sk", style: { width: 150, height: 12 } }),
          ),
          h("div", { className: "sk-lane-controls" },
            h("div", { className: "sk", style: { width: "100%", height: 38, borderRadius: 10 } }),
            h("div", { style: { display: "flex", gap: 6, flexWrap: "wrap" } },
              [0, 1, 2, 3, 4, 5, 6].map((i) =>
                h("div", { key: i, className: "sk", style: { width: 68 + (i % 4) * 14, height: 24, borderRadius: 999 } }),
              ),
            ),
          ),
          h("div", { className: "sk-vp-lane" },
            [0, 1, 2, 3, 4].map((i) =>
              h("div", { key: i, className: "sk sk-lane-card" }),
            ),
          ),
          h("div", { className: "tt-bmap-head", style: { margin: "10px 0 6px" } },
            h("div", { className: "sk", style: { width: 88, height: 10, marginBottom: 6 } }),
            h("div", { className: "sk", style: { width: 280, height: 12 } }),
          ),
          h("div", { className: "tt-bmap-block" },
            h("div", { className: "sk sk-bubble-pane" }),
          ),
        );
      }
      // (HeatmapSkeleton removed 2026-06-10 — the heat map now lives in a
      // collapsed Disclosure section so it never needs a loading skeleton.)

      // ── Mount with auth gate ───────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const app = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="pro">{(user) => <TodayApp user={user} />}</AuthGate>
        : <TodayApp />;
      ReactDOM.createRoot(document.getElementById("root")).render(app);
    </script>
