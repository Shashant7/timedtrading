// DEEP AUDIT TAB
// ═══════════════════════════════════════════════════════════════
function DeepAuditTab() {
  const [audit, setAudit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [applying, setApplying] = useState(false);
  const [appliedMsg, setAppliedMsg] = useState(null);
  const [subTab, setSubTab] = useState("summary");

  const runAudit = async () => {
    setLoading(true); setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/deep-audit?_t=${Date.now()}`, { cache: "no-store" });
      const json = await res.json();
      if (!json.ok) throw new Error(json.error || "Audit failed");
      setAudit(json);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { runAudit(); }, []);

  const applyTopRecs = async () => {
    if (!audit?.recommendations?.length) return;
    setApplying(true); setAppliedMsg(null);
    try {
      const top3 = audit.recommendations.slice(0, 3);
      const config = {};
      for (const r of top3) { if (r.config) config[r.config.key] = r.config.value; }
      const res = await fetch(`${API_BASE}/timed/admin/model-config`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ updates: Object.entries(config).map(([k, v]) => ({ key: k, value: JSON.stringify(v) })) }),
      });
      const json = await res.json();
      setAppliedMsg(json.ok ? `Applied ${top3.length} recommendations to model_config` : (json.error || "Apply failed"));
    } catch (e) { setAppliedMsg("Error: " + e.message); }
    finally { setApplying(false); }
  };

  const pct = (v) => v != null ? `${v}%` : "—";
  const signPct = (v) => v != null ? (v >= 0 ? `+${v}%` : `${v}%`) : "—";
  const cardCls = "rounded-lg border p-3";
  const cardStyle = (positive) => ({ background: "rgba(255,255,255,0.02)", borderColor: positive ? "rgba(16,185,129,0.2)" : "rgba(239,68,68,0.2)" });

  if (loading) return (
    <div className="flex items-center justify-center py-20">
      <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />
      <span className="ml-3 text-sm text-slate-400">Running deep audit...</span>
    </div>
  );

  if (error) return (
    <div className="p-4 rounded-lg bg-rose-500/10 border border-rose-500/20 text-rose-300 text-sm">
      <p className="font-medium">Deep Audit Error</p><p className="mt-1">{error}</p>
      <button className="mt-2 px-3 py-1 rounded bg-rose-500/20 text-xs" onClick={runAudit}>Retry</button>
    </div>
  );

  if (!audit) return <div className="text-center py-10 text-slate-400 text-sm">Click "Run Audit" to start</div>;

  const subTabs = [
    { id: "summary", label: "Executive Summary" },
    { id: "direction", label: "Direction" },
    { id: "exits", label: "Exit Reasons" },
    { id: "tickers", label: "Tickers" },
    { id: "paths", label: "Entry Paths" },
    { id: "time", label: "Time & Hold" },
    { id: "recs", label: `Recommendations (${audit.recommendations?.length || 0})` },
  ];

  return (
    <div>
      <div className="flex items-center justify-between mb-4">
        <div>
          <h2 className="text-base font-semibold text-white">Deep System Audit</h2>
          <p className="text-[11px] text-slate-400">{audit.trade_count} closed trades analyzed at {new Date(audit.generated_at).toLocaleString()}</p>
        </div>
        <div className="flex gap-2">
          <button className="px-3 py-1.5 rounded text-xs font-medium bg-white/5 border border-white/10 text-slate-300 hover:bg-white/10" onClick={runAudit}>Refresh</button>
          {audit.recommendations?.length > 0 && (
            <button className="px-3 py-1.5 rounded text-xs font-medium bg-emerald-500/15 border border-emerald-500/30 text-emerald-300 hover:bg-emerald-500/25"
              onClick={applyTopRecs} disabled={applying}>
              {applying ? "Applying..." : `Apply Top ${Math.min(3, audit.recommendations.length)} Recs`}
            </button>
          )}
        </div>
      </div>
      {appliedMsg && <div className="mb-3 p-2 rounded text-xs bg-emerald-500/10 border border-emerald-500/20 text-emerald-300">{appliedMsg}</div>}

      <div className="flex gap-1 border-b border-white/[0.06] mb-4 overflow-x-auto">
        {subTabs.map(t => (
          <button key={t.id} onClick={() => setSubTab(t.id)} className={`px-3 py-1.5 text-[11px] font-medium whitespace-nowrap ${subTab === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
        ))}
      </div>

      {/* ── Executive Summary ── */}
      {subTab === "summary" && (
        <div className="space-y-4">
          {/* Overall Metrics */}
          <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-2">
            {[
              ["Trades", audit.overall.n],
              ["Win Rate", pct(audit.overall.win_rate)],
              ["Expectancy", signPct(audit.overall.expectancy)],
              ["SQN", audit.overall.sqn],
              ["Profit Factor", audit.overall.profit_factor],
              ["Max DD", `-${audit.drawdown_analysis.max_drawdown_pct}%`],
              ["Max Consec L", audit.drawdown_analysis.max_consecutive_losses],
            ].map(([label, val]) => (
              <div key={label} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
                <div className="text-[10px] text-slate-500 uppercase">{label}</div>
                <div className="text-sm font-bold text-white mt-0.5">{val}</div>
              </div>
            ))}
          </div>

          {/* Classification */}
          <div className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
            <h3 className="text-xs font-medium text-slate-400 mb-2">Trade Classification</h3>
            <div className="grid grid-cols-2 md:grid-cols-5 gap-2">
              {Object.entries(audit.classification_breakdown || {}).map(([cls, count]) => {
                const colors = { optimal: "text-emerald-400", left_money: "text-amber-400", bad_entry: "text-rose-400", gave_back: "text-orange-400", noise_trade: "text-slate-400" };
                return (
                  <div key={cls} className="text-center">
                    <div className={`text-lg font-bold ${colors[cls] || "text-white"}`}>{count}</div>
                    <div className="text-[10px] text-slate-500">{cls.replace(/_/g, " ")}</div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Strengths & Issues side by side */}
          <div className="grid md:grid-cols-2 gap-3">
            <div className={cardCls} style={{background:"rgba(16,185,129,0.04)", borderColor:"rgba(16,185,129,0.15)"}}>
              <h3 className="text-xs font-medium text-emerald-400 mb-2">Strengths</h3>
              {(audit.strengths || []).map((s, i) => (
                <div key={i} className="mb-1.5">
                  <div className="text-[12px] font-medium text-white">{s.label}</div>
                  <div className="text-[11px] text-slate-400">{s.detail}</div>
                </div>
              ))}
              {(!audit.strengths || audit.strengths.length === 0) && <div className="text-xs text-slate-500">No notable strengths detected</div>}
            </div>
            <div className={cardCls} style={{background:"rgba(239,68,68,0.04)", borderColor:"rgba(239,68,68,0.15)"}}>
              <h3 className="text-xs font-medium text-rose-400 mb-2">Issues</h3>
              {(audit.issues || []).map((s, i) => (
                <div key={i} className="mb-1.5">
                  <div className="text-[12px] font-medium text-white">{s.label}</div>
                  <div className="text-[11px] text-slate-400">{s.detail}</div>
                </div>
              ))}
              {(!audit.issues || audit.issues.length === 0) && <div className="text-xs text-slate-500">No critical issues detected</div>}
            </div>
          </div>
        </div>
      )}

      {/* ── Direction Analysis ── */}
      {subTab === "direction" && (
        <div className="space-y-3">
          {["LONG", "SHORT"].map(dir => {
            const d = audit.direction_analysis?.[dir];
            if (!d) return null;
            const isGood = d.expectancy >= 0;
            return (
              <div key={dir} className={cardCls} style={cardStyle(isGood)}>
                <div className="flex items-center gap-2 mb-2">
                  <span className={`text-sm font-bold ${isGood ? "text-emerald-400" : "text-rose-400"}`}>{dir}</span>
                  <span className="text-[10px] px-1.5 py-0.5 rounded" style={{background: isGood ? "rgba(16,185,129,0.15)" : "rgba(239,68,68,0.15)", color: isGood ? "#34d399" : "#fca5a5"}}>{d.n} trades</span>
                </div>
                <div className="grid grid-cols-3 md:grid-cols-6 gap-3 text-center">
                  {[["Win Rate", pct(d.win_rate)], ["Expectancy", signPct(d.expectancy)], ["SQN", d.sqn], ["Avg P&L", signPct(d.avg_pnl_pct)], ["PF", d.profit_factor], ["Total P&L", signPct(d.total_pnl_pct)]].map(([l,v]) => (
                    <div key={l}><div className="text-[10px] text-slate-500">{l}</div><div className="text-xs font-semibold text-white">{v}</div></div>
                  ))}
                </div>
              </div>
            );
          })}
          {audit.direction_analysis?.verdict === "RESTRICT_SHORT" && (
            <div className="p-3 rounded-lg bg-amber-500/10 border border-amber-500/20 text-amber-300 text-xs">
              Recommendation: SHORT trades are net-negative. Restrict to high-conviction only (rank &gt;= 80).
            </div>
          )}
        </div>
      )}

      {/* ── Exit Reasons ── */}
      {subTab === "exits" && (
        <div className="overflow-x-auto">
          <table className="w-full text-[11px]">
            <thead><tr className="text-slate-500 border-b border-white/[0.06]">
              <th className="py-2 text-left font-medium">Exit Reason</th>
              <th className="py-2 text-right font-medium">Count</th>
              <th className="py-2 text-right font-medium">Win Rate</th>
              <th className="py-2 text-right font-medium">Avg P&L</th>
              <th className="py-2 text-right font-medium">Total P&L</th>
              <th className="py-2 text-right font-medium">SQN</th>
              <th className="py-2 text-center font-medium">Verdict</th>
            </tr></thead>
            <tbody>
              {Object.entries(audit.exit_reason_audit || {}).sort((a, b) => b[1].n - a[1].n).map(([reason, d]) => {
                const colors = { STAR: "text-emerald-400 bg-emerald-500/10", GOOD: "text-emerald-300 bg-emerald-500/5", OK: "text-slate-300 bg-white/5", BAD: "text-amber-400 bg-amber-500/10", TOXIC: "text-rose-400 bg-rose-500/10" };
                return (
                  <tr key={reason} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                    <td className="py-1.5 text-white font-medium max-w-[200px] truncate" title={reason}>{reason}</td>
                    <td className="py-1.5 text-right text-slate-300">{d.n}</td>
                    <td className="py-1.5 text-right text-slate-300">{pct(d.win_rate)}</td>
                    <td className={`py-1.5 text-right font-semibold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</td>
                    <td className={`py-1.5 text-right ${d.total_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.total_pnl_pct)}</td>
                    <td className="py-1.5 text-right text-slate-300">{d.sqn}</td>
                    <td className="py-1.5 text-center"><span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${colors[d.verdict] || colors.OK}`}>{d.verdict}</span></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}

      {/* ── Tickers ── */}
      {subTab === "tickers" && (
        <div>
          {audit.toxic_tickers?.length > 0 && (
            <div className="mb-3 p-2 rounded bg-rose-500/10 border border-rose-500/20 text-xs text-rose-300">
              <span className="font-medium">Toxic ({audit.toxic_tickers.length}):</span> {audit.toxic_tickers.join(", ")}
            </div>
          )}
          {audit.edge_tickers?.length > 0 && (
            <div className="mb-3 p-2 rounded bg-emerald-500/10 border border-emerald-500/20 text-xs text-emerald-300">
              <span className="font-medium">Edge ({audit.edge_tickers.length}):</span> {audit.edge_tickers.join(", ")}
            </div>
          )}
          <div className="overflow-x-auto max-h-[500px] overflow-y-auto">
            <table className="w-full text-[11px]">
              <thead className="sticky top-0 bg-[#0f1117]"><tr className="text-slate-500 border-b border-white/[0.06]">
                <th className="py-2 text-left font-medium">Ticker</th>
                <th className="py-2 text-right font-medium">N</th>
                <th className="py-2 text-right font-medium">WR</th>
                <th className="py-2 text-right font-medium">Avg P&L</th>
                <th className="py-2 text-right font-medium">SQN</th>
                <th className="py-2 text-right font-medium">MFE</th>
                <th className="py-2 text-right font-medium">MAE</th>
                <th className="py-2 text-center font-medium">Grade</th>
              </tr></thead>
              <tbody>
                {Object.entries(audit.ticker_profiles || {}).sort((a, b) => b[1].total_pnl_pct - a[1].total_pnl_pct).map(([ticker, d]) => {
                  const gradeColors = { EDGE: "text-emerald-400 bg-emerald-500/10", STRONG: "text-emerald-300 bg-emerald-500/5", NEUTRAL: "text-slate-300 bg-white/5", WEAK: "text-amber-400 bg-amber-500/10", TOXIC: "text-rose-400 bg-rose-500/10" };
                  return (
                    <tr key={ticker} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                      <td className="py-1.5 text-white font-medium">{ticker}</td>
                      <td className="py-1.5 text-right text-slate-300">{d.n}</td>
                      <td className="py-1.5 text-right text-slate-300">{pct(d.win_rate)}</td>
                      <td className={`py-1.5 text-right font-semibold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</td>
                      <td className="py-1.5 text-right text-slate-300">{d.sqn}</td>
                      <td className="py-1.5 text-right text-slate-300">{pct(d.avg_mfe_pct)}</td>
                      <td className="py-1.5 text-right text-slate-300">{pct(d.avg_mae_pct)}</td>
                      <td className="py-1.5 text-center"><span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${gradeColors[d.grade] || gradeColors.NEUTRAL}`}>{d.grade}</span></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* ── Entry Paths ── */}
      {subTab === "paths" && (
        <div className="space-y-3">
          {Object.entries(audit.entry_paths || {}).sort((a, b) => b[1].n - a[1].n).map(([path, d]) => {
            const actionColors = { KEEP: "text-slate-300 bg-white/5", BOOST: "text-emerald-400 bg-emerald-500/10", RESTRICT: "text-amber-400 bg-amber-500/10", DISABLE: "text-rose-400 bg-rose-500/10" };
            return (
              <div key={path} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
                <div className="flex items-center justify-between mb-1">
                  <span className="text-xs font-semibold text-white">{path}</span>
                  <span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${actionColors[d.action] || actionColors.KEEP}`}>{d.action}</span>
                </div>
                <div className="grid grid-cols-3 md:grid-cols-6 gap-2 text-center text-[11px]">
                  {[["N", d.n], ["WR", pct(d.win_rate)], ["Exp", signPct(d.expectancy)], ["SQN", d.sqn], ["PF", d.profit_factor], ["Total", signPct(d.total_pnl_pct)]].map(([l,v]) => (
                    <div key={l}><div className="text-[10px] text-slate-500">{l}</div><div className="text-xs text-white">{v}</div></div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Time & Hold ── */}
      {subTab === "time" && (
        <div className="space-y-4">
          <div>
            <h3 className="text-xs font-medium text-slate-400 mb-2">Time of Day (ET)</h3>
            <div className="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-2">
              {Object.entries(audit.time_of_day || {}).sort((a, b) => Number(a[0]) - Number(b[0])).map(([h, d]) => (
                <div key={h} className={cardCls} style={{background: d.avg_pnl_pct >= 0 ? "rgba(16,185,129,0.05)" : "rgba(239,68,68,0.05)", borderColor: d.avg_pnl_pct >= 0 ? "rgba(16,185,129,0.15)" : "rgba(239,68,68,0.15)"}}>
                  <div className="text-[10px] text-slate-500">{h}:00</div>
                  <div className={`text-xs font-bold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</div>
                  <div className="text-[10px] text-slate-500">{d.n}t / {pct(d.win_rate)}</div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <h3 className="text-xs font-medium text-slate-400 mb-2">Hold Time Buckets</h3>
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2">
              {Object.entries(audit.hold_time_analysis || {}).map(([bucket, d]) => (
                <div key={bucket} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor:"rgba(255,255,255,0.06)"}}>
                  <div className="text-[10px] text-slate-500 font-medium">{bucket}</div>
                  <div className={`text-sm font-bold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</div>
                  <div className="text-[10px] text-slate-400">{d.n} trades / {pct(d.win_rate)} WR</div>
                </div>
              ))}
            </div>
          </div>
          {audit.sector_analysis && (
            <div>
              <h3 className="text-xs font-medium text-slate-400 mb-2">Sector Performance</h3>
              <div className="overflow-x-auto">
                <table className="w-full text-[11px]">
                  <thead><tr className="text-slate-500 border-b border-white/[0.06]">
                    <th className="py-1.5 text-left font-medium">Sector</th>
                    <th className="py-1.5 text-right font-medium">N</th>
                    <th className="py-1.5 text-right font-medium">WR</th>
                    <th className="py-1.5 text-right font-medium">Avg P&L</th>
                    <th className="py-1.5 text-right font-medium">SQN</th>
                  </tr></thead>
                  <tbody>
                    {Object.entries(audit.sector_analysis).sort((a, b) => b[1].n - a[1].n).map(([sec, d]) => (
                      <tr key={sec} className="border-b border-white/[0.03]">
                        <td className="py-1.5 text-white">{sec}</td>
                        <td className="py-1.5 text-right text-slate-300">{d.n}</td>
                        <td className="py-1.5 text-right">{pct(d.win_rate)}</td>
                        <td className={`py-1.5 text-right font-semibold ${d.avg_pnl_pct >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{signPct(d.avg_pnl_pct)}</td>
                        <td className="py-1.5 text-right text-slate-300">{d.sqn}</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      )}

      {/* ── Recommendations ── */}
      {subTab === "recs" && (
        <div className="space-y-3">
          {(audit.recommendations || []).length === 0 && <div className="text-sm text-slate-400 text-center py-10">No recommendations generated</div>}
          {(audit.recommendations || []).map((r, i) => (
            <div key={r.id} className={cardCls} style={{background:"rgba(255,255,255,0.02)", borderColor: i < 3 ? "rgba(16,185,129,0.2)" : "rgba(255,255,255,0.06)"}}>
              <div className="flex items-center justify-between mb-1">
                <div className="flex items-center gap-2">
                  <span className="text-[10px] font-bold text-slate-500">#{i + 1}</span>
                  <span className="text-xs font-semibold text-white">{r.title}</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${r.confidence === "HIGH" ? "text-emerald-400 bg-emerald-500/10" : r.confidence === "MEDIUM" ? "text-amber-400 bg-amber-500/10" : "text-slate-300 bg-white/5"}`}>{r.confidence}</span>
                  <span className="text-xs font-bold text-emerald-400">+{r.impact_pct}% pts</span>
                </div>
              </div>
              <p className="text-[11px] text-slate-400 leading-relaxed">{r.detail}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function UnifiedAnalysisTab({ report, recs, reportId, onApply, applying, appliedMsg }) {

  return (
    <div>
      <div className="flex gap-1 mb-5">
        <button onClick={() => setSection("live")} className={`px-4 py-2 text-xs font-semibold rounded-lg transition-all ${section === "live" ? "bg-emerald-500/15 text-emerald-300 border border-emerald-500/30" : "bg-white/[0.03] text-slate-400 border border-white/[0.06] hover:bg-white/[0.06]"}`}>
          Live Audit
        </button>
        <button onClick={() => setSection("calibration")} className={`px-4 py-2 text-xs font-semibold rounded-lg transition-all ${section === "calibration" ? "bg-indigo-500/15 text-indigo-300 border border-indigo-500/30" : "bg-white/[0.03] text-slate-400 border border-white/[0.06] hover:bg-white/[0.06]"}`}>

      {section === "live" && <DeepAuditTab />}

}

// ═══════════════════════════════════════════════════════════════
// TAB: Backtest Runs
// ═══════════════════════════════════════════════════════════════
function RunsTab({ isAdmin }) {
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [runs, setRuns] = useState([]);
  const [liveSummary, setLiveSummary] = useState(null);
  const [promotingRunId, setPromotingRunId] = useState("");
  const [finalizingRunId, setFinalizingRunId] = useState("");
  const [archivingRunId, setArchivingRunId] = useState("");
  const [deletingRunId, setDeletingRunId] = useState("");
  const [detailRunId, setDetailRunId] = useState(null);
  const [detailData, setDetailData] = useState(null);
  const [loadingDetail, setLoadingDetail] = useState(false);
  const [message, setMessage] = useState(null);
  const [showOnlyCompleted, setShowOnlyCompleted] = useState(true);
  const [showArchived, setShowArchived] = useState(false);
  const [hideNoisyPlaceholders, setHideNoisyPlaceholders] = useState(true);
  const [editingDescRunId, setEditingDescRunId] = useState(null);
  const [editingDescValue, setEditingDescValue] = useState("");
  const [savingDescRunId, setSavingDescRunId] = useState(null);
  const [compareRuns, setCompareRuns] = useState(null);
  const [variantRunId, setVariantRunId] = useState(null);
  const [variantData, setVariantData] = useState(null);
  const [liveConfigData, setLiveConfigData] = useState(null);
  const [variantOverrides, setVariantOverrides] = useState({});

  const fmtNum = (n) => {
    const v = Number(n);
    return Number.isFinite(v) ? v.toLocaleString() : "—";
  };
  const fmtPct = (n) => {
    const v = Number(n);
    return Number.isFinite(v) ? `${v.toFixed(2)}%` : "—";
  };
  const fmtMoney = (n) => {
    const v = Number(n);
    if (!Number.isFinite(v)) return "—";
    return `${v >= 0 ? "+" : "-"}$${Math.abs(v).toFixed(2)}`;
  };
  const fmtRunDate = (ms) => {
    const v = Number(ms);
    if (!Number.isFinite(v) || v <= 0) return "—";
    const d = new Date(v);
    return d.toLocaleString(undefined, { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
  };
  const shortRunId = (rid) => {
    const s = String(rid || "");
    if (!s) return "—";
    if (s.length <= 42) return s;
    return `${s.slice(0, 26)}...${s.slice(-12)}`;
  };
  const parseMetricObj = (v) => {
    if (!v) return {};
    if (typeof v === "object") return v || {};
    try { return JSON.parse(v) || {}; } catch (_) { return {}; }
  };
  const topCounts = (obj, max = 3) => {
    const entries = Object.entries(obj || {}).filter(([, val]) => Number(val) > 0);
    entries.sort((a, b) => Number(b[1]) - Number(a[1]));
    return entries.slice(0, max);
  };
  const cleanText = (value) => {
    const text = value == null ? "" : String(value).trim();
    return text || "";
  };
  const getRunDescriptionMeta = (run) => {
    const description = cleanText(run?.description);
    const statusNote = cleanText(run?.status_note);
    const label = cleanText(run?.label);
    const hasManualDescription = !!description;
    const displayDescription = hasManualDescription
      ? description
      : (label || "No description");
    return {
      description,
      statusNote,
      label,
      hasManualDescription,
      displayDescription,
      title: [description, statusNote].filter(Boolean).join("\n"),
    };
  };
  const getRunStateBadges = (run) => {
    const items = [];
    if (run?.live_config_slot) items.push({ label: "Live", cls: "run-pill-live" });
    if (run?.is_protected_baseline) items.push({ label: "Protected", cls: "run-pill-protected" });
    if (run?.active_experiment_slot) items.push({ label: "Active", cls: "run-pill-active" });
    if (Number(run?.archived_at || 0) > 0) items.push({ label: "Archived", cls: "run-pill-archived" });
    const status = cleanText(run?.status);
    if (status && status !== "completed") {
      items.push({ label: status.replace(/_/g, " "), cls: "run-pill-status" });
    }
    return items;
  };
  const renderTokens = (entries, emptyLabel = "—") => {
    if (!entries || entries.length === 0) return <span className="text-slate-500">{emptyLabel}</span>;
    return (
      <div className="flex flex-wrap">
        {entries.map(([k, v]) => (
          <span key={`${k}-${v}`} className="run-token">{k}:{v}</span>
        ))}
      </div>
    );
  };

  const fetchRuns = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const includeArchived = showArchived ? "1" : "0";
      const [listRes, liveRes] = await Promise.all([
        fetch(`${API_BASE}/timed/admin/runs?limit=60&include_archived=${includeArchived}`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/admin/runs/live`, { credentials: "include" }).then(r => r.json()).catch(() => null),
      ]);
      if (!listRes?.ok) {
        setError(listRes?.error || "Failed to load backtest runs");
        setRuns([]);
      } else {
        const rows = Array.isArray(listRes.summaries) && listRes.summaries.length
          ? listRes.summaries
          : (Array.isArray(listRes.runs) ? listRes.runs : []);
        setRuns(rows);
      }
      if (liveRes?.ok) setLiveSummary(liveRes.summary || null);
    } catch (e) {
      setError(String(e || "Failed to load runs"));
    }
    setLoading(false);
  }, [showArchived]);

  useEffect(() => { fetchRuns(); }, [fetchRuns]);

  const updateRunDescription = async (runId, description) => {
    if (!isAdmin || !runId) return;
    setSavingDescRunId(runId);
    setMessage(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: runId, description }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) setError(data?.error || "Failed to update description");
      else {
        setMessage("Description updated");
        setEditingDescRunId(null);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to update"));
    }
    setSavingDescRunId(null);
  };

  const promoteRun = async (runId) => {
    if (!isAdmin) return;
    if (!runId) return;
    setPromotingRunId(runId);
    setMessage(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/mark-live`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: runId }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) {
        setError(data?.error || "Failed to promote run");
      } else {
        setMessage(`Live baseline updated: ${runId}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to promote run"));
    }
    setPromotingRunId("");
  };
  const finalizeRun = async (run) => {
    if (!isAdmin || !run?.run_id) return;
    setFinalizingRunId(run.run_id);
    setMessage(null);
    setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/finalize`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          run_id: run.run_id,
          label: run.label || null,
          description: run.description || null,
          start_date: run.start_date || null,
          end_date: run.end_date || null,
          interval_min: run.interval_min || null,
          ticker_batch: run.ticker_batch || null,
          ticker_universe_count: run?.tickers?.universe_count ?? run?.ticker_universe_count ?? null,
          trader_only: !!run.trader_only,
          keep_open_at_end: !!run.keep_open_at_end,
          low_write: !!run.low_write,
          status: run.status || "completed",
          status_note: "Manual metrics refresh from Runs tab",
        }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) {
        setError(data?.error || "Failed to recompute run metrics");
      } else {
        setMessage(`Run metrics refreshed: ${run.run_id}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to recompute run metrics"));
    }
    setFinalizingRunId("");
  };
  const archiveRun = async (run) => {
    if (!isAdmin || !run?.run_id) return;
    setArchivingRunId(run.run_id);
    setMessage(null);
    setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/archive`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: run.run_id, reason: "Archived from Runs UI" }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) setError(data?.error || "Failed to archive run");
      else {
        setMessage(`Run archived: ${run.run_id}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to archive run"));
    }
    setArchivingRunId("");
  };
  const viewRunDetails = async (runId) => {
    if (!runId) return;
    setDetailRunId(runId);
    setDetailData(null);
    setLoadingDetail(true);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/detail?run_id=${encodeURIComponent(runId)}`, { credentials: "include" });
      const data = await res.json();
      setDetailData(data?.ok ? data : { error: data?.error || "Failed to load run details" });
    } catch (e) {
      setDetailData({ error: String(e || "Failed to load") });
    } finally {
      setLoadingDetail(false);
    }
  };
  const deleteRun = async (run) => {
    if (!isAdmin || !run?.run_id) return;
    if (!confirm(`Delete run ${run.run_id}? This removes the run from the registry and purges the active experiment fact store if this run owns it.`)) return;
    setDeletingRunId(run.run_id);
    setMessage(null);
    setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/runs/delete`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ run_id: run.run_id }),
        credentials: "include",
      });
      const data = await res.json();
      if (!data?.ok) setError(data?.error || "Failed to delete run");
      else {
        const pf = data?.purged_facts || {};
        setMessage(`Run deleted: ${run.run_id}${(pf.facts || pf.daily) ? ` (purged ${pf.facts || 0} facts / ${pf.daily || 0} daily rows)` : ""}`);
        await fetchRuns();
      }
    } catch (e) {
      setError(String(e || "Failed to delete run"));
    }
    setDeletingRunId("");
  };
  let filteredRuns = showOnlyCompleted ? runs.filter(r => String(r?.status || "").toLowerCase() === "completed") : runs;
  if (hideNoisyPlaceholders) {
    filteredRuns = filteredRuns.filter(r => {
      const status = String(r?.status || "").toLowerCase();
      const totalTrades = Number(r?.trades?.total ?? r?.total_trades ?? 0);
      const isPlaceholder = status === "running" && totalTrades === 0;
      return !isPlaceholder;
    });
  }

  return (
    <div className="space-y-4">
      <div className="card runs-shell p-5">

                      <td className="px-3 py-3 text-slate-300">
                        <div className="font-medium text-slate-200">{r?.start_date || "—"} → {r?.end_date || "—"}</div>

                      {Object.keys(variantData?.rule_snapshot?.env_flags || {}).sort().map(k => {

                        const isBool = val === "true" || val === "false" || typeof base === "boolean";
                        const isNum = /^-?\d+(\.\d+)?$/.test(String(val)) || (typeof base === "number");
                        return (
                          <div key={k} className="flex items-center gap-3">

                              <input
                                type="checkbox"
                                checked={val === "true" || val === true}
                                onChange={e => setVariantOverrides(prev => ({ ...prev, [k]: e.target.checked ? "true" : "false" }))}
                                className="rounded bg-slate-700 border-slate-600"
                              />
                            ) : isNum ? (
                              <input
                                type="number"
                                value={val}
                                onChange={e => setVariantOverrides(prev => ({ ...prev, [k]: e.target.value }))}
                                className="w-20 px-2 py-1 rounded bg-slate-800 border border-white/10 text-slate-200 text-[11px]"
                              />
                            ) : (
                              <input
                                type="text"
                                value={val}
                                onChange={e => setVariantOverrides(prev => ({ ...prev, [k]: e.target.value }))}
                                className="flex-1 min-w-[80px] max-w-[180px] px-2 py-1 rounded bg-slate-800 border border-white/10 text-slate-200 text-[11px]"
                              />
                            )}
                            {String(val) !== String(base) && (
                              <span className="text-amber-400 text-[10px]">modified</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  {variantData?.rule_snapshot?.env_flags && liveConfigData?.env_flags && (() => {
                    const v = variantOverrides && Object.keys(variantOverrides).length ? variantOverrides : (variantData.rule_snapshot.env_flags || {});
                    const l = liveConfigData.env_flags || {};
                    const allKeys = [...new Set([...Object.keys(v), ...Object.keys(l)])].sort();
                    const diffs = allKeys.filter(k => String(v[k]) !== String(l[k]));
                    if (diffs.length === 0) return (
                      <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-3">
                        <div className="text-emerald-400 font-medium text-[11px] uppercase tracking-wider mb-1">Config vs Live</div>
                        <p className="text-slate-300 text-[12px]">No differences — variant matches live baseline.</p>
                      </div>
                    );
                    return (
                      <div>
                        <div className="text-amber-400 font-medium text-[11px] uppercase tracking-wider mb-1">Config vs Live (deltas)</div>
                        <div className="bg-slate-900/50 rounded p-3 space-y-1.5 font-mono text-[11px]">
                          {diffs.map(k => (
                            <div key={k} className="flex flex-wrap items-center gap-2">
                              <span className="text-slate-500 shrink-0">{k}:</span>
                              <span className="text-rose-400">{JSON.stringify(l[k])}</span>
                              <span className="text-slate-500">→</span>
                              <span className="text-emerald-400">{JSON.stringify(v[k])}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })()}
                  <div>
                    <div className="text-slate-300 font-medium mb-1">Run backtest</div>
                    <div className="relative">
                      <pre className="bg-slate-900/50 p-3 pr-20 rounded font-mono text-slate-300 overflow-x-auto text-[11px] whitespace-pre-wrap break-all">
                        {(() => {
                          const start = variantData?.start_date || "2025-07-01";
                          const end = variantData?.end_date || "2025-07-31";
                          const base = `./scripts/full-backtest.sh --trader-only --low-write --keep-open-at-end ${start} ${end} 15 --label=variant-from-baseline`;
                          const overrides = Object.entries(variantOverrides || {}).filter(([, v]) => v != null && String(v).trim() !== "");
                          const envPart = overrides.length ? " \\\n  " + overrides.map(([k, v]) => `--env-override ${k}=${v}`).join(" \\\n  ") : "";
                          return base + envPart;
                        })()}
                      </pre>
                      <button
                        className="absolute top-2 right-2 px-2 py-1 text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 rounded border border-white/10"
                        onClick={() => {
                          const start = variantData?.start_date || "2025-07-01";
                          const end = variantData?.end_date || "2025-07-31";
                          const base = `./scripts/full-backtest.sh --trader-only --low-write --keep-open-at-end ${start} ${end} 15 --label=variant-from-baseline`;
                          const overrides = Object.entries(variantOverrides || {}).filter(([, v]) => v != null && String(v).trim() !== "");
                          const envPart = overrides.length ? " " + overrides.map(([k, v]) => `--env-override ${k}=${v}`).join(" ") : "";
                          navigator.clipboard.writeText(base + envPart);
                          setMessage("Command copied to clipboard");
                          setTimeout(() => setMessage(null), 2000);
                        }}
                      >
                        Copy
                      </button>
                    </div>
                  </div>
                  {variantData?.rule_snapshot_meta && (
                    <div className="text-slate-500">Snapshot: {variantData.rule_snapshot_meta.ready ? "Ready" : "—"} · {variantData.rule_snapshot_meta.source || "—"}</div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

  const coverageEntries = Object.entries(diagnosis?.coverage_breakdown || {})
    .map(([key, count]) => ({ key, count: Number(count) || 0 }))

  const totalDiagnosed = Number(diagnosis?.total_diagnosed) || breakdownEntries.reduce((sum, item) => sum + item.count, 0);

      const needle = search.trim().toUpperCase();
      rows = rows.filter((move) => String(move.ticker || "").toUpperCase().includes(needle));

        <div className="flex flex-col gap-4">
          <div className="flex flex-wrap items-center gap-2">
            <input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Search ticker..." className="px-3 py-2 bg-white/[0.04] border border-white/[0.08] rounded-lg text-sm text-white placeholder:text-slate-500 w-44" />
            <select value={captureFilter} onChange={(e) => setCaptureFilter(e.target.value)} className="px-3 py-2 bg-white/[0.04] border border-white/[0.08] rounded-lg text-sm text-white">
              <option value="ALL">All captures</option>
              <option value="FULL">Full</option>
              <option value="PARTIAL">Partial</option>
              <option value="CHURNED">Churned</option>
              <option value="MISSED">Missed</option>
            </select>
            <div className="text-xs text-slate-500 ml-auto">{filteredMoves.length} moves</div>
          </div>
          <div className="card p-0 overflow-hidden">
            <div className="overflow-x-auto">
              <table className="runs-table min-w-[900px]">
                <thead>
                  <tr>
                    <th className="text-left px-3">Ticker</th>
                    <th className="text-left px-3">Dir</th>
                    <th className="text-left px-3">Window</th>
                    <th className="text-left px-3">Start</th>
                    <th className="text-left px-3">Move %</th>
                    <th className="text-left px-3">ATR x</th>
                    <th className="text-left px-3">Capture</th>
                  </tr>
                </thead>
                <tbody>
                  {filteredMoves.slice(0, 80).map((move, idx) => (
                    <tr key={`${move.ticker}-${move.start_date}-${idx}`} className="runs-row cursor-pointer" onClick={() => setSelectedMove(move)}>
                      <td className="px-3 py-2 text-white font-medium">{move.ticker}</td>
                      <td className="px-3 py-2 text-slate-300">{move.direction}</td>
                      <td className="px-3 py-2 text-slate-300">{move.window}d</td>
                      <td className="px-3 py-2 text-slate-300">{move.start_date}</td>
                      <td className="px-3 py-2 text-slate-300">{move.move_pct}%</td>
                      <td className="px-3 py-2 text-slate-300">{move.move_atr}</td>
                      <td className="px-3 py-2 text-slate-300">{move.capture}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
          {selectedMove && (
            <div className="card p-4">
              <div className="flex items-center justify-between gap-3 mb-3">
                <h3 className="text-sm font-semibold text-white">{selectedMove.ticker} {selectedMove.direction} {selectedMove.move_pct}%</h3>
                <button className="run-action-btn run-action-btn-muted" onClick={() => setSelectedMove(null)}>Close</button>
              </div>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-sm">
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">Start</div><div className="mt-1 text-white">{selectedMove.start_date} @ ${selectedMove.start_price}</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">End</div><div className="mt-1 text-white">{selectedMove.end_date} @ ${selectedMove.end_price}</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">Peak</div><div className="mt-1 text-white">{selectedMove.peak_date} @ ${selectedMove.peak_price}</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">ATR At Start</div><div className="mt-1 text-white">{selectedMove.atr_at_start ?? "—"}</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">Pullback</div><div className="mt-1 text-white">{selectedMove.max_pullback_pct}%</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">RSI</div><div className="mt-1 text-white">{selectedMove.rsi_at_start}</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">EMA</div><div className="mt-1 text-white">{selectedMove.ema_state || "—"}</div></div>
                <div><div className="text-slate-500 text-[11px] uppercase tracking-wide">Capture</div><div className="mt-1 text-white">{selectedMove.capture}</div></div>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// TRADE GRADING TAB (admin-only)
// ═══════════════════════════════════════════════════════════════
const DEFAULT_GRADE_RISK = { "A+": 1000, "A": 850, "A-": 700, "B+": 550, "B": 400, "B-": 250 };
const GRADE_ORDER = ["A+", "A", "A-", "B+", "B", "B-"];
const GRADE_COLORS = { "A+": "#22c55e", "A": "#4ade80", "A-": "#86efac", "B+": "#facc15", "B": "#fbbf24", "B-": "#f97316" };

function TradeGradingTab() {
  const [riskMap, setRiskMap] = useState({ ...DEFAULT_GRADE_RISK });
  const [origMap, setOrigMap] = useState({ ...DEFAULT_GRADE_RISK });
  const [stats, setStats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/admin/grade-config`);
        const data = await res.json();
        if (data.ok) {
          const merged = { ...DEFAULT_GRADE_RISK, ...(data.gradeRiskMap || {}) };
          setRiskMap(merged);
          setOrigMap(merged);
          if (Array.isArray(data.gradeStats)) setStats(data.gradeStats);
        }
      } catch {}
      setLoading(false);
    })();
  }, []);

  const hasChanges = GRADE_ORDER.some(g => Number(riskMap[g]) !== Number(origMap[g]));

  const validate = () => {
    for (const g of GRADE_ORDER) {
      const v = Number(riskMap[g]);
      if (!Number.isFinite(v) || v < 100 || v > 2000) return `${g}: must be $100–$2,000`;
    }
    for (let i = 0; i < GRADE_ORDER.length - 1; i++) {
      if (Number(riskMap[GRADE_ORDER[i]]) < Number(riskMap[GRADE_ORDER[i + 1]])) {
        return `${GRADE_ORDER[i]} ($${riskMap[GRADE_ORDER[i]]}) must be >= ${GRADE_ORDER[i + 1]} ($${riskMap[GRADE_ORDER[i + 1]]})`;
      }
    }
    return null;
  };

  const handleSave = async () => {
    const err = validate();
    if (err) { setMsg({ type: "error", text: err }); return; }
    setSaving(true); setMsg(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/model-config`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ updates: [{ key: "grade_risk_map", value: JSON.stringify(riskMap), description: "Trade grading: grade-to-risk dollar mapping" }] }),
      });
      const data = await res.json();
      if (data.ok) { setOrigMap({ ...riskMap }); setMsg({ type: "ok", text: "Saved successfully" }); }
      else setMsg({ type: "error", text: data.error || "Save failed" });
    } catch (e) { setMsg({ type: "error", text: String(e) }); }
    setSaving(false);
  };

  if (loading) return <div className="flex justify-center py-12"><div className="w-6 h-6 border-2 border-white/20 border-t-amber-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} /></div>;

  return (
    <div className="space-y-6">
      <div className="card p-5">
        <h3 className="text-sm font-semibold text-white mb-1">Grade-to-Risk Configuration</h3>
        <p className="text-xs text-slate-400 mb-4">Set the fixed dollar risk for each trade grade. Higher grades get larger risk budgets. Position size = Risk / |Entry - SL|.</p>
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-6 gap-3">
          {GRADE_ORDER.map(grade => (
            <div key={grade} className="rounded-lg border border-white/[0.08] p-3 bg-white/[0.02]">
              <div className="flex items-center gap-2 mb-2">
                <span className="px-2 py-0.5 rounded text-xs font-bold" style={{ background: GRADE_COLORS[grade] + "30", color: GRADE_COLORS[grade], border: `1px solid ${GRADE_COLORS[grade]}50` }}>{grade}</span>
              </div>
              <div className="relative">
                <span className="absolute left-2.5 top-1/2 -translate-y-1/2 text-slate-500 text-xs">$</span>
                <input
                  type="number"
                  min="100" max="2000" step="50"
                  value={riskMap[grade]}
                  onChange={(e) => setRiskMap(prev => ({ ...prev, [grade]: Number(e.target.value) || 0 }))}
                  className="w-full pl-6 pr-2 py-1.5 bg-white/[0.04] border border-white/[0.10] rounded-md text-white text-sm font-medium focus:border-amber-500/50 focus:outline-none"
                  placeholder={String(DEFAULT_GRADE_RISK[grade])}
                />
              </div>
              <div className="text-[10px] text-slate-500 mt-1">Default: ${DEFAULT_GRADE_RISK[grade]}</div>
            </div>
          ))}
        </div>
        <div className="flex items-center gap-3 mt-4">
          <button
            onClick={handleSave}
            disabled={!hasChanges || saving}
            className={`px-4 py-2 rounded-lg text-xs font-semibold transition-colors ${hasChanges ? "bg-amber-500/20 text-amber-300 border border-amber-500/40 hover:bg-amber-500/30" : "bg-white/[0.04] text-slate-500 border border-white/[0.06] cursor-not-allowed"}`}
          >
            {saving ? "Saving..." : "Save Changes"}
          </button>
          {hasChanges && (
            <button onClick={() => setRiskMap({ ...origMap })} className="px-3 py-2 rounded-lg text-xs text-slate-400 hover:text-white border border-white/[0.06] hover:border-white/[0.12] transition-colors">Reset</button>
          )}
          {msg && (
            <span className={`text-xs font-medium ${msg.type === "ok" ? "text-emerald-400" : "text-rose-400"}`}>{msg.text}</span>
          )}
        </div>
      </div>

      {stats.length > 0 && (
        <div className="card p-5">
          <h3 className="text-sm font-semibold text-white mb-3">Grade Distribution (Closed Trades)</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">Grade</th>
                <th className="text-right px-3 font-medium">Trades</th>
                <th className="text-right px-3 font-medium">Wins</th>
                <th className="text-right px-3 font-medium">Losses</th>
                <th className="text-right px-3 font-medium">Win Rate</th>
                <th className="text-right px-3 font-medium">Avg P&L</th>
                <th className="text-right pl-3 font-medium">Avg P&L %</th>
              </tr></thead>
              <tbody>
                {stats.map(s => {
                  const wr = s.total > 0 ? ((s.wins / s.total) * 100) : 0;
                  const wrCls = wr >= 60 ? "text-emerald-400" : wr >= 45 ? "text-amber-400" : "text-rose-400";
                  return (
                    <tr key={s.setup_grade} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                      <td className="py-1.5"><span className="px-1.5 py-0.5 rounded text-[10px] font-bold" style={{ background: (GRADE_COLORS[s.setup_grade] || "#6b7280") + "30", color: GRADE_COLORS[s.setup_grade] || "#6b7280" }}>{s.setup_grade}</span></td>
                      <td className="text-right px-3 text-slate-300">{s.total}</td>
                      <td className="text-right px-3 text-emerald-400">{s.wins}</td>
                      <td className="text-right px-3 text-rose-400">{s.losses}</td>
                      <td className={`text-right px-3 font-medium ${wrCls}`}>{wr.toFixed(1)}%</td>
                      <td className={`text-right px-3 ${(s.avg_pnl || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>${(s.avg_pnl || 0).toFixed(2)}</td>
                      <td className={`text-right pl-3 ${(s.avg_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{(s.avg_pnl_pct || 0).toFixed(2)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {stats.length === 0 && (
        <div className="card p-5 text-center">
          <p className="text-xs text-slate-500">No graded trades yet. Grade statistics will appear here once trades are taken with the grading system active.</p>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const candidate = params.get("tab");
      return candidate || "dashboard";
    } catch (_) {
      return "dashboard";
    }
  });
  const [dashboard, setDashboard] = useState(null);
  const [report, setReport] = useState(null);
  const [recs, setRecs] = useState(null);
  const [moveReport, setMoveReport] = useState(null);
  const [moveError, setMoveError] = useState(null);
  const [reportId, setReportId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [moveLoading, setMoveLoading] = useState(true);
  const [running, setRunning] = useState(false);
  const [queued, setQueued] = useState(false);
  const [progress, setProgress] = useState(null);
  const preCalibReportIdRef = React.useRef(null);
  const [applying, setApplying] = useState(false);
  const [appliedMsg, setAppliedMsg] = useState(null);
  const [resetting, setResetting] = useState(false);
  const [resetMsg, setResetMsg] = useState(null);
  const [error, setError] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const pollIntervalRef = React.useRef(null);
  const statusPollRef = React.useRef(null);

  useEffect(() => {
    const session = window.TimedAuthHelpers?.getStoredSession();
    const r = String(session?.role || "").toLowerCase();
    const t = String(session?.tier || "").toLowerCase();
    const admin = r === "admin" || t === "admin";
    document.body.setAttribute("data-user-role", admin ? "admin" : (session?.role || ""));
    setIsAdmin(admin);
  }, []);

  const fetchData = useCallback(async () => {
    setLoading(true);
    setError(null);
    setMoveLoading(true);
    setMoveError(null);
    try {
      const [dashRes, reportRes, moveRes] = await Promise.all([
        fetch(`${API_BASE}/timed/system/dashboard`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/move-discovery`, { credentials: "include" }).then(async (r) => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        }).catch((e) => ({ ok: false, error: String(e?.message || e) })),
      ]);
      if (dashRes?.ok) setDashboard(dashRes);
      if (reportRes?.ok) {
        setReport(reportRes.report);
        setRecs(reportRes.recommendations);
        setReportId(reportRes.report_id);
      }
      if (moveRes?.ok !== false) {
        setMoveReport(moveRes);
      } else {
        setMoveReport(null);
        setMoveError(moveRes?.error || "move_discovery_failed");
      }
    } catch (e) { setError(String(e)); }
    setMoveLoading(false);
    setLoading(false);
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);

  useEffect(() => {
    try {
      const url = new URL(window.location.href);
      url.searchParams.set("tab", tab);
      window.history.replaceState({}, "", `${url.pathname}${url.search}${url.hash}`);
    } catch (_) {}
  }, [tab]);

  // Poll status when queued
  useEffect(() => {
    if (!queued) return;
    const fetchStatus = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/calibration/status`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          if (data.ok) {
            setProgress({ message: data.message, step: data.step, total_steps: data.total_steps, steps: data.steps, status: data.status });
            if (data.status === "error" && data.message) {
              setError(data.message);
              setQueued(false);
            }
            // When status reports "done", fetch the new report and finish
            if (data.status === "done") {
              try {
                const rptRes = await fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" });
                const rptData = await rptRes.json();
                if (rptData.ok && rptData.report) {
                  setReport(rptData.report); setRecs(rptData.recommendations); setReportId(rptData.report_id);
                }
              } catch (_) {}
              setQueued(false);
              fetchData();
            }
          }
        }
      } catch (_) {}
    };
    fetchStatus();
    statusPollRef.current = setInterval(fetchStatus, 3000);
    return () => { if (statusPollRef.current) clearInterval(statusPollRef.current); statusPollRef.current = null; };
  }, [queued]);

  useEffect(() => {
    if (!queued) return;
    const tick = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          // Only treat as "done" if this is a NEW report (different from the one before we clicked Run)
          if (data.ok && data.report && data.report_id && data.report_id !== preCalibReportIdRef.current) {
            setReport(data.report); setRecs(data.recommendations); setReportId(data.report_id);
            setQueued(false); setProgress(null);
            if (pollIntervalRef.current) clearInterval(pollIntervalRef.current);
            fetchData();
            return;
          }
        }
      } catch (_) {}
    };
    pollIntervalRef.current = setInterval(tick, 15000);
    return () => { if (pollIntervalRef.current) clearInterval(pollIntervalRef.current); };
  }, [queued]);

  const handleRun = async () => {
    setRunning(true); setError(null);
    preCalibReportIdRef.current = reportId;
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/run`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ analysis_only: true }), credentials: "include" });
      const data = await res.json();
      if (data.ok && data.report) { setReport(data.report); setRecs(data.report?.recommendations); setReportId(data.report?.report_id || reportId); fetchData(); }
      else if (!data.ok) setError(data.error || "Analysis failed");
    } catch (e) { setError(String(e)); }
    setRunning(false);
  };
  const handleApply = async (id) => {
    setApplying(true); setAppliedMsg(null);
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/apply`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ report_id: id }), credentials: "include" });
      const data = await res.json();
      if (data.ok) setAppliedMsg(`Applied: ${data.applied?.join(", ")}`);
      else setError(data.error);
    } catch (e) { setError(String(e)); }
    setApplying(false);
  };
  const handleReset = async () => {
    if (!confirm("This will permanently delete ALL trades and reset the account to $100,000. Continue?")) return;
    setResetting(true); setResetMsg(null); setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/trades/reset`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}", credentials: "include" });
      const data = await res.json();
      if (data.ok) { setResetMsg(data.message || "Account reset to $100,000."); setReport(null); setRecs(null); fetchData(); }
      else setError(data.error || "Reset failed");
    } catch (e) { setError(String(e)); }
    setResetting(false);
  };
  const handleViewReport = async (rid) => {
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/report?report_id=${rid}`, { credentials: "include" });
      const data = await res.json();
      if (data.ok) { setReport(data.report); setRecs(data.recommendations); setReportId(data.report_id); setTab("analysis"); }
    } catch (_) {}
  };

  const tabs = [
    { id: "dashboard", label: "Dashboard" },
    { id: "analysis", label: "Analysis" },
    ...(isAdmin ? [{ id: "runs", label: "Runs" }] : []),
    { id: "moves", label: "Move Discovery" },
    { id: "patterns", label: "Patterns & Learning" },
    { id: "history", label: "History" },
    ...(isAdmin ? [{ id: "grading", label: "Trade Grading" }] : []),
  ];

  return (
    <div className="min-h-screen pb-16">
      <NavHeader />
      <div className="max-w-[1520px] mx-auto px-4 py-6">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h1 className="text-xl font-bold text-white tracking-tight">System Intelligence</h1>
            <p className="text-xs text-slate-400 mt-1.5">Calibration, model performance, and experiment workflow</p>
          </div>
          {isAdmin && (
            <div className="flex items-center gap-2">
              <button className="btn btn-primary text-xs" onClick={handleRun} disabled={running}>
                {running ? <span className="flex items-center gap-1.5"><span className="w-3 h-3 border-2 border-white/30 border-t-white rounded-full" style={{animation:"spin 0.7s linear infinite"}} />Analyzing...</span> : "Run Analysis"}
              </button>
              <button className="btn text-xs" style={{background:"rgba(239,68,68,0.15)", color:"#fca5a5", border:"1px solid rgba(239,68,68,0.25)"}} onClick={handleReset} disabled={resetting}>
                {resetting ? <span className="flex items-center gap-1.5"><span className="w-3 h-3 border-2 border-rose-400/30 border-t-rose-400 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />Resetting...</span> : "Reset Account"}
              </button>
            </div>
          )}
        </div>

        {isAdmin && (
          <div className="mb-4 p-4 rounded-xl border text-xs" style={{background:"rgba(99,102,241,0.05)", borderColor:"rgba(99,102,241,0.15)"}}>
            <p className="text-indigo-300/90 font-medium mb-1.5">Local Calibration Pipeline</p>
            <p className="text-slate-400 leading-relaxed">Full calibration (harvest + autopsy) runs locally. Upload data, then click <span className="text-white font-medium">Run Analysis</span> to build profiles.</p>
            <code className="inline-block mt-2 text-[11px] text-slate-500 bg-white/[0.06] rounded-md px-2.5 py-1 font-mono">node scripts/calibrate.js</code>
          </div>
        )}
        {error && <div className="mb-4 p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-sm text-rose-300">{error}</div>}
        {resetMsg && <div className="mb-4 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-sm text-emerald-300">{resetMsg}</div>}

        {/* Main tabs */}
        <div className="flex gap-1 border-b border-white/[0.06] mb-5 overflow-x-auto">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`px-4 py-2 text-xs font-medium whitespace-nowrap ${tab === t.id ? "tab-active" : "tab-inactive"}`}>{t.label}</button>
          ))}
        </div>

        {loading && tab === "dashboard" ? (
          <div className="flex items-center justify-center py-20">
            <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />
          </div>
        ) : (
          <>
            {tab === "dashboard" && <DashboardTab dashboard={dashboard} />}
            {tab === "analysis" && <UnifiedAnalysisTab report={report} recs={recs} reportId={reportId} onApply={handleApply} applying={applying} appliedMsg={appliedMsg} />}
            {tab === "runs" && <RunsTab isAdmin={isAdmin} />}
            {tab === "moves" && <MoveDiscoveryTab report={moveReport} loading={moveLoading} error={moveError} />}
            {tab === "patterns" && <PatternsTab />}
            {tab === "history" && <HistoryTab onViewReport={handleViewReport} />}
            {tab === "grading" && isAdmin && <TradeGradingTab />}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
