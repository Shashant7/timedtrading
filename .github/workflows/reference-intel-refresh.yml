# Reference Intel Refresh — replaces the legacy launchd job
# (scripts/com.timedtrading.reference-intel-refresh.plist).
#
# Runs the full reference-intel build/validate pipeline on a schedule and
# commits the regenerated artifacts back to main. Artifacts live under
# data/reference-intel/ and are NOT consumed by the Cloudflare Worker at
# runtime — they are offline build/audit artifacts (drift monitor, CIO
# feature pack, validation gates, revalidation triggers) used to decide
# whether to promote a new reference dataset.
#
# Why a GitHub Action instead of a Cloudflare Worker cron:
#   * Workers run JavaScript only; the pipeline is ~600 LOC of Python
#     across ~10 sub-scripts (reference-intel-build, trade-selector,
#     context-intel-builder, journey-blueprint-builder, policy-artifact-
#     builder, reference-cio-feature-pack, reference-validation-gates,
#     reference-drift-monitor, cio-drift-monitor, reference-validation-matrix).
#   * The artifacts go into git, not into KV/D1, so committing them
#     from CI is the natural delivery mechanism.
#   * No live system depends on these artifacts firing at a precise time —
#     once-per-day is plenty.
#
# Optional: provision CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets
# to enable the wrangler-backed runtime export (refresh-runtime-snapshots
# step). Without those secrets, the pipeline falls back to cached files
# and still produces drift / validation artifacts.

name: Reference Intel Refresh

on:
  schedule:
    # Mirror the legacy launchd schedule: 06:15 UTC and 18:15 UTC.
    - cron: "15 6 * * *"
    - cron: "15 18 * * *"
  workflow_dispatch:
    inputs:
      run_matrix:
        description: "Also run the validation matrix (slower)"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Job-level env: secrets are exposed here (not in step-level `if:`,
    # which is disallowed by GitHub Actions and was the previous failure
    # mode — the workflow file failed schema validation and every run was
    # marked "workflow file issue" before any step executed). When the
    # secrets are unset they expand to empty strings, wrangler fails to
    # auth, and the Python pipeline silently falls back to cached files
    # via export_runtime_sources()'s try/except.
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Need write access + full history for the auto-commit step.
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Set up Node.js (for optional wrangler runtime-source export)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Wrangler auth status
        run: |
          if [ -n "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "wrangler auth: CLOUDFLARE_API_TOKEN is set — runtime D1 export will be attempted"
          else
            echo "wrangler auth: CLOUDFLARE_API_TOKEN is empty — pipeline will fall back to cached files (set CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID secrets to enable fresh exports)"
          fi

      - name: Run reference-intel refresh pipeline
        run: |
          set -euo pipefail
          ARGS=""
          if [ "${{ github.event_name }}" != "workflow_dispatch" ] || [ "${{ github.event.inputs.run_matrix }}" = "true" ]; then
            ARGS="--run-matrix"
          fi
          python3 scripts/reference-intel-refresh.py $ARGS

      - name: Show drift / revalidation summary
        if: always()
        run: |
          echo "----- revalidation-trigger-v1.json -----"
          cat data/reference-intel/revalidation-trigger-v1.json || echo "(no trigger file)"
          echo "----- drift-monitor-v1.json (alerts) -----"
          python3 -c "import json,sys; d=json.load(open('data/reference-intel/drift-monitor-v1.json')); print(json.dumps({k:d.get(k) for k in ['drift_alert','summary'] if k in d}, indent=2))" || true

      - name: Commit refreshed artifacts
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only the refresh-managed artifact tree.
          git add data/reference-intel/ || true
          if git diff --cached --quiet; then
            echo "No reference-intel changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(reference-intel): scheduled refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
          # Retry push once (GH Actions can race with concurrent merges).
          if ! git push; then
            git pull --rebase && git push
          fi
