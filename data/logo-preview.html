<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Logo — Wick Fix + Brighter Ring</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; color: #f5f5f7; font-family: 'Inter', -apple-system, sans-serif; padding: 48px 40px; -webkit-font-smoothing: antialiased; }
  h1 { font-size: 32px; font-weight: 700; letter-spacing: -0.03em; margin-bottom: 4px; }
  .sub { color: #86868b; font-size: 15px; margin-bottom: 48px; }
  h2 { font-size: 14px; color: #86868b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px; }
  .section { margin-bottom: 48px; }
  .sizes { display: flex; align-items: flex-end; gap: 40px; flex-wrap: wrap; }
  .sl { font-size: 10px; color: #48484a; text-align: center; margin-top: 8px; font-weight: 500; }
  .nav-demo {
    background: #0b0e11;
    border-radius: 14px;
    padding: 12px 20px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .nav-demo .nm { font-size: 15px; font-weight: 700; color: #f5f5f7; letter-spacing: -0.03em; }
</style>
</head>
<body>

<h1>Wick Aligned + Brighter Ring</h1>
<p class="sub">Green wick now follows the body angle. Ring gradient brightened to #34d399 → #67e8f9.</p>

<div class="section">
  <h2>Scale Test</h2>
  <div class="sizes">
    <div style="text-align:center">
      <svg width="128" height="128" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="ring" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient>
          <radialGradient id="glow" cx="24" cy="24" r="6"><stop offset="0%" stop-color="#34d399" stop-opacity="0.18"/><stop offset="100%" stop-color="#34d399" stop-opacity="0"/></radialGradient>
        </defs>
        <rect width="48" height="48" rx="11" fill="#000"/>
        <circle cx="24" cy="24" r="17" stroke="url(#ring)" stroke-width="1.8" fill="none"/>
        <circle cx="24" cy="24" r="8" fill="url(#glow)"/>
        <line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <line x1="40.5" y1="24" x2="37.5" y2="24" stroke="#34d399" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="24" y1="40.5" x2="24" y2="37.5" stroke="#34d399" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
        <line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
        <text x="24" y="36" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="5.5" font-weight="700" fill="#34d399" opacity="0.2" letter-spacing="0.8">TT</text>
        <line x1="18.5" y1="18" x2="15.5" y2="15" stroke="#636366" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="18.5" y2="18" stroke="#636366" stroke-width="3" stroke-linecap="round"/>
        <line x1="29.5" y1="16" x2="32" y2="12.4" stroke="#30d158" stroke-width="0.8" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="29.5" y2="16" stroke="#30d158" stroke-width="3.2" stroke-linecap="round"/>
        <circle cx="24" cy="24" r="2.5" fill="#30d158"/>
        <circle cx="24" cy="24" r="1" fill="#000"/>
      </svg>
      <div class="sl">128px</div>
    </div>
    <div style="text-align:center">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <defs><linearGradient id="ring3" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient></defs>
        <rect width="48" height="48" rx="11" fill="#000"/>
        <circle cx="24" cy="24" r="17" stroke="url(#ring3)" stroke-width="2" fill="none"/>
        <line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
        <line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
        <text x="24" y="36.5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="5.5" font-weight="700" fill="#34d399" opacity="0.22" letter-spacing="0.8">TT</text>
        <line x1="18.5" y1="18" x2="15.5" y2="15" stroke="#636366" stroke-width="1" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="18.5" y2="18" stroke="#636366" stroke-width="3.2" stroke-linecap="round"/>
        <line x1="29.5" y1="16" x2="32" y2="12.4" stroke="#30d158" stroke-width="1" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="29.5" y2="16" stroke="#30d158" stroke-width="3.5" stroke-linecap="round"/>
        <circle cx="24" cy="24" r="2.8" fill="#30d158"/>
        <circle cx="24" cy="24" r="1.1" fill="#000"/>
      </svg>
      <div class="sl">48px</div>
    </div>
    <div style="text-align:center">
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
        <defs><linearGradient id="ring4" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient></defs>
        <rect width="48" height="48" rx="11" fill="#000"/>
        <circle cx="24" cy="24" r="17" stroke="url(#ring4)" stroke-width="2.5" fill="none"/>
        <line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
        <line x1="19" y1="18.5" x2="16" y2="15.5" stroke="#636366" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="19" y2="18.5" stroke="#636366" stroke-width="3.5" stroke-linecap="round"/>
        <line x1="29.5" y1="16.5" x2="32" y2="12.9" stroke="#30d158" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="29.5" y2="16.5" stroke="#30d158" stroke-width="4" stroke-linecap="round"/>
        <circle cx="24" cy="24" r="3.2" fill="#30d158"/>
        <circle cx="24" cy="24" r="1.3" fill="#000"/>
      </svg>
      <div class="sl">28px (navbar)</div>
    </div>
    <div style="text-align:center">
      <svg width="16" height="16" viewBox="0 0 48 48" fill="none">
        <defs><linearGradient id="ring5" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient></defs>
        <rect width="48" height="48" rx="11" fill="#000"/>
        <circle cx="24" cy="24" r="17" stroke="url(#ring5)" stroke-width="3" fill="none"/>
        <line x1="24" y1="24" x2="19" y2="18.5" stroke="#636366" stroke-width="4" stroke-linecap="round"/>
        <line x1="24" y1="24" x2="29.5" y2="16.5" stroke="#30d158" stroke-width="4.5" stroke-linecap="round"/>
        <circle cx="24" cy="24" r="3.5" fill="#30d158"/>
        <circle cx="24" cy="24" r="1.5" fill="#000"/>
      </svg>
      <div class="sl">16px (favicon)</div>
    </div>
  </div>
</div>

<div class="section">
  <h2>Navbar</h2>
  <div class="nav-demo">
    <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><defs><linearGradient id="ringN" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient></defs><rect width="48" height="48" rx="11" fill="#000"/><circle cx="24" cy="24" r="17" stroke="url(#ringN)" stroke-width="2.5" fill="none"/><line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><line x1="19" y1="18.5" x2="16" y2="15.5" stroke="#636366" stroke-width="1.2" stroke-linecap="round"/><line x1="24" y1="24" x2="19" y2="18.5" stroke="#636366" stroke-width="3.5" stroke-linecap="round"/><line x1="29.5" y1="16.5" x2="32" y2="12.9" stroke="#30d158" stroke-width="1.2" stroke-linecap="round"/><line x1="24" y1="24" x2="29.5" y2="16.5" stroke="#30d158" stroke-width="4" stroke-linecap="round"/><circle cx="24" cy="24" r="3.2" fill="#30d158"/><circle cx="24" cy="24" r="1.3" fill="#000"/></svg>
    <span class="nm">Timed Trading</span>
    <span style="margin-left:12px;display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:rgba(14,165,233,0.1);border:1px solid rgba(14,165,233,0.25)"><span style="width:6px;height:6px;border-radius:50%;background:#38bdf8"></span><span style="font-size:9px;color:#38bdf8;font-weight:600">LIVE</span></span>
  </div>
</div>

</body>
</html>
