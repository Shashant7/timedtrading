    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.025);
        --tt-bg-elev: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.06);
        --tt-border-hi: rgba(255,255,255,0.12);
        --tt-text: #e5e7eb;
        --tt-text-muted: #9ca3af;
        --tt-text-dim: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: #f5c25c;
        --tt-accent-dim: rgba(245,194,92,0.14);
        --tt-violet: #a78bfa;
        --tt-violet-dim: rgba(167,139,250,0.14);
        --tt-cyan: #22d3ee;
        --tt-cyan-dim: rgba(34,211,238,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-mono: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: 12px; }
      .tt-card-pad { padding: 14px 16px; }

      /* Top nav (matches /today + /active-trader) */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
        transition: background 120ms ease, color 120ms ease;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
      }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Page hero */
      .inv-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 18px 22px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
        margin-bottom: 20px;
      }
      .inv-hero h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
      .inv-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .inv-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; max-width: 720px; }

      /* Account summary strip — small KPI tiles for the Investor account */
      .inv-account-strip {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
        padding: 12px 14px;
        margin-bottom: 16px;
      }
      .inv-account-strip__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .inv-account-strip__label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
      }
      .inv-account-strip__link {
        font-size: 11.5px;
        color: var(--tt-cyan);
        text-decoration: none;
        font-weight: 600;
      }
      .inv-account-strip__link:hover { text-decoration: underline; }
      .inv-account-strip__grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 1024px) {
        .inv-account-strip__grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }
      @media (max-width: 540px) {
        .inv-account-strip__grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .inv-account-strip__tile {
        padding: 8px 10px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .inv-account-strip__l {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
      }
      .inv-account-strip__v {
        font-family: var(--tt-font-mono);
        font-size: 16px;
        font-weight: 700;
        color: var(--tt-text);
        line-height: 1.2;
      }
      .inv-account-strip__v.up { color: var(--tt-up-soft); }
      .inv-account-strip__v.dn { color: var(--tt-dn-soft); }
      .inv-account-strip__sub {
        font-size: 11px;
        color: var(--tt-text-dim);
        font-weight: 600;
      }

      /* Investor search + filter row */
      .inv-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .inv-search-wrap {
        position: relative;
        flex: 1 1 320px;
        max-width: 480px;
        display: flex;
        align-items: center;
      }
      .inv-search-icon {
        position: absolute;
        left: 12px;
        color: var(--tt-text-dim);
        pointer-events: none;
      }
      .inv-search {
        width: 100%;
        height: 36px;
        padding: 0 36px 0 36px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        font-family: var(--tt-font);
        font-size: 13px;
        color: var(--tt-text);
        transition: border-color 120ms ease, background 120ms ease;
      }
      .inv-search::placeholder { color: var(--tt-text-faint); }
      .inv-search:focus {
        outline: none;
        border-color: var(--tt-border-hi);
        background: var(--tt-bg-elev);
      }
      .inv-search-clear {
        position: absolute;
        right: 6px;
        width: 24px;
        height: 24px;
        background: transparent;
        border: 0;
        color: var(--tt-text-dim);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        border-radius: 6px;
      }
      .inv-search-clear:hover {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
      }
      .inv-filter-chips {
        display: inline-flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .inv-chip {
        font-family: var(--tt-font);
        font-size: 12px;
        font-weight: 600;
        padding: 6px 12px;
        background: var(--tt-bg-surface);
        color: var(--tt-text-muted);
        border: 1px solid var(--tt-border);
        border-radius: 999px;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
      }
      .inv-chip:hover:not(:disabled) {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
      }
      .inv-chip.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
        border-color: rgba(245,194,92,0.30);
      }
      .inv-chip:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Bubble map row at the bottom of the page — match AT sizing
         + heading typography exactly so the rhythm is consistent
         across the journey pages. */
      .inv-bubble-row { margin-top: 40px; }
      .inv-bubble-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }
      .inv-bubble-legend {
        display: flex;
        gap: 14px;
        font-size: 11.5px;
        color: var(--tt-text-muted);
        flex-wrap: wrap;
        align-items: center;
      }
      .inv-bubble-legend .bdot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        margin-right: 5px;
        vertical-align: middle;
      }
      .inv-bubble-card {
        padding: 0;
        overflow: hidden;
        border-radius: 14px;
      }
      .inv-bubble-stage {
        position: relative;
        height: min(82vh, 900px);
        min-height: 600px;
      }
      @media (max-width: 1024px) {
        .inv-bubble-stage { height: 70vh; min-height: 520px; }
      }
      @media (max-width: 720px) {
        .inv-bubble-stage { height: 70vh; min-height: 460px; }
      }
      @media (max-width: 720px) {
        .inv-hero { grid-template-columns: 1fr; }
        .inv-hero h1 { font-size: 18px; }
      }

      /* Loading bar */
      .tt-loadbar {
        position: fixed; top: 0; left: 0; right: 0;
        height: 2px;
        background: rgba(245,194,92,0.12);
        z-index: 9000;
        overflow: hidden;
      }
      .tt-loadbar::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--tt-accent), transparent);
        animation: tt-loadbar 1.4s ease-in-out infinite;
      }
      @keyframes tt-loadbar { 0% { left: -30%; } 100% { left: 100%; } }

      /* Skeleton for first paint */
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;
        border-radius: 6px;
      }
      @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
      .sk-card { height: 134px; background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: 12px; }
    </style>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback } = React;
      const h = React.createElement;
      const API_BASE = "";

      // ── useSavedTickers — same pattern as /today + /active-trader ─
      function useSavedTickers() {
        const [saved, setSaved] = useState(() => {
          const bootstrap = window.TimedAuthHelpers?.getStoredBootstrap?.();
          return new Set(Array.isArray(bootstrap?.saved_tickers)
            ? bootstrap.saved_tickers.map((s) => String(s).toUpperCase())
            : []);
        });
        useEffect(() => {
          const applyBootstrap = (detail) => {
            if (!Array.isArray(detail?.saved_tickers)) return;
            setSaved(new Set(detail.saved_tickers.map((s) => String(s).toUpperCase())));
          };
          const handler = (event) => applyBootstrap(event?.detail);
          try { applyBootstrap(window.TimedAuthHelpers?.getStoredBootstrap?.()); } catch (_) {}
          window.addEventListener("tt-auth-bootstrap-updated", handler);
          return () => window.removeEventListener("tt-auth-bootstrap-updated", handler);
        }, []);
        const toggle = useCallback(async (ticker) => {
          const T = String(ticker || "").toUpperCase();
          if (!T) return;
          setSaved((prev) => {
            const next = new Set(prev);
            if (next.has(T)) next.delete(T); else next.add(T);
            try {
              const bootstrap = window.TimedAuthHelpers?.getStoredBootstrap?.() || {};
              window.TimedAuthHelpers?.storeBootstrap?.({ ...bootstrap, saved_tickers: Array.from(next) });
            } catch (_) {}
            return next;
          });
          try {
            await fetch(`${API_BASE}/timed/saved/toggle`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ ticker: T }),
            });
          } catch (_) {}
        }, []);
        return { saved, toggle };
      }

      // ── useSparklineCache — required by InvestorCard (in investor-panel.js)
      //    which reads window._dsEnsureSparkline. Without this, sparklines
      //    on the Investor cards never load because no other code path
      //    sets up the cache on this standalone page. Mirrors the same
      //    hook used by /today.html + /active-trader.html.
      function useSparklineCache() {
        const [cache, setCache] = useState({});
        const fetchSpark = useCallback(async (sym) => {
          try {
            const r = await fetch(`${API_BASE}/timed/candles?ticker=${encodeURIComponent(sym)}&tf=60&limit=24`, { cache: "no-store" });
            if (!r.ok) return null;
            const j = await r.json();
            const candles = Array.isArray(j?.candles) ? j.candles : [];
            return candles.map(c => Number(c?.c ?? c?.close)).filter(Number.isFinite);
          } catch (_) { return null; }
        }, []);
        const ensure = useCallback((sym) => {
          if (!sym) return null;
          const upper = String(sym).toUpperCase();
          if (cache[upper]) return cache[upper];
          if (cache[upper] === undefined) {
            setCache(prev => ({ ...prev, [upper]: null }));
            fetchSpark(upper).then(arr => {
              if (arr && arr.length >= 2) setCache(prev => ({ ...prev, [upper]: arr }));
            });
          }
          return null;
        }, [cache, fetchSpark]);
        useEffect(() => {
          window._dsEnsureSparkline = ensure;
          window._dsSparklineCache = cache;
        }, [ensure, cache]);
        return { cache, ensure };
      }

      // ── InvBubbleMap — renders the shared BubbleChart filtered to
      //    tickers the Investor panel actually surfaces. Now respects
      //    the page-level search + filter chips (All / Actionable /
      //    Saved) so the bubble plot scope matches what the cards
      //    below show. User feedback: "The Search and Filters should
      //    apply to the Bubble Map as well."
      function InvBubbleMap({ data, scores, onSelectTicker, searchQuery, filterGroup, savedTickers }) {
        const SharedChart = window.TimedBubbleChart?.BubbleChart || null;
        const getRankedTickers = window.TimedBubbleChart?.getRankedTickers || null;
        const [hovered, setHovered] = useState(null);

        // Build a stage map from /timed/investor/scores. The endpoint
        // returns { tickers: [{ ticker, stage, ... }] } so we hash by
        // symbol → stage for fast lookup when applying the
        // Actionable filter. 2026-06-01 — also captures the pre-
        // computed `simEligible` flag so the Sim-eligible bubble
        // filter can use a single lookup (avoiding the need to
        // hydrate full per-ticker structure from `data`).
        const scoreBySym = useMemo(() => {
          const m = new Map();
          const list = Array.isArray(scores?.tickers)
            ? scores.tickers
            : Array.isArray(scores)
            ? scores
            : [];
          for (const row of list) {
            const sym = String(row?.ticker || "").toUpperCase();
            if (!sym) continue;
            m.set(sym, row);
          }
          return m;
        }, [scores]);
        const stageBySym = useMemo(() => {
          const m = new Map();
          for (const [sym, row] of scoreBySym.entries()) {
            const stage = String(row?.stage || row?.investor_stage || "").toLowerCase();
            if (stage) m.set(sym, stage);
          }
          return m;
        }, [scores]);

        const visible = useMemo(() => {
          if (!data) return [];
          const q = String(searchQuery || "").trim().toUpperCase();
          const filter = String(filterGroup || "").toUpperCase();
          const arr = Object.entries(data)
            .map(([k, v]) => (v && v.ticker ? v : { ticker: String(k).toUpperCase(), ...(v || {}) }))
            .filter((t) => {
              const sym = String(t?.ticker || "").toUpperCase();
              // Search filter — substring match on symbol (mirrors
              // InvestorPanel's behavior at line 694 of investor-panel.js).
              if (q && !sym.includes(q)) return false;
              // Saved filter — same as the panel.
              if (filter === "SAVED") {
                if (!savedTickers || savedTickers.size === 0) return false;
                if (!savedTickers.has(sym)) return false;
              }
              // Actionable filter — Accumulate or Reduce stage from
              // /timed/investor/scores. Matches the panel's
              // INVESTOR_ACTIONABLE filter exactly.
              if (filter === "INVESTOR_ACTIONABLE") {
                const stage = stageBySym.get(sym) || "";
                if (stage !== "accumulate" && stage !== "reduce") return false;
              }
              // 2026-06-01 — Sim-eligible: same Accumulate / Reduce
              // gate as Actionable, AND the D/W/M SuperTrend alignment
              // the simulator enforces in worker/index.js:36692-36698.
              // Required: Monthly bullish AND ≥2 of (D, W, M) bullish.
              //
              // The scoring cron pre-computes the `simEligible` boolean
              // on each /timed/investor/scores row, so we prefer that.
              // Fall back to recomputing from `data` structural fields
              // for tickers that exist in the universe payload but not
              // in scores yet (rare; off-cycle adds).
              if (filter === "SIM_ELIGIBLE") {
                const stage = stageBySym.get(sym) || "";
                if (stage !== "accumulate" && stage !== "reduce") return false;
                const scoreRow = scoreBySym.get(sym);
                if (scoreRow && typeof scoreRow.simEligible === "boolean") {
                  if (!scoreRow.simEligible) return false;
                } else {
                  const dStBull = t?.tf_tech?.D?.stDir === -1;
                  const wStBull = t?.tf_tech?.W?.stDir === -1;
                  const mStBull = t?.monthly_bundle?.supertrend_dir === -1;
                  if (!mStBull) return false;
                  const bullCount = (dStBull ? 1 : 0) + (wStBull ? 1 : 0) + (mStBull ? 1 : 0);
                  if (bullCount < 2) return false;
                }
              }
              // Default: keep tickers with an investor_stage OR a
              // non-zero scoring signal so the chart has context.
              const stage = String(t?.investor_stage || stageBySym.get(sym) || "").toLowerCase();
              if (stage && stage !== "null") return true;
              return Number(t?.htf_score) !== 0 || Number(t?.ltf_score) !== 0;
            });
          return arr.slice(0, 250);
        }, [data, scores, searchQuery, filterGroup, savedTickers, stageBySym, scoreBySym]);

        const rankedTickers = useMemo(() => {
          if (!getRankedTickers || !data) return [];
          try { return getRankedTickers(data) || []; } catch { return []; }
        }, [data]);
        const rankedTickerPositions = useMemo(() => {
          const m = new Map();
          rankedTickers.forEach((t, idx) => { if (t?.ticker) m.set(t.ticker, idx + 1); });
          return m;
        }, [rankedTickers]);

        if (!SharedChart || visible.length === 0) return null;

        return h("section", { className: "tt-row inv-bubble-row" },
          h("div", { className: "inv-bubble-head" },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("h2", { className: "tt-sec-h2" }, "Where the long-horizon universe sits on momentum \u00d7 trend"),
              h("p", { className: "tt-sec-sub" }, `${visible.length} tickers`),
            ),
            h("div", { className: "inv-bubble-legend" },
              h("span", null, h("span", { className: "bdot", style: { background: "#22c55e" } }), "Bull aligned"),
              h("span", null, h("span", { className: "bdot", style: { background: "#f5c25c" } }), "Pullback"),
              h("span", null, h("span", { className: "bdot", style: { background: "#f43f5e" } }), "Bear aligned"),
            ),
          ),
          h("div", { className: "tt-card inv-bubble-card" },
            h("div", { className: "inv-bubble-stage" },
              h(SharedChart, {
                tickers: visible,
                allData: data,
                rankedTickers,
                rankedTickerPositions,
                hoveredTicker: hovered,
                onHover: setHovered,
                onBubbleClick: (sym) => {
                  if (typeof onSelectTicker === "function") onSelectTicker(sym);
                  else window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`;
                },
                onBackgroundClick: () => {},
                selectedTicker: null,
                selectedTrail: null,
                isTimeTravelActive: false,
                highlightTrailPoint: null,
                thesisMode: false,
                forwardReturns: null,
                activeInsightTickers: null,
                layoutMode: "score",
              }),
            ),
          ),
        );
      }

      // ── AccountStrip — Investor account snapshot at the top of
      //    the page (Account · Open P&L · Realized · Entries · Exits).
      //    Mirrors the AT strip but pulls /timed/account-summary +
      //    /timed/ledger/summary with ?mode=investor.
      function AccountStrip() {
        const [acc, setAcc] = useState(null);
        const [summary, setSummary] = useState(null);
        const [err, setErr] = useState(false);
        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const [a, s] = await Promise.all([
                fetch(`${API_BASE}/timed/account-summary?mode=investor`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
                fetch(`${API_BASE}/timed/ledger/summary?mode=investor`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
              ]);
              if (!alive) return;
              if (a?.ok) setAcc(a);
              if (s?.ok) setSummary(s);
              if (!a?.ok && !s?.ok) setErr(true);
            } catch (_) { if (alive) setErr(true); }
          })();
          return () => { alive = false; };
        }, []);
        if (err) return null;
        const fmtUsd = (n) => {
          if (!Number.isFinite(n)) return "—";
          const sign = n < 0 ? "-" : "";
          const abs = Math.abs(n);
          if (abs >= 1000) return `${sign}$${(abs / 1000).toFixed(abs >= 10000 ? 1 : 2)}K`;
          return `${sign}$${abs.toFixed(0)}`;
        };
        const fmtUsdSigned = (n) => {
          if (!Number.isFinite(n)) return "—";
          const sign = n >= 0 ? "+" : "-";
          return `${sign}${fmtUsd(Math.abs(n))}`;
        };
        const accountValue = Number(acc?.accountValue);
        const unrealized = Number(acc?.unrealized);
        const totalRealized = Number(acc?.totalRealized);
        const totals = summary?.totals || {};
        const entries = Number(totals.totalTrades);
        const exits = Number(totals.closedTrades);
        const winRate = Number(totals.winRate);

        return h("section", { className: "inv-account-strip" },
          h("div", { className: "inv-account-strip__head" },
            h("div", { className: "inv-account-strip__label" }, "Investor account"),
            h("a", { href: "/portfolio.html", className: "inv-account-strip__link" }, "View portfolio →"),
          ),
          h("div", { className: "inv-account-strip__grid" },
            h("div", { className: "inv-account-strip__tile" },
              h("div", { className: "inv-account-strip__l" }, "Account"),
              h("div", { className: "inv-account-strip__v" }, fmtUsd(accountValue)),
            ),
            h("div", { className: "inv-account-strip__tile" },
              h("div", { className: "inv-account-strip__l" }, "Open P&L"),
              h("div", { className: `inv-account-strip__v ${unrealized >= 0 ? "up" : "dn"}` }, fmtUsdSigned(unrealized)),
            ),
            h("div", { className: "inv-account-strip__tile" },
              h("div", { className: "inv-account-strip__l" }, "Realized"),
              h("div", { className: `inv-account-strip__v ${totalRealized >= 0 ? "up" : "dn"}` }, fmtUsdSigned(totalRealized)),
            ),
            h("div", { className: "inv-account-strip__tile" },
              h("div", { className: "inv-account-strip__l" }, "Entries"),
              h("div", { className: "inv-account-strip__v" }, Number.isFinite(entries) ? String(entries) : "—"),
            ),
            h("div", { className: "inv-account-strip__tile" },
              h("div", { className: "inv-account-strip__l" }, "Exits"),
              h("div", { className: "inv-account-strip__v" },
                Number.isFinite(exits) ? String(exits) : "—",
                Number.isFinite(winRate) && h("span", { className: "inv-account-strip__sub" },
                  ` · ${winRate.toFixed(0)}% WR`,
                ),
              ),
            ),
          ),
        );
      }

      // ── InvestorApp ─────────────────────────────────────────────
      function InvestorApp() {
        const { saved, toggle: toggleSaved } = useSavedTickers();
        useSparklineCache(); // installs window._dsEnsureSparkline for InvestorCard
        const [panelMounted, setPanelMounted] = useState(typeof window.InvestorPanel === "function");

        // window.InvestorPanel may load asynchronously (investor-panel.js script tag).
        // Poll briefly for it; once available, mount the component.
        useEffect(() => {
          if (panelMounted) return;
          const id = setInterval(() => {
            if (typeof window.InvestorPanel === "function") {
              setPanelMounted(true);
              clearInterval(id);
            }
          }, 100);
          return () => clearInterval(id);
        }, [panelMounted]);

        // Loaded ticker data — InvestorPanel can also hand it back via prop but
        // we pull /timed/all once here so the right-rail overlay has the
        // full universe context (allLoadedData) when a card is clicked.
        const [data, setData] = useState(null);
        // Investor scores (with stage) so the bubble map can apply the
        // same Actionable filter the cards do.
        const [investorScores, setInvestorScores] = useState(null);

        // 2026-05-26 — Auto-refresh prices (30s) + scoring data (90s) so the
        // Investor cards stay live without manual reloads. See
        // react-app/tt-live-data.js for merge semantics.
        const _liveHooks = window.TimedLiveData;
        if (_liveHooks?.usePriceFeed) _liveHooks.usePriceFeed(data, setData);
        if (_liveHooks?.useTickerRefresh) _liveHooks.useTickerRefresh(data, setData);

        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              // 2026-05-29 — also fetch /timed/investor/positions and
              // reconcile any owned positions that fell out of /scores.
              //
              // Two failure modes the old code couldn't see:
              //   1) Ticker not in SECTOR_MAP (e.g. DBA, agricultural
              //      ETF) — gets dropped from compute's allTickerData
              //      loop and never lands in /scores at all.
              //   2) Position opened by auto-rebalance AFTER the most
              //      recent compute (e.g. TWLO tonight) — exists in
              //      D1 investor_positions but the cached /scores
              //      payload still shows position.owned=false.
              //
              // Either way the Kanban undercounted. We now merge a
              // synthetic "owned position" entry into scoresRes.tickers
              // for any open position not already showing as owned.
              // Stage defaults to core_hold if the position is healthy
              // (unrealized >= -10%) or watch otherwise — matches the
              // server-side classifyInvestorStage default for held
              // positions when full scoring isn't available.
              const [allRes, scoresRes, positionsRes] = await Promise.all([
                fetch(`${API_BASE}/timed/all`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
                fetch(`${API_BASE}/timed/investor/scores`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
                fetch(`${API_BASE}/timed/investor/positions`, { cache: "no-store", credentials: "include" }).then((r) => r.ok ? r.json() : null).catch(() => null),
              ]);
              if (!alive) return;
              if (allRes?.ok) setData(allRes.data || {});
              if (scoresRes?.ok) {
                const tickers = Array.isArray(scoresRes.tickers) ? [...scoresRes.tickers] : [];
                const seenOwned = new Set(
                  tickers
                    .filter(t => (t?.position || {}).owned)
                    .map(t => String(t?.ticker || "").toUpperCase())
                );
                const positions = (positionsRes?.ok && Array.isArray(positionsRes.positions))
                  ? positionsRes.positions : [];
                for (const p of positions) {
                  const sym = String(p?.ticker || "").toUpperCase();
                  if (!sym) continue;
                  if (String(p?.status || "").toUpperCase() !== "OPEN") continue;
                  if (!(Number(p?.total_shares) > 0)) continue;
                  if (seenOwned.has(sym)) continue;
                  // Either the ticker is in tickers but owned=false, OR
                  // it's not in tickers at all. Find it and upgrade, or
                  // synthesize a new entry.
                  const existingIdx = tickers.findIndex(t => String(t?.ticker || "").toUpperCase() === sym);
                  const mark = Number(p?.currentPrice) || Number(p?.price) || 0;
                  const avgEntry = Number(p?.avg_entry) || 0;
                  const unrealizedPct = (mark > 0 && avgEntry > 0)
                    ? ((mark - avgEntry) / avgEntry) * 100 : null;
                  const defaultStage = (unrealizedPct == null || unrealizedPct >= -10)
                    ? "core_hold" : "watch";
                  const posBlock = {
                    owned: true,
                    shares: Number(p?.total_shares) || 0,
                    avg_entry: avgEntry,
                    cost_basis: Number(p?.cost_basis) || 0,
                    first_entry_ts: Number(p?.first_entry_ts) || null,
                    unrealized_pct: unrealizedPct,
                  };
                  if (existingIdx >= 0) {
                    tickers[existingIdx] = {
                      ...tickers[existingIdx],
                      position: posBlock,
                      // Surface the position-aware stage so the Kanban
                      // doesn't show this in research_on_watch.
                      stage: tickers[existingIdx].stage === "research_on_watch"
                        ? defaultStage : tickers[existingIdx].stage,
                      _reconciled: true,
                    };
                  } else {
                    tickers.push({
                      ticker: sym,
                      stage: defaultStage,
                      stageReason: "Open position not in scored universe — reconciled from /timed/investor/positions",
                      score: null,
                      position: posBlock,
                      sector: p?.sector || null,
                      _reconciled_synthetic: true,
                    });
                  }
                }
                setInvestorScores({ ...scoresRes, tickers });
              }
            } catch (_) {}
          })();
          return () => { alive = false; };
        }, []);

        // Right rail overlay state — card clicks pop the same ticker
        // detail panel /index-react.html uses (no full page nav).
        const [railTicker, setRailTicker] = useState(null);
        const [railInitialTab, setRailInitialTab] = useState(null);
        const [highlightTradeId, setHighlightTradeId] = useState(null);
        const [openAutopsyForTrade, setOpenAutopsyForTrade] = useState(null);

        const railTickerObj = useMemo(() => {
          if (!railTicker) return null;
          const key = String(railTicker).toUpperCase();
          if (!data) return { ticker: key };
          const raw = data[key];
          if (!raw) return { ticker: key };
          return raw.ticker ? raw : { ticker: key, ...raw };
        }, [railTicker, data]);

        // V15 P0.7.181 — Poll for the rail Overlay component instead of
        // capturing it at first render. Before this fix, the page
        // briefly rendered with RailOverlay=null (rail scripts hadn't
        // finished loading) and the first card click fell through to
        // the legacy /index-react navigation. Polling reactively
        // mounts the rail in state so once it's available React
        // re-renders and card clicks open in-place immediately.
        const [RailOverlay, setRailOverlay] = useState(() => window.TimedRightRail?.Overlay || null);
        useEffect(() => {
          if (RailOverlay) return;
          const id = setInterval(() => {
            if (window.TimedRightRail?.Overlay) {
              setRailOverlay(() => window.TimedRightRail.Overlay);
              clearInterval(id);
            }
          }, 80);
          return () => clearInterval(id);
        }, [RailOverlay]);

        const onSelectTicker = useCallback((sym) => {
          if (!sym) return;
          // Always set state — even if RailOverlay is briefly null, the
          // poll above will mount it within ~80ms and the overlay will
          // render. Avoids the legacy-nav fall-through that caused the
          // "small delay after page loads" feedback.
          setRailTicker(String(sym).toUpperCase());
        }, []);
                const applyRailOpen = useCallback((detail) => {
          const p = typeof window.ttConsumeRailOpenForReact === "function"
            ? window.ttConsumeRailOpenForReact(detail)
            : null;
          const t = p?.ticker || String(detail?.ticker || "").toUpperCase();
          if (!t) return;
          setRailTicker(t);
          setRailInitialTab(p?.initialRailTab || detail?.initialRailTab || null);
          setHighlightTradeId(p?.highlightTradeId || detail?.tradeId || null);
          setOpenAutopsyForTrade(p?.openAutopsyForTrade || null);
        }, []);

        const onCloseRail = useCallback(() => {
          setRailTicker(null);
          setRailInitialTab(null);
          setHighlightTradeId(null);
          setOpenAutopsyForTrade(null);
          try { window.ttClearRailUrlParams?.(); } catch (_) {}
        }, []);

        useEffect(() => {
          if (!RailOverlay) return;
          const handler = (ev) => {
            applyRailOpen(ev?.detail);
            try { if (typeof window.ttGlobalSearchMarkHandled === "function") window.ttGlobalSearchMarkHandled(ev?.detail?.ticker); } catch (_) {}
          };
          window.addEventListener("tt-open-ticker", handler);
          applyRailOpen(typeof window.ttParseRailOpenDetail === "function" ? window.ttParseRailOpenDetail() : null);
          return () => window.removeEventListener("tt-open-ticker", handler);
        }, [RailOverlay, applyRailOpen]);


        // Search + filter — Investor mode now shows the entire universe
        // so a search bar narrows down to a specific ticker, and quick
        // filter chips toggle the "Actionable only" view (Accumulate +
        // Reduce) or the "Saved" set the user has starred.
        const [searchQuery, setSearchQuery] = useState("");
        const [filterGroup, setFilterGroup] = useState(null);

        // 2026-06-01 — Pre-compute filter-chip counts from the same
        // /timed/investor/scores payload the panel consumes, so the
        // chip labels always match what each filter would surface
        // BEFORE the operator clicks it. simEligible bucketing:
        //   true  → counted as eligible (gate passed)
        //   false → not counted (gate explicitly failed)
        //   null  → counted as unknown (cron hasn't repopulated since
        //           the field was added 2026-06-01; run /compute)
        const chipCounts = useMemo(() => {
          let actionable = 0, simEligible = 0, simUnknown = 0;
          const list = Array.isArray(investorScores?.tickers) ? investorScores.tickers : [];
          for (const row of list) {
            const stage = String(row?.stage || row?.investor_stage || "").toLowerCase();
            if (stage !== "accumulate" && stage !== "reduce") continue;
            actionable++;
            if (row?.simEligible === true) simEligible++;
            else if (row?.simEligible == null) simUnknown++;
          }
          return { actionable, simEligible, simUnknown };
        }, [investorScores]);

        return h(React.Fragment, null,
          !panelMounted && h("div", { className: "tt-loadbar", role: "progressbar", "aria-label": "Loading Investor" }),
          h("main", null,
            h("section", { className: "inv-hero" },
              h("div", null,
                h("div", { className: "label" }, "INVESTOR"),
                h("h1", null, "Long-horizon positions"),
                h("div", { className: "sub" },
                  "Multi-week + multi-month holds. The model recommends ",
                  h("strong", null, "Accumulate"), " when a Buy Zone aligns with positive trend strength, ",
                  h("strong", null, "Core Hold"), " for established winners, ",
                  h("strong", null, "Hold & Watch"), " for owned positions without an active signal, and ",
                  h("strong", null, "Reduce"), " when the thesis weakens. Click any card to deep-dive in the full chart + right rail.",
                ),
              ),
            ),
            // Search + filter row — narrows the panel below.
            h("section", { className: "tt-row inv-controls" },
              h("div", { className: "inv-search-wrap" },
                h("svg", {
                  width: 14, height: 14, viewBox: "0 0 24 24", fill: "none",
                  stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                  className: "inv-search-icon",
                },
                  h("circle", { cx: 11, cy: 11, r: 8 }),
                  h("line", { x1: 21, y1: 21, x2: 16.65, y2: 16.65 }),
                ),
                h("input", {
                  type: "text",
                  className: "inv-search",
                  placeholder: "Search ticker (e.g. NVDA, AAPL, GOOGL, MSFT)",
                  value: searchQuery,
                  onChange: (e) => setSearchQuery(e.target.value),
                  "aria-label": "Search Investor tickers",
                }),
                searchQuery && h("button", {
                  className: "inv-search-clear",
                  onClick: () => setSearchQuery(""),
                  "aria-label": "Clear search",
                  title: "Clear",
                }, "×"),
              ),
              h("div", { className: "inv-filter-chips" },
                h("button", {
                  className: "inv-chip" + (filterGroup === null ? " active" : ""),
                  onClick: () => setFilterGroup(null),
                }, "All"),
                h("button", {
                  className: "inv-chip" + (filterGroup === "INVESTOR_ACTIONABLE" ? " active" : ""),
                  onClick: () => setFilterGroup("INVESTOR_ACTIONABLE"),
                  title: "Tickers in Accumulate or Reduce — the model has an active recommendation",
                }, `Actionable${chipCounts.actionable > 0 ? ` (${chipCounts.actionable})` : ""}`),
                // 2026-06-01 — "Sim-eligible" narrows Actionable further to
                // the subset the Investor simulator would actually act on:
                // Monthly SuperTrend bullish AND ≥2/3 of (D, W, M) bullish
                // (matches worker/index.js:36692-36698 exactly). Chip
                // label format: "Sim-eligible (N+M?)" where N = strictly
                // eligible, M = unknown (cron hasn't repopulated yet).
                h("button", {
                  className: "inv-chip" + (filterGroup === "SIM_ELIGIBLE" ? " active" : ""),
                  onClick: () => setFilterGroup("SIM_ELIGIBLE"),
                  title: `Subset of Actionable the simulator would actually buy — Monthly SuperTrend bullish + ≥2 of (D, W, M) bullish${chipCounts.simUnknown > 0 ? `. ${chipCounts.simUnknown} ticker(s) have unknown SuperTrend state (run POST /timed/investor/compute to refresh)` : ""}`,
                }, `Sim-eligible${(chipCounts.simEligible + chipCounts.simUnknown) > 0 ? ` (${chipCounts.simEligible}${chipCounts.simUnknown > 0 ? `+${chipCounts.simUnknown}?` : ""})` : ""}`),
                h("button", {
                  className: "inv-chip" + (filterGroup === "SAVED" ? " active" : ""),
                  onClick: () => setFilterGroup("SAVED"),
                  title: "Your saved tickers (star icon on any card)",
                  disabled: !saved || saved.size === 0,
                }, `Saved${saved && saved.size > 0 ? ` (${saved.size})` : ""}`),
              ),
            ),
            h(AccountStrip, null),
            panelMounted
              ? h(window.InvestorPanel, {
                  apiBase: API_BASE,
                  onSelectTicker,
                  savedTickers: saved,
                  toggleSavedTicker: toggleSaved,
                  selectedTicker: null,
                  searchQuery,
                  filterGroup,
                  // 2026-06-01 — Pass `data` (from /timed/all) as
                  // tickerData so the Sim-eligible filter has structural
                  // fallback fields (tf_tech.D.stDir, tf_tech.W.stDir,
                  // monthly_bundle.supertrend_dir) when the scoring
                  // payload's simEligible is null (cron predates the
                  // 2026-06-01 field write). Without this the filter
                  // appeared to silently empty the lane.
                  tickerData: data,
                  // allowedTickerSet is optional — InvestorPanel falls
                  // back to its own fetch.
                })
              : h("div", null,
                  h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-text-dim)", marginBottom: 14 } },
                    "Loading investor lanes…",
                  ),
                  h("div", { style: { display: "flex", flexDirection: "column", gap: 12 } },
                    [0,1,2,3].map((i) =>
                      h("div", { key: i, style: { display: "flex", gap: 10 } },
                        [0,1,2,3].map((j) =>
                          h("div", { key: j, className: "sk sk-card", style: { width: 240 } }),
                        ),
                      ),
                    ),
                  ),
                ),
            // Bubble map of the investor universe — bottom of page so
            // the lane grid stays the focus, but users can still get a
            // momentum × trend overview at a glance. Respects the
            // search + filter chip state so the bubble plot scope
            // matches the cards above.
            data && h(InvBubbleMap, {
              data,
              scores: investorScores,
              searchQuery,
              filterGroup,
              savedTickers: saved,
              onSelectTicker,
            }),
          ),
          // Right rail slide-in (TickerDetailRightRail).
          RailOverlay && railTickerObj && h(RailOverlay, {
            ticker: railTickerObj,
            allLoadedData: data,
            onClose: onCloseRail,
            initialRailTab: railInitialTab,
            openAutopsyForTrade,
            highlightTradeId,
          }),
        );
      }

      // ── Mount with auth gate ───────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const app = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="pro">{(user) => <InvestorApp user={user} />}</AuthGate>
        : <InvestorApp />;
      ReactDOM.createRoot(document.getElementById("root")).render(app);
    </script>
