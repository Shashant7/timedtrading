                    <div className="space-y-2.5">
                      {Object.keys(variantData?.rule_snapshot?.env_flags || {}).sort().map(k => {
                        const base = variantData.rule_snapshot.env_flags[k];
                        const val = variantOverrides[k] !== undefined ? variantOverrides[k] : base;
                        const isBool = val === "true" || val === "false" || typeof base === "boolean";
                        const isNum = /^-?\d+(\.\d+)?$/.test(String(val)) || (typeof base === "number");
                        return (
                          <div key={k} className="flex items-center gap-3">
                            <label className="text-slate-400 shrink-0 w-[200px] truncate" title={k}>{k}</label>
                            {isBool ? (
                              <input
                                type="checkbox"
                                checked={val === "true" || val === true}
                                onChange={e => setVariantOverrides(prev => ({ ...prev, [k]: e.target.checked ? "true" : "false" }))}
                                className="rounded bg-slate-700 border-slate-600"
                              />
                            ) : isNum ? (
                              <input
                                type="number"
                                value={val}
                                onChange={e => setVariantOverrides(prev => ({ ...prev, [k]: e.target.value }))}
                                className="w-20 px-2 py-1 rounded bg-slate-800 border border-white/10 text-slate-200 text-[11px]"
                              />
                            ) : (
                              <input
                                type="text"
                                value={val}
                                onChange={e => setVariantOverrides(prev => ({ ...prev, [k]: e.target.value }))}
                                className="flex-1 min-w-[80px] max-w-[180px] px-2 py-1 rounded bg-slate-800 border border-white/10 text-slate-200 text-[11px]"
                              />
                            )}
                            {String(val) !== String(base) && (
                              <span className="text-amber-400 text-[10px]">modified</span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                  {variantData?.rule_snapshot?.env_flags && liveConfigData?.env_flags && (() => {
                    const v = variantOverrides && Object.keys(variantOverrides).length ? variantOverrides : (variantData.rule_snapshot.env_flags || {});
                    const l = liveConfigData.env_flags || {};
                    const allKeys = [...new Set([...Object.keys(v), ...Object.keys(l)])].sort();
                    const diffs = allKeys.filter(k => String(v[k]) !== String(l[k]));
                    if (diffs.length === 0) return (
                      <div className="bg-emerald-500/10 border border-emerald-500/30 rounded-lg p-3">
                        <div className="text-emerald-400 font-medium text-[11px] uppercase tracking-wider mb-1">Config vs Live</div>
                        <p className="text-slate-300 text-[12px]">No differences — variant matches live baseline.</p>
                      </div>
                    );
                    return (
                      <div>
                        <div className="text-amber-400 font-medium text-[11px] uppercase tracking-wider mb-1">Config vs Live (deltas)</div>
                        <div className="bg-slate-900/50 rounded p-3 space-y-1.5 font-mono text-[11px]">
                          {diffs.map(k => (
                            <div key={k} className="flex flex-wrap items-center gap-2">
                              <span className="text-slate-500 shrink-0">{k}:</span>
                              <span className="text-rose-400">{JSON.stringify(l[k])}</span>
                              <span className="text-slate-500">→</span>
                              <span className="text-emerald-400">{JSON.stringify(v[k])}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    );
                  })()}
                  <div>
                    <div className="text-slate-300 font-medium mb-1">Launch fallback</div>
                    <div className="relative">
                      <pre className="bg-slate-900/50 p-3 pr-20 rounded font-mono text-slate-300 overflow-x-auto text-[11px] whitespace-pre-wrap break-all">
                        {(() => {
                          const start = variantData?.start_date || "2025-07-01";
                          const end = variantData?.end_date || "2025-07-31";
                          const base = `./scripts/full-backtest.sh --trader-only --low-write --keep-open-at-end ${start} ${end} 15 --label=variant-from-baseline`;
                          const overrides = Object.entries(variantOverrides || {}).filter(([, v]) => v != null && String(v).trim() !== "");
                          const envPart = overrides.length ? " \\\n  " + overrides.map(([k, v]) => `--env-override ${k}=${v}`).join(" \\\n  ") : "";
                          return base + envPart;
                        })()}
                      </pre>
                      <button
                        className="absolute top-2 right-2 px-2 py-1 text-[10px] bg-slate-700 hover:bg-slate-600 text-slate-300 rounded border border-white/10"
                        onClick={() => {
                          const start = variantData?.start_date || "2025-07-01";
                          const end = variantData?.end_date || "2025-07-31";
                          const base = `./scripts/full-backtest.sh --trader-only --low-write --keep-open-at-end ${start} ${end} 15 --label=variant-from-baseline`;
                          const overrides = Object.entries(variantOverrides || {}).filter(([, v]) => v != null && String(v).trim() !== "");
                          const envPart = overrides.length ? " " + overrides.map(([k, v]) => `--env-override ${k}=${v}`).join(" ") : "";
                          navigator.clipboard.writeText(base + envPart);
                          setMessage("Command copied to clipboard");
                          setTimeout(() => setMessage(null), 2000);
                        }}
                      >
                        Copy
                      </button>
                    </div>
                  </div>
                  {variantData?.rule_snapshot_meta && (
                    <div className="text-slate-500">Snapshot: {variantData.rule_snapshot_meta.ready ? "Ready" : "—"} · {variantData.rule_snapshot_meta.source || "—"}</div>
                  )}
                </>
              )}
            </div>
          </div>
        </div>
      )}

    </div>
  );
}

function MoveDiscoveryTab({ report, loading, error }) {

    .map(([key, count]) => ({ key, count: Number(count) || 0 }))
    .filter(item => item.count > 0)
    .sort((a, b) => b.count - a.count);
  const coverageEntries = Object.entries(diagnosis?.coverage_breakdown || {})
    .map(([key, count]) => ({ key, count: Number(count) || 0 }))
    .filter(item => item.count > 0)
    .sort((a, b) => b.count - a.count);
  const totalDiagnosed = Number(diagnosis?.total_diagnosed) || breakdownEntries.reduce((sum, item) => sum + item.count, 0);
  const totalNoTrail = Number(diagnosis?.breakdown?.no_trail_data) || 0;
  const shouldHaveEntered = Array.isArray(diagnosis?.should_have_entered) ? diagnosis.should_have_entered : [];
  const filteredMoves = useMemo(() => {
    let rows = Array.isArray(report?.moves) ? report.moves : [];
    if (captureFilter !== "ALL") rows = rows.filter((move) => move.capture === captureFilter);
    if (search.trim()) {
      const needle = search.trim().toUpperCase();
      rows = rows.filter((move) => String(move.ticker || "").toUpperCase().includes(needle));
    }
    return rows.slice().sort((a, b) => Number(b.move_atr || 0) - Number(a.move_atr || 0));
  }, [report, captureFilter, search]);

  if (loading) {
    return (
      <div className="flex items-center justify-center py-20">
        <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />

      <div className="card p-4 text-sm text-slate-400">
        No move discovery report is loaded yet. Run <code className="text-slate-200">USE_D1=1 node scripts/discover-moves.js --upload</code> and <code className="text-slate-200">USE_D1=1 node scripts/diagnose-missed-moves.js --upload</code>.
      </div>

          {report?.generated ? `Generated ${new Date(report.generated).toLocaleString()}` : "No generation time"}

      </div>

      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        <div className="card p-4"><div className="text-[11px] uppercase tracking-[0.12em] text-slate-500">Total Moves</div><div className="mt-2 text-2xl font-semibold text-white">{summary.total_moves || 0}</div><div className="mt-1 text-xs text-slate-400">{summary.unique_tickers || 0} tickers</div></div>
        <div className="card p-4"><div className="text-[11px] uppercase tracking-[0.12em] text-slate-500">Capture Rate</div><div className="mt-2 text-2xl font-semibold text-emerald-400">{summary.capture_rate || 0}%</div><div className="mt-1 text-xs text-slate-400">{summary.full_capture || 0} full + {summary.partial_capture || 0} partial</div></div>
        <div className="card p-4"><div className="text-[11px] uppercase tracking-[0.12em] text-slate-500">Missed</div><div className="mt-2 text-2xl font-semibold text-rose-300">{summary.missed_rate || 0}%</div><div className="mt-1 text-xs text-slate-400">{summary.missed || 0} moves</div></div>
        <div className="card p-4"><div className="text-[11px] uppercase tracking-[0.12em] text-slate-500">Churned</div><div className="mt-2 text-2xl font-semibold text-amber-300">{summary.churn_rate || 0}%</div><div className="mt-1 text-xs text-slate-400">{summary.churned || 0} moves</div></div>
        <div className="card p-4"><div className="text-[11px] uppercase tracking-[0.12em] text-slate-500">Diagnosis Coverage</div><div className="mt-2 text-2xl font-semibold text-sky-300">{totalDiagnosed || 0}</div><div className="mt-1 text-xs text-slate-400">{diagnosis?.limit_applied ? `Limited to top ${diagnosis.limit_applied}` : "Full diagnosed set"}</div></div>

// TRADE GRADING TAB (admin-only)
// ═══════════════════════════════════════════════════════════════
const TIER_ORDER = ["Prime", "Confirmed", "Speculative"];
const DEFAULT_TIER_RISK = { Prime: 0.010, Confirmed: 0.005, Speculative: 0.0025 };
const TIER_COLORS = { Prime: "#f59e0b", Confirmed: "#10b981", Speculative: "#3b82f6" };
const TIER_DESCRIPTIONS = { Prime: "Top conviction — strongest setups", Confirmed: "Solid setups — good alignment", Speculative: "Acceptable — lower conviction" };

function TradeGradingTab() {
  const [riskMap, setRiskMap] = useState({ ...DEFAULT_TIER_RISK });
  const [origMap, setOrigMap] = useState({ ...DEFAULT_TIER_RISK });
  const [stats, setStats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [msg, setMsg] = useState(null);

  useEffect(() => {
    (async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/admin/grade-config`);
        const data = await res.json();
        if (data.ok) {
          const merged = { ...DEFAULT_TIER_RISK, ...(data.tierRiskMap || {}) };
          setRiskMap(merged);
          setOrigMap(merged);
          if (Array.isArray(data.gradeStats)) setStats(data.gradeStats);
        }
      } catch {}
      setLoading(false);
    })();
  }, []);

  const hasChanges = TIER_ORDER.some(t => Number(riskMap[t]) !== Number(origMap[t]));

  const validate = () => {
    for (const t of TIER_ORDER) {
      const v = Number(riskMap[t]);
      if (!Number.isFinite(v) || v < 0.001 || v > 0.05) return `${t}: must be 0.1%–5.0%`;
    }
    if (Number(riskMap.Prime) < Number(riskMap.Confirmed)) return "Prime must be >= Confirmed";
    if (Number(riskMap.Confirmed) < Number(riskMap.Speculative)) return "Confirmed must be >= Speculative";
    return null;
  };

  const handleSave = async () => {
    const err = validate();
    if (err) { setMsg({ type: "error", text: err }); return; }
    setSaving(true); setMsg(null);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/model-config`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ updates: [{ key: "tier_risk_map", value: JSON.stringify(riskMap), description: "Trade tiers: tier-to-risk% mapping" }] }),
      });
      const data = await res.json();
      if (data.ok) { setOrigMap({ ...riskMap }); setMsg({ type: "ok", text: "Saved successfully" }); }
      else setMsg({ type: "error", text: data.error || "Save failed" });
    } catch (e) { setMsg({ type: "error", text: String(e) }); }
    setSaving(false);
  };

  if (loading) return <div className="flex justify-center py-12"><div className="w-6 h-6 border-2 border-white/20 border-t-amber-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} /></div>;

  return (
    <div className="space-y-6">
      <div className="card p-5">
        <h3 className="text-sm font-semibold text-white mb-1">TT Setup Tiers — Risk Configuration</h3>
        <p className="text-xs text-slate-400 mb-4">Each tier risks a percentage of portfolio value. Position size = (Account × Risk%) / |Entry - SL|. Scales to any account size.</p>
        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
          {TIER_ORDER.map(tier => (
            <div key={tier} className="rounded-xl border p-4" style={{ borderColor: TIER_COLORS[tier] + "40", background: TIER_COLORS[tier] + "08" }}>
              <div className="flex items-center gap-2 mb-1">
                <span className="px-2.5 py-1 rounded-lg text-xs font-bold" style={{ background: TIER_COLORS[tier] + "30", color: TIER_COLORS[tier], border: `1px solid ${TIER_COLORS[tier]}50` }}>TT {tier}</span>
              </div>
              <div className="text-[10px] text-slate-500 mb-3">{TIER_DESCRIPTIONS[tier]}</div>
              <div className="relative">
                <input
                  type="number"
                  min="0.001" max="0.05" step="0.0005"
                  value={riskMap[tier]}
                  onChange={(e) => setRiskMap(prev => ({ ...prev, [tier]: Number(e.target.value) || 0 }))}
                  className="w-full px-3 py-2 bg-white/[0.04] border border-white/[0.10] rounded-lg text-white text-sm font-medium focus:outline-none"
                  style={{ focusBorderColor: TIER_COLORS[tier] }}
                />
                <span className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 text-xs">({(Number(riskMap[tier]) * 100).toFixed(2)}%)</span>
              </div>
              <div className="text-[10px] text-slate-500 mt-2">On $100K: <span className="text-white font-medium">${(100000 * Number(riskMap[tier])).toFixed(0)}</span> risk per trade</div>
              <div className="text-[10px] text-slate-500">On $25K: <span className="text-white font-medium">${(25000 * Number(riskMap[tier])).toFixed(0)}</span> risk per trade</div>
            </div>
          ))}
        </div>
        <div className="flex items-center gap-3 mt-4">
          <button
            onClick={handleSave}
            disabled={!hasChanges || saving}
            className={`px-4 py-2 rounded-lg text-xs font-semibold transition-colors ${hasChanges ? "bg-amber-500/20 text-amber-300 border border-amber-500/40 hover:bg-amber-500/30" : "bg-white/[0.04] text-slate-500 border border-white/[0.06] cursor-not-allowed"}`}
          >
            {saving ? "Saving..." : "Save Changes"}
          </button>
          {hasChanges && (
            <button onClick={() => setRiskMap({ ...origMap })} className="px-3 py-2 rounded-lg text-xs text-slate-400 hover:text-white border border-white/[0.06] hover:border-white/[0.12] transition-colors">Reset</button>
          )}
          {msg && (
            <span className={`text-xs font-medium ${msg.type === "ok" ? "text-emerald-400" : "text-rose-400"}`}>{msg.text}</span>
          )}
        </div>
      </div>

      {stats.length > 0 && (
        <div className="card p-5">
          <h3 className="text-sm font-semibold text-white mb-3">Tier Distribution (Closed Trades)</h3>
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead><tr className="text-slate-500 border-b border-white/[0.05]">
                <th className="text-left py-1.5 font-medium">Tier</th>
                <th className="text-right px-3 font-medium">Trades</th>
                <th className="text-right px-3 font-medium">Wins</th>
                <th className="text-right px-3 font-medium">Losses</th>
                <th className="text-right px-3 font-medium">Win Rate</th>
                <th className="text-right px-3 font-medium">Avg P&L</th>
                <th className="text-right pl-3 font-medium">Avg P&L %</th>
              </tr></thead>
              <tbody>
                {stats.map(s => {
                  const wr = s.total > 0 ? ((s.wins / s.total) * 100) : 0;
                  const wrCls = wr >= 60 ? "text-emerald-400" : wr >= 45 ? "text-amber-400" : "text-rose-400";
                  const color = TIER_COLORS[s.setup_grade] || "#6b7280";
                  return (
                    <tr key={s.setup_grade} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                      <td className="py-1.5"><span className="px-1.5 py-0.5 rounded text-[10px] font-bold" style={{ background: color + "30", color }}>{s.setup_grade}</span></td>
                      <td className="text-right px-3 text-slate-300">{s.total}</td>
                      <td className="text-right px-3 text-emerald-400">{s.wins}</td>
                      <td className="text-right px-3 text-rose-400">{s.losses}</td>
                      <td className={`text-right px-3 font-medium ${wrCls}`}>{wr.toFixed(1)}%</td>
                      <td className={`text-right px-3 ${(s.avg_pnl || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>${(s.avg_pnl || 0).toFixed(2)}</td>
                      <td className={`text-right pl-3 ${(s.avg_pnl_pct || 0) >= 0 ? "text-emerald-400" : "text-rose-400"}`}>{(s.avg_pnl_pct || 0).toFixed(2)}%</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {stats.length === 0 && (
        <div className="card p-5 text-center">
          <p className="text-xs text-slate-500">No graded trades yet. Grade statistics will appear here once trades are taken with the grading system active.</p>
        </div>
      )}
    </div>
  );
}

// AnalysisAutomationBar — P2: Run Analysis from page + apply
// proposed calibration deltas without dropping to a shell.
// ═══════════════════════════════════════════════════════════════
function AnalysisAutomationBar({ isAdmin, snapshot, proposals, proposalsLoading, proposalApplying, proposalApplied, onRunAnalysis, running, onLoadProposals, onApplyProposal }) {
  const runId = snapshot?.run_id;
  return (
    <div className="space-y-4">
      <div className="si-banner">
        <div style={{flex:1, minWidth:200}}>
          <div className="si-card__eyebrow">Analysis automation</div>
          <div className="si-card__title">Refresh insights without leaving the page</div>
          <div className="si-card__subtitle">
            Auto-refresh every 60 s while a run is active. Click <span style={{color:"var(--ds-accent)"}}>Run Analysis</span> to re-run the calibration pipeline server-side, or <span style={{color:"var(--ds-accent)"}}>Propose Calibration</span> to compute rule-based DA flag deltas from the active run.
          </div>
        </div>
        {isAdmin && (
          <>
            <button className="si-action si-action--primary" onClick={onRunAnalysis} disabled={running}>
              {running ? "Running…" : "Run Analysis"}
            </button>
            <button className="si-action si-action--primary" onClick={onLoadProposals} disabled={proposalsLoading}>
              {proposalsLoading ? "Computing…" : "Propose Calibration"}
            </button>
          </>
        )}
      </div>

      {proposals && (
        <div className="si-card">
          <div className="si-card__head">
            <div>
              <div className="si-card__eyebrow">Proposed calibration</div>
              <div className="si-card__title">{proposals.proposals?.length || 0} suggestion{(proposals.proposals?.length || 0) === 1 ? "" : "s"}</div>
              <div className="si-card__subtitle">Computed from {proposals.sample?.closed} closed trades on <span style={{fontFamily:"var(--tt-font-mono)", color:"var(--ds-text-body)"}}>{proposals.run_id}</span>. Nothing is applied until you click Apply per row.</div>
            </div>
            <button className="si-action" onClick={onLoadProposals} disabled={proposalsLoading}>
              {proposalsLoading ? "Recomputing…" : "Re-compute"}
            </button>
          </div>
          {(proposals.proposals?.length || 0) === 0 ? (
            <div style={{color:"var(--ds-text-muted)", fontSize:"var(--ds-fs-body)"}}>No actionable proposals right now — the engine is performing within thresholds.</div>
          ) : (
            <div className="space-y-2">
              {proposals.proposals.map((p) => {
                const applied = proposalApplied[p.id];
                const applying = !!proposalApplying[p.id];
                const cls = p.impact === "high" ? "si-proposal--high" : p.impact === "medium" ? "si-proposal--medium" : "si-proposal--low";
                return (
                  <div key={p.id} className={`si-proposal ${cls}`}>
                    <div style={{flex:1, minWidth:0}}>
                      <div className="si-proposal__title">{p.title}</div>
                      <div className="si-proposal__detail">{p.detail}</div>
                      <div className="si-proposal__config">{p.target} · {p.config?.key} = {String(p.config?.value)}</div>
                    </div>
                    {applied === "applied" ? (
                      <span className="si-pill si-pill--ok"><span className="si-pill__dot" />Applied</span>
                    ) : applied ? (
                      <span className="si-pill si-pill--danger" title={applied}>Failed</span>
                    ) : (
                      <button className="si-action si-action--primary" disabled={applying || !isAdmin} onClick={() => onApplyProposal(p)}>
                        {applying ? "Applying…" : `Apply to ${p.target}`}
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// MAIN APP
// ═══════════════════════════════════════════════════════════════
function App() {
  const [tab, setTab] = useState(() => {
    try {
      const params = new URLSearchParams(window.location.search);
      const candidate = params.get("tab");
      // Legacy → new tab-id map (retains old shareable links).
      const legacyMap = { dashboard: "engine", moves: "discovery", patterns: "discovery", history: "analysis", grading: "engine" };
      const resolved = legacyMap[candidate] || candidate || "engine";
      return resolved;
    } catch (_) {
      return "engine";
    }
  });
  const [dashboard, setDashboard] = useState(null);
  const [report, setReport] = useState(null);
  const [recs, setRecs] = useState(null);
  const [moveReport, setMoveReport] = useState(null);
  const [moveError, setMoveError] = useState(null);
  const [reportId, setReportId] = useState(null);
  const [loading, setLoading] = useState(true);
  const [moveLoading, setMoveLoading] = useState(true);
  // Engine snapshot — live KPIs from the active backtest run.
  // Polled every 30 s while the Engine tab is visible.
  const [engineSnapshot, setEngineSnapshot] = useState(null);
  const [engineLastFetched, setEngineLastFetched] = useState(0);
  const [engineRefreshing, setEngineRefreshing] = useState(false);
  const [engineError, setEngineError] = useState(null);
  // Calibration proposals (POST /timed/admin/system-intelligence/calibrate)
  const [proposals, setProposals] = useState(null);
  const [proposalsLoading, setProposalsLoading] = useState(false);
  const [proposalApplying, setProposalApplying] = useState({});
  const [proposalApplied, setProposalApplied] = useState({});
  const [running, setRunning] = useState(false);
  const [queued, setQueued] = useState(false);
  const [progress, setProgress] = useState(null);
  const preCalibReportIdRef = React.useRef(null);
  const [applying, setApplying] = useState(false);
  const [appliedMsg, setAppliedMsg] = useState(null);
  const [resetting, setResetting] = useState(false);
  const [resetMsg, setResetMsg] = useState(null);
  const [error, setError] = useState(null);
  const [isAdmin, setIsAdmin] = useState(false);
  const pollIntervalRef = React.useRef(null);
  const statusPollRef = React.useRef(null);

  useEffect(() => {
    const session = window.TimedAuthHelpers?.getStoredSession();
    const r = String(session?.role || "").toLowerCase();
    const t = String(session?.tier || "").toLowerCase();
    const admin = r === "admin" || t === "admin";
    document.body.setAttribute("data-user-role", admin ? "admin" : (session?.role || ""));
    setIsAdmin(admin);
  }, []);

  const fetchEngineSnapshot = useCallback(async (silent = false) => {
    if (!silent) setEngineRefreshing(true);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/system-intelligence/engine-snapshot`, { credentials: "include" });
      const data = await res.json();
      if (data?.ok) {
        setEngineSnapshot(data);
        setEngineLastFetched(Date.now());
        setEngineError(null);
      } else {
        setEngineError(data?.error || "engine_snapshot_failed");
      }
    } catch (e) {
      setEngineError(String(e?.message || e));
    }
    if (!silent) setEngineRefreshing(false);
  }, []);

  const fetchProposals = useCallback(async () => {
    setProposalsLoading(true);
    try {
      const res = await fetch(`${API_BASE}/timed/admin/system-intelligence/calibrate`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: "{}",
        credentials: "include",
      });
      const data = await res.json();
      if (data?.ok) {
        setProposals(data);
        setProposalApplied({});
      } else {
        setError(data?.error || "calibrate_failed");
      }
    } catch (e) {
      setError(String(e?.message || e));
    }
    setProposalsLoading(false);
  }, []);

  const applyProposal = useCallback(async (proposal) => {
    if (!proposal?.config?.key) return;
    setProposalApplying((prev) => ({ ...prev, [proposal.id]: true }));
    try {
      let res, data;
      if (proposal.target === "live") {
        res = await fetch(`${API_BASE}/timed/admin/model-config`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ updates: [{ key: proposal.config.key, value: proposal.config.value, description: `System Intelligence proposal · ${proposal.title}` }] }),
          credentials: "include",
        });
        data = await res.json();
      } else {
        const runId = engineSnapshot?.run_id || proposals?.run_id;
        if (!runId) throw new Error("no_run_id");
        res = await fetch(`${API_BASE}/timed/admin/runs/config-patch`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ run_id: runId, updates: [{ key: proposal.config.key, value: proposal.config.value }] }),
          credentials: "include",
        });
        data = await res.json();
      }
      if (data?.ok) {
        setProposalApplied((prev) => ({ ...prev, [proposal.id]: "applied" }));
      } else {
        setProposalApplied((prev) => ({ ...prev, [proposal.id]: data?.error || "failed" }));
      }
    } catch (e) {
      setProposalApplied((prev) => ({ ...prev, [proposal.id]: String(e?.message || e) }));
    }
    setProposalApplying((prev) => ({ ...prev, [proposal.id]: false }));
  }, [engineSnapshot, proposals]);

  const fetchData = useCallback(async () => {
    setLoading(true);
    setError(null);
    setMoveLoading(true);
    setMoveError(null);
    try {
      const [dashRes, reportRes, moveRes, _eng] = await Promise.all([
        fetch(`${API_BASE}/timed/system/dashboard`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" }).then(r => r.json()).catch(() => null),
        fetch(`${API_BASE}/timed/move-discovery`, { credentials: "include" }).then(async (r) => {
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          return r.json();
        }).catch((e) => ({ ok: false, error: String(e?.message || e) })),
        fetchEngineSnapshot(true),
      ]);
      if (dashRes?.ok) setDashboard(dashRes);
      if (reportRes?.ok) {
        setReport(reportRes.report);
        setRecs(reportRes.recommendations);
        setReportId(reportRes.report_id);
      }
      if (moveRes?.ok !== false) {
        setMoveReport(moveRes);
      } else {
        setMoveReport(null);
        setMoveError(moveRes?.error || "move_discovery_failed");
      }
    } catch (e) { setError(String(e)); }
    setMoveLoading(false);
    setLoading(false);
  }, []);

  useEffect(() => { fetchData(); }, [fetchData]);

  useEffect(() => {
    try {
      const url = new URL(window.location.href);
      url.searchParams.set("tab", tab);
      window.history.replaceState({}, "", `${url.pathname}${url.search}${url.hash}`);
    } catch (_) {}
  }, [tab]);

  // Poll status when queued
  useEffect(() => {
    if (!queued) return;
    const fetchStatus = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/calibration/status`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          if (data.ok) {
            setProgress({ message: data.message, step: data.step, total_steps: data.total_steps, steps: data.steps, status: data.status });
            if (data.status === "error" && data.message) {
              setError(data.message);
              setQueued(false);
            }
            // When status reports "done", fetch the new report and finish
            if (data.status === "done") {
              try {
                const rptRes = await fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" });
                const rptData = await rptRes.json();
                if (rptData.ok && rptData.report) {
                  setReport(rptData.report); setRecs(rptData.recommendations); setReportId(rptData.report_id);
                }
              } catch (_) {}
              setQueued(false);
              fetchData();
            }
          }
        }
      } catch (_) {}
    };
    fetchStatus();
    statusPollRef.current = setInterval(fetchStatus, 3000);
    return () => { if (statusPollRef.current) clearInterval(statusPollRef.current); statusPollRef.current = null; };
  }, [queued]);

  useEffect(() => {
    if (!queued) return;
    const tick = async () => {
      try {
        const res = await fetch(`${API_BASE}/timed/calibration/report`, { credentials: "include" });
        if (res.ok) {
          const data = await res.json();
          // Only treat as "done" if this is a NEW report (different from the one before we clicked Run)
          if (data.ok && data.report && data.report_id && data.report_id !== preCalibReportIdRef.current) {
            setReport(data.report); setRecs(data.recommendations); setReportId(data.report_id);
            setQueued(false); setProgress(null);
            if (pollIntervalRef.current) clearInterval(pollIntervalRef.current);
            fetchData();
            return;
          }
        }
      } catch (_) {}
    };
    pollIntervalRef.current = setInterval(tick, 15000);
    return () => { if (pollIntervalRef.current) clearInterval(pollIntervalRef.current); };
  }, [queued]);

  const handleRun = async () => {
    setRunning(true); setError(null);
    preCalibReportIdRef.current = reportId;
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/run`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ analysis_only: true }), credentials: "include" });
      const data = await res.json();
      if (data.ok && data.report) { setReport(data.report); setRecs(data.report?.recommendations); setReportId(data.report?.report_id || reportId); fetchData(); }
      else if (!data.ok) setError(data.error || "Analysis failed");
    } catch (e) { setError(String(e)); }
    setRunning(false);
  };
  const handleApply = async (id) => {
    setApplying(true); setAppliedMsg(null);
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/apply`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ report_id: id }), credentials: "include" });
      const data = await res.json();
      if (data.ok) setAppliedMsg(`Applied: ${data.applied?.join(", ")}`);
      else setError(data.error);
    } catch (e) { setError(String(e)); }
    setApplying(false);
  };
  const handleReset = async () => {
    if (!confirm("This will permanently delete ALL trades and reset the account to $100,000. Continue?")) return;
    setResetting(true); setResetMsg(null); setError(null);
    try {
      const res = await fetch(`${API_BASE}/timed/trades/reset`, { method: "POST", headers: { "Content-Type": "application/json" }, body: "{}", credentials: "include" });
      const data = await res.json();
      if (data.ok) { setResetMsg(data.message || "Account reset to $100,000."); setReport(null); setRecs(null); fetchData(); }
      else setError(data.error || "Reset failed");
    } catch (e) { setError(String(e)); }
    setResetting(false);
  };
  const handleViewReport = async (rid) => {
    try {
      const res = await fetch(`${API_BASE}/timed/calibration/report?report_id=${rid}`, { credentials: "include" });
      const data = await res.json();
      if (data.ok) { setReport(data.report); setRecs(data.recommendations); setReportId(data.report_id); setTab("analysis"); }
    } catch (_) {}
  };

  // 4-tab IA (System Intelligence revamp 2026-05-03): Engine / Analysis /
  // Runs / Discovery. The legacy Dashboard / Patterns / History / Grading
  // surfaces are folded into Engine (live KPIs + risk tiers) and Analysis
  // (calibration history + pattern library + context).
  const tabs = [
    { id: "engine", label: "Engine" },
    { id: "analysis", label: "Analysis" },
    ...(isAdmin ? [{ id: "runs", label: "Runs" }] : []),
    { id: "discovery", label: "Discovery" },
  ];

  // Poll engine snapshot every 30 s while the Engine or Analysis tab is
  // active. The active backtest runs continuously, so the snapshot
  // surface stays fresh without the operator having to refresh.
  useEffect(() => {
    if (tab !== "engine" && tab !== "analysis") return;
    fetchEngineSnapshot(true);
    const id = setInterval(() => {
      if (typeof document !== "undefined" && document.visibilityState === "hidden") return;
      fetchEngineSnapshot(true);
    }, 30000);
    return () => clearInterval(id);
  }, [tab, fetchEngineSnapshot]);

  return (
    <div className="min-h-screen pb-16">
      <NavHeader />
      <div className="max-w-[1520px] mx-auto px-4 py-6">
        <div className="flex items-end justify-between mb-5 gap-3 flex-wrap">
          <div>
            <h1 style={{fontSize:"24px", fontWeight:600, color:"var(--ds-text-display)", letterSpacing:"-0.02em", margin:0}}>System Intelligence</h1>
            <p style={{fontSize:"var(--ds-fs-meta)", color:"var(--ds-text-muted)", marginTop:6}}>
              Live engine health, calibration, and experiment workflow.
            </p>
          </div>
          {isAdmin && (
            <div className="flex items-center gap-2">
              <button className="si-action si-action--primary" onClick={handleRun} disabled={running}>
                {running ? "Analyzing…" : "Run Analysis"}
              </button>
              <button className="si-action si-action--danger" onClick={handleReset} disabled={resetting}>
                {resetting ? "Resetting…" : "Reset Account"}
              </button>
            </div>
          )}
        </div>

        {error && <div className="mb-4 p-3 rounded-lg bg-rose-500/10 border border-rose-500/20 text-sm text-rose-300">{error}</div>}
        {resetMsg && <div className="mb-4 p-3 rounded-lg bg-emerald-500/10 border border-emerald-500/20 text-sm text-emerald-300">{resetMsg}</div>}

        {/* Main tabs (v2) */}
        <div className="si-tabbar overflow-x-auto">
          {tabs.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`si-tabbar__item ${tab === t.id ? "si-tabbar__item--active" : ""}`}>{t.label}</button>
          ))}
        </div>

        {loading && tab === "engine" && !engineSnapshot ? (
          <div className="flex items-center justify-center py-20">
            <div className="w-6 h-6 border-2 border-white/20 border-t-emerald-500 rounded-full" style={{animation:"spin 0.7s linear infinite"}} />
          </div>
        ) : (
          <>
            {tab === "engine" && (
              <div className="space-y-5">
                <EngineTab snapshot={engineSnapshot} onRefresh={() => fetchEngineSnapshot(false)} refreshing={engineRefreshing} lastFetched={engineLastFetched} error={engineError} />
                {/* Risk-tier mini surface — kept from legacy Trade Grading tab so admins can still adjust tier risk %. */}
                {isAdmin && <TradeGradingTab />}
                {/* Legacy aggregate Dashboard kept below the live KPIs as a "calibration generation digest"
                    so the existing whats_working / proceed_with_caution / VIX regime tables stay reachable. */}
                <details className="si-card si-card--glass">
                  <summary style={{cursor:"pointer", color:"var(--ds-text-muted)", fontSize:"var(--ds-fs-meta)", textTransform:"uppercase", letterSpacing:"0.14em", fontWeight:700}}>
                    Show legacy calibration digest (Generation summary, Adaptations, VIX regime)
                  </summary>
                  <div className="mt-4">
                    <DashboardTab dashboard={dashboard} />
                  </div>
                </details>
              </div>
            )}
            {tab === "analysis" && (
              <div className="space-y-5">
                {/* P2: Run Analysis CTA + Proposed Calibration panel. */}
                <AnalysisAutomationBar
                  isAdmin={isAdmin}
                  snapshot={engineSnapshot}
                  proposals={proposals}
                  proposalsLoading={proposalsLoading}
                  proposalApplying={proposalApplying}
                  proposalApplied={proposalApplied}
                  onRunAnalysis={handleRun}
                  running={running}
                  onLoadProposals={fetchProposals}
                  onApplyProposal={applyProposal}
                />
                <UnifiedAnalysisTab report={report} recs={recs} reportId={reportId} onApply={handleApply} applying={applying} appliedMsg={appliedMsg} />
                <details className="si-card si-card--glass">
                  <summary style={{cursor:"pointer", color:"var(--ds-text-muted)", fontSize:"var(--ds-fs-meta)", textTransform:"uppercase", letterSpacing:"0.14em", fontWeight:700}}>
                    Show calibration history (past generations)
                  </summary>
                  <div className="mt-4">
                    <HistoryTab onViewReport={handleViewReport} />
                  </div>
                </details>
              </div>
            )}
            {tab === "runs" && <RunsTab isAdmin={isAdmin} />}
            {tab === "discovery" && (
              <div className="space-y-5">
                <MoveDiscoveryTab report={moveReport} loading={moveLoading} error={moveError} />
                <PatternsTab />
              </div>
            )}
          </>
        )}
      </div>
    </div>
  );
}

const _AuthGate = window.TimedAuthGate;
const siApp = _AuthGate
  ? <_AuthGate apiBase={API_BASE} requiredTier="admin">{(user) => <App user={user} />}</_AuthGate>
  : <App />;
ReactDOM.createRoot(document.getElementById("root")).render(siApp);
    </script>
  </body>
</html>
