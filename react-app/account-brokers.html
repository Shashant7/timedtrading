<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <title>Connected Brokers — Timed Trading</title>
    <meta name="description" content="Connect a brokerage account for optional auto-mirror execution." />
    <link rel="stylesheet" href="tt-tokens.css?v=20260610-verda4" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth-gate.js?v=20260601-nav-inject"></script>
    <script src="broker-connect-shared.js?v=20260615a"></script>
    <script src="tt-bottom-nav.js?v=20260610-verda3" defer></script>
    <script src="investor-nav-badge.js?v=20260622a"></script>
    <script src="tt-nav-extras.js?v=20260610-verda3" defer></script>
    <style>
      :root {
        --bg: #0b0e11; --surface: rgba(255,255,255,0.025); --border: rgba(255,255,255,0.06);
        --text: #e5e7eb; --muted: #9ca3af; --faint: #6b7280;
        --up: #34d399; --warn: #fbbf24; --accent: #67e8f9;
      }
      body { background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; margin: 0; min-height: 100vh; }
      main { max-width: 960px; margin: 0 auto; padding: 24px 20px 96px; }
      .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 16px; }
      .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; }
      .pill-ok { background: rgba(52,211,153,0.12); color: var(--up); border: 1px solid rgba(52,211,153,0.3); }
      .pill-warn { background: rgba(251,191,36,0.12); color: var(--warn); border: 1px solid rgba(251,191,36,0.3); }
      .btn { padding: 8px 14px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: var(--text); }
      .btn-primary { background: rgba(52,211,153,0.14); color: var(--up); border-color: rgba(52,211,153,0.35); }
      .btn:disabled { opacity: 0.5; cursor: not-allowed; }
      h1 { font-size: 26px; font-weight: 800; margin: 0 0 8px; }
      .sub { color: var(--muted); font-size: 14px; margin-bottom: 24px; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useCallback } = React;
      const h = React.createElement;
      const API_BASE = "";
      const BC = window.TimedBrokerConnect;

      function BrokersApp({ user }) {
        const [status, setStatus] = useState(null);
        const [portfolio, setPortfolio] = useState(null);
        const [busy, setBusy] = useState(false);
        const [err, setErr] = useState(null);
        const isAdmin = user?.role === "admin" || user?.tier === "admin" || window._ttIsAdmin;

        const refresh = useCallback(async () => {
          if (!isAdmin) return;
          try {
            const [s, p] = await Promise.all([
              fetch(`${API_BASE}/timed/admin/broker-bridge/status`, { credentials: "include" }).then((r) => r.json()).catch(() => null),
              fetch(`${API_BASE}/timed/admin/broker-bridge/portfolio`, { credentials: "include" }).then((r) => r.json()).catch(() => null),
            ]);
            setStatus(s);
            setPortfolio(p);
            setErr(s?.error || null);
          } catch (e) { setErr(String(e?.message || e)); }
        }, [isAdmin]);

        useEffect(() => { refresh(); }, [refresh]);

        const users = status?.users || [];
        const webullUser = BC?.findUserByBroker?.(users, "webull");
        const webullConfigured = status?.webull_connect_configured === true;
        const pfRow = (portfolio?.users || []).find((u) => u.user_id === webullUser?.user_id);

        return h("main", null,
          h("h1", null, "Connected Brokers"),
          h("p", { className: "sub" },
            "Optional auto-mirror sends model ENTRY/TRIM/EXIT signals to a connected brokerage account. ",
            "Live trading stays off until explicitly enabled per account."
          ),
          !isAdmin && h("div", { className: "card" },
            h("div", { style: { fontWeight: 700, marginBottom: 6 } }, "Pro preview"),
            h("p", { style: { fontSize: 13, color: "var(--muted)", margin: 0 } },
              "Broker connect is rolling out to Pro accounts. The operator is validating Webull Connect in Mission Control first."
            ),
          ),
          isAdmin && err && !status?.ok && h("div", { className: "card", style: { borderColor: "rgba(251,191,36,0.35)" } },
            h("div", { style: { color: "var(--warn)", fontSize: 13 } }, "Bridge: ", err),
          ),
          h("div", { className: "card" },
            h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "baseline", flexWrap: "wrap", gap: 8, marginBottom: 10 } },
              h("div", { style: { fontWeight: 700, fontSize: 15 } }, "Webull"),
              h("span", { className: `pill ${webullConfigured ? "pill-ok" : "pill-warn"}` },
                webullConfigured ? "Connect API configured" : "Awaiting partner credentials"),
            ),
            h("p", { style: { fontSize: 12, color: "var(--muted)", margin: "0 0 12px" } },
              "Register at connect.api@webull-us.com. Mock connect works today with BROKER_BRIDGE_MOCK=true."
            ),
            webullUser ? h("div", { style: { fontSize: 12, marginBottom: 12, fontFamily: "ui-monospace, monospace" } },
              webullUser.user_id, " · ", webullUser.webull_account_id || webullUser.status,
              webullUser.broker_integration_enabled
                ? h("span", { className: "pill pill-ok", style: { marginLeft: 8 } }, "TRADING ON")
                : h("span", { className: "pill pill-warn", style: { marginLeft: 8 } }, "TRADING OFF"),
              pfRow && Number.isFinite(Number(pfRow.equity_usd)) &&
                h("span", { style: { marginLeft: 12, color: "var(--text)" } },
                  "Equity $", Number(pfRow.equity_usd).toLocaleString()),
            ) : h("div", { style: { fontSize: 12, color: "var(--faint)", marginBottom: 12 } }, "Not connected"),
            isAdmin && h("div", { style: { display: "flex", flexWrap: "wrap", gap: 8 } },
              h("button", {
                className: "btn btn-primary",
                disabled: busy,
                onClick: async () => {
                  const uid = prompt("user_id (email) to connect:", webullUser?.user_id || user?.email || "");
                  if (!uid || !BC) return;
                  setBusy(true);
                  try {
                    const { ok, json } = await BC.connectWebull(API_BASE, String(uid).trim().toLowerCase());
                    if (!ok) { alert(json?.error || json?.note || "Connect failed"); return; }
                    if (json?.authorize_url) window.open(json.authorize_url, "_blank");
                    else if (json?.mock) alert("Mock Webull connected");
                    refresh();
                  } finally { setBusy(false); }
                },
              }, "Connect Webull"),
              webullUser && h("button", {
                className: "btn",
                disabled: busy,
                onClick: async () => {
                  if (!confirm("Disconnect Webull?")) return;
                  setBusy(true);
                  try {
                    await BC.disconnectWebull(API_BASE, webullUser.user_id);
                    refresh();
                  } finally { setBusy(false); }
                },
              }, "Disconnect"),
              webullUser && h("button", {
                className: "btn",
                disabled: busy,
                onClick: async () => {
                  setBusy(true);
                  try {
                    const { ok, json } = await BC.testWebull(API_BASE, webullUser.user_id, "get_portfolio");
                    alert(ok ? "Portfolio probe OK" : (json?.error || "Probe failed"));
                  } finally { setBusy(false); }
                },
              }, "Test portfolio"),
            ),
          ),
          h("div", { className: "card", style: { opacity: 0.75 } },
            h("div", { style: { fontWeight: 700, marginBottom: 6 } }, "Interactive Brokers"),
            h("p", { style: { fontSize: 12, color: "var(--muted)", margin: 0 } }, "Production mirror path today. Per-user BYOB wizard planned."),
            h("span", { className: "pill pill-ok", style: { marginTop: 10 } }, "Operator connect via MC"),
          ),
          h("div", { className: "card", style: { opacity: 0.75 } },
            h("div", { style: { fontWeight: 700, marginBottom: 6 } }, "Robinhood"),
            h("p", { style: { fontSize: 12, color: "var(--muted)", margin: 0 } }, "Agentic MCP scaffold — awaiting OAuth publication."),
            h("span", { className: "pill pill-warn", style: { marginTop: 10 } }, "Coming soon"),
          ),
        );
      }

      const AuthGate = window.TimedAuthGate;
      const app = AuthGate
        ? h(AuthGate, { apiBase: API_BASE, requiredTier: "pro" }, (user) => h(BrokersApp, { user }))
        : h(BrokersApp, { user: null });
      ReactDOM.createRoot(document.getElementById("root")).render(app);
    </script>
  </body>
</html>
