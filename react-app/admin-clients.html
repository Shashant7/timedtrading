<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — Clients — Timed Trading</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48' fill='none'%3E%3Cdefs%3E%3ClinearGradient id='r' x1='6' y1='42' x2='42' y2='6'%3E%3Cstop offset='0%25' stop-color='%2334d399'/%3E%3Cstop offset='100%25' stop-color='%2367e8f9'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='48' height='48' rx='11' fill='%23000'/%3E%3Ccircle cx='24' cy='24' r='17' stroke='url(%23r)' stroke-width='3' fill='none'/%3E%3Cline x1='24' y1='24' x2='19' y2='18.5' stroke='%23636366' stroke-width='4' stroke-linecap='round'/%3E%3Cline x1='24' y1='24' x2='29.5' y2='16.5' stroke='%2330d158' stroke-width='4.5' stroke-linecap='round'/%3E%3Ccircle cx='24' cy='24' r='3.5' fill='%2330d158'/%3E%3Ccircle cx='24' cy='24' r='1.5' fill='%23000'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="auth-gate.js?v=20260317a"></script>
    <style>
      body { margin: 0; background: #0a0a0f; color: #e5e7eb; font-family: 'Inter', sans-serif; }
      @keyframes spin { to { transform: rotate(360deg); } }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #4b5563; }
      body:not([data-user-role="admin"]) a[data-admin-only] {
        display: none !important;
      }
    </style>

  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;
      const API_BASE = "";
      const AuthGate = window.TimedAuthGate;

      // ── Helpers ──
      function formatDate(ts) {
        if (!ts) return "—";
        return new Date(ts).toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
      }
      function formatDateTime(ts) {
        if (!ts) return "—";
        return new Date(ts).toLocaleString("en-US", { month: "short", day: "numeric", year: "numeric", hour: "numeric", minute: "2-digit" });
      }

      function ClientType({ tier, subStatus }) {
        const labels = { admin: "Admin", vip: "VIP", pro: "Pro", free: "Member" };
        const colors = { admin: { text: "#a78bfa", bg: "rgba(167,139,250,0.10)", border: "rgba(167,139,250,0.25)" },
                          vip: { text: "#fbbf24", bg: "rgba(251,191,36,0.10)", border: "rgba(251,191,36,0.25)" },
                          pro: { text: "#00c853", bg: "rgba(0,200,83,0.10)", border: "rgba(0,200,83,0.25)" },
                          free: { text: "#6b7280", bg: "rgba(107,114,128,0.10)", border: "rgba(107,114,128,0.25)" } };
        const c = colors[tier] || colors.free;
        const label = labels[tier] || "Member";
        const suffix = subStatus === "manual" ? " *" : subStatus === "trialing" ? " (trial)" : "";
        return (
          <span style={{ display: "inline-block", padding: "2px 8px", borderRadius: "4px", fontSize: "11px",
            fontWeight: 600, color: c.text, background: c.bg, border: `1px solid ${c.border}`, whiteSpace: "nowrap" }}>
            {label}{suffix}
          </span>
        );
      }

      function ActiveBadge({ yes }) {
        return (
          <span style={{ color: yes ? "#22c55e" : "#ef4444", fontWeight: 600, fontSize: "11px" }}>
            {yes ? "Y" : "N"}
          </span>
        );
      }

      // ── Main Component ──
      function AdminClientsPage({ user }) {
        const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
        const [users, setUsers] = useState([]);
        const [loading, setLoading] = useState(true);
        const [filter, setFilter] = useState("");
        const [showRemoved, setShowRemoved] = useState(false);
        const [actionLoading, setActionLoading] = useState(null);
        const [message, setMessage] = useState(null);
        const [sortCol, setSortCol] = useState("last_login_at");
        const [sortDir, setSortDir] = useState("desc");
        const [tab, setTab] = useState("clients");
        const [usageReport, setUsageReport] = useState(null);
        const [usageLoading, setUsageLoading] = useState(false);
        const [usageDays, setUsageDays] = useState(30);
        const [analytics, setAnalytics] = useState(null);
        const [analyticsLoading, setAnalyticsLoading] = useState(false);
        const [analyticsDays, setAnalyticsDays] = useState(7);
        const [systemHealth, setSystemHealth] = useState(null);
        const [healthLoading, setHealthLoading] = useState(false);
        const [vipCodes, setVipCodes] = useState([]);
        const [vipLoading, setVipLoading] = useState(false);
        const [vipGenLabel, setVipGenLabel] = useState("");
        const [vipGenLoading, setVipGenLoading] = useState(false);

        const fetchUsers = useCallback(async () => {
          setLoading(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/users`, { credentials: "include" });
            if (res.ok) {
              const json = await res.json();
              if (json.ok) setUsers(json.users || []);
            }
          } catch {} finally { setLoading(false); }
        }, []);

        useEffect(() => { fetchUsers(); }, [fetchUsers]);
        useEffect(() => {
          fetch(`${API_BASE}/timed/usage`, { method: "POST", credentials: "include", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ feature: "admin_clients_view" }) }).catch(() => {});
        }, []);

        const fetchUsageReport = useCallback(async () => {
          setUsageLoading(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/usage-report?days=${usageDays}`, { credentials: "include" });
            const json = await res.json();
            if (json.ok) setUsageReport(json);
            else setUsageReport({ error: json.error });
          } catch (e) {
            setUsageReport({ error: String(e.message || e) });
          } finally { setUsageLoading(false); }
        }, [usageDays]);
        useEffect(() => {
          if (tab === "usage") fetchUsageReport();
        }, [tab, fetchUsageReport]);

        const setTier = async (email, tier) => {
          setActionLoading(email);
          setMessage(null);
          try {
            const params = new URLSearchParams({ tier });
            if (tier === "free") params.set("expires_at", String(Date.now()));
            const res = await fetch(`${API_BASE}/timed/admin/users/${encodeURIComponent(email)}/tier?${params}`, {
              method: "POST", credentials: "include",
            });
            const json = await res.json();
            if (json.ok) {
              setMessage({ type: "success", text: `${email} → ${tier.toUpperCase()}` });
              fetchUsers();
            } else {
              setMessage({ type: "error", text: json.error || "Failed" });
            }
          } catch (e) {
            setMessage({ type: "error", text: String(e.message || e) });
          } finally { setActionLoading(null); }
        };

        const adminAction = async (endpoint, email, actionLabel) => {
          setActionLoading(email);
          setMessage(null);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/users/${endpoint}`, {
              method: "POST", credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ email }),
            });
            const json = await res.json();
            if (json.ok) {
              setMessage({ type: "success", text: `${email}: ${actionLabel}` });
              fetchUsers();
            } else {
              setMessage({ type: "error", text: json.error || "Failed" });
            }
          } catch (e) {
            setMessage({ type: "error", text: String(e.message || e) });
          } finally { setActionLoading(null); }
        };

        const fetchAnalytics = useCallback(async () => {
          setAnalyticsLoading(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/analytics?days=${analyticsDays}`, { credentials: "include" });
            const json = await res.json();
            if (json.ok) setAnalytics(json);
          } catch (e) { console.error(e); } finally { setAnalyticsLoading(false); }
        }, [analyticsDays]);

        const fetchSystemHealth = useCallback(async () => {
          setHealthLoading(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/system-health`, { credentials: "include" });
            const json = await res.json();
            if (json.ok) setSystemHealth(json);
          } catch (e) { console.error(e); } finally { setHealthLoading(false); }
        }, []);

        const fetchVipCodes = useCallback(async () => {
          setVipLoading(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/vip-codes`, { credentials: "include" });
            const json = await res.json();
            if (json.ok) setVipCodes(json.codes || []);
          } catch (e) { console.error(e); } finally { setVipLoading(false); }
        }, []);

        const generateVipCode = async () => {
          setVipGenLoading(true);
          setMessage(null);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/vip-code`, {
              method: "POST", credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ label: vipGenLabel || "VIP Invite", admin_email: user?.email }),
            });
            const json = await res.json();
            if (json.ok) {
              setMessage({ type: "success", text: `VIP code generated: ${json.code}` });
              setVipGenLabel("");
              fetchVipCodes();
            } else {
              setMessage({ type: "error", text: json.error || "Failed" });
            }
          } catch (e) {
            setMessage({ type: "error", text: String(e.message || e) });
          } finally { setVipGenLoading(false); }
        };

        useEffect(() => { if (tab === "analytics") fetchAnalytics(); }, [tab, fetchAnalytics]);
        useEffect(() => { if (tab === "health") fetchSystemHealth(); }, [tab, fetchSystemHealth]);
        useEffect(() => { if (tab === "vip") fetchVipCodes(); }, [tab, fetchVipCodes]);

        // Sorting
        const handleSort = (col) => {
          if (sortCol === col) {
            setSortDir(d => d === "asc" ? "desc" : "asc");
          } else {
            setSortCol(col);
            setSortDir("desc");
          }
        };

        const sortIndicator = (col) => {
          if (sortCol !== col) return "";
          return sortDir === "asc" ? " \u25B2" : " \u25BC";
        };

        // Filter + sort
        const processed = useMemo(() => {
          let list = users;
          if (!showRemoved) {
            list = list.filter(u => u.status !== "removed");
          }
          if (filter) {
            const q = filter.toLowerCase();
            list = list.filter(u =>
              (u.email || "").toLowerCase().includes(q) ||
              (u.display_name || "").toLowerCase().includes(q) ||
              (u.tier || "").toLowerCase().includes(q)
            );
          }
          list = [...list].sort((a, b) => {
            let va = a[sortCol], vb = b[sortCol];
            // Numeric sort for timestamps and counts
            if (typeof va === "number" || typeof vb === "number") {
              va = Number(va) || 0;
              vb = Number(vb) || 0;
              return sortDir === "asc" ? va - vb : vb - va;
            }
            // String sort
            va = String(va || "").toLowerCase();
            vb = String(vb || "").toLowerCase();
            return sortDir === "asc" ? va.localeCompare(vb) : vb.localeCompare(va);
          });
          return list;
        }, [users, filter, sortCol, sortDir, showRemoved]);

        // CSV export
        const exportCSV = () => {
          const now = Date.now();
          const headers = ["Client ID","Type","Name","Email","Last Login","Date Joined","Terms Accepted","Active >1d","Active >5d","Active >14d","Active >30d","Total Sessions","Total Days"];
          const rows = processed.map((u, i) => {
            const days = u.last_login_at ? (now - u.last_login_at) / 86400000 : Infinity;
            return [
              i + 1,
              (u.tier || "free").toUpperCase(),
              u.display_name || "",
              u.email,
              u.last_login_at ? new Date(u.last_login_at).toISOString() : "",
              u.created_at ? new Date(u.created_at).toISOString() : "",
              u.terms_accepted_at ? new Date(u.terms_accepted_at).toISOString() : "",
              days <= 1 ? "Y" : "N",
              days <= 5 ? "Y" : "N",
              days <= 14 ? "Y" : "N",
              days <= 30 ? "Y" : "N",
              u.login_count || 0,
              u.login_days || 0,
            ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(",");
          });
          const csv = [headers.join(","), ...rows].join("\n");
          const blob = new Blob([csv], { type: "text/csv" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `timed-clients-${new Date().toISOString().slice(0,10)}.csv`;
          a.click();
          URL.revokeObjectURL(url);
        };

        // Stats
        const stats = useMemo(() => {
          const now = Date.now();
          const total = users.length;
          const pro = users.filter(u => u.tier === "pro").length;
          const vip = users.filter(u => u.tier === "vip").length;
          const admin = users.filter(u => u.tier === "admin").length;
          const members = total - pro - vip - admin;
          const active7d = users.filter(u => u.last_login_at && (now - u.last_login_at) / 86400000 <= 7).length;
          const active30d = users.filter(u => u.last_login_at && (now - u.last_login_at) / 86400000 <= 30).length;
          const termsAccepted = users.filter(u => u.terms_accepted_at).length;
          return { total, pro, vip, admin, members, active7d, active30d, termsAccepted };
        }, [users]);

        const thClass = "px-2 py-2.5 text-left text-[10px] font-semibold text-[#6b7280] uppercase tracking-wider cursor-pointer hover:text-white select-none whitespace-nowrap";
        const tdClass = "px-2 py-2 text-[12px] whitespace-nowrap";

        return (
          <div className="min-h-screen bg-[#0a0a0f]">
            {/* Nav — keep in sync with index-react.html Unified Nav */}
            <nav className="sticky top-0 z-50 border-b border-white/[0.06]" style={{background:"rgba(10,10,15,0.95)",backdropFilter:"blur(12px)"}}>
              <div className="flex items-center justify-between px-4 py-2.5">
                <div className="flex items-center gap-3 md:gap-5 min-w-0">
                  <a href="index-react.html" className="flex items-center gap-2 no-underline shrink-0">
                    <svg width="28" height="28" viewBox="0 0 48 48" fill="none"><defs><linearGradient id="tt-ring" x1="6" y1="42" x2="42" y2="6"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#67e8f9"/></linearGradient></defs><rect width="48" height="48" rx="11" fill="#000"/><circle cx="24" cy="24" r="17" stroke="url(#tt-ring)" stroke-width="2.5" fill="none"/><line x1="24" y1="7.5" x2="24" y2="10.5" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><line x1="7.5" y1="24" x2="10.5" y2="24" stroke="#34d399" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/><line x1="19" y1="18.5" x2="16" y2="15.5" stroke="#636366" stroke-width="1.2" stroke-linecap="round"/><line x1="24" y1="24" x2="19" y2="18.5" stroke="#636366" stroke-width="3.5" stroke-linecap="round"/><line x1="29.5" y1="16.5" x2="32" y2="12.9" stroke="#30d158" stroke-width="1.2" stroke-linecap="round"/><line x1="24" y1="24" x2="29.5" y2="16.5" stroke="#30d158" stroke-width="4" stroke-linecap="round"/><circle cx="24" cy="24" r="3.2" fill="#30d158"/><circle cx="24" cy="24" r="1.3" fill="#000"/></svg>
                    <span className="text-[14px] md:text-[15px] font-bold text-white hidden sm:inline" style={{letterSpacing:"-0.03em"}}>Timed Trading</span>
                  </a>
                  <div className="hidden md:flex items-center gap-0.5">
                    <a href="index-react.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Analysis</a>
                    <a href="simulation-dashboard.html" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Trades</a>
                    <a href="system-intelligence.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">System Intelligence</a>
                    <a href="screener.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Screener</a>
                    <a href="ticker-management.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Tickers</a>
                    <a href="trade-autopsy.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#14b8a6]/80 hover:text-[#14b8a6] hover:bg-[#14b8a6]/[0.06] transition-all font-medium">Trade Autopsy</a>
                    <a href="admin-clients.html" data-admin-only="true" className="px-3 py-1 rounded-md text-[13px] text-[#a78bfa] bg-[#a78bfa]/[0.07] font-medium">Admin</a>
                    <a href="daily-brief.html" id="nav-daily-brief" className="relative px-3 py-1 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium">
                      Daily Brief
                      <span id="brief-badge" className="hidden absolute -top-0.5 -right-0.5 w-2 h-2 rounded-full bg-[#f59e0b]" style={{animation: "pulse-badge 2s ease-in-out infinite"}} />
                    </a>
                  </div>
                </div>
                <div className="flex items-center gap-1.5 md:gap-2 shrink-0">
                  <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
                  <a href="index-react.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
                  <a href="/faq.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
                  <a href="index-react.html" className="hidden md:inline-flex px-2 py-1 rounded-md text-[11px] text-[#60a5fa] hover:text-[#93bbfc] hover:bg-[#60a5fa]/[0.06] transition-all font-medium">Ask AI</a>
                  {window.TimedNotificationCenter && <window.TimedNotificationCenter apiBase="" />}
                  {window.TimedUserBadge && <window.TimedUserBadge user={window.TimedAuthHelpers?.getStoredSession()} compact />}
                  <button onClick={() => setMobileMenuOpen(v => !v)} className="md:hidden p-1.5 rounded-md text-[#6b7280] hover:text-white hover:bg-white/[0.06] transition-all" aria-label="Toggle menu">
                    {mobileMenuOpen ? (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    ) : (
                      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    )}
                  </button>
                </div>
              </div>
              {mobileMenuOpen && (
                <div className="md:hidden border-t border-white/[0.06] px-4 py-2 flex flex-col gap-0.5" style={{background:"rgba(10,10,15,0.98)"}}>
                  <a href="index-react.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Analysis</a>
                  <a href="simulation-dashboard.html" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Trades</a>
                  <a href="system-intelligence.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>System Intelligence</a>
                  <a href="screener.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Screener</a>
                  <a href="ticker-management.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#9ca3af] hover:text-white hover:bg-white/[0.04] transition-all" onClick={() => setMobileMenuOpen(false)}>Tickers</a>
                  <a href="trade-autopsy.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#14b8a6]/80 hover:text-[#14b8a6] font-medium" onClick={() => setMobileMenuOpen(false)}>Trade Autopsy</a>
                  <a href="admin-clients.html" data-admin-only="true" className="px-3 py-2 rounded-md text-[13px] text-[#a78bfa] bg-[#a78bfa]/[0.07] font-medium" onClick={() => setMobileMenuOpen(false)}>Admin</a>
                  <a href="daily-brief.html" className="px-3 py-2 rounded-md text-[13px] text-[#f59e0b]/80 hover:text-[#f59e0b] hover:bg-[#f59e0b]/[0.06] transition-all font-medium" onClick={() => setMobileMenuOpen(false)}>Daily Brief</a>
                  <div className="border-t border-white/[0.06] mt-1 pt-1 flex items-center gap-2">
                    <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Guide</a>
                    <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all" title="Restart tour">Tour</a>
                    <a href="/faq.html" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">FAQ</a>
                    <a href="index-react.html" className="px-3 py-2 rounded-md text-[12px] text-[#60a5fa] hover:text-white hover:bg-white/[0.04] transition-all">Ask AI</a>
                    <a href="mailto:support@timed-trading.com" className="px-3 py-2 rounded-md text-[12px] text-[#6b7280] hover:text-white hover:bg-white/[0.04] transition-all">Contact</a>
                  </div>
                </div>
              )}

                              <div key={i} className="flex-1 flex flex-col items-center gap-0.5">
                                <div style={{ height: `${pct}%`, minHeight: 2, background: cnt > max * 0.7 ? "#00c853" : cnt > max * 0.3 ? "#38bdf8" : "#374151" }}
                                  className="w-full rounded-t" title={`${i}:00 — ${cnt} sessions`} />
                                {i % 3 === 0 && <span className="text-[8px] text-[#4b5563]">{i}</span>}
                              </div>
                            );
                          })}
                        </div>
                      </div>

                      {/* OS */}
                      <div className="bg-white/[0.02] border border-white/[0.06] rounded-xl p-4">
                        <h3 className="text-[12px] font-semibold text-[#9ca3af] uppercase mb-3">Operating Systems</h3>
                        <div className="flex gap-4 flex-wrap">
                          {(analytics.os || []).map(o => (
                            <div key={o.os} className="flex items-center gap-2">
                              <span className="text-[12px] text-[#e5e7eb] capitalize">{o.os}</span>
                              <span className="text-[11px] text-[#6b7280] tabular-nums bg-white/[0.04] px-2 py-0.5 rounded">{o.cnt}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </>
                  ) : (
                    <p className="text-[#6b7280] text-sm">Click Refresh to load analytics.</p>
                  )}
                </div>
              )}

              {/* System Health Tab */}
              {tab === "health" && (
                <div className="space-y-6">
                  <div className="flex items-center gap-3">
                    <button onClick={fetchSystemHealth} disabled={healthLoading} className="px-4 py-1.5 rounded-lg text-[12px] font-semibold bg-white/[0.04] border border-white/[0.08] text-[#9ca3af] hover:text-white transition-all disabled:opacity-50">
                      {healthLoading ? "Checking..." : "Run Health Check"}
                    </button>
                    {systemHealth && (
                      <span className={`text-[13px] font-bold ${systemHealth.overall === "healthy" ? "text-[#22c55e]" : systemHealth.overall === "stale" ? "text-[#f59e0b]" : "text-[#ff5252]"}`}>
                        {systemHealth.overall?.toUpperCase()}
                      </span>
                    )}
                  </div>
                  {healthLoading ? (
                    <div className="text-center py-12 text-[#6b7280]">Running health checks...</div>
                  ) : systemHealth?.checks ? (
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                      {Object.entries(systemHealth.checks).map(([key, check]) => {
                        const statusColor = check.status === "ok" || check.status === "configured" ? "#22c55e" : check.status === "stale" ? "#f59e0b" : check.status === "not_configured" ? "#6b7280" : "#ff5252";
                        const labels = { price_feed: "Price Feed", scoring: "Scoring Engine", d1: "Database (D1)", discord: "Discord Bot", stripe: "Stripe", sendgrid: "SendGrid", twelvedata: "TwelveData" };
                        return (
                          <div key={key} className="bg-white/[0.02] border border-white/[0.06] rounded-xl p-4">
                            <div className="flex items-center justify-between mb-2">
                              <span className="text-[13px] font-semibold text-[#e5e7eb]">{labels[key] || key}</span>
                              <span className="px-2 py-0.5 rounded text-[10px] font-bold" style={{ color: statusColor, background: `${statusColor}15`, border: `1px solid ${statusColor}30` }}>
                                {check.status?.toUpperCase()}
                              </span>
                            </div>
                            <div className="space-y-1 text-[11px] text-[#6b7280]">
                              {check.age_min !== undefined && <div>Age: <span className="text-[#e5e7eb]">{check.age_min}m</span></div>}
                              {check.ticker_count !== undefined && <div>Tickers: <span className="text-[#e5e7eb]">{check.ticker_count}</span></div>}
                              {check.user_count !== undefined && <div>Users: <span className="text-[#e5e7eb]">{check.user_count}</span></div>}
                              {check.detail && <div className="text-[#ff5252]">{check.detail}</div>}
                              {check.has_bot_token !== undefined && <div>Bot Token: <span className={check.has_bot_token ? "text-[#22c55e]" : "text-[#ff5252]"}>{check.has_bot_token ? "Yes" : "No"}</span></div>}
                              {check.has_guild_id !== undefined && <div>Guild ID: <span className={check.has_guild_id ? "text-[#22c55e]" : "text-[#ff5252]"}>{check.has_guild_id ? "Yes" : "No"}</span></div>}
                              {check.has_role_id !== undefined && <div>Role ID: <span className={check.has_role_id ? "text-[#22c55e]" : "text-[#ff5252]"}>{check.has_role_id ? "Yes" : "No"}</span></div>}
                              {check.has_secret_key !== undefined && <div>Secret Key: <span className={check.has_secret_key ? "text-[#22c55e]" : "text-[#ff5252]"}>{check.has_secret_key ? "Yes" : "No"}</span></div>}
                              {check.has_webhook_secret !== undefined && <div>Webhook Secret: <span className={check.has_webhook_secret ? "text-[#22c55e]" : "text-[#ff5252]"}>{check.has_webhook_secret ? "Yes" : "No"}</span></div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ) : (
                    <p className="text-[#6b7280] text-sm">Click "Run Health Check" to check system status.</p>
                  )}
                </div>
              )}

              {/* VIP Codes Tab */}
              {tab === "vip" && (
                <div className="space-y-6">
                  <div className="flex items-center gap-3 flex-wrap">
                    <input type="text" placeholder="Label (e.g. 'John Doe - Influencer')" value={vipGenLabel} onChange={(e) => setVipGenLabel(e.target.value)}
                      className="px-3 py-2 rounded-lg text-[13px] bg-white/[0.03] border border-white/[0.08] text-[#e5e7eb] placeholder-[#4b5563] outline-none focus:border-[#a78bfa]/30 transition-all w-72" />
                    <button onClick={generateVipCode} disabled={vipGenLoading}
                      className="px-5 py-2 rounded-lg text-[12px] font-semibold bg-[#a78bfa]/[0.15] border border-[#a78bfa]/[0.30] text-[#a78bfa] hover:bg-[#a78bfa]/[0.25] transition-all disabled:opacity-50">
                      {vipGenLoading ? "Generating..." : "Generate VIP Code"}
                    </button>
                    <button onClick={fetchVipCodes} disabled={vipLoading}
                      className="px-4 py-2 rounded-lg text-[12px] font-semibold bg-white/[0.04] border border-white/[0.08] text-[#9ca3af] hover:text-white transition-all disabled:opacity-50">
                      Refresh
                    </button>
                  </div>
                  {message && (
                    <div className={`inline-block px-3 py-1.5 rounded-lg text-[12px] font-medium ${message.type === "success" ? "text-[#00c853] bg-[#00c853]/[0.08]" : "text-[#ff5252] bg-[#ff5252]/[0.08]"}`}>
                      {message.text}
                    </div>
                  )}
                  {vipLoading ? (
                    <div className="text-center py-12 text-[#6b7280]">Loading VIP codes...</div>
                  ) : vipCodes.length > 0 ? (
                    <div className="overflow-x-auto rounded-xl border border-white/[0.06] bg-white/[0.01]">
                      <table className="w-full border-collapse text-[12px]">
                        <thead>
                          <tr className="border-b border-white/[0.06] bg-white/[0.02]">
                            <th className="px-3 py-2.5 text-left font-semibold text-[#6b7280] uppercase">Code</th>
                            <th className="px-3 py-2.5 text-left font-semibold text-[#6b7280] uppercase">Status</th>
                            <th className="px-3 py-2.5 text-left font-semibold text-[#6b7280] uppercase">Created</th>
                            <th className="px-3 py-2.5 text-left font-semibold text-[#6b7280] uppercase">Created By</th>
                            <th className="px-3 py-2.5 text-left font-semibold text-[#6b7280] uppercase">Used At</th>
                            <th className="px-3 py-2.5 text-left font-semibold text-[#6b7280] uppercase">Used By</th>
                          </tr>
                        </thead>
                        <tbody>
                          {vipCodes.map(c => (
                            <tr key={c.code} className="border-b border-white/[0.03] hover:bg-white/[0.02]">
                              <td className="px-3 py-2 text-[#e5e7eb] font-mono font-semibold">{c.code}</td>
                              <td className="px-3 py-2">
                                <span className={`px-2 py-0.5 rounded text-[10px] font-bold ${c.status === "used" ? "text-[#22c55e] bg-[#22c55e]/[0.10]" : "text-[#f59e0b] bg-[#f59e0b]/[0.10]"}`}>
                                  {(c.status || "generated").toUpperCase()}
                                </span>
                              </td>
                              <td className="px-3 py-2 text-[#6b7280]">{formatDateTime(c.created_at)}</td>
                              <td className="px-3 py-2 text-[#9ca3af]">{c.created_by || "—"}</td>
                              <td className="px-3 py-2 text-[#6b7280]">{c.used_at ? formatDateTime(c.used_at) : "—"}</td>
                              <td className="px-3 py-2 text-[#9ca3af]">{c.used_by_email || "—"}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  ) : (
                    <p className="text-[#6b7280] text-sm">No VIP codes generated yet.</p>
                  )}
                </div>
              )}

              {/* Footer note */}
              <div className="mt-4 text-[11px] text-[#4b5563]">
                * = manually upgraded (not via Stripe). Sessions and days tracking starts from when the schema was deployed.
              </div>
            </div>
          </div>
        );
      }

      // ── Mount ──
      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <AuthGate apiBase={API_BASE} requiredTier="admin">
          {(user) => <AdminClientsPage user={user} />}
        </AuthGate>
      );
    </script>
  </body>
</html>
