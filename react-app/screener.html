  <body class="vf-page">
    <script src="tt-topnav-scaffold.js"></script>
    <div id="root"></div>
    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;

      const API_BASE = "";  // same-origin — proxied by Pages Function

      // ── Helpers ──────────────────────────────────────────────────────────────
      const fmtNum = (n, decimals = 1) => {
        if (n == null || !Number.isFinite(Number(n))) return "—";
        return Number(n).toLocaleString("en-US", { maximumFractionDigits: decimals });
      };
      const fmtMcap = (n) => {
        if (!Number.isFinite(Number(n)) || Number(n) === 0) return "—";
        const b = Number(n) / 1e9;
        return b >= 1 ? `$${b.toFixed(1)}B` : `$${(Number(n) / 1e6).toFixed(0)}M`;
      };
      const fmtVol = (n) => {
        if (!Number.isFinite(Number(n)) || Number(n) === 0) return "—";
        const v = Number(n);
        if (v >= 1e6) return `${(v / 1e6).toFixed(1)}M`;
        if (v >= 1e3) return `${(v / 1e3).toFixed(0)}K`;
        return String(v);
      };
      const fmtPct = (n) => {
        if (n == null || !Number.isFinite(Number(n))) return "—";
        const v = Number(n);
        return `${v >= 0 ? "+" : ""}${v.toFixed(1)}%`;
      };
      const getCandidateChangePct = (candidate, preferWeekly = false) => {
        if (preferWeekly || candidate?.scan_type === "weekly_momentum") {
          const week = Number(candidate?.week_change_pct ?? candidate?.change_pct);
          if (Number.isFinite(week)) return week;
        }
        const daily = window.getDailyChange ? window.getDailyChange(candidate) : null;
        if (daily && Number.isFinite(Number(daily.dayPct))) return Number(daily.dayPct);
        const raw = Number(candidate?.change_pct ?? candidate?.day_change_pct ?? candidate?.week_change_pct);
        return Number.isFinite(raw) ? raw : null;
      };

      // ── Scan Type Definitions ──────────────────────────────────────────────
      const SCAN_TYPES = [
        { id: "all", label: "All", icon: "⊛" },
        { id: "daily_momentum", label: "Daily Momentum", icon: "⚡" },
        { id: "top_gainer", label: "Top Gainers", icon: "↑" },
        { id: "top_loser", label: "Top Losers", icon: "↓" },
        { id: "weekly_momentum", label: "Weekly", icon: "📈" },
      ];

      const buildSortOptions = (preferWeekly = false) => [
        { id: "change_desc", label: preferWeekly ? "Week % ↓" : "Change % ↓", fn: (a, b) => Math.abs(getCandidateChangePct(b, preferWeekly) || 0) - Math.abs(getCandidateChangePct(a, preferWeekly) || 0) },
        { id: "change_asc", label: preferWeekly ? "Week % ↑" : "Change % ↑", fn: (a, b) => Math.abs(getCandidateChangePct(a, preferWeekly) || 0) - Math.abs(getCandidateChangePct(b, preferWeekly) || 0) },
        { id: "mcap_desc", label: "Market Cap ↓", fn: (a, b) => (b.market_cap || 0) - (a.market_cap || 0) },
        { id: "volume_desc", label: "Volume ↓", fn: (a, b) => (b.volume || 0) - (a.volume || 0) },
        { id: "ticker_asc", label: "Ticker A-Z", fn: (a, b) => (a.ticker || "").localeCompare(b.ticker || "") },
        { id: "recent", label: "Most Recent", fn: (a, b) => new Date(b.discovered_at || 0) - new Date(a.discovered_at || 0) },
      ];

      // ── Main App Component ─────────────────────────────────────────────────
      function App({ user }) {
        const isAdmin = user?.role === "admin" || user?.tier === "admin";
        const [candidates, setCandidates] = useState([]);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [scanTs, setScanTs] = useState(null);
        const [scanFilter, setScanFilter] = useState("all");
        const [sortBy, setSortBy] = useState("change_desc");
        const [search, setSearch] = useState("");
        const [sectorFilter, setSectorFilter] = useState("all");
        const [addingTickers, setAddingTickers] = useState(new Set());
        const [addedTickers, setAddedTickers] = useState(new Set());
        const [existingTickers, setExistingTickers] = useState(new Set());
        const [selectedTickers, setSelectedTickers] = useState(new Set());

        // 2026-05-28 — Promotion Queue tab. Backend endpoints landed in
        // PR #331 (the 7-component thesis-quality scorer) but had no UI
        // surface. The user reported the omission directly: "Here was
        // the message I mistook for there being an actual UI". Adding
        // it now as a top-level "view" toggle so the existing scan
        // tabs (All/Daily Momentum/Top Gainers/etc) keep working.
        const [viewMode, setViewMode] = useState("discovery"); // discovery | promote
        const [pqRows, setPqRows] = useState([]);
        const [pqStatusFilter, setPqStatusFilter] = useState("needs_review");
        const [pqLoading, setPqLoading] = useState(false);
        const [pqErr, setPqErr] = useState(null);
        const [pqMeta, setPqMeta] = useState(null);
        const [pqDeciding, setPqDeciding] = useState(new Set());
        const [pqRebuilding, setPqRebuilding] = useState(false);
        const [scanRunning, setScanRunning] = useState(false);
        const [scanMsg, setScanMsg] = useState(null);

        const fetchPromotionQueue = useCallback(async () => {
          setPqLoading(true);
          setPqErr(null);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/discovery/promotion-queue?status=${pqStatusFilter}&limit=100`, {
              credentials: "include",
              cache: "no-store",
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const j = await res.json();
            if (!j.ok) throw new Error(j.error || "fetch failed");
            setPqRows(j.rows || []);
            setPqMeta(j.meta || null);
          } catch (e) {
            setPqErr(String(e.message || e));
          } finally {
            setPqLoading(false);
          }
        }, [pqStatusFilter]);

        const triggerPqRebuild = useCallback(async () => {
          if (pqRebuilding) return;
          if (!confirm("Rebuild promotion queue now? Re-scores all 500 screener candidates with the 7-component thesis-quality framework. Takes ~30 seconds.")) return;
          setPqRebuilding(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/discovery/promotion-queue/rebuild`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: "{}",
            });
            const j = await res.json();
            if (j.ok) {
              alert(`Rebuilt ${j.written} candidates · ${j.by_status?.ready_to_add || 0} ready · ${j.by_status?.needs_review || 0} needs review · ${j.by_status?.rejected || 0} rejected`);
              fetchPromotionQueue();
            } else {
              alert(`Rebuild failed: ${j.error || "unknown"}`);
            }
          } catch (e) {
            alert(`Rebuild failed: ${String(e.message || e)}`);
          } finally {
            setPqRebuilding(false);
          }
        }, [pqRebuilding, fetchPromotionQueue]);

        const decideOnCandidate = useCallback(async (candidateId, decision) => {
          if (pqDeciding.has(candidateId)) return;
          const action = decision === "approve" ? "APPROVE and add to universe" : "DECLINE";
          if (!confirm(`${action} ${candidateId}?`)) return;
          setPqDeciding(prev => new Set(prev).add(candidateId));
          try {
            const res = await fetch(`${API_BASE}/timed/admin/discovery/promotion-queue/decide`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ candidate_id: candidateId, decision, decided_by: user?.email || "operator" }),
            });
            const j = await res.json();
            if (j.ok) {
              fetchPromotionQueue();
            } else {
              alert(`Decision failed: ${j.error || "unknown"}`);
            }
          } catch (e) {
            alert(`Decision failed: ${String(e.message || e)}`);
          } finally {
            setPqDeciding(prev => { const s = new Set(prev); s.delete(candidateId); return s; });
          }
        }, [pqDeciding, fetchPromotionQueue, user]);

        useEffect(() => {
          if (viewMode === "promote") fetchPromotionQueue();
        }, [viewMode, pqStatusFilter, fetchPromotionQueue]);

        // Fetch candidates
        const fetchCandidates = useCallback(async (cacheBust = false) => {
          setLoading(true);
          setError(null);
          try {
            const url = `${API_BASE}/timed/screener/candidates${cacheBust ? "?_rescan=" + Date.now() : ""}`;
            const res = await fetch(url, { cache: "no-store" });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const json = await res.json();
            if (!json.ok) throw new Error(json.error || "Unknown error");
            setCandidates(json.candidates || []);
            setScanTs(json.scan_ts || json.last_updated || null);
          } catch (e) {
            setError(e.message);
          } finally {
            setLoading(false);
          }
        }, []);

        const screenerErrorMessage = (j, status) => {
          if (!j || typeof j !== "object") return `HTTP ${status || "error"} — no response body`;
          return j.hint
            || j.detail
            || j.error
            || j.status?.result?.hint
            || j.status?.error
            || j.weekly?.hint
            || j.weekly?.detail
            || j.weekly?.error
            || j.github?.hint
            || j.github?.detail
            || j.github?.error
            || (status ? `HTTP ${status}` : "screener_failed");
        };

        const parseScreenerJson = async (res) => {
          const text = await res.text().catch(() => "");
          if (!text || String(text).trim().startsWith("<")) {
            return {
              ok: false,
              error: "non_json_response",
              hint: "Server returned HTML instead of JSON (timeout or gateway error). Wait a minute and retry.",
            };
          }
          try { return JSON.parse(text); } catch (_) {
            return { ok: false, error: "json_parse_failed", hint: `HTTP ${res.status} — response was not JSON` };
          }
        };

        const pollScreenerUntilDone = async (timeoutMs = 180000) => {
          const t0 = Date.now();
          while (Date.now() - t0 < timeoutMs) {
            await new Promise((r) => setTimeout(r, 3000));
            const res = await fetch(`${API_BASE}/timed/admin/screener/status`, {
              credentials: "include",
              cache: "no-store",
            });
            const j = await parseScreenerJson(res);
            const st = j?.status;
            if (st?.status === "completed" || st?.status === "failed") {
              return { status: st, pollJson: j };
            }
          }
          return { status: null, timeout: true };
        };

        const finishScanFromResult = async (result, modeLabel) => {
          if (result?.ok) {
            const count = result.candidates ?? result.weekly?.candidates ?? result.stored ?? "?";
            const ghWarn = result.github_warning
              || (result.github && !result.github.ok
                ? (result.github.hint || result.github.detail || result.github.error)
                : null);
            const poolNote = result.pool_source
              ? ` · pool ${result.pool_source}${result.pool_fallback_reason ? " (Finnhub fallback)" : ""}`
              : "";
            setScanMsg(ghWarn
              ? `Scan complete · ${count} candidates${poolNote} (GitHub tvscreener skipped: ${ghWarn})`
              : `Scan complete · ${count} candidates${poolNote}`);
            if (ghWarn) {
              alert(`Weekly scan finished (${count} candidates).\n\nGitHub tvscreener was not dispatched:\n${ghWarn}`);
            }
            await fetchCandidates(true);
            return;
          }
          const hint = screenerErrorMessage(result, 500);
          setScanMsg(`Scan failed: ${hint}`);
          alert(`Scan failed: ${hint}`);
        };

        const triggerScreenerScan = useCallback(async (mode = "weekly") => {
          if (scanRunning) return;
          const labels = {
            weekly: "Weekly momentum (8%+ week change)",
            daily: "Daily momentum",
            top_movers: "Top gainers + losers",
            all: "Full scan (daily + movers + weekly)",
          };
          if (!confirm(`Run ${labels[mode] || mode} scan now? This may take up to 2 minutes.`)) return;
          setScanRunning(true);
          setScanMsg("Scan running — fetching market data…");
          try {
            const res = await fetch(`${API_BASE}/timed/admin/screener/run`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ mode }),
            });
            const j = await parseScreenerJson(res);
            if (!j?.ok && !j?.accepted) {
              const hint = screenerErrorMessage(j?.result || j, res.status);
              setScanMsg(`Scan failed: ${hint}`);
              alert(`Scan failed: ${hint}`);
              return;
            }
            if (j?.result && (res.status === 200 || j?.ok)) {
              await finishScanFromResult(j.result, labels[mode]);
              return;
            }
            if (j?.accepted === false && j?.already_running) {
              setScanMsg("Scan already running — polling status…");
            }
            const polled = await pollScreenerUntilDone();
            if (polled.timeout) {
              setScanMsg("Scan still running — refresh candidates in a minute.");
              alert("Scan is still running in the background. Refresh the candidate list in about a minute.");
              return;
            }
            const st = polled.status;
            if (st?.status === "completed") {
              await finishScanFromResult(st.result || {}, labels[mode]);
            } else {
              const hint = screenerErrorMessage(st?.result || { error: st?.error }, 500);
              setScanMsg(`Scan failed: ${hint}`);
              alert(`Scan failed: ${hint}`);
            }
          } catch (e) {
            setScanMsg(`Scan failed: ${String(e.message || e)}`);
            alert(`Scan failed: ${String(e.message || e)}`);
          } finally {
            setScanRunning(false);
          }
        }, [scanRunning, fetchCandidates]);

        // Fetch existing tickers in our universe
        const fetchExistingTickers = useCallback(async () => {
          try {
            const res = await fetch(`${API_BASE}/timed/tickers`, { cache: "no-store" });
            if (res.ok) {
              const json = await res.json();
              const tickers = json.tickers || json.data || [];
              setExistingTickers(new Set(tickers.map(t => String(t).toUpperCase())));
            }
          } catch { /* ignore */ }
        }, []);

        useEffect(() => {
          fetchCandidates();
          fetchExistingTickers();
        }, [fetchCandidates, fetchExistingTickers]);

        // Derived: sectors for filter
        const sectors = useMemo(() => {
          const s = new Set();
          for (const c of candidates) {
            if (c.sector) s.add(c.sector);
          }
          return ["all", ...Array.from(s).sort()];
        }, [candidates]);

        // Derived: scan types present
        const scanTypeCounts = useMemo(() => {
          const counts = { all: candidates.length };
          for (const c of candidates) {
            const st = c.scan_type || "other";
            counts[st] = (counts[st] || 0) + 1;
          }
          return counts;
        }, [candidates]);

        const preferWeeklySort = scanFilter === "weekly_momentum";
        const SORT_OPTIONS = useMemo(() => buildSortOptions(preferWeeklySort), [preferWeeklySort]);

        // Filtered + sorted candidates
        const filteredCandidates = useMemo(() => {
          let result = [...candidates];

          // Scan type filter
          if (scanFilter !== "all") {
            result = result.filter(c => c.scan_type === scanFilter);
          }

          // Sector filter
          if (sectorFilter !== "all") {
            result = result.filter(c => c.sector === sectorFilter);
          }

          // Search
          if (search.trim()) {
            const q = search.trim().toLowerCase();
            result = result.filter(c =>
              (c.ticker || "").toLowerCase().includes(q) ||
              (c.name || "").toLowerCase().includes(q) ||
              (c.sector || "").toLowerCase().includes(q)
            );
          }

          // Sort
          const sortOpt = SORT_OPTIONS.find(s => s.id === sortBy);
          if (sortOpt) result.sort(sortOpt.fn);

          return result;
        }, [candidates, scanFilter, sectorFilter, search, sortBy, SORT_OPTIONS]);

        // Add to universe
        const addToUniverse = useCallback(async (tickers) => {
          if (!tickers.length) return;
          const tickerSet = new Set(tickers.map(t => t.toUpperCase()));
          setAddingTickers(prev => new Set([...prev, ...tickerSet]));
          try {
            const res = await fetch(`${API_BASE}/timed/watchlist/add`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ tickers: tickers.map(t => t.toUpperCase()) }),
            });
            if (res.ok) {
              setAddedTickers(prev => new Set([...prev, ...tickerSet]));
              setExistingTickers(prev => new Set([...prev, ...tickerSet]));
              setSelectedTickers(new Set());
            } else {
              const json = await res.json().catch(() => ({}));
              console.error("Add failed:", json.error || res.statusText);
            }
          } catch (e) {
            console.error("Add failed:", e);
          } finally {
            setAddingTickers(prev => {
              const next = new Set(prev);
              for (const t of tickerSet) next.delete(t);
              return next;
            });
          }
        }, []);

        // Toggle ticker selection
        const toggleSelect = useCallback((ticker) => {
          setSelectedTickers(prev => {
            const next = new Set(prev);
            if (next.has(ticker)) next.delete(ticker);
            else next.add(ticker);
            return next;
          });
        }, []);

        return (
          <div className="min-h-screen pb-16">
            <div className="max-w-[1400px] mx-auto px-4">
              {/* Header */}
              <div className="flex items-center justify-between mb-6">
                <div>
                  <h1 className="text-lg font-semibold tracking-tight text-white">Screener</h1>
                  <p className="text-[13px] text-[#6b7280] mt-0.5">
                    {viewMode === "promote"
                      ? "Promotion Queue — thesis-quality scoring + operator review"
                      : "Discover new tickers not yet in our universe"}
                  </p>
                </div>
                <div className="flex items-center gap-2">
                  {viewMode === "discovery" && isAdmin && selectedTickers.size > 0 && (
                    <button
                      onClick={() => addToUniverse(Array.from(selectedTickers))}
                      className="px-4 py-1.5 rounded-lg text-[13px] font-medium bg-[#00c853]/15 text-[#00c853] border border-[#00c853]/30 hover:bg-[#00c853]/25 transition-all"
                    >
                      Add {selectedTickers.size} to Universe
                    </button>
                  )}
                  {viewMode === "discovery" && isAdmin && (
                    <>
                      <button
                        onClick={() => triggerScreenerScan("weekly")}
                        disabled={scanRunning || loading}
                        className="px-3 py-1.5 rounded-lg text-[12px] font-medium text-[#a78bfa] border border-[#a78bfa]/30 hover:bg-[#a78bfa]/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        title="Run weekly momentum scan (8%+ week change)"
                      >
                        {scanRunning ? "Scanning…" : "Run Weekly Scan"}
                      </button>
                      <button
                        onClick={() => triggerScreenerScan("all")}
                        disabled={scanRunning || loading}
                        className="px-3 py-1.5 rounded-lg text-[12px] font-medium text-[#f5c25c] border border-[#f5c25c]/30 hover:bg-[#f5c25c]/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                        title="Run daily momentum + top movers + weekly (GitHub Actions when configured)"
                      >
                        Run Full Scan
                      </button>
                    </>
                  )}
                  {viewMode === "discovery" && (
                    <button
                      onClick={() => fetchCandidates(true)}
                      disabled={loading || scanRunning}
                      className="px-3 py-1.5 rounded-lg text-[12px] font-medium text-[#00c853] border border-[#00c853]/25 hover:bg-[#00c853]/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                      title="Refresh cached screener results"
                    >
                      {loading ? "Loading..." : "↻ Refresh"}
                    </button>
                  )}
                  {viewMode === "promote" && isAdmin && (
                    <button
                      onClick={triggerPqRebuild}
                      disabled={pqRebuilding}
                      className="px-3 py-1.5 rounded-lg text-[12px] font-medium text-[#f5c25c] border border-[#f5c25c]/30 hover:bg-[#f5c25c]/10 transition-all disabled:opacity-50 disabled:cursor-not-allowed"
                      title="Re-score all candidates with the 7-component thesis-quality framework"
                    >
                      {pqRebuilding ? "Rebuilding…" : "↻ Rebuild Queue"}
                    </button>
                  )}
                </div>
              </div>

              {/* View Mode Toggle — Discovery vs Promotion Queue */}
              <div className="flex items-center gap-1 mb-4 bg-white/[0.02] rounded-lg p-1 border border-white/[0.04] w-fit">
                {[
                  { id: "discovery", label: "Discovery", icon: "🔍", desc: "Raw screener candidates" },
                  { id: "promote",   label: "Promotion Queue", icon: "🎯", desc: "Scored + ready for review" },
                ].map((v) => {
                  const active = viewMode === v.id;
                  return (
                    <button
                      key={v.id}
                      onClick={() => setViewMode(v.id)}
                      className={`px-3 py-1.5 rounded-md text-[12px] transition-all flex items-center gap-1.5 ${
                        active ? "bg-white/[0.08] text-white font-medium" : "text-[#6b7280] hover:text-white hover:bg-white/[0.04]"
                      }`}
                      title={v.desc}
                    >
                      <span>{v.icon}</span>
                      <span>{v.label}</span>
                    </button>
                  );
                })}
              </div>
              {/* ── PROMOTION QUEUE VIEW (admin) ─────────────────────────── */}
              {viewMode === "promote" && (
                <div>
                  {/* Status filter chips */}
                  <div className="flex items-center gap-1 mb-4 bg-white/[0.02] rounded-lg p-1 border border-white/[0.04] w-fit flex-wrap">
                    {[
                      { id: "ready_to_add",  label: "Ready",         color: "#22c55e", desc: "Score ≥ 60, no critical red flags" },
                      { id: "needs_review",  label: "Needs Review",  color: "#f5c25c", desc: "Score 40-60 or worth a look" },
                      { id: "rejected",      label: "Rejected",      color: "#9ca3af", desc: "Score < 40 or auto-rejected" },
                      { id: "approved",      label: "Approved",      color: "#34d399", desc: "Operator decision: approve" },
                      { id: "declined",      label: "Declined",      color: "#f87171", desc: "Operator decision: decline" },
                      { id: "all",           label: "All",           color: "#9ca3af" },
                    ].map((s) => {
                      const active = pqStatusFilter === s.id;
                      return (
                        <button
                          key={s.id}
                          onClick={() => setPqStatusFilter(s.id)}
                          className={`px-3 py-1.5 rounded-md text-[11px] transition-all ${
                            active ? "bg-white/[0.08] font-medium" : "text-[#6b7280] hover:text-white hover:bg-white/[0.04]"
                          }`}
                          style={active ? { color: s.color } : {}}
                          title={s.desc || s.label}
                        >
                          {s.label}
                        </button>
                      );
                    })}
                  </div>

                  {pqErr && (
                    <div className="text-red-400 text-xs mb-3 px-3 py-2 rounded border border-red-500/30 bg-red-500/[0.06]">
                      {pqErr}
                    </div>
                  )}
                  {pqLoading && pqRows.length === 0 && (
                    <div className="text-xs text-[#6b7280] py-8 text-center">Loading promotion queue…</div>
                  )}
                  {!pqLoading && pqRows.length === 0 && !pqErr && (
                    <div className="text-xs text-[#6b7280] py-8 text-center">
                      No candidates with status <strong>{pqStatusFilter}</strong>.
                      {isAdmin && <> Try <button className="underline text-[#f5c25c] ml-1" onClick={triggerPqRebuild}>rebuilding the queue</button>.</>}
                    </div>
                  )}

                  {/* Candidate rows */}
                  <div className="flex flex-col gap-3">
                    {pqRows.map((row) => {
                      const score = Number(row.total_score) || 0;
                      const status = String(row.status || "").toLowerCase();
                      const statusMeta = status === "ready_to_add"  ? { label: "READY TO ADD",  color: "#22c55e", bg: "rgba(34,197,94,0.10)" }
                                       : status === "needs_review"  ? { label: "NEEDS REVIEW",  color: "#f5c25c", bg: "rgba(245,194,92,0.10)" }
                                       : status === "approved"      ? { label: "APPROVED",      color: "#34d399", bg: "rgba(52,211,153,0.12)" }
                                       : status === "declined"      ? { label: "DECLINED",      color: "#f87171", bg: "rgba(248,113,113,0.10)" }
                                       : status === "rejected"      ? { label: "REJECTED",      color: "#9ca3af", bg: "rgba(156,163,175,0.06)" }
                                       :                              { label: status.toUpperCase(), color: "#9ca3af", bg: "rgba(156,163,175,0.06)" };
                      const cmps = row.components || {};
                      const sig = row.signals || {};
                      const flags = Array.isArray(row.red_flags) ? row.red_flags : [];
                      const deciding = pqDeciding.has(row.candidate_id);
                      const mcap = Number(sig?.market_cap) || 0;
                      const mcapDisplay = mcap >= 1e9 ? `$${(mcap/1e9).toFixed(1)}B`
                                       : mcap >= 1e6 ? `$${(mcap/1e6).toFixed(0)}M`
                                       : mcap > 0 ? `$${mcap.toLocaleString()}`
                                       : "—";

                      // 7-component breakdown
                      const COMPS = [
                        { key: "sustain",  label: "Sustain",  max: 20, val: Number(cmps.sustain) || 0, hint: "Distinct-day appearances (single-day spike = 0)" },
                        { key: "quality",  label: "Quality",  max: 20, val: Number(cmps.quality) || 0, hint: "Hard floor: mcap > $2B + avg vol > 1M + price > $5" },
                        { key: "theme",    label: "Theme",    max: 15, val: Number(cmps.theme?.pts) || 0, hint: `Theme alignment ${cmps.theme?.theme ? "· " + cmps.theme.theme : ""}` },
                        { key: "news",     label: "News",     max: 15, val: Number(cmps.news?.pts) || 0, hint: `Catalyst strength · ${cmps.news?.bullish_catalyst_count || 0} bullish` },
                        { key: "insider",  label: "Insider",  max: 10, val: Number(cmps.insider?.pts) || 0, hint: `${cmps.insider?.hi_buys_count || 0} high-signal Form-4 buys` },
                        { key: "macro",    label: "Macro",    max: 10, val: Number(cmps.macro?.pts) || 0, hint: cmps.macro?.signal || "Country / cross-asset alignment" },
                        { key: "peer",     label: "Peer",     max: 10, val: Number(cmps.peer?.pts) || 0, hint: "Theme peers' historical capture rate" },
                      ];

                      return (
                        <div
                          key={row.candidate_id}
                          className="rounded-lg border bg-white/[0.02] hover:bg-white/[0.03] transition-all"
                          style={{ borderColor: statusMeta.color + "30" }}
                        >
                          {/* Header row */}
                          <div className="flex items-start justify-between gap-4 px-4 py-3 border-b border-white/[0.04]">
                            <div className="flex-1 min-w-0">
                              <div className="flex items-baseline gap-3 flex-wrap mb-1">
                                <span className="text-[15px] font-bold text-white tracking-tight">{row.ticker}</span>
                                <span className="text-[11px] text-[#9ca3af]">{sig?.sector || "—"}</span>
                                <span className="text-[11px] text-[#6b7280]">{mcapDisplay}</span>
                                {Number.isFinite(sig?.latest_price) && (
                                  <span className="text-[11px] text-[#d1d5db]">${Number(sig.latest_price).toFixed(2)}</span>
                                )}
                                {Number.isFinite(sig?.latest_change_pct) && (
                                  <span className={`text-[11px] font-semibold ${Number(sig.latest_change_pct) >= 0 ? "text-[#22c55e]" : "text-[#f87171]"}`}>
                                    {Number(sig.latest_change_pct) >= 0 ? "+" : ""}{Number(sig.latest_change_pct).toFixed(2)}%
                                  </span>
                                )}
                                <span
                                  className="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded border"
                                  style={{ color: statusMeta.color, background: statusMeta.bg, borderColor: statusMeta.color + "55" }}
                                >
                                  {statusMeta.label}
                                </span>
                                {/* 2026-06-01 — Show "IN UNIVERSE" badge so the
                                    operator can tell at a glance which
                                    candidates are already tracked. After the
                                    backend dedup fix, in-universe approved
                                    tickers stay in the Approved bucket; this
                                    badge still helps for tickers approved
                                    BEFORE the dedup fix shipped (in_universe
                                    can be true even on a needs_review row from
                                    a stale rebuild) and for cases where the
                                    operator chose decline-then-add-elsewhere. */}
                                {sig?.in_universe && (
                                  <span
                                    className="text-[10px] font-bold tracking-wider px-2 py-0.5 rounded border"
                                    title="Already in your tracked universe (timed:tickers). No action needed unless you want to re-review."
                                    style={{ color: "#a78bfa", background: "rgba(167,139,250,0.10)", borderColor: "rgba(167,139,250,0.40)" }}
                                  >
                                    IN UNIVERSE
                                  </span>
                                )}
                              </div>
                              <div className="text-[10px] text-[#6b7280]">
                                {Array.isArray(sig?.themes) && sig.themes.length > 0 && <>Themes: {sig.themes.join(", ")} · </>}
                                {Array.isArray(sig?.scan_types) && sig.scan_types.length > 0 && <>Scans: {sig.scan_types.join(", ")} · </>}
                                Appearances 7d: {row.appearances_7d || 0}
                                {row.decided_by && <> · Decided by {row.decided_by} {row.decided_at ? new Date(Number(row.decided_at)).toLocaleString() : ""}</>}
                              </div>
                            </div>
                            <div className="flex items-baseline gap-2 shrink-0">
                              <span className={`text-[28px] font-bold tabular-nums leading-none ${score >= 60 ? "text-[#22c55e]" : score >= 40 ? "text-[#f5c25c]" : "text-[#6b7280]"}`}>
                                {score}
                              </span>
                              <span className="text-[12px] text-[#6b7280]">/100</span>
                            </div>
                          </div>

                          {/* 7-component breakdown */}
                          <div className="px-4 py-3 grid grid-cols-2 md:grid-cols-7 gap-2">
                            {COMPS.map((c) => {
                              const pct = c.max > 0 ? Math.min(100, (c.val / c.max) * 100) : 0;
                              const color = pct >= 70 ? "#22c55e" : pct >= 40 ? "#f5c25c" : "#6b7280";
                              return (
                                <div key={c.key} title={c.hint} className="cursor-help">
                                  <div className="text-[9px] tracking-wider font-semibold uppercase text-[#6b7280] mb-1">{c.label}</div>
                                  <div className="text-[12px] font-bold tabular-nums" style={{ color }}>
                                    {c.val}<span className="text-[#4b5563] font-normal">/{c.max}</span>
                                  </div>
                                  <div className="h-1 mt-1 rounded-full bg-white/[0.05] overflow-hidden">
                                    <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, background: color }} />
                                  </div>
                                </div>
                              );
                            })}
                          </div>

                          {/* Red flags (only when present) */}
                          {flags.length > 0 && (
                            <div className="px-4 py-2 border-t border-[#f87171]/20 bg-[#f87171]/[0.04]">
                              <div className="text-[9px] tracking-wider font-semibold uppercase text-[#f87171] mb-1">Red Flags · pump-and-dump signature deductions</div>
                              <div className="flex flex-wrap gap-1.5">
                                {flags.map((f, i) => (
                                  <span
                                    key={i}
                                    className="text-[10px] px-2 py-0.5 rounded border"
                                    style={{ color: "#fca5a5", background: "rgba(248,113,113,0.08)", borderColor: "rgba(248,113,113,0.25)" }}
                                  >
                                    {String(f).replace(/_/g, " ")}
                                  </span>
                                ))}
                              </div>
                            </div>
                          )}

                          {/* Thesis text */}
                          {row.thesis_text && (
                            <div className="px-4 py-3 border-t border-white/[0.04]">
                              <div className="text-[9px] tracking-wider font-semibold uppercase text-[#6b7280] mb-1">Thesis</div>
                              <div
                                className="text-[12px] text-[#d1d5db] leading-relaxed"
                                dangerouslySetInnerHTML={{
                                  __html: String(row.thesis_text || "")
                                    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
                                    .replace(/\*\*([^*]+)\*\*/g, '<strong class="text-white">$1</strong>'),
                                }}
                              />
                            </div>
                          )}

                          {/* Operator actions */}
                          {isAdmin && (status === "ready_to_add" || status === "needs_review") && (
                            <div className="px-4 py-3 border-t border-white/[0.04] flex items-center gap-2">
                              <button
                                onClick={() => decideOnCandidate(row.candidate_id, "approve")}
                                disabled={deciding}
                                className="px-3 py-1.5 rounded text-[12px] font-semibold text-[#22c55e] border border-[#22c55e]/40 hover:bg-[#22c55e]/10 transition-all disabled:opacity-50"
                              >
                                {deciding ? "Working…" : "✓ Approve · add to universe"}
                              </button>
                              <button
                                onClick={() => decideOnCandidate(row.candidate_id, "decline")}
                                disabled={deciding}
                                className="px-3 py-1.5 rounded text-[12px] font-semibold text-[#f87171] border border-[#f87171]/40 hover:bg-[#f87171]/10 transition-all disabled:opacity-50"
                              >
                                {deciding ? "Working…" : "✗ Decline"}
                              </button>
                              <span className="text-[10px] text-[#4b5563] ml-auto">
                                First seen {row.first_seen_at ? new Date(Number(row.first_seen_at)).toLocaleDateString() : "—"}
                              </span>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>

                  {/* Footer / docs */}
                  {pqRows.length > 0 && (
                    <div className="text-[10px] text-[#4b5563] mt-4 italic">
                      Backed by <code>GET /timed/admin/discovery/promotion-queue</code>. Scoring framework:
                      Sustain 20 · Quality 20 · Theme 15 · News 15 · Insider 10 · Macro 10 · Peer 10 = 100.
                      Auto-status: ≥60 + no critical flags → ready · ≥40 + no critical → needs review · otherwise → rejected.
                      Operator decisions persist across rebuilds.
                    </div>
                  )}
                </div>
              )}

              {/* ── DISCOVERY VIEW (default) ──────────────────────────────── */}
              {viewMode === "discovery" && <React.Fragment>

              {/* Last scan timestamp */}
              {(scanTs || scanMsg) && (
                <div className="text-[11px] text-[#4b5563] mb-3 -mt-4">
                  {scanMsg && <span className="text-[#a78bfa] mr-3">{scanMsg}</span>}
                  {scanTs && <>Last scan: {new Date(scanTs).toLocaleString()} ({(() => {
                    const mins = Math.round((Date.now() - new Date(scanTs).getTime()) / 60000);
                    if (mins < 60) return `${mins}m ago`;
                    if (mins < 1440) return `${Math.round(mins/60)}h ago`;
                    return `${Math.round(mins/1440)}d ago`;
                  })()})</>}
                </div>
              )}

              {/* Filters Row */}
              <div className="flex items-center gap-4 flex-wrap mb-4">
                {/* Scan Type Toggles */}
                <div className="flex items-center gap-1 bg-white/[0.02] rounded-lg p-1 border border-white/[0.04]">
                  {SCAN_TYPES.map(st => {
                    const count = scanTypeCounts[st.id] || 0;
                    const active = scanFilter === st.id;
                    return (
                      <button
                        key={st.id}
                        onClick={() => setScanFilter(st.id)}
                        className={`px-3 py-1.5 rounded-md text-[12px] transition-all flex items-center gap-1.5 ${
                          active
                            ? "bg-white/[0.08] text-white font-medium"
                            : "text-[#6b7280] hover:text-white hover:bg-white/[0.04]"
                        }`}
                      >
                        <span>{st.icon}</span>
                        <span>{st.label}</span>
                        {count > 0 && (
                          <span className={`text-[10px] px-1.5 py-0.5 rounded-full ${
                            active ? "bg-white/[0.1] text-white" : "bg-white/[0.04] text-[#4b5563]"
                          }`}>
                            {count}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>

                {/* Sector Filter */}
                <select
                  value={sectorFilter}
                  onChange={e => setSectorFilter(e.target.value)}
                  className="bg-white/[0.03] border border-white/[0.06] rounded-lg px-3 py-1.5 text-[12px] text-[#9ca3af] focus:outline-none focus:border-white/[0.12] appearance-none cursor-pointer"
                  style={{ minWidth: "140px" }}
                >
                  {sectors.map(s => (
                    <option key={s} value={s} style={{ background: "#1a1d23", color: "#e5e7eb" }}>
                      {s === "all" ? "All Sectors" : s}
                    </option>
                  ))}
                </select>

                {/* Sort */}
                <select
                  value={sortBy}
                  onChange={e => setSortBy(e.target.value)}
                  className="bg-white/[0.03] border border-white/[0.06] rounded-lg px-3 py-1.5 text-[12px] text-[#9ca3af] focus:outline-none focus:border-white/[0.12] appearance-none cursor-pointer"
                  style={{ minWidth: "130px" }}
                >
                  {SORT_OPTIONS.map(s => (
                    <option key={s.id} value={s.id} style={{ background: "#1a1d23", color: "#e5e7eb" }}>
                      {s.label}
                    </option>
                  ))}
                </select>

                {/* Search */}
                <div className="relative flex-1 max-w-[260px]">
                  <input
                    type="text"
                    value={search}
                    onChange={e => setSearch(e.target.value)}
                    placeholder="Search ticker or name..."
                    className="w-full bg-white/[0.03] border border-white/[0.06] rounded-lg px-3 py-1.5 text-[12px] text-white placeholder:text-[#4b5563] focus:outline-none focus:border-white/[0.12]"
                  />
                  {search && (
                    <button
                      onClick={() => setSearch("")}
                      className="absolute right-2 top-1/2 -translate-y-1/2 text-[#4b5563] hover:text-white text-sm"
                    >
                      ×
                    </button>
                  )}
                </div>

                {/* Count */}
                <span className="text-[11px] text-[#4b5563] ml-auto">
                  {filteredCandidates.length} result{filteredCandidates.length !== 1 ? "s" : ""}
                </span>
              </div>

              {/* Error */}
              {error && (
                <div className="tt-card p-4 mb-4 border border-red-500/20">
                  <span className="text-[13px] text-red-400">{error}</span>
                </div>
              )}

              {/* Loading */}
              {loading && candidates.length === 0 && (
                <div className="flex items-center justify-center py-20">
                  <div className="loading-spinner" style={{ width: "32px", height: "32px" }} />
                </div>
              )}

              {/* Results Table */}
              {!loading && filteredCandidates.length === 0 && (
                <div className="tt-card p-12 text-center">
                  <p className="text-[#6b7280] text-sm mb-2">No candidates found</p>
                  <p className="text-[#4b5563] text-xs">
                    {scanFilter === "weekly_momentum"
                      ? <>No weekly momentum candidates yet. {isAdmin && <>Click <button className="underline text-[#a78bfa]" onClick={() => triggerScreenerScan("weekly")}>Run Weekly Scan</button> to populate.</>}</>
                      : isAdmin
                        ? <>Click <button className="underline text-[#f5c25c]" onClick={() => triggerScreenerScan("all")}>Run Full Scan</button> or wait for the nightly cron (22:30 UTC).</>
                        : "Waiting for the nightly discovery scan."}
                  </p>
                </div>
              )}

              {filteredCandidates.length > 0 && (
                <div className="tt-card overflow-hidden">
                  {/* Table Header */}
                  <div className="grid items-center gap-3 px-4 py-2.5 border-b border-white/[0.06] text-[10px] font-medium text-[#4b5563] uppercase tracking-wider"
                    style={{ gridTemplateColumns: "32px 80px 1fr 80px 80px 90px 70px 80px 100px 120px" }}>
                    <div className="flex items-center">
                      {isAdmin && (
                        <input
                          type="checkbox"
                          checked={selectedTickers.size > 0 && selectedTickers.size === filteredCandidates.filter(c => !existingTickers.has(c.ticker?.toUpperCase())).length}
                          onChange={(e) => {
                            if (e.target.checked) {
                              const newTickers = filteredCandidates
                                .filter(c => !existingTickers.has(c.ticker?.toUpperCase()))
                                .map(c => c.ticker?.toUpperCase());
                              setSelectedTickers(new Set(newTickers));
                            } else {
                              setSelectedTickers(new Set());
                            }
                          }}
                          className="w-3.5 h-3.5 rounded accent-[#00c853] cursor-pointer"
                        />
                      )}
                    </div>
                    <div>Ticker</div>
                    <div>Name</div>
                    <div className="text-right">Price</div>
                    <div className="text-right">Change</div>
                    <div className="text-right">Volume</div>
                    <div className="text-right">RSI</div>
                    <div className="text-right">MCap</div>
                    <div>Sector</div>
                    <div className="text-center">Action</div>
                  </div>

                  {/* Table Body */}
                  <div className="divide-y divide-white/[0.03]">
                    {filteredCandidates.map((c, idx) => {
                      const ticker = (c.ticker || "").toUpperCase();
                      const inUniverse = existingTickers.has(ticker);
                      const justAdded = addedTickers.has(ticker);
                      const isAdding = addingTickers.has(ticker);
                      const isSelected = selectedTickers.has(ticker);
                      const changePct = getCandidateChangePct(c, c.scan_type === "weekly_momentum");
                      const isPositive = Number(changePct) >= 0;

                      return (
                        <div
                          key={`${ticker}-${idx}`}
                          className={`grid items-center gap-3 px-4 py-2.5 text-[13px] transition-all hover:bg-white/[0.02] ${isSelected ? "bg-[#00c853]/[0.04]" : ""}`}
                          style={{ gridTemplateColumns: "32px 80px 1fr 80px 80px 90px 70px 80px 100px 120px" }}
                        >
                          {/* Checkbox — admin only */}
                          <div>
                            {isAdmin && !inUniverse && (
                              <input
                                type="checkbox"
                                checked={isSelected}
                                onChange={() => toggleSelect(ticker)}
                                className="w-3.5 h-3.5 rounded accent-[#00c853] cursor-pointer"
                              />
                            )}
                          </div>

                          {/* Ticker */}
                          <div className="flex items-center gap-1.5">
                            <span className="font-semibold text-white">{ticker}</span>
                            {c.scan_type && (
                              <span className={`text-[8px] px-1 py-0.5 rounded font-medium ${
                                c.scan_type === "top_gainer" ? "bg-green-500/15 text-green-400" :
                                c.scan_type === "top_loser" ? "bg-red-500/15 text-red-400" :
                                c.scan_type === "weekly_momentum" ? "bg-purple-500/15 text-purple-400" :
                                "bg-blue-500/15 text-blue-400"
                              }`}>
                                {c.scan_type === "daily_momentum" ? "MOM" :
                                 c.scan_type === "top_gainer" ? "GAIN" :
                                 c.scan_type === "top_loser" ? "LOSS" :
                                 c.scan_type === "weekly_momentum" ? "WEEK" : c.scan_type.substring(0, 4).toUpperCase()}
                              </span>
                            )}
                          </div>

                          {/* Name */}
                          <div className="text-[#9ca3af] truncate text-[12px]">{c.name || ticker}</div>

                          {/* Price */}
                          <div className="text-right tabular-nums text-white">
                            {c.price ? `$${Number(c.price).toFixed(2)}` : "—"}
                          </div>

                          {/* Change */}
                          <div className={`text-right tabular-nums font-medium ${
                            Number(changePct) > 0 ? "text-[#00c853]" : Number(changePct) < 0 ? "text-[#ff5252]" : "text-[#6b7280]"
                          }`}>
                            {changePct != null ? fmtPct(changePct) : "—"}
                          </div>

                          {/* Volume */}
                          <div className="text-right tabular-nums text-[#9ca3af]">{fmtVol(c.volume)}</div>

                          {/* RSI */}
                          <div className={`text-right tabular-nums ${
                            c.rsi > 70 ? "text-red-400" : c.rsi < 30 ? "text-green-400" : "text-[#9ca3af]"
                          }`}>
                            {c.rsi ? c.rsi.toFixed(0) : "—"}
                          </div>

                          {/* Market Cap */}
                          <div className="text-right tabular-nums text-[#9ca3af]">{fmtMcap(c.market_cap)}</div>

                          {/* Sector */}
                          <div className="text-[11px] text-[#6b7280] truncate">{c.sector || "—"}</div>

                          {/* Action */}
                          <div className="flex justify-center">
                            {inUniverse && !justAdded ? (
                              <span className="text-[11px] px-2 py-1 rounded-md bg-white/[0.04] text-[#6b7280]">
                                In Universe
                              </span>
                            ) : justAdded ? (
                              <span className="text-[11px] px-2 py-1 rounded-md bg-[#00c853]/15 text-[#00c853] font-medium">
                                Added ✓
                              </span>
                            ) : isAdding ? (
                              <span className="text-[11px] px-2 py-1 rounded-md bg-white/[0.04] text-[#6b7280]">
                                Adding...
                              </span>
                            ) : isAdmin ? (
                              <button
                                onClick={() => addToUniverse([ticker])}
                                className="text-[11px] px-2.5 py-1 rounded-md bg-[#00c853]/10 text-[#00c853] border border-[#00c853]/20 hover:bg-[#00c853]/20 transition-all font-medium"
                              >
                                + Add
                              </button>
                            ) : (
                              <span className="text-[11px] px-2 py-1 rounded-md bg-white/[0.02] text-[#4b5563]" title="Admin access required">
                                🔒
                              </span>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {/* Summary Stats */}
              {candidates.length > 0 && (
                <div className="flex items-center gap-6 mt-4 mb-8 px-1">
                  <div className="text-[11px] text-[#4b5563]">
                    Total candidates: <span className="text-[#9ca3af]">{candidates.length}</span>
                  </div>
                  <div className="text-[11px] text-[#4b5563]">
                    Already tracked: <span className="text-[#9ca3af]">{candidates.filter(c => existingTickers.has((c.ticker || "").toUpperCase())).length}</span>
                  </div>
                  <div className="text-[11px] text-[#4b5563]">
                    New discoveries: <span className="text-[#00c853]">{candidates.filter(c => !existingTickers.has((c.ticker || "").toUpperCase())).length}</span>
                  </div>
                </div>
              )}

              </React.Fragment>}
              {/* end Discovery view */}
            </div>
          </div>
        );
      }

      // ── Mount ──────────────────────────────────────────────────────────────
      const AuthGate = window.TimedAuthGate;
      const screenerApp = AuthGate
        ? <AuthGate apiBase={API_BASE} requiredTier="admin">{(user) => <App user={user} />}</AuthGate>
        : <App />;
      ReactDOM.createRoot(document.getElementById("root")).render(screenerApp);
    </script>
    <script>
      (function() {
        fetch("/timed/daily-brief/badge", { cache: "no-store" })
          .then(r => r.json())
          .then(d => {
            if (d?.badge?.ts) {
              const seen = Number(localStorage.getItem("tt_brief_seen") || 0);
              if (d.badge.ts > seen) {
                const el = document.getElementById("brief-badge");
                if (el) el.classList.remove("hidden");
              }
            }
          })
          .catch(() => {});
      })();
    </script>
    <footer id="legal-footer">
      For informational and educational purposes only. Not investment advice. Past performance does not guarantee future results. All trading involves risk of loss. <a href="/terms.html" style="color:#6b7280;text-decoration:underline;">Full Terms</a> · Market data powered by <a href="https://twelvedata.com" target="_blank" rel="noopener" style="color:#6b7280;text-decoration:underline;">Twelve Data</a>
    </footer>
  </body>
</html>
