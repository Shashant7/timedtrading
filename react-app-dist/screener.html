      :root {

        --tt-bg-hover: var(--vf-bark-hi, #1A2B22);

        --tt-accent: var(--vf-mint, #38F2A1);
        --tt-accent-dim: var(--vf-mint-dim, rgba(56,242,161,0.14));
        --tt-negative: #f43f5e;
        --tt-negative-dim: rgba(244,63,94,0.12);
        --tt-radius: var(--vf-radius-md, 18px);
        --tt-radius-sm: 10px;
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-display: "Manrope", "Inter", -apple-system, sans-serif;
        --tt-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body {
        margin: 0;
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
      }
      .tt-page { max-width: 1400px; margin: 0 auto; padding: 18px 24px 96px; }
      .tt-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
      }
      .tt-card-pad { padding: 18px 20px 16px; }
      .tt-page-title {
        margin: 0 0 6px;
        font-family: var(--tt-font-display);
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--tt-text);
      }
      .tt-page-lede { margin: 0; font-size: 13px; line-height: 1.5; color: var(--tt-text-muted); }
      .tt-btn {
        border-radius: 999px;
        padding: 8px 14px;
        font-size: 12px;
        font-weight: 600;
        border: 1px solid transparent;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      }
      .tt-btn:disabled { opacity: 0.45; cursor: not-allowed; }
      .tt-btn--primary { background: var(--tt-accent); color: #0B1410; }
      .tt-btn--primary:hover:not(:disabled) { filter: brightness(1.05); }
      .tt-btn--ghost { background: var(--tt-bg-elev); border-color: var(--tt-border); color: var(--tt-text-muted); }
      .tt-btn--ghost:hover:not(:disabled) { border-color: var(--tt-border-hi); color: var(--tt-text); }
      .tt-input {
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        padding: 8px 12px;
        font-size: 13px;
        color: var(--tt-text);
      }
      .tt-input:focus { outline: none; border-color: var(--tt-accent); box-shadow: 0 0 0 2px var(--tt-accent-dim); }
      .tt-pill-bar {
        display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 999px;
        padding: 4px;
        width: fit-content;
      }
      .tt-pill {
        padding: 6px 14px;
        border-radius: 999px;
        font-size: 12px;
        border: none;
        background: transparent;
        color: var(--tt-text-muted);
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .tt-pill:hover { background: var(--tt-bg-elev); color: var(--tt-text); }
      .tt-pill.active { background: var(--tt-bg-elev); color: var(--tt-text); font-weight: 600; }
      .loading-spinner {
        width: 28px; height: 28px;
        position: relative; display: inline-block;
      }
      .loading-spinner::before {
        content: ""; position: absolute; inset: 0; border-radius: 6px;
        background: linear-gradient(135deg, rgba(56,242,161,0.15), rgba(56,242,161,0.04));
        animation: tt-loader-pulse 1.6s ease-in-out infinite;
      }
      .loading-spinner::after {
        content: ""; position: absolute; left: 3px; right: 3px; top: 50%; height: 2px;
        background: linear-gradient(90deg, transparent, #38F2A1, #5ff5b8, #A6F7CF, transparent);
        background-size: 200% 100%; border-radius: 1px;
        animation: tt-loader-sweep 1.2s ease-in-out infinite;
      }
      @keyframes tt-loader-pulse { 0%, 100% { opacity: 0.4; transform: scale(0.92); } 50% { opacity: 1; transform: scale(1); } }
      @keyframes tt-loader-sweep { 0% { background-position: -100% 0; opacity: 0.5; } 50% { opacity: 1; } 100% { background-position: 200% 0; opacity: 0.5; } }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes pulse-badge {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.7; transform: scale(1.15); }
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--tt-border-hi); border-radius: 3px; }
      body:not([data-user-role="admin"]) a[data-admin-only] { display: none !important; }

    <script>
      (function() {
        fetch("/timed/daily-brief/badge", { cache: "no-store" })
          .then(r => r.json())
          .then(d => {
            if (d?.badge?.ts) {
              const seen = Number(localStorage.getItem("tt_brief_seen") || 0);
              if (d.badge.ts > seen) {
                const el = document.getElementById("brief-badge");
                if (el) el.classList.remove("hidden");
              }
            }
          })
          .catch(() => {});
      })();
    </script>
