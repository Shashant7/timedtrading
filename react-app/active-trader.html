    <style>
      :root {
        /* 2026-06-10 — VERDA MIGRATION (matches today.html exactly).
           Solid Ink/Bark/Moss surfaces (no alpha overlays), single mint
           accent, Manrope display face. Data semantics (--tt-up / --tt-dn)
           keep their green/red meaning — mint is the CTA/brand accent,
           NEVER a "price up" color. See skills/verda-ui-migration.md. */
        --tt-bg-base: var(--vf-ink, #0B1410);
        --tt-bg-surface: var(--vf-bark, #13201A);
        --tt-bg-elev: var(--vf-bark-hi, #1A2B22);
        --tt-border: var(--vf-moss, #1F3128);
        --tt-border-hi: var(--vf-moss-hi, #2A4136);
        --tt-text: var(--vf-cream, #E8F2EC);
        --tt-text-muted: var(--vf-sage, #8AA39A);
        --tt-text-dim: #6E867D;
        --tt-text-faint: #51635A;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: var(--vf-mint, #38F2A1);
        --tt-accent-dim: var(--vf-mint-dim, rgba(56,242,161,0.14));
        --tt-violet: var(--vf-spring, #A6F7CF);
        --tt-violet-dim: rgba(166,247,207,0.12);
        --tt-cyan: var(--vf-spring, #A6F7CF);
        --tt-cyan-dim: rgba(166,247,207,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-display: "Manrope", "Inter", -apple-system, sans-serif;
        --tt-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;

        /* Shared ds-* components (ticker cards, chips, rail panels) read
           these tokens from tt-tokens.css — re-point them here so every
           shared component on THIS page picks up the Verda palette. */
        --ds-bg-canvas: var(--vf-ink, #0B1410);
        --ds-bg-surface: var(--vf-bark, #13201A);
        --ds-bg-surface-hi: var(--vf-bark-hi, #1A2B22);
        --ds-bg-glass: rgba(56, 242, 161, 0.035);
        --ds-bg-glass-hi: rgba(56, 242, 161, 0.07);
        --ds-text-display: var(--vf-cream, #E8F2EC);
        --ds-text-body: #CFDED6;
        --ds-text-muted: var(--vf-sage, #8AA39A);
        --ds-text-faint: #51635A;
        --ds-accent: var(--vf-mint, #38F2A1);
        --ds-accent-hi: var(--vf-spring, #A6F7CF);
        --ds-accent-soft: #5BE8AB;
        --ds-accent-dim: rgba(56, 242, 161, 0.14);
        --ds-accent-glow: rgba(56, 242, 161, 0.40);
        --ds-stroke-soft: rgba(166, 247, 207, 0.06);
        --ds-stroke: var(--vf-moss, #1F3128);
        --ds-stroke-hi: var(--vf-moss-hi, #2A4136);
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: var(--vf-radius-md, 18px); }
      .tt-card-pad { padding: 18px 20px 16px; }
      .tt-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-sec-h { font-family: var(--tt-font-display); font-size: 17px; font-weight: 800; letter-spacing: -0.02em; color: var(--tt-text); }

      /* Top nav (matches /today.html) */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
        transition: background 120ms ease, color 120ms ease;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
      }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Page hero — mirrors today.html's .tt-status tier-1 strip:
         eyebrow label + Manrope greeting on a bark surface. */
      .at-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 16px 18px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        margin-bottom: 20px;
      }
      .at-hero h1 { font-family: var(--tt-font-display); font-size: 22px; font-weight: 800; letter-spacing: -0.025em; margin: 0; }
      .at-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .at-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; }
      .at-hero .pills { display: inline-flex; gap: 8px; flex-wrap: wrap; }
      .at-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 10px;
        font-size: 11.5px; font-weight: 700;
        border-radius: 999px;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
        color: var(--tt-text-muted);
      }
      .at-pill .dot { width: 6px; height: 6px; border-radius: 50%; }
      .at-pill.regime-on   { color: var(--tt-up-soft);  background: var(--tt-up-bg);  border-color: rgba(34,197,94,0.25); }
      .at-pill.regime-off  { color: var(--tt-dn-soft);  background: var(--tt-dn-bg);  border-color: rgba(244,63,94,0.25); }
      .at-pill.regime-mix  { color: var(--tt-accent);   background: var(--tt-accent-dim); border-color: rgba(56,242,161,0.30); }
      .at-pill strong { color: inherit; }
      @media (max-width: 720px) {
        .at-hero { grid-template-columns: 1fr; }
        .at-hero h1 { font-size: 18px; }
      }

      /* 2026-06-05 — Search + lane-filter controls. These classes were used in
         the markup but never had CSS, so the search input + filter chips
         rendered unstyled (run-together text, cut-off placeholder). Mirrors the
         Investor page's .inv-controls for cross-page consistency. */
      .at-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .at-search-wrap {
        position: relative;
        flex: 1 1 320px;
        max-width: 480px;
        display: flex;
        align-items: center;
      }
      .at-search-icon {
        position: absolute;
        left: 12px;
        color: var(--tt-text-dim);
        pointer-events: none;
      }
      .at-search {
        width: 100%;
        height: 36px;
        padding: 0 36px 0 36px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        font-family: var(--tt-font);
        font-size: 13px;
        color: var(--tt-text);
        transition: border-color 120ms ease, background 120ms ease;
      }
      .at-search::placeholder { color: var(--tt-text-faint); }
      .at-search:focus {
        outline: none;
        border-color: var(--tt-border-hi);
        background: var(--tt-bg-elev);
      }
      .at-search-clear {
        position: absolute;
        right: 6px;
        width: 24px;
        height: 24px;
        background: transparent;
        border: 0;
        color: var(--tt-text-dim);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
        border-radius: 6px;
      }
      .at-search-clear:hover {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
      }
      .at-filter-chips {
        display: inline-flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .at-chip {
        font-family: var(--tt-font);
        font-size: 12px;
        font-weight: 600;
        padding: 6px 12px;
        background: var(--tt-bg-surface);
        color: var(--tt-text-muted);
        border: 1px solid var(--tt-border);
        border-radius: 999px;
        cursor: pointer;
        white-space: nowrap;
        transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
      }
      .at-chip:hover:not(:disabled) {
        color: var(--tt-text);
        background: var(--tt-bg-elev);
      }
      .at-chip.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
        border-color: rgba(56,242,161,0.30);
      }
      .at-chip:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* Account summary strip — small KPI tiles for the trader / investor account */
      .at-account-strip {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        padding: 14px 16px;
        margin-bottom: 14px;
      }
      .at-account-strip__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 10px;
      }
      .at-account-strip__label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
      }
      .at-account-strip__link {
        font-size: 11.5px;
        color: var(--tt-cyan);
        text-decoration: none;
        font-weight: 600;
      }
      .at-account-strip__link:hover { text-decoration: underline; }
      .at-account-strip__grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 1024px) {
        .at-account-strip__grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      }
      @media (max-width: 540px) {
        .at-account-strip__grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      .at-account-strip__tile {
        padding: 9px 11px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }
      .at-account-strip__l {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
      }
      .at-account-strip__v {
        font-family: var(--tt-font-mono);
        font-size: 16px;
        font-weight: 700;
        color: var(--tt-text);
        line-height: 1.2;
      }
      .at-account-strip__v.up { color: var(--tt-up-soft); }
      .at-account-strip__v.dn { color: var(--tt-dn-soft); }
      .at-account-strip__sub {
        font-size: 11px;
        color: var(--tt-text-dim);
        font-weight: 600;
      }

      /* Brief summary block (regime + open positions chips + pipeline) */
      .at-brief {
        padding: 16px 18px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        margin-bottom: 24px;
      }
      .at-brief-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 18px;
        align-items: center;
        margin-bottom: 12px;
      }
      .at-brief-row:last-child { margin-bottom: 0; }
      .at-brief-narrative {
        font-size: 14px;
        line-height: 1.55;
        color: var(--tt-text);
        margin: 0 0 14px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--tt-border);
      }
      .at-brief-label {
        font-size: 11px; font-weight: 700; letter-spacing: 0.10em;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        margin-right: 6px;
        min-width: 110px;
      }
      .at-brief-chip {
        font-family: var(--tt-font-mono);
        font-size: 11px;
        padding: 3px 8px;
        border-radius: 6px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
        white-space: nowrap;
      }
      .at-brief-chip.lane-hold   { color: var(--tt-up-soft);  background: var(--tt-up-bg);  border-color: rgba(34,197,94,0.25); }
      .at-brief-chip.lane-defend { color: #fb923c;            background: rgba(251,146,60,0.10); border-color: rgba(251,146,60,0.30); }
      .at-brief-chip.lane-trim   { color: #facc15;            background: rgba(250,204,21,0.10); border-color: rgba(250,204,21,0.30); }
      .at-brief-chip.lane-exit   { color: var(--tt-dn-soft);  background: var(--tt-dn-bg);  border-color: rgba(244,63,94,0.25); }
      .at-brief-chip .pl { font-weight: 700; margin-left: 4px; }
      .at-brief-chip .pl.up   { color: var(--tt-up); }
      .at-brief-chip .pl.down { color: var(--tt-dn); }

      /* Kanban lanes */
      .lane {
        display: grid;
        grid-template-columns: 100px 1fr;
        align-items: stretch;
        margin-bottom: 14px;
      }
      @media (max-width: 720px) {
        .lane { grid-template-columns: 1fr; }
      }
      .lane-head {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        gap: 4px;
        padding: 14px 12px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-right: 0;
        border-radius: var(--vf-radius-md, 18px) 0 0 var(--vf-radius-md, 18px);
        position: relative;
      }
      @media (max-width: 720px) {
        .lane-head {
          flex-direction: row;
          justify-content: space-between;
          border-right: 1px solid var(--tt-border);
          border-bottom: 0;
          border-radius: var(--vf-radius-md, 18px) var(--vf-radius-md, 18px) 0 0;
        }
      }
      .lane-head::before {
        content: "";
        position: absolute;
        top: 14px; bottom: 14px; left: 0;
        width: 4px;
        background: var(--lane-accent, var(--tt-text-faint));
        border-radius: 2px;
      }
      .lane-name {
        font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--lane-accent, var(--tt-text-dim));
      }
      .lane-count {
        font-family: var(--tt-font-mono);
        font-size: 11px;
        color: var(--tt-text-dim);
      }
      .lane-body {
        padding: 12px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 0 var(--vf-radius-md, 18px) var(--vf-radius-md, 18px) 0;
        min-height: 100px;
        overflow-x: auto;
        overflow-y: hidden;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.12) transparent;
      }
      @media (max-width: 720px) {
        .lane-body { border-radius: 0 0 var(--vf-radius-md, 18px) var(--vf-radius-md, 18px); }
      }
      .lane-body::-webkit-scrollbar { height: 6px; }
      .lane-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
      .lane-cards {
        display: flex;
        flex-direction: row;
        gap: 10px;
        min-height: 100px;
      }
      .lane-cards .ds-tickercard {
        flex: 0 0 auto;
        width: 280px;
      }
      .lane-empty {
        font-size: 12px;
        color: var(--tt-text-faint);
        padding: 24px 8px;
      }

  <body class="vf-page">
    <div id="global-nav-root"></div>
    <script src="shared-nav.js?v=20260611a"></script>

    <!-- Explicit mount target for tt-activity-strip.js. See same block in
         today.html — auto-mount via querySelector("nav.topnav") was
         unreliable here, explicit container fixes it. -->
    <div data-tt-activity-strip></div>

    <div id="root">
      <main>
        <div class="tt-card tt-card-pad" style="text-align:center;color:var(--tt-text-muted)">Loading Active Trader…</div>
      </main>
    </div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;
      const h = React.createElement;
      const API_BASE = "";

      // ── TT Selected universe (mirror of index-react GROUPS at line 2965).
      //   Same shape as today.html.
      const TT_GROUPS = {
        UPTICKS: new Set([
          "RDDT","AMZN","BABA","TSLA","KO","WMT","ETHA","BRK-B","MTB",
          "AMGN","GILD","CSX","GEV","HII","JCI","PH","PWR","TT",
          "CLS","FSLR","PANW","CRS","VST","BG","MRK","QXO","AXP",
        ]),
        GRNI: new Set(), GRNJ: new Set(), GRNY: new Set(),
      };
      function _norm(s) {
        let v = String(s || "").trim().toUpperCase();
        if (v === "BRK.B") v = "BRK-B";
        return v;
      }
      window.isTickerTTSelected = function (sym) {
        const T = _norm(sym);
        return (
          TT_GROUPS.UPTICKS.has(T) ||
          TT_GROUPS.GRNI.has(T) ||
          TT_GROUPS.GRNJ.has(T) ||
          TT_GROUPS.GRNY.has(T)
        );
      };
      (async () => {
        try {
          const r = await fetch(`${API_BASE}/timed/etf/groups`, { cache: "no-store" });
          if (!r.ok) return;
          const j = await r.json();
          if (j?.ok && j.groups) {
            for (const [etf, tickers] of Object.entries(j.groups)) {
              if (TT_GROUPS[etf] !== undefined && Array.isArray(tickers)) {
                TT_GROUPS[etf] = new Set(tickers.map((t) => _norm(t)));
              }
            }
          }
        } catch (_) {}
      })();

      // ── Fetch helpers ──────────────────────────────────────────
      // V15 P0.7.181 — Routed through TTFetchCache so the AT board
      // paints instantly on second + subsequent loads. 90s freshness
      // budget matches the scoring cron cadence; revalidates in the
      // background.
      const CACHE = (typeof window !== "undefined" && window.TTFetchCache) || null;
      async function fetchAll() {
        if (CACHE) {
          return CACHE.get(`${API_BASE}/timed/all`, {
            ttlMs: 90 * 1000,
            maxAgeMs: 30 * 60 * 1000,
            fetchOpts: { credentials: "include", cache: "no-store" },
          });
        }
        const r = await fetch(`${API_BASE}/timed/all?_t=${Date.now()}`, {
          credentials: "include",
          cache: "no-store",
        });
        return r.ok ? r.json() : { ok: false };
      }

      // ── Trader book helpers — mirror index-react EarlyMoversPanel (line 15067).
      function traderBookIsOpen(tr) {
        if (!tr || typeof tr !== "object") return false;
        const status = String(tr.status || "").toUpperCase();
        const exitTs = Number(tr.exit_ts ?? tr.exitTs ?? 0);
        const trimmedPct = Number(tr.trimmed_pct ?? tr.trimmedPct ?? 0);
        const isOpenStatus = status === "OPEN" || status === "TP_HIT_TRIM";
        const isClosed = status === "WIN" || status === "LOSS" || status === "FLAT"
          || status === "CLOSED" || status === "CANCELED"
          || (!isOpenStatus && exitTs > 0)
          || trimmedPct >= 0.9999;
        return isOpenStatus && !isClosed;
      }

      function traderBookIsClosed(tr) {
        if (!tr || typeof tr !== "object") return false;
        const status = String(tr.status || "").toUpperCase();
        const exitTs = Number(tr.exit_ts ?? tr.exitTs ?? 0);
        const trimmedPct = Number(tr.trimmed_pct ?? tr.trimmedPct ?? 0);
        const isOpenStatus = status === "OPEN" || status === "TP_HIT_TRIM";
        return status === "WIN" || status === "LOSS" || status === "FLAT"
          || status === "CLOSED" || status === "CANCELED"
          || (!isOpenStatus && exitTs > 0)
          || trimmedPct >= 0.9999;
      }

      function mergeOpenTradeIntoMap(map, tr) {
        if (!traderBookIsOpen(tr)) return;
        const sym = String(tr?.ticker || "").toUpperCase();
        if (!sym) return;
        const existing = map.get(sym);
        const exitTs = Number(tr.exit_ts ?? tr.exitTs ?? 0);
        const entryTs = Number(tr.entry_ts ?? tr.entryTime ?? tr.entryTs ?? 0);
        if (!existing) {
          map.set(sym, tr);
          return;
        }
        const exExit = Number(existing.exit_ts ?? existing.exitTs ?? 0);
        const exEntry = Number(existing.entry_ts ?? existing.entryTime ?? existing.entryTs ?? 0);
        const trOpen = !exitTs;
        const exOpen = !exExit;
        if ((trOpen && !exOpen)
          || (trOpen && exOpen && entryTs > exEntry)
          || (!trOpen && !exOpen && exitTs > exExit)) {
          map.set(sym, tr);
        }
      }

      function resolveOpenTrade(tr) {
        if (!tr) return null;
        return traderBookIsOpen(tr) ? tr : null;
      }

      function tsToMs(ts) {
        if (ts == null || ts === "") return null;
        const n = Number(ts);
        if (!Number.isFinite(n) || n <= 0) return null;
        return n < 1e12 ? n * 1000 : n;
      }

      function getLocalDayBoundsMs() {
        const d = new Date();
        const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
        const start = new Date(`${key}T00:00:00`).getTime();
        return { start, end: start + 86400000 };
      }

      // Trimming lane = model took a partial trim today, not merely carrying
      // a runner from an earlier session or approaching the next trim level.
      function tradeTrimmedToday(tr) {
        if (!tr) return false;
        const trimmedPct = Number(tr?.trimmed_pct ?? tr?.trimmedPct ?? 0);
        if (!(trimmedPct > 0)) return false;
        const trimMs = tsToMs(tr?.trim_ts ?? tr?.trimTs);
        if (!trimMs) return false;
        const { start, end } = getLocalDayBoundsMs();
        return trimMs >= start && trimMs < end;
      }

      // Backend kanban_stage=trim on an open, untrimmed position = signal only.
      // Active Trader keeps the card in Hold until a trim actually executes.
      function hasTrimSignalPending(ticker, trade) {
        const openTr = resolveOpenTrade(trade);
        if (!openTr || !traderBookIsOpen(openTr)) return false;
        if (tradeTrimmedToday(openTr)) return false;
        const raw = String(ticker?._rawKanbanStage ?? ticker?.kanban_stage ?? "").trim().toLowerCase();
        return raw === "trim";
      }

      // Live feed needs a moment to settle after a fill; during that window
      // the price can flap to prev-day close and trip a freshly placed stop.
      const STOP_BREACH_GRACE_MS = 3 * 60 * 1000;

      function isPricePastStop(openTr, ticker, price) {
        const px = Number(price);
        if (!openTr || !Number.isFinite(px) || px <= 0) return false;
        const dir = String(openTr.direction || ticker?.position_direction || "").toUpperCase();
        const sl = Number(openTr.sl ?? openTr.stop_loss);
        if (!Number.isFinite(sl) || sl <= 0) return false;

        // Grace: a stop can't be "breached" seconds after entry — the price
        // feed hasn't settled and often momentarily reads the prior-day close.
        // The server-side sl-hard-exit path remains the real safety net.
        const entryMs = tsToMs(openTr.entry_ts ?? openTr.entryTime ?? openTr.entryTs);
        if (entryMs && (Date.now() - entryMs) < STOP_BREACH_GRACE_MS) return false;

        const U = window.TimedPriceUtils || {};
        const marketOpen = U.isNyRegularMarketOpen ? U.isNyRegularMarketOpen() : true;
        const feedFresh = U.isPriceFeedFresh ? U.isPriceFeedFresh(ticker) : true;

        // Prev-day close is the classic flap value — a stop placed just under
        // today's entry sits ABOVE yesterday's close, so a stale prev-close
        // print reads as a false breach. Never let it trigger.
        const prevClose = Number(
          ticker?._live_prev_close ?? ticker?.prev_close ?? ticker?.previous_close ?? ticker?.pc,
        );
        const isPrevCloseFlap = (v) =>
          Number.isFinite(prevClose) && prevClose > 0
          && Math.abs(v - prevClose) / prevClose < 0.001;

        // Only weigh genuinely current-session prints. During RTH that is the
        // session-aware headline + the fresh live tick; outside RTH the
        // extended print is the live price. Stale `close`/prev-day refs are
        // excluded so flapping can't fabricate a breach.
        const cands = [];
        const push = (v) => {
          const n = Number(v);
          if (Number.isFinite(n) && n > 0 && !isPrevCloseFlap(n)) cands.push(n);
        };
        const headline = U.getHeadlinePrice ? U.getHeadlinePrice(ticker) : null;
        push(headline);
        push(px);
        if (feedFresh) push(ticker?._live_price);
        if (!marketOpen) {
          push(ticker?.ahp);
          push(ticker?.extended_price);
        }
        if (cands.length === 0) return false;

        const checkPx = dir === "LONG" ? Math.min(...cands) : dir === "SHORT" ? Math.max(...cands) : px;
        if (dir === "LONG") return checkPx <= sl;
        if (dir === "SHORT") return checkPx >= sl;
        return false;
      }

      // Engine exit / SL breach on an open book row — card stays in Defend lane
      // but must not read as passive "Defend" when the stop is already gone.
      function hasExitSignalPending(ticker, trade, price) {
        const openTr = resolveOpenTrade(trade);
        if (!openTr || !traderBookIsOpen(openTr)) return false;
        const raw = String(ticker?._rawKanbanStage ?? ticker?.kanban_stage ?? "").trim().toLowerCase();
        if (raw === "exit" || raw === "exiting") return true;
        const bucket = String(ticker?.kanban_meta?.bucket || "").toLowerCase();
        if (bucket === "close_now") return true;
        const exitReason = String(
          ticker?.__exit_reason
          || (Array.isArray(ticker?.kanban_meta?.reasons) ? ticker.kanban_meta.reasons[0] : "")
          || "",
        ).toLowerCase();
        if (/sl_breach|sl_hit|max_loss|doctrine_force|v13_hard|hard_loss|critical/.test(exitReason)) {
          return true;
        }
        const px = Number(
          price
          ?? ticker?.price
          ?? ticker?._live_price
          ?? ticker?.close
          ?? openTr?.mark_price
          ?? openTr?.current_price,
        );
        return isPricePastStop(openTr, ticker, px);
      }

      function exitSignalChipLabel(ticker, trade, price) {
        const openTr = resolveOpenTrade(trade);
        const px = Number(
          price
          ?? ticker?.price
          ?? ticker?._live_price
          ?? ticker?.close
          ?? openTr?.mark_price
          ?? openTr?.current_price,
        );
        if (isPricePastStop(openTr, ticker, px)) {
          return {
            label: "Stop breached",
            title: "Price is at or past the stop — engine exit signal (card stays in Defend until the book closes)",
          };
        }
        return {
          label: "Exit signal",
          title: "Engine recommends closing the position — exit not executed yet (card stays in Defend)",
        };
      }

      // ── useTraderBook — positions + D1 in one pass (index-react parity).
      // Positions is authoritative when present; D1 open rows backfill gaps
      // (e.g. MU runner after trim when positions row lags). Closed sticky
      // map excludes any symbol that still has a live open row.
      const RECENT_EXIT_WINDOW_MS = 24 * 60 * 60 * 1000;
      function useTraderBook(enabled) {
        const [tradeByTicker, setTradeByTicker] = useState(() => new Map());
        const [closedByTicker, setClosedByTicker] = useState(() => new Map());
        const [tradesLoaded, setTradesLoaded] = useState(false);
        const refresh = useCallback(async () => {
          try {
            const [posRes, d1Res] = await Promise.all([
              fetch(`${API_BASE}/timed/trades?source=positions`, { cache: "no-store" })
                .then((r) => (r.ok ? r.json() : null)).catch(() => null),
              fetch(`${API_BASE}/timed/trades?source=d1`, { cache: "no-store" })
                .then((r) => (r.ok ? r.json() : null)).catch(() => null),
            ]);
            const openMap = new Map();
            if (posRes?.ok && Array.isArray(posRes.trades)) {
              posRes.trades.forEach((tr) => mergeOpenTradeIntoMap(openMap, tr));
            }
            if (d1Res?.ok && Array.isArray(d1Res.trades)) {
              d1Res.trades.forEach((tr) => {
                if (tr?._source_mode === "investor") return;
                mergeOpenTradeIntoMap(openMap, tr);
              });
            }
            const closedMap = new Map();
            const now = Date.now();
            if (d1Res?.ok && Array.isArray(d1Res.trades)) {
              for (const tr of d1Res.trades) {
                if (!tr || tr._source_mode === "investor") continue;
                const sym = String(tr.ticker || "").toUpperCase();
                if (!sym) continue;
                const exitMs = Number(tr.exit_ts ?? tr.exitTs ?? 0);
                if (!traderBookIsClosed(tr) || !exitMs || (now - exitMs) >= RECENT_EXIT_WINDOW_MS) continue;
                if (String(tr.exit_reason || tr.exitReason || "").startsWith("REVERSED_")) continue;
                // D1 closed truth wins over stale positions rows (e.g. MU runner
                // fully exited but positions snapshot still OPEN/TP_HIT_TRIM).
                openMap.delete(sym);
                const existing = closedMap.get(sym);
                if (!existing || exitMs > Number(existing.exit_ts ?? existing.exitTs ?? 0)) {
                  closedMap.set(sym, tr);
                }
              }
            }
            setTradeByTicker(openMap);
            setClosedByTicker(closedMap);
          } catch (_) {}
          finally { setTradesLoaded(true); }
        }, []);
        useEffect(() => {
          if (!enabled) return undefined;
          refresh();
          const id = setInterval(refresh, 180000);
          return () => clearInterval(id);
        }, [enabled, refresh]);
        return { tradeByTicker, closedByTicker, tradesLoaded };
      }

      // ── useSavedTickers — port from today.html ─────────────────
      function useSavedTickers() {
        const [saved, setSaved] = useState(() => {
          const bootstrap = window.TimedAuthHelpers?.getStoredBootstrap?.();
          return new Set(Array.isArray(bootstrap?.saved_tickers)
            ? bootstrap.saved_tickers.map((s) => String(s).toUpperCase())
            : []);
        });
        useEffect(() => {
          const applyBootstrap = (detail) => {
            if (!Array.isArray(detail?.saved_tickers)) return;
            setSaved(new Set(detail.saved_tickers.map((s) => String(s).toUpperCase())));
          };
          const handler = (event) => applyBootstrap(event?.detail);
          try { applyBootstrap(window.TimedAuthHelpers?.getStoredBootstrap?.()); } catch (_) {}
          window.addEventListener("tt-auth-bootstrap-updated", handler);
          return () => window.removeEventListener("tt-auth-bootstrap-updated", handler);
        }, []);
        const toggle = useCallback(async (ticker) => {
          const T = String(ticker || "").toUpperCase();
          if (!T) return;
          setSaved((prev) => {
            const next = new Set(prev);
            if (next.has(T)) next.delete(T); else next.add(T);
            try {
              const bootstrap = window.TimedAuthHelpers?.getStoredBootstrap?.() || {};
              window.TimedAuthHelpers?.storeBootstrap?.({ ...bootstrap, saved_tickers: Array.from(next) });
            } catch (_) {}
            return next;
          });
          try {
            await fetch(`${API_BASE}/timed/saved/toggle`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ ticker: T }),
            });
          } catch (_) {}
        }, []);
        return { saved, toggle };
      }

      // ── useSparklineCache — daily candles for cards ───────────────
      function useSparklineCache() {
        const [cache, setCache] = useState({});
        const sparkCfg = window.TTSparklineConfig || {};
        const buildUrl = sparkCfg.buildSparklineUrl || ((base, sym) => `${base}/timed/candles?ticker=${encodeURIComponent(sym)}&tf=D&limit=20`);
        const toCloses = sparkCfg.closesFromCandles || ((candles) => (Array.isArray(candles) ? candles.map((c) => Number(c?.c ?? c?.close)).filter(Number.isFinite) : []));
        const fromEntry = sparkCfg.sparkClosesFromCacheEntry || ((entry) => (Array.isArray(entry) ? entry : entry?.closes || null));
        const fetchSpark = useCallback(async (sym) => {
          try {
            const r = await fetch(buildUrl(API_BASE, sym), { cache: "no-store" });
            if (!r.ok) return null;
            const j = await r.json();
            const candles = Array.isArray(j?.candles) ? j.candles : [];
            const closes = toCloses(candles);
            if (closes.length < 2) return null;
            return { closes, candles };
          } catch (_) { return null; }
        }, [buildUrl, toCloses]);
        const ensure = useCallback((sym) => {
          if (!sym) return null;
          const upper = String(sym).toUpperCase();
          if (cache[upper]) return fromEntry(cache[upper]);
          if (cache[upper] === undefined) {
            setCache((prev) => ({ ...prev, [upper]: null }));
            fetchSpark(upper).then((payload) => {
              if (payload?.closes?.length >= 2) setCache((prev) => ({ ...prev, [upper]: payload }));
            });
          }
          return null;
        }, [cache, fetchSpark, fromEntry]);
        useEffect(() => {
          window._dsEnsureSparkline = ensure;
          window._dsSparklineCache = cache;
        }, [ensure, cache]);
        return { cache, ensure };
      }

      // ── computeEffectiveStage — mirror of getTradeLifecycleState ─
      //    (index-react.source.html line 8036). Same logic as today.html.
      function computeEffectiveStage(ticker, trade) {
        const rawStage = String(ticker?.kanban_stage || "").trim().toLowerCase();
        const openTr = resolveOpenTrade(trade);
        if (!openTr) return rawStage;
        const tradeStatus = String(openTr.status || "").toUpperCase();
        const trimmedPct = Number(openTr?.trimmed_pct ?? openTr?.trimmedPct ?? 0);
        const tradeIsClosed =
          tradeStatus === "WIN" || tradeStatus === "LOSS" ||
          !!(openTr?.exit_ts ?? openTr?.exitTs) || trimmedPct >= 0.9999;
        const tradeIsOpen =
          !tradeIsClosed &&
          (tradeStatus === "OPEN" || tradeStatus === "TP_HIT_TRIM" || !tradeStatus);
        if (!tradeIsOpen) return rawStage;
        // Engine exit on an still-open runner = defend (tighten SL / danger),
        // not Exiting (active share shed). Matches index-react EarlyMoversPanel.
        if (rawStage === "exit") return "defend";
        if (rawStage === "defend") return "defend";
        if (rawStage === "exiting") return "defend";
        if (tradeTrimmedToday(openTr)) return "trim";
        if (rawStage === "trim") return "hold";
        if (!["trim","hold","active","just_entered"].includes(rawStage)) return "hold";
        return rawStage;
      }

      // ── categorizeKanbanLanes — management lanes: Hold · Defend · Trim · Closed
      /** Guarantee every live book row appears in a management lane. */
      function ensureOpenTradesInManagementLanes(lanes, tradeByTicker, tickers) {
        if (!tradeByTicker?.forEach) return lanes;
        const placed = new Set();
        for (const key of ["hold", "defend", "trim", "new"]) {
          for (const t of lanes[key] || []) {
            const sym = String(t?.ticker || "").toUpperCase();
            if (sym) placed.add(sym);
          }
        }
        const bySym = new Map();
        for (const t of tickers || []) {
          const sym = String(t?.ticker || "").toUpperCase();
          if (sym) bySym.set(sym, t);
        }
        tradeByTicker.forEach((trade, sym) => {
          const openTr = resolveOpenTrade(trade);
          if (!sym || !openTr || placed.has(sym)) return;
          const base = bySym.get(sym) || { ticker: sym };
          const eff = computeEffectiveStage(base, openTr);
          const enriched = {
            ...base,
            ticker: sym,
            kanban_stage: eff,
            _effectiveKanbanStage: eff,
            _rawKanbanStage: String(base?._rawKanbanStage ?? base?.kanban_stage ?? "hold").toLowerCase(),
            _openTrade: openTr,
            has_open_position: true,
            position_direction: openTr.direction || base.position_direction || null,
            price: Number(
              base?.price ?? base?.close ?? openTr?.mark_price ?? openTr?.current_price
              ?? openTr?.entry_price ?? openTr?.entryPrice,
            ) || null,
            _injectedOpenTrade: true,
          };
          if (eff === "trim") lanes.trim.push(enriched);
          else if (eff === "defend") lanes.defend.push(enriched);
          else if (eff === "just_entered") lanes.new.push(enriched);
          else lanes.hold.push(enriched);
          placed.add(sym);
        });
        const byAlpha = (a, b) => String(a?.ticker || "").localeCompare(String(b?.ticker || ""));
        lanes.hold.sort(byAlpha);
        lanes.defend.sort(byAlpha);
        lanes.trim.sort(byAlpha);
        lanes.new.sort(byAlpha);
        return lanes;
      }

      function categorizeKanbanLanes(tickers, tradeByTicker, closedByTicker) {
        const setup = [];
        const enter = [];
        const newLane = [];
        const hold = [];
        const defend = [];
        const trim = [];
        const exit = [];
        for (const t of tickers) {
          if (!t) continue;
          const sym = String(t?.ticker || "").toUpperCase();
          const trade = resolveOpenTrade(tradeByTicker?.get?.(sym) || t?._openTrade || null);
          const status = trade ? String(trade.status || "").toUpperCase() : "";
          const trimmedPct = Number(trade?.trimmed_pct ?? trade?.trimmedPct ?? 0);
          const isOpen = traderBookIsOpen(trade);
          const snapshotOpen = !!t.has_open_position && !t._stickyExit;
          // Keep open positions visible even when /timed/all drops kanban_stage
          // (e.g. MU after a partial trim alert — scorer clears stage to null).
          if ((t.kanban_stage == null || t.kanban_stage === undefined) && !t._stickyExit && !isOpen && !snapshotOpen) continue;
          let stage = String(t?.kanban_stage || "").toLowerCase();
          // Default null/empty-stage open positions into TRIM/HOLD based on trade state.
          if (!stage && (isOpen || snapshotOpen)) {
            stage = tradeTrimmedToday(trade) ? "trim" : "hold";
          }

          // Open-trade override (priority order matches index-react EarlyMoversPanel):
          if ((trade && isOpen) || snapshotOpen) {
            if (stage === "exit") stage = "defend";
            else if (stage === "defend") { /* keep */ }
            else if (stage === "exiting") stage = "defend";
            else if (tradeTrimmedToday(trade)) stage = "trim";
            else if (stage === "trim") stage = "hold";
            else if (stage !== "hold" && stage !== "active" && stage !== "just_entered") stage = "hold";
          }

          // Closed-trade 24h sticky-exit — never when a live open row exists.
          if (!isOpen && closedByTicker?.get) {
            const closed = closedByTicker.get(sym) || t?._closedTrade || null;
            const exitMs = Number(closed?.exit_ts ?? closed?.exitTs ?? 0);
            const exitAgeMs = exitMs > 0 ? (Date.now() - exitMs) : Infinity;
            const forceRecentExit = exitMs > 0 && exitAgeMs < 6 * 60 * 60 * 1000;
            const newOpportunity = !forceRecentExit
              && ["setup", "setup_watch", "flip_watch", "in_review", "enter", "enter_now", "just_flipped"].includes(stage);
            if (exitMs > 0 && exitAgeMs < RECENT_EXIT_WINDOW_MS && !newOpportunity) {
              stage = "exit";
            }
          }

          // /timed/all can keep kanban_stage "exit" long after D1 close — cap at 24h.
          if (stage === "exit" && !isOpen && !snapshotOpen) {
            const closed = closedByTicker?.get?.(sym) || t?._closedTrade || null;
            const exitMs = Number(closed?.exit_ts ?? closed?.exitTs ?? 0);
            const exitAgeMs = exitMs > 0 ? (Date.now() - exitMs) : Infinity;
            if (exitMs <= 0 || exitAgeMs >= RECENT_EXIT_WINDOW_MS) continue;
          }

          switch (stage) {
            case "setup": case "setup_watch": case "flip_watch":
              setup.push(t); break;
            case "in_review": case "enter": case "enter_now": case "just_flipped":
              enter.push(t); break;
            case "just_entered":
              newLane.push(t); break;
            case "active": case "hold":
              hold.push(t); break;
            case "defend": defend.push(t); break;
            case "trim":   trim.push(t);   break;
            case "exit":   exit.push(t);   break;
            case "exiting": defend.push(t); break;
            default: /* watch / unrecognized → not shown */ break;
          }
        }
        // Sort discovery lanes (setup/enter) by score desc; management by symbol asc.
        const byScore = (a, b) => {
          const sa = Number(a?.score ?? a?.flip_watch_score ?? 0) || 0;
          const sb = Number(b?.score ?? b?.flip_watch_score ?? 0) || 0;
          if (sb !== sa) return sb - sa;
          return String(a?.ticker || "").localeCompare(String(b?.ticker || ""));
        };
        const byAlpha = (a, b) => String(a?.ticker || "").localeCompare(String(b?.ticker || ""));
        setup.sort(byScore); enter.sort(byScore);
        newLane.sort(byAlpha); hold.sort(byAlpha);
        defend.sort(byAlpha); trim.sort(byAlpha); exit.sort(byAlpha);
        const lanes = { setup, enter, new: newLane, hold, defend, trim, exit };
        ensureOpenTradesInManagementLanes(lanes, tradeByTicker, tickers);
        return lanes;
      }

      function ATCard({ t, onOpen, sparkSrc, isSaved, onToggleSaved, openTrade, tradesLoaded }) {
        const sym = String(t?.ticker || "").toUpperCase();
        // Match index-react DsCompactCard: request sparkline on render so
        // Setup-lane cards beyond the prefetch head still populate.
        useEffect(() => {
          if (typeof window._dsEnsureSparkline === "function") {
            window._dsEnsureSparkline(sym);
          }
        }, [sym]);
        const dailyChange = (window.TimedPriceUtils && window.TimedPriceUtils.getDailyChange)
          || (() => ({ dayPct: null, dayChg: null }));
        const dc = (() => { try { return dailyChange(t); } catch (_) { return null; } })();
        // Headline = session-aware RTH price (getHeadlinePrice). EXT line below.
        const price = Number(window.TimedPriceUtils?.getHeadlinePrice?.(t) ?? t?.price ?? t?.close);
        const dayPct = Number.isFinite(dc?.dayPct) ? Number(dc.dayPct) : null;
        const dayChg = Number.isFinite(dc?.dayChg) ? Number(dc.dayChg) : null;
        const dir = dayPct == null || Math.abs(dayPct) < 0.05 ? "flat" : dayPct > 0 ? "up" : "dn";

        // Bias chip — verified open trade only; discovery lanes must not
        // flash OPEN_* from stale snapshot until the positions book loads.
        const resolvedOpen = resolveOpenTrade(openTrade || t?._openTrade || null);
        const sanitize = window.TimedPriceUtils?.sanitizeTickerOpenPosture;
        const postureTicker = sanitize
          ? sanitize(t, resolvedOpen)
          : (resolvedOpen ? { ...t, _openTrade: resolvedOpen, has_open_position: true } : t);
        const stageLc = String(t?.kanban_stage || "").toLowerCase();
        const isDiscovery = (window.TimedPriceUtils?.isDiscoveryKanbanStage)
          ? window.TimedPriceUtils.isDiscoveryKanbanStage(stageLc)
          : ["setup", "setup_watch", "flip_watch", "in_review", "enter", "enter_now", "just_flipped", "watch"].includes(stageLc);
        const showOpenLabel = !!resolvedOpen && (!isDiscovery || tradesLoaded);
        const tradeDir = showOpenLabel ? String(resolvedOpen.direction || "").toUpperCase() : "";
        const _posture = (window.TimedPriceUtils && window.TimedPriceUtils.inferTraderPosture)
          ? window.TimedPriceUtils.inferTraderPosture(postureTicker)
          : null;
        const _modelDir = _posture?.direction || ((window.TimedPriceUtils && window.TimedPriceUtils.inferModelDirection)
          ? window.TimedPriceUtils.inferModelDirection(t)
          : "");
        const biasLabel = tradeDir === "LONG"  ? "Open Long"
                       : tradeDir === "SHORT" ? "Open Short"
                       : (() => {
                           const lbl = _posture?.label || "";
                           if (/^open\s/i.test(lbl) && !showOpenLabel) return null;
                           return lbl;
                         })()
                       || (_modelDir === "LONG"  ? "Bullish"
                       : _modelDir === "SHORT" ? "Bearish"
                       : "Neutral");
        const biasLabelLc = String(biasLabel).toLowerCase();
        const biasChipCls = biasLabelLc.includes("bullish") || biasLabelLc.includes("long") ? "ds-chip--up"
                         : biasLabelLc.includes("bearish") || biasLabelLc.includes("short") ? "ds-chip--dn"
                         : "ds-chip--solid";

        const stage = String(t?._effectiveKanbanStage || t?.kanban_stage || "").toLowerCase();
        const stageChip = (() => {
          const rawStage = String(t?._rawKanbanStage || "").toLowerCase();
          if (resolvedOpen && tradeTrimmedToday(resolvedOpen)) {
            return {
              label: "Trimmed today",
              cls: "ds-chip--accent",
              title: "Partial trim executed today — card stays in Trim lane",
            };
          }
          if (hasTrimSignalPending(t, resolvedOpen)) {
            return {
              label: "Trim signal",
              cls: "ds-chip--solid",
              title: "Engine recommends taking partial profits — trim not executed yet (card stays in Hold)",
            };
          }
          if (hasExitSignalPending(t, resolvedOpen, price)) {
            const exitChip = exitSignalChipLabel(t, resolvedOpen, price);
            return {
              label: exitChip.label,
              cls: "ds-chip--dn",
              title: exitChip.title,
            };
          }
          // Lane placement already communicates hold/defend/trim/setup/enter — skip redundant chips.
          if (stage === "trim" || stage === "defend") return null;
          if (stage === "exit") return { label: "Closed", cls: "ds-chip--dn" };
          if (stage === "enter" || stage === "enter_now" || stage === "just_flipped") return null;
          if (stage === "hold" || stage === "active" || stage === "just_entered") return null;
          if (stage === "setup" || stage === "setup_watch" || stage === "flip_watch") return null;
          return null;
        })();

        const isTTSel = typeof window.isTickerTTSelected === "function" ? window.isTickerTTSelected(sym) : false;

        const sqChipInfo = (() => {
          const tfm = t?.tf_tech || {};
          const tfList = ["10","15","30","1H","60","4H","240"];
          for (const tfk of tfList) {
            const row = tfm[tfk]; if (!row?.sq) continue;
            if (row.sq.r) return { state: "release", tf: tfk, label: "SQ RLS", cls: "ds-chip--accent" };
          }
          for (const tfk of tfList) {
            const row = tfm[tfk]; if (!row?.sq) continue;
            if (row.sq.s) return { state: "on", tf: tfk, label: "SQ ON", cls: "" };
            if (row.sq.c) return { state: "compressed", tf: tfk, label: "SQ CMP", cls: "ds-chip--solid" };
          }
          return null;
        })();

        const sparkPoints = (() => {
          const closes = window.TTSparklineConfig?.sparkClosesFromCacheEntry?.(sparkSrc)
            || (Array.isArray(sparkSrc) ? sparkSrc : sparkSrc?.closes);
          return closes && closes.length >= 2 ? closes : [price || 0, price || 0];
        })();
        const sparkSvg = (window.DS && Number.isFinite(price) && price > 0)
          ? window.DS.sparklineSvg(sparkPoints, { width: 280, height: 44, direction: dir, strokeWidth: 1.4 })
          : "";
        const patternChips = (() => {
          const candles = window.TTSparklineConfig?.sparkCandlesFromCacheEntry?.(sparkSrc);
          const detect = window.TimedPatternDetect?.detectCandlePatterns;
          if (!candles || !detect) return [];
          return detect(candles).slice(0, 2);
        })();

        // ── Position progress bar — port from DsCompactCard at
        //    index-react.source.html line 13152. Plots SL / Entry / Current
        //    / TP1 / TP2 / TP3 on a horizontal axis with a current-price
        //    marker dot. Renders only for OPEN trades (Defend / Trim / Hold
        //    lanes) — matches AT exactly.
        const hasOpen = !!resolvedOpen;
        const progressBarData = (() => {
          if (!hasOpen) return null;
          const ep = Number(resolvedOpen.entry_price ?? resolvedOpen.entryPrice) || null;
          if (!ep) return null;
          const isLong = tradeDir === "LONG";
          // ticker-side fallback only when direction matches the open trade
          const tickerDir = String(t?.direction || t?.consensus_direction || "").toUpperCase();
          const tickerAgrees = tickerDir === tradeDir;
          const sl = Number(resolvedOpen.sl ?? resolvedOpen.stop_loss)
                  || (tickerAgrees ? (Number(t?.sl) || null) : null);
          const tpArrRaw = Array.isArray(resolvedOpen.tpArray) ? resolvedOpen.tpArray
                         : Array.isArray(resolvedOpen.tp_array) ? resolvedOpen.tp_array
                         : null;
          const tps = (() => {
            if (tpArrRaw && tpArrRaw.length > 0) {
              return tpArrRaw.map(x => Number(x?.price ?? x)).filter(Number.isFinite);
            }
            const single = Number(resolvedOpen.tp)
                        || Number(resolvedOpen.take_profit)
                        || (tickerAgrees ? (Number(t?.tp) || Number(t?.tp_target_price)) : null)
                        || null;
            return single ? [single] : [];
          })();
          // 2026-07-22 (model-first r2) — SL validity vs CURRENT price, not
          // entry. A ratcheted/breakeven-locked trader stop or a long-term
          // trailing invalidation legitimately sits ABOVE entry on a LONG
          // that has run (e.g. CRS: avg entry $471, weekly-EMA invalidation
          // $525). The old `sl < entry` gate dropped those stops from the
          // bar entirely, which is why LT cards showed INV/no-target
          // geometry that didn't match trader cards.
          const slValid = sl == null || (isLong ? sl < price : sl > price);
          const slToUse = slValid ? sl : null;
          const tpsValid = tps.filter((tp) => isLong ? tp > ep : tp < ep);
          const allPx = [ep, price, slToUse, ...tpsValid].filter(p => Number.isFinite(p) && p > 0);
          if (allPx.length < 2) return null;
          const min = Math.min(...allPx);
          const max = Math.max(...allPx);
          const padding = (max - min) * 0.05 || 0.5;
          const lo = min - padding;
          const hi = max + padding;
          const xPct = (px) => Math.max(0, Math.min(100, ((px - lo) / (hi - lo)) * 100));
          const pnlPct = isLong ? ((price - ep) / ep * 100) : ((ep - price) / ep * 100);
          const ticks = [];
          if (slToUse)  ticks.push({ px: slToUse, label: "SL", color: "var(--ds-dn)" });
          ticks.push({ px: ep, label: "E", color: "var(--ds-text-muted)" });
          tpsValid.forEach((tp, i) => ticks.push({ px: tp, label: `T${i + 1}`, color: "var(--ds-up)" }));
          ticks.sort((a, b) => a.px - b.px);
          return { xPct, pnlPct, ticks, ep, curX: xPct(price) };
        })();

        const LC = window.TTLaneCard;
        const cardBiasLabel = LC?.compactBiasLabel
          ? LC.compactBiasLabel(biasLabel)
          : biasLabel;
        const extLine = LC?.extLineFromTicker ? LC.extLineFromTicker(t) : null;

        const cardStyle = {
          textAlign: "left",
          padding: "var(--ds-space-3)",
          ...(isTTSel
            ? { borderColor: "var(--ds-accent-dim)", boxShadow: "inset 0 0 0 1px rgba(56,242,161,0.18)" }
            : {}),
        };

        const closedTrade = t?._closedTrade || null;
        const exitPnlPct = (() => {
          const raw = t?.pnlPct ?? t?.pnl_pct ?? closedTrade?.pnl_pct ?? closedTrade?.pnlPct;
          const n = Number(raw);
          return Number.isFinite(n) ? n : null;
        })();
        const exitStatus = String(t?._exitLabel || closedTrade?.status || "").toUpperCase();
        const exitReasonRaw = String(closedTrade?.exit_reason || closedTrade?.exitReason || "").trim();
        const exitReasonLabel = (() => {
          if (!exitReasonRaw) return "Model closed position";
          const fmt = window.TTActivityReason?.shortReason;
          if (typeof fmt === "function") {
            const human = fmt(exitReasonRaw);
            if (human) return human;
          }
          return exitReasonRaw.replace(/_/g, " ").replace(/\b\w/g, (c) => c.toUpperCase());
        })();
        const closedMid = (stage === "exit" && closedTrade) ? h("div", {
          className: "tt-lane-card__closed-exit",
          style: {
            marginTop: 4,
            padding: "6px 8px",
            borderRadius: 6,
            background: "rgba(255,255,255,0.03)",
            border: "1px solid var(--ds-stroke)",
            fontFamily: "var(--tt-font-mono)",
            fontSize: 10,
          },
        },
          h("div", {
            style: {
              display: "flex",
              alignItems: "center",
              justifyContent: "space-between",
              gap: 8,
            },
          },
            h("span", {
              style: { color: "var(--ds-text-muted)", letterSpacing: "0.08em", textTransform: "uppercase", fontWeight: 700 },
            }, exitStatus === "WIN" ? "Realized win" : exitStatus === "LOSS" ? "Realized loss" : "Model closed"),
            exitPnlPct != null && h("span", {
              style: { color: exitPnlPct >= 0 ? "var(--ds-up)" : "var(--ds-dn)", fontWeight: 700 },
            }, `${exitPnlPct >= 0 ? "+" : ""}${exitPnlPct.toFixed(2)}%`),

          h("div", {

              marginTop: 4,
              fontSize: 9,
              color: "var(--ds-text-faint)",

            h("span", { style: { color: "var(--ds-text-muted)", fontWeight: 600 } }, "Exit: "),

        const progressMid = progressBarData && (() => {

          const epX = xPct(ep);
          const fillStart = Math.min(epX, curX);

            h("div", { className: "tt-lane-card__pos-header" },

              h("span", {
                style: { color: pnlPct >= 0 ? "var(--ds-up)" : "var(--ds-dn)", fontWeight: 700 },
              }, `${pnlPct >= 0 ? "+" : ""}${pnlPct.toFixed(2)}%`),
            ),
            h("div", { className: "tt-lane-card__pos-track" },
              h("div", {
                style: {
                  position: "absolute",
                  left: `${fillStart}%`,
                  width: `${fillW}%`,
                  top: 0, bottom: 0,
                  background: fillBg,
                  borderRadius: 3,
                },
              }),
              ...ticks.map((tick, i) => h("div", {
                key: `tick-${i}`,
                title: `${tick.label}: $${Number(tick.px).toFixed(2)}`,

                title: `Current: $${Number(price).toFixed(2)} (${pnlPct >= 0 ? "+" : ""}${pnlPct.toFixed(2)}%)`,
                style: {
                  position: "absolute",
                  left: `${curX}%`,
                  top: "50%",
                  transform: "translate(-50%, -50%)",
                  width: 10, height: 10,
                  borderRadius: "50%",
                  background: "var(--ds-accent)",
                  boxShadow: "0 0 0 2px var(--ds-bg-surface), 0 0 0 3px var(--ds-accent-glow, rgba(56,242,161,0.40))",
                  cursor: "help",
                },
              }),
            ),
            h("div", { className: "tt-lane-card__pos-labels" },
              ...ticks.map((tick, i) => h("span", {
                key: `lbl-${i}`,
                title: `${tick.label}: $${Number(tick.px).toFixed(2)}`,
                style: {
                  position: "absolute",
                  left: `${xPct(tick.px)}%`,
                  transform: "translateX(-50%)",
                  color: tick.color,
                  fontWeight: 700,
                  whiteSpace: "nowrap",
                  cursor: "help",
                },
              }, tick.label)),
            ),

        })();

        const { rank, score } = window.TTLaneCard?.traderRankScore?.(t) || { rank: null, score: null };
        const rankScoreMetrics = window.TTLaneCard?.rankScoreMetricChips
          ? window.TTLaneCard.rankScoreMetricChips({ rank, score })
          : [];

        // Lane headers already encode lifecycle (Watchlist / Holding / Defending …).
        // VerdictChip + LifecycleStrip duplicated that signal and shifted card height.

        return LC.create({
          sym,
          topBanner: null,
          button: {
            onClick: () => onOpen(sym, t?._model_path === "long_term" ? "INVESTOR" : null),
            style: cardStyle,
            className: closedMid ? "tt-lane-card--closed" : "",
            title: `Open ${sym} · ${t?._model_path === "long_term" ? "Long Term" : "Short Term"} detail`,
          },
          isTTSel,
          chipRow: [
            h("span", {
              className: `ds-chip ds-chip--sm ${biasChipCls}`,
              style: { fontFamily: "var(--tt-font-mono)" },
              title: resolvedOpen ? "Trade direction" : (biasLabel !== cardBiasLabel ? biasLabel : "Bias"),
            }, cardBiasLabel),
            // Horizon chip — Short Term / Long Term. Same ticker can appear
            // twice when both books have a live signal.
            h("span", {
              className: "ds-chip ds-chip--sm",
              title: t?._model_path === "long_term"
                ? "Long Term path — multi-month / LEAP horizon"
                : "Short Term path — swing / weeks horizon",
              style: {

                letterSpacing: "0.04em",
                ...(t?._model_path === "long_term"
                  ? {
                      background: "rgba(192,132,252,0.12)",
                      border: "1px solid rgba(192,132,252,0.30)",

                    }
                  : {

                      border: "1px solid rgba(56,242,161,0.28)",

                    }),

            }, t?._model_path === "long_term" ? "LONG TERM" : "SHORT TERM"),
            stageChip && h("span", {
              className: `ds-chip ds-chip--sm ${stageChip.cls}`,
              title: stageChip.title || undefined,
            }, stageChip.label),
            ...patternChips.map((p) => h("span", {
              key: p.type,
              className: `tt-pattern-chip ${p.bias === "bullish" ? "tt-pattern-chip--bull" : p.bias === "bearish" ? "tt-pattern-chip--bear" : ""}`,
              title: p.tooltip,
              style: {
                display: "inline-flex", alignItems: "center", gap: 3,

                letterSpacing: "0.04em", border: "1px solid var(--tt-border)",
                background: "var(--tt-bg-elev)", color: "var(--tt-text-muted)", whiteSpace: "nowrap",
                ...(p.bias === "bullish" ? { borderColor: "rgba(56,242,161,0.35)", color: "var(--tt-up-soft)" } : {}),

          ],
          quote: { price, dayPct, dayChg, dir, extLine },
          midBody: closedMid || progressMid,
          sparkSvg,
          metrics: rankScoreMetrics,
          isSaved,
          onToggleSaved,
        });
