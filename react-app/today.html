      // prints like Non-Farm Payrolls never showed. This pulls the curated +
      // live-merged calendar from /timed/macro/events and renders it as a
      // horizontal strip alongside earnings under "Event-Driven Risk".
      function MacroEventsStrip() {
        const [data, setData] = useState(null);
        useEffect(() => {
          let alive = true;
          fetch(`${API_BASE || ""}/timed/macro/events?days=10`, { credentials: "include", cache: "no-store" })
            .then((r) => (r.ok ? r.json() : null)).then((j) => { if (alive) setData(j); }).catch(() => {});
          return () => { alive = false; };
        }, []);
        const events = (data && data.ok && Array.isArray(data.events)) ? data.events : [];
        if (!data || events.length === 0) return null;
        const impColor = (i) => i === "high" ? "var(--tt-dn-soft)" : i === "medium" ? "#fbbf24" : "var(--tt-text-dim)";
        const fmtDate = (d) => { try { return new Date(d + "T12:00:00Z").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" }); } catch (_) { return d; } };
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "MACRO EVENTS \u2014 NEXT 10 DAYS"),
          h("div", { className: "tt-strip-scroll" },
            events.map((e, i) => h("div", {
              key: i, className: "tt-strip-chip",
              style: e.is_today
                ? { borderColor: impColor(e.impact), background: "rgba(245,158,11,0.10)" }
                : { borderColor: impColor(e.impact) + "55" },
              title: `${fmtDate(e.date)} ${e.time_et || ""} · ${e.impact} impact`,
            },
              h("span", { style: { width: 6, height: 6, borderRadius: "50%", background: impColor(e.impact), display: "inline-block", flexShrink: 0 } }),
              h("span", { style: { fontSize: 10, color: e.is_today ? "var(--tt-accent, #f5c25c)" : "var(--tt-text-dim)", fontWeight: 700, letterSpacing: "0.03em" } }, e.is_today ? "TODAY" : fmtDate(e.date)),
              h("span", { style: { fontSize: 12, fontWeight: 600, color: "var(--tt-text)" } }, e.name),
              e.time_et && h("span", { style: { fontSize: 10, color: "var(--tt-text-dim)" } }, e.time_et),
              (e.actual || e.estimate) && h("span", { style: { fontSize: 10.5, fontFamily: "var(--tt-font-mono)", color: e.actual ? "var(--tt-up-soft)" : "var(--tt-text-dim)" } }, e.actual ? `act ${e.actual}` : `est ${e.estimate}`),
            )),
          ),
        );
      }

      function EarningsStrip({ earnings, universe, data, onSelectTicker, strip }) {
        const events = safeArr(earnings?.events).slice();
        if (events.length === 0) return null;
        const HOUR_ORDER = (h) => {
          const hl = String(h || "").toLowerCase();
          if (hl.startsWith("bmo") || hl.includes("before")) return 0;
          if (hl.startsWith("dmh") || hl.includes("during")) return 1;
          if (hl.startsWith("amc") || hl.includes("after"))  return 2;
          return 3;
        };
        const uniSet = universe instanceof Set
          ? universe
          : new Set((universe || []).map((s) => String(s).toUpperCase()));
        // Sort by date asc, then universe-membership (universe first),
        // then session (bmo < dmh < amc < unknown), then symbol asc.
        events.sort((a, b) => {
          const da = String(a?.date || ""); const db = String(b?.date || "");
          if (da !== db) return da.localeCompare(db);
          const aUni = uniSet.has(String(a?.symbol || "").toUpperCase()) ? 0 : 1;
          const bUni = uniSet.has(String(b?.symbol || "").toUpperCase()) ? 0 : 1;
          if (aUni !== bUni) return aUni - bUni;
          const ho = HOUR_ORDER(a?.hour) - HOUR_ORDER(b?.hour);
          if (ho !== 0) return ho;
          return String(a?.symbol || "").localeCompare(String(b?.symbol || ""));
        });
        // Group by date — no per-day or total cap. Card auto-scrolls
        // vertically beyond a soft 480px height so a 22-event day
        // doesn't push the rest of the page down.
        const byDay = {};
        for (const ev of events) { (byDay[ev.date] = byDay[ev.date] || []).push(ev); }
        const days = Object.keys(byDay).sort();
        if (days.length === 0) return null;
        const hourClass = (hr) => {
          const hl = String(hr || "").toLowerCase();
          if (hl.startsWith("bmo") || hl.includes("before")) return "bmo";
          if (hl.startsWith("dmh") || hl.includes("during")) return "dmh";
          if (hl.startsWith("amc") || hl.includes("after"))  return "amc";
          return "unk";
        };

        // 2026-06-05 — Compact horizontal STRIP: one scrolling row of earnings
        // chips (universe-first ordering preserved) to save vertical space.
        if (strip) {
          const chips = events.slice(0, 24);
          const openEarningsTicker = (ev) => {
            if (!onSelectTicker) return;
            const sym = String(ev?.symbol || "").toUpperCase();
            if (!sym) return;
            const uni = uniSet.has(sym) && isTickerScoredInUniverse(data, sym);
            if (uni) onSelectTicker(sym);
            else onSelectTicker(sym, "CATALYSTS");
          };
          return h("section", { className: "tt-row" },
            h("div", { className: "tt-sec-title" }, "EVENT-DRIVEN RISK \u2014 EARNINGS"),
            h("div", { className: "tt-strip-scroll" },
              chips.map((ev, i) => {
                const sym = String(ev?.symbol || "").toUpperCase();
                const uni = uniSet.has(sym) && isTickerScoredInUniverse(data, sym);
                return h("button", {
                  key: `${sym}-${i}`,
                  onClick: () => openEarningsTicker(ev),
                  className: "tt-strip-chip",
                  title: uni
                    ? `${sym} · in TT universe · open ticker`
                    : `${sym} · not in TT universe · earnings watch (Catalysts tab)`,
                  style: uni ? { borderColor: "rgba(52,211,153,0.4)" } : { opacity: 0.88 },
                },
                  h(TickerLogo, { sym, size: 18 }),
                  h("span", { style: { fontWeight: 700, fontSize: 12, fontFamily: "var(--tt-font-mono)" } }, sym),
                  h("span", { style: { fontSize: 10, color: "var(--tt-text-dim)" } }, `${String(ev?.date || "").slice(5)} ${hourClass(ev?.hour).toUpperCase()}`),
                );
              }),
            ),
          );
        }

        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "EARNINGS THIS WEEK"),
          h("div", { className: "tt-sec-h" }, "Event-driven risk on the radar \u2014 universe tickers first"),
          h("div", { className: "tt-grid tt-grid-3" },
            days.map(d => {
              const dayEvents = byDay[d];
              const uniCount = dayEvents.filter(ev => uniSet.has(String(ev?.symbol || "").toUpperCase())).length;
              return h("div", { key: d, className: "tt-card tt-card-pad" },
                h("div", { className: "tt-day-head" },
                  h("span", null, d),
                  h("span", { className: "tt-day-head__count" },
                    `${dayEvents.length} event${dayEvents.length === 1 ? "" : "s"}${uniCount > 0 ? ` \u00b7 ${uniCount} universe` : ""}`),
                ),
                h("div", {
                  style: {
                    display: "flex", flexDirection: "column", gap: 5,
                    maxHeight: 480, overflowY: "auto",
                  },
                },
                  dayEvents.map((ev, i) => {
                    // EPS estimate (user request 2026-05-20): show actual
                    // estimate when present, em-dash when not. The worker
                    // /timed/earnings/upcoming response uses `epsEstimate`
                    // (camelCase) for Finnhub data, falling back to
                    // alternate keys for D1-sourced rows. Check all aliases.
                    const rawEps = ev?.epsEstimate
                      ?? ev?.eps_est
                      ?? ev?.eps_est_avg
                      ?? ev?.estimate
                      ?? ev?.consensus_eps_est;
                    const eps = Number(rawEps);
                    const hasEps = Number.isFinite(eps) && eps !== 0;
                    const sym = String(ev?.symbol || "").toUpperCase();
                    const isUni = uniSet.has(sym) && isTickerScoredInUniverse(data, sym);
                    const hcls = hourClass(ev?.hour);
                    const hourLabel = (ev?.hour || "—").toUpperCase();
                    const onClick = (e) => {
                      e.preventDefault();
                      if (typeof onSelectTicker !== "function") return;
                      if (isUni) onSelectTicker(sym);
                      else onSelectTicker(sym, "CATALYSTS");
                    };
                    return h("button", {
                      type: "button",
                      key: `${sym}-${i}`,
                      className: "tt-earn-row" + (isUni ? " is-universe" : ""),
                      onClick,
                      title: isUni
                        ? `Open ${sym} in the right rail · in our universe`
                        : `${sym} · not in TT universe · opens earnings context on Catalysts tab`,
                    },
                      h(TickerLogo, { sym }),
                      h("span", { className: "tt-earn-row__sym" }, sym || "?"),
                      h("span", { className: `tt-hour-chip ${hcls}` }, hourLabel),
                      h("span", {
                        className: "tt-earn-row__eps",
                        title: hasEps ? `Consensus EPS estimate: $${eps.toFixed(2)}` : "No EPS estimate available",
                      },
                        hasEps
                          ? h(window.React.Fragment, null,
                              h("span", { className: "tt-earn-row__eps-val" }, "$" + eps.toFixed(2)),
                              h("span", { className: "tt-earn-row__eps-tag" }, "est"),
                            )
                          : h("span", { className: "tt-earn-row__eps-empty" }, "—"),
                      ),
                    );
                  }),
                ),
              );
            }),
          ),
        );
      }

      // ═══════════════════════════════════════════════════════════
      // ANALYSIS — Unified Search + Filters header that controls BOTH
      // the Bubble Map and the Heat Map below.
      //
      // V2 (2026-05-16) — Aligned with Active Trader's insight chips:
      //   FOCUS     Focus | Actionable | Early LONG | Early SHORT | In Corridor | High R:R Early
      //   MOMENTUM  Squeeze | Breakout | Accelerating | Mo Elite | Vol Surge
      //   STRUCTURE Sector Rotation (top↑ / bottom↓ dynamic chip)
      //   CONTEXT   Market Pulse | Top Movers | Indexes | (Futures admin) | S&P Sectors
      //
      // Filter model:
      //  - Single active chip at a time (radio-style). Default is "focus".
      //  - Each chip carries a precomputed ticker list; applyFilters narrows
      //    the visible universe to that list.
      //  - Search is independent and also narrows the visible universe.
      //
      // Logic mirrors index-react.source.html `insightChips` useMemo
      // (lines 19357-19660). When that file changes, mirror here.
      // ═══════════════════════════════════════════════════════════

      // Classify state into a bucket (kept for the heat-map color).
      function classifyStateBucket(state) {
        const s = String(state || "");
        if (s === "HTF_BULL_LTF_BULL") return "bull_aligned";
        if (s === "HTF_BEAR_LTF_BEAR") return "bear_aligned";
        if (s.includes("PULLBACK"))    return "pullback";
        if (s.startsWith("HTF_BULL"))  return "bull_mixed";
        if (s.startsWith("HTF_BEAR"))  return "bear_mixed";
        return "neutral";
      }
      const STATE_BUCKET_COLOR = {
        bull_aligned: "#22c55e",
        bear_aligned: "#f43f5e",
        pullback:     "#f5c25c",
        bull_mixed:   "#34d399",
        bear_mixed:   "#fb7185",
        neutral:      "#6b7280",
      };

      // ── Constants mirroring index-react.source.html ─────────────
      const TT_NORM_TICKER = (t) => {
        let s = String(t || "").trim().toUpperCase();
        if (s === "BRK.B" || s === "BRK-B") s = "BRK-B";
        return s;
      };
      const MARKET_PULSE_PUBLIC_SYMBOLS = [
        "SPY","RSP","QQQ","IWM","GLD","SLV","USO","BTCUSD","ETHUSD",
        "XLK","XLF","XLY","XLP","XLC","XLI","XLB","XLE","XLRE","XLU","XLV",
      ];
      const MARKET_PULSE_ADMIN_SYMBOLS = [
        "SPY","RSP","QQQ","IWM","VIX","US500","ES1!","NQ1!","RTY1!","YM1!","CL1!","GC1!","SI1!",
        "BTCUSD","ETHUSD",
        "XLK","XLF","XLY","XLP","XLC","XLI","XLB","XLE","XLRE","XLU","XLV",
      ];
      const INDEX_SYMS   = ["SPY","RSP","QQQ","IWM"];
      const FUTURES_SYMS = ["ES1!","NQ1!","RTY1!","YM1!","CL1!","GC1!","SI1!","BTCUSD","ETHUSD"];
      const SP_ETF_SYMS  = ["XLK","XLF","XLY","XLP","XLC","XLI","XLB","XLE","XLRE","XLU","XLV"];

      const ENTRY_STAGES           = new Set(["setup","setup_watch","flip_watch","in_review","enter","enter_now","just_flipped"]);
      const TRADER_WATCHLIST_STAGES = new Set(["setup","setup_watch","flip_watch"]);
      const TRADER_TRIGGER_STAGES   = new Set(["in_review","enter","enter_now","just_flipped"]);
      const ACTIONABLE_STAGES = new Set(["enter","enter_now","trim","exit","defend"]);
      const KANBAN_STAGES     = new Set([
        "setup","setup_watch","flip_watch",
        "in_review","enter","enter_now","just_flipped",
        "just_entered",
        "hold","trim","defend","exit",
      ]);

      function entryZoneSide(t, entryTypeFn) {
        const TT = window.TimedBubbleChart || {};
        const entFn = entryTypeFn || TT.entryType || (() => ({ corridor: false, side: null }));
        const ent = entFn(t);
        if (!ent?.corridor || !ent?.side) return null;
        return String(ent.side).toUpperCase();
      }

      function investorStageOf(t) {
        return String(t?.investor_stage || t?.stage || "").toLowerCase();
      }

      function hasOpenTradeDir(t) {
        return !!String(t?._openTrade?.direction || "").toUpperCase();
      }

      function isInvestorQueued(t) {
        return investorStageOf(t) === "accumulate_queued";
      }

      function isTraderWatchlist(t) {
        if (hasOpenTradeDir(t)) return false;
        return TRADER_WATCHLIST_STAGES.has(String(t?.kanban_stage || "").toLowerCase());
      }

      function isTraderTriggerReady(t) {
        if (hasOpenTradeDir(t)) return false;
        return TRADER_TRIGGER_STAGES.has(String(t?.kanban_stage || "").toLowerCase());
      }

      // Viewport action chips — mirror Active Trader Watchlist / Trigger Ready
      // lanes and Investor Queued (shared-signal-grammar.js labels).
      function viewportActionChips(t) {
        const chips = [];
        if (isInvestorQueued(t)) {
          chips.push({
            label: "Queued",
            cls: "ds-chip--accent",
            title: "Investor lane — queued for next rebalance.",
          });
        }
        if (isTraderTriggerReady(t)) {
          chips.push({
            label: "Trigger Ready",
            cls: "ds-chip--accent",
            title: "Active Trader — trigger ready for review or entry.",
          });
        } else if (isTraderWatchlist(t)) {
          chips.push({
            label: "Setup",
            cls: "",
            title: "Active Trader watchlist — setup forming, no action yet.",
          });
        }
        return chips;
      }

      function primedTickerPriority(t) {
        if (isInvestorQueued(t)) return 3;
        if (isTraderTriggerReady(t)) return 2;
        if (isTraderWatchlist(t)) return 1;
        return 0;
      }

      function isEntryZoneTicker(t) {
        return isInvestorQueued(t) || isTraderWatchlist(t) || isTraderTriggerReady(t);
      }

      function sortEntryZoneTickers(list) {
        return (Array.isArray(list) ? list : []).slice().sort((a, b) => {
          const pa = primedTickerPriority(a);
          const pb = primedTickerPriority(b);
          if (pa !== pb) return pb - pa;
          const ra = Number(a.rank_score) || Number(a.rank) || Number(a.rank_position) || 0;
          const rb = Number(b.rank_score) || Number(b.rank) || Number(b.rank_position) || 0;
          if (ra !== rb) return rb - ra;
          return String(a.ticker).localeCompare(String(b.ticker));
        });
      }

      function sparkClosesFromCacheEntry(entry) {
        if (Array.isArray(entry)) return entry;
        if (entry && Array.isArray(entry.closes)) return entry.closes;
        return null;
      }

      function sparkCandlesFromCacheEntry(entry) {
        if (entry && Array.isArray(entry.candles)) return entry.candles;
        return null;
      }

      // ── computeInsightChips — mirrors index-react.source.html lines 19357-19660 ─
      function computeInsightChips(allTickers, opts) {
        const isAdmin = !!(opts && opts.isAdmin);
        const savedSet = (opts && opts.savedSet) instanceof Set ? opts.savedSet : new Set();
        const all = (Array.isArray(allTickers) ? allTickers : [])
          .filter((t) => t && Number.isFinite(Number(t.ltf_score)));
        if (all.length === 0) return [];

        const TT = window.TimedBubbleChart || {};
        const entryType        = TT.entryType        || (() => ({ corridor: false, side: null }));
        const completionForSize = TT.completionForSize || ((t) => Number(t?.completion) || 0);

        const chips = [];

        // ── Focus (default) — Kanban + Market Pulse + open-trade tickers ──
        const _focusSet = new Set();
        for (const t of allTickers) {
          const ks = String(t.kanban_stage || "").toLowerCase();
          if (KANBAN_STAGES.has(ks)) _focusSet.add(TT_NORM_TICKER(t?.ticker));
        }
        const _mpSyms = isAdmin ? MARKET_PULSE_ADMIN_SYMBOLS : MARKET_PULSE_PUBLIC_SYMBOLS;
        for (const s of _mpSyms) _focusSet.add(TT_NORM_TICKER(s));
        const focusTickers = allTickers.filter((t) => _focusSet.has(TT_NORM_TICKER(t?.ticker)));
        chips.push({
          id: "focus", label: "Focus", count: focusTickers.length,
          tickers: focusTickers.map((t) => t.ticker),
          row: "focus", isDefault: true,
          tooltip: "Default view — Kanban lanes + Market Pulse. Keeps the chart actionable, not cluttered.",
        });

        // ── Entry Zone — Investor Queued + AT Watchlist / Trigger Ready ──
        const entryZone = sortEntryZoneTickers(all.filter((t) => isEntryZoneTicker(t)));
        chips.push({
          id: "entry_zone", label: "Entry Zone", count: entryZone.length,
          tickers: entryZone.map((t) => t.ticker),
          row: "focus",
          tooltip: "Investor Queued or Active Trader Watchlist / Trigger Ready — primed for entry before the model acts. Queued sorts first.",
        });

        // ── Open Positions — tickers the model is actively managing ──
        const openPositions = allTickers.filter((t) => {
          if (t?._openTrade || t?.has_open_position) return true;
          const ks = String(t?.kanban_stage || "").toLowerCase();
          return ["hold", "active", "just_entered", "trim", "defend", "exiting"].includes(ks);
        });
        chips.push({
          id: "open_positions", label: "Open Positions", count: openPositions.length,
          tickers: openPositions.map((t) => t.ticker),
          row: "focus",
          tooltip: "Tickers with an open trader or investor position.",
        });

        // ── All — full scored universe (placeholders without HTF/LTF stay hidden
        // until scored; explicit search can still surface them).
        chips.push({
          id: "all", label: "All", count: allTickers.filter(hasBubbleMapScores).length,
          tickers: null,
          row: "focus",
          tooltip: "Show every scored ticker in the universe — use search for unscored placeholders.",
        });

        // ── Saved — user's starred tickers (top-level, always first) ──
        if (savedSet.size > 0) {
          const savedTickers = allTickers.filter((t) => savedSet.has(TT_NORM_TICKER(t?.ticker)));
          chips.push({
            id: "saved", label: "Saved", count: savedTickers.length,
            tickers: savedTickers.map((t) => t.ticker),
            row: "focus",
            tooltip: "Your starred tickers (★). Toggle on any card.",
          });
        }

        // ── TT Selected — UPTICKS + GRNI + GRNJ + GRNY universe ──
        if (typeof window.isTickerTTSelected === "function") {
          const ttSelected = allTickers.filter((t) => {
            const s = String(t?.ticker || "");
            return s && window.isTickerTTSelected(s);
          });
          if (ttSelected.length > 0) {
            chips.push({
              id: "tt_selected", label: "TT Selected", count: ttSelected.length,
              tickers: ttSelected.map((t) => t.ticker),
              row: "focus",
              tooltip: "Hand-picked TT universe (UPTICKS + Granny Shots).",
            });
          }
        }

        // ── Actionable ──
        const actionable = allTickers.filter((t) => ACTIONABLE_STAGES.has(String(t.kanban_stage || "").toLowerCase()));
        if (actionable.length > 0) {
          chips.push({
            id: "actionable", label: "Actionable", count: actionable.length,
            tickers: actionable.map((t) => t.ticker),
            row: "focus",
            tooltip: "Tickers in enter / trim / exit / defend stages.",
          });
        }

        // ── Early LONG ──
        const earlyLong = all.filter((t) => {
          const htf = Number(t.htf_score), ltf = Number(t.ltf_score);
          const ks = String(t.kanban_stage || "").toLowerCase();
          return htf > 0 && ltf >= -8 && ltf <= 12 && ENTRY_STAGES.has(ks);
        });
        chips.push({
          id: "early_long", label: "Early LONG", count: earlyLong.length,
          tickers: earlyLong.map((t) => t.ticker),
          row: "focus",
          tooltip: "HTF bullish + LTF approaching entry corridor.",
        });

        // ── Early SHORT ──
        const earlyShort = all.filter((t) => {
          const htf = Number(t.htf_score), ltf = Number(t.ltf_score);
          const ks = String(t.kanban_stage || "").toLowerCase();
          return htf < 0 && ltf >= -12 && ltf <= 8 && ENTRY_STAGES.has(ks);
        });
        chips.push({
          id: "early_short", label: "Early SHORT", count: earlyShort.length,
          tickers: earlyShort.map((t) => t.ticker),
          row: "focus",
          tooltip: "HTF bearish + LTF approaching entry corridor.",
        });

        // ── In Corridor ──
        const corridor = all.filter((t) => {
          const htf = Number(t.htf_score), ltf = Number(t.ltf_score);
          return (htf > 0 && ltf >= -8 && ltf <= 12) || (htf < 0 && ltf >= -12 && ltf <= 8);
        });
        chips.push({
          id: "corridor", label: "In Corridor", count: corridor.length,
          tickers: corridor.map((t) => t.ticker),
          row: "focus",
          tooltip: "LTF score in the optimal entry zone for the HTF trend direction.",
        });

        // (2026-06-10 — "High R:R Early" + "Squeeze" chips removed per
        // operator feedback: "We don't need squeeze nor RR".)

        // ── Breakout ──
        const breakout = all.filter((t) => {
          const ks = String(t.kanban_stage || "").toLowerCase();
          return t.flags?.sq30_release === true || ks === "just_entered" || ks === "just_flipped";
        });
        chips.push({
          id: "breakout", label: "Breakout", count: breakout.length,
          tickers: breakout.map((t) => t.ticker),
          row: "momentum",
          tooltip: "Squeeze released or fresh stage transition — move in progress.",
        });

        // ── Accelerating ──
        const accel = all.filter((t) => {
          const d = t.deltas && typeof t.deltas === "object" ? t.deltas : {};
          const ltf4h = Number(d.ltf_4h), htf4h = Number(d.htf_4h);
          const ltf = Number(t.ltf_score), htf = Number(t.htf_score);
          return (ltf4h > 5 || htf4h > 3) || (ltf > 15 && htf > 15);
        });
        chips.push({
          id: "accelerating", label: "Accelerating", count: accel.length,
          tickers: accel.map((t) => t.ticker),
          row: "momentum",
          tooltip: "Score delta > 5 (LTF) or > 3 (HTF) in last 4h.",
        });

        // ── Mo Elite ──
        const moElite = all.filter((t) => t.flags?.momentum_elite === true);
        chips.push({
          id: "momentum_elite", label: "Mo Elite", count: moElite.length,
          tickers: moElite.map((t) => t.ticker),
          row: "momentum",
          tooltip: "Confirmed strong momentum across 2+ timeframes (30m / 15m / 5m).",
        });

        // ── Vol Surge ──
        const volSurge = all.filter((t) => {
          const rm = t.rvol_map || {};
          const rv = Math.max(Number(rm?.["30"]?.vr) || 0, Number(rm?.["60"]?.vr) || 0);
          return rv >= 1.5;
        });
        chips.push({
          id: "volume_surge", label: "Vol Surge", count: volSurge.length,
          tickers: volSurge.map((t) => t.ticker),
          row: "momentum",
          tooltip: "Relative volume ≥ 1.5× on 30m or 60m — unusual activity.",
        });

        // ── Sector Rotation (STRUCTURE row) ──
        const sectorBull = {}, sectorTotal = {};
        for (const t of all) {
          const sec = (t.sector || (t.fundamentals && t.fundamentals.sector) || t._cohort || "");
          if (!sec) continue;
          sectorTotal[sec] = (sectorTotal[sec] || 0) + 1;
          if (Number(t.htf_score) > 0) sectorBull[sec] = (sectorBull[sec] || 0) + 1;
        }
        const sectorRanking = Object.keys(sectorTotal)
          .filter((s) => sectorTotal[s] >= 2)
          .map((s) => ({ sector: s, bullPct: ((sectorBull[s] || 0) / sectorTotal[s]) * 100, count: sectorTotal[s] }))
          .sort((a, b) => b.bullPct - a.bullPct);
        if (sectorRanking.length >= 2) {
          const best = sectorRanking[0], worst = sectorRanking[sectorRanking.length - 1];
          if (best.sector !== worst.sector) {
            const short = (s) => (s.length > 14 ? s.slice(0, 12) + "…" : s);
            const rotTickers = all.filter((t) => {
              const sec = (t.sector || (t.fundamentals && t.fundamentals.sector) || t._cohort || "");
              return sec === best.sector || sec === worst.sector;
            }).map((t) => t.ticker);
            chips.push({
              id: "sector_rotation",
              label: `${short(best.sector)} ↑ ${short(worst.sector)} ↓`,
              count: null,
              tickers: rotTickers,
              row: "structure",
              tooltip: `Money rotating into ${best.sector}, out of ${worst.sector}.`,
            });
          }
        }

        // ── Market Pulse (CONTEXT row) ──
        const mpSyms = isAdmin ? MARKET_PULSE_ADMIN_SYMBOLS : MARKET_PULSE_PUBLIC_SYMBOLS;
        const marketPulseTickers = allTickers.filter((t) => mpSyms.includes(TT_NORM_TICKER(t?.ticker)));
        chips.push({
          id: "market_pulse", label: "Market Pulse", count: marketPulseTickers.length,
          tickers: marketPulseTickers.map((t) => t.ticker),
          row: "context",
          tooltip: isAdmin
            ? "Futures, indices, S&P sectors, and crypto."
            : "SPY, QQQ, IWM, commodity ETF equivalents, crypto, and S&P sectors.",
        });

        // ── Top Movers ──
        const dailyChange = (window.TimedPriceUtils && window.TimedPriceUtils.getDailyChange)
          || (() => ({ dayPct: 0 }));
        const rthArr = allTickers
          .map((t) => {
            const sym = TT_NORM_TICKER(t?.ticker || "");
            if (!sym) return null;
            const px = Number(t?.price ?? t?.close);
            if (!Number.isFinite(px) || px <= 0) return null;
            const pct = Number(dailyChange(t)?.dayPct);
            if (!Number.isFinite(pct)) return null;
            return { ticker: sym, pct };
          })
          .filter(Boolean)
          .sort((a, b) => b.pct - a.pct);
        const moverSet = new Set([
          ...rthArr.slice(0, 10).map((t) => t.ticker),
          ...rthArr.slice(-10).map((t) => t.ticker),
        ]);
        chips.push({
          id: "top_movers", label: "Top Movers", count: moverSet.size,
          tickers: Array.from(moverSet),
          row: "context",
          tooltip: "Top 10 gainers + top 10 losers on the session.",
        });

        // ── Indexes ──
        const idxTickers = allTickers.filter((t) => INDEX_SYMS.includes(TT_NORM_TICKER(t?.ticker)));
        chips.push({
          id: "indexes", label: "Indexes", count: idxTickers.length,
          tickers: idxTickers.map((t) => t.ticker),
          row: "context",
          tooltip: `Major index ETFs (${INDEX_SYMS.join(", ")}).`,
        });

        // ── Futures (admin only) ──
        if (isAdmin) {
          const futTickers = allTickers.filter((t) => FUTURES_SYMS.includes(TT_NORM_TICKER(t?.ticker)));
          chips.push({
            id: "futures", label: "Futures", count: futTickers.length,
            tickers: futTickers.map((t) => t.ticker),
            row: "context",
            tooltip: `Futures & crypto (${FUTURES_SYMS.join(", ")}).`,
          });
        }

        // ── S&P Sectors ──
        const spEtfTickers = allTickers.filter((t) => SP_ETF_SYMS.includes(TT_NORM_TICKER(t?.ticker)));
        chips.push({
          id: "sp_sectors", label: "S&P Sectors", count: spEtfTickers.length,
          tickers: spEtfTickers.map((t) => t.ticker),
          row: "context",
          tooltip: `S&P sector ETFs (${SP_ETF_SYMS.join(", ")}).`,
        });

        return chips;
      }

      // ── computeEffectiveStage — mirror of getTradeLifecycleState
      //   (index-react.source.html line 8036).
      //
      // Open positions never end up in EXIT — engine 'exit' on an open
      // position means urgent close (DEFEND). Mirrors the same logic
      // Active Trader uses for its kanban categorizer + bubble overlays.
      //
      // Without this, OKE could show "Exit" on Today's bubble chart
      // while AT's Defend lane has the same ticker — confusing.
      function computeEffectiveStage(ticker, trade) {
        const rawStage = String(ticker?.kanban_stage || "").trim().toLowerCase();
        if (!trade) return rawStage;
        const tradeStatus = String(trade.status || "").toUpperCase();
        const trimmedPct = Number(trade?.trimmed_pct ?? trade?.trimmedPct ?? 0);
        const tradeIsClosed =
          tradeStatus === "WIN" ||
          tradeStatus === "LOSS" ||
          !!(trade?.exit_ts ?? trade?.exitTs) ||
          trimmedPct >= 0.9999;
        const tradeIsOpen =
          !tradeIsClosed &&
          (tradeStatus === "OPEN" || tradeStatus === "TP_HIT_TRIM" || !tradeStatus);
        if (!tradeIsOpen) return rawStage;
        if (rawStage === "exit") return "defend";
        if (rawStage === "defend") return "defend";
        if (tradeStatus === "TP_HIT_TRIM" || trimmedPct > 0) return "trim";
        if (!["trim","hold","active","just_entered"].includes(rawStage)) return "hold";
        return rawStage;
      }

      // ── useSavedTickers — saved-ticker set + toggle. Mirrors AT's
      //   pattern (index-react.source.html lines 18992-19033). Reads
      //   initial state from window.TimedAuthHelpers stored bootstrap,
      //   listens for the tt-auth-bootstrap-updated event, optimistically
      //   updates locally, and persists via POST /timed/saved/toggle.
      //   Without this Today couldn't render the star save button so
      //   ViewportCard always omitted it — feedback was "Saved Icon is
      //   not being shown".
      function useSavedTickers() {
        const [saved, setSaved] = useState(() => {
          const bootstrap = window.TimedAuthHelpers?.getStoredBootstrap?.();
          return new Set(Array.isArray(bootstrap?.saved_tickers)
            ? bootstrap.saved_tickers.map((s) => String(s).toUpperCase())
            : []);
        });

        useEffect(() => {
          const applyBootstrap = (detail) => {
            if (!Array.isArray(detail?.saved_tickers)) return;
            setSaved(new Set(detail.saved_tickers.map((s) => String(s).toUpperCase())));
          };
          const handler = (event) => applyBootstrap(event?.detail);
          try { applyBootstrap(window.TimedAuthHelpers?.getStoredBootstrap?.()); } catch (_) {}
          window.addEventListener("tt-auth-bootstrap-updated", handler);
          return () => window.removeEventListener("tt-auth-bootstrap-updated", handler);
        }, []);

        const toggle = useCallback(async (ticker) => {
          const T = String(ticker || "").toUpperCase();
          if (!T) return;
          setSaved((prev) => {
            const next = new Set(prev);
            if (next.has(T)) next.delete(T); else next.add(T);
            try {
              const bootstrap = window.TimedAuthHelpers?.getStoredBootstrap?.() || {};
              window.TimedAuthHelpers?.storeBootstrap?.({
                ...bootstrap,
                saved_tickers: Array.from(next),
              });
            } catch (_) {}
            return next;
          });
          try {
            await fetch(`${API_BASE}/timed/saved/toggle`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              credentials: "include",
              body: JSON.stringify({ ticker: T }),
            });
          } catch (_) { /* optimistic — keep local state */ }
        }, []);

        return { saved, toggle };
      }

      // ── useOpenTrades — live positions book only (source=positions).
      //   Promoted/backtest ledger rows must NOT attach as _openTrade —
      //   they poison Setup-lane tickers (INTC) with false "Open Long".
      function useOpenTrades(enabled) {
        const [tradeByTicker, setTradeByTicker] = useState(() => new Map());
        const isOpen = (tr) => {
          try {
            return window.TimedPriceUtils?.isTradeOpen?.(tr) ?? false;
          } catch (_) { return false; }
        };

        const refresh = useCallback(async () => {
          try {
            const posRes = await fetch(`${API_BASE}/timed/trades?source=positions`, { cache: "no-store" })
              .then((r) => (r.ok ? r.json() : null))
              .catch(() => null);
            const m = new Map();
            const accept = (tr) => {
              if (!isOpen(tr)) return;
              const sym = String(tr?.ticker || "").toUpperCase();
              if (!sym) return;
              const entryTs = tr?.entry_ts ?? tr?.entryTime ?? tr?.entryTs ?? 0;
              const existing = m.get(sym);
              if (!existing || entryTs > Number(existing?.entry_ts ?? existing?.entryTime ?? existing?.entryTs ?? 0)) {
                m.set(sym, tr);
              }
            };
            if (posRes?.ok && Array.isArray(posRes.trades)) posRes.trades.forEach(accept);
            setTradeByTicker(m);
          } catch (_) { /* leave previous map */ }
        }, []);

        useEffect(() => {
          if (!enabled) return undefined;
          refresh();
          const id = setInterval(refresh, 180000);
          return () => clearInterval(id);
        }, [enabled, refresh]);

        return tradeByTicker;
      }

      // Master filter — narrow by activeChip + query, applied once at the
      // TodayApp level so Bubble Map + Heat Map + Viewport all agree.
      function hasBubbleMapScores(t) {
        const fn = window.TTBubbleSearchUtils?.hasBubbleMapScores;
        return fn ? fn(t) : (Number.isFinite(Number(t?.ltf_score)) && Number.isFinite(Number(t?.htf_score)));
      }

      function parseTickerSearchQuery(query) {
        const fn = window.TTBubbleSearchUtils?.parseTickerSearchQuery;
        return fn ? fn(query) : { type: String(query || "").trim() ? "substring" : "none", q: String(query || "").trim().toUpperCase() };
      }

      function applyFilters(tickers, f, chips) {
        const q = String(f?.query || "").trim();
        const search = parseTickerSearchQuery(q);
        const multiSet = search.type === "multi-ticker" ? new Set(search.tickers) : null;
        const substringQ = search.type === "substring" ? search.q : "";
        const explicitSearch = !!(multiSet || substringQ);
        const activeId = f?.activeChip || null;
        const addOns = (f?.addOns instanceof Set) ? f.addOns : new Set();
        // Null / "all" / "__cleared__" → no chip narrowing, show every ticker.
        // This is what the Clear Filters button resets to, mirroring AT's
        // "Clear filter" pill behaviour.
        const chip = activeId && activeId !== "all"
          ? (chips || []).find((c) => c.id === activeId)
          : null;
        const chipSet = chip && Array.isArray(chip.tickers) && chip.tickers.length > 0
          ? new Set(chip.tickers.map((s) => TT_NORM_TICKER(s)))
          : null;

        // V15 P0.7.183 (2026-05-17) — Saved + TT Selected are now
        // ADDITIVE filters. Each enabled add-on is INTERSECTED with the
        // primary chip selection. So "Focus + Saved" = tickers that
        // are BOTH in the focus universe AND starred.
        const addOnSets = [];
        for (const addOnId of addOns) {
          const ac = (chips || []).find((c) => c.id === addOnId);
          if (ac && Array.isArray(ac.tickers) && ac.tickers.length > 0) {
            addOnSets.push(new Set(ac.tickers.map((s) => TT_NORM_TICKER(s))));
          }
        }

        return tickers.filter((t) => {
          if (!t || !t.ticker) return false;
          const sym = TT_NORM_TICKER(t.ticker);
          if (chipSet && !chipSet.has(sym)) return false;
          for (const s of addOnSets) {
            if (!s.has(sym)) return false;
          }
          if (multiSet) {
            if (!multiSet.has(sym)) return false;
          } else if (substringQ && !sym.includes(substringQ)) {
            return false;
          }
          // Universe placeholders merged from /timed/tickers have no HTF/LTF
          // scores yet — they render at (0,0) and clutter the map center.
          // Keep them out unless the operator explicitly searched for them.
          if (!explicitSearch && !hasBubbleMapScores(t)) return false;
          return true;
        });
      }

      // ── AnalysisControls — the unified search + filter header ────────
      //
      // Renders 4 rows of single-select chips (matching Active Trader):
      //   FOCUS / MOMENTUM / STRUCTURE / CONTEXT
      // Only one chip is active at a time across all rows.
      function AnalysisControls({ chips, totalCount, visibleCount, filters, setFilters }) {
        const { query, activeChip } = filters;
        const addOns = (filters?.addOns instanceof Set) ? filters.addOns : new Set();
        const setQ = (v) => setFilters((f) => ({ ...f, query: v }));
        const setChip = (id) => setFilters((f) => ({ ...f, activeChip: id }));
        // Toggle a Saved / TT Selected add-on. Each can be enabled
        // alongside the primary chip selection — they layer on top
        // as intersection filters.
        const toggleAddOn = (id) => setFilters((f) => {
          const cur = f?.addOns instanceof Set ? new Set(f.addOns) : new Set();
          if (cur.has(id)) cur.delete(id); else cur.add(id);
          return { ...f, addOns: cur };
        });
        // Clear filters → reset to the default Focus chip and wipe
        // search + all add-ons.
        const clearAll = () => setFilters({ activeChip: "focus", query: "", addOns: new Set() });
        const isCleared = activeChip === "focus" || activeChip === "all" || activeChip == null;
        const isFiltered = !isCleared || String(query || "").trim().length > 0 || addOns.size > 0;

        // V15 P0.7.183 — Saved + TT Selected are pulled OUT of the
        // mutually-exclusive chip rows and rendered as ADDITIVE
        // toggles in their own row above the primary chips. They
        // layer on top of the active chip.
        const ADDITIVE_IDS = new Set(["saved", "tt_selected"]);
        const additiveChips = chips.filter((c) => ADDITIVE_IDS.has(c.id));
        const primaryChips = chips.filter((c) => !ADDITIVE_IDS.has(c.id));

        const rows = useMemo(() => {
          const byRow = { focus: [], momentum: [], structure: [], context: [] };
          for (const c of primaryChips) {
            if (byRow[c.row]) byRow[c.row].push(c);
          }
          return byRow;
        }, [primaryChips]);

        const renderChip = (c) => {
          const isActive = activeChip === c.id;
          const tone = c.row === "focus" && c.isDefault && isActive ? "pull" : null;
          const cls = `ac-chip${isActive ? " active" : ""}${tone ? " " + tone : ""}`;
          return h("button", {
            key: c.id,
            className: cls,
            onClick: () => setChip(c.id),
            title: c.tooltip || c.label,
          },
            c.label,
            c.count != null && h("span", { className: "ac-count" }, c.count),
          );
        };

        const renderAddOn = (c) => {
          const isOn = addOns.has(c.id);
          return h("button", {
            key: c.id,
            className: `ac-chip ac-chip--addon${isOn ? " active" : ""}`,
            onClick: () => toggleAddOn(c.id),
            title: (c.tooltip || c.label) + (isOn ? " · click to remove" : " · click to layer on top"),
          },
            isOn ? "✓ " : "+ ",
            c.label,
            c.count != null && h("span", { className: "ac-count" }, c.count),
          );
        };

        const Row = ({ label, items }) => {
          if (!items || items.length === 0) return null;
          return h("div", { className: "ac-row" },
            h("div", { className: "ac-row-label" }, label),
            h("div", { className: "ac-chips" }, items.map(renderChip)),
          );
        };

        return h("div", { className: "analysis-controls" },
          h("div", { className: "ac-head" },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "ANALYSIS"),
              h("div", { className: "tt-sec-h" }, "Find what is moving — filter both views below"),
            ),
            h("div", { className: "ac-meta" },
              isFiltered && h("button", {
                className: "ac-clear",
                onClick: clearAll,
                title: "Reset to Focus · clear search + add-ons",
              }, "✕ Clear filters"),
              h("span", null,
                h("strong", null, visibleCount), " of ", h("strong", null, totalCount), " tickers",
              ),
            ),
          ),
          h("div", { className: "ac-search" },
            h("span", { className: "ac-search-icon" }, "⌕"),
            h("input", {
              type: "search",
              placeholder: "Search ticker (e.g. NBIS, AAPL, GOOGL, MSFT)",
              value: query,
              onChange: (e) => setQ(e.target.value),
              spellCheck: false,
              autoComplete: "off",
              "aria-label": "Search ticker symbol",
            }),
            query && h("button", { className: "ac-search-clear", onClick: () => setQ("") }, "clear"),
          ),
          // Additive add-ons row — Saved + TT Selected toggle on top
          // of the primary chip. Renders only when the chips exist
          // (Saved is conditional on having starred tickers).
          additiveChips.length > 0 && h("div", { className: "ac-row" },
            h("div", { className: "ac-row-label" }, "Layer"),
            h("div", { className: "ac-chips" }, additiveChips.map(renderAddOn)),
          ),
          h(Row, { label: "Focus",     items: rows.focus }),
          h(Row, { label: "Momentum",  items: rows.momentum }),
          h(Row, { label: "Structure", items: rows.structure }),
          h(Row, { label: "Context",   items: rows.context }),
        );
      }

      // ═══════════════════════════════════════════════════════════
      // Viewport — compact ticker-card list, mirrors Active Trader's
      // OpportunitiesPanel but trimmed for the Today digest context.
      //
      // Reads from the same `visible` set the Bubble Map + Heat Map
      // use, so the chip filter + search keep all three in sync.
      //
      // Click a row → deep-link into /index-react.html for the full
      // Active Trader analysis (chart, kanban, right-rail).
      // ═══════════════════════════════════════════════════════════
      // ── ViewportCard — production DsCompactCard ported from
      //    index-react.source.html lines 13048-13433. Trimmed for the
      //    Today digest context: no open-trade progress bar, no save star,
      //    no earnings badge (those belong to the Active Trader workflow).
      //
      //    Visual: logo + symbol + BIAS chip + stage chip · big price ·
      //    daily change · sparkline (1H, behind text wash) · bottom chips
      //    (S# score, B·/C· conviction, RR, SQ state).
      //
      //    Uses production CSS classes from tt-tokens.css (.ds-tickercard*,
      //    .ds-chip*) so it renders identically to the Active Trader cards.
      function ViewportCard({ t, rankPosition, onOpen, sparkSrc, isSaved, onToggleSaved }) {
        const sym = String(t?.ticker || "").toUpperCase();
        const dailyChange = (window.TimedPriceUtils && window.TimedPriceUtils.getDailyChange)
          || (() => ({ dayPct: null, dayChg: null }));
        const dc = (() => { try { return dailyChange(t); } catch (_) { return null; } })();
        // Headline = session-aware RTH price (getHeadlinePrice). EXT line below.
        const price = Number(window.TimedPriceUtils?.getHeadlinePrice?.(t) ?? t?.price ?? t?.close);
        const dayPct = Number.isFinite(dc?.dayPct) ? Number(dc.dayPct) : null;
        const dayChg = Number.isFinite(dc?.dayChg) ? Number(dc.dayChg) : null;
        const dir = dayPct == null || Math.abs(dayPct) < 0.05 ? "flat" : dayPct > 0 ? "up" : "dn";

        const TT = window.TimedBubbleChart || {};
        const score = (() => {
          try {
            const dyn = TT.rankScoreForTicker ? Number(TT.rankScoreForTicker(t)) : NaN;
            if (Number.isFinite(dyn) && dyn !== 0) return Math.round(dyn);
          } catch (_) {}
          const fallback = Number(t?.score ?? t?.rank);
          return Number.isFinite(fallback) && fallback !== 0 ? Math.round(fallback) : null;
        })();
        // Read rank straight from the data the way DsCompactCard does — do
        // NOT synthesize from client-side ranking. Otherwise Today would
        // show an R# chip on every card while AT (same data) doesn't.
        const rank = Number(t?.rank_position ?? t?.rp) || null;
        const conv = Number(t?.focus_conviction_score ?? t?.__focus_conviction_score) || null;
        const tier = String(t?.focus_tier ?? t?.__focus_tier ?? "").toUpperCase();

        // Bias chip — BULL / BEAR / NEUTRAL.
        // 2026-05-21: switched from a state-only derivation to the SHARED
        // inferModelDirection() helper (window.TimedPriceUtils) which
        // mirrors the worker's inferTraderDirection() priority:
        //   swing_consensus.direction → trigger_dir → state
        // Previously the card read `state` (HTF_BULL / HTF_BEAR) directly,
        // which disagreed with the right rail's prediction-contract once
        // it loaded (e.g. NVDA state=HTF_BULL but swing_consensus=BEARISH
        // → right rail flipped to SHORT, card stayed BULL). Now both
        // surfaces compute the same direction from the cached snapshot
        // before any network call.
        const _posture = (window.TimedPriceUtils && window.TimedPriceUtils.inferTraderPosture)
          ? window.TimedPriceUtils.inferTraderPosture(t)
          : null;
        const _modelDir = _posture?.direction || ((window.TimedPriceUtils && window.TimedPriceUtils.inferModelDirection)
          ? window.TimedPriceUtils.inferModelDirection(t)
          : "");
        const openTrade = (() => {
          const tr = t?._openTrade || null;
          if (!tr) return null;
          try {
            return window.TimedPriceUtils?.isTradeOpen?.(tr) ? tr : null;
          } catch (_) { return null; }
        })();
        const tradeDir = openTrade ? String(openTrade.direction || "").toUpperCase() : "";
        const biasLabel = tradeDir === "LONG"  ? "Open Long"
                       : tradeDir === "SHORT" ? "Open Short"
                       : _posture?.label ? _posture.label
                       : _modelDir === "LONG"  ? "Bullish"
                       : _modelDir === "SHORT" ? "Bearish"
                       : "Neutral";
        const biasLabelLc = String(biasLabel).toLowerCase();
        const biasChipCls = biasLabelLc.includes("bullish") || biasLabelLc.includes("long") ? "ds-chip--up"
                         : biasLabelLc.includes("bearish") || biasLabelLc.includes("short") ? "ds-chip--dn"
                         : "ds-chip--solid";

        // Stage chip — reads kanban_stage AFTER TodayApp has rewritten it
        // to the effective stage (engine 'exit' on an open position → DEFEND,
        // etc.). See computeEffectiveStage + the allTickers useMemo.
        const stage = String(t?.kanban_stage || "").toLowerCase();
        const stageChip = (() => {
          if (stage === "trim") return { label: "Trim", cls: "ds-chip--accent" };
          if (stage === "defend") return { label: "Defend", cls: "ds-chip--dn" };
          if (stage === "exit") return { label: "Exit", cls: "ds-chip--dn" };
          if (stage === "hold" || stage === "active" || stage === "just_entered") return { label: "Hold", cls: "ds-chip--up" };
          return null;
        })();
        const actionChips = viewportActionChips(t);

        // TT Selected dot (small gold indicator).
        const isTTSel = (typeof window !== "undefined" && typeof window.isTickerTTSelected === "function")
          ? window.isTickerTTSelected(sym)
          : false;

        // 1H sparkline — read from the cache; the card will re-render once
        // the fetch lands and updates the cache.
        const sparkPointsRaw = sparkClosesFromCacheEntry(sparkSrc);
        const sparkPoints = (sparkPointsRaw && sparkPointsRaw.length >= 2)
          ? sparkPointsRaw
          : [price || 0, price || 0];
        const sparkSvg = (window.DS && Number.isFinite(price) && price > 0)
          ? window.DS.sparklineSvg(sparkPoints, { width: 280, height: 44, direction: dir, strokeWidth: 1.4 })
          : "";

        const patternChips = (() => {
          const candles = sparkCandlesFromCacheEntry(sparkSrc);
          const detect = window.TimedPatternDetect?.detectCandlePatterns;
          if (!candles || !detect) return [];
          return detect(candles).slice(0, 2);
        })();

        // Match AT's cardStyle exactly (index-react.source.html line 13304):
        //  - textAlign: "left"        → keep the price + change left-aligned
        //                                instead of inheriting <button>'s
        //                                default text-align: center
        //  - padding: --ds-space-3    → 12px instead of the default 16px so
        //                                the card matches AT's tighter layout
        const cardBiasLabel = (window.TTLaneCard?.compactBiasLabel)
          ? window.TTLaneCard.compactBiasLabel(biasLabel)
          : biasLabel;
        const extLine = window.TTLaneCard?.extLineFromTicker
          ? window.TTLaneCard.extLineFromTicker(t)
          : null;

        const cardStyle = {
          textAlign: "left",
          padding: "var(--ds-space-3)",
          ...(isTTSel
            ? { borderColor: "var(--ds-accent-dim)", boxShadow: "inset 0 0 0 1px rgba(245,194,92,0.18)" }
            : {}),
        };

        return window.TTLaneCard.create({
          sym,
          button: {
            onClick: () => onOpen(sym),
            style: cardStyle,
            title: `Open ${sym} in Active Trader`,
          },
          isTTSel,
          chipRow: [
            h("span", {
              className: `ds-chip ds-chip--sm ${biasChipCls}`,
              style: { fontFamily: "var(--tt-font-mono)" },
              title: openTrade ? "Trade direction" : (biasLabel !== cardBiasLabel ? biasLabel : "Model bias"),
            }, cardBiasLabel),
            ...actionChips.map((chip, i) => h("span", {
              key: `${chip.label}-${i}`,
              className: `ds-chip ds-chip--sm ${chip.cls}`,
              title: chip.title,
            }, chip.label)),
            stageChip && h("span", {
              className: `ds-chip ds-chip--sm ${stageChip.cls}`,
            }, stageChip.label),
            ...patternChips.map((p) => h("span", {
              key: p.type,
              className: `tt-pattern-chip ${p.bias === "bullish" ? "tt-pattern-chip--bull" : p.bias === "bearish" ? "tt-pattern-chip--bear" : ""}`,
              title: p.tooltip,
            }, `${p.icon} ${p.type}`)),
          ],
          quote: { price, dayPct, dayChg, dir, extLine },
          sparkSvg,
          metrics: [
            rank != null && h("span", {
              className: `ds-chip ds-chip--sm ${rank <= 10 ? "ds-chip--up" : rank <= 30 ? "ds-chip--accent" : ""}`,
              style: { fontFamily: "var(--tt-font-mono)" },
              title: `Rank position: ${rank} of all eligible tickers (1 = best).`,
            }, `R${rank}`),
            score != null && h("span", {
              className: `ds-chip ds-chip--sm ${score >= 100 ? "ds-chip--up" : score >= 75 ? "ds-chip--accent" : ""}`,
              style: { fontFamily: "var(--tt-font-mono)" },
              title: `Score: ${Math.round(score)} (composite alignment, higher = better).`,
            }, `S${Math.round(score)}`),
            conv != null && h("span", {
              className: `ds-chip ds-chip--sm ${tier === "A" ? "ds-chip--up" : tier === "B" ? "ds-chip--accent" : "ds-chip--solid"}`,
              style: { fontFamily: "var(--tt-font-mono)" },
              title: "Conviction tier · focus score",
            }, `${tier || "C"}·${Math.round(conv)}`),
            (() => {
              const tilt = Number(t?._theme_tilt);
              if (!Number.isFinite(tilt) || tilt === 0) return null;
              const themeName = String(t?._theme_tilt_theme || "theme").replace(/_/g, " ");
              return h("span", {
                className: `ds-chip ds-chip--sm ${tilt > 0 ? "ds-chip--up" : "ds-chip--dn"}`,
                style: { fontFamily: "var(--tt-font-mono)" },
                title: `Theme tilt: ${tilt > 0 ? "+" : ""}${tilt} from ${themeName} activity (CRO rotation engine + playbook; bounded ±6, direction-aware).`,
              }, `T${tilt > 0 ? "+" : ""}${tilt}`);
            })(),
          ],
          isSaved,
          onToggleSaved,
        });
      }

      // ── useSparklineCache — fetches daily candles per visible symbol on
      //    demand, refreshes every 5 min. Exposes window._dsEnsureSparkline
      //    so cards (and any DS-driven render path) can read the cache.
      function useSparklineCache() {
        const [cache, setCache] = useState({});
        const sparkCfg = window.TTSparklineConfig || {};
        const buildUrl = sparkCfg.buildSparklineUrl || ((base, sym) => `${base}/timed/candles?ticker=${encodeURIComponent(sym)}&tf=D&limit=20`);
        const toCloses = sparkCfg.closesFromCandles || ((candles) => (Array.isArray(candles) ? candles.map((c) => Number(c?.c ?? c?.close)).filter(Number.isFinite) : []));

        const fetchSpark = useCallback(async (sym) => {
          try {
            const r = await fetch(buildUrl(API_BASE, sym), { cache: "no-store" });
            // Don't try to parse a 4xx/5xx body — endpoint can return
            // 500 for tickers the candle store hasn't backfilled yet.
            if (!r.ok) return null;
            const j = await r.json();
            const candles = Array.isArray(j?.candles) ? j.candles : [];
            const closes = toCloses(candles);
            if (closes.length < 2) return null;
            return { closes, candles };
          } catch (_) {
            return null;
          }
        }, [buildUrl, toCloses]);

        const ensure = useCallback((sym) => {
          if (!sym) return null;
          const upper = String(sym).toUpperCase();
          if (cache[upper]) return sparkClosesFromCacheEntry(cache[upper]);
          if (cache[upper] === undefined) {
            setCache((prev) => ({ ...prev, [upper]: null }));
            fetchSpark(upper).then((payload) => {
              if (payload && payload.closes?.length >= 2) {
                setCache((prev) => ({ ...prev, [upper]: payload }));
              }
            });
          }
          return null;
        }, [cache, fetchSpark]);

        // Mirror Active Trader: expose on window so legacy DS code paths
        // (e.g. window._dsEnsureSparkline) can read the cache.
        useEffect(() => {
          window._dsEnsureSparkline = ensure;
          window._dsSparklineCache = cache;
        }, [ensure, cache]);

        // Refresh on a 5-min interval.
        useEffect(() => {
          const interval = setInterval(() => {
            const symbols = Object.keys(cache).filter((s) => sparkClosesFromCacheEntry(cache[s])?.length >= 2);
            symbols.forEach((sym) => {
              fetchSpark(sym).then((payload) => {
                if (payload && payload.closes?.length >= 2) setCache((prev) => ({ ...prev, [sym]: payload }));
              });
            });
          }, 5 * 60 * 1000);
          return () => clearInterval(interval);
        }, [cache, fetchSpark]);

        return { cache, ensure };
      }

      function Viewport({ visible, rankedTickerPositions, query, sparkCache, ensureSpark, onSelectTicker, activeChip, layout }) {
        const { saved, toggle: toggleSaved } = useSavedTickers();
        const lane = layout === "lane";

        const ranked = useMemo(() => {
          const list = (visible || []).slice();
          if (activeChip === "entry_zone") {
            return sortEntryZoneTickers(list);
          }
          list.sort((a, b) => {
            const ra = rankedTickerPositions?.get?.(a.ticker);
            const rb = rankedTickerPositions?.get?.(b.ticker);
            if (Number.isFinite(ra) && Number.isFinite(rb)) return ra - rb;
            if (Number.isFinite(ra)) return -1;
            if (Number.isFinite(rb)) return 1;
            const rra = Number(a.rr) || 0, rrb = Number(b.rr) || 0;
            if (rra !== rrb) return rrb - rra;
            return String(a.ticker).localeCompare(String(b.ticker));
          });
          return list;
        }, [visible, rankedTickerPositions, activeChip]);

        // Kick off sparkline fetches for the visible top-N (cards trigger
        // their own ensure() on render, but a proactive sweep makes the
        // first paint feel less twitchy).
        useEffect(() => {
          if (!ensureSpark) return;
          ranked.slice(0, 60).forEach((t) => ensureSpark(t.ticker));
        }, [ranked, ensureSpark]);

        const onOpen = (sym) => {
          if (typeof onSelectTicker === "function") {
            onSelectTicker(sym);
            return;
          }
          window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`;
        };

        return h("aside", {
          className: lane ? "vp-lane-wrap" : "vp-card",
          "aria-label": "Ticker viewport",
        },
          !lane && h("div", { className: "vp-head" },
            h("div", { className: "vp-title" }, "VIEWPORT"),
            h("div", { className: "vp-count" }, `${ranked.length} tickers`),
          ),
          h("div", { className: lane ? "vp-lane" : "vp-list" },
            ranked.length === 0
              ? h("div", { className: "vp-empty", style: lane ? { minWidth: 280 } : undefined }, "No tickers match. Try a different filter or clear the search.")
              : ranked.slice(0, lane ? 40 : 60).map((t) => {
                  const SYM = String(t.ticker || "").toUpperCase();
                  return h(ViewportCard, {
                    key: t.ticker,
                    t,
                    rankPosition: rankedTickerPositions?.get?.(t.ticker),
                    sparkSrc: sparkCache[SYM] || null,
                    onOpen,
                    isSaved: saved.has(SYM),
                    onToggleSaved: toggleSaved,
                  });
                }),
          ),
        );
      }

      const LANE_CHIP_IDS = ["entry_zone", "open_positions", "market_pulse", "top_movers", "saved", "tt_selected", "all"];

      function LaneControls({ chips, totalCount, visibleCount, filters, setFilters }) {
        const { query, activeChip } = filters;
        const setQ = (v) => setFilters((f) => ({ ...f, query: v }));
        const setChip = (id) => setFilters((f) => ({ ...f, activeChip: id, addOns: new Set() }));
        const laneChips = LANE_CHIP_IDS
          .map((id) => (chips || []).find((c) => c.id === id))
          .filter(Boolean);
        return h("div", { className: "tt-lane-controls" },
          h("div", { className: "ac-search" },
            h("span", { className: "ac-search-icon" }, "⌕"),
            h("input", {
              type: "search",
              placeholder: "Search ticker (e.g. NBIS, AAPL, GOOGL, MSFT)",
              value: query,
              onChange: (e) => setQ(e.target.value),
              spellCheck: false,
              autoComplete: "off",
              "aria-label": "Search ticker symbol",
            }),
            query && h("button", { className: "ac-search-clear", onClick: () => setQ("") }, "clear"),
          ),
          h("div", { style: { display: "flex", alignItems: "center", justifyContent: "space-between", gap: 8, flexWrap: "wrap" } },
            h("div", { className: "tt-lane-chip-row" },
              laneChips.map((c) => {
                const isActive = activeChip === c.id;
                return h("button", {
                  key: c.id,
                  className: `ac-chip${isActive ? " active" : ""}${c.id === "entry_zone" && isActive ? " pull" : ""}`,
                  onClick: () => setChip(c.id),
                  title: c.tooltip || c.label,
                },
                  c.label,
                  c.count != null && h("span", { className: "ac-count" }, c.count),
                );
              }),
            ),
            h("span", { className: "ac-meta", style: { fontSize: 11, whiteSpace: "nowrap" } },
              h("strong", null, visibleCount), " of ", h("strong", null, totalCount),
            ),
          ),
        );
      }

      function TickerLaneSection({ allTickers, visible, query, data, rankedTickers, rankedTickerPositions, sparkCache, ensureSpark, onSelectTicker, filters, setFilters, tradeByTicker, chips, scoredCount, embedded }) {
        const body = h(React.Fragment, null,
          h("div", { className: "tt-viewport-map-head" },
            h("div", { className: "tt-sec-title" }, "TECHNICAL SETUPS"),
            h("div", { className: "tt-sec-h" }, "Easy Search & Filter"),
          ),
          h(LaneControls, {
            chips,
            totalCount: scoredCount,
            visibleCount: visible.length,
            filters,
            setFilters,
          }),
          h(Viewport, {
            visible,
            rankedTickerPositions,
            query,
            sparkCache,
            ensureSpark,
            onSelectTicker,
            activeChip: filters?.activeChip,
            layout: "lane",
          }),
          h(BubbleMapGuide, null),
          h("div", { className: "tt-bmap-head", style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap" } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("div", { className: "tt-sec-h" }, "Where every ticker sits on momentum × trend"),
            ),
            h("div", { className: "bm-legend" },
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#22c55e" } }), "Bull aligned"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#34d399" } }), "Bull mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f5c25c" } }), "Pullback"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#fb7185" } }), "Bear mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f43f5e" } }), "Bear aligned"),
            ),
          ),
          h("div", { className: "tt-bmap-block" },
            h(SharedBubbleMapSection, {
              allTickers,
              visible,
              query,
              data,
              rankedTickers,
              rankedTickerPositions,
              onSelectTicker,
              filters,
              setFilters,
              tradeByTicker,
              embedded: true,
            }),
          ),
        );
        if (embedded) return h("div", { className: "tt-lane-section" }, body);
        return h("section", { className: "tt-row tt-lane-section" }, body);
      }

      // ═══════════════════════════════════════════════════════════
      // BubbleMapViewportSplit — 2-column layout: Viewport (left)
      // beside the Bubble Map (right), mirroring Active Trader's split
      // experience. On narrow screens (<1100px) they stack vertically.
      // ═══════════════════════════════════════════════════════════
      function BubbleMapGuide() {
        const storageKey = "tt-bubble-map-guide-dismissed";
        const [dismissed, setDismissed] = useState(() => {
          try { return window.localStorage.getItem(storageKey) === "1"; } catch { return false; }
        });
        if (dismissed) return null;
        return h("div", { className: "tt-bmap-guide" },
          h("div", { className: "tt-bmap-guide-head" },
            h("div", { className: "tt-bmap-guide-title" }, "How to read the Bubble Map"),
            h("button", {
              type: "button",
              className: "tt-bmap-guide-dismiss",
              onClick: () => {
                setDismissed(true);
                try { window.localStorage.setItem(storageKey, "1"); } catch (_) {}
              },
            }, "Got it"),
          ),
          h("ul", null,
            h("li", null, "Horizontal axis (LTF Score): short-term momentum — left is weak, right is strong."),
            h("li", null, "Vertical axis (HTF Score): higher-timeframe trend — bottom is bearish, top is bullish."),
            h("li", null, "Top-right green zone: bullish alignment. Bottom-left red zone: bearish alignment."),
            h("li", null, "Click any bubble to open levels, setup quality, and trade context in the detail panel."),
          ),
        );
      }

      function BubbleMapViewportSplit({ allTickers, visible, query, data, rankedTickers, rankedTickerPositions, sparkCache, ensureSpark, onSelectTicker, filters, setFilters, tradeByTicker }) {
        return h("section", { className: "tt-row" },
          h(BubbleMapGuide, null),
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 8 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("div", { className: "tt-sec-h" }, "Where every ticker sits on momentum \u00d7 trend"),
            ),
            h("div", { className: "bm-legend" },
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#22c55e" } }), "Bull aligned"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#34d399" } }), "Bull mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f5c25c" } }), "Pullback"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#fb7185" } }), "Bear mixed"),
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f43f5e" } }), "Bear aligned"),
            ),
          ),
          h("div", { className: "bmv-split" },
            h(Viewport, { visible, rankedTickerPositions, query, sparkCache, ensureSpark, onSelectTicker, activeChip: filters?.activeChip }),
            h("div", { className: "bmv-bubble" },
              h(SharedBubbleMapSection, {
                allTickers, visible, query, data,
                rankedTickers, rankedTickerPositions,
                embedded: true,
                onSelectTicker,
                filters,
                setFilters,
                tradeByTicker,
              }),
            ),
          ),
        );
      }

      // ═══════════════════════════════════════════════════════════
      // SharedBubbleMapSection — uses the shared BubbleChart from
      // shared-bubble-chart.compiled.js (extracted from Active Trader).
      //
      // This renders the EXACT same bubble plot that lives in
      // /index-react.html — no duplicate code, no drift between the
      // two pages.
      //
      // Today.html doesn't do Time Travel, trails, or insight filters
      // (those belong to the deep Active Trader workflow), so those
      // props are passed as null/false. The bubble plot, hover,
      // crosshair, click-to-open, and labels all work identically.
      //
      // Filter state lives in TodayApp's `filters` and is funneled into
      // the `tickers` prop via the `visible` array, so the AnalysisControls
      // chips above drive what bubbles render.
      //
      // Falls back to the in-page lightweight BubbleMap if the shared
      // module hasn't loaded yet (first paint / network failure).
      // ═══════════════════════════════════════════════════════════
      function SharedBubbleMapSection({ allTickers, visible, query, data, rankedTickers: rtProp, rankedTickerPositions: rtpProp, embedded = false, onSelectTicker, filters, setFilters, tradeByTicker }) {
        const SharedChart = (typeof window !== "undefined" && window.TimedBubbleChart && window.TimedBubbleChart.BubbleChart) || null;
        const getRankedTickers = (window.TimedBubbleChart && window.TimedBubbleChart.getRankedTickers) || null;
        const [bubbleSearchOpen, setBubbleSearchOpen] = useState(false);
        const bubbleSearchRef = useRef(null);

        // Compute rankedTickers / rankedTickerPositions once per data change,
        // unless the parent already passed them (split-layout case).
        const rankedTickersLocal = useMemo(() => {
          if (Array.isArray(rtProp) && rtProp.length > 0) return rtProp;
          if (!getRankedTickers || !data) return [];
          try { return getRankedTickers(data) || []; } catch { return []; }
        }, [data, rtProp]);
        const rankedTickerPositionsLocal = useMemo(() => {
          if (rtpProp && typeof rtpProp.get === "function" && rtpProp.size > 0) return rtpProp;
          const m = new Map();
          rankedTickersLocal.forEach((t, idx) => { if (t?.ticker) m.set(t.ticker, idx + 1); });
          return m;
        }, [rankedTickersLocal, rtpProp]);

        // Hover + selected state for the bubble plot (local to this section).
        const [hovered, setHovered] = useState(null);

        useEffect(() => {
          if (!bubbleSearchOpen) return;
          const t = setTimeout(() => {
            try { bubbleSearchRef.current?.focus(); } catch (_) {}
          }, 50);
          return () => clearTimeout(t);
        }, [bubbleSearchOpen]);

        // If the shared module didn't load (network blip / dev), gracefully
        // fall back to the simpler in-page BubbleMap so the page still works.
        if (!SharedChart) {
          return h(BubbleMap, { allTickers, visible, query });
        }

        const headerNode = embedded ? null : h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 8 } },
          h("div", null,
            h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
            h("div", { className: "tt-sec-h" }, "Where every ticker sits on momentum \u00d7 trend"),
          ),
          h("div", { className: "bm-legend" },
            h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#22c55e" } }), "Bull aligned"),
            h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#34d399" } }), "Bull mixed"),
            h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f5c25c" } }), "Pullback"),
            h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#fb7185" } }), "Bear mixed"),
            h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#f43f5e" } }), "Bear aligned"),
          ),
        );

        const chartBody = h("div", { className: "tt-card tt-card-pad", style: { padding: 0, overflow: "hidden" } },
          h("div", { style: { height: 700, position: "relative" } },
            h(SharedChart, {
              tickers: visible,
              allData: data,
              rankedTickers: rankedTickersLocal,
              rankedTickerPositions: rankedTickerPositionsLocal,
              hoveredTicker: hovered,
              onHover: setHovered,
              onBubbleClick: (sym) => {
                if (typeof onSelectTicker === "function") { onSelectTicker(sym); return; }
                window.location.href = `/index-react.html?ticker=${encodeURIComponent(sym)}`;
              },
              onBackgroundClick: () => setBubbleSearchOpen(true),
              selectedTicker: null,
              selectedTrail: null,
              isTimeTravelActive: false,
              highlightTrailPoint: null,
              thesisMode: false,
              forwardReturns: null,
              activeInsightTickers: null,
              layoutMode: "score",
              tradeByTicker,
            }),
            bubbleSearchOpen && h("div", {
              className: "bm-quick-search-overlay",
              onClick: (e) => { if (e.target === e.currentTarget) setBubbleSearchOpen(false); },
            },
              h("div", {
                className: "bm-quick-search-panel",
                onClick: (e) => e.stopPropagation(),
              },
                h("div", { className: "bm-quick-search-head" },
                  h("span", { className: "bm-quick-search-title" }, "Search tickers"),
                  h("button", {
                    type: "button",
                    className: "bm-quick-search-close",
                    onClick: () => setBubbleSearchOpen(false),
                    "aria-label": "Close search",
                  }, "\u00d7"),
                ),
                h("input", {
                  ref: bubbleSearchRef,
                  type: "search",
                  className: "bm-quick-search-input",
                  placeholder: "Search tickers (e.g. AAPL, MSFT, TSLA)",
                  value: filters?.query || "",
                  onChange: (e) => {
                    if (typeof setFilters !== "function") return;
                    setFilters((prev) => ({ ...prev, query: e.target.value }));
                  },
                  onKeyDown: (e) => {
                    if (e.key === "Escape") {
                      setBubbleSearchOpen(false);
                      return;
                    }
                    if (e.key !== "Enter") return;
                    const raw = String(e.target.value || "").trim().toUpperCase();
                    if (!raw || raw.includes(",")) return;
                    const hit = (visible || []).find((t) => String(t?.ticker || "").toUpperCase() === raw)
                      || (allTickers || []).find((t) => String(t?.ticker || "").toUpperCase() === raw);
                    if (hit && typeof onSelectTicker === "function") {
                      onSelectTicker(raw);
                      setBubbleSearchOpen(false);
                    }
                  },
                }),
                h("p", { className: "bm-quick-search-hint" },
                  "Comma-separated lists filter multiple tickers. Press Enter on a single symbol to open its card.",
                ),
              ),
            ),
          ),
        );

        // Embedded inside BubbleMapViewportSplit: return just the chart card
        // (the split renders its own shared header + legend above the row).
        if (embedded) return chartBody;

        return h("section", { className: "tt-row" }, headerNode, chartBody);
      }

      // ── Bubble Map fallback (in-page lightweight, used if shared module fails) ─
      function BubbleMap({ allTickers, visible, query }) {
        const [tooltip, setTooltip] = useState(null);
        const stageRef = React.useRef(null);

        const domain = useMemo(() => {
          let maxLtf = 5, maxHtf = 5;
          for (const t of allTickers) {
            const l = Math.abs(Number(t.ltf_score) || 0);
            const v = Math.abs(Number(t.htf_score) || 0);
            if (l > maxLtf) maxLtf = l;
            if (v > maxHtf) maxHtf = v;
          }
          const xMax = Math.max(10, Math.min(50, maxLtf * 1.12));
          const yMax = Math.max(10, Math.min(50, maxHtf * 1.12));
          return { xMax, yMax };
        }, [allTickers]);

        // Widescreen aspect (~7:3) — uses the full horizontal width of the
        // 1600px container so bubbles spread out and labels don't collide.
        const VB = { w: 1400, h: 620, mx: 70, my: 42 };
        const plotW = VB.w - 2 * VB.mx;
        const plotH = VB.h - 2 * VB.my;
        const xScale = (v) => VB.mx + ((Number(v) || 0) + domain.xMax) / (2 * domain.xMax) * plotW;
        const yScale = (v) => VB.my + (domain.yMax - (Number(v) || 0)) / (2 * domain.yMax) * plotH;
        const cx0 = xScale(0);
        const cy0 = yScale(0);

        const q = String(query || "").trim();
        const search = parseTickerSearchQuery(q);
        const multiSet = search.type === "multi-ticker" ? new Set(search.tickers) : null;
        const substringQ = search.type === "substring" ? search.q : "";
        const matchesQuery = (sym) => {
          const S = String(sym || "").toUpperCase();
          if (multiSet) return multiSet.has(S);
          if (substringQ) return S.includes(substringQ);
          return false;
        };

        // Bigger plot = bigger bubbles. Range 6..22 px (was 4..16).
        const radiusFor = (t) => {
          const r = Math.min(Math.abs(Number(t.htf_score) || 0), 35);
          return 6 + (r / 35) * 16;
        };

        const handleHover = (e, t) => {
          if (!stageRef.current) return;
          const rect = stageRef.current.getBoundingClientRect();
          setTooltip({ t, x: e.clientX - rect.left + 12, y: e.clientY - rect.top - 8 });
        };
        const handleLeave = () => setTooltip(null);

        if (visible.length === 0 && allTickers.length === 0) return null;

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 12, flexWrap: "wrap", marginBottom: 8 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "BUBBLE MAP"),
              h("div", { className: "tt-sec-h" }, "Where every ticker sits on momentum × trend"),
            ),
            h("div", { className: "bm-legend" },
              h("span", null, h("span", { className: "bm-leg-dot", style: { background: "#22c55e" } }), "Bull aligned"),
