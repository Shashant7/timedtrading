name: Trust Spine Weekly

on:
  schedule:
    - cron: "0 14 * * 1"
  workflow_dispatch:

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Decision records validation
        run: node scripts/validate-decision-records-live.mjs --wrangler-d1 production --remote
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Weekly scorecard
        run: node scripts/trust-spine-scorecard.mjs --days 7
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
