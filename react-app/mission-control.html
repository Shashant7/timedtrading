    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;
      const API_BASE = "";
      const AuthGate = window.TimedAuthGate;

      function fmtUsd(n, decimals = 0) {
        if (!Number.isFinite(Number(n))) return "—";
        const v = Number(n);
        const sign = v < 0 ? "-" : "";
        const abs = Math.abs(v);
        if (abs >= 1e6) return `${sign}$${(abs / 1e6).toFixed(2)}M`;
        if (abs >= 1e3) return `${sign}$${(abs / 1e3).toFixed(decimals === 0 ? 1 : decimals)}K`;
        return `${sign}$${abs.toFixed(decimals)}`;
      }
      function fmtPct(n, decimals = 1) {
        if (!Number.isFinite(Number(n))) return "—";
        const v = Number(n);
        return `${v >= 0 ? "+" : ""}${v.toFixed(decimals)}%`;
      }
      function fmtAgo(ts) {
        if (!ts) return "—";
        const ms = Date.now() - Number(ts);
        if (ms < 60000) return "just now";
        const m = Math.floor(ms / 60000);
        if (m < 60) return `${m}m ago`;
        const h = Math.floor(ms / 3600000);
        if (h < 24) return `${h}h ago`;
        const d = Math.floor(ms / 86400000);
        return `${d}d ago`;
      }
      function fmtDate(ts) {
        if (!ts) return "—";
        return new Date(Number(ts)).toLocaleDateString("en-US", { month: "short", day: "numeric" });
      }

      // ── Detail Sections Toggle (collapsible "show all detail") ─────────
      //
      // Wraps the original 8 detail sections so they hide by default
      // behind a toggle. Auto-opens when the user lands with a #anchor
      // (e.g. from clicking a status tile that links to #cio) so the
      // jump still works. State persists in localStorage so repeat
      // visits remember the operator's preference.
      function DetailSectionsToggle({ children }) {
        const [open, setOpen] = useState(() => {
          if (typeof window === "undefined") return false;
          if (window.location.hash) return true;
          try { return window.localStorage.getItem("mc-detail-open") === "1"; }
          catch (_) { return false; }
        });
        useEffect(() => {
          const onHash = () => { if (window.location.hash) setOpen(true); };
          window.addEventListener("hashchange", onHash);
          return () => window.removeEventListener("hashchange", onHash);
        }, []);
        useEffect(() => {
          try { window.localStorage.setItem("mc-detail-open", open ? "1" : "0"); } catch (_) {}
          // When opening, give the browser a tick to render the sections
          // before scrolling to a #anchor (only if one is present).
          if (open && window.location.hash) {
            setTimeout(() => {
              const target = document.querySelector(window.location.hash);
              if (target?.scrollIntoView) target.scrollIntoView({ behavior: "smooth", block: "start" });
            }, 50);
          }
        }, [open]);
        return h(React.Fragment, null,
          h("div", {
            style: {
              display: "flex", alignItems: "center", justifyContent: "space-between",
              margin: "14px 4px 10px",
              flexWrap: "wrap", gap: 8,
            },
          },
            h("div", null,
              h("span", { style: { fontSize: 11, fontWeight: 700, letterSpacing: "0.10em", textTransform: "uppercase", color: "#94a3b8" } }, "Detail Sections"),
              h("span", { style: { fontSize: 11, marginLeft: 8, color: "#6b7280" } },
                open ? "all 8 panels expanded below" : "tap a tile above to jump, or expand to scroll all"),
            ),
            h("button", {
              className: "mc-btn",
              style: { padding: "4px 12px", fontSize: 11 },
              onClick: () => setOpen(!open),
            }, open ? "▲ Collapse all" : "▼ Expand all"),
          ),
          open && children,
        );
      }

      // ── STATUS DASHBOARD (2026-05-30 redesign) ─────────────────────────
      //
      // Top-of-page glance grid. User feedback: "RIght now there is too
      // much detail and require too much scoring. This should be more
      // of a Dashboard of metrics, gauges, checkmarks, statuses, etc
      // and if needed the ability to go a 2nd layer deeper to view
      // detail." Each tile is one subsystem with a colored status dot,
      // 1-2 line metric, and a #anchor to the corresponding detail
      // card lower on the page.
      function StatusGrid({ mp, dc, sh, po, wr, ba, eg, cioReadiness, positions }) {
        const tile = (opts) => {
          const { title, value, sub, status, href } = opts;
          const dotColor = status === "ok" ? "#22c55e" : status === "warn" ? "#fbbf24" : status === "fail" ? "#f87171" : "#6b7280";
          const borderColor = status === "ok" ? "rgba(34,197,94,0.30)" : status === "warn" ? "rgba(251,191,36,0.30)" : status === "fail" ? "rgba(248,113,113,0.30)" : "rgba(255,255,255,0.06)";
          return h("a", {
            href: href || "#",
            style: {
              display: "block",
              padding: "12px 14px",
              background: "rgba(255,255,255,0.02)",
              border: `1px solid ${borderColor}`,
              borderRadius: 10,
              textDecoration: "none",
              color: "inherit",
              transition: "background 100ms ease, border-color 100ms ease",
            },
            onMouseEnter: (e) => { e.currentTarget.style.background = "rgba(255,255,255,0.04)"; },
            onMouseLeave: (e) => { e.currentTarget.style.background = "rgba(255,255,255,0.02)"; },
          },
            h("div", { style: { display: "flex", alignItems: "center", gap: 6, marginBottom: 5 } },
              h("span", { style: { width: 7, height: 7, borderRadius: "50%", background: dotColor, boxShadow: `0 0 6px ${dotColor}90` } }),
              h("span", { style: { fontSize: 9, fontWeight: 700, letterSpacing: "0.08em", textTransform: "uppercase", color: "#6b7280" } }, title),
            ),
            h("div", { style: { fontSize: 18, fontWeight: 700, color: "#f0f6fc", lineHeight: 1.1, fontVariantNumeric: "tabular-nums", marginBottom: 3 } }, value),
            sub && h("div", { style: { fontSize: 10, color: "#6b7280" } }, sub),
          );
        };

        // Compute statuses
        const realized7d = Number(mp?.trailing?.d7?.pnl_usd) || 0;
        const unrealizedTotal = Number(positions?.unrealized_total_usd ?? mp?.unrealized_usd) || 0;
        const totalPnl7d = realized7d + unrealizedTotal;
        const openTradesAT = Number(mp?.open_count) || 0;
        const allTimeWR = Number(mp?.all_time?.total) > 0 ? (Number(mp?.all_time?.wins) / Number(mp?.all_time?.total)) * 100 : null;
        const cioTotal = Number(mp?.ai_cio_7d?.total) || 0;
        const cioFallback = Number(mp?.ai_cio_7d?.fallback) || 0;
        const briefSpyMean = Number(ba?.spy?.mean);
        const briefHits = Number.isFinite(briefSpyMean) ? Math.round(briefSpyMean * 100) : null;
        const worstStaleD = Number(dc?.by_tf?.D?.worst_stale?.days_stale);
        const cronFailing = Number(sh?.failing_count) || 0;
        const totalUsers = Number(eg?.total) || 0;
        const powerUsers = Number(eg?.buckets?.power) || 0;
        const wrDays = wr?.generated_at ? Math.floor((Date.now() - Number(wr.generated_at)) / 86400000) : null;
        const cioReady = cioReadiness?.ready_for_live === true;
        const cioReadyCount = (() => {
          const g = cioReadiness?.gates || {};
          const all = [...(g.A_sample || []), ...(g.B_quality || []), ...(g.C_edge || []), ...(g.D_operator || [])];
          const met = all.filter((r) => r.met === true).length;
          return all.length > 0 ? `${met}/${all.length}` : "—";
        })();

        return h("div", {
          style: {
            display: "grid",
            gridTemplateColumns: "repeat(auto-fill, minmax(180px, 1fr))",
            gap: 10,
            marginBottom: 18,
          },
        },
          tile({
            title: "TOTAL P&L (7D)",
            value: fmtUsd(totalPnl7d),
            sub: `Realized ${fmtUsd(realized7d)} + Open ${fmtUsd(unrealizedTotal)}`,
            status: totalPnl7d >= 0 ? "ok" : "warn",
            href: "#perf",
          }),
          tile({
            title: "WIN RATE (ALL-TIME)",
            value: allTimeWR != null ? `${allTimeWR.toFixed(1)}%` : "—",
            sub: `${Number(mp?.all_time?.total) || 0} closed trades`,
            status: allTimeWR == null ? null : allTimeWR >= 55 ? "ok" : allTimeWR >= 45 ? "warn" : "fail",
            href: "#perf",
          }),
          tile({
            title: "OPEN TRADES",
            value: String(openTradesAT),
            sub: "Active Trader · live",
            status: openTradesAT > 0 ? "ok" : null,
            href: "#positions",
          }),
          tile({
            title: "AI CIO (7D LIVE)",
            value: String(cioTotal),
            sub: cioFallback > 0 ? `${cioFallback} fallback (check)` : "decisions logged",
            status: cioTotal === 0 ? "warn" : cioFallback > cioTotal * 0.5 ? "warn" : "ok",
            href: "#cio",
          }),
          tile({
            title: "AI CIO READINESS",
            value: cioReady ? "Ready" : "Shadow",
            sub: `${cioReadyCount} gates met`,
            status: cioReady ? "ok" : "warn",
            href: "#cio",
          }),
          tile({
            title: "DAILY BRIEF (30D SPY)",
            value: briefHits != null ? `${briefHits}%` : "—",
            sub: `${Number(ba?.total_scored) || 0} predictions scored`,
            status: briefHits == null ? null : briefHits >= 60 ? "ok" : briefHits >= 50 ? "warn" : "fail",
            href: "#perf",
          }),
          tile({
            title: "WORST-STALE (D)",
            value: Number.isFinite(worstStaleD) ? `${worstStaleD}d` : "—",
            sub: dc?.by_tf?.D?.worst_stale?.ticker || "—",
            status: !Number.isFinite(worstStaleD) ? null : worstStaleD > 5 ? "fail" : worstStaleD > 2 ? "warn" : "ok",
            href: "#data",
          }),
          tile({
            title: "CRON HEALTH",
            value: cronFailing === 0 ? "✓ All healthy" : `${cronFailing} failing`,
            sub: `${(sh?.cron_ops || []).length} ops tracked`,
            status: cronFailing === 0 ? "ok" : "fail",
            href: "#health",
          }),
          tile({
            title: "USERS · 30D",
            value: `${powerUsers}/${totalUsers}`,
            sub: `${powerUsers} power · ${Number(eg?.buckets?.engaged) || 0} engaged`,
            status: totalUsers > 0 ? "ok" : null,
            href: "#users",
          }),
          tile({
            title: "WEEKLY RETRO",
            value: wrDays == null ? "—" : `${wrDays}d ago`,
            sub: wr?.window?.label || "Awaiting first run",
            status: wrDays == null ? "warn" : wrDays > 8 ? "warn" : "ok",
            href: "#retro",
          }),
        );
      }

      // ── CIO Decision Review queue (2026-05-30, Q2) ──
      //
      // Operator-facing review surface. Pulls unreviewed CIO decisions
      // from the last 30 days (default — toggle to show all) and lets
      // the operator rate each one good / bad / meh with notes. Reviews
      // persist via POST /timed/admin/ai-cio/review and the
      // manual_review D_operator gate auto-flips when reviewed_14d
      // crosses 20.
      function CioDecisionReview({ apiBase, onReviewSaved }) {
        const [decisions, setDecisions] = useState([]);
        const [stats, setStats] = useState(null);
        const [loading, setLoading] = useState(false);
        const [showAll, setShowAll] = useState(false);
        const [draftNotes, setDraftNotes] = useState({});
        const [saving, setSaving] = useState({});
        const [savedFlash, setSavedFlash] = useState({});

        const refresh = useCallback(async () => {
          setLoading(true);
          try {
            const url = `${apiBase}/timed/admin/ai-cio/decisions?limit=30${showAll ? "" : "&unreviewed=1"}&_t=${Date.now()}`;
            const r = await fetch(url, { credentials: "include", cache: "no-store" });
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const j = await r.json();
            if (j.ok) {
              setDecisions(j.decisions || []);
              setStats(j.review_stats_14d || null);
            }
          } catch (_) { /* best-effort */ }
          finally { setLoading(false); }
        }, [apiBase, showAll]);

        useEffect(() => { refresh(); }, [refresh]);

        const submitReview = async (tradeId, verdict) => {
          if (saving[tradeId]) return;
          setSaving((s) => ({ ...s, [tradeId]: true }));
          try {
            const r = await fetch(`${apiBase}/timed/admin/ai-cio/review`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                trade_id: tradeId,
                verdict,
                notes: draftNotes[tradeId] || "",
              }),
            });
            const j = await r.json();
            if (j.ok) {
              setSavedFlash((f) => ({ ...f, [tradeId]: verdict }));
              setTimeout(() => setSavedFlash((f) => { const c = { ...f }; delete c[tradeId]; return c; }), 1800);
              if (j.manual_review_gate_auto_flipped) {
                alert("Gate auto-flipped: manual_review is now DONE (20 reviews in 14d). Mission Control AI CIO panel will refresh.");
              }
              refresh();
              if (typeof onReviewSaved === "function") onReviewSaved();
            } else {
              alert(`Review failed: ${j.error || "unknown"}`);
            }
          } catch (e) {
            alert(`Review failed: ${String(e.message || e)}`);
          } finally {
            setSaving((s) => { const c = { ...s }; delete c[tradeId]; return c; });
          }
        };

        const reviewed14 = Number(stats?.reviewed_14d) || 0;
        const threshold = 20;
        const pctToGate = Math.min(100, (reviewed14 / threshold) * 100);

        return (

                                                 : status?.error?.includes("OPERATOR_KEY") ? "key_missing"

              {bridgeConfigured && mockMode && <span className="mc-pill mc-pill-warn ml-2">MOCK MODE</span>}
              {bridgeConfigured && !mockMode && killOn && <span className="mc-pill mc-pill-warn ml-2">KILL SWITCH ON</span>}
              {bridgeConfigured && !mockMode && !killOn && <span className="mc-pill mc-pill-ok ml-2">LIVE</span>}
              {loading && <span className="text-[10px] mc-mute ml-2 mc-loading">refreshing…</span>}
            </div>

            {err && !bridgeConfigured && (
              <div className="text-[12px] text-amber-300 mb-3">
                {errorKind === "url_missing" && (
                  <>
                    <b>Main worker can't find the bridge URL.</b><br />
                    Add to <code>worker/wrangler.toml [vars]</code>:<br />
                    <code className="text-[#34d399]">BROKER_BRIDGE_URL = "https://tt-broker-bridge.shashant.workers.dev"</code><br />
                    Then redeploy: <code>cd worker &amp;&amp; wrangler deploy --env production</code>.
                  </>
                )}
                {errorKind === "key_missing" && (
                  <>
                    <b>Bridge URL is set ({status?.bridge_url || "—"}) but the operator key is missing.</b><br />
                    Run <code className="text-[#34d399]">wrangler secret put BROKER_BRIDGE_OPERATOR_KEY --env production</code><br />
                    and paste the bridge worker's operator key (same value used in <code>worker-bridge/wrangler.toml</code> OPERATOR_KEYS).
                  </>
                )}
                {errorKind === "unreachable" && (
                  <>
                    <b>Main worker found bridge URL ({status?.bridge_url || "—"}) but the request failed.</b><br />
                    Check the bridge worker is deployed and the URL is correct.<br />
                    <code className="text-[#fcd34d]">{status?.error}</code>
                  </>
                )}
                {!errorKind && (
                  <>
                    Bridge connection failed.<br />
                    Set <code>BROKER_BRIDGE_URL</code> + <code>BROKER_BRIDGE_OPERATOR_KEY</code> on main worker,
                    deploy <code>worker-bridge/</code> as a separate Cloudflare Worker, and refresh.<br />
                    See <code>tasks/2026-05-29-broker-bridge-phase1-plan.md</code> for the full setup runbook.
                  </>

              </div>
            )}

            {bridgeConfigured && (
              <>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">

                    <div className="mc-kpi-label">Mode</div>
                    <div className={`mc-kpi-value text-[15px] ${mockMode ? "mc-warn" : "mc-pos"}`}>
                      {mockMode ? "MOCK" : "LIVE"}
                    </div>
                    <div className="mc-kpi-sub">{mockMode ? "Orders logged, NOT sent to RH" : "Real RH MCP calls"}</div>
                  </div>
                  <div className="mc-kpi">
                    <div className="mc-kpi-label">Kill Switch</div>
                    <div className={`mc-kpi-value text-[15px] ${killOn ? "mc-warn" : "mc-pos"}`}>
                      {killOn ? "ON · all orders blocked" : "OFF"}
                    </div>
                    <div className="mc-kpi-sub">

                  <div className="mc-kpi">
                    <div className="mc-kpi-label">Connected Users</div>
                    <div className="mc-kpi-value">{users.length}</div>
                    <div className="mc-kpi-sub">
                      {users.filter(u => u.broker_integration_enabled).length} with live trading enabled
                    </div>
                  </div>
                  <div className="mc-kpi">
                    <div className="mc-kpi-label">Recent Dispatches</div>
                    <div className="mc-kpi-value">{recent.length}</div>
                    <div className="mc-kpi-sub">From main worker → bridge</div>
                  </div>
                </div>

                {users.length > 0 && (
                  <>
                    <div className="text-[11px] mc-mute mb-2 uppercase tracking-wider font-semibold">Per-User Status</div>
                    <table className="mc-table mb-4">
                      <thead><tr><th>User</th><th>Status</th><th>RH Account</th><th>Enabled</th><th style={{textAlign:"right"}}>Today</th><th style={{textAlign:"right"}}>Total</th><th>Last Order</th></tr></thead>
                      <tbody>
                        {users.map((u) => (
                          <tr key={u.user_id}>

                            </td>
                            <td className="font-mono text-[11px] mc-mute">{u.rh_account_number || "—"}</td>
                            <td>
                              <span className={`mc-pill ${u.broker_integration_enabled ? "mc-pill-ok" : "mc-pill-warn"}`}>
                                {u.broker_integration_enabled ? "LIVE" : "OFF"}
                              </span>
                            </td>
                            <td style={{textAlign:"right"}}>{u.daily_order_count}</td>
                            <td style={{textAlign:"right"}}>{u.total_orders_lifetime}</td>
                            <td className="text-[11px] mc-mute">{u.last_order_at ? new Date(u.last_order_at).toLocaleString("en-US", {month:"short",day:"numeric",hour:"numeric",minute:"2-digit"}) : "—"}</td>
                          </tr>

                {audit.length > 0 && (
                  <>

                    <table className="mc-table mb-2">
                      <thead><tr><th>When</th><th>Ticker</th><th>Action</th><th>Side</th><th style={{textAlign:"right"}}>Qty</th><th style={{textAlign:"right"}}>Est $</th><th>Status</th><th>Reason / RH Order</th></tr></thead>
                      <tbody>
                        {audit.slice(0, 25).map((row) => (
                          <tr key={row.id}>

              Phase 1 safety: kill switch · mock-mode default · HMAC-signed webhooks · per-user OAuth tokens AES-256-GCM encrypted ·
              hard caps ($5k/order, 3/day) · mandatory <code>review_equity_order</code> before <code>place_equity_order</code>.

      function MissionControl({ user }) {
        const [data, setData] = useState(null);
        const [loading, setLoading] = useState(true);
        const [err, setErr] = useState(null);
        const [refreshTs, setRefreshTs] = useState(Date.now());
        const [autoRefresh, setAutoRefresh] = useState(true);
        const [refreshing, setRefreshing] = useState(false);
        // Backfill in-flight state
        const [backfillBusy, setBackfillBusy] = useState(false);
        const [backfillMsg, setBackfillMsg] = useState(null);

        // 2026-05-28 — AI CIO surfaces. Separate fetch (different
        // admin endpoints) so a slow CIO query doesn't block the main
        // Mission Control payload.
        const [cioReadiness, setCioReadiness] = useState(null);
        const [cioAccuracy, setCioAccuracy] = useState(null);
        const [cioLoading, setCioLoading] = useState(false);
        const [cioErr, setCioErr] = useState(null);
        const [cioBackfillBusy, setCioBackfillBusy] = useState(false);
        const [cioBackfillMsg, setCioBackfillMsg] = useState(null);

        const fetchCio = useCallback(async () => {
          setCioLoading(true);
          try {
            const [rRes, aRes] = await Promise.all([
              fetch(`${API_BASE}/timed/admin/ai-cio/go-live-readiness?_t=${Date.now()}`, { credentials: "include", cache: "no-store" }),
              fetch(`${API_BASE}/timed/admin/ai-cio/accuracy?_t=${Date.now()}`, { credentials: "include", cache: "no-store" }),
            ]);
            if (rRes.ok) {
              const j = await rRes.json();
              if (j.ok) setCioReadiness(j);
            }
            if (aRes.ok) {
              const j = await aRes.json();
              if (j.ok) setCioAccuracy(j);
            }
            setCioErr(null);
          } catch (e) {
            setCioErr(String(e.message || e));
          } finally {
            setCioLoading(false);
          }
        }, []);

        const triggerCioBackfill = useCallback(async () => {
          if (cioBackfillBusy) return;
          if (!confirm("Sweep ai_cio_decisions and fill trade_outcome / trade_pnl_pct for all closed trades that haven't been attributed yet? Idempotent and safe.")) return;
          setCioBackfillBusy(true);
          setCioBackfillMsg("Backfilling CIO outcomes…");
          try {
            const res = await fetch(`${API_BASE}/timed/admin/ai-cio/backfill-outcomes`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: "{}",
            });
            const j = await res.json();
            if (j.ok) {
              setCioBackfillMsg(`Backfilled ${j.updated} of ${j.scanned} candidate rows${j.failed ? ` (${j.failed} failed)` : ""}.`);
              fetchCio();
            } else {
              setCioBackfillMsg(`Backfill failed: ${j.error || "unknown"}`);
            }
          } catch (e) {
            setCioBackfillMsg(`Backfill failed: ${String(e.message || e)}`);
          } finally {
            setCioBackfillBusy(false);
          }
        }, [cioBackfillBusy, fetchCio]);

        const fetchData = useCallback(async () => {
          setRefreshing(true);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/mission-control?_t=${Date.now()}`, {
              credentials: "include",
              cache: "no-store",
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const j = await res.json();
            if (!j.ok) throw new Error(j.error || "fetch failed");
            setData(j);
            setErr(null);
          } catch (e) {
            setErr(String(e.message || e));
          } finally {
            setLoading(false);
            setRefreshing(false);
          }
        }, []);

        useEffect(() => { fetchData(); fetchCio(); }, [fetchData, fetchCio]);

        // Auto-refresh every 30s for system health + data coverage parts
        useEffect(() => {
          if (!autoRefresh) return;
          const id = setInterval(() => {
            fetchData();
            fetchCio();
            setRefreshTs(Date.now());
          }, 30000);
          return () => clearInterval(id);
        }, [autoRefresh, fetchData, fetchCio]);

        const triggerBackfill = useCallback(async (tf) => {
          if (backfillBusy) return;
          if (!confirm(`Trigger ${tf} backfill for the full universe (canonical + user-added) covering the last 35 days? This may take several minutes.`)) return;
          setBackfillBusy(true);
          setBackfillMsg(`Backfill ${tf} in progress…`);
          try {
            const res = await fetch(`${API_BASE}/timed/admin/alpaca-backfill?tf=${tf}&sinceDays=35&include_user=1`, {
              method: "POST",
              credentials: "include",
              headers: { "Content-Type": "application/json" },
              body: "{}",
            });
            const j = await res.json();
            if (j.ok) {
              setBackfillMsg(`Backfill ${tf} done: ${j.upserted || 0} candles upserted across ${j.tickers || 0} tickers.`);
              fetchData();
            } else {
              setBackfillMsg(`Backfill ${tf} failed: ${j.error || "unknown"}`);
            }
          } catch (e) {
            setBackfillMsg(`Backfill ${tf} failed: ${String(e.message || e)}`);
          } finally {
            setBackfillBusy(false);
          }
        }, [backfillBusy, fetchData]);

        if (loading && !data) {
          return (
            <div className="min-h-screen flex items-center justify-center">
              <div className="mc-loading text-sm text-[#6b7280]">Loading Mission Control…</div>
            </div>
          );
        }
        if (err && !data) {
          return (
            <div className="min-h-screen flex items-center justify-center">
              <div className="mc-card max-w-md text-center">
                <div className="text-red-400 text-sm font-semibold mb-2">Mission Control unavailable</div>
                <div className="text-[#6b7280] text-xs mb-4">{err}</div>
                <button className="mc-btn" onClick={fetchData}>Retry</button>
              </div>
            </div>
          );
        }

        const mp = data?.model_perf || {};
        const sh = data?.system_health || {};
        const dc = data?.data_coverage || {};
        const us = data?.users || {};
        const po = data?.positions || {};
        const ba = data?.brief_accuracy || {};
        const eg = data?.engagement || {};
        const wr = data?.weekly_retro || {};

                            <td style={{ textAlign: "right" }}>{count}</td>
                            <td style={{ textAlign: "right" }} className="mc-pos">{wins}</td>
                            <td style={{ textAlign: "right" }} className="mc-neg">{losses}</td>
                            <td style={{ textAlign: "right" }}>
                              {wr != null ? `${wr.toFixed(1)}%` : "—"}
                            </td>
                            <td style={{ textAlign: "right" }} className={Number.isFinite(pnl) ? (pnl >= 0 ? "mc-pos" : "mc-neg") : ""}>
                              {Number.isFinite(pnl) ? `${pnl >= 0 ? "+" : ""}${pnl.toFixed(2)}%` : "—"}
                            </td>
                            <td style={{ textAlign: "right" }}>{Number.isFinite(conf) ? conf.toFixed(2) : "—"}</td>
                            <td style={{ textAlign: "right" }}>{Number.isFinite(edge) ? edge.toFixed(2) : "—"}</td>
                            <td style={{ textAlign: "right" }} className="mc-mute">
                              {Number.isFinite(lat) ? `${Math.round(lat)}ms` : "—"}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </>
              )}

              {/* 2026-05-30 (Q2) — Decision Review queue. User asked:
                  "Where can I actually review the decisions and provide
                  my feedback?" Pulls unreviewed CIO decisions from
                  /timed/admin/ai-cio/decisions?unreviewed=1, lets the
                  operator rate good/bad/meh with notes. Hitting 20
                  reviews in 14d auto-flips the manual_review gate. */}
              <CioDecisionReview apiBase={API_BASE} onReviewSaved={fetchCio} />

              {/* Recent rejections — top 5 most recent */}
              {cioAccuracy?.recent_rejections && cioAccuracy.recent_rejections.length > 0 && (
                <>
                  <div className="text-[11px] mc-mute mb-2 mt-5 uppercase tracking-wider font-semibold">
                    Recent CIO Rejections (latest 5)
                  </div>
                  <table className="mc-table">
                    <thead>
                      <tr>
                        <th>When</th>
                        <th>Ticker</th>
                        <th>Dir</th>
                        <th>Conf</th>
                        <th>Edge</th>
                        <th>Mode</th>
                        <th>Reason</th>
                      </tr>
                    </thead>
                    <tbody>
                      {cioAccuracy.recent_rejections.slice(0, 5).map((r, i) => (
                        <tr key={`rej-${i}`}>
                          <td className="mc-mute">{fmtAgo(r.created_at)}</td>
                          <td><span className="font-semibold text-white">{r.ticker}</span></td>
                          <td>
                            <span className={String(r.direction).toUpperCase() === "LONG" ? "mc-pos" : "mc-neg"}>
                              {r.direction}
                            </span>
                          </td>
                          <td>{Number(r.confidence).toFixed(2)}</td>
                          <td>{Number(r.edge_score).toFixed(2)}</td>
                          <td>
                            <span className={`mc-pill ${Number(r.shadow) === 1 ? "mc-pill-warn" : "mc-pill-ok"}`}>
                              {Number(r.shadow) === 1 ? "SHADOW" : "ACTED"}
                            </span>
                          </td>
                          <td className="text-[11px] text-[#d1d5db]" style={{ maxWidth: 460 }}>
                            {String(r.reasoning || "").slice(0, 240)}
                            {String(r.reasoning || "").length > 240 && "…"}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </>
              )}

              <div className="text-[10px] mc-mute mt-4">
                Backed by <code>GET /timed/admin/ai-cio/go-live-readiness</code> and{" "}
                <code>GET /timed/admin/ai-cio/accuracy</code>. Full audit doc:{" "}
                <code>tasks/2026-05-28-cio-shadow-to-live-audit.md</code>.
              </div>
            </div>

            {/* ── Section 8: Broker Bridge ── 2026-05-29 ── */}
            <div id="bridge" style={{ scrollMarginTop: 80 }}></div>
            <BridgeSection apiBase={API_BASE} />
            </DetailSectionsToggle>

            {/* ── Footer ── */}
            <div className="text-center text-[10px] mc-mute mt-6 mb-4">
              Mission Control · admin only · auto-refreshes every 30s when enabled<br />
              Weekly retrospective fires Sunday 6 PM ET · brief accuracy evaluator runs at 4:30 PM ET<br />
              Daily candle auto-refresh runs at 6 AM ET · Public reads rate-limited to 120/hr per IP
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(
        <AuthGate apiBase={API_BASE} requiredTier="admin">
          {(user) => <MissionControl user={user} />}
        </AuthGate>
      );
    </script>
  </body>
</html>
