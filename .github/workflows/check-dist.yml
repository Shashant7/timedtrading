name: Check react-app-dist is up-to-date

# Cloudflare Pages serves directly from the committed react-app-dist/
# folder (wrangler.toml: pages_build_output_dir = "react-app-dist").
# That means every source change to react-app/ MUST be paired with a
# `npm run build:frontend` rebuild — otherwise the live site keeps
# serving the previous compiled JSX.
#
# This workflow runs on every PR that touches react-app/ or the build
# script, rebuilds the frontend in a fresh checkout, and fails if the
# committed react-app-dist/ doesn't match the rebuild output. If it
# fails, the PR author should run `npm run build:frontend` locally and
# commit the resulting react-app-dist/ changes.

on:
  pull_request:
    paths:
      - "react-app/**"
      - "scripts/build-frontend.js"
      - "scripts/compile-right-rail.js"
      - "package.json"
      - ".github/workflows/check-dist.yml"
  workflow_dispatch:

jobs:
  check-dist:
    name: react-app-dist must match react-app/
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install deps
        run: npm install --no-audit --no-fund --ignore-scripts

      - name: Rebuild frontend
        run: npm run build:frontend

      - name: Diff vs committed react-app-dist
        run: |
          # `git diff -I <regex>` (git ≥ 2.30) drops hunks whose lines all
          # match the pattern. PR #269 added a build-time cache-bust marker
          # (`// cache-bust:<ms>:<rand>` for JS, `<!-- cache-bust:… -->`
          # for HTML) appended to every dist file — those are unique per
          # build by design (fix for the Cloudflare Pages content-addressed
          # storage corruption from 2026-05-22). The marker hunks would
          # otherwise make this check fail every PR, masking the real
          # "you forgot to rebuild" signal we want to keep.
          #
          # 2026-05-26 — Added the SCRIPT-TAG-VERSION pattern. The build
          # script also bakes the cache-bust timestamp into the
          # `<script src="…compiled.js?v=<ms>">` query string in every
          # HTML file. The original regex only ignored full-line markers,
          # so HTML files would diff on the `?v=` line and the check would
          # generate a false-positive failure email on every PR touching
          # react-app/ — even when react-app-dist/ was perfectly rebuilt.
          # See PR #303 for the diagnosis.
          #
          # 2026-06-01 — Broadened to cover non-compiled `.js` shared
          # bundles too. PR #398 added a build-time pass that rewrites
          # the `?v=…` on EVERY <script src="*.js"> (auth-gate.js,
          # tt-activity-strip.js, tt-nav-extras.js, etc.) so each deploy
          # auto-busts the cache on those files. The old pattern only
          # matched `*.compiled.js`, so every new build produced a diff
          # in 20+ HTML files on the auto-bumped shared-script lines
          # — false failure on every PR touching react-app/. New
          # pattern accepts any `.js` (with optional `.compiled.`) and
          # optional `defer` (or other) attributes after the src.
          IGNORE_PATTERN='^(// |<!-- )cache-bust:[0-9]+:[0-9]+( -->)?$|^[[:space:]]*<script src="[^"]+\.(compiled\.)?js\?v=[0-9]+"[^>]*></script>[[:space:]]*$'
          if ! git diff --quiet --exit-code -I "$IGNORE_PATTERN" -- react-app-dist/; then
            echo "::error::react-app-dist/ is OUT OF DATE relative to react-app/."
            echo "::error::Cloudflare Pages serves the committed react-app-dist/, so"
            echo "::error::source-only edits won't reach users until the dist is rebuilt."
            echo ""
            echo "How to fix locally:"
            echo "  npm run build:frontend"
            echo "  git add react-app-dist/"
            echo "  git commit -m 'build: rebuild react-app-dist'"
            echo ""
            echo "Diff (truncated, cache-bust markers excluded):"
            git --no-pager diff --stat -I "$IGNORE_PATTERN" -- react-app-dist/ | head -40
            exit 1
          fi
          echo "✓ react-app-dist/ matches a fresh build (cache-bust markers ignored)."
