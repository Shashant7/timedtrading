    <style>
      :root {
        --tt-bg-base: var(--vf-ink, #0B1410);
        --tt-bg-surface: var(--vf-bark, #13201A);
        --tt-bg-elev: var(--vf-bark-hi, #1A2B22);
        --tt-border: var(--vf-moss, #1F3128);
        --tt-border-hi: var(--vf-moss-hi, #2A4136);
        --tt-text: var(--vf-cream, #E8F2EC);
        --tt-text-muted: var(--vf-sage, #8AA39A);
        --tt-text-dim: #6E867D;
        --tt-text-faint: #51635A;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: var(--vf-mint, #38F2A1);
        --tt-accent-dim: var(--vf-mint-dim, rgba(56,242,161,0.14));
        --tt-violet: #a78bfa;
        --tt-violet-dim: rgba(167,139,250,0.14);
        --tt-cyan: #22d3ee;
        --tt-cyan-dim: rgba(34,211,238,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-display: "Manrope", "Inter", -apple-system, sans-serif;
        --tt-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: var(--vf-radius-md, 18px); }
      .tt-card-pad { padding: 16px 18px; }
      .tt-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-sec-h { font-family: var(--tt-font-display); font-size: 17px; font-weight: 800; letter-spacing: -0.01em; color: var(--tt-text); margin-bottom: 10px; }

      /* Top nav */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(11,20,16,0.92);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active { color: var(--tt-accent); background: var(--tt-accent-dim); }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Hero */
      .ins-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 18px 22px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .ins-hero h1 { font-family: var(--tt-font-display); font-size: 26px; font-weight: 800; letter-spacing: -0.025em; margin: 0; }
      /* Progressive-disclosure sections (Beat 3 — context on demand).
         Mirrors today.html's tt-disclose pattern. */
      .ins-disclose { margin-bottom: 18px; }
      .ins-disclose > summary {
        list-style: none;
        display: flex; align-items: center; gap: 10px;
        cursor: pointer; user-select: none;
        padding: 12px 16px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        transition: border-color .12s, background .12s;
      }
      .ins-disclose > summary::-webkit-details-marker { display: none; }
      .ins-disclose > summary:hover { border-color: var(--tt-border-hi); background: var(--tt-bg-elev); }
      .ins-disclose-title {
        font-family: var(--tt-font-display, "Manrope", sans-serif);
        font-size: 13.5px; font-weight: 800; letter-spacing: -0.01em;
        color: var(--tt-text);
      }
      .ins-disclose-sub { font-size: 11.5px; color: var(--tt-text-dim); }
      .ins-disclose-caret { margin-left: auto; color: var(--tt-text-dim); font-size: 11px; transition: transform .15s ease; }
      .ins-disclose[open] > summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
      .ins-disclose[open] > summary .ins-disclose-caret { transform: rotate(180deg); }
      .ins-disclose-body {
        border: 1px solid var(--tt-border); border-top: 0;
        border-bottom-left-radius: var(--vf-radius-md, 18px);
        border-bottom-right-radius: var(--vf-radius-md, 18px);
        padding: 14px 14px 6px;
        background: var(--tt-bg-elev);
      }
      .ins-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .ins-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; max-width: 720px; }
      @media (max-width: 720px) {
        .ins-hero { grid-template-columns: 1fr; }
        .ins-hero h1 { font-size: 18px; }
      }

      .health-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 12px;
        font-size: 12px; font-weight: 700;
        border-radius: 999px;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
      }
      .health-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
      .health-pill.ok { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.30); }
      .health-pill.warn { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(56,242,161,0.30); }
      .health-pill.err  { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.30); }

      /* Status grid */
      .status-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      @media (max-width: 920px) { .status-grid { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 540px) { .status-grid { grid-template-columns: 1fr; } }
      .status-card {
        padding: 14px 16px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
      }
      .status-card .l { font-size: 10.5px; color: var(--tt-text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
      .status-card .v { font-size: 22px; font-weight: 700; font-family: var(--tt-font-mono); }
      .status-card .v.up { color: var(--tt-up-soft); }
      .status-card .v.dn { color: var(--tt-dn-soft); }
      .status-card .s { font-size: 11.5px; color: var(--tt-text-muted); margin-top: 6px; font-family: var(--tt-font-mono); }

      /* Setup table */
      .tbl { width: 100%; border-collapse: collapse; }
      .tbl th, .tbl td {
        padding: 10px 12px;
        text-align: left;
        font-size: 12.5px;
        border-bottom: 1px solid var(--tt-border);
      }
      .tbl th {
        font-size: 10.5px;
        color: var(--tt-text-dim);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        background: var(--tt-bg-elev);
      }
      .tbl td { font-family: var(--tt-font-mono); color: var(--tt-text); }
      .tbl td.label { font-weight: 700; font-family: var(--tt-font); }
      .tbl td.up { color: var(--tt-up-soft); }
      .tbl td.dn { color: var(--tt-dn-soft); }
      .tbl tr:hover td { background: var(--tt-bg-elev); }
      .tbl .empty {
        text-align: center;
        color: var(--tt-text-faint);
        font-style: italic;
        font-family: var(--tt-font);
        padding: 28px 12px;
      }
      .tbl-scroll {
        max-height: 520px;
        overflow-y: auto;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
      }
      .tbl-scroll::-webkit-scrollbar { width: 6px; }
      .tbl-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }

      /* CIO Watchlist — three-card grid */
      .cio-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      @media (max-width: 1024px) {
        .cio-grid { grid-template-columns: 1fr; }
      }
      .cio-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .cio-card--learnings { grid-column: 1 / -1; }
      .cio-card-l {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
        margin-bottom: 10px;
      }
      .cio-card-sub {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        margin: 10px 0 0;
        line-height: 1.5;
      }
      .cio-pipeline {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .cio-stage {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--tt-font);
        font-size: 11.5px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
      }
      .cio-stage strong { font-weight: 700; font-family: var(--tt-font-mono); color: var(--tt-text); }
      /* Universe Rebalance — directional reweight pills */
      .rw-block {
        flex: 1 1 100%;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .rw-block-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
        font-family: var(--tt-font);
      }
      .rw-block-tally { font-family: var(--tt-font-mono); margin-left: 4px; font-weight: 600; }
      .rw-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .rw-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 9px;
        border-radius: 6px;
        font-size: 11.5px;
        font-family: var(--tt-font-mono);
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
      }
      .rw-pill .rw-sym { font-weight: 700; color: var(--tt-text); }
      .rw-pill .rw-delta { display: inline-flex; gap: 2px; align-items: center; }
      .rw-pill.rw-up {
        color: var(--tt-up-soft);
        background: var(--tt-up-bg);
        border-color: rgba(34,197,94,0.30);
      }
      .rw-pill.rw-dn {
        color: var(--tt-dn-soft);
        background: var(--tt-dn-bg);
        border-color: rgba(244,63,94,0.30);
      }
      .rw-more {
        align-self: center;
        font-size: 11px;
        color: var(--tt-text-dim);
        font-family: var(--tt-font-mono);
      }

      /* Active-board live P&L stat strip */
      .cio-board-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--tt-border);
      }
      @media (max-width: 720px) {
        .cio-board-stats { grid-template-columns: 1fr 1fr; }
      }
      .cio-board-stat {
        display: flex;
        flex-direction: column;
      }
      .cio-board-stat-l {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--tt-text-faint);
        margin-bottom: 4px;
      }
      .cio-board-stat-v {
        font-family: var(--tt-font-mono);
        font-size: 14px;
        font-weight: 700;
        color: var(--tt-text);
      }
      .cio-board-stat-sym {
        font-family: var(--tt-font);
        font-weight: 700;
        color: var(--tt-text);
      }
      .cio-board-sectors {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
        align-items: center;
      }
      .cio-board-sectors-l {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--tt-text-faint);
        margin-right: 4px;
      }
      .cio-board-sector-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
        font-family: var(--tt-font);
      }
      .cio-board-sector-pill strong {
        font-family: var(--tt-font-mono);
        color: var(--tt-text);
      }

      .cio-stage--setup  { color: #93c5fd; background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.24); }
      .cio-stage--enter  { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(56,242,161,0.30); }
      .cio-stage--hold   { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.25); }
      .cio-stage--defend { color: #fb923c; background: rgba(251,146,60,0.10); border-color: rgba(251,146,60,0.30); }
      .cio-stage--trim   { color: #facc15; background: rgba(250,204,21,0.10); border-color: rgba(250,204,21,0.30); }
      .cio-stage--exit   { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.25); }

      .cio-watch-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 320px;
        overflow-y: auto;
      }
      .cio-watch-row {
        display: grid;
        grid-template-columns: 70px auto 1fr auto auto;
        gap: 8px;
        align-items: center;
        padding: 6px 10px;
        border-radius: 8px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        text-decoration: none;
        font-size: 12px;
        font-family: var(--tt-font-mono);
        transition: background 120ms ease, border-color 120ms ease;
      }
      .cio-watch-row:hover {
        background: var(--tt-bg-surface);
        border-color: var(--tt-border-hi);
      }
      .cio-watch-sym { font-weight: 700; color: var(--tt-text); font-family: var(--tt-font); }
      .cio-watch-dir {
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--tt-bg-surface);
      }
      .cio-watch-dir.up { color: var(--tt-up-soft); }
      .cio-watch-dir.dn { color: var(--tt-dn-soft); }
      .cio-watch-setup { color: var(--tt-text-muted); font-family: var(--tt-font); font-size: 11.5px; }
      .cio-watch-rank, .cio-watch-rr { color: var(--tt-text-dim); font-size: 11px; }

      .cio-learn-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      @media (max-width: 720px) {
        .cio-learn-grid { grid-template-columns: 1fr; }
      }
      .cio-learn-h {
        font-size: 11.5px;
        font-weight: 700;
        margin-bottom: 8px;
        letter-spacing: 0.04em;
      }
      .cio-learn-h--up { color: var(--tt-up-soft); }
      .cio-learn-h--dn { color: var(--tt-dn-soft); }
      .cio-learn-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid var(--tt-border);
        font-family: var(--tt-font-mono);
        font-size: 12px;
      }
      .cio-learn-row:last-child { border-bottom: 0; }
      .cio-learn-name { color: var(--tt-text); font-family: var(--tt-font); }
      .cio-learn-stats { display: flex; flex-direction: column; align-items: flex-end; }
      .cio-learn-stats strong.up { color: var(--tt-up-soft); }
      .cio-learn-stats strong.dn { color: var(--tt-dn-soft); }
      .cio-learn-wr { font-size: 10px; color: var(--tt-text-dim); }

      /* AI CIO commentary — markdown rendered from brief.content */
      .brief-commentary {
        max-height: 320px;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255,255,255,0.10) transparent;
      }
      .brief-commentary::-webkit-scrollbar { width: 6px; }
      .brief-commentary::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
      .brief-commentary h2, .brief-commentary h3 {
        font-size: 13px;
        font-weight: 700;
        color: var(--tt-text);
        margin: 14px 0 6px;
        letter-spacing: 0.02em;
