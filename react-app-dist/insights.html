    <style>
      :root {
        --tt-bg-base: var(--vf-ink, #0B1410);
        --tt-bg-surface: var(--vf-bark, #13201A);
        --tt-bg-elev: var(--vf-bark-hi, #1A2B22);
        --tt-border: var(--vf-moss, #1F3128);
        --tt-border-hi: var(--vf-moss-hi, #2A4136);
        --tt-text: var(--vf-cream, #E8F2EC);
        --tt-text-muted: var(--vf-sage, #8AA39A);
        --tt-text-dim: #6E867D;
        --tt-text-faint: #51635A;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: var(--vf-mint, #38F2A1);
        --tt-accent-dim: var(--vf-mint-dim, rgba(56,242,161,0.14));
        --tt-violet: #a78bfa;
        --tt-violet-dim: rgba(167,139,250,0.14);
        --tt-cyan: #22d3ee;
        --tt-cyan-dim: rgba(34,211,238,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-display: "Manrope", "Inter", -apple-system, sans-serif;
        --tt-font-mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: var(--vf-radius-md, 18px); }
      .tt-card-pad { padding: 16px 18px; }
      .tt-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-sec-h { font-family: var(--tt-font-display); font-size: 17px; font-weight: 800; letter-spacing: -0.01em; color: var(--tt-text); margin-bottom: 10px; }

      /* Top nav */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(11,20,16,0.92);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active { color: var(--tt-accent); background: var(--tt-accent-dim); }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Hero */
      .ins-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 18px 22px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .ins-hero h1 { font-family: var(--tt-font-display); font-size: 26px; font-weight: 800; letter-spacing: -0.025em; margin: 0; }
      /* Progressive-disclosure sections (Beat 3 — context on demand).
         Mirrors today.html's tt-disclose pattern. */
      .ins-disclose { margin-bottom: 18px; }
      .ins-disclose > summary {
        list-style: none;
        display: flex; align-items: center; gap: 10px;
        cursor: pointer; user-select: none;
        padding: 12px 16px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: var(--vf-radius-md, 18px);
        transition: border-color .12s, background .12s;
      }
      .ins-disclose > summary::-webkit-details-marker { display: none; }
      .ins-disclose > summary:hover { border-color: var(--tt-border-hi); background: var(--tt-bg-elev); }
      .ins-disclose-title {
        font-family: var(--tt-font-display, "Manrope", sans-serif);
        font-size: 13.5px; font-weight: 800; letter-spacing: -0.01em;
        color: var(--tt-text);
      }
      .ins-disclose-sub { font-size: 11.5px; color: var(--tt-text-dim); }
      .ins-disclose-caret { margin-left: auto; color: var(--tt-text-dim); font-size: 11px; transition: transform .15s ease; }
      .ins-disclose[open] > summary { border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
      .ins-disclose[open] > summary .ins-disclose-caret { transform: rotate(180deg); }
      .ins-disclose-body {
        border: 1px solid var(--tt-border); border-top: 0;
        border-bottom-left-radius: var(--vf-radius-md, 18px);
        border-bottom-right-radius: var(--vf-radius-md, 18px);
        padding: 14px 14px 6px;
        background: var(--tt-bg-elev);
      }
      .ins-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .ins-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; max-width: 720px; }
      .ins-spine {
        display: flex; flex-wrap: wrap; gap: 8px;
        margin: 0 0 28px;
        padding: 0;
      }
      .ins-spine-link {
        font-size: 12px; font-weight: 600;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-surface);
        transition: color .12s, border-color .12s, background .12s;
      }
      .ins-spine-link:hover {
        color: var(--tt-accent);
        border-color: rgba(56,242,161,0.35);
        background: var(--tt-accent-dim);
      }
      .ins-chapter { margin-bottom: 40px; scroll-margin-top: 72px; }
      .ins-chapter-head {
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--tt-border);
      }
      .ins-chapter-num {
        font-size: 10px; font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--tt-accent);
        margin-bottom: 4px;
      }
      .ins-chapter-title {
        font-family: var(--tt-font-display);
        font-size: 20px; font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--tt-text);
        margin: 0 0 8px;
      }
      .ins-chapter-lede {
        font-size: 13px;
        color: var(--tt-text-muted);
        line-height: 1.55;
        max-width: 720px;
        margin: 0;
      }
      .tt-sec-h2 {
        font-family: var(--tt-font-display);
        font-size: 16px; font-weight: 800;
        color: var(--tt-text);
        margin: 0 0 8px;
      }
      .tt-sec-sub { font-size: 12.5px; color: var(--tt-text-muted); line-height: 1.5; margin: 0 0 14px; }
      @media (max-width: 720px) {
        .ins-hero { grid-template-columns: 1fr; }
        .ins-hero h1 { font-size: 18px; }
        .ins-chapter-title { font-size: 17px; }
      }

      .health-pill {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 5px 12px;
        font-size: 12px; font-weight: 700;
        border-radius: 999px;
        border: 1px solid var(--tt-border);
        background: var(--tt-bg-elev);
      }
      .health-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
      .health-pill.ok { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.30); }
      .health-pill.warn { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(56,242,161,0.30); }
      .health-pill.err  { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.30); }

      /* Status grid */
      .status-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }
      @media (max-width: 920px) { .status-grid { grid-template-columns: 1fr 1fr; } }
      @media (max-width: 540px) { .status-grid { grid-template-columns: 1fr; } }
      .status-card {
        padding: 14px 16px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
      }
      .status-card .l { font-size: 10.5px; color: var(--tt-text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
      .status-card .v { font-size: 22px; font-weight: 700; font-family: var(--tt-font-mono); }
      .status-card .v.up { color: var(--tt-up-soft); }
      .status-card .v.dn { color: var(--tt-dn-soft); }
      .status-card .s { font-size: 11.5px; color: var(--tt-text-muted); margin-top: 6px; font-family: var(--tt-font-mono); }

      /* Setup table */
      .tbl { width: 100%; border-collapse: collapse; }
      .tbl th, .tbl td {
        padding: 10px 12px;
        text-align: left;
        font-size: 12.5px;
        border-bottom: 1px solid var(--tt-border);
      }
      .tbl th {
        font-size: 10.5px;
        color: var(--tt-text-dim);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        background: var(--tt-bg-elev);
      }
      .tbl td { font-family: var(--tt-font-mono); color: var(--tt-text); }
      .tbl td.label { font-weight: 700; font-family: var(--tt-font); }
      .tbl td.up { color: var(--tt-up-soft); }
      .tbl td.dn { color: var(--tt-dn-soft); }
      .tbl tr:hover td { background: var(--tt-bg-elev); }
      .tbl .empty {
        text-align: center;
        color: var(--tt-text-faint);
        font-style: italic;
        font-family: var(--tt-font);
        padding: 28px 12px;
      }
      .tbl-scroll {
        max-height: 520px;
        overflow-y: auto;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
      }
      .tbl-scroll::-webkit-scrollbar { width: 6px; }
      .tbl-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }

      /* CIO Watchlist — three-card grid */
      .cio-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }
      @media (max-width: 1024px) {
        .cio-grid { grid-template-columns: 1fr; }
      }
      .cio-card {
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
        padding: 14px 16px;
      }
      .cio-card--learnings { grid-column: 1 / -1; }
      .cio-card-l {
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.10em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
        margin-bottom: 10px;
      }
      .cio-card-sub {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        margin: 10px 0 0;
        line-height: 1.5;
      }
      .cio-pipeline {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .cio-stage {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: var(--tt-font);
        font-size: 11.5px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
      }
      .cio-stage strong { font-weight: 700; font-family: var(--tt-font-mono); color: var(--tt-text); }
      /* Universe Rebalance — directional reweight pills */
      .rw-block {
        flex: 1 1 100%;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .rw-block-label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--tt-text-dim);
        font-family: var(--tt-font);
      }
      .rw-block-tally { font-family: var(--tt-font-mono); margin-left: 4px; font-weight: 600; }
      .rw-list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .rw-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 9px;
        border-radius: 6px;
        font-size: 11.5px;
        font-family: var(--tt-font-mono);
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
      }
      .rw-pill .rw-sym { font-weight: 700; color: var(--tt-text); }
      .rw-pill .rw-delta { display: inline-flex; gap: 2px; align-items: center; }
      .rw-pill.rw-up {
        color: var(--tt-up-soft);
        background: var(--tt-up-bg);
        border-color: rgba(34,197,94,0.30);
      }
      .rw-pill.rw-dn {
        color: var(--tt-dn-soft);
        background: var(--tt-dn-bg);
        border-color: rgba(244,63,94,0.30);
      }
      .rw-more {
        align-self: center;
        font-size: 11px;
        color: var(--tt-text-dim);
        font-family: var(--tt-font-mono);
      }

      /* Active-board live P&L stat strip */
      .cio-board-stats {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--tt-border);
      }
      @media (max-width: 720px) {
        .cio-board-stats { grid-template-columns: 1fr 1fr; }
      }
      .cio-board-stat {
        display: flex;
        flex-direction: column;
      }
      .cio-board-stat-l {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--tt-text-faint);
        margin-bottom: 4px;
      }
      .cio-board-stat-v {
        font-family: var(--tt-font-mono);
        font-size: 14px;
        font-weight: 700;
        color: var(--tt-text);
      }
      .cio-board-stat-sym {
        font-family: var(--tt-font);
        font-weight: 700;
        color: var(--tt-text);
      }
      .cio-board-sectors {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
        align-items: center;
      }
      .cio-board-sectors-l {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--tt-text-faint);
        margin-right: 4px;
      }
      .cio-board-sector-pill {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 11px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        color: var(--tt-text-muted);
        font-family: var(--tt-font);
      }
      .cio-board-sector-pill strong {
        font-family: var(--tt-font-mono);
        color: var(--tt-text);
      }

      .cio-stage--setup  { color: #93c5fd; background: rgba(96,165,250,0.08); border-color: rgba(96,165,250,0.24); }
      .cio-stage--enter  { color: var(--tt-accent); background: var(--tt-accent-dim); border-color: rgba(56,242,161,0.30); }
      .cio-stage--hold   { color: var(--tt-up-soft); background: var(--tt-up-bg); border-color: rgba(34,197,94,0.25); }
      .cio-stage--defend { color: #fb923c; background: rgba(251,146,60,0.10); border-color: rgba(251,146,60,0.30); }
      .cio-stage--trim   { color: #facc15; background: rgba(250,204,21,0.10); border-color: rgba(250,204,21,0.30); }
      .cio-stage--exit   { color: var(--tt-dn-soft); background: var(--tt-dn-bg); border-color: rgba(244,63,94,0.25); }

      .cio-watch-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 320px;
        overflow-y: auto;
      }
      .cio-watch-row {
        display: grid;
        grid-template-columns: 70px auto 1fr auto auto;
        gap: 8px;
        align-items: center;
        padding: 6px 10px;
        border-radius: 8px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        text-decoration: none;
        font-size: 12px;
        font-family: var(--tt-font-mono);
        transition: background 120ms ease, border-color 120ms ease;
      }
      .cio-watch-row:hover {
        background: var(--tt-bg-surface);
        border-color: var(--tt-border-hi);
      }
      .cio-watch-sym { font-weight: 700; color: var(--tt-text); font-family: var(--tt-font); }
      .cio-watch-dir {
        font-size: 9.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--tt-bg-surface);
      }
      .cio-watch-dir.up { color: var(--tt-up-soft); }
      .cio-watch-dir.dn { color: var(--tt-dn-soft); }
      .cio-watch-setup { color: var(--tt-text-muted); font-family: var(--tt-font); font-size: 11.5px; }

      .cio-learn-grid {

      @media (max-width: 720px) {

      .cio-learn-h {

      .cio-learn-row {

      .cio-learn-stats strong.up { color: var(--tt-up-soft); }
      .cio-learn-stats strong.dn { color: var(--tt-dn-soft); }

      /* AI CIO commentary — markdown rendered from brief.content */
      .brief-commentary {

      .brief-commentary::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }
      .brief-commentary h2, .brief-commentary h3 {

        margin: 14px 0 6px;
        letter-spacing: 0.02em;

      .brief-commentary h2:first-child, .brief-commentary h3:first-child { margin-top: 0; }
      .brief-commentary p { margin: 0 0 10px; }
      .brief-commentary ul, .brief-commentary ol { margin: 0 0 10px 18px; padding: 0; }
      .brief-commentary li { margin-bottom: 4px; }

      .brief-commentary em { color: var(--tt-text-muted); }
      .brief-commentary code {

        color: var(--tt-accent);

      /* Mini win-rate bar inside cells */
      .wr-bar {
        position: relative;
        height: 6px;
        background: var(--tt-bg-elev);
        border-radius: 4px;
        overflow: hidden;
        width: 100%;

      .wr-bar > .fill.up { background: var(--tt-up); opacity: 0.8; }
      .wr-bar > .fill.mid { background: var(--tt-accent); opacity: 0.8; }
      .wr-bar > .fill.dn { background: var(--tt-dn); opacity: 0.8; }

      /* Loading bar + skeletons */
      .tt-loadbar {
        position: fixed; top: 0; left: 0; right: 0;

      .tt-loadbar::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--tt-accent), transparent);
        animation: tt-loadbar 1.4s ease-in-out infinite;

      @keyframes tt-loadbar { 0% { left: -30%; } 100% { left: 100%; } }
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;

        font-size: 11.5px; font-weight: 600;
        padding: 5px 12px;

        border: 0;
        border-radius: 999px;
        cursor: pointer;
      }

        box-shadow: 0 0 0 1px var(--tt-border-hi);
      }
    </style>
  </head>
  <body class="vf-page">
    <div id="global-nav-root"></div>
    <script src="shared-nav.js?v=20260611a"></script>

    <div id="root">
      <main>
        <div class="tt-card tt-card-pad" style="text-align:center;color:var(--tt-text-muted)">Loading Insights…</div>
      </main>
    </div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;
      const h = React.createElement;
      const API_BASE = "";

      // ── Format helpers ──────────────────────────────────────────
      const fmtUsd  = (n) => Number.isFinite(n) ? `${n >= 0 ? "+" : "-"}$${Math.abs(Math.round(n)).toLocaleString("en-US")}` : "—";
      const fmtUsdPlain = (n) => Number.isFinite(n) ? `$${Math.abs(Math.round(n)).toLocaleString("en-US")}` : "—";
      const fmtPct  = (n, d = 2) => Number.isFinite(n) ? `${n >= 0 ? "+" : ""}${n.toFixed(d)}%` : "—";
      const fmtPctRaw = (n, d = 1) => Number.isFinite(n) ? `${n.toFixed(d)}%` : "—";
      const fmtRelativeTime = (ms) => {
        if (!Number.isFinite(ms) || ms <= 0) return "—";
        const diff = Math.max(0, Date.now() - ms);
        const mins = Math.floor(diff / 60000);
        if (mins < 1) return "just now";
        if (mins < 60) return `${mins}m ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}h ago`;
        return `${Math.floor(hrs / 24)}d ago`;
      };

      // ── Fetch helpers ──────────────────────────────────────────
      async function fetchAllMeta() {
        // Use /timed/all to get the data snapshot timestamp (built_at).
        try {
          const r = await fetch(`${API_BASE}/timed/all?_t=${Date.now()}`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      async function fetchHistory() {
        // Raise from 500 → 1000 (server max) so the setup breakdown
        // sees the full population, not just the last 500 trades.
        // The ModelStatus card pulls its count from /timed/ledger/summary
        // (which has the authoritative totals) so this list is for
        // breakdown display + recent-trade timestamps only.
        try {
          const r = await fetch(`${API_BASE}/timed/ledger/trades?limit=1000`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      async function fetchLedgerSummary() {
        try {
          const r = await fetch(`${API_BASE}/timed/ledger/summary`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      async function fetchBrief() {
        try {
          const r = await fetch(`${API_BASE}/timed/daily-brief`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }
      async function fetchUniverseChanges() {
        try {
          const r = await fetch(`${API_BASE}/timed/universe/changes?days=30&limit=20`, {
            credentials: "include", cache: "no-store",
          });
          if (!r.ok) return null;
          return await r.json();
        } catch (_) { return null; }
      }

      // ── ModelStatus — top status cards ─────────────────────────
      function ModelStatus({ allMeta, history, summary }) {
        const builtAt = Number(allMeta?.built_at);
        const tickerCount = Number(allMeta?.count) || (allMeta?.data ? Object.keys(allMeta.data).length : 0);
        const lastTradeTs = useMemo(() => {
          if (!Array.isArray(history)) return null;
          let m = 0;
          for (const t of history) {
            const e = Number(t?.exit_ts || t?.exitTs || t?.entry_ts || t?.entryTs || 0);
            if (e > m) m = e;
          }
          return m || null;
        }, [history]);
        // Prefer /timed/ledger/summary.totals.closedTrades — it sees the
        // full population, while `history` is paginated. The previous
        // implementation read closedCount from `history` and capped at
        // the page limit (488 / 500) which understated the real count.
        const closedCount = useMemo(() => {
          const fromSummary = Number(summary?.totals?.closedTrades);
          if (Number.isFinite(fromSummary) && fromSummary >= 0) return fromSummary;
          if (!Array.isArray(history)) return 0;
          return history.filter((t) => Number.isFinite(Number(t?.pnl)) && t?.exit_ts).length;
        }, [history, summary]);

        const healthOk = Number.isFinite(builtAt) && (Date.now() - builtAt) < 30 * 60 * 1000;
        const healthLabel = healthOk ? "Healthy" : Number.isFinite(builtAt) ? "Stale snapshot" : "Unknown";

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 12 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "MODEL STATUS"),
              h("div", { className: "tt-sec-h", style: { margin: 0 } }, "Right now"),
            ),
            h("div", { className: `health-pill ${healthOk ? "ok" : "warn"}` },
              h("div", { className: "dot", style: { background: "currentColor" } }),
              healthLabel,
            ),
          ),
          h("div", { className: "status-grid" },
            h("div", { className: "status-card" },
              h("div", { className: "l" }, "Tickers Tracked"),
              h("div", { className: "v" }, tickerCount > 0 ? tickerCount.toString() : "—"),
              h("div", { className: "s" }, "Active universe"),
            ),
            h("div", { className: "status-card" },
              h("div", { className: "l" }, "Last Scoring Run"),
              h("div", { className: "v" }, Number.isFinite(builtAt) ? fmtRelativeTime(builtAt) : "—"),
              h("div", { className: "s" }, Number.isFinite(builtAt) ? new Date(builtAt).toISOString().slice(0, 16).replace("T", " ") + " UTC" : ""),
            ),
            h("div", { className: "status-card" },
              h("div", { className: "l" }, "Last Trade"),
              h("div", { className: "v" }, lastTradeTs ? fmtRelativeTime(lastTradeTs) : "—"),
              h("div", { className: "s" }, lastTradeTs ? new Date(lastTradeTs).toISOString().slice(0, 16).replace("T", " ") + " UTC" : ""),
            ),
            h("div", { className: "status-card" },
              h("div", { className: "l" }, "Closed Trades"),
              h("div", { className: "v" }, closedCount.toLocaleString("en-US")),
              h("div", { className: "s" }, "All-time"),
            ),
          ),
        );
      }

      // ── prettySetupName — strip the engine's 'TT Tt ' prefix so users
      //    don't see the raw internal namespace. Mirrors the helper in
      //    trades-performance.js so Insights labels match Portfolio.
      function prettySetupName(name) {
        if (!name) return "Unknown";
        let s = String(name);
        s = s.replace(/^TT\s+/i, "");      // strip brand prefix
        s = s.replace(/^Tt\s+/i, "");      // strip engine namespace
        s = s.replace(/^tt[_\s]+/i, "");   // strip lowercase variant
        return s;
      }

      // ── SetupBreakdown — group by setup_name + show WR / expectancy / total $ ──
      function SetupBreakdown({ history, dim }) {
        const rows = useMemo(() => {
          if (!Array.isArray(history)) return [];
          const buckets = new Map();
          for (const t of history) {
            const closed = Number.isFinite(Number(t?.pnl)) && t?.exit_ts;
            if (!closed) continue;
            const rawKey = String(t?.[dim] || "—");
            // Apply prettySetupName ONLY to setup_name; grades / exit
            // reasons are already user-friendly.
            const key = dim === "setup_name" ? prettySetupName(rawKey) : rawKey;
            const cur = buckets.get(key) || { name: key, count: 0, wins: 0, losses: 0, pnl: 0, gross_profit: 0, gross_loss: 0 };
            cur.count += 1;
            const pnl = Number(t.pnl) || 0;
            cur.pnl += pnl;
            if (pnl > 0) { cur.wins += 1; cur.gross_profit += pnl; }
            else if (pnl < 0) { cur.losses += 1; cur.gross_loss += Math.abs(pnl); }
            buckets.set(key, cur);
          }
          return Array.from(buckets.values())
            .filter((r) => r.count >= 1)
            .map((r) => {
              const winRate = r.count > 0 ? (r.wins / r.count) * 100 : 0;
              const expectancy = r.count > 0 ? r.pnl / r.count : 0;
              const pf = r.gross_loss > 0 ? r.gross_profit / r.gross_loss : (r.gross_profit > 0 ? Infinity : 0);
              return { ...r, winRate, expectancy, pf };
            })
            .sort((a, b) => b.pnl - a.pnl);
        }, [history, dim]);

        const total = rows.reduce((acc, r) => acc + r.pnl, 0);

        return h("section", { className: "tt-row" },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 12 } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "PERFORMANCE BREAKDOWN"),
              h("div", { className: "tt-sec-h", style: { margin: 0 } },
                dim === "setup_name" ? "By setup" : dim === "setup_grade" ? "By setup grade" : "By exit reason",
              ),
            ),
            h("div", { style: { fontFamily: "var(--tt-font-mono)", fontSize: 12, color: total >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)" } },
              "Net ", fmtUsd(total),
            ),
          ),
          h("div", { className: "tbl-scroll" },
            h("table", { className: "tbl" },
              h("thead", null,
                h("tr", null,
                  h("th", null, dim === "setup_name" ? "Setup" : dim === "setup_grade" ? "Grade" : "Exit Reason"),
                  h("th", null, "Trades"),
                  h("th", null, "Win Rate"),
                  h("th", null, "Expectancy"),
                  h("th", null, "Profit Factor"),
                  h("th", null, "Net P&L"),
                ),
              ),
              h("tbody", null,
                rows.length === 0
                  ? h("tr", null, h("td", { className: "empty", colSpan: 6 }, "No closed trades yet."))
                  : rows.map((r) => {
                      const wrCls = r.winRate >= 60 ? "up" : r.winRate >= 45 ? "mid" : "dn";
                      return h("tr", { key: r.name },
                        h("td", { className: "label" }, r.name),
                        h("td", null, r.count, h("span", { style: { color: "var(--tt-text-faint)", marginLeft: 6 } }, `${r.wins}W / ${r.losses}L`)),
                        h("td", null,
                          h("div", { style: { display: "flex", alignItems: "center", gap: 8 } },
                            h("div", { className: "wr-bar" },
                              h("div", { className: `fill ${wrCls}`, style: { width: `${Math.min(100, Math.max(0, r.winRate))}%` } }),
                            ),
                            h("span", { style: { color: r.winRate >= 60 ? "var(--tt-up-soft)" : r.winRate >= 45 ? "var(--tt-accent)" : "var(--tt-dn-soft)" } }, fmtPctRaw(r.winRate)),
                          ),
                        ),
                        h("td", { className: r.expectancy >= 0 ? "up" : "dn" }, fmtUsd(r.expectancy)),
                        h("td", null, Number.isFinite(r.pf) ? r.pf.toFixed(2) : (r.pf > 0 ? "∞" : "0.00")),
                        h("td", { className: r.pnl >= 0 ? "up" : "dn" }, fmtUsd(r.pnl)),
                      );
                    }),
              ),
            ),
          ),
        );
      }

      // ── CIOWatchlist — what the model is HUNTING FOR right now.
      //
      // User feedback: "AI CIO commentary seems redundant to the
      // Daily Brief. This should be specific to what the AI CIO
      // sees and what type of setups it should be looking for and
      // what learnings have been made."
      //
      // This card surfaces three CIO-specific lenses:
      //   1. What the engine's actively trading (kanban distribution
      //      + open-trade health from /timed/all)
      //   2. What it's WATCHING FOR — the top in-review / setup
      //      tickers with their dominant setup type
      //   3. What it's LEARNED — the best/worst setup names from
      //      /timed/ledger/summary breakdown (i.e. "Gap Reversal Long
      //      is paying +$25K at 56.9% WR; Ath Breakout is bleeding
      //      -$1.2K at 41% WR — the model is downweighting it")
      function CIOWatchlist({ allMeta, summary, history, hideHeader, hideLearnings }) {
        const data = allMeta?.data || {};

        // Setup-name cleanup mirrors insights' SetupBreakdown logic.
        const prettySetup = (raw) => {
          if (!raw) return "Other";
          return String(raw)
            .replace(/^TT\s+/i, "")
            .replace(/^Tt[\s_]+/i, "")
            .replace(/^tt_/i, "")
            .replace(/_/g, " ")
            .replace(/\b\w/g, (c) => c.toUpperCase())
            .trim() || "Other";
        };

        // ── 1. Active board snapshot ──
        //
        // V15 P0.7.183 (2026-05-17) — Per user feedback: "AI CIO -
        // Active Board seems like it needs more detail." We now also
        // track:
        //   • aggregate Open P&L % across all live positions
        //   • the best + worst live position (sym + Open P&L %)
        //   • a sector mix of where the model is currently exposed
        //   • avg position size (rank-based proxy)
        // The pill row stays — but the cio-card now renders a richer
        // body that surfaces the above.
        // 2026-05-29 — B4: live open trades fetched directly so the
        // board's "open positions" count + best/worst mover are based
        // on actual D1 trade rows (not derived from kanban stage which
        // can miss tickers whose stage doesn't map to one of the
        // hardcoded "hold/active/defend/trim" buckets). Also pulls
        // investor positions so the board reflects BOTH modes.
        const [liveTraderTrades, setLiveTraderTrades] = useState([]);
        const [liveInvestorPositions, setLiveInvestorPositions] = useState([]);
        useEffect(() => {
          let alive = true;
          (async () => {
            try {
              const [tR, iR] = await Promise.all([
                fetch(`${API_BASE}/timed/ledger/trades?mode=trader&status=open&limit=50`, { credentials: "include" }).then(r => r.ok ? r.json() : null).catch(() => null),
                fetch(`${API_BASE}/timed/investor/positions`, { credentials: "include" }).then(r => r.ok ? r.json() : null).catch(() => null),
              ]);
              if (!alive) return;
              if (tR?.ok && Array.isArray(tR.trades)) setLiveTraderTrades(tR.trades);
              if (iR?.ok && Array.isArray(iR.positions)) setLiveInvestorPositions(iR.positions.filter(p => String(p?.status || "").toUpperCase() === "OPEN"));
            } catch (_) {}
          })();
          return () => { alive = false; };
        }, []);

        const board = useMemo(() => {
          const counts = { setup: 0, enter: 0, hold: 0, defend: 0, trim: 0, exit: 0 };
          const watching = [];
          const positions = [];
          const sectorTallies = {};
          for (const [sym, t] of Object.entries(data)) {
            if (!t || typeof t !== "object") continue;
            const stage = String(t.kanban_stage || "").toLowerCase();
            switch (stage) {
              case "setup":
              case "setup_watch":
              case "flip_watch":
                counts.setup += 1;
                watching.push({ sym, stage, t });
                break;
              case "in_review":
              case "enter":
              case "enter_now":
              case "just_flipped":
                counts.enter += 1;
                watching.push({ sym, stage, t });
                break;
              case "hold":
              case "active":
              case "just_entered":
                counts.hold += 1;
                positions.push({ sym, stage, t });
                break;
              case "defend":
                counts.defend += 1;
                positions.push({ sym, stage, t });
                break;
              case "trim":
                counts.trim += 1;
                positions.push({ sym, stage, t });
                break;
              case "exit":
                counts.exit += 1;
                break;
            }
            // Sector tally for any live position.
            if (["hold","active","just_entered","defend","trim"].includes(stage)) {
              const sector = String(t?.context?.sector || t?.sector || "Unknown");
              sectorTallies[sector] = (sectorTallies[sector] || 0) + 1;
            }
          }
          // 2026-05-29 — B4: live open P&L computed from /timed/ledger/
          // trades + /timed/investor/positions directly. Previously this
          // walked the kanban-stage-filtered `positions` array which
          // missed tickers in stages outside hold/active/defend/trim
          // (so the board showed 2 positions when there were 9+).
          // Best/worst now respect mode tag so the user sees the actual
          // top mover across both Trader and Investor lanes.
          let totalPl = 0;
          let plKnown = 0;
          let best = null;
          let worst = null;
          // 2026-05-31 — Sector exposure was tallied from the kanban
          // walk above (only stages hold/active/just_entered/defend/
          // trim), which misses any trader/investor position whose
          // ticker's kanban_stage isn't one of those. Re-derive from
          // the real D1 trade rows so the EXPOSURE pill row matches
          // the live position count below.
          const realSectorTallies = {};
          const allLive = [
            ...liveTraderTrades.map(t => ({
              sym: String(t.ticker || "").toUpperCase(),
              mode: "trader",
              ep: Number(t.entry_price),
              cp: Number(((data || {})[t.ticker] || {}).price ?? ((data || {})[t.ticker] || {}).close ?? t.entry_price),
              dir: String(t.direction || "LONG").toUpperCase(),
            })),
            ...liveInvestorPositions.map(p => ({
              sym: String(p.ticker || "").toUpperCase(),
              mode: "investor",
              ep: Number(p.avg_entry),
              cp: Number(((data || {})[p.ticker] || {}).price ?? ((data || {})[p.ticker] || {}).close ?? p.avg_entry),
              dir: "LONG",
            })),
          ];
          for (const p of allLive) {
            if (!Number.isFinite(p.ep) || !Number.isFinite(p.cp) || p.ep <= 0) continue;
            const mul = p.dir === "SHORT" ? -1 : 1;
            const plPct = ((p.cp - p.ep) / p.ep) * 100 * mul;
            totalPl += plPct;
            plKnown += 1;
            if (!best || plPct > best.plPct) best = { sym: p.sym, plPct, mode: p.mode };
            if (!worst || plPct < worst.plPct) worst = { sym: p.sym, plPct, mode: p.mode };
            // Sector pulled from ticker snapshot (data[sym].context?.sector).
            const snap = (data || {})[p.sym] || (data || {})[p.sym.toLowerCase()];
            const rawSector = String(snap?.context?.sector || snap?.sector || "").trim();
            if (rawSector) {
              realSectorTallies[rawSector] = (realSectorTallies[rawSector] || 0) + 1;
            }
          }
          const avgPl = plKnown > 0 ? totalPl / plKnown : null;
          // Override the kanban-derived live positions count with the
          // actual D1 count so KPI reflects truth.
          counts.totalLive = allLive.length;
          counts.traderLive = liveTraderTrades.length;
          counts.investorLive = liveInvestorPositions.length;
          // Top watching by rank (or score fallback).
          watching.sort((a, b) => {
            const ra = Number(a.t?.rank_position) || Number(a.t?.rank_score) || 999;
            const rb = Number(b.t?.rank_position) || Number(b.t?.rank_score) || 999;
            return ra - rb;
          });
          // Sector mix sorted by count desc, top 6. Suppress "Unknown"
          // bucket — it adds noise and made the strip read as "Exposure
          // Unknown 5" with no useful information.
          const sectors = Object.entries(realSectorTallies)
            .filter(([name]) => name && name.toLowerCase() !== "unknown")
            .sort((a, b) => b[1] - a[1])
            .slice(0, 6)
            .map(([name, n]) => ({ name, n }));
          const sectorUnknownCount = Number(realSectorTallies["Unknown"]) || 0;
          return {
            counts,
            watching: watching.slice(0, 8),
            avgPl,
            best,
            worst,
            sectors,
            sectorUnknownCount,
            // 2026-05-31 — liveCount was the kanban-stage-filtered count
            // (only hold/active/just_entered/defend/trim). For most users
            // most stages don't match exactly, so the card read "5 live
            // positions" when the user actually had 9+ open across
            // Trader + Investor. Use the D1-truth count instead.
            liveCount: allLive.length,
            traderLive: liveTraderTrades.length,
            investorLive: liveInvestorPositions.length,
            plKnown,
          };
        }, [data, liveTraderTrades, liveInvestorPositions]);

        // ── 2. What the model has learned (top + bottom setups) ──
        const learnings = useMemo(() => {
          const rows = summary?.breakdown?.bySetup;
          if (!Array.isArray(rows) || rows.length === 0) {
            // Fall back to history if summary doesn't carry breakdown.
            if (!Array.isArray(history)) return null;
            const byBucket = new Map();
            for (const t of history) {
              const raw = t?.setup_name || t?.entry_path || t?.entryPath || "";
              const key = prettySetup(raw);
              const pnl = Number(t?.pnl);
              const closed = Number.isFinite(pnl) && (t?.exit_ts || t?.exitTs);
              if (!closed) continue;
              const row = byBucket.get(key) || { setup: key, n: 0, w: 0, l: 0, pnl: 0 };
              row.n += 1;
              if (pnl > 0) row.w += 1; else if (pnl < 0) row.l += 1;
              row.pnl += pnl;
              byBucket.set(key, row);
            }
            const arr = Array.from(byBucket.values()).filter((r) => r.n >= 5);
            return computeLearningRanges(arr);
          }
          const arr = rows
            .map((r) => ({
              setup: prettySetup(r?.bucket || r?.setup || ""),
              n: Number(r?.n) || 0,
              w: Number(r?.wins) || 0,
              l: Number(r?.losses) || 0,
              pnl: Number(r?.pnl) || 0,
            }))
            .filter((r) => r.n >= 5);
          return computeLearningRanges(arr);
        }, [summary, history]);

        if (!allMeta && !summary) {
          return h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-text-dim)" } },
            "Loading\u2026",
          );
        }

        return h(React.Fragment, null,
          !hideHeader && h(React.Fragment, null,
            h("div", { className: "tt-sec-title" }, "AI CIO · CURRENT VIEW"),
            h("h2", { className: "tt-sec-h2" }, "What the desk is weighing in on"),
            h("p", { className: "tt-sec-sub", style: { marginBottom: 14 } },
              "Live board posture, names on deck for confirmation, and setup-level learnings the CIO has already acted on. ",
              "This is guidance from the playbook and open risk — not a trade signal.",
            ),
          ),
          h("div", { className: "cio-grid" },
            // Active board — pill counts + live P&L summary + best/
            // worst position + sector exposure mix.
            h("div", { className: "cio-card" },
              h("div", { className: "cio-card-l" }, "Active board"),
              h("div", { className: "cio-pipeline" },
                h("span", { className: "cio-stage cio-stage--setup" }, "Setup ", h("strong", null, board.counts.setup)),
                h("span", { className: "cio-stage cio-stage--enter" }, "In Review ", h("strong", null, board.counts.enter)),
                h("span", { className: "cio-stage cio-stage--hold" }, "Hold ", h("strong", null, board.counts.hold)),
                h("span", { className: "cio-stage cio-stage--defend" }, "Defend ", h("strong", null, board.counts.defend)),
                h("span", { className: "cio-stage cio-stage--trim" }, "Trim ", h("strong", null, board.counts.trim)),
                h("span", { className: "cio-stage cio-stage--exit" }, "Exit ", h("strong", null, board.counts.exit)),
              ),
              // Live P&L summary row — only render when we have at
              // least one position with usable entry+current price.
              board.plKnown > 0 && h("div", { className: "cio-board-stats" },
                h("div", { className: "cio-board-stat" },
                  h("div", { className: "cio-board-stat-l" }, "Avg open"),
                  h("div", {
                    className: "cio-board-stat-v",
                    style: { color: board.avgPl >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)" },
                  }, `${board.avgPl >= 0 ? "+" : ""}${board.avgPl.toFixed(2)}%`),
                ),
                board.best && h("div", { className: "cio-board-stat" },
                  h("div", { className: "cio-board-stat-l" }, "Best"),
                  h("div", { className: "cio-board-stat-v" },
                    h("span", { className: "cio-board-stat-sym" }, board.best.sym),
                    h("span", { style: { color: "var(--tt-up-soft)", marginLeft: 6 } }, `+${board.best.plPct.toFixed(2)}%`),
                  ),
                ),
                board.worst && board.worst.sym !== board.best?.sym && h("div", { className: "cio-board-stat" },
                  h("div", { className: "cio-board-stat-l" }, "Worst"),
                  h("div", { className: "cio-board-stat-v" },
                    h("span", { className: "cio-board-stat-sym" }, board.worst.sym),
                    h("span", { style: { color: board.worst.plPct >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)", marginLeft: 6 } },
                      `${board.worst.plPct >= 0 ? "+" : ""}${board.worst.plPct.toFixed(2)}%`),
                  ),
                ),
              ),
              // Sector exposure of live positions. Only render the
              // row when we have at least one named sector (the
              // "Unknown" bucket is suppressed in the data layer).
              board.sectors.length > 0 && h("div", { className: "cio-board-sectors" },
                h("span", { className: "cio-board-sectors-l" }, "Exposure"),
                board.sectors.map((s) => h("span", {
                  key: s.name,
                  className: "cio-board-sector-pill",
                  title: `${s.n} live position${s.n === 1 ? "" : "s"}`,
                }, s.name, " ", h("strong", null, s.n))),
                board.sectorUnknownCount > 0 && h("span", {
                  className: "cio-board-sector-pill",
                  title: `${board.sectorUnknownCount} position${board.sectorUnknownCount === 1 ? "" : "s"} without a tagged sector — usually a freshly-added ticker or a non-equity instrument.`,
                  style: { opacity: 0.55 },
                }, "Other ", h("strong", null, board.sectorUnknownCount)),
              ),
              h("p", { className: "cio-card-sub" },
                `${board.liveCount} live position${board.liveCount === 1 ? "" : "s"}`,
                board.traderLive > 0 && board.investorLive > 0
                  ? ` (${board.traderLive} trader · ${board.investorLive} investor). `
                  : ". ",
                `${board.counts.setup + board.counts.enter} setup${(board.counts.setup + board.counts.enter) === 1 ? "" : "s"} on deck. `,
                board.counts.defend + board.counts.exit > 0
                  ? `${board.counts.defend + board.counts.exit} under stress.`
                  : "All clear on stress lanes.",
              ),
            ),

            // Watching for — top in-review / setup tickers
            h("div", { className: "cio-card" },
              h("div", { className: "cio-card-l" }, "Watching for entry"),
              board.watching.length === 0
                ? h("p", { className: "cio-card-sub" }, "No setups awaiting confirmation right now.")
                : h("div", { className: "cio-watch-list" },
                    board.watching.map(({ sym, stage, t }) => {
                      const setup = prettySetup(t?.setup_name || t?.entry_path || "");
                      const rank = Number(t?.rank_position) || null;
                      const rr = Number(t?.rr) || null;
                      const dir = String(t?.state || "").startsWith("HTF_BULL")
                        ? "LONG"
                        : String(t?.state || "").startsWith("HTF_BEAR")
                        ? "SHORT"
                        : "";
                      return h("a", {
                        key: sym,
                        href: `/active-trader.html?ticker=${encodeURIComponent(sym)}`,
                        className: "cio-watch-row",
                      },
                        h("span", { className: "cio-watch-sym" }, sym),
                        dir && h("span", { className: `cio-watch-dir ${dir === "LONG" ? "up" : "dn"}` }, dir),
                        setup && h("span", { className: "cio-watch-setup" }, setup),
                        rank != null && h("span", { className: "cio-watch-rank" }, `R${rank}`),
                        rr != null && h("span", { className: "cio-watch-rr" }, `${rr.toFixed(1)}R`),
                      );
                    }),
                  ),
            ),

            !hideLearnings && h("div", { className: "cio-card cio-card--learnings" },
              h("div", { className: "cio-card-l" }, "Recent learnings"),
              !learnings || (learnings.best.length === 0 && learnings.worst.length === 0)
                ? h("p", { className: "cio-card-sub" }, "Need at least 5 closed trades per setup before the CIO has a read.")
                : h("div", { className: "cio-learn-grid" },
                    h("div", null,
                      h("div", { className: "cio-learn-h cio-learn-h--up" }, "Paying off"),
                      learnings.best.length === 0
                        ? h("p", { className: "cio-card-sub" }, "No setup has a clear edge yet.")
                        : learnings.best.map((r) => h("div", { key: r.setup, className: "cio-learn-row" },
                            h("span", { className: "cio-learn-name" }, r.setup),
                            h("span", { className: "cio-learn-stats" },
                              h("strong", { className: "up" }, `${r.pnl >= 0 ? "+" : "-"}$${Math.abs(r.pnl).toFixed(0)}`),
                              h("span", { className: "cio-learn-wr" }, `${((r.w / Math.max(1, r.n)) * 100).toFixed(0)}% · n=${r.n}`),
                            ),
                          )),
                    ),
                    h("div", null,
                      h("div", { className: "cio-learn-h cio-learn-h--dn" }, "Getting tightened"),
                      learnings.worst.length === 0
                        ? h("p", { className: "cio-card-sub" }, "Nothing is bleeding.")
                        : learnings.worst.map((r) => h("div", { key: r.setup, className: "cio-learn-row" },
                            h("span", { className: "cio-learn-name" }, r.setup),
                            h("span", { className: "cio-learn-stats" },
                              h("strong", { className: "dn" }, `${r.pnl >= 0 ? "+" : "-"}$${Math.abs(r.pnl).toFixed(0)}`),
                              h("span", { className: "cio-learn-wr" }, `${((r.w / Math.max(1, r.n)) * 100).toFixed(0)}% · n=${r.n}`),
                            ),
                          )),
                    ),
                  ),
            ),
          ),
        );
      }

      function computeLearningRanges(rows) {
        if (!Array.isArray(rows) || rows.length === 0) return { best: [], worst: [] };
        const best = rows.filter((r) => r.pnl > 0).sort((a, b) => b.pnl - a.pnl).slice(0, 4);
        const worst = rows.filter((r) => r.pnl < 0).sort((a, b) => a.pnl - b.pnl).slice(0, 4);
        return { best, worst };
      }

      function useCioLearnings(summary, history) {
        const prettySetup = (raw) => {
          if (!raw) return "Unknown";
          let s = String(raw);
          s = s.replace(/^TT\s+/i, "");
          s = s.replace(/^Tt\s+/i, "");
          s = s.replace(/^tt[_\s]+/i, "");
          return s || "Unknown";
        };
        return useMemo(() => {
          const rows = summary?.breakdown?.bySetup;
          if (!Array.isArray(rows) || rows.length === 0) {
            if (!Array.isArray(history)) return null;
            const byBucket = new Map();
            for (const t of history) {
              const raw = t?.setup_name || t?.entry_path || t?.entryPath || "";
              const key = prettySetup(raw);
              const pnl = Number(t?.pnl);
              const closed = Number.isFinite(pnl) && (t?.exit_ts || t?.exitTs);
              if (!closed) continue;
              const row = byBucket.get(key) || { setup: key, n: 0, w: 0, l: 0, pnl: 0 };
              row.n += 1;
              if (pnl > 0) row.w += 1; else if (pnl < 0) row.l += 1;
              row.pnl += pnl;
              byBucket.set(key, row);
            }
            const arr = Array.from(byBucket.values()).filter((r) => r.n >= 5);
            return computeLearningRanges(arr);
          }
          const arr = rows
            .map((r) => ({
              setup: prettySetup(r?.bucket || r?.setup || ""),
              n: Number(r?.n) || 0,
              w: Number(r?.wins) || 0,
              l: Number(r?.losses) || 0,
              pnl: Number(r?.pnl) || 0,
            }))
            .filter((r) => r.n >= 5);
          return computeLearningRanges(arr);
        }, [summary, history]);
      }

      function CIOLearningsPanel({ summary, history }) {
        const learnings = useCioLearnings(summary, history);
        return h("div", { className: "cio-card cio-card--learnings", style: { marginTop: 0 } },
          !learnings || (learnings.best.length === 0 && learnings.worst.length === 0)
            ? h("p", { className: "cio-card-sub", style: { margin: 0 } }, "Need at least 5 closed trades per setup before the CIO has a read.")
            : h("div", { className: "cio-learn-grid" },
                h("div", null,
                  h("div", { className: "cio-learn-h cio-learn-h--up" }, "Paying off"),
                  learnings.best.length === 0
                    ? h("p", { className: "cio-card-sub" }, "No setup has a clear edge yet.")
                    : learnings.best.map((r) => h("div", { key: r.setup, className: "cio-learn-row" },
                        h("span", { className: "cio-learn-name" }, r.setup),
                        h("span", { className: "cio-learn-stats" },
                          h("strong", { className: "up" }, `${r.pnl >= 0 ? "+" : "-"}$${Math.abs(r.pnl).toFixed(0)}`),
                          h("span", { className: "cio-learn-wr" }, `${((r.w / Math.max(1, r.n)) * 100).toFixed(0)}% · n=${r.n}`),
                        ),
                      )),
                ),
                h("div", null,
                  h("div", { className: "cio-learn-h cio-learn-h--dn" }, "Getting tightened"),
                  learnings.worst.length === 0
                    ? h("p", { className: "cio-card-sub" }, "Nothing is bleeding.")
                    : learnings.worst.map((r) => h("div", { key: r.setup, className: "cio-learn-row" },
                        h("span", { className: "cio-learn-name" }, r.setup),
                        h("span", { className: "cio-learn-stats" },
                          h("strong", { className: "dn" }, `${r.pnl >= 0 ? "+" : "-"}$${Math.abs(r.pnl).toFixed(0)}`),
                          h("span", { className: "cio-learn-wr" }, `${((r.w / Math.max(1, r.n)) * 100).toFixed(0)}% · n=${r.n}`),
                        ),
                      )),
                ),
              ),
        );
      }

      // ── UniverseChanges — TT Universe adds / removes / rebalances.
      //    User feedback: hide our source identifiers (GRNI/GRNY/GRNJ —
      //    those are internal ETF feeds we use to maintain the universe).
      //    Roll everything up into 'Universe Rebalance' events with just
      //    date + affected ticker count + the symbols.
      function UniverseChanges({ events, embedded }) {
        // Dedupe events that happened on the same date across multiple
        // source ETFs — union the added/removed/reweighted tickers.
        const rolled = useMemo(() => {
          if (!Array.isArray(events) || events.length === 0) return [];
          const byDate = new Map();
          for (const e of events) {
            const key = e.date || `auto-${Math.random()}`;
            const cur = byDate.get(key) || {
              date: e.date,
              captured_at: e.captured_at,
              added: new Map(),
              removed: new Map(),
              reweighted: new Map(),
              is_rebalance: false,
            };
            const collect = (bucket, arr) => {
              for (const a of (arr || [])) {
                const sym = typeof a === "string" ? a : (a?.ticker || "");
                if (!sym) continue;
                bucket.set(String(sym).toUpperCase(), a);
              }
            };
            collect(cur.added,      e.added);
            collect(cur.removed,    e.removed);
            collect(cur.reweighted, e.reweighted);
            cur.is_rebalance ||= !!e.is_rebalance;
            byDate.set(key, cur);
          }
          return Array.from(byDate.values()).map((g) => ({
            ...g,
            added:      Array.from(g.added.values()),
            removed:    Array.from(g.removed.values()),
            reweighted: Array.from(g.reweighted.values()),
          })).sort((a, b) => (a.date < b.date ? 1 : -1));
        }, [events]);

        if (rolled.length === 0) {
          return h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-text-dim)", fontSize: 13 } },
            "No universe changes in the last 30 days. When the universe is refreshed or an admin adds / removes a ticker, those events will appear here.",
          );
        }
        const fmtDate = (d) => String(d || "—");
        // 2026-05-29 — B4: removed the 8-ticker cap. User wants to see
        // the FULL list of additions/removals. limit defaults to 999.
        const renderTickers = (arr, limit = 999) =>
          arr.slice(0, limit).map((a, i) => {
            const sym = typeof a === "string" ? a : (a?.ticker || "?");
            return h("span", { key: i, style: { marginRight: 6 } }, sym);
          });

        // V15 P0.7.183 (2026-05-17) — Render a reweighted ticker
        // WITH direction and magnitude. Per user feedback: "TT
        // Universe Changes, this needs a bit more detail, such as
        // was AMD increased or decreased, STRL, same thing."
        const renderReweighted = (arr, limit = 999) =>
          arr.slice(0, limit).map((a, i) => {
            if (typeof a === "string") {
              return h("span", { key: i, className: "rw-pill" }, a);
            }
            const sym = a?.ticker || "?";
            const delta = Number(a?.delta);
            const oldW = Number(a?.oldWeight);
            const newW = Number(a?.newWeight);
            const hasDelta = Number.isFinite(delta);
            const isUp = hasDelta && delta > 0;
            const isDn = hasDelta && delta < 0;
            const cls = `rw-pill ${isUp ? "rw-up" : isDn ? "rw-dn" : ""}`;
            const arrow = isUp ? "▲" : isDn ? "▼" : "·";
            const deltaStr = hasDelta ? `${delta >= 0 ? "+" : ""}${delta.toFixed(2)}` : "";
            const titleParts = [];
            if (Number.isFinite(oldW)) titleParts.push(`was ${oldW.toFixed(2)}%`);
            if (Number.isFinite(newW)) titleParts.push(`now ${newW.toFixed(2)}%`);
            const title = titleParts.length > 0 ? `${sym}: ${titleParts.join(" → ")}` : sym;
            return h("span", { key: i, className: cls, title },
              h("span", { className: "rw-sym" }, sym),
              hasDelta && h("span", { className: "rw-delta" },
                h("span", { className: "rw-arrow" }, arrow),
                " ",
                deltaStr,
              ),
            );
          });

        const list = h("div", { style: { display: "flex", flexDirection: "column", gap: 10 } },
            rolled.map((e, i) => h("div", {
              key: `${e.date}-${i}`,
              className: "tt-card tt-card-pad",
            },
              h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8, flexWrap: "wrap", marginBottom: 8 } },
                h("div", null,
                  h("span", {
                    style: {
                      fontSize: 11.5, fontWeight: 700, letterSpacing: "0.08em",
                      padding: "3px 8px", borderRadius: 4,
                      color: "var(--tt-accent)",
                      background: "var(--tt-accent-dim)",
                      border: "1px solid rgba(56,242,161,0.30)",
                      textTransform: "uppercase",
                    },
                  }, "Universe Rebalance"),
                  h("span", { style: { color: "var(--tt-text-muted)", marginLeft: 10, fontSize: 12, fontWeight: 600 } },
                    fmtDate(e.date),
                  ),
                ),
                h("span", { style: { fontSize: 11, color: "var(--tt-text-dim)", fontFamily: "var(--tt-font-mono)" } },
                  `${e.added.length + e.removed.length + e.reweighted.length} tickers affected`,
                ),
              ),
              (e.added.length > 0 || e.removed.length > 0 || e.reweighted.length > 0) && h("div", {
                style: { display: "flex", flexWrap: "wrap", gap: 8 },
              },
                e.added.length > 0 && h("span", {
                  style: {
                    fontSize: 11.5, fontFamily: "var(--tt-font-mono)",
                    padding: "4px 10px", borderRadius: 6,
                    color: "var(--tt-up-soft)",
                    background: "var(--tt-up-bg)",
                    border: "1px solid rgba(34,197,94,0.25)",
                  },
                  title: e.added.map((a) => typeof a === "string" ? a : (a?.ticker || "")).join(", "),
                }, `+${e.added.length} added · `,
                  renderTickers(e.added),
                  e.added.length > 8 && h("span", null, `+${e.added.length - 8} more`),
                ),
                e.removed.length > 0 && h("span", {
                  style: {
                    fontSize: 11.5, fontFamily: "var(--tt-font-mono)",
                    padding: "4px 10px", borderRadius: 6,
                    color: "var(--tt-dn-soft)",
                    background: "var(--tt-dn-bg)",
                    border: "1px solid rgba(244,63,94,0.25)",
                  },
                  title: e.removed.map((a) => typeof a === "string" ? a : (a?.ticker || "")).join(", "),
                }, `−${e.removed.length} removed · `,
                  renderTickers(e.removed),
                  e.removed.length > 8 && h("span", null, `+${e.removed.length - 8} more`),
                ),
                e.reweighted.length > 0 && (() => {
                  // Tally how many went up vs down so the section
                  // header reads as "3 reweighted (2▲ 1▼)" instead
                  // of a generic count.
                  let ups = 0, dns = 0;
                  for (const a of e.reweighted) {
                    const d = Number(a?.delta);
                    if (Number.isFinite(d)) {
                      if (d > 0) ups += 1;
                      else if (d < 0) dns += 1;
                    }
                  }
                  return h("div", { className: "rw-block" },
                    h("span", { className: "rw-block-label" },
                      `${e.reweighted.length} reweighted`,
                      (ups > 0 || dns > 0) && h("span", { className: "rw-block-tally" },
                        " (",
                        ups > 0 && h("span", { style: { color: "var(--tt-up-soft)" } }, `${ups}▲`),
                        ups > 0 && dns > 0 && " ",
                        dns > 0 && h("span", { style: { color: "var(--tt-dn-soft)" } }, `${dns}▼`),
                        ")",
                      ),
                    ),
                    h("div", { className: "rw-list" },
                      renderReweighted(e.reweighted),
                      e.reweighted.length > 8 && h("span", { className: "rw-more" }, `+${e.reweighted.length - 8} more`),
                    ),
                  );
                })(),
              ),
            )),
        );
        if (embedded) return list;
        return h("section", { className: "tt-row" },
          h("div", { className: "tt-sec-title" }, "TT UNIVERSE CHANGES"),
          h("div", { className: "tt-sec-h" }, `Adds, removes, and rebalances · last 30 days (${rolled.length})`),
          list,
        );
      }

      // ── Page narrative spine (2026-06) ─────────────────────────────
      function StoryNav() {
        const links = [
          { href: "#chapter-playbook", label: "1 · Playbook" },
          { href: "#chapter-risk", label: "2 · Risk map" },

      // ── StretchedNamesPanel ──────────────────────────────────────────
      // 2026-06-02 — Operator: "names like MU that are popping off
      // properly evaluated and graded with perfect SL and TPs." This
      // panel proactively surfaces every ticker currently flagged
      // momentum_runner_exhausted (>=2 exhaustion warnings) so the user
      // sees the AVOID list without having to drill into each ticker.
      // Reads the same accumZone.exhaustionWarnings that the auto-
      // rebalance trim loop and right-rail panel use, so what the user
      // sees on this page = exactly what the engine is acting on.
      function StretchedNamesPanel({ apiBase }) {
        const [data, setData] = React.useState(null);
        const [loading, setLoading] = React.useState(false);
        const [err, setErr] = React.useState(null);
        React.useEffect(() => {
          let alive = true;
          setLoading(true);
          fetch(`${apiBase}/timed/investor/scores`, { credentials: "include" })
            .then(r => r.ok ? r.json() : Promise.reject(`HTTP ${r.status}`))
            .then(j => {
              if (!alive) return;
              const tickers = j.tickers || j.scores || [];
              // Filter to anything in momentum_runner_exhausted OR with
              // >=2 warnings (some classifier paths set zoneType but not
              // exhaustionWarnings explicitly — defensive).
              const stretched = tickers
                .filter(t => {
                  const az = t.accumZone || {};
                  const exh = az.exhaustionWarnings || [];
                  return az.zoneType === "momentum_runner_exhausted" || exh.length >= 2;
                })
                .map(t => ({
                  ticker: t.ticker,
                  stage: t.stage,
                  stageReason: t.stageReason,
                  score: t.score,
                  rsRank: t.rsRank,
                  price: t.price,
                  dailyChgPct: t.dailyChgPct,
                  exhaustionWarnings: (t.accumZone?.exhaustionWarnings) || [],
                  sector: t.sector,
                  position: t.position || null,
                }))
                .sort((a, b) => b.exhaustionWarnings.length - a.exhaustionWarnings.length);
              setData(stretched);
              setErr(null);
            })
            .catch(e => alive && setErr(String(e?.message || e).slice(0, 200)))
            .finally(() => alive && setLoading(false));
          return () => { alive = false; };
        }, [apiBase]);

        if (loading && !data) return h("section", { className: "tt-row" }, h("div", { className: "sk", style: { height: 200, borderRadius: 12 } }));
        if (err) return h("section", { className: "tt-row" }, h("div", { className: "tt-card tt-card-pad", style: { color: "var(--tt-dn-soft)" } }, "Stretched names panel: " + err));
        if (!data || data.length === 0) {
          return h("div", { className: "tt-card tt-card-pad" },
            h("div", { style: { display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" } },

        }
        return h("div", { className: "tt-card tt-card-pad" },
            h("div", { style: { display: "flex", alignItems: "baseline", gap: 10, marginBottom: 10, flexWrap: "wrap" } },
              h("span", { className: "ds-chip ds-chip--sm ds-chip--accent", style: { marginLeft: "auto" } }, `${data.length} flagged`),
            ),
            h("div", { style: { color: "var(--tt-text-muted)", fontSize: 12, marginBottom: 12, lineHeight: 1.5 } },
              "Exhaustion signals are stacking (extended phase, overbought RSI, TD9 counts, RS roll-off). The desk avoids new entries here; owned names may see a trim on the next rebalance cycle."),
            h("div", { style: { overflowX: "auto" } },
              h("table", { style: { width: "100%", borderCollapse: "collapse", fontSize: 12 } },
                h("thead", null,
                  h("tr", { style: { color: "var(--tt-text-3)", textAlign: "left" } },
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)" } }, "Ticker"),
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)" } }, "Stage"),
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)", textAlign: "right" } }, "Score"),
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)", textAlign: "right" } }, "RS%"),
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)", textAlign: "right" } }, "Today"),
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)", textAlign: "right" } }, "Warn"),
                    h("th", { style: { padding: "6px 8px", borderBottom: "1px solid var(--tt-border-1)" } }, "Signals firing"),
                  ),
                ),
                h("tbody", null,
                  ...data.map((t, i) => h("tr", { key: `stretch-${i}`, style: { borderBottom: "1px solid var(--tt-border-1)" } },
                    h("td", { style: { padding: "6px 8px" } },
                      h("a", { href: `/today.html?ticker=${t.ticker}`, style: { color: "var(--tt-text-0)", textDecoration: "none", fontFamily: "var(--tt-font-mono)", fontWeight: 600 } }, t.ticker),
                      t.position?.owned && h("span", { className: "ds-chip ds-chip--sm", style: { marginLeft: 6, fontSize: 9, color: "#34d399", borderColor: "rgba(52,211,153,0.30)", background: "rgba(52,211,153,0.10)" } }, "OWNED"),
                    ),
                    h("td", { style: { padding: "6px 8px", fontFamily: "var(--tt-font-mono)", fontSize: 11, color: t.stage === "watch" ? "#f59e0b" : "var(--tt-text-2)" } }, String(t.stage || "?").toUpperCase()),
                    h("td", { style: { padding: "6px 8px", textAlign: "right", fontFamily: "var(--tt-font-mono)" } }, t.score ?? "—"),
                    h("td", { style: { padding: "6px 8px", textAlign: "right", fontFamily: "var(--tt-font-mono)" } }, t.rsRank ?? "—"),
                    h("td", { style: { padding: "6px 8px", textAlign: "right", fontFamily: "var(--tt-font-mono)", color: (t.dailyChgPct || 0) >= 0 ? "#34d399" : "#f87171" } }, t.dailyChgPct != null ? `${t.dailyChgPct >= 0 ? "+" : ""}${Number(t.dailyChgPct).toFixed(1)}%` : "—"),

                  )),

            ),
        );
      }

                  h("div", null, "Round-trip    ", h("strong", null, `${Math.round((scenarios.round_trip_then_rally || 0) * 100)}%`)),

                      },

            h("div", { style: { fontSize: 10, color: "var(--tt-text-faint)", lineHeight: 1.5, paddingTop: 8, borderTop: "1px solid var(--tt-border)" } },

            ),

        if (embedded) return card;

      // ── ResearchNotePanel ────────────────────────────────────────────
      // User-facing slice of the CRO Research Desk: the daily verdict + a
      // few cited observations + plain-English education on the concepts
      // driving the current desk view. TT voice; FSD attribution implicit
      // (the note is TT's own synthesis, not FSD verbatim).
      function ResearchNotePanel({ note, education, embedded }) {
        const hasNote = note && note.ok !== false && note.verdict;
        const edu = (education && education.ok !== false && Array.isArray(education.education)) ? education.education : [];
        if (!hasNote && edu.length === 0) return null;

        const body = h("div", { className: embedded ? null : "tt-card tt-card-pad", style: { display: "flex", flexDirection: "column", gap: 14 } },
            !embedded && h("div", { style: { display: "flex", flexWrap: "wrap", alignItems: "baseline", justifyContent: "space-between", gap: 8 } },
              h("div", null,
                h("div", { className: "tt-sec-title" }, "RESEARCH DESK · DAILY READ"),
                h("div", { className: "tt-sec-h" }, "What the desk is watching"),
              ),
              hasNote && h("div", { style: { fontSize: 11, color: "var(--tt-text-muted)", fontFamily: "var(--tt-font-mono)" } },
                note.as_of_date || ""),
            ),
            embedded && hasNote && h("div", { style: { fontSize: 11, color: "var(--tt-text-muted)", fontFamily: "var(--tt-font-mono)", marginBottom: -4 } },
              "As of ", note.as_of_date || "—"),
            hasNote
              ? h("p", { style: { fontSize: 14, color: "var(--tt-text)", lineHeight: 1.6, margin: 0 } }, note.verdict)
              : h("p", { style: { fontSize: 13, color: "var(--tt-text-muted)", margin: 0 } },

            obs.length > 0 && h("div", null,

              h("div", { style: { display: "flex", flexDirection: "column", gap: 6 } },

      // ── Disclosure — progressive-disclosure section wrapper ────
      // 2026-06-10 — same pattern as today.html: deep context panels sit
      // behind a one-line header (collapsed by default, localStorage-
      // persisted, lazy-mounted) so the page reads numbers-first instead
      // of as a wall of stacked panels. Operator: "Insights is an
      // undervalued page and could use sprucing up so users can better
      // digest it."
      function Disclosure({ id, title, sub, defaultOpen = false, children }) {
        const storageKey = `tt-insights-disclose:${id}`;
        const [open, setOpen] = useState(() => {
          try {
            const v = window.localStorage.getItem(storageKey);
            return v == null ? defaultOpen : v === "1";
          } catch { return defaultOpen; }
        });
        const onToggle = (e) => {
          const isOpen = !!e.currentTarget.open;
          setOpen(isOpen);
          try { window.localStorage.setItem(storageKey, isOpen ? "1" : "0"); } catch {}
        };
        return h("details", { className: "ins-disclose", open, onToggle },
          h("summary", null,
            h("span", { className: "ins-disclose-title" }, title),
            sub && h("span", { className: "ins-disclose-sub" }, sub),
            h("span", { className: "ins-disclose-caret" }, "▼"),
          ),
          open ? h("div", { className: "ins-disclose-body" }, children) : null,
        );
