    <style>
      :root {
        --tt-bg-base: #0b0e11;
        --tt-bg-surface: rgba(255,255,255,0.025);
        --tt-bg-elev: rgba(255,255,255,0.04);
        --tt-border: rgba(255,255,255,0.06);
        --tt-border-hi: rgba(255,255,255,0.12);
        --tt-text: #e5e7eb;
        --tt-text-muted: #9ca3af;
        --tt-text-dim: #6b7280;
        --tt-text-faint: #4b5563;
        --tt-up: #22c55e;
        --tt-up-soft: #34d399;
        --tt-up-bg: rgba(34,197,94,0.10);
        --tt-dn: #f43f5e;
        --tt-dn-soft: #fb7185;
        --tt-dn-bg: rgba(244,63,94,0.10);
        --tt-accent: #38F2A1;
        --tt-accent-dim: rgba(56,242,161,0.14);
        --tt-violet: #a78bfa;
        --tt-violet-dim: rgba(167,139,250,0.14);
        --tt-cyan: #22d3ee;
        --tt-cyan-dim: rgba(34,211,238,0.10);
        --tt-font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --tt-font-mono: ui-monospace, "JetBrains Mono", SFMono-Regular, Menlo, monospace;
      }
      body {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        font-family: var(--tt-font);
        -webkit-font-smoothing: antialiased;
        margin: 0;
        min-height: 100vh;
      }
      main { max-width: 1600px; margin: 0 auto; padding: 18px 24px 96px; }
      @media (max-width: 720px) { main { padding: 14px 12px 96px; } }
      .tt-row { margin-bottom: 28px; }
      @media (max-width: 720px) { .tt-row { margin-bottom: 20px; } }
      .tt-card { background: var(--tt-bg-surface); border: 1px solid var(--tt-border); border-radius: 12px; }
      .tt-card-pad { padding: 16px 18px; }
      .tt-sec-title { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .tt-sec-h { font-size: 17px; font-weight: 800; letter-spacing: -0.01em; color: var(--tt-text); margin-bottom: 10px; }

      /* Top nav */
      nav.topnav {
        position: sticky; top: 0; z-index: 50;
        background: rgba(10,12,16,0.85);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
        border-bottom: 1px solid var(--tt-border);
      }
      .nav-row {
        max-width: 1600px; margin: 0 auto;
        padding: 12px 24px;
        display: flex; align-items: center; justify-content: space-between; gap: 12px;
      }
      .nav-brand { display: inline-flex; align-items: center; gap: 10px; text-decoration: none; color: var(--tt-text); font-weight: 700; }
      .nav-links { display: inline-flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .nav-link {
        font-size: 12.5px;
        color: var(--tt-text-muted);
        text-decoration: none;
        padding: 6px 12px;
        border-radius: 8px;
        transition: background 120ms ease, color 120ms ease;
      }
      .nav-link:hover { color: var(--tt-text); background: var(--tt-bg-surface); }
      .nav-link.active {
        color: var(--tt-accent);
        background: var(--tt-accent-dim);
      }
      .nav-link.learn { color: var(--tt-up-soft); }
      .nav-link.learn:hover { background: var(--tt-up-bg); }

      /* Hero */
      .port-hero {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: center;
        padding: 18px 22px;
        background: linear-gradient(180deg, var(--tt-bg-elev), var(--tt-bg-surface));
        border: 1px solid var(--tt-border);
        border-radius: 14px;
        margin-bottom: 24px;
      }
      .port-hero h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin: 0; }
      .port-hero .label { font-size: 11px; font-weight: 700; letter-spacing: 0.10em; color: var(--tt-text-dim); text-transform: uppercase; margin-bottom: 4px; }
      .port-hero .sub { font-size: 13px; color: var(--tt-text-muted); margin-top: 4px; max-width: 720px; }
      @media (max-width: 720px) {
        .port-hero { grid-template-columns: 1fr; }
        .port-hero h1 { font-size: 18px; }
      }

      /* Equity curve cards */
      .eq-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      @media (max-width: 1100px) { .eq-grid { grid-template-columns: 1fr; } }
      .eq-card {
        padding: 16px 18px;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 14px;
      }
      .eq-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
      .eq-title { font-size: 14px; font-weight: 800; color: var(--tt-text); }
      .eq-sub { font-size: 11px; color: var(--tt-text-dim); text-transform: uppercase; letter-spacing: 0.08em; }
      .eq-stats {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        margin: 14px 0;
      }
      @media (max-width: 640px) { .eq-stats { grid-template-columns: 1fr 1fr; } }
      .eq-stat {
        padding: 10px 12px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
      }
      .eq-stat-label { font-size: 10px; color: var(--tt-text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
      .eq-stat-value { font-size: 18px; font-weight: 700; font-family: var(--tt-font-mono); }
      .eq-stat-value.up { color: var(--tt-up-soft); }
      .eq-stat-value.dn { color: var(--tt-dn-soft); }
      .eq-chart {
        position: relative;
        height: 240px;
        background: rgba(255,255,255,0.015);
        border: 1px solid var(--tt-border);
        border-radius: 10px;
        overflow: hidden;
      }
      .eq-chart svg { display: block; width: 100%; height: 100%; }
      .eq-tooltip {
        position: absolute;
        pointer-events: none;
        padding: 6px 8px;
        background: rgba(10,12,16,0.96);
        border: 1px solid var(--tt-border-hi);
        border-radius: 6px;
        font-size: 10.5px;
        line-height: 1.4;
        font-family: var(--tt-font-mono);
        color: var(--tt-text);
        white-space: nowrap;
        z-index: 5;
      }

      /* Monthly P&L bars */
      .pl-row {
        display: grid;
        grid-template-columns: 80px 1fr 90px;
        align-items: center;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--tt-border);
      }
      .pl-row:last-child { border-bottom: 0; }
      .pl-month { font-size: 12px; font-weight: 600; color: var(--tt-text); font-family: var(--tt-font-mono); }
      .pl-bar-track {
        position: relative;
        height: 10px;
        background: var(--tt-bg-elev);
        border-radius: 6px;
        overflow: hidden;
      }
      .pl-bar {
        position: absolute;
        top: 0; bottom: 0;
        border-radius: 6px;
      }
      .pl-bar.up { background: var(--tt-up); }
      .pl-bar.dn { background: var(--tt-dn); }
      .pl-amt { text-align: right; font-size: 13px; font-weight: 700; font-family: var(--tt-font-mono); }
      .pl-amt.up { color: var(--tt-up-soft); }
      .pl-amt.dn { color: var(--tt-dn-soft); }

      /* Tables */
      .tbl { width: 100%; border-collapse: collapse; }
      .tbl th, .tbl td {
        padding: 10px 12px;
        text-align: left;
        font-size: 12.5px;
        border-bottom: 1px solid var(--tt-border);
      }
      .tbl th {
        font-size: 10.5px;
        color: var(--tt-text-dim);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        background: var(--tt-bg-elev);
      }
      .tbl td { font-family: var(--tt-font-mono); color: var(--tt-text); }
      .tbl td.sym { font-weight: 700; font-family: var(--tt-font); }
      .tbl td.up { color: var(--tt-up-soft); }
      .tbl td.dn { color: var(--tt-dn-soft); }
      .tbl tr:hover td { background: rgba(255,255,255,0.018); }
      .tbl .empty {
        text-align: center;
        color: var(--tt-text-faint);
        font-style: italic;
        font-family: var(--tt-font);
        padding: 28px 12px;
      }
      .tbl-scroll {
        max-height: 480px;
        overflow-y: auto;
        background: var(--tt-bg-surface);
        border: 1px solid var(--tt-border);
        border-radius: 12px;
      }
      .tbl-scroll::-webkit-scrollbar { width: 6px; }
      .tbl-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.10); border-radius: 6px; }

      /* Mode badge in the Open Positions table */
      .mode-pill {
        display: inline-flex;
        align-items: center;
        font-family: var(--tt-font);
        font-size: 10.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 2px 8px;
        border-radius: 999px;
        white-space: nowrap;
      }
      .mode-pill.mode-trader {
        background: rgba(52,211,153,0.10);
        color: var(--tt-up-soft);
        border: 1px solid rgba(52,211,153,0.25);
      }
      .mode-pill.mode-investor {
        background: rgba(167,139,250,0.10);
        color: var(--tt-violet);
        border: 1px solid rgba(167,139,250,0.25);
      }

      /* Aggregate Open P&L header row (Trader / Investor / Total) */
      .open-pl-row {
        display: inline-flex;
        gap: 18px;
        flex-wrap: wrap;
        font-size: 11.5px;
        color: var(--tt-text-muted);
        font-family: var(--tt-font-mono);
      }
      .open-pl-row strong { font-weight: 700; margin-left: 4px; }
      .open-pl-row strong.up { color: var(--tt-up-soft); }
      .open-pl-row strong.dn { color: var(--tt-dn-soft); }

      /* Split Open Positions header — section title + per-mode total */
      .op-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 18px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      .op-total {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        font-family: var(--tt-font-mono);
      }
      .op-total-l {
        font-size: 10.5px;
        color: var(--tt-text-dim);
        text-transform: uppercase;
        letter-spacing: 0.10em;
        margin-bottom: 2px;
      }
      .op-total strong.up { color: var(--tt-up-soft); }
      .op-total strong.dn { color: var(--tt-dn-soft); }

      /* Subtle accent on the left edge of each section's table */
      .tbl-scroll[data-accent="trader"] { border-left: 2px solid rgba(52,211,153,0.45); }
      .tbl-scroll[data-accent="investor"] { border-left: 2px solid rgba(167,139,250,0.45); }

      /* V15 P0.7.182 — Side-by-side Open Positions grid */
      .op-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 18px;
        margin-bottom: 28px;
      }
      @media (max-width: 1100px) {
        .op-grid { grid-template-columns: 1fr; gap: 24px; }
      }
      .op-pane { min-width: 0; }
      .op-pane .tbl-scroll { max-height: 460px; }

      /* Condensed table — tighter columns + smaller padding so two
         tables fit in the side-by-side grid without horizontal scroll. */
      .tbl--condensed th, .tbl--condensed td {
        padding: 8px 10px;
        font-size: 12px;
      }
      .tbl--condensed th { font-size: 10px; }
      .tbl--condensed .num { text-align: right; font-variant-numeric: tabular-nums; }
      .tbl--condensed td.sym { font-weight: 700; font-family: var(--tt-font); }

      .mode-toggle {
        display: inline-flex;
        gap: 4px;
        padding: 3px;
        background: var(--tt-bg-elev);
        border: 1px solid var(--tt-border);
        border-radius: 999px;
      }
      .mode-toggle button {
        font-family: var(--tt-font);
        font-size: 11.5px;
        font-weight: 600;
        padding: 5px 12px;
        background: transparent;
        color: var(--tt-text-muted);
        border: 0;
        border-radius: 999px;
        cursor: pointer;
        transition: background 120ms ease, color 120ms ease;
      }
      .mode-toggle button.active {
        background: var(--tt-bg-base);
        color: var(--tt-text);
        box-shadow: 0 0 0 1px var(--tt-border-hi);
      }

      /* Loading bar + skeletons */
      .tt-loadbar {
        position: fixed; top: 0; left: 0; right: 0;
        height: 2px;
        background: rgba(56,242,161,0.12);
        z-index: 9000;
        overflow: hidden;
      }
      .tt-loadbar::after {
        content: "";
        position: absolute;
        top: 0; bottom: 0;
        width: 30%;
        background: linear-gradient(90deg, transparent, var(--tt-accent), transparent);
        animation: tt-loadbar 1.4s ease-in-out infinite;
      }
      @keyframes tt-loadbar { 0% { left: -30%; } 100% { left: 100%; } }
      .sk {
        background: linear-gradient(90deg, var(--tt-bg-surface), var(--tt-bg-elev), var(--tt-bg-surface));
        background-size: 200% 100%;
        animation: sk 1.6s ease-in-out infinite;
        border-radius: 6px;
      }
      @keyframes sk { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
