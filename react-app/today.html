  <body>

    <div id="global-nav-root"></div>
    <script src="shared-nav.js?v=20260611a"></script>

    <!-- Explicit mount target for tt-activity-strip.js. Was previously
         auto-mounted via document.querySelector("nav.topnav") +
         insertAdjacentElement, which worked on /today but was unreliable
         on /active-trader and /investor (mount target found inconsistently
         depending on script execution timing). Explicit container makes
         the mount deterministic across all three pages. -->
    <div data-tt-activity-strip></div>

    <div id="root">
      <main>
        <div class="tt-card tt-card-pad" style="text-align:center;color:var(--tt-text-muted)">Loading today's ingest…</div>
      </main>
    </div>

    <script type="text/babel">
      const { useState, useEffect, useMemo, useCallback, useRef } = React;
      const h = React.createElement;

      // ── API base ───────────────────────────────────────────────
      // Same pattern as every other dashboard (daily-brief.html,
      // index-react.html, investor-dashboard.html, etc.): empty string =
      // same-origin, proxied by Pages Function. Crucial because
      // CF Access JWT cookies are scoped to timed-trading.com — calling
      // workers.dev cross-domain would drop the auth cookie and return
      // 401, kicking the user to the login screen.
      const API_BASE = "";

      // ── TT Selected universe (mirror of index-react.source.html GROUPS
      //   at line 2965). The static UPTICKS list is hard-coded; GRNY/GRNI/
      //   GRNJ are fetched from /timed/etf/groups. We expose
      //   window.isTickerTTSelected so ViewportCard renders the gold dot
      //   on universe members, matching AT.
      const TT_GROUPS = {
        UPTICKS: new Set([
          "RDDT","AMZN","BABA","TSLA","KO","WMT","ETHA","BRK-B","MTB",
          "AMGN","GILD","CSX","GEV","HII","JCI","PH","PWR","TT",
          "CLS","FSLR","PANW","CRS","VST","BG","MRK","QXO","AXP",
        ]),
        GRNI: new Set(),
        GRNJ: new Set(),
        GRNY: new Set(),
      };
      function _norm(s) {
        let v = String(s || "").trim().toUpperCase();
        if (v === "BRK.B") v = "BRK-B";
        return v;
      }
      window.isTickerTTSelected = function (sym) {
        const T = _norm(sym);
        return (
          TT_GROUPS.UPTICKS.has(T) ||
          TT_GROUPS.GRNI.has(T) ||
          TT_GROUPS.GRNJ.has(T) ||
          TT_GROUPS.GRNY.has(T)
        );
      };
      (async () => {
        try {
          const r = await fetch(`${API_BASE}/timed/etf/groups`, { cache: "no-store" });
          if (!r.ok) return;
          const j = await r.json();
          if (j?.ok && j.groups) {
            for (const [etf, tickers] of Object.entries(j.groups)) {
              if (TT_GROUPS[etf] !== undefined && Array.isArray(tickers)) {
                TT_GROUPS[etf] = new Set(tickers.map((t) => _norm(t)));
              }
            }
          }
        } catch (_) { /* non-fatal — UPTICKS still works */ }
      })();

      // ── Helpers ────────────────────────────────────────────────
      function fmtUsd(v, d=2) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        const n = Number(v);
        return n.toLocaleString("en-US", { style: "currency", currency: "USD", minimumFractionDigits: d, maximumFractionDigits: d });
      }
      function fmtPct(v, d=2) {
        if (v == null || !Number.isFinite(Number(v))) return "—";
        const n = Number(v);
        return (n >= 0 ? "+" : "") + n.toFixed(d) + "%";
      }
      function getDailyChange(t) {
        if (window.TimedPriceUtils?.getDailyChange) return window.TimedPriceUtils.getDailyChange(t);
        return { dayPct: t?.day_change_pct, dayChg: t?.day_change };
      }
      function safeArr(v) { return Array.isArray(v) ? v : []; }
      function isTickerScoredInUniverse(data, sym) {
        const key = String(sym || "").toUpperCase();
        const row = data?.[key];
        if (!row || typeof row !== "object") return false;
        return Number.isFinite(Number(row.score))
          || !!row.state
          || !!row.kanban_stage
          || Number.isFinite(Number(row.htf_score));
      }
      function buildEarningsMap(events) {
        const map = {};
        const list = safeArr(events);
        if (!list.length) return map;
        let todayNy = "";
        try {
          todayNy = new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
        } catch (_) { return map; }
        const todayParts = todayNy.split("-").map(Number);
        if (todayParts.length < 3) return map;
        const todayDayNum = todayParts[0] * 10000 + todayParts[1] * 100 + todayParts[2];
        for (const e of list) {
          const sym = String(e?.symbol || "").toUpperCase();
          if (!sym || !e?.date) continue;
          const eParts = String(e.date).split("-").map(Number);
          if (eParts.length < 3) continue;
          const eDayNum = eParts[0] * 10000 + eParts[1] * 100 + eParts[2];
          const calDays = eDayNum - todayDayNum;
          if (!map[sym] || Math.abs(calDays) < Math.abs(map[sym]._daysAway)) {
            map[sym] = { ...e, _daysAway: calDays };
          }
        }
        return map;
      }
      function nyFmtDate() {
        try {
          return new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric", year: "numeric", timeZone: "America/New_York" });
        } catch { return new Date().toDateString(); }
      }
      function nyEtDateKey() {
        try {
          return new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
        } catch { return ""; }
      }
      function nyEtMinutes() {
        try {
          const parts = new Intl.DateTimeFormat("en-US", {
            timeZone: "America/New_York", hour: "numeric", minute: "numeric", hour12: false,
          }).formatToParts(new Date());
          const hh = Number(parts.find((p) => p.type === "hour")?.value || 0);
          const mm = Number(parts.find((p) => p.type === "minute")?.value || 0);
          return hh * 60 + mm;
        } catch { return 0; }
      }
      /** Match worker/daily-brief.js pickBriefSlotForSession — never surface yesterday's brief. */
      function pickTodayBriefSlot(briefWrap) {
        if (!briefWrap || typeof briefWrap !== "object") return null;
        const today = nyEtDateKey();
        const isToday = (slot) => slot && String(slot.date || "") === today;
        const morning = isToday(briefWrap.morning) ? briefWrap.morning : null;
        const evening = isToday(briefWrap.evening) ? briefWrap.evening : null;
        const etMin = nyEtMinutes();
        if (etMin < 9 * 60) return null;
        if (etMin >= 16 * 60) {
          if (evening) return { slot: evening, type: "evening" };
          if (morning) return { slot: morning, type: "morning" };
          return null;
        }
        if (morning) return { slot: morning, type: "morning" };
        return null;
      }
      function briefReadLabel(briefSlot) {
        return briefSlot === "evening" ? "EVENING READ" : "MORNING READ";
      }
      function isNyRegularMarketOpen() {
        try {
          const f = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", hour12: false, weekday: "short", hour: "2-digit", minute: "2-digit" });
          const parts = f.formatToParts(new Date());
          const wd = parts.find(p => p.type === "weekday")?.value;
          if (wd === "Sat" || wd === "Sun") return false;
          const hh = Number(parts.find(p => p.type === "hour")?.value || 0);
          const mm = Number(parts.find(p => p.type === "minute")?.value || 0);
          const min = hh * 60 + mm;
          return min >= (9 * 60 + 30) && min < (16 * 60);
        } catch { return false; }
      }

      /** Calendar-aware session state — prefers /timed/market-calendar (holidays + early close). */
      const US_MARKET_HOLIDAY_NAMES = {
        "2026-06-19": "Juneteenth", "2026-01-01": "New Year's Day", "2026-01-19": "Martin Luther King Jr. Day",
        "2026-02-16": "Presidents' Day", "2026-04-03": "Good Friday", "2026-05-25": "Memorial Day",
        "2026-07-03": "Independence Day", "2026-09-07": "Labor Day", "2026-11-26": "Thanksgiving", "2026-12-25": "Christmas",
      };
      function holidayNameForToday(cal) {
        if (cal?.equity?.holiday_name_today) return cal.equity.holiday_name_today;
        if (!cal?.equity?.is_holiday_today) return null;
        try {
          const ds = new Date().toLocaleDateString("en-CA", { timeZone: "America/New_York" });
          return US_MARKET_HOLIDAY_NAMES[ds] || null;
        } catch (_) { return null; }
      }
      function resolveMarketSession(cal) {
        const equity = cal?.equity || {};
        const sess = cal?.session || {};
        const hasCal = cal?.ok === true;
        const isHoliday = equity.is_holiday_today === true;
        const holidayName = holidayNameForToday(cal);
        const isEarlyClose = equity.is_early_close_today === true;
        const sessionType = String(sess.session_type || "").toUpperCase();
        let isWeekend = false;
        try {
          const wd = new Intl.DateTimeFormat("en-US", { timeZone: "America/New_York", weekday: "short" }).format(new Date());
          isWeekend = wd.startsWith("Sat") || wd.startsWith("Sun");
        } catch (_) {}
        const rthOpen = hasCal ? sess.is_rth === true : isNyRegularMarketOpen();
        const operatingHours = hasCal ? sess.is_within_operating_hours === true : !isWeekend;
        // Wait for calendar before showing intraday sections — client time-only
        // fallback false-opens on holidays (e.g. Juneteenth weekday 9:30–4).
        const showDayTradeSections = hasCal && sess.is_rth === true && !isHoliday && !isWeekend;
        return {
          rthOpen,
          operatingHours,
          isHoliday,
          holidayName,
          isEarlyClose,
          isWeekend,
          sessionType,
          showDayTradeSections,
        };
      }

      // ── Fetch helpers ──────────────────────────────────────────
      // V15 P0.7.181 — All four fetchers route through TTFetchCache
      // (sessionStorage-backed stale-while-revalidate). The page now
      // renders cached data immediately on second + subsequent loads
      // and revalidates in the background. ttlMs = freshness budget,
      // maxAgeMs = hard expiry (never serve older). Scoring runs
      // every 5 min so 90s ttl ensures we re-fetch once per render
      // when stale, but cached responses paint instantly on nav.
      const CACHE = (typeof window !== "undefined" && window.TTFetchCache) || null;

      async function fetchJsonRetry(url, opts = {}, retries = 3) {
        const fetchOpts = {
          credentials: "include",
          cache: "no-store",
          ...(opts.fetchOpts || {}),
        };
        const delays = [0, 2000, 5000];
        let lastRes = null;
        for (let i = 0; i < retries; i++) {
          if (delays[i] > 0) await new Promise((r) => setTimeout(r, delays[i]));
          try {
            const r = await fetch(url, fetchOpts);
            lastRes = r;
            if (r.ok) return r.json();
            if (r.status >= 500 || r.status === 429 || r.status === 408) continue;
            return null;
          } catch (_) {
            if (i === retries - 1) return null;
          }
        }
        return null;
      }

      async function fetchAll() {
        if (CACHE) {
          return CACHE.get(`${API_BASE}/timed/all`, {
            ttlMs: 90 * 1000,
            maxAgeMs: 30 * 60 * 1000,
            fetchOpts: { credentials: "include", cache: "no-store" },
          });
        }
        const r = await fetch(`${API_BASE}/timed/all?_t=${Date.now()}`, {
          credentials: "include", cache: "no-store",
        });
        return r.ok ? r.json() : { ok: false };
      }
      async function fetchTickerUniverse() {
        if (CACHE) {
          const j = await CACHE.get(`${API_BASE}/timed/tickers`, {
            ttlMs: 5 * 60 * 1000,
            maxAgeMs: 6 * 60 * 60 * 1000,
            fetchOpts: { credentials: "include", cache: "no-store" },
          });
          return Array.isArray(j?.tickers) ? j.tickers : null;
        }
        const r = await fetch(`${API_BASE}/timed/tickers`, { credentials: "include" });
        if (!r.ok) return null;
        const j = await r.json();
        return Array.isArray(j?.tickers) ? j.tickers : null;
      }
      async function fetchBrief() {
        // Brief must never sit in a 12h client cache — a failed 9 AM cron
        // (or 3 AM KV cleanup before regen) would show empty all morning.
        if (CACHE) {
          return CACHE.get(`${API_BASE}/timed/daily-brief`, {
            ttlMs: 2 * 60 * 1000,
            maxAgeMs: 5 * 60 * 1000,
            fetchOpts: { credentials: "include", cache: "no-store" },
          });
        }
        const r = await fetch(`${API_BASE}/timed/daily-brief`, { credentials: "include", cache: "no-store" });
        return r.ok ? r.json() : { ok: false };
      }
      async function fetchEarnings() {
        if (CACHE) {
          return CACHE.get(`${API_BASE}/timed/earnings/upcoming`, {
            ttlMs: 30 * 60 * 1000,
            maxAgeMs: 24 * 60 * 60 * 1000,
            fetchOpts: { credentials: "include" },
          });
        }
        const r = await fetch(`${API_BASE}/timed/earnings/upcoming`, { credentials: "include" });
        return r.ok ? r.json() : { ok: false };
      }
      async function fetchCal() {
        if (CACHE) {
          return CACHE.get(`${API_BASE}/timed/market-calendar`, {
            ttlMs: 60 * 60 * 1000,
            maxAgeMs: 24 * 60 * 60 * 1000,
            fetchOpts: { credentials: "include" },
          });
        }
        const r = await fetch(`${API_BASE}/timed/market-calendar`, { credentials: "include" });
        return r.ok ? r.json() : { ok: false };
      }

      // ── Session pill ───────────────────────────────────────────
      function SessionPill({ cal }) {
        const session = resolveMarketSession(cal);
        let label, cls;
        if (session.rthOpen) {
          label = session.isEarlyClose ? "Market open · Early close 1 PM ET" : "Market open · RTH";
          cls = "up";
        } else if (session.isHoliday) {
          label = session.holidayName
            ? `${session.holidayName} · Markets closed`
            : "Holiday · Market closed";
          cls = "";
        } else if (session.isWeekend) {
          label = "Weekend · Market closed";
          cls = "";
        } else if (session.sessionType === "PM") {
          label = "Pre-market";
          cls = "accent";
        } else if (session.sessionType === "AH") {
          label = "After-hours";
          cls = "accent";
        } else {
          label = "Market closed";
          cls = "";
        }
        return h("span", { className: `tt-pill ${cls}` },
          h("span", { className: "dot" }),
          label,
        );
      }

      // ── Tier-1 regime one-liner ─────────────────────────────────
      // 2026-06-10 — UI refresh. The 3-tier morning read opens with a
      // single session+regime line under the greeting: daily regime ·
      // HMM latent state · breadth · SPY · VIX. Replaces the old
      // QuickGlance card (its tiles folded into this line; the top
      // mover lives in the Movers strip).
      const REGIME_TONE = {
        RISK_ON: "var(--tt-up-soft)", BULL: "var(--tt-up-soft)", BULL_TREND: "var(--tt-up-soft)",
        STRONG_BULL: "var(--tt-up-soft)", EARLY_BULL: "var(--tt-up-soft)", LATE_BULL: "var(--tt-up-soft)",
        NEUTRAL: "var(--tt-accent)", CHOP: "var(--tt-accent)",
        RISK_OFF: "var(--tt-dn-soft)", BEAR: "var(--tt-dn-soft)", BEAR_TREND: "var(--tt-dn-soft)",
        STRONG_BEAR: "var(--tt-dn-soft)", EARLY_BEAR: "var(--tt-dn-soft)", LATE_BEAR: "var(--tt-dn-soft)",
      };
      function computeRegimeRead(brief, data) {
        const info = brief?.infographic || {};
        const headline = info?.headline && typeof info.headline === "object" ? info.headline : null;
        const briefRegime = headline?.regime || info?.regime || null;
        const breadth = headline?.breadth || info?.breadth || null;
        const breadthGreen = Number(breadth?.green);
        const breadthTotal = Number(breadth?.total);
        const breadthPct = (Number.isFinite(breadthGreen) && Number.isFinite(breadthTotal) && breadthTotal > 0)
          ? (breadthGreen / breadthTotal) * 100 : null;
        let latent = null;
        if (data) {
          for (const t of Object.values(data)) {
            if (t?.latent_regime?.state) { latent = t.latent_regime; break; }
          }
        }
        let regime = briefRegime;
        if (!regime) {
          const latentState = String(latent?.state || "").toUpperCase();
          if (latentState === "BEAR_TREND" || latentState === "BULL_TREND") regime = latentState;
          else if (Number.isFinite(breadthPct)) regime = breadthPct >= 70 ? "RISK_ON" : breadthPct <= 30 ? "RISK_OFF" : "CHOP";
          else regime = latentState || null;
        }
        return { regime, latent, breadthPct, breadthGreen, breadthTotal };
      }
      function RegimeLine({ brief, data }) {
        const read = useMemo(() => computeRegimeRead(brief, data), [brief, data]);
        const quote = (sym) => {
          const t = data?.[sym];
          if (!t) return null;
          const dc = (typeof getDailyChange === "function") ? getDailyChange(t) : null;
          const pct = Number(dc?.dayPct);
          return Number.isFinite(pct) ? pct : null;
        };
        const spyPct = quote("SPY");
        const vixT = data?.VIX || data?.VIXY || data?.["VX1!"];
        const vixPx = vixT ? Number(vixT._live_price ?? vixT.price ?? vixT.close) : null;
        const { regime, latent, breadthPct } = read;
        if (!regime && !latent && breadthPct == null && spyPct == null) return null;
        const tone = REGIME_TONE[String(regime || "").toUpperCase()] || "var(--tt-text-muted)";
        const latentTone = REGIME_TONE[String(latent?.state || "").toUpperCase()] || "var(--tt-text-muted)";
        const seg = (label, value, color) => h("span", { className: "seg" },
          label,
          h("b", { style: color ? { color } : null }, value),
        );
        const parts = [];
        if (regime) parts.push(seg("Regime", String(regime).replace(/_/g, " "), tone));
        if (latent?.state) parts.push(seg("HMM", String(latent.state).replace(/_/g, " "), latentTone));
        if (breadthPct != null) parts.push(seg("Breadth", `${breadthPct.toFixed(0)}% green`, breadthPct >= 55 ? "var(--tt-up-soft)" : breadthPct <= 45 ? "var(--tt-dn-soft)" : "var(--tt-accent)"));
        if (spyPct != null) parts.push(seg("SPY", `${spyPct >= 0 ? "+" : ""}${spyPct.toFixed(2)}%`, spyPct >= 0 ? "var(--tt-up-soft)" : "var(--tt-dn-soft)"));
        if (Number.isFinite(vixPx) && vixPx > 0) parts.push(seg("VIX", vixPx.toFixed(2), null));
        const out = [];
        parts.forEach((p, i) => {
          if (i > 0) out.push(h("span", { key: `sep-${i}`, className: "sep" }, "·"));
          out.push(h(React.Fragment, { key: `seg-${i}` }, p));
        });
        return h("div", { className: "tt-regime-line" }, out);
      }

      // ── Status header ──────────────────────────────────────────
      function StatusHeader({ cal, briefDate, brief, briefSlot, data }) {
        const etMin = nyEtMinutes();
        const etHour = Math.floor(etMin / 60);
        const greeting = etHour < 5 ? "Up early" : etHour < 12 ? "Good morning" : etHour < 17 ? "Good afternoon" : "Good evening";
        return h("section", { className: "tt-status tt-row" },
          h("div", null,
            h("div", { className: "label" }, "TODAY"),
            h("div", { className: "greeting" }, greeting + " · Here's the read"),
            h("div", { className: "date" }, nyFmtDate()),
          ),
          h("div", { className: "session" },
            h("div", { style: { display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 8 } },
              h("div", { style: { display: "inline-flex", gap: 8, alignItems: "center", flexWrap: "wrap" } },
                h(SessionPill, { cal }),
                briefDate && h("span", { className: "tt-pill" },
                  h("span", { className: "dot", style: { background: "var(--tt-accent)" } }),
                  "Brief: " + briefDate,
                ),
              ),
              h("a", {
                href: "/daily-brief.html#archive",
                className: "brief-archive-link",
                title: "Open the daily brief archive",
              },
                "Browse past briefs",
                h("svg", { width: 12, height: 12, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
                  h("line", { x1: 5, y1: 12, x2: 19, y2: 12 }), h("polyline", { points: "12 5 19 12 12 19" }),
                ),
              ),
            ),
          ),
          // Tier 1 of the morning read: one line that frames the session.
          h(RegimeLine, { brief, data }),
        );
      }

      // ── Daily Brief preview ────────────────────────────────────
      function BriefPreview({ brief, briefSlot }) {
        // 2026-05-29 — re-render when OpenPositionsPreview publishes a
        // fresh trader-open count via window.__liveTraderOpenCount.
        // Brief is generated once at 4 PM ET so its built-in count is
        // stale by morning when new entries fire.
        const [_liveTick, _setLiveTick] = useState(0);
        const [wideHero, setWideHero] = useState(() => (
          typeof window !== "undefined" && window.matchMedia("(min-width: 981px)").matches
        ));
        useEffect(() => {
          const onUpdate = () => _setLiveTick(t => t + 1);
          window.addEventListener("tt:live-counts-updated", onUpdate);
          return () => window.removeEventListener("tt:live-counts-updated", onUpdate);
        }, []);
        useEffect(() => {
          const mq = window.matchMedia("(min-width: 981px)");
          const sync = () => setWideHero(mq.matches);
          sync();
          mq.addEventListener("change", sync);
          return () => mq.removeEventListener("change", sync);
        }, []);

        const info = brief?.infographic || {};
        const top3 = Array.isArray(info.topThree) ? info.topThree : [];

        // FIX 2026-05-16: infographic.headline can be a STRING (legacy) or
        // an OBJECT with shape {date, type, regime, vix, breadth, openTrades}
        // (current). Rendering an object directly crashes React (#31:
        // 'Objects are not valid as a React child'). Convert to a friendly
        // single-line summary when it's an object; pass through if string.
        const headlineRaw = info.headline;
        const headline = (() => {
          if (typeof headlineRaw === "string") return headlineRaw;
          if (!headlineRaw || typeof headlineRaw !== "object") return "";
          // Build a brief summary string from known fields. Guard each
          // line so missing/zero values don't produce noisy "VIX 0.00"
          // or "Breadth 0/0 sectors green" placeholders (the brief
          // endpoint returns null when the field hasn't been computed).
          const parts = [];
          if (headlineRaw.regime) parts.push(`Regime: ${String(headlineRaw.regime).replace(/_/g, " ")}`);
          const vixNum = Number(headlineRaw.vix);
          if (Number.isFinite(vixNum) && vixNum > 0) parts.push(`VIX ${vixNum.toFixed(2)}`);
          if (headlineRaw.breadth && typeof headlineRaw.breadth === "object") {
            const g = Number(headlineRaw.breadth.green);
            const t = Number(headlineRaw.breadth.total);
            if (Number.isFinite(g) && Number.isFinite(t) && t > 0) parts.push(`Breadth ${g}/${t} sectors green`);
          }
          // 2026-05-29 — prefer LIVE trader-open count over the brief's
          // static snapshot. The brief is generated once at 4 PM ET so its
          // openTrades is stale by morning when new entries have fired.
          // window.__liveTraderOpenCount is set by OpenPositionsPreview
          // when it fetches /timed/ledger/trades?mode=trader&status=open.
          const liveOpenN = Number(window.__liveTraderOpenCount);
          const briefOpenN = Number(headlineRaw.openTrades);
          const openN = Number.isFinite(liveOpenN) && liveOpenN > 0 ? liveOpenN : briefOpenN;
          if (Number.isFinite(openN) && openN > 0) parts.push(`${openN} open trades`);
          return parts.join(" \u00b7 ");
        })();

        // closingLine should always be a string, but defensively coerce.
        const closingRaw = info.closingLine;
        const closing = typeof closingRaw === "string" ? closingRaw : (closingRaw ? String(closingRaw) : "");

        // Build a readable item text from the worker's extractTopThree
        // output. That helper returns `{ n, label, body }` per line (label
        // is the bit before the first colon, body is the rest). Prior
        // version preferred `item.label` which threw away the body — on
        // mobile this surfaced as either just the label or, worse, a
        // mid-word tail when topThree extraction failed and the closing
        // line fell through to a wrapped continuation. Mirror daily-brief
        // .html: `Label: body` when both exist, else whichever exists,
        // else string-coerce. NEVER JSON.stringify a brief item.
        const itemText = (item) => {
          if (typeof item === "string") return item;
          if (!item || typeof item !== "object") return "";
          const body = typeof item.body === "string" ? item.body.trim() : "";
          const label = typeof item.label === "string" ? item.label.trim() : "";
          const fallback = typeof item.text === "string" ? item.text
            : typeof item.summary === "string" ? item.summary
            : "";
          if (label && body) return `**${label}:** ${body}`;
          if (body) return body;
          if (label) return label;
          return fallback;
        };

        // Server-extracted Market Context blurb (worker/daily-brief.js extractBriefLead).
        const leadSummary = typeof info.leadSummary === "string" ? info.leadSummary.trim() : "";

        // Client fallback when infographic lacks leadSummary (older briefs).
        const extractMarketContextBlurb = (content, maxLen = 1400) => {
          if (!content || typeof content !== "string") return "";
          const lines = content.split(/\r?\n/);
          let afterTodaysThree = false;
          let capturing = false;
          const parts = [];
          for (const raw of lines) {
            const line = raw.trim();
            if (/^#{1,6}\s/.test(line)) {
              const heading = line.replace(/^#{1,6}\s+/, "").replace(/\*\*/g, "").trim();
              if (/today'?s three/i.test(heading)) {
                afterTodaysThree = true;
                capturing = false;
                parts.length = 0;
                continue;
              }
              if (capturing && parts.length > 0) break;
              if (afterTodaysThree || /market\s*context/i.test(heading)) {
                capturing = true;
                parts.length = 0;
                afterTodaysThree = true;
                continue;
              }
              if (!capturing && parts.length === 0) {
                capturing = true;
                continue;
              }
              continue;
            }
            if (/^\d+\.\s/.test(line) && !capturing) {
              afterTodaysThree = true;
              continue;
            }
            if (!capturing) continue;
            if (!line) continue;
            if (/^[-*+]\s/.test(line) || /^\d+\.\s/.test(line)) break;
            if (parts.length > 0 && /^[a-z;,]/.test(line)) continue;
            const cleaned = line.replace(/^\*+|\*+$/g, "").replace(/\*\*/g, "").trim();
            if (cleaned.length < 12) continue;
            parts.push(cleaned);
            if (parts.join(" ").length >= maxLen) break;
          }
          const text = parts.join(" ").replace(/\s+/g, " ").trim();
          return text.length >= 40 ? text.slice(0, maxLen) : "";
        };

        let fallbackSummary = leadSummary;
        if (typeof brief?.content === "string") {
          const fromContent = extractMarketContextBlurb(brief.content);
          if (fromContent.length > (fallbackSummary?.length || 0)) {
            fallbackSummary = fromContent;
          }
        }

        const _plain = (s) => {
          const t = String(s || "")
            .replace(/\*\*/g, "")
            .replace(/^[^:]{0,48}:\s*/, "")
            .replace(/^[;:,.\s]+/, "")
            .replace(/\s+/g, " ")
            .trim();
          if (!t) return t;
          if (/^[A-Z0-9"('`]/.test(t)) return t;
          return t.charAt(0).toUpperCase() + t.slice(1);
        };
        const summaryCap = wideHero ? 1400 : 380;
        const punchCap = wideHero ? 360 : 220;
        const _cap = (s, max = summaryCap) => (s.length > max ? s.slice(0, max - 1).trimEnd() + "…" : s);
        const _usableClosing = (() => {
          const c = _plain(closing);
          return c.length >= 24 && !/^[;,]/.test(c) ? c : "";
        })();

        // fallbackSummary already prefers the longer client-parsed blurb over
        // the truncated server leadSummary — do not || back to leadSummary.
        const primaryLead = _plain(fallbackSummary);
        // Primary digest: show the full Market Context blurb when available.
        const summarySentences = (() => {
          if (primaryLead.length >= 40) return [_cap(primaryLead, summaryCap)];
          const cand = [];
          for (const it of top3.slice(0, wideHero ? 3 : 2)) {
            const b = _plain(itemText(it));
            if (b.length >= 16) cand.push(b);
          }
          if (cand.length === 0 && fallbackSummary) cand.push(_plain(fallbackSummary));
          if (cand.length === 0 && _usableClosing) cand.push(_usableClosing);
          const out = [];
          for (const c of cand) {
            if (!out.some((o) => o.slice(0, 48) === c.slice(0, 48))) out.push(_cap(c, punchCap));
            if (out.length === (wideHero ? 3 : 2)) break;
          }
          return out;
        })();
        const summaryText = summarySentences.join(". ").replace(/\.\s*\./g, ".");
        const showTopThree = wideHero
          ? (top3.length > 0 && primaryLead.length < 200)
          : top3.length >= 3;
        const showClosingItalic = _usableClosing
          && !summarySentences.some((s) => s.slice(0, 48) === _usableClosing.slice(0, 48))
          && top3.length > 0
          && primaryLead.length < 40;

        const isEvening = briefSlot === "evening";
        const readLabel = briefReadLabel(briefSlot);

        return h("section", { className: "tt-card tt-card-pad tt-row brief-preview-card" },
          h("div", { className: "tt-sec-title" }, `DAILY BRIEF — ${readLabel}`),
          h("div", { className: "tt-sec-h" }, isEvening ? "How the session played out" : "What the model is watching today"),
          summaryText && h("p", { className: "brief-summary" }, summaryText),
          headline && h("p", { className: "brief-head", style: { fontSize: 12, color: "var(--tt-text-muted)", marginBottom: showTopThree ? 10 : 0 } }, headline),
          showTopThree && h("div", { className: "brief-three" },
            top3.slice(0, 3).map((item, i) => {
              const text = itemText(item);
              if (!text) return null;
              return h("div", { key: i, className: "item" },
                h("span", { className: "num" }, String(i + 1)),
                h("span", { dangerouslySetInnerHTML: { __html: marked.parseInline(text) } }),
              );
            }),
          ),
          showClosingItalic && h("p", { style: { fontSize: 13, color: "var(--tt-text-muted)", fontStyle: "italic", marginBottom: 14 } }, _usableClosing),
          h("div", { className: "brief-actions", style: { display: "flex", gap: 8, flexWrap: "wrap" } },
            h("a", { href: "/daily-brief.html", className: "brief-link" },
              "Read full brief",
              h("svg", { width: 14, height: 14, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2.5, strokeLinecap: "round", strokeLinejoin: "round" },
                h("line", { x1: 5, y1: 12, x2: 19, y2: 12 }), h("polyline", { points: "12 5 19 12 12 19" }),
              ),
            ),
            h("a", { href: "/learn.html", className: "brief-link" }, "How to use the brief"),
          ),
        );
      }

      // ── Index card ─────────────────────────────────────────────
      // ── MarketPulseTile — production ds-tickercard layout (logo +
      //    symbol + dot + big price + change + 1H sparkline). Matches
      //    AT's Market Pulse row exactly.
      function MarketPulseTile({ sym, t, onSelectTicker }) {
        const SYM = String(sym || "").toUpperCase();
        // /timed/all values lack a 'ticker' field — synthesise it from
        // the key so getDailyChange + DS helpers work.
        const tx = t && typeof t === "object"
          ? (t.ticker ? t : { ticker: SYM, ...t })
          : { ticker: SYM };
        const dc = getDailyChange(tx);
        const dayPct = Number.isFinite(dc?.dayPct) ? Number(dc.dayPct) : null;
        const dayChg = Number.isFinite(dc?.dayChg) ? Number(dc.dayChg) : null;
        // Headline = session-aware RTH price (getHeadlinePrice). EXT line below.
        const price = Number(window.TimedPriceUtils?.getHeadlinePrice?.(tx) ?? tx.price);
        const dir = dayPct == null || Math.abs(dayPct) < 0.05 ? "flat" : dayPct > 0 ? "up" : "dn";

        // Daily sparkline (uses the same cache /active-trader and /investor use).
        const sparkRaw = (window._dsSparklineCache && window._dsSparklineCache[SYM]) || null;
        const sparkSrc = sparkClosesFromCacheEntry(sparkRaw);
        useEffect(() => {
          if (typeof window._dsEnsureSparkline === "function") window._dsEnsureSparkline(SYM);
        }, [SYM]);
        const sparkPoints = (sparkSrc && sparkSrc.length >= 2)
          ? sparkSrc
          : [price || 0, price || 0];
        const sparkSvg = (window.DS && Number.isFinite(price) && price > 0)
          ? window.DS.sparklineSvg(sparkPoints, { width: 280, height: 44, direction: dir, strokeWidth: 1.4 })
          : "";

        const onClick = (e) => {
          e.preventDefault();
          if (typeof onSelectTicker === "function") {
            onSelectTicker(SYM);
            return;
          }
          window.location.href = `/index-react.html?ticker=${encodeURIComponent(SYM)}`;
        };

        return h("button", {
          onClick,
          className: "ds-tickercard",
          style: { textAlign: "left", padding: "var(--ds-space-3)" },
          title: `Open ${SYM} in Active Trader detail`,
        },
          h("div", { className: "ds-tickercard__head" },
            h("div", {
              className: "ds-tickercard__logo",
              ref: (el) => {
                if (el && !el.dataset.dsInit && window.DS) {
                  el.dataset.dsInit = "1";
                  try { el.replaceWith(window.DS.tickerLogo(SYM, { size: 22 })); } catch (_) {}
                }
              },
              style: { width: 22, height: 22 },
            }, SYM.slice(0, 2)),
            h("span", { className: "ds-tickercard__symbol", style: { fontSize: 13 } }, SYM),
            dayPct != null && h("span", {
              style: {
                marginLeft: 4,
                width: 6, height: 6, borderRadius: "50%",
                background: dir === "up" ? "var(--ds-up)" : dir === "dn" ? "var(--ds-dn)" : "var(--ds-text-muted)",
                opacity: 0.7,
              },
            }),
          ),
          h("div", { className: "ds-tickercard__price", style: { fontSize: 18 } },
            Number.isFinite(price) ? `$${price.toFixed(2)}` : "—",
          ),
          dayPct != null && h("div", {
            className: `ds-tickercard__change ds-tickercard__change--${dir}`,
            style: { fontSize: 12 },
          },
            dir === "up" ? "▲" : dir === "dn" ? "▼" : "◆",
            " ",
            `${dayPct >= 0 ? "+" : ""}${dayPct.toFixed(2)}%`,
            Number.isFinite(dayChg) && Math.abs(dayChg) > 0.001 && h("span", {
              style: { marginLeft: 4, opacity: 0.7, fontSize: 10 },
            }, ` (${dayChg >= 0 ? "+" : ""}$${Math.abs(dayChg).toFixed(2)})`),
          ),
          // Bug 4 — EXT price/change on ticker cards. Only renders outside
          // RTH for non-crypto tickers with a finite move >= 0.05 %.
          // Helper getExtChange() in shared-price-utils.js owns the rules.
          (() => {
            const ext = window.TimedPriceUtils?.getExtChange?.(tx);
            if (!ext) return null;
            const extDir = ext.pct >= 0 ? "up" : "dn";
            return h("div", {
              className: `ds-tickercard__change ds-tickercard__change--${extDir}`,
              style: { fontSize: 10.5, opacity: 0.88, marginTop: 2 },
            },
              h("span", {
                style: {
                  fontSize: 8.5, fontWeight: 700, marginRight: 4,
                  padding: "0 3px", borderRadius: 3,
                  background: "var(--tt-bg-elev)", color: "var(--tt-text-dim)",
                  letterSpacing: "0.08em",
                },
              }, "EXT"),
              ext.price != null ? `$${ext.price.toFixed(2)} ` : "",
              `${ext.pct >= 0 ? "+" : ""}${ext.pct.toFixed(2)}%`,
            );
          })(),
          sparkSvg && h("div", {
            className: "ds-tickercard__spark",
            dangerouslySetInnerHTML: { __html: sparkSvg },
          }),
        );
      }

      // ─────────────────────────────────────────────────────────────
      // OpenPositionsPreview — 2026-05-28
      //
      // User: "we should provide a preview of our open positions and
      // what the model guidance is, which would be what the Daily Brief
      // also provides."
      //
      // Compact strip of open positions across Active Trader + Investor
      // modes. Each pill: ticker · direction · current P&L · lane.
      // Click → opens the rail overlay (same handler the Daily Brief uses).
      // Lazy-fetched on mount, cached 60s. Hidden when no open trades.
      // ─────────────────────────────────────────────────────────────
      // ─────────────────────────────────────────────────────────────
      // OptionsPlaysOfTheDay — 2026-05-30
      //
      // Top setups (sorted by Root-Strategy confluence mode) with their
      // primary options play. Pulls /timed/options/all which already
      // ranks RIDE > DRIFT > READY > FADE > WAIT and within each by
      // confluence score. Renders nothing if no plays returned.
      // ─────────────────────────────────────────────────────────────
      function formatDayTradeSuppressLabel(s) {
        if (!s || typeof s !== "object") return "unknown";
        const lean = s.day_lean ? String(s.day_lean).toUpperCase() : "";
        const conv = s.day_lean_conviction ? String(s.day_lean_conviction).toLowerCase() : "";
        const mode = s.confluence_mode ? String(s.confluence_mode).toUpperCase() : "";
        switch (String(s.reason || "")) {
          case "day_lean_low_conviction":
            return `playbook lean ${lean || "mixed"} but conviction is low${mode ? ` · fusion ${mode}` : ""}`;
          case "no_directional_signal_low_vol":
            return `no actionable day lean${lean ? ` (${lean}${conv ? ` · ${conv}` : ""})` : ""} and low vol · fusion ${mode || "WAIT"}`;
          case "wait_no_directional_bet":
            return `layer fusion is WAIT — no directional 0DTE bet${lean ? ` · playbook ${lean}` : ""}`;
          default:
            if (String(s.reason || "").startsWith("strike_drift")) {
              return `strike drifted too far from spot (${String(s.reason).replace(/_/g, " ")})`;
            }
            return String(s.reason || "unknown").replace(/_/g, " ");
        }
      }

      function dayTradeModelLevelsLine(p, flavor) {
        const gp = p?.game_plan;
        if (!gp) return null;
        const fmt = (n) => (Number.isFinite(Number(n)) && Number(n) > 0 ? `$${Number(n).toFixed(2)}` : null);
        if (flavor === "call") {
          const trig = fmt(gp.bull_trigger);
          const tgt = fmt(gp.bull_target);
          if (!trig && !tgt) return null;
          return `Playbook: ${trig ? `reclaim ${trig}` : ""}${trig && tgt ? " · " : ""}${tgt ? `target ${tgt}` : ""}`;
        }
        if (flavor === "put") {
          const trig = fmt(gp.bear_trigger);
          const tgt = fmt(gp.bear_target);
          if (!trig && !tgt) return null;
          return `Playbook: ${trig ? `break ${trig}` : ""}${trig && tgt ? " · " : ""}${tgt ? `target ${tgt}` : ""}`;
        }
        if (flavor === "straddle") {
          const up = fmt(gp.bull_target);
          const dn = fmt(gp.bear_target);
          if (!up && !dn) return null;
          return `Playbook range: ${dn || "?"} – ${up || "?"}`;
        }
        return null;
      }

      function OptionsPlaysOfTheDay({ onSelectTicker, layout = "grid" }) {
        const [plays, setPlays] = useState(null);
        // 2026-06-01 — Day-trade plays for SPY/QQQ/IWM (0DTE/1DTE),
        // rendered as a dedicated strip ABOVE the main grid so the
        // operator can never confuse them with a swing/investor play.
        const [dayTradePlays, setDayTradePlays] = useState(null);
        const [dayTradeExp, setDayTradeExp] = useState(null);
        const [dayTradeSuppressed, setDayTradeSuppressed] = useState(null);
        const [dayTradeAsOf, setDayTradeAsOf] = useState(null);
        const [loading, setLoading] = useState(true);
        // 2026-05-30 — layout="sidebar" renders the section as a vertical
        // list (one play per row, stacked) for the TodayHero right column.
        // layout="grid" (default) renders the original 4-up card grid for
        // standalone placement in the main body.
        const isSidebar = layout === "sidebar";
        useEffect(() => {
          let alive = true;
          const defer = setTimeout(() => { (async () => {
            try {
              // 2026-06-05 — Shared cache so the Day-Trade Predictions section
              // and this section hit /timed/options/all only once.
              const _optsUrl = `${API_BASE}/timed/options/all?limit=10`;
              const j = window.TTFetchCache
                ? await window.TTFetchCache.get(_optsUrl, { ttlMs: 60000, maxAgeMs: 300000, fetchOpts: { credentials: "include" } })
                : await fetchJsonRetry(_optsUrl);
              if (!j) return;
              if (alive && j?.ok && Array.isArray(j.plays)) {
                // Filter to actionable modes only (RIDE / DRIFT / READY).
                // WAIT plays clutter the row.
                const actionable = j.plays.filter(p => ["RIDE", "DRIFT", "READY", "FADE"].includes(p.confluence_mode));
                setPlays(actionable);
              }
              if (alive && j?.ok && Array.isArray(j.day_trade_plays)) {
                setDayTradePlays(j.day_trade_plays);
                setDayTradeExp(j.day_trade_expiration || null);
                setDayTradeSuppressed(Array.isArray(j.day_trade_suppressed) ? j.day_trade_suppressed : []);
                setDayTradeAsOf(Number(j.generated_at || j._cached_at) || null);
              }
            } catch (_) {}
            finally { if (alive) setLoading(false); }
          })(); }, 4000);
          return () => { alive = false; clearTimeout(defer); };
        }, []);
        // 2026-05-30 — Skeleton loader instead of returning null while
        // loading. The fetch can take 2-4 seconds on a cold cache and
        // the section silently popping in late ("right after page
        // settles") meant users scrolled past before it appeared.
        // Skeleton reserves the layout slot so the user sees the section
        // exists immediately.
        if (loading) {
          const skSlotCount = isSidebar ? 4 : 4;
          const skContainerStyle = isSidebar
            ? { display: "flex", flexDirection: "column", gap: 8 }
            : { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(280px, 1fr))", gap: 10 };
          return h("section", { className: isSidebar ? "" : "tt-row", style: { marginBottom: isSidebar ? 0 : 24 } },
            h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8, gap: 8, flexWrap: "wrap" } },
              h("div", null,
                h("div", { className: "tt-sec-title" }, "OPTIONS PLAYS OF THE DAY"),
                h("div", { style: { fontSize: 14, fontWeight: 600, color: "var(--tt-text)", letterSpacing: "-0.005em" } },
                  isSidebar ? "Today's setups" : "Confluence-Driven Strategies"),
              ),
              h("span", { style: { fontSize: 10, color: "var(--tt-text-faint)", fontStyle: "italic" } }, "Loading…"),
            ),
            h("div", { style: skContainerStyle },
              Array.from({ length: skSlotCount }, (_, i) => h("div", {
                key: `sk-${i}`,
                style: {
                  padding: isSidebar ? 10 : 12,
                  background: "rgba(255,255,255,0.02)",
                  border: "1px solid rgba(255,255,255,0.04)",
                  borderRadius: 10,
                  minHeight: isSidebar ? 76 : 110,
                  position: "relative",
                  overflow: "hidden",
                },
              },
                h("div", { style: { width: "60%", height: 12, background: "rgba(255,255,255,0.06)", borderRadius: 4, marginBottom: 6 } }),
                h("div", { style: { width: "85%", height: 11, background: "rgba(255,255,255,0.04)", borderRadius: 4, marginBottom: 5 } }),
                h("div", { style: { width: "40%", height: 9, background: "rgba(255,255,255,0.04)", borderRadius: 4 } }),
                h("div", {
                  style: {
                    position: "absolute", inset: 0,
                    background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent)",
                    animation: "tt-skeleton-shimmer 1.6s linear infinite",
                  },
                }),
              )),
            ),
          );
        }
        /* 2026-06-01 — Render the day-trade strip whenever we have
           day-trade plays, regardless of whether the main universe has
           actionable swing plays. This is the "DAY TRADE · 0/1 DTE"
           dedicated row for SPY/QQQ/IWM. Distinctive amber styling
           + DAY TRADE pill so it can never be confused with a longer-
           horizon swing/investor play for the same ticker. */
        const renderDayTradeStrip = () => {
          if (!dayTradePlays || dayTradePlays.length === 0) return null;
          const dteLabel = dayTradeExp?.dte === 0 ? "0DTE (Today)" : `${dayTradeExp?.dte ?? "?"}DTE (${dayTradeExp?.label || "Next session"})`;
          // 2026-06-05 — "As of" time + per-play freshness. The play is
          // recomputed each cycle against the live spot and the backend
          // suppresses any strike that drifts >2% from spot, so a shown play
          // is anchored to the spot displayed (as of the time below). We make
          // that explicit so a same-looking strike with a moved spot doesn't
          // read as stale.
          const asOfMs = Number(dayTradeAsOf);
          const asOfLabel = Number.isFinite(asOfMs) && asOfMs > 0
            ? new Date(asOfMs).toLocaleTimeString("en-US", { timeZone: "America/New_York", hour: "numeric", minute: "2-digit" }) + " ET"
            : null;
          const asOfAgeMin = Number.isFinite(asOfMs) && asOfMs > 0 ? Math.floor((Date.now() - asOfMs) / 60000) : null;
          const asOfStale = asOfAgeMin != null && asOfAgeMin > 15;
          return h("section", { className: isSidebar ? "" : "tt-row", style: { marginBottom: isSidebar ? 12 : 18 } },

              h("div", null,
                h("div", { className: "tt-sec-title", style: { color: "#f5c25c" } }, "OPTIONS PLAYS · DAY TRADE INDEX ETFs"),

              h("span", {
                style: { fontSize: 10, color: "var(--tt-text-muted)", fontStyle: "italic" },
                title: "Short-dated day-trade plays for index ETFs. Separate from any swing/investor play on the same ticker.",
              }, "scalps only · manage actively"),
            ),
            // 2026-06-05 — Clarify what "spot" means + validity, since 0/1DTE
            // plays are time-sensitive. Operator asked how a user knows it's
            // still valid.
            h("div", { style: { fontSize: 10.5, color: "var(--tt-text-muted)", lineHeight: 1.5, marginBottom: 8 } },
              asOfLabel && h("span", {

                  display: "inline-block", marginBottom: 4, marginRight: 6,
                  fontSize: 9.5, fontWeight: 700, letterSpacing: "0.04em",
                  padding: "1px 7px", borderRadius: 999,
                  color: asOfStale ? "#fbbf24" : "#34d399",
                  border: `1px solid ${asOfStale ? "rgba(245,158,11,0.4)" : "rgba(52,211,153,0.4)"}`,
                  background: asOfStale ? "rgba(245,158,11,0.08)" : "rgba(52,211,153,0.08)",

              }, asOfStale ? `STALE · spot as of ${asOfLabel}` : `LIVE · spot as of ${asOfLabel}`),
              h("strong", { style: { color: "var(--tt-text)" } }, "Spot"),
              " = the index price when this play was last computed. The strike is anchored to that spot and re-validated each cycle (~5 min) — a play only shows while its strike is within ~2% of spot, so it's a valid read for ",
              h("strong", null, dayTradeExp?.dte === 0 ? "today's session" : "the next session"),
              ". 0DTE expires today; 1DTE the next session. Intraday scalps — manage actively. ",
              asOfStale ? "This quote hasn't refreshed in a while — confirm the live price before acting." : ""),
            h("div", {
              style: isSidebar
                ? { display: "flex", flexDirection: "column", gap: 8 }
                : { display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(260px, 1fr))", gap: 10 },
            },
              dayTradePlays.map((p) => {
                const flavor = p.primary?._day_trade_flavor || "call";
                const flavorColor = flavor === "put" ? "#f87171" : flavor === "straddle" ? "#a78bfa" : "#34d399";
                const flavorLabel = flavor === "put" ? "PUT" : flavor === "straddle" ? "STRADDLE" : "CALL";
                /* 2026-06-01 — Strike + spot pulled to the most-prominent
                   line of the card. Operator: "should be more clear on
                   what the strike is". A 0DTE play's strike + spot is
                   the single most-important fact (everything else —
                   max loss, BE — is derived from those two). */
                const strike = Number(p.strike || p.primary?.strikes?.primary) || null;
                const spot = Number(p.price) || null;
                const strikeBlurb = strike
                  ? (flavor === "straddle"
                      ? `$${strike} straddle (spot $${spot ? spot.toFixed(2) : "?"})`
                      : `$${strike} ${flavorLabel.toLowerCase()} (spot $${spot ? spot.toFixed(2) : "?"})`)
                  : (p.primary?.label || "Day-trade play");
                // Strike-vs-spot distance → a plain valid/near-ATM signal.
                const driftPct = (strike && spot) ? Math.abs(strike - spot) / spot * 100 : null;
                const driftLabel = driftPct == null ? null
                  : driftPct < 0.5 ? "At the money"
                  : `${driftPct.toFixed(1)}% from spot`;
                const driftColor = driftPct == null ? "var(--tt-text-dim)"
                  : driftPct < 1 ? "#34d399" : driftPct < 2 ? "#fbbf24" : "#f87171";
                const flavorSource = p.flavor_source || p.primary?._day_trade_flavor_source || null;
                const dayLean = String(p.day_lean || p.primary?._day_trade_lean || "").toUpperCase();
                const dayLeanConv = String(p.day_lean_conviction || "").toLowerCase();
                const modelLine = dayTradeModelLevelsLine(p, flavor);
                const sourceLabel = flavorSource === "day_lean" && dayLean
                  ? `Playbook lean ${dayLean}${dayLeanConv ? ` (${dayLeanConv})` : ""}`
                  : (p.confluence_mode && p.confluence_mode !== "UNKNOWN"
                    ? `Layer fusion ${p.confluence_mode}${Number.isFinite(Number(p.confluence_score)) ? ` · ${p.confluence_score}/100` : ""}`
                    : null);
                return h("div", {
                  key: `dt-${p.ticker}`,
                  onClick: () => onSelectTicker && onSelectTicker(p.ticker, "OPTIONS"),
                  style: {
                    padding: 10,
                    background: "linear-gradient(135deg, rgba(245,194,92,0.10), rgba(245,194,92,0.04))",
                    border: "1px solid rgba(245,194,92,0.40)",
                    borderRadius: 10,
                    cursor: "pointer",
                    position: "relative",
                  },
                  onMouseEnter: (e) => { e.currentTarget.style.transform = "translateY(-1px)"; },
                  onMouseLeave: (e) => { e.currentTarget.style.transform = "translateY(0)"; },
                },
                  h("div", { style: { display: "flex", alignItems: "center", gap: 6, marginBottom: 6, flexWrap: "wrap" } },
                    h("span", { style: { fontSize: 14, fontWeight: 700, color: "var(--tt-text)" } }, p.ticker),
                    h("span", {
                      style: {
                        fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 4,
                        color: "#f5c25c", background: "rgba(245,194,92,0.18)",
                        border: "1px solid rgba(245,194,92,0.50)", letterSpacing: "0.05em",
                      },
                      title: "Day-trade play — same-day or next-day expiration. NOT a swing/investor recommendation.",
                    }, `DAY TRADE · ${p.day_trade_dte}DTE`),
                    h("span", {
                      style: {
                        fontSize: 9, fontWeight: 700, padding: "2px 6px", borderRadius: 4,
                        color: flavorColor, background: `${flavorColor}1A`,
                        border: `1px solid ${flavorColor}50`, letterSpacing: "0.05em",
                      },
                    }, flavorLabel),
                  ),
                  /* Strike line — most prominent, mono font. */
                  h("div", {
                    style: {
                      fontSize: 12, fontWeight: 700, color: "var(--tt-text)",
                      fontFamily: "var(--tt-font-mono)", marginBottom: 4, letterSpacing: "0.01em",
                    },
                  }, strikeBlurb),
                  h("div", { style: { display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", fontSize: 10, color: "var(--tt-text-muted)", lineHeight: 1.4, marginBottom: 6 } },
                    h("span", null, p.primary?.expiration?.label || `${p.day_trade_dte}DTE`),
                    driftLabel && h("span", {
                      title: "How close the suggested strike is to the spot it was anchored to. A play only shows while within ~2% of spot.",
                      style: { fontWeight: 700, color: driftColor, border: `1px solid ${driftColor}55`, borderRadius: 4, padding: "0 5px" },
                    }, driftLabel),
                    asOfLabel && h("span", { style: { color: "var(--tt-text-dim)" } }, `· as of ${asOfLabel}`),
                  ),
                  sourceLabel && h("div", {
                    style: { fontSize: 10, color: "var(--tt-text-muted)", lineHeight: 1.4, marginBottom: 4 },
                    title: flavorSource === "day_lean"
                      ? "0/1DTE flavor follows the same index playbook lean as Day Predictions"
                      : "0/1DTE flavor follows multi-layer fusion alignment",
                  }, sourceLabel),
                  modelLine && h("div", {
                    style: {
                      fontSize: 10, color: "var(--tt-text)", lineHeight: 1.4, marginBottom: 6,
                      fontFamily: "var(--tt-font-mono)",
                    },
                  }, modelLine),
                  p.primary?.max_loss_usd && h("div", {
                    style: { fontSize: 10.5, color: "var(--tt-text-muted)", fontFamily: "var(--tt-font-mono)", lineHeight: 1.4 },
                  },
                    "Max loss ",
                    h("strong", { style: { color: "#f87171" } }, `$${p.primary.max_loss_usd}`),
                    p.primary.breakeven
                      ? h("span", null, " · BE ", h("strong", { style: { color: "var(--tt-text)" } }, `$${Number(p.primary.breakeven).toFixed(2)}`))
                      : (p.primary.breakeven_up
                        ? h("span", null, " · BE ", h("strong", { style: { color: "var(--tt-text)" } }, `$${Number(p.primary.breakeven_down).toFixed(2)} / $${Number(p.primary.breakeven_up).toFixed(2)}`))
                        : null),
                  ),
                );
              }),
            ),
            /* 2026-06-01 — Suppressed-tickers callout. When a day-trade
               candidate gets gated out (strike drift > 2% from spot,
               after-close 0DTE, low-vol NEUTRAL), surface the reason so
               the operator knows we considered it and chose not to show
               it. Prevents the "is the system broken or just quiet?"
               ambiguity. */
            Array.isArray(dayTradeSuppressed) && dayTradeSuppressed.length > 0 && h("div", {
              style: {
                marginTop: 6, padding: "6px 10px",
                fontSize: 10, color: "var(--tt-text-faint)", fontStyle: "italic",
                background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.04)",
                borderRadius: 6,
              },
              title: "Day-trade plays we considered but suppressed for one of: strike drifted too far from spot, after-close 0DTE expired, no clear directional signal at low vol.",
            },
              "Suppressed: ",
              dayTradeSuppressed.map((s) => `${s.ticker} (${formatDayTradeSuppressLabel(s)})`).join(" · "),
            ),
          );
        };

        // For sidebar — show empty-state message instead of returning null,
        // because the sidebar slot otherwise leaves visible whitespace.
        if (!plays || plays.length === 0) {
          if (isSidebar) {
            return h(React.Fragment, null,
              renderDayTradeStrip(),
              h("section", null,
                h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8, gap: 8, flexWrap: "wrap" } },
                  h("div", null,
                    h("div", { className: "tt-sec-title" }, "OPTIONS PLAYS OF THE DAY"),
                    h("div", { style: { fontSize: 14, fontWeight: 600, color: "var(--tt-text)", letterSpacing: "-0.005em" } }, "Today's setups"),

                ),
                h("div", { className: "tt-card tt-card-pad", style: { fontSize: 12, color: "var(--tt-text-muted)", lineHeight: 1.5 } },

          return h(React.Fragment, null,
            renderDayTradeStrip(),
            h("section", { className: "tt-row", style: { marginBottom: 24 } },
              h("div", { style: { marginBottom: 8 } },
                h("div", { className: "tt-sec-title" }, "OPTIONS PLAYS OF THE DAY"),
                h("div", { style: { fontSize: 14, fontWeight: 600, color: "var(--tt-text)" } }, "Confluence-Driven Strategies"),

              h("div", { className: "tt-card tt-card-pad", style: { fontSize: 12.5, color: "var(--tt-text-muted)", lineHeight: 1.5 } },

            ),
          );
        }

        const MODE_META = {
          RIDE:  { color: "#34d399", bg: "rgba(52,211,153,0.10)", icon: "🚀" },
          READY: { color: "#f5c25c", bg: "rgba(245,194,92,0.10)", icon: "⏳" },
          DRIFT: { color: "#60a5fa", bg: "rgba(96,165,250,0.10)", icon: "🌊" },

        const containerStyle = isSidebar
          ? { display: "flex", flexDirection: "column", gap: 8 }

        return h(React.Fragment, null,
          renderDayTradeStrip(),
          h("section", { className: isSidebar ? "" : "tt-row", style: { marginBottom: isSidebar ? 0 : 24 } },
          h("div", { style: { display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8, gap: 8, flexWrap: "wrap" } },
            h("div", null,
              h("div", { className: "tt-sec-title" }, "OPTIONS PLAYS OF THE DAY"),
              h("div", { style: { fontSize: 14, fontWeight: 600, color: "var(--tt-text)", letterSpacing: "-0.005em" } },
                isSidebar ? `${plays.length} actionable` : "Confluence-Driven Strategies"),

              const contractDir = String(disp?.contract_direction || p.contract_direction || p.direction || "").toUpperCase();
              const dirFlipped = !!(disp?.direction_flipped || p.direction_flipped_by_confluence);
